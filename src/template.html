<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNN 英语精读</title>
    <style>
        :root {
            --bg: #ffffff;
            --bg2: #ffffff;
            --bg3: #f8f9fa;
            --bg4: #f1f3f5;
            --border: #e9ecef;
            --border2: #dee2e6;
            --text: #212529;
            --text2: #495057;
            --text3: #6c757d;
            --blue: #0a58ca;
            --blue-dim: #e7f1ff;
            --red: #cc0000;
            --green: #146c43;
            --amber: #e68a2e;
            --coral: #d6336c;
            --teal: #0f8b8b;
            --purple: #6f42c1;
            --hl-yellow: rgba(255, 243, 205, 0.8);
            --hl-yellow-border: rgba(255, 193, 7, 0.8);
            --hl-active: rgba(255, 230, 150, 0.9);
            --r: 6px;
            --font: 'Verdana', 'Arial', 'Helvetica', sans-serif;
            --mono: 'Consolas', 'Monaco', monospace;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
        }
        .layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            min-height: 100vh;
        }
        @media (max-width: 800px) {
            .layout {
                grid-template-columns: 1fr;
            }
            .sidebar {
                display: none;
            }
        }
        .sidebar {
            background: var(--bg3);
            border-right: 1px solid var(--border);
            padding: 1.5rem;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }
        .sidebar-logo {
            font-size: 18px;
            font-weight: bold;
            color: var(--red);
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
            margin-bottom: 1rem;
        }
        .directory-section {
            margin-bottom: 1.5rem;
        }
        .directory-section .section-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }
        .directory-item {
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 4px;
            transition: background 0.15s;
            margin-bottom: 8px;
        }
        .directory-item:hover {
            background: var(--bg4);
        }
        .directory-item.active {
            background: var(--blue-dim);
            border-left: 3px solid var(--blue);
        }
        .item-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
        }
        .item-date {
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
        }
        .item-title {
            font-size: 12px;
            color: var(--text2);
        }
        .main {
            padding: 1.5rem;
        }
        .topbar {
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .topbar-title {
            font-size: 18px;
            font-weight: bold;
            color: var(--red);
        }
        .topbar-date {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text2);
        }
        .btn-src {
            background: var(--bg3);
            border: 1px solid var(--border);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            margin-left: auto;
        }
        .btn-src:hover {
            background: var(--bg4);
        }
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 1.5rem;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 4px;
        }
        .tab {
            flex: 1;
            padding: 7px 0;
            font-size: 13px;
            text-align: center;
            border-radius: 7px;
            cursor: pointer;
            color: var(--text2);
            transition: all .15s;
        }
        .tab.active {
            background: var(--blue);
            color: #fff;
        }
        .section {
            display: none;
        }
        .section.active {
            display: block;
        }
        .transcript-wrap {
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 1.25rem;
            align-items: start;
        }
        @media (max-width: 900px) {
            .transcript-wrap {
                grid-template-columns: 1fr;
            }
        }
        .transcript-body {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 1.5rem;
            font-family: var(--font);
            line-height: 1.75;
        }
        .segment-block {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }
        .segment-block:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }
        .segment-title {
            font-size: 14px;
            font-weight: bold;
            color: var(--red);
            margin-bottom: 0.75rem;
            padding-bottom: 4px;
            border-bottom: 1px solid var(--border);
        }
        .para {
            margin-bottom: 1rem;
            white-space: pre-wrap;
        }
        .hl {
            background: var(--hl-yellow);
            border-bottom: 1px solid var(--hl-yellow-border);
            border-radius: 2px;
            cursor: pointer;
            padding: 0 2px;
        }
        .hl:hover, .hl.active {
            background: var(--hl-active);
        }
        .hl.level-考研 {
            border-bottom-color: #e68a2e;
        }
        .hl.level-六级 {
            border-bottom-color: #0a58ca;
        }
        .vocab-popup {
            position: fixed;
            z-index: 200;
            max-width: 300px;
            background: var(--bg4);
            border: 1px solid var(--border2);
            border-radius: var(--r);
            padding: 1rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            display: none;
        }
        .vocab-popup.show {
            display: block;
        }
        .word-panel {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 1rem;
            position: sticky;
            top: 80px;
        }
        .word-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: calc(100vh - 200px);
            overflow-y: auto;
        }
        .word-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 7px;
            cursor: pointer;
        }
        .word-chip:hover {
            background: var(--bg3);
        }
        .word-chip.active {
            background: var(--blue-dim);
        }
        .vocab-grid, .scard, .tcard {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 1rem;
            margin-bottom: 12px;
        }
        .vword {
            font-size: 18px;
            font-weight: 700;
            color: var(--red);
        }
        .empty {
            text-align: center;
            padding: 3rem;
            color: var(--text2);
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border2);
            border-radius: 3px;
        }
        .translation-box {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 1.5rem;
        }
        #fullTranslation {
            white-space: pre-wrap;
            line-height: 1.8;
            font-size: 14px;
        }
        .card-label {
            font-weight: bold;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-logo">CNN 英语精读</div>
        <div class="directory-section">
            <div class="section-title">📅 历史记录</div>
            <div id="directoryList">
                <!-- DIRECTORY_ENTRIES -->
            </div>
        </div>
        <div class="sidebar-nav" style="margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border);">
            <div class="nav-item" onclick="window.open('https://transcripts.cnn.com','_blank')" style="cursor: pointer;">🔗 CNN Transcripts</div>
        </div>
    </aside>

    <div class="main">
        <div class="topbar">
            <span class="topbar-title">CNN This Morning</span>
            <span class="topbar-date" id="topbarDate"></span>
            <button class="btn-src" id="srcBtn" onclick="openSource()">查看原文 →</button>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('transcript')">📝 全文稿</div>
            <div class="tab" onclick="switchTab('translation')">🌐 全文翻译</div>
            <div class="tab" onclick="switchTab('vocab')">📚 词汇</div>
            <div class="tab" onclick="switchTab('sentences')">🔍 难句</div>
            <div class="tab" onclick="switchTab('topics')">🌍 背景</div>
        </div>

        <div id="contentContainer">
            <div class="directory-view">
                <div class="empty">请从左侧选择日期加载内容</div>
            </div>
        </div>
    </div>
</div>

<div class="vocab-popup" id="vocabPopup">
    <div><span class="vp-word" id="vpWord"></span><span class="vp-ph" id="vpPh"></span></div>
    <div><span class="vp-pos" id="vpPos"></span><span class="vp-lv" id="vpLv"></span></div>
    <div id="vpCn" style="color: var(--red);"></div>
    <div id="vpEn" style="font-size: 12px;"></div>
</div>

<script>
/* ALL_DATA_PLACEHOLDER */
let currentData = null;
let currentDate = null;
const LV_COLORS = {'考研':'#e68a2e','六级':'#0a58ca'};

(function init(){
    const latestDate = '<!-- LATEST_DATE -->';
    if(latestDate && ALL_DATA[latestDate]) {
        loadDate(latestDate);
    } else {
        const firstDate = Object.keys(ALL_DATA)[0];
        if(firstDate) loadDate(firstDate);
    }
    updateActiveDirectory();
})();

function openSource(){
    if(currentData?.source_url) window.open(currentData.source_url,'_blank');
}

function loadDate(date){
    if(!ALL_DATA[date]) return;
    currentDate = date;
    currentData = ALL_DATA[date];
    document.getElementById('topbarDate').textContent = date;
    renderContent(currentData);
    switchTab('transcript');
    updateActiveDirectory();
}

function updateActiveDirectory() {
    document.querySelectorAll('.directory-item').forEach(item => {
        const date = item.getAttribute('data-date');
        if(date === currentDate) {
            item.classList.add('active');
        } else {
            item.classList.remove('active');
        }
    });
}

function renderContent(data) {
    const segments = data.segments || [];
    const vocab = data.vocabulary || [];
    
    if(!segments.length) {
        document.getElementById('contentContainer').innerHTML = '<div class="empty">暂无内容</div>';
        return;
    }
    
    const vocabMap = {};
    vocab.forEach(v => { vocabMap[v.word.toLowerCase()] = v; });
    const sortedWords = Object.keys(vocabMap).sort((a,b) => b.length - a.length);
    
    let html = `
        <div class="section active" id="transcriptSection">
            <div class="transcript-wrap">
                <div><div class="transcript-body" id="transcriptBody"></div></div>
                <div><div class="word-panel"><div class="word-panel-title">词汇索引</div><div class="word-list" id="wordList"></div></div></div>
            </div>
        </div>
        <div class="section" id="translationSection">
            <div class="translation-box"><div class="card-label">📖 完整中文翻译</div><div id="fullTranslation"></div></div>
        </div>
        <div class="section" id="vocabSection"><div class="vocab-grid" id="vocabGrid"></div></div>
        <div class="section" id="sentencesSection"><div id="sentenceList"></div></div>
        <div class="section" id="topicsSection"><div id="topicList"></div></div>
    `;
    document.getElementById('contentContainer').innerHTML = html;
    
    // 原文
    let transcriptHtml = '';
    for(let seg of segments) {
        const title = seg.title || `Segment ${seg.seg}`;
        const rawText = seg.text || '';
        const highlighted = highlightWords(rawText, sortedWords, vocabMap);
        transcriptHtml += `<div class="segment-block"><div class="segment-title">📺 ${escapeHtml(title)}</div><div class="para">${highlighted}</div></div>`;
    }
    document.getElementById('transcriptBody').innerHTML = transcriptHtml;
    
    // 词汇索引
    renderWordList(vocab);
    
    // 翻译（数组格式）
    const transDiv = document.getElementById('fullTranslation');
    if (Array.isArray(data.full_translation) && data.full_translation.length) {
        let transHtml = '';
        for (let item of data.full_translation) {
            if (item.paragraph && item.translation) {
                transHtml += `<div style="margin-bottom: 1rem;"><strong>${escapeHtml(item.paragraph)}</strong><br>${escapeHtml(item.translation)}</div>`;
            } else if (item.en && item.cn) {
                // 兼容旧格式（如有）
                transHtml += `<div style="margin-bottom: 1rem;">${escapeHtml(item.en)}<br>${escapeHtml(item.cn)}</div>`;
            } else {
                transHtml += `<div>${escapeHtml(JSON.stringify(item))}</div>`;
            }
        }
        transDiv.innerHTML = transHtml;
    } else if (typeof data.full_translation === 'string') {
        transDiv.innerHTML = escapeHtml(data.full_translation).replace(/\n/g, '<br>');
    } else {
        transDiv.innerHTML = '暂无全文翻译';
    }
    
    renderVocabCards(vocab);
    renderSentencesList(data.sentences || []);
    renderTopicsList(data.topics || []);
}

function highlightWords(text, sortedWords, vocabMap) {
    if(!text) return '';
    const positions = [];
    const lc = text.toLowerCase();
    sortedWords.forEach(word => {
        let idx = 0;
        while((idx = lc.indexOf(word, idx)) !== -1) {
            const before = idx === 0 || !/[a-z]/i.test(text[idx-1]);
            const after = idx+word.length >= text.length || !/[a-z]/i.test(text[idx+word.length]);
            if(before && after) {
                const overlaps = positions.some(p => idx < p.end && idx+word.length > p.start);
                if(!overlaps) positions.push({start:idx, end:idx+word.length, word, vocab:vocabMap[word]});
            }
            idx += word.length;
        }
    });
    if(!positions.length) return escapeHtml(text);
    positions.sort((a,b) => a.start - b.start);
    let result = '', last = 0;
    for(let p of positions) {
        result += escapeHtml(text.slice(last, p.start));
        const lv = p.vocab.level || '';
        const cnMeaning = p.vocab.cn || '';
        const safeTitle = cnMeaning.replace(/["']/g, '&quot;');
        result += `<span class="hl level-${lv}" data-word="${escapeHtml(p.word)}" title="${safeTitle}" onclick="showVocabPopup(event,'${escapeHtml(p.word)}')">${escapeHtml(p.word)}</span>`;
        last = p.end;
    }
    result += escapeHtml(text.slice(last));
    return result;
}

function showVocabPopup(e, word) {
    e.stopPropagation();
    const data = currentData?.vocabulary?.find(v => v.word === word);
    if(!data) return;
    document.querySelectorAll('.hl').forEach(el => el.classList.toggle('active', el.dataset.word === word));
    document.querySelectorAll('.word-chip').forEach(el => el.classList.toggle('active', el.dataset.word === word));
    document.getElementById('vpWord').textContent = data.word;
    document.getElementById('vpPh').textContent = data.phonetic || '';
    document.getElementById('vpPos').textContent = data.pos || '';
    document.getElementById('vpLv').textContent = data.level || '';
    document.getElementById('vpCn').textContent = data.cn || '';
    document.getElementById('vpEn').textContent = data.en || '';
    const popup = document.getElementById('vocabPopup');
    popup.classList.add('show');
    let x = e.clientX + 12, y = e.clientY + 12;
    if(x + 300 > window.innerWidth) x = e.clientX - 312;
    if(y + 160 > window.innerHeight) y = e.clientY - 160;
    popup.style.left = x + 'px';
    popup.style.top = y + 'px';
}

document.addEventListener('click', e => {
    if(!e.target.classList.contains('hl') && !e.target.closest('.vocab-popup') && !e.target.closest('.word-chip')) {
        document.getElementById('vocabPopup').classList.remove('show');
        document.querySelectorAll('.hl.active').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.word-chip.active').forEach(el => el.classList.remove('active'));
    }
});

function renderWordList(vocab) {
    const container = document.getElementById('wordList');
    if(!container) return;
    container.innerHTML = vocab.map(v => `
        <div class="word-chip" data-word="${escapeHtml(v.word)}" onclick="jumpToWord('${escapeHtml(v.word)}')">
            <span style="display:inline-block; width:8px; height:8px; background:${LV_COLORS[v.level] || '#0a58ca'}; border-radius:50%; margin-right:6px;"></span>
            <span>${escapeHtml(v.word)}</span>
            <span style="margin-left:8px; color:var(--text2);">${escapeHtml(v.cn || '')}</span>
        </div>
    `).join('');
}

function jumpToWord(word) {
    switchTab('transcript');
    setTimeout(() => {
        const el = document.querySelector(`.hl[data-word="${word}"]`);
        if(el) { el.scrollIntoView({behavior:'smooth', block:'center'}); el.click(); }
    }, 50);
}

function renderVocabCards(vocab) {
    const container = document.getElementById('vocabGrid');
    if(!container) return;
    container.innerHTML = vocab.map(v => `
        <div class="vcard">
            <div><span class="vword">${escapeHtml(v.word)}</span> <span>${escapeHtml(v.phonetic || '')}</span> <span>${escapeHtml(v.pos || '')}</span> <span>${escapeHtml(v.level || '')}</span></div>
            <div>${escapeHtml(v.cn)}</div>
            <div>${escapeHtml(v.en || '')}</div>
            <div><em>${escapeHtml(v.excerpt || v.example || '')}</em><div>${escapeHtml(v.example_cn || '')}</div></div>
        </div>
    `).join('');
}

function renderSentencesList(sentences) {
    const container = document.getElementById('sentenceList');
    if(!container) return;
    container.innerHTML = sentences.map((s,i) => `
        <div class="scard"><strong>${i+1}.</strong> <div>${escapeHtml(s.en)}</div><div>${escapeHtml(s.cn)}</div><div><em>结构：</em>${escapeHtml(s.structure || '')}</div><div><em>分析：</em>${escapeHtml(s.analysis || '')}</div></div>
    `).join('');
}

function renderTopicsList(topics) {
    const container = document.getElementById('topicList');
    if(!container) return;
    const colors = ['#0a58ca','#d6336c','#146c43','#e68a2e'];
    container.innerHTML = topics.map((t,i) => `
        <div class="tcard"><strong style="color:${colors[i%colors.length]}">${escapeHtml(t.title)}</strong><div>${escapeHtml(t.content)}</div><div>🔑 ${escapeHtml(t.keywords || '')}</div></div>
    `).join('');
}

function switchTab(tabId) {
    const sections = ['transcriptSection', 'translationSection', 'vocabSection', 'sentencesSection', 'topicsSection'];
    const tabMap = { transcript: 0, translation: 1, vocab: 2, sentences: 3, topics: 4 };
    const idx = tabMap[tabId];
    if(idx === undefined) return;
    document.querySelectorAll('.tab').forEach((tab,i) => {
        if(i === idx) tab.classList.add('active');
        else tab.classList.remove('active');
    });
    sections.forEach((id, i) => {
        const el = document.getElementById(id);
        if(el) el.classList.toggle('active', i === idx);
    });
}

function escapeHtml(str) {
    if(!str) return '';
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
}
</script>
</body>
</html>
