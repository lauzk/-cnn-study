<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- 模拟 CNN 官网标题格式 -->
<title>CNN.com - Transcripts</title>
<style>
/* 全局样式重置 + 字体/颜色还原 */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    background: #ffffff;
    color: #000000;
    font-family: verdana, arial, helvetica, sans-serif;
    line-height: 1.4;
}
/* CNN 官网主容器宽度和边距 */
#cnnContainer {
    font-size: 16px;
    line-height: 1.75;
    margin: 10px auto 0;
    max-width: 1100px;
}
/* 链接颜色 (完全复制官网) */
#cnnContainer a {
    color: #006598;
    text-decoration: none;
}
#cnnContainer a:hover {
    color: #C00;
    text-decoration: underline;
}
/* ---- CNN 官方文本样式（严格按照官网注释）---- */
.cnnTransHeaders,
.cnnTransDate {
    font-family: verdana, arial, sans-serif;
}
.cnnTransCal,
.cnnTransHead,
.cnnTransStoryHead,
.cnnTransSubHead {
    font-family: arial, helvetica, sans-serif;
}
.cnnTransHeaders,
.cnnTransDate,
.cnnTransProv {
    font-size: 10px;
}
.cnnTransSubHead {
    font-size: 12px;
}
.cnnTransHead {
    font-size: 14px;
}
.cnnTransStoryHead {
    font-size: 16px;
}
.cnnTransHeaders,
.cnnTransDate,
.cnnTransHead,
.cnnTransStoryHead,
.cnnTransSubHead,
.cnnTransProv {
    font-weight: bold;
}
.cnnTransHeaders,
.cnnTransSubHead,
.cnnTransDate {
    color: #000000;
}
.cnnTransHead,
.cnnTransStoryHead {
    color: #CC0000;
}
.cnnTransHeaders,
.cnnTransCal {
    padding: 6px;
}
.cnnTransProv {
    font-family: verdana, helvetica, sans-serif;
    padding: 1px;
}
.cnnBodyText {
    font-family: verdana, arial, sans-serif;
    font-size: 13px;
    line-height: 1.6;
    margin-bottom: 1em;
}
/* 模拟 CNN 官方的粗体、标红等辅助样式 */
.cnnBold {
    font-weight: bold;
}
.cnnRed {
    color: #CC0000;
}
.cnnTransHighlight {
    background: #FFFFE0;
    border-bottom: 1px dotted #CC0000;
    cursor: pointer;
}
.cnnTransHighlight:hover {
    background: #FFF0B0;
}
/* 左侧日期导航栏样式（保留原有布局，但严格遵循官网） */
.sidebar {
    position: fixed;
    left: 0;
    top: 0;
    width: 200px;
    height: 100%;
    background: #f2f2f2;
    border-right: 1px solid #ddd;
    overflow-y: auto;
    padding: 12px;
    font-family: verdana, arial, sans-serif;
    font-size: 12px;
    z-index: 100;
}
.sidebar .sidebar-logo {
    font-weight: bold;
    font-size: 14px;
    color: #CC0000;
    border-bottom: 1px solid #ccc;
    margin-bottom: 12px;
    padding-bottom: 8px;
}
.hist-item {
    margin-bottom: 6px;
    cursor: pointer;
}
.hist-item .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: #999;
    border-radius: 50%;
    margin-right: 8px;
}
.hist-item.active .dot {
    background: #CC0000;
}
.hist-item .date {
    color: #006598;
    font-size: 12px;
}
.hist-item.active .date {
    font-weight: bold;
    color: #CC0000;
}
.main {
    margin-left: 220px;
    padding: 20px 30px;
}
/* 选项卡、词汇表等组件不影响主体风格，保留交互，但整体色调、字体贴近 CNN */
.tabs {
    margin-bottom: 20px;
    border-bottom: 1px solid #ddd;
    padding-bottom: 8px;
}
.tab {
    display: inline-block;
    margin-right: 16px;
    font-family: verdana, arial, sans-serif;
    font-weight: bold;
    font-size: 13px;
    color: #006598;
    cursor: pointer;
    padding: 4px 8px;
}
.tab.active {
    color: #CC0000;
    border-bottom: 2px solid #CC0000;
}
.word-panel {
    background: #f8f8f8;
    border: 1px solid #e0e0e0;
    padding: 12px;
    margin-top: 20px;
    max-width: 280px;
}
.word-list .word-chip {
    cursor: pointer;
    margin-bottom: 6px;
    font-size: 12px;
}
/* 其他词汇卡、句子卡尽量沿用原有结构，确保功能不变，只调颜色/字体以契合 CNN 风格 */
.vcard, .scard, .tcard {
    background: #ffffff;
    border: 1px solid #e0e0e0;
    margin-bottom: 12px;
    padding: 12px;
    font-family: verdana, arial, sans-serif;
}
.vword {
    font-weight: bold;
    color: #CC0000;
}
/* 确保高亮单词下方注释字体比正文稍小，但完全保留功能 */
.word-annotation {
    display: block;
    font-size: 0.75rem;
    color: #333;
    margin-top: 2px;
    background: #f9f9f9;
    padding: 2px 6px;
    border-left: 2px solid #CC0000;
}
/* 段落自动换行，模拟 CNN 页面原生的展示效果 */
.transcript-body {
    white-space: pre-wrap;
    font-family: verdana, arial, sans-serif;
    font-size: 14px;
    line-height: 1.6;
}
.segment-block {
    margin-bottom: 28px;
}
.segment-title {
    font-family: arial, helvetica, sans-serif;
    font-size: 14px;
    font-weight: bold;
    color: #CC0000;
    margin-bottom: 8px;
    border-bottom: 1px solid #ccc;
    padding-bottom: 4px;
}
</style>
</head>
<body>

<!-- 固定左侧日期导航栏 -->
<div class="sidebar">
    <div class="sidebar-logo"><span>📰</span> CNN 英语精读</div>
    <div class="sidebar-section">历史记录</div>
    <div id="histList"><!-- HISTORY_ITEMS --></div>
    <div class="sidebar-nav">
        <div class="nav-item" onclick="window.open('https://transcripts.cnn.com','_blank')">🔗 CNN Transcripts</div>
    </div>
</div>

<div class="main">
    <div class="topbar" style="margin-bottom:15px;">
        <span class="topbar-title" id="topbarTitle" style="font-size:16px; font-weight:bold; color:#CC0000;">CNN This Morning</span>
        <span class="topbar-date" id="topbarDate" style="margin-left:15px; font-size:12px; color:#555;"></span>
        <button class="btn btn-src" id="srcBtn" onclick="openSource()" style="float:right; background:#f2f2f2; border:1px solid #ccc; padding:4px 8px; cursor:pointer;">查看原文 →</button>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('transcript')">📝 全文稿</div>
        <div class="tab" onclick="switchTab('translation')">🌐 全文翻译</div>
        <div class="tab" onclick="switchTab('vocab')">📚 词汇</div>
        <div class="tab" onclick="switchTab('sentences')">🔍 难句</div>
        <div class="tab" onclick="switchTab('topics')">🌍 背景</div>
    </div>

    <div id="transcript" class="section active">
        <div class="transcript-wrap" style="display:flex; gap:20px;">
            <div style="flex:3;">
                <div class="transcript-hint" style="background:#f6f6f6; padding:6px; margin-bottom:12px; font-size:12px;">
                    💡 鼠标悬停高亮单词查看中文释义 · 点击显示详细解析
                </div>
                <div class="transcript-body" id="transcriptBody"></div>
            </div>
            <div style="flex:1;">
                <div class="word-panel">
                    <div class="word-panel-title" style="font-weight:bold;">📖 词汇索引</div>
                    <div class="word-list" id="wordList"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="translation" class="section">
        <div style="background:#fff; border:1px solid #ddd; padding:16px;">
            <div class="card-label" style="font-weight:bold; margin-bottom:12px;">📖 完整中文翻译</div>
            <div id="fullTranslation" style="white-space: pre-wrap; font-family: verdana, arial, sans-serif; font-size:14px; line-height:1.6;"></div>
        </div>
    </div>

    <div id="vocab" class="section"><div class="vocab-grid" id="vocabGrid"></div></div>
    <div id="sentences" class="section"><div id="sentenceList"></div></div>
    <div id="topics" class="section"><div id="topicList"></div></div>
</div>

<div class="vocab-popup" id="vocabPopup" style="position:fixed; background:#fff; border:1px solid #aaa; padding:8px; display:none; z-index:1000;">
    <div><span id="vpWord"></span><span id="vpPh"></span></div>
    <div><span id="vpPos"></span><span id="vpLv"></span></div>
    <div id="vpCn"></div>
    <div id="vpEn"></div>
</div>

<script>
/* ALL_DATA_PLACEHOLDER */

let currentData = null;
const LV_COLORS = {'考研':'#e68a2e','六级':'#0a58ca'};

(function init(){
  const latest = '<!-- LATEST_DATE -->';
  if(ALL_DATA[latest]) loadDate(latest);
  document.querySelector(`[data-date="${latest}"]`)?.classList.add('active');
})();

function openSource(){
  if(currentData?.source_url) window.open(currentData.source_url,'_blank');
}

function loadDate(date){
  if(!ALL_DATA[date]) return;
  document.querySelectorAll('.hist-item').forEach(b=>
    b.classList.toggle('active', b.dataset.date===date));
  renderAll(ALL_DATA[date]);
}

function renderAll(data){
  currentData = data;
  document.getElementById('topbarDate').textContent = data.date||'';
  document.getElementById('topbarTitle').textContent = 'CNN This Morning · ' + (data.date||'');

  // 使用 segments 数组渲染原文
  renderSegmentedTranscript(data.segments || [], data.vocabulary || []);
  renderWordList(data.vocabulary || []);
  renderVocab(data.vocabulary || []);
  renderSentences(data.sentences || []);
  renderTopics(data.topics || []);

  const transDiv = document.getElementById('fullTranslation');
  if(transDiv) transDiv.innerHTML = esc(data.full_translation || '暂无全文翻译，请重新运行生成。');
}

function renderSegmentedTranscript(segments, vocab){
  const container = document.getElementById('transcriptBody');
  if(!segments || segments.length === 0){
    container.innerHTML = '<div class="cnnBodyText">无分段数据</div>';
    return;
  }
  const vocabMap = {};
  vocab.forEach(v=>{ vocabMap[v.word.toLowerCase()] = v; });
  const sortedWords = Object.keys(vocabMap).sort((a,b)=>b.length-a.length);

  let html = '';
  for(let seg of segments){
    const title = seg.title || `Segment ${seg.seg}`;
    const rawText = seg.text || '';
    const highlighted = highlightWordsWithHover(rawText, sortedWords, vocabMap);
    html += `
      <div class="segment-block">
        <div class="segment-title">📺 ${esc(title)}</div>
        <div class="cnnBodyText">${highlighted}</div>
      </div>
    `;
  }
  container.innerHTML = html;
}

function highlightWordsWithHover(text, sortedWords, vocabMap){
  if(!text) return '';
  const positions = [];
  const lc = text.toLowerCase();
  sortedWords.forEach(word=>{
    let idx = 0;
    while((idx = lc.indexOf(word, idx)) !== -1){
      const before = idx === 0 || !/[a-z]/i.test(text[idx-1]);
      const after  = idx+word.length >= text.length || !/[a-z]/i.test(text[idx+word.length]);
      if(before && after){
        const overlaps = positions.some(p=> idx < p.end && idx+word.length > p.start);
        if(!overlaps){
          positions.push({start:idx, end:idx+word.length, word, vocab:vocabMap[word]});
        }
      }
      idx += word.length;
    }
  });
  if(!positions.length) return esc(text);
  positions.sort((a,b)=>a.start-b.start);

  let result = '';
  let last = 0;
  // 段落分割（保留原始格式）
  const paragraphs = text.split(/\n\s*\n/);
  let globalPos = 0;
  for (let para of paragraphs) {
    let paraStart = globalPos;
    let paraEnd = globalPos + para.length;
    const paraPositions = positions.filter(p => p.start >= paraStart && p.start < paraEnd);
    let lastParaPos = paraStart;
    for (let p of paraPositions) {
      result += esc(text.slice(lastParaPos, p.start));
      const word = p.word;
      const vocabData = p.vocab;
      const lv = vocabData.level || '';
      const lvClass = `level-${lv}`;
      const cnMeaning = vocabData.cn || '';
      const safeTitle = cnMeaning.replace(/["']/g, '&quot;');
      result += `<span class="cnnTransHighlight" data-word="${esc(word)}" title="${safeTitle}" onclick="showVocabPopup(event,'${esc(word)}')">${esc(word)}</span>`;
      lastParaPos = p.end;
    }
    result += esc(text.slice(lastParaPos, paraEnd));
    globalPos = paraEnd + 2;
  }
  return result;
}

function showVocabPopup(e, word){
  e.stopPropagation();
  const data = currentData?.vocabulary?.find(v=>v.word===word);
  if(!data) return;

  document.querySelectorAll('.cnnTransHighlight').forEach(el=>{
    el.classList.toggle('active', el.dataset.word===word);
  });
  document.querySelectorAll('.word-chip').forEach(el=>{
    el.classList.toggle('active', el.dataset.word===word);
  });

  document.getElementById('vpWord').textContent = data.word;
  document.getElementById('vpPh').textContent   = data.phonetic||'';
  document.getElementById('vpPos').textContent  = data.pos||'';
  document.getElementById('vpLv').textContent   = data.level||'';
  document.getElementById('vpCn').textContent   = data.cn||'';
  document.getElementById('vpEn').textContent   = data.en||'';

  const popup = document.getElementById('vocabPopup');
  popup.classList.add('show');
  popup.style.pointerEvents = 'auto';
  popup.style.display = 'block';

  let x = e.clientX + 12, y = e.clientY + 12;
  if(x + 300 > window.innerWidth) x = e.clientX - 312;
  if(y + 160 > window.innerHeight) y = e.clientY - 160;
  popup.style.left = x + 'px';
  popup.style.top  = y + 'px';
}

document.addEventListener('click', e=>{
  if(!e.target.classList.contains('cnnTransHighlight') && !e.target.closest('.vocab-popup') && !e.target.closest('.word-chip')){
    document.getElementById('vocabPopup').classList.remove('show');
    document.getElementById('vocabPopup').style.display = 'none';
    document.querySelectorAll('.cnnTransHighlight.active').forEach(el=>el.classList.remove('active'));
    document.querySelectorAll('.word-chip.active').forEach(el=>el.classList.remove('active'));
  }
});

function renderWordList(vocab){
  document.getElementById('wordList').innerHTML = vocab.map(v=>`
    <div class="word-chip" data-word="${esc(v.word)}" onclick="jumpToWord('${esc(v.word)}')">
      <span class="wc-lv" style="background:${LV_COLORS[v.level]||'#0a58ca'}"></span>
      <span class="wc-word">${esc(v.word)}</span>
      <span class="wc-cn">${esc(v.cn||'')}</span>
    </div>`).join('');
}

function jumpToWord(word){
  switchTab('transcript');
  setTimeout(()=>{
    const el = document.querySelector(`.cnnTransHighlight[data-word="${word}"]`);
    if(el){
      el.scrollIntoView({behavior:'smooth', block:'center'});
      el.click();
    }
  }, 50);
}

function renderVocab(list){
  document.getElementById('vocabGrid').innerHTML = list.map(v=>`
    <div class="vcard">
      <div class="vhead">
        <span class="vword">${esc(v.word)}</span>
        <span class="vph">${esc(v.phonetic||'')}</span>
        <span class="bpos">${esc(v.pos||'')}</span>
        <span class="blv">${esc(v.level||'')}</span>
      </div>
      <div class="vcn">${esc(v.cn)}</div>
      <div class="ven">${esc(v.en||'')}</div>
      <div class="veg">
        ${hlWord(v.excerpt||v.example||'', v.word)}
        <div class="vegcn">${esc(v.example_cn||'')}</div>
      </div>
    </div>`).join('');
}

function hlWord(text, word){
  if(!word||!text) return esc(text);
  const re = new RegExp(`(${word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return esc(text).replace(re,'<em>$1</em>');
}

function renderSentences(list){
  document.getElementById('sentenceList').innerHTML = list.map((s,i)=>`
    <div class="scard">
      <div class="snum">${i+1}</div>
      <div class="sen-en">${esc(s.en)}</div>
      <div class="sen-cn">${esc(s.cn)}</div>
      <div class="divider"></div>
      <div class="alabel">句子结构</div>
      <div class="abody">${esc(s.structure||'')}</div>
      <div class="alabel">语法分析</div>
      <div class="abody">${esc(s.analysis||'')}</div>
    </div>`).join('');
}

function renderTopics(list){
  const colors = ['#0a58ca','#d6336c','#146c43','#e68a2e'];
  document.getElementById('topicList').innerHTML = list.map((t,i)=>`
    <div class="tcard">
      <div class="ttitle">
        <span class="tdot" style="background:${colors[i%colors.length]}"></span>
        ${esc(t.title)}
      </div>
      <div class="tcontent">${esc(t.content)}</div>
      <div class="tkw">🔑 ${esc(t.keywords||'')}</div>
    </div>`).join('');
}

function switchTab(id){
  const tabs = ['transcript','translation','vocab','sentences','topics'];
  tabs.forEach(t=>{
    const idx = tabs.indexOf(t);
    const tabBtn = document.querySelectorAll('.tab')[idx];
    if(tabBtn) tabBtn.classList.toggle('active', t===id);
    const section = document.getElementById(t);
    if(section) section.classList.toggle('active', t===id);
  });
}

function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
</script>
</body>
</html>
