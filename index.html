 It turns out, though, that six states are now bowing out. Now, it's important to note all 50 states will still be represented in some way. But these six states have said it's just too much money for them to spend that total cost, somewhere between $70,000 and $100,000. And for most of those states, that was a major factor in the decision.\n\nMAURA HEALEY, MASSACHUSETTS GOVERNOR: Great American Fair, he invited all the states to participate and wants to charge us, charge us to go down and put something on his exhibit, whatever he's creating for Freedom 250. It's just ridiculous.\n\nHILL: There are also concerns that politics will or have already tainted the celebration. The spokesperson for Oregon's governor saying there are \"growing concerns\" that the event in Washington, DC is shaping up to be a more partisan affair than originally presented. And if that language sounds familiar, perhaps it should. As we remember the concert.\n\nThe panel is back. Look, there are concerns, and it's important to note this is not the broader America 250, which, you know, we see that logo everywhere. I mean, I see it in my town. There are banners up. That's separate from Freedom 250.\n\nRob, do you have concerns that this has become more partisan? I mean, this should be -- there should be no politics in the celebration of America's 250th birthday.\n\nROB BLUEY, PRESIDENT AND EXECUTIVE EDITOR, THE DAILY SIGNAL: That's right, Erica. I agree with you. I don't think that it should be a partisan event, and I don't think that the Great American State Fair was becoming partisan. Unfortunately, some of these Democrat governors seem that they want to pick a fight with Donald Trump and they're using the excuse of budget constraints to do so.\n\nI think it goes entirely to their disagreements with the President and wanting to stoke some of these fears in the minds of voters in their states that somehow the President is going to politicize this state fair. Now, you're right, Erica. There have been other concerns that certain aspects of the America 250th anniversary might be taking a more political tone.\n\nBut I think just by the nature of what you look in the grand scheme of things overall, this is a great celebration of our country's founding, and we should come to Washington and take part in it.\n\nHILL: You talk about some of those concerns. The President, you know, turning what was supposed to be a concert, a number of artists pulling out because they said they found out after the fact that this was more of a partisan event. He's now turning that into a rally.\n\nFlo Rida, Vanilla Ice, they're still going to participate. Vanilla Ice had some really interesting comments right here on CNN, in the wake of all that backlash and other artists canceling. I want to play his take on his decision to be a part of it.\n\nVANILLA ICE, PERFORMING AT FREEDOM 250 STATE FAIR: This is a huge honor to play the birthday. It's one in a lifetime, you know, 250. So I'm honored, and I just, you know, I respect everybody else.\n\nI know there's a lot of tension everywhere. This whole world is like a snow globe, but it shouldn't be that. And music is here to bring people together, man. And, you know, it shouldn't be that this music is dragged into politics. This is a moment to celebrate our country turning 250 years, no matter who puts it on.\n\nHILL: Maria, is that the answer? Is it really about, you know, individuals celebrating how they want to celebrate and not allowing it to become partisan?\n\nMARIA CARDONA, DEMOCRATIC STRATEGIST: It should be that way, Erica. But when you have somebody like Donald Trump who is focused on all of these celebrations and he's the one who's politicizing it. I mean, why did he have to create a Freedom 250 to begin with? Why couldn't he just have worked with the original group, America 250, to focus on making this a celebration for everyone? But he can't do that.\n\nAnd I think ultimately what Americans see is that, when Donald Trump gets involved with something, especially some kind of celebration, it's not about anything or anyone other than Donald Trump. And so that's why you have these states, I think, very concerned that they didn't want to participate in an event that was going to be exclusively partisan, especially when they were being made to pay for it.\n\nAnd I think the other part of this, Erica, is that there are so many states in this country that have felt attacked by this president because they have been attacked by this president figuratively and literally. And so, to then -- for Donald Trump to say that he wants to bring the country together is kind of laughable. And Americans just don't believe that he has it in him to do anything that is other than partisan and division, and focused on anything or anyone other than himself.\n\nHILL: We're going to have to leave that one there. Elliot, you are first for the next group chat, I promise, because we do have a lot more to come here, including a mystery on the National Mall. Just who etched 8647 into the grass? And is it a dig at President Trump just before his big birthday celebration on Sunday?\n\nUNIDENTIFIED FEMALE: I love all the World cup events going on around the city. Really build a sense of community.\n\nHILL: The World Cup finally kicking off across North America. The matches, you don't have to have one of those expensive tickets, by the way. Still plenty of ways to enjoy the excitement. Stay with us.\n\nUNIDENTIFIED FEMALE: I love all the World Cup events going on around the city. Really build a sense of community. But I'm super excited to watch my country win, Viva Mexico.\n\nUNIDENTIFIED FEMALE: I've been in US for a long time, but every time I see my flag that, the music, and today in Estadio Azteca, like I wanted to cry.\n\nHILL: I love it. So there is a lot of hope that the US team is going to bring fans just that same level of joy tonight. The World cup, of course, now officially in full swing. Game 1, Mexico defeating South Africa 2-0 in Mexico City. Tonight, the first games on US soil, Team USA taking on Paraguay. That's 9:00pm Eastern in Los Angeles.\n\nCarlos Bocanegra joins us now. He's the former captain of the US Men's National Soccer Team and also played for the team in the 2006 and 2010 World Cups, all right.\n\nFirst of all, let's call on that World cup experience. What is this moment like, right? The tournament finally kicks off. You're waiting all these years for it, what is the men's national team going through right now as they wait for that first match?\n\nCARLOS BOCANEGRA, FORMER CAPTAIN, US MEN'S NATIONAL SOCCER TEAM: A lot of excitement. I mean, these guys have been building up to it for a couple of years now. And so, you know, just for it to arrive that day, the butterflies, I think it's just going to be a release of emotion.\n\nAnd so, I think you'll see the first 10, 15 minutes, maybe a very hectic game, a very intense getting all their feelings out and getting all that energy out that they've been holding in. And it's on home soil, so it's got an even more special feeling to it. Their friends, their family, you know, the whole country behind them. So it's going to be a really cool experience.\n\nHILL: Certainly when you're doing it right on US soil, talk to me about what you've seen in terms of the level of excitement. There was a real hope, right, that with the World Cup being in North America, especially in the. In the US that this would really kind of light a fire under the love of the game here in the United States.\n\nWhat have you seen over the last couple of years building up to this moment?\n\nBOCANEGRA: Yes. I have, I think, we had a runway since about 2018 when it got announced that we would host the World Cup here in 2026. So we've had a bit of a runway, and I think leagues like MLS soccer have really used this platform to kind of generate the buzz, but generate interest, investment, building infrastructure, attracting players to come play in the league.\n\nSo it's done wonders for that. The academy systems in our country have really propelled forward as well, which is super important because that's what ultimately develops the players and puts them into our leagues as well as putting them into the national teams. And I think now you see there's over 40 players that have gone through the MLS academies, and MLS that are playing in the tournament.\n\nOver 100 former and current MLS players playing in this tournament. And so, you know, it's there. The fandom is there, the excitement is there, and it's really helped propel the game in our country, where, you know, it's not the number one sport in the United States, which is OK. But, you know, for this month it is.\n\nHILL: Yes, for this month it is. It's interesting, I think, you know, among women, you see such an interest in women's soccer, and that has sort of exploded in a lot of ways when we look at the men. Walk me through what you're seeing in this moment. What do you see as the men's team strengths and weaknesses for Team USA? What are you expecting from these guys?\n\nBOCANEGRA: Yes. The women have done a fantastic job, and that's been a great program. I think, you know, on the men's side, really still trying to win that first World Cup. But, you know, this team is energetic. They're one of the most talented teams we've ever had as a country. Now, that's -- individually, can we do it collectively?\n\nYou know, we've got players in the attack that can get goals. You know, the midfield seems pretty strong. I think the questions right now are around the defense, and we have a situation with the goalkeeper. Matt Freese is probably going to be the number one. It looks like that was not settled maybe until a couple months ago, which has not been the case traditionally for US goalkeeper has been our strongest position.\n\nThat doesn't mean Matt can't go out and have a fantastic tournament, but we will need him to have a big tournament. He's someone, I think, is flying under the radar. Great kid, great work ethic, and he's a good goalkeeper as well. So I think if he has a great tournament and sort of comes into his own, that's really going to give the backline some confidence and propel the team forward.\n\nHILL: A lot of great soccer certainly out there for the next several weeks, and it's great to have it here so close to home. Carlos, thanks so much for coming in this morning.\n\nBOCANEGRA: Thank you.\n\nHILL: Well, the National Park Service is now investigating a case of vandalism on the National Mall. So it appears a huge 8647, 8647 has somehow been etched into the grass on the mall just days before crowds, of course, are expected for the UFC fight at the White House. That phrase has been used to signal opposition to Trump.\n\nIt's at the heart of an indictment of former FBI Director James Comey. A spokesman for the Department of the Interior, which actually manages the National Mall, described the markings as deranged vandalism, which will not be tolerated.\n\nThe group chat is back. Elliot, as promised, I'm going to let you kick this one off. So in that same statement from the Interior Department, it went on to say, \"any threat against the president is taken very seriously by the department and that the US Park Police would investigate.\"\n\nIs this on the surface? And this really goes back to, you know, the discussion around James Comey, is this actually a threat against the president or is it just a protest?\n\nELLIOT WILLIAMS, CNN LEGAL ANALYST: I don't know. But on its face, it's not a threat against the president. But to be clear, and just the big picture on this is that free speech and free expression are always OK, threats never are.\n\nNow, the line between that can be quite blurry. And quite frankly, Erica, depends on context, right? If I'm at a baseball game and say, man, I'm going to kill this hot dog, that same statement has a very different meaning if I'm pointing a firearm at someone saying, man, I'm going to kill this person. And you have to look at, and investigators will have to look at the different circumstances surrounding any work of speech, including etching it into the lawn.\n\nIt might have been whatever we think of this speech, it might have been just a form of speech by itself, or it actually could have been a threat. And I think that is for investigators and prosecutors to really take a close look at.\n\nHILL: And Could be difficult to determine, Rob, quite honestly, right, because you also have to figure out who did it and when.\n\nBLUEY: That's true, Erica. And with all of the cameras that we have around Washington, DC you'd think that it might be relatively easy to figure out how this actually happened. I've seen some of the time lapse video.\n\nBut, Erica, I'd also say that, you know, I think it's so sad that here we are, as we just talked about during this hour, the 250th anniversary of the United States, that something like this is what people who are visiting our nation's capital will see. But to end on a hopeful note, the US Catholic Bishops did just consecrate the United States to the Sacred Heart of Jesus. So maybe we could all just use a moment to reflect on some of the positive things that are happening in our country as this anniversary approaches.\n\nHILL: That was an interesting turn, Rob. Maria, you've got the last 30 seconds.\n\nCARDONA: You know, I think that this is something that people should take a look at and say, let's try to come together. Let's actually try to come together for the country for the 250th anniversary. Let's try to do something that is completely the opposite of Donald Trump, and actually bring people together to celebrate our freedoms, to celebrate this country and the values it was founded on.\n\nHILL: I would like to thank the three of you for coming together on this Friday morning, because it's always a pleasure to see all three of you. I hope you all have a great weekend. We'll see you soon.\n\nCardona: Thanks, Erica.\n\nHILL: Thanks to all of you for joining us this morning, I'm Erica Hill. The headlines are next."}],"vocabulary":[{"word":"tout","phonetic":"/taʊt/","pos":"v.","level":"六级","cn":"吹捧，兜售","en":"to praise something or someone in order to make them seem attractive or successful","excerpt":"Trump Touts 'Great Settlement' with Iran, Calls Off Strikes","example_cn":"他到处吹嘘自己的新发明。"},{"word":"jilted","phonetic":"/ˈdʒɪltɪd/","pos":"adj.","level":"六级","cn":"被抛弃的","en":"rejected or abandoned by a lover or partner","excerpt":"Could Jilted GOP Lawmakers Turn on Trump's Agenda?","example_cn":"被抛弃的恋人感到心碎。"},{"word":"settlement","phonetic":"/ˈsetlmənt/","pos":"n.","level":"考研","cn":"协议，解决","en":"an official agreement that ends an argument or a dispute","excerpt":"President Trump announcing a great settlement to end the war.","example_cn":"双方达成了和平协议。"},{"word":"strait","phonetic":"/streɪt/","pos":"n.","level":"六级","cn":"海峡","en":"a narrow passage of water connecting two seas or two large areas of water","excerpt":"The strait will officially open as soon as we sign.","example_cn":"船只安全通过了海峡。"},{"word":"diplomacy","phonetic":"/dɪˈpləʊməsi/","pos":"n.","level":"考研","cn":"外交","en":"the activity of managing relations between countries","excerpt":"Just what do cage fights actually have to do with diplomacy?","example_cn":"外交是解决国际争端的重要手段。"},{"word":"cast doubt on","phonetic":"/kɑːst daʊt ɒn/","pos":"phrase","level":"六级","cn":"对...产生怀疑","en":"to make people feel uncertain about something","excerpt":"Republicans continuing to cast doubt on California's voting tactics.","example_cn":"新证据使他的证词受到怀疑。"},{"word":"trillionaire","phonetic":"/trɪljəˈneər/","pos":"n.","level":"专八","cn":"万亿富翁","en":"a person who has assets worth one trillion dollars or more","excerpt":"Elon Musk now set to become the world's first trillionaire.","example_cn":"他梦想成为万亿富翁。"},{"word":"ceasefire","phonetic":"/ˈsiːsfaɪər/","pos":"n.","level":"考研","cn":"停火","en":"an agreement to stop fighting for a period of time","excerpt":"a 60-day ceasefire, quote, \"on all fronts.\"","example_cn":"双方同意立即停火。"},{"word":"sticking point","phonetic":"/ˈstɪkɪŋ pɔɪnt/","pos":"n.","level":"六级","cn":"症结，关键点","en":"a problem or issue that prevents progress in a discussion","excerpt":"This has been a key sticking point, as we know, for Iran.","example_cn":"价格是谈判的症结所在。"},{"word":"undermine","phonetic":"/ˌʌndəˈmaɪn/","pos":"v.","level":"考研","cn":"削弱，破坏","en":"to make something weaker or less effective","excerpt":"Is Trump undermining his own efforts at this point?","example_cn":"持续的批评削弱了他的信心。"},{"word":"show one's cards","phonetic":"/ʃəʊ wʌnz kɑːdz/","pos":"phrase","level":"六级","cn":"摊牌，亮出底牌","en":"to reveal one's intentions or plans","excerpt":"the president needs to stop saying what he wants in public. Is Trump undermining his efforts at this point, showing those cards?","example_cn":"在谈判中过早亮出底牌是不明智的。"},{"word":"pushback","phonetic":"/ˈpʊʃbæk/","pos":"n.","level":"六级","cn":"抵制，反对","en":"negative reaction or opposition to something","excerpt":"the president facing pushback.","example_cn":"该计划遭到了社区的强烈反对。"},{"word":"cave","phonetic":"/keɪv/","pos":"v.","level":"考研","cn":"屈服，让步","en":"to give in to demands or pressure","excerpt":"Could it be a rare sign of compromise, or is it caving?","example_cn":"在压力下，他最终屈服了。"},{"word":"voter fraud","phonetic":"/ˈvəʊtər frɔːd/","pos":"n.","level":"六级","cn":"选举舞弊","en":"illegal interference with the process of an election","excerpt":"a federal prosecutor making claims about voter fraud in California.","example_cn":"政府严厉打击选举舞弊行为。"},{"word":"menace","phonetic":"/ˈmenəs/","pos":"n.","level":"六级","cn":"威胁，危险的人或物","en":"a person or thing that is likely to cause harm or danger","excerpt":"promised to be a, quote, \"more of a menace than ever.\"","example_cn":"那个司机是个马路杀手。"},{"word":"leverage","phonetic":"/ˈlevərɪdʒ/","pos":"n.","level":"考研","cn":"影响力，杠杆作用","en":"the power to influence people or events","excerpt":"It does give some of us a little more freedom and certainly leverage.","example_cn":"他的职位给了他很大的影响力。"},{"word":"lame duck","phonetic":"/ˌleɪm ˈdʌk/","pos":"n.","level":"六级","cn":"跛脚鸭（任期将满的官员）","en":"an elected official whose power is reduced because the end of their term is near","excerpt":"It's the Lame Duck Rebellion.","example_cn":"这位总统在最后一年成了跛脚鸭。"},{"word":"stray from the fold","phonetic":"/streɪ frəm ðə fəʊld/","pos":"phrase","level":"六级","cn":"偏离主流，脱离群体","en":"to leave or deviate from a group or accepted way of thinking","excerpt":"they, you know, sort of stray from the fold a little bit.","example_cn":"他的一些观点偏离了党的路线。"},{"word":"slavish loyalty","phonetic":"/ˈsleɪvɪʃ ˈlɔɪəlti/","pos":"phrase","level":"专八","cn":"盲目的忠诚","en":"unquestioning and complete loyalty","example_cn":"他要求下属绝对服从。"},{"word":"midterm disaster","phonetic":"/ˈmɪdtɜːm dɪˈzɑːstər/","pos":"phrase","level":"六级","cn":"中期选举惨败","en":"a very bad result for a political party in midterm elections","example_cn":"总统担心中期选举会是一场灾难。"},{"word":"pave the way for","phonetic":"/peɪv ðə weɪ fɔːr/","pos":"phrase","level":"考研","cn":"为...铺平道路","en":"to create conditions that make something possible","example_cn":"这项协议为和平铺平了道路。"},{"word":"backbone","phonetic":"/ˈbækbəʊn/","pos":"n.","level":"考研","cn":"骨气，勇气","en":"courage and determination","example_cn":"他缺乏坚持自己信念的骨气。"},{"word":"reconciliation bill","phonetic":"/ˌrekənsɪliˈeɪʃn bɪl/","pos":"n.","level":"专八","cn":"和解法案","en":"a bill that reconciles differences between two versions of a bill or between spending and revenue","example_cn":"国会通过了预算和解法案。"},{"word":"beholden to","phonetic":"/bɪˈhəʊldən tuː/","pos":"phrase","level":"六级","cn":"对...感激，受制于","en":"owing gratitude or loyalty to someone because of help given","example_cn":"他不想受制于任何人。"},{"word":"ruby-red","phonetic":"/ˈruːbi red/","pos":"adj.","level":"六级","cn":"深红色的（指政治倾向非常保守的）","en":"very conservative, typically used to describe a strongly Republican area","example_cn":"这个州是深红色的共和党票仓。"},{"word":"self-dealing","phonetic":"/ˌself ˈdiːlɪŋ/","pos":"n.","level":"专八","cn":"自利交易，以权谋私","en":"the practice of using one's position to benefit oneself, especially financially","example_cn":"他被指控以权谋私。"},{"word":"soft power","phonetic":"/sɒft ˈpaʊər/","pos":"n.","level":"六级","cn":"软实力","en":"the ability to influence others through attraction and persuasion rather than coercion","example_cn":"文化是软实力的重要组成部分。"},{"word":"goodwill ambassador","phonetic":"/ˌɡʊdˈwɪl æmˈbæsədər/","pos":"n.","level":"六级","cn":"亲善大使","en":"a person who promotes a country's or organization's positive image","example_cn":"她被任命为联合国亲善大使。"},{"word":"return on investment","phonetic":"/rɪˈtɜːn ɒn ɪnˈvestmənt/","pos":"phrase","level":"考研","cn":"投资回报率","en":"the profit or benefit gained from an investment","example_cn":"这个项目的投资回报率很高。"},{"word":"enmeshing","phonetic":"/ɪnˈmeʃɪŋ/","pos":"v.","level":"专八","cn":"使陷入，使纠缠","en":"to involve someone in a difficult situation or relationship","example_cn":"他发现自己陷入了复杂的法律纠纷。"},{"word":"largesse","phonetic":"/lɑːrˈʒes/","pos":"n.","level":"专八","cn":"慷慨的赠与","en":"generous giving of money or gifts","example_cn":"这位慈善家以其慷慨而闻名。"},{"word":"symbolize","phonetic":"/ˈsɪmbəlaɪz/","pos":"v.","level":"考研","cn":"象征","en":"to represent something","example_cn":"鸽子象征和平。"},{"word":"launder","phonetic":"/ˈlɔːndər/","pos":"v.","level":"六级","cn":"洗钱；洗刷（名声）","en":"to conceal the origins of money obtained illegally; to make something appear acceptable","excerpt":"the UFC helped launder Donald Trump's reputation following January 6th","example_cn":"UFC帮助洗刷了特朗普在1月6日事件后的声誉。"},{"word":"culmination","phonetic":"/ˌkʌlmɪˈneɪʃn/","pos":"n.","level":"六级","cn":"顶点；高潮","en":"the highest point or end of something, usually after a long period","excerpt":"This weekend, to me is the culmination of all of those kinds of efforts.","example_cn":"这个周末对我来说是所有这些努力的顶点。"},{"word":"entanglement","phonetic":"/ɪnˈtæŋɡlmənt/","pos":"n.","level":"六级","cn":"纠缠；牵连","en":"a complicated or compromising relationship or situation","excerpt":"it marks a new period of entanglement between them.","example_cn":"这标志着他们之间纠缠的新时期。"},{"word":"backlash","phonetic":"/ˈbæklæʃ/","pos":"n.","level":"六级","cn":"强烈反对； backlash","en":"a strong negative reaction by a large number of people","excerpt":"intense backlash over Bill Pulte, his initial pick","example_cn":"对他最初人选比尔·普尔特的强烈反对。"},{"word":"baseless","phonetic":"/ˈbeɪsləs/","pos":"adj.","level":"六级","cn":"无根据的","en":"not based on facts or evidence","excerpt":"the administration's baseless claims of fraud","example_cn":"政府关于欺诈的无根据指控。"},{"word":"unorthodox","phonetic":"/ʌnˈɔːrθədɑːks/","pos":"adj.","level":"六级","cn":"非正统的；异端的","en":"different from what is usual or accepted","excerpt":"how unorthodox perhaps those comments are","example_cn":"那些评论可能有多么非正统。"},{"word":"cast doubt upon","phonetic":"/kæst daʊt əˈpɒn/","pos":"phrase","level":"六级","cn":"对…产生怀疑","en":"to make people uncertain about something","excerpt":"it might cast doubt upon the election.","example_cn":"这可能会对选举产生怀疑。"},{"word":"alarm bells","phonetic":"/əˈlɑːrm belz/","pos":"phrase","level":"六级","cn":"警钟；引起警惕","en":"a warning sign that something is wrong","excerpt":"those comments that are raising alarm bells.","example_cn":"那些引起警惕的评论。"},{"word":"stack up","phonetic":"/stæk ʌp/","pos":"phrase","level":"六级","cn":"相比；较量","en":"to compare with someone or something else","excerpt":"How does he stack up?","example_cn":"他相比如何？"},{"word":"fiasco","phonetic":"/fiˈæskoʊ/","pos":"n.","level":"六级","cn":"惨败；大失败","en":"a complete failure, often in a ridiculous way","excerpt":"the whole Epstein fiasco","example_cn":"整个爱泼斯坦丑闻。"},{"word":"zero in on","phonetic":"/ˈzɪroʊ ɪn ɒn/","pos":"phrase","level":"六级","cn":"集中注意力于；瞄准","en":"to focus all your attention on something","excerpt":"the President has really zeroed in on","example_cn":"总统确实集中关注了这一点。"},{"word":"audition","phonetic":"/ɔːˈdɪʃn/","pos":"n.","level":"六级","cn":"试镜；试演","en":"a short performance to test the suitability of a performer","excerpt":"a soft audition for that role","example_cn":"对该角色的温和试镜。"},{"word":"snag","phonetic":"/snæɡ/","pos":"n.","level":"六级","cn":"障碍；小问题","en":"a small problem or difficulty","excerpt":"President Trump's big birthday bash for America hitting another snag.","example_cn":"特朗普总统为美国举办的盛大生日派对又遇到了障碍。"},{"word":"bow out","phonetic":"/baʊ aʊt/","pos":"phrase","level":"六级","cn":"退出；辞职","en":"to leave a job or stop taking part in something","excerpt":"six states are now bowing out.","example_cn":"六个州现在退出。"},{"word":"taint","phonetic":"/teɪnt/","pos":"v.","level":"六级","cn":"污染；玷污","en":"to spoil something or make it less pure","excerpt":"politics will or have already tainted the celebration.","example_cn":"政治将会或已经玷污了庆祝活动。"},{"word":"partisan","phonetic":"/ˈpɑːrtɪzən/","pos":"adj.","level":"六级","cn":"党派的；偏袒的","en":"strongly supporting a particular political party or group","excerpt":"a more partisan affair than originally presented.","example_cn":"比最初呈现的更党派化的事件。"},{"word":"stoke","phonetic":"/stoʊk/","pos":"v.","level":"六级","cn":"煽动；激起","en":"to make something increase or become more intense","excerpt":"wanting to stoke some of these fears","example_cn":"想要煽动这些恐惧。"},{"word":"in the wake of","phonetic":"/ɪn ðə weɪk ɒv/","pos":"phrase","level":"六级","cn":"在…之后；作为…的结果","en":"after something, usually something bad","excerpt":"in the wake of all that backlash","example_cn":"在所有这些反对之后。"},{"word":"snow globe","phonetic":"/snoʊ ɡloʊb/","pos":"n.","level":"六级","cn":"雪花玻璃球；比喻混乱状态","en":"a transparent sphere containing a miniature scene and artificial snow; used metaphorically for a chaotic situation","excerpt":"This whole world is like a snow globe","example_cn":"整个世界就像一个雪花玻璃球。"},{"word":"drag into","phonetic":"/dræɡ ˈɪntuː/","pos":"phrase","level":"六级","cn":"把…拖入","en":"to involve someone or something in a situation that they do not want to be involved in","excerpt":"music is dragged into politics.","example_cn":"音乐被拖入政治。"},{"word":"laughable","phonetic":"/ˈlæfəbl/","pos":"adj.","level":"六级","cn":"可笑的；荒唐的","en":"so silly that it makes you laugh","excerpt":"is kind of laughable.","example_cn":"有点可笑。"},{"word":"etch","phonetic":"/etʃ/","pos":"v.","level":"六级","cn":"蚀刻；铭刻","en":"to cut a pattern or picture into a surface","excerpt":"etched 8647 into the grass","example_cn":"在草地上蚀刻了8647。"},{"word":"vandalism","phonetic":"/ˈvændəlɪzəm/","pos":"n.","level":"六级","cn":"故意破坏公共财物","en":"the crime of intentionally damaging property","excerpt":"a case of vandalism on the National Mall.","example_cn":"国家广场上的一起故意破坏案件。"},{"word":"deranged","phonetic":"/dɪˈreɪndʒd/","pos":"adj.","level":"六级","cn":"疯狂的；精神错乱的","en":"behaving in a wild or strange way, especially because of mental illness","excerpt":"deranged vandalism","example_cn":"疯狂的破坏行为。"},{"word":"on its face","phonetic":"/ɒn ɪts feɪs/","pos":"phrase","level":"六级","cn":"表面上；从表面看","en":"based on what appears to be true, without looking deeper","excerpt":"on its face, it's not a threat","example_cn":"从表面上看，这不是威胁。"},{"word":"blurry","phonetic":"/ˈblɜːri/","pos":"adj.","level":"六级","cn":"模糊的","en":"not clear; difficult to see or understand","excerpt":"The line between that can be quite blurry.","example_cn":"两者之间的界限可能相当模糊。"},{"word":"consecrate","phonetic":"/ˈkɑːnsɪkreɪt/","pos":"v.","level":"六级","cn":"奉献；使神圣","en":"to officially make something holy or to give something to God","excerpt":"the US Catholic Bishops did just consecrate the United States to the Sacred Heart of Jesus.","example_cn":"美国天主教主教刚刚将美国奉献给耶稣圣心。"},{"word":"runway","phonetic":"/ˈrʌnweɪ/","pos":"n.","level":"六级","cn":"跑道；准备时间","en":"a period of time to prepare for something","excerpt":"we had a runway since about 2018","example_cn":"我们从2018年左右就有了准备时间。"},{"word":"propel","phonetic":"/prəˈpel/","pos":"v.","level":"六级","cn":"推动；驱动","en":"to push or move something forward","excerpt":"propel the team forward.","example_cn":"推动团队前进。"},{"word":"fly under the radar","phonetic":"/flaɪ ˈʌndər ðə ˈreɪdɑːr/","pos":"phrase","level":"六级","cn":"不引人注意；低调","en":"to not be noticed or detected","excerpt":"He's someone, I think, is flying under the radar.","example_cn":"我认为他是一个低调的人。"}],"sentences":[{"en":"President Trump calling off new strikes on Iran, saying both sides have now agreed to stop the fighting.","cn":"特朗普总统取消了对伊朗的新一轮打击，称双方现已同意停止战斗。","structure":"主句（President Trump calling off...）+ 伴随状语（saying...）","analysis":"现在分词短语作伴随状语，表示主句动作发生时伴随的情况。"},{"en":"Regardless of the rhetoric, threats and claims of the other side, we are focused on the interests of the Iranian nation.","cn":"无论对方的言论、威胁和主张如何，我们都专注于伊朗国家的利益。","structure":"让步状语（Regardless of...）+ 主句（we are focused on...）","analysis":"Regardless of引导让步状语，表示不考虑对方因素。"},{"en":"As I speak to you at this moment, we have not reached a final conclusion on this matter.","cn":"就在我此刻与你交谈时，我们尚未就此事达成最终结论。","structure":"时间状语从句（As I speak...）+ 主句（we have not reached...）","analysis":"As引导时间状语从句，表示主句动作发生的时间背景。"},{"en":"Israel, also seemingly taken by surprise, a source telling CNN Israeli Prime Minister Benjamin Netanyahu wasn't aware of an agreement with Iran; that he actually found out on social media.","cn":"以色列似乎也感到意外，有消息人士告诉CNN，以色列总理本雅明·内塔尼亚胡并不知晓与伊朗的协议；他实际上是在社交媒体上得知的。","structure":"主句（Israel...）+ 同位语（a source telling...）+ 宾语从句（Netanyahu wasn't aware...）","analysis":"a source telling...为独立主格结构，补充说明以色列的情况。"},{"en":"So, is this just the latest effort by President Trump to move stalled negotiations forward?","cn":"那么，这仅仅是特朗普总统推动陷入僵局的谈判的最新努力吗？","structure":"一般疑问句（is this...）+ 不定式短语（to move...）作定语","analysis":"不定式短语修饰effort，表示努力的目的。"},{"en":"Based on everything we know and your sources, David, do signs actually point to an agreement at this point?","cn":"根据我们所知的一切以及你的消息来源，大卫，目前迹象是否确实指向一项协议？","structure":"条件状语（Based on...）+ 主句（do signs point to...）","analysis":"过去分词短语Based on...作条件状语，表示依据。"},{"en":"Well, they certainly point to some agreement coming together on four major pillars of a -- of some restraint on the nuclear program.","cn":"嗯，它们确实指向在四个主要支柱上达成某种协议——对核计划的一些限制。","structure":"主句（they point to...）+ 介词短语（on four major pillars...）","analysis":"介词短语on...作定语修饰agreement，说明协议的内容。"},{"en":"But it's not a peace agreement; it doesn't end the war; it may be a ceasefire that opens up another negotiation.","cn":"但这不是和平协议；它不会结束战争；它可能是一个开启另一轮谈判的停火协议。","structure":"并列句（it's not...; it doesn't...; it may be...）","analysis":"三个并列分句，最后一个包含that引导的定语从句修饰ceasefire。"},{"en":"The fact that Israel's prime minister reportedly found out about this on social media, that really stands out to me, especially when we're talking about the potential ceasefire with Lebanon, with activity in Lebanon -- David.","cn":"以色列总理据报道是在社交媒体上得知此事的，这一点让我印象深刻，尤其是当我们谈论与黎巴嫩可能达成的停火以及黎巴嫩境内的活动时——大卫。","structure":"主语（The fact that...）+ 谓语（stands out）+ 时间状语从句（when we're talking...）","analysis":"that引导同位语从句说明fact的内容。"},{"en":"The prime minister does not want to be part of this agreement and has made clear that he won't feel bound by a commitment that he didn't sign up to.","cn":"总理不想参与这项协议，并明确表示他不会受他没有签署的承诺的约束。","structure":"并列谓语（does not want... and has made clear）+ 宾语从句（that he won't feel bound...）+ 定语从句（that he didn't sign up to）","analysis":"宾语从句中嵌套定语从句修饰commitment。"},{"en":"And it does pose a real point of tension in the relationship with Israel, because if they don't respect that ceasefire, and it plunges everything back in again, you'll have the president blaming Prime Minister Netanyahu.","cn":"这确实给与以色列的关系带来了一个真正的紧张点，因为如果他们不尊重停火协议，导致一切再次陷入混乱，总统就会指责内塔尼亚胡总理。","structure":"主句（it does pose...）+ 原因状语从句（because...）+ 条件状语从句（if they don't...）+ 结果主句（you'll have...）","analysis":"多层状语嵌套，条件状语从句中包含并列谓语。"},{"en":"Every time the president talks about how eager Iran is for a deal, it's basically a reveal that he's talking about his own eagerness for a deal.","cn":"每次总统谈论伊朗多么渴望达成协议时，这基本上是在透露他本人对协议的渴望。","structure":"时间状语从句（Every time...）+ 主句（it's basically a reveal...）+ 同位语从句（that he's talking...）","analysis":"Every time引导时间状语从句，主句中that引导同位语从句说明reveal的内容。"},{"en":"But frankly, the problem that's been haunting the president here is that 38 days of pounding the Iranians, starting in late February, did not result in the political concessions he was looking for.","cn":"但坦率地说，困扰总统的问题是，从2月底开始的38天对伊朗的猛烈打击并没有带来他所寻求的政治让步。","structure":"主句（the problem... is that...）+ 定语从句（that's been haunting...）+ 表语从句（that 38 days... did not result in...）+ 定语从句（he was looking for）","analysis":"主句主语problem后接定语从句，系动词is后接表语从句，表语从句中嵌套定语从句。"},{"en":"Now, I reported two days ago that there were four pillars of an agreement that are emerging, and they have to do with everything from what to do with Iran's nuclear stockpile to its future enrichment activity, and so forth.","cn":"两天前我报道说，一项协议有四个支柱正在浮现，它们涉及从如何处理伊朗的核库存到其未来的浓缩活动等方方面面。","structure":"主句（I reported...）+ 宾语从句（that there were...）+ 定语从句（that are emerging）+ 并列句（and they have to do with...）","analysis":"宾语从句中包含定语从句，并列句补充说明。"},{"en":"But all this memorandum of agreement would -- of understanding would do is start a negotiation that would probably run all summer, and many fear could run much longer than that, on the details of the nuclear program.","cn":"但这份谅解备忘录所能做的只是开启一场可能持续整个夏天的谈判，许多人担心可能会持续更久，讨论核计划的细节。","structure":"主语（all this memorandum...）+ 谓语（would do is start...）+ 定语从句（that would probably run...）+ 并列谓语（and many fear could run...）","analysis":"主语后省略了that的定语从句，谓语部分包含不定式短语作表语，定语从句修饰negotiation。"},{"en":"Among them is South Carolina Congresswoman Nancy Mace, fresh off her last-place finish for the GOP nomination for governor in her state, joking that she could still come in first, if Mike Pence has the courage.","cn":"其中包括南卡罗来纳州众议员南希·梅斯，她刚刚在该州共和党州长提名中排名垫底，开玩笑说如果迈克·彭斯有勇气，她仍然可以排名第一。","structure":"倒装句（Among them is...）+ 同位语（fresh off...）+ 伴随状语（joking that...）+ 条件状语从句（if Mike Pence...）","analysis":"倒装结构强调地点，现在分词短语作伴随状语，内含宾语从句和条件状语从句。"},{"en":"Texas Senator John Cornyn, in his first interview since that loss to a Trump-backed challenger in his primary in Texas, telling \"The New York Times,\" quote, \"It is going to be a pretty bumpy ride for the next seven months,\" saying, \"It does give some of us a little more freedom and certainly leverage.\"","cn":"得克萨斯州参议员约翰·科宁在得克萨斯州初选中输给特朗普支持的挑战者后首次接受采访，告诉《纽约时报》，“未来七个月将会非常坎坷”，并说“这确实给了我们一些人更多的自由，当然还有影响力。”","structure":"主语（Texas Senator John Cornyn）+ 状语（in his first interview...）+ 谓语（telling...）+ 直接引语（\"It is going to be...\"）+ 伴随状语（saying...）","analysis":"主句谓语为telling，后接直接引语，saying为现在分词作伴随状语。"},{"en":"I was struck by noting that he gave voice, they write that he gave voice \"in starkly candid terms to this growing sentiment among Senate Republicans that Trump is actually hurting his own party with self-serving decisions and his insistence on slavish loyalty, ultimately setting himself up for a midterm disaster that would pave the way for the most miserable two years of his life.\"","cn":"我注意到他表达了，他们写道他“以极其坦率的言辞表达了参议院共和党人中日益增长的情绪，即特朗普实际上正在以自私自利的决定和对盲目忠诚的坚持伤害自己的政党，最终让自己陷入中期选举的灾难，这将为他一生中最悲惨的两年铺平道路。”","structure":"主句（I was struck by noting that...）+ 插入语（they write that...）+ 直接引语（\"in starkly candid terms...\"）+ 同位语从句（that Trump is actually hurting...）+ 结果状语（ultimately setting...）+ 定语从句（that would pave...）","analysis":"句子结构复杂，包含多层嵌套。"},{"en":"And so, I think that you're right; this is probably going to be a challenge for President Trump and other conservatives for the months to come.","cn":"所以，我认为你是对的；这可能会在未来几个月对特朗普总统和其他保守派构成挑战。","structure":"主句（I think that...）+ 并列句（this is probably going to be...）","analysis":"think后接宾语从句，分号连接并列句。"},{"en":"But I would just encourage these lawmakers to remember that the American people are paying attention, and they expect this Republican Congress to actually get some things done, whether it be the SAVE America Act or another reconciliation bill.","cn":"但我只想鼓励这些议员记住，美国人民正在关注，他们期望这个共和党国会真正做成一些事情，无论是《拯救美国法案》还是另一项和解法案。","structure":"主句（I would encourage...）+ 宾语补足语（to remember...）+ 宾语从句（that the American people are paying attention...）+ 并列句（and they expect...）+ 让步状语（whether it be...）","analysis":"encourage sb. to do sth.结构，remember后接宾语从句，whether引导让步状语。"},{"en":"Whereas before, they were so beholden to what Trump wanted, because they were scared of him; they didn't have any backbone to stand up against him.","cn":"而以前，他们如此受制于特朗普的意愿，因为他们害怕他；他们没有勇气站出来反对他。","structure":"对比状语从句（Whereas before...）+ 主句（they were so beholden...）+ 原因状语从句（because they were scared...）+ 并列句（they didn't have...）","analysis":"Whereas引导对比，分号连接并列句。"},{"en":"And they've done nothing to go up against Trump to say, Look, you promised the American people to bring down costs, to bring down inflation; and everything that you're doing is doing exactly the opposite of that.","cn":"他们没有采取任何行动反对特朗普，说，看，你向美国人民承诺降低物价，降低通货膨胀；而你所做的一切恰恰相反。","structure":"主句（they've done nothing...）+ 不定式短语（to go up against...）+ 直接引语（\"Look, you promised...\"）+ 并列句（and everything that you're doing is doing...）","analysis":"不定式短语作目的状语，直接引语中包含并列谓语。"},{"en":"I don't understand exactly what the return on investment is; I mean, I sort of get the generic arguments that are made about the value of sport in building community and cultivating good kinds of traits and character.","cn":"我不太明白投资回报是什么；我的意思是，我大致理解关于体育在建设社区和培养良好品质方面的价值的一般性论点。","structure":"主句（I don't understand...）+ 宾语从句（what the return... is）+ 分号连接并列句（I mean...）+ 宾语从句（I sort of get...）+ 定语从句（that are made...）","analysis":"第一个分句包含宾语从句，第二个分句包含定语从句。"},{"en":"But in terms of, like -- I mean, if Donald Trump doesn't believe in soft power, it is very, very difficult for me to understand how this is a different but more enlightened version of it.","cn":"但就——我的意思是，如果唐纳德·特朗普不相信软实力，我很难理解这如何是一种不同但更开明的版本。","structure":"条件状语从句（if Donald Trump doesn't believe...）+ 主句（it is very difficult for me to understand...）+ 宾语从句（how this is...）","analysis":"it作形式主语，真正主语为不定式短语，内含宾语从句。"},{"en":"I think, to me, the lesson I take from all of this is, listen, could there be some kind of benefit down the road?","cn":"我认为，对我来说，我从这一切中得到的教训是，听着，未来会不会有某种好处？","structure":"主句（I think...）+ 插入语（to me）+ 定语从句（I take from all of this）+ 表语从句（is, listen, could there be...）","analysis":"表语从句为一般疑问句形式。"},{"en":"But that's really not how I understand the nature of this relationship; that, if you look at the White House lawn, and if you look at the way in which the parent company for UFC -- it's called TKO -- they also own WWE, if you just look at the way in which they do business, every year seems to greet or bring with it a new level of entanglement in government.","cn":"但这并不是我理解这种关系本质的方式；如果你看看白宫草坪，如果你看看UFC的母公司——它叫TKO——他们也拥有WWE，如果你看看他们做生意的方式，每年似乎都会带来与政府的新一层纠缠。","structure":"主句（that's really not how...）+ 分号连接并列句（that, if you look...）+ 条件状语从句（if you look...）+ 主句（every year seems to...）","analysis":"第二个分句包含多个条件状语从句，主句为every year seems to...。"},{"en":"It's this enmeshing of the business between the public and the private in which they're talking about, but it extends well beyond this memorandum of understanding.","cn":"正是这种他们正在谈论的公私业务纠缠，但它远远超出了这份谅解备忘录。","structure":"强调句（It's this enmeshing...）+ 定语从句（in which they're talking about）+ 转折并列句（but it extends...）","analysis":"强调句结构，定语从句修饰enmeshing。"},{"en":"And I know for sports fans out there, you're saying, well, you know, government largesse isn't necessarily a new thing for pro sports owners; fine; but it's at least worth having a conversation about the role that it plays.","cn":"我知道对于体育迷来说，你们会说，嗯，你知道，政府的慷慨对职业体育老板来说并不新鲜；好吧；但至少值得讨论一下它所扮演的角色。","structure":"主句（I know...）+ 直接引语（you're saying...）+ 并列句（but it's at least worth...）+ 定语从句（that it plays）","analysis":"直接引语中包含分号连接的并列句。"},{"en":"What do you think, in your view Sunday's fight has now come to symbolize?","cn":"你认为，在你看来，周日的比赛现在象征着什么？","structure":"特殊疑问句（What do you think...）+ 插入语（in your view）+ 宾语从句（Sunday's fight has come to symbolize）","analysis":"do you think为插入语，宾语从句为what引导的从句。"},{"en":"You could even argue maybe that it's not so much a one and done kind of an event, although that's what they're suggesting, but that rather it marks a new period of entanglement between them.","cn":"你甚至可以说，这与其说是一次性的事件（尽管他们暗示如此），不如说标志着他们之间纠缠的新时期。","structure":"主句+宾语从句（that...）+让步状语从句（although...）+转折（but rather...）","analysis":"主句为'You could even argue'，后接宾语从句'that it's not so much...but rather...'。'not so much...but rather'结构表示'与其说……不如说……'。'although that's what they're suggesting'为让步状语从句。"},{"en":"What was very interesting was the UFC helped launder Donald Trump's reputation following January 6th all the way through into 2024, when they helped boost his candidacy.","cn":"非常有趣的是，UFC在1月6日事件后帮助洗刷了唐纳德·特朗普的声誉，一直持续到2024年，当时他们帮助提升了他的候选人资格。","structure":"主语从句（What was very interesting）+系动词+表语从句（the UFC helped...）+时间状语从句（when...）","analysis":"主语从句'What was very interesting'作主语，系动词'was'后接表语从句'the UFC helped...'。'following January 6th'为时间状语，'all the way through into 2024'为时间范围，'when they helped boost his candidacy'为非限制性定语从句修饰2024。"},{"en":"I get asked all the time, do you think the UFC risks being seen as political? I'm like, risk is being seen.","cn":"我经常被问到，你认为UFC有被视为政治化的风险吗？我的回答是，它已经被视为政治化了。","structure":"主句（I get asked）+直接引语（do you think...）+省略句（I'm like...）","analysis":"第一句为被动语态，'get asked'后接直接引语。第二句'I'm like'为口语化表达，相当于'I say'，后接省略句'risk is being seen'，意为'风险已经被看到了'，即已经政治化了。"},{"en":"There are Department of Justice regulations specifically designed to prevent those kind of statements and that kind of activity, because the department and lawyers, and election experts, have long viewed that kind of behavior by the Justice Department as dangerous because it might cast doubt upon the election.","cn":"司法部有专门旨在防止此类言论和活动的规定，因为该部门、律师和选举专家长期以来一直认为司法部的此类行为是危险的，因为它可能会对选举产生怀疑。","structure":"There be句型+过去分词短语作定语（designed to...）+原因状语从句（because...）+宾语补足语（viewed...as...）+原因状语从句（because...）","analysis":"主句为'There are...regulations'，'designed to...'修饰regulations。第一个'because'引导原因状语从句，其中'viewed...as dangerous'为动词+宾语+宾补结构。第二个'because'引导原因状语从句解释为何危险。"},{"en":"And like everything that, or many things that the President does, it's based on who he likes and how loyal he believes they are.","cn":"就像总统所做的所有事情，或者说许多事情一样，这基于他喜欢谁以及他认为他们有多忠诚。","structure":"介词短语（Like...）+插入语（or many things...）+主句（it's based on...）+宾语从句（who...and how...）","analysis":"'Like everything that...'为介词短语作状语，'that the President does'为定语从句修饰everything。插入语'or many things that the President does'补充说明。主句'it's based on'后接两个并列的宾语从句：'who he likes'和'how loyal he believes they are'。"},{"en":"And I think it helps to understand what's happening here if you just realize that the DNI in Trump's mind is an election investigating operation, which I think a lot of intelligence officials would say that's only a pretty small part of the DNI's job.","cn":"我认为，如果你意识到在特朗普心目中，国家情报总监是一个选举调查机构，这有助于理解这里发生的事情，而我认为许多情报官员会说这只是国家情报总监工作中很小的一部分。","structure":"主句（I think）+宾语从句（it helps to understand...）+条件状语从句（if you realize...）+宾语从句（that the DNI...）+非限制性定语从句（which...）+插入语（I think）+宾语从句（that's...）","analysis":"主句'I think'后接宾语从句'it helps to understand...'。'if you realize...'为条件状语从句，其中'that the DNI...'为realize的宾语从句。'which'引导非限制性定语从句修饰'operation'，其中包含插入语'I think'和宾语从句'that's...'。"},{"en":"I think the question is, once he takes the job or if he gets confirmed, how far is he willing to go for the President?","cn":"我认为问题是，一旦他上任或者如果他获得确认，他愿意为总统走多远？","structure":"主句（I think）+表语从句（the question is...）+时间/条件状语从句（once...or if...）+直接引语（how far...）","analysis":"主句'I think'后接表语从句'the question is'，其后直接引语'how far...'作表语。'once he takes the job'和'if he gets confirmed'为并列的状语从句。"},{"en":"But I think just by the nature of what you look in the grand scheme of things overall, this is a great celebration of our country's founding, and we should come to Washington and take part in it.","cn":"但我认为，从整体大局来看，这是一场伟大的国家建国庆典，我们应该来华盛顿参加。","structure":"主句（I think）+介词短语（by the nature of...）+宾语从句（what you look...）+并列句（this is...and we should...）","analysis":"主句'I think'后省略了that。'by the nature of...'为方式状语，其中'what you look...'为宾语从句。'in the grand scheme of things overall'为插入语。主句后为两个并列的句子：'this is...'和'we should...'。"},{"en":"And I think the other part of this, Erica, is that there are so many states in this country that have felt attacked by this president because they have been attacked by this president figuratively and literally.","cn":"我认为另一部分，埃里卡，是这个国家有这么多州感到被这位总统攻击，因为他们确实在比喻和字面意义上受到了这位总统的攻击。","structure":"主句（I think）+表语从句（the other part...is that...）+定语从句（that have felt...）+原因状语从句（because...）","analysis":"主句'I think'后接表语从句'the other part...is that...'。'that have felt attacked'为定语从句修饰states。'because...'为原因状语从句，其中'figuratively and literally'为并列状语。"},{"en":"And I think now you see there's over 40 players that have gone through the MLS academies, and MLS that are playing in the tournament.","cn":"我认为现在你看到有超过40名球员经历过MLS青训营，并且MLS有球员正在参加锦标赛。","structure":"主句（I think）+宾语从句（you see...）+并列结构（there's...and...）","analysis":"主句'I think'后接宾语从句'you see...'。宾语从句中为并列结构：'there's over 40 players that...'和'MLS that...'。第一个'that'引导定语从句修饰players，第二个'that'引导定语从句修饰MLS（指MLS的球员）。"}],"topics":[{"title":"美伊核协议与中东局势","content":"特朗普宣布与伊朗达成‘伟大协议’，但伊朗和以色列均表示不知情。协议可能包括60天停火、限制核计划等，但以色列总理内塔尼亚胡反对，认为未参与谈判。分析人士指出，特朗普多次宣称战争结束，但实际进展有限。","keywords":"Iran nuclear deal, ceasefire, Strait of Hormuz, Netanyahu, Trump"},{"title":"共和党‘跛脚鸭’议员的反抗","content":"在初选中失去特朗普支持的共和党议员（如南希·梅斯、约翰·科宁）在任期最后几个月变得直言不讳，批评特朗普的自私决策和盲目忠诚要求，可能阻碍特朗普议程。分析认为这反映了党内对特朗普领导的不满。","keywords":"lame duck, GOP, primary, Trump endorsement, rebellion"},{"title":"UFC与白宫合作及软实力争议","content":"国务卿卢比奥与UFC签署谅解备忘录，将其纳入体育特使项目，并比喻为‘登月’。批评者质疑其软实力价值，指出UFC与政府关系日益紧密，可能涉及商业利益。同时，白宫草坪搭建UFC擂台引发争议。","keywords":"UFC, Marco Rubio, soft power, sports envoy, White House"},{"title":"UFC与特朗普的政治联盟","content":"UFC（终极格斗冠军赛）与特朗普政府关系密切，UFC帮助特朗普在2021年1月6日国会山事件后恢复声誉，并在2024年大选中支持其竞选。这种联盟被视为政治化，引发媒体和公众讨论。","keywords":"UFC, Trump, political alliance, reputation laundering, January 6th"},{"title":"美国250周年庆典与政治分歧","content":"为庆祝美国建国250周年，特朗普总统提议举办“大美国州博览会”（Great American State Fair），但多个民主党州因费用和政治化担忧而退出。同时，特朗普将原计划的音乐会改为政治集会，进一步加剧了党派分歧。","keywords":"250th anniversary, Great American State Fair, partisan, Freedom 250, state fair"},{"title":"2026年世界杯在美国举办","content":"2026年世界杯在北美举行，美国队首战对阵巴拉圭。前美国队队长卡洛斯·博卡内格拉讨论美国队的实力、球迷热情以及世界杯对美国足球发展的推动作用。","keywords":"World Cup 2026, US Men's National Team, soccer, MLS, Carlos Bocanegra"},{"title":"国家广场草地刻字事件","content":"在国家广场草地上出现数字“8647”，该数字与反对特朗普的暗号有关，并涉及前FBI局长詹姆斯·科米的起诉。内政部称其为“疯狂的破坏行为”，并展开调查。","keywords":"National Mall, vandalism, 8647, Trump opposition, James Comey"},{"title":"特朗普提名国家情报总监","content":"特朗普提名杰伊·克莱顿（Jay Clayton）担任国家情报总监，克莱顿现任纽约南区联邦检察官，缺乏情报背景但受特朗普信任。此前提名比尔·普尔特因无情报经验遭强烈反对。","keywords":"Director of National Intelligence, Jay Clayton, Bill Pulte, confirmation, intelligence experience"},{"title":"司法部选举欺诈指控争议","content":"司法部官员公开承诺将提起选举欺诈指控，违反司法部规定，引发对选举公正性的担忧。评论认为特朗普政府利用司法部质疑选举结果。","keywords":"Department of Justice, election fraud, voter fraud, unorthodox, Trump administration"}]},"2026-06-10":{"date":"2026-06-10","source_url":"https://transcripts.cnn.com/show/ctmo/date/2026-06-10/segment/01","full_translation":[{"paragraph":"Return to Transcripts main page\n\nPlatner Easily Wins Democratic Senate Primary in Maine; U.S. Hits Iran after Helicopter Downed; OpenAI Files for IPO, Joins Anthropic and SpaceX. Aired 6-6:30a ET\n\nAired June 10, 2026 - 06:00   ET\n\nTHIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED.","translation":"返回文字记录主页\n\n普拉特纳轻松赢得缅因州民主党参议院初选；直升机被击落后美国打击伊朗；OpenAI申请IPO，加入Anthropic和SpaceX行列。播出时间：美国东部时间早上6点至6点30分\n\n播出日期：2026年6月10日 - 美国东部时间06:00\n\n此为速记文字稿。本稿件可能并非最终版本，且可能更新。"},{"paragraph":"AUDIE CORNISH, CNN ANCHOR: Today in the group chat, Democrats in Maine vote to stick with Graham Platner. Could that cost the party a shot at flipping the Senate this fall?","translation":"CNN主播奥黛·科尼什：今天在群聊中，缅因州的民主党人投票支持格雷厄姆·普拉特纳。这会否让该党失去今年秋天翻转参议院的机会？"},{"paragraph":"REP. ALEXANDRIA OCASIO-CORTEZ (D-NY): If the choice on the ballot is between that and a senator who's voted to take health care away from millions of Americans, that's the situation that we have to weigh.","translation":"众议员亚历山大·奥卡西奥-科尔特斯（纽约州民主党）：如果选票上的选择是在那和一位投票剥夺数百万美国人医保的参议员之间，那就是我们必须权衡的情况。"},{"paragraph":"CORNISH: Missiles light up the sky in the Middle East again. Will the strained ceasefire last long enough for the U.S. to deliver that long-promised deal with Iran?","translation":"科尼什：导弹再次照亮中东的天空。紧张的停火能否持续足够长的时间，让美国兑现与伊朗长期承诺的协议？"},{"paragraph":"And a big day for the Epstein files. What will Bill Gates tell lawmakers about his links to the late convicted sex offender.","translation":"还有爱泼斯坦文件的重要一天。比尔·盖茨将就他与已故被定罪性犯罪者的联系向立法者说些什么。"},{"paragraph":"UNIDENTIFIED MALE: Do you think that you've killed people as an adult?\n\nVICTOR MARX (R), COLORADO GUBERNATORIAL CANDIDATE: Does it matter?","translation":"身份不明的男性：你认为你成年后杀过人吗？\n\n维克多·马克斯（共和党），科罗拉多州州长候选人：这重要吗？"},{"paragraph":"CORNISH: This is a candidate who also claims he killed someone as a child. Meet the frontrunner in the Republican race for governor of Colorado.","translation":"科尼什：这是一位自称小时候杀过人的候选人。来认识一下科罗拉多州共和党州长竞选的领跑者。"},{"paragraph":"And it's the $3.5 trillion question on Wall Street. Has the A.I. boom gotten ahead of itself?","translation":"还有华尔街3.5万亿美元的问题。人工智能热潮是否超前了？"},{"paragraph":"UNIDENTIFIED MALE: OpenAI and Anthropic plan to have IPOs at release before the end of this year, signaling to me that the A.I. bubble is about to pop.","translation":"身份不明的男性：OpenAI和Anthropic计划在今年年底前进行IPO，这向我表明人工智能泡沫即将破裂。"},{"paragraph":"(END VIDEO CLIP) (BEGIN VIDEO CLIP)\n\nGRAHAM PLATNER (D), MAINE SENATE CANDIDATE: To any of those who feel let down or disappointed or disillusioned, it is my job to earn your trust, faith, and support. And I will spend every day of this campaign. And if I have the privilege every day in the United States Senate doing exactly that.","translation":"（视频片段结束）（视频片段开始）\n\n格雷厄姆·普拉特纳（民主党），缅因州参议员候选人：对于任何感到失望、沮丧或幻灭的人，我的工作是赢得你们的信任、信念和支持。我将用尽这场竞选的每一天。如果我有幸每天在美国参议院做同样的事。"},{"paragraph":"CORNISH: Graham Platner punches his ticket. But now he's got to convince voters to choose him over a five-term senator.\n\nGood morning everybody. I'm Audie Cornish. Here is where we begin. That big statement out of Maine.","translation":"科尼什：格雷厄姆·普拉特纳获得了入场券。但现在他必须说服选民选择他而不是一位连任五届的参议员。\n\n大家早上好。我是奥黛·科尼什。我们开始吧。来自缅因州的重大声明。"},{"paragraph":"Democrat Graham Platner, despite all the scandals, earned about three-fourths of primary voters' support over Governor Janet Mills.","translation":"民主党人格雷厄姆·普拉特纳，尽管丑闻缠身，仍赢得了约四分之三初选选民的支持，击败了州长珍妮特·米尔斯。"},{"paragraph":"Moments after clinching the nomination, he turned his attention to his new opponent, Republican Senator Susan Collins.","translation":"在锁定提名后不久，他将注意力转向了他的新对手，共和党参议员苏珊·柯林斯。"},{"paragraph":"PLATNER: Susan Collins may have started -- may have started her career decades ago in Washington with good intentions, but she has become just as spineless and corrupt as the establishment she now serves. If you are an independent voice, why do you vote with Donald Trump 95 percent of the time?","translation":"普拉特纳：苏珊·柯林斯可能几十年前在华盛顿开始她的职业生涯时怀有良好意图，但她已经变得和她现在所服务的建制派一样软弱和腐败。如果你是一个独立的声音，为什么你95%的时间都投票支持唐纳德·特朗普？"},{"paragraph":"CORNISH: Platner has a lot of work to do to get Mills voters on his side.","translation":"科尼什：普拉特纳需要做大量工作来争取米尔斯选民的支持。"},{"paragraph":"UNIDENTIFIED FEMALE: I couldn't honestly support Platner, even though some of the things that he says are really good.","translation":"身份不明的女性：我无法诚实地支持普拉特纳，尽管他说的有些话确实很好。"},{"paragraph":"UNIDENTIFIED MALE: I don't think he's ready to be a senator. I'm leaning towards Collins unless the guy shows something else, but I just -- he's not there yet. And --","translation":"身份不明的男性：我认为他还没准备好当参议员。我倾向于柯林斯，除非那家伙表现出其他东西，但我只是——他还没到那个程度。而且——"},{"paragraph":"UNIDENTIFIED FEMALE: And so, what will you do in November if its Platner versus Collins?\n\nUNIDENTIFIED FEMALE: That's a really good question. I'm a Democrat, but I voted for Susan Collins several times, because I think that she does care about the state of Maine. But it's going to be a real problem for me in November.","translation":"身份不明的女性：那么，如果十一月是普拉特纳对阵柯林斯，你会怎么做？\n\n身份不明的女性：这真是个很好的问题。我是民主党人，但我多次投票给苏珊·柯林斯，因为我认为她确实关心缅因州。但十一月对我来说将是一个真正的问题。"},{"paragraph":"CORNISH: So, today in the group chat, Mike Leon, host of the \"Can We Please Talk\" podcast; Jared Stepman, columnist with \"The Daily Signal\"; and Max Rose, former Democratic congressman from New York.","translation":"科尼什：所以，今天在群聊中，有《我们能谈谈吗》播客主持人迈克·莱昂；《每日信号》专栏作家贾里德·斯特普曼；以及前纽约州民主党众议员马克斯·罗斯。"},{"paragraph":"And Max, I'm actually going to start with you, because you're with VoteVets, which means you guys had a dog in the fight in this race. You guys have been giving a lot of money across the country.","translation":"马克斯，我实际上要从你开始，因为你在VoteVets，这意味着你们在这场竞选中有利害关系。你们在全国各地投入了大量资金。"},{"paragraph":"And what is it? Let me just show what -- what's at stake here.\n\nDemocrats' chances of flipping the Maine Senate seat. It was pretty good. Maybe this has jeopardized it. We're going to show people a chart while you're talking so you can see what's at stake.","translation":"是什么？让我展示一下——这里的关键是什么。\n\n民主党翻转缅因州参议院席位的机会。本来相当不错。也许这已经危及到了。我们会在你说话时向人们展示一张图表，这样你就能看到利害关系。"},{"paragraph":"Is this race as close as you all hoped it would be, now that Graham has struggled with these scandals?","translation":"既然格雷厄姆因这些丑闻而挣扎，这场竞选是否像你们所有人希望的那样接近？"},{"paragraph":"MAX ROSE (D), FORMER NEW YORK CONGRESSMAN: The race is always going to be close. Because --","translation":"马克斯·罗斯（民主党），前纽约州众议员：这场竞选总是会很接近。因为——"},{"paragraph":"CORNISH: Not with a five-term senator, it's not. A lot of times it can be a blowout, right? Like what -- how do you look at what he needs to accomplish?","translation":"科尼什：面对一位连任五届的参议员，不会。很多时候可能是一边倒，对吧？比如——你怎么看他需要完成什么？"},{"paragraph":"ROSE: Well, I think that we're saying the same thing --\n\nROSE: -- in essence, right? Susan Collins is tough to beat.","translation":"罗斯：嗯，我认为我们说的是同一件事——\n\n罗斯：——本质上，对吧？苏珊·柯林斯很难击败。"},{"paragraph":"What I would say about the Susan Collins race is that we've seen in the past, is you're not going to win this seat by electing a Susan Collins light or putting forward a Susan Collins light in a race.","translation":"关于苏珊·柯林斯的竞选，我想说的是，我们过去看到的是，你不会通过选出一个“苏珊·柯林斯轻量版”或在竞选中推出一个“苏珊·柯林斯轻量版”来赢得这个席位。"},{"paragraph":"You are going to beat her by energizing your base, particularly in a midterm election.","translation":"你要通过激励你的基本盘来击败她，尤其是在中期选举中。"},{"paragraph":"There is no doubt, though, that this election has got to be a referendum on Susan Collins: on the ways in which she has voted to empower Donald Trump; on her refusal to hold Donald Trump accountable; on the ways in which she has said, I might be fair, but I want to take healthcare away from millions of people. Says the right thing often; does the wrong thing very frequently.","translation":"不过，毫无疑问，这次选举必须是对苏珊·柯林斯的一次公投：关于她投票支持唐纳德·特朗普的方式；关于她拒绝追究唐纳德·特朗普责任的方式；关于她所说的，我可能公平，但我想剥夺数百万人的医保。经常说正确的话；但经常做错误的事。"},{"paragraph":"CORNISH: Yes. So, this is very much the message we hear over and over again. And I love that Platner in front of him, it said, \"They don't know Maine.\" You know what I mean? Usually not his own name, not a bunch of other things. It was like, hello, media, this one is for you.","translation":"科尼什：是的。所以，这正是我们反复听到的信息。我喜欢普拉特纳在他面前说的，“他们不了解缅因州。”你明白我的意思吗？通常不是他自己的名字，不是一堆其他东西。就像，你好，媒体，这个是给你的。"},{"paragraph":"I want to play two clips back-to-back, because it sort of, I think, represents something of this race.\n\nFirst, I'm going to play for you J.D. Vance and how he talks about Susan Collins. And then I'm going to play AOC and how she's talking about Platner. You tell me how you hear the tone of these.","translation":"我想连续播放两段视频，因为我认为这代表了这场竞选的某些方面。\n\n首先，我将播放J.D.万斯谈论苏珊·柯林斯的片段。然后我将播放AOC谈论普拉特纳的片段。你告诉我你如何听出这些的语气。"},{"paragraph":"J.D. VANCE (R), U.S. VICE PRESIDENT: Here's the thing I'll say about Susan Collins, is sometimes I get frustrated with Susan Collins. I almost wish that she was more partisan.\n\nBut the thing I love about Susan is she is independent, because Maine is an independent state. And frankly, if she was as partisan as I sometimes wish that she was, she would not be a good fit for the people of Maine.\n\nSo, let's give a shout-out to Susan Collins, who's doing a great job.","translation":"J.D.万斯（共和党），美国副总统：关于苏珊·柯林斯，我要说的是，有时我对苏珊·柯林斯感到沮丧。我几乎希望她更党派化一些。\n\n但我喜欢苏珊的一点是她很独立，因为缅因州是一个独立的州。坦率地说，如果她像我有时希望的那样党派化，她就不适合缅因州的人民。\n\n所以，让我们向苏珊·柯林斯致敬，她做得很好。"},{"paragraph":"OCASIO-CORTEZ: When it comes to the substance of this reporting, obviously, there's a lot in that behavior that's really challenging. It's hard to stomach, you know, in some of it.\n\nBut -- but at the end of the day, I think that this is a choice. If that choice on the ballot is between that and a senator who's voted to take healthcare away from millions of Americans, that's the situation that we have to weigh.","translation":"奥卡西奥-科尔特斯：当谈到这份报道的实质内容时，显然，那种行为中有很多确实具有挑战性。有些部分难以接受，你知道。\n\n但——但归根结底，我认为这是一个选择。如果选票上的选择是在那和一位投票剥夺数百万美国人医保的参议员之间，那就是我们必须权衡的情况。"},{"paragraph":"CORNISH: I played these, because one is like, it's hard to stomach. And the other is like, I get frustrated. Shout-out though, anyway, because I guess Maine. And I was, like, these are not ringing endorsements.","translation":"科尼什：我播放这些，因为一个像是难以接受。另一个像是感到沮丧。不过还是致敬，因为我想是缅因州。我当时想，这些都不是响亮的支持。"},{"paragraph":"MIKE LEON, HOST, \"CAN WE PLEASE TALK?\" PODCAST: But Audie, not only are they not ringing endorsements, the voter that we played in the package before listen to her tone. Maine independents are the second largest party in Maine.","translation":"迈克·莱昂，《我们能谈谈吗》播客主持人：但是奥黛，它们不仅是非响亮的支持，我们之前播放的片段中的那位选民，听听她的语气。缅因州的独立人士是缅因州第二大政党。"},{"paragraph":"CORNISH: Yes. And a woman, in particular.\n\nLEON: And a woman and a Democrat who said she voted for Susan Collins, against her will, it sounded like, from that thing.","translation":"科尼什：是的。尤其是一位女性。\n\n莱昂：一位女性和一位民主党人，她说她投票给了苏珊·柯林斯，听起来像是违背了她的意愿。"},{"paragraph":"So -- but those are -- those are some of the things that we're going to have to consider now. It's really about the character quality is what something that Graham Platner has been trying to say: Forget about that. I'm from here. It's how she's voted, to Max's point.","translation":"所以——但那些是——那些是我们现在必须考虑的一些事情。这实际上关乎品格质量，这是格雷厄姆·普拉特纳一直试图说的：忘掉那个。我来自这里。重要的是她如何投票，正如马克斯所说。"},{"paragraph":"LEON: But then also you hear the voters, and they're, like, a little, still unsure because of those character issues with Platner. So, it's going to be really interesting.","translation":"莱昂：但随后你也听到选民们，他们有点，仍然不确定，因为普拉特纳的那些品格问题。所以，这将非常有趣。"},{"paragraph":"CORNISH: And he's been telling a story for a while of, like, you know, I was -- went through difficult times. Now I'm a person who has changed.","translation":"科尼什：他一直在讲述一个故事，比如，你知道，我——经历了困难时期。现在我是一个改变了的人。"},{"paragraph":"I want to ask one more thing. Collins and Trump, that's not a tight bond. OK? Can I just put it that way? Here's a list I'm going to play for you. Just some moments over the past couple of months where you hear her talking around Trump policies and where she stands on them.","translation":"我想再问一件事。柯林斯和特朗普，那不是紧密的联系。好吗？我可以这么说吗？这里有一个列表，我将播放给你。只是过去几个月的一些时刻，你听到她谈论特朗普政策以及她对这些政策的立场。"},{"paragraph":"(BEGIN VIDEO CLIP) SEN. SUSAN COLLINS (R-ME): The 60 days is a trigger. After 60 days, in\n\nmy view, the president has to obtain congressional approval or Congress can block it.\n\nI do not believe that individuals who were convicted of violence against police officers on January 6th should be entitled to reimbursement for their legal fees.\n\nConcerned about the cuts in Medicaid and the impact on my state, but other states, as well.\n\nI've talked with the secretary of homeland security. I have strongly recommended to her that there be a pause on the enforcement surge in both Maine and in Minnesota.","translation":"（视频片段开始）参议员苏珊·柯林斯（缅因州共和党）：60天是一个触发点。60天后，在我看来，总统必须获得国会批准，否则国会可以阻止它。\n\n我不认为那些因1月6日对警察实施暴力而被定罪的人应该有权报销他们的法律费用。\n\n担心医疗补助的削减对我州的影响，但也对其他州的影响。\n\n我已经与国土安全部部长谈过。我强烈建议她在缅因州和明尼苏达州暂停执法激增。"},{"paragraph":"CORNISH: Now, I've chased her in the hallways before, too. She often ends up voting with Republicans, whatever that party line is.\n\nBut is Trump going to get involved in this simply because of what's at stake with the Senate? Or is he going to send surrogates? He'll be like, OK, J.D., you go there? Like, can she expect any support there?","translation":"科尼什：现在，我以前也在走廊里追过她。她最终经常投票支持共和党，无论党派路线是什么。\n\n但特朗普会仅仅因为参议院的利害关系而介入吗？还是他会派代理人？他会说，好的，J.D.，你去那里？比如，她能期待那里的任何支持吗？"},{"paragraph":"JARRETT STEPMAN, COLUMNIST, \"THE DAILY SIGNAL\": Yes, I feel that's why he sent J.D. and I feel he will, if he's smart, actually keep some distance from this. I mean part of the -- the thing at stake here is that they're independent. Maine is a little bit different.","translation":"贾里德·斯特普曼，《每日信号》专栏作家：是的，我觉得这就是他派J.D.的原因，而且我觉得如果他聪明的话，实际上会与此保持一些距离。我的意思是部分——这里的关键是他们独立。缅因州有点不同。"},{"paragraph":"I mean, both these candidates come from sort of -- almost independent of the party.\n\nSTEPMAN: Because they -- they really focus on the issues related to Maine.","translation":"我的意思是，这两位候选人都来自某种——几乎独立于政党。\n\n斯特普曼：因为他们——他们真正关注与缅因州相关的问题。"},{"paragraph":"CORNISH: We should say, Platner is recruiting from outside the party. Yes.\n\nSTEPMAN: Exactly. So, they're both sort of weirdly outsiders, even though Collins has been Republican part of the party for a long time, she's always struck an independent game this entire time.","translation":"科尼什：我们应该说，普拉特纳是从党外招募的。是的。\n\n斯特普曼：正是。所以，他们俩都有点奇怪地是局外人，尽管柯林斯长期以来一直是共和党的一部分，但她一直保持着独立的姿态。"},{"paragraph":"So, I think that's going to continue during this race. That is her path. Because if she does get too close to Trump, that's going to be the argument saying, whoa, she's too MAGA. She's not -- too much for me, which is more or less a blue state.","translation":"所以，我认为这将在这次竞选中继续。那是她的道路。因为如果她确实与特朗普走得太近，那就会成为争论点，说，哇，她太MAGA了。她不是——对我来说太过分了，这或多或少是一个蓝州。"},{"paragraph":"CORNISH: So, you're saying there's nothing to be gained there of him coming.\n\nCORNISH: OK, you guys stay with me, because we're going to talk about a couple other states this hour, as well.","translation":"科尼什：所以，你是说他来那里没有什么好处。\n\n科尼什：好的，你们继续听我说，因为我们这个小时还要讨论其他几个州。"},{"paragraph":"We're also still waiting for news about some sort of proposed deal with Iran. But in the meantime, the U.S. has launched new strikes against Iran overnight.","translation":"我们还在等待关于某种与伊朗拟议协议的消息。但与此同时，美国在夜间对伊朗发动了新的打击。"},{"paragraph":"Plus, Epstein's former assistant testifies before Congress. What she says she did not see.\n\nAnd a Texas teenager convicted of killing a rival track star. Why the jury rejected his claim of self-defense.","translation":"另外，爱泼斯坦的前助理在国会作证。她说她没有看到什么。\n\n还有一名德克萨斯州青少年因杀害一名对手田径明星而被定罪。为什么陪审团驳回了他的自卫主张。"},{"paragraph":"UNIDENTIFIED MALE: It's just sad that it had to come to this. It was just a bad, bad decision he made.","translation":"身份不明的男性：真遗憾事情发展到这一步。他只是做了一个非常糟糕的决定。"},{"paragraph":"CORNISH: Right now, we are following the latest round of escalation between the U.S. and Iran. U.S. CENTRAL COMMAND saying they are now finished hitting targets in Iran in response to an Army helicopter getting shot down over the Strait of Hormuz.","translation":"科尼什：现在，我们正在关注美国和伊朗之间最新一轮的升级。美国中央司令部表示，他们现已完成对伊朗目标的打击，以回应一架陆军直升机在霍尔木兹海峡上空被击落。"},{"paragraph":"Iran's state media, however, released new video overnight, saying they retaliated to the U.S. by attack -- by launching missiles against targets in Bahrain and Kuwait and an air base in Jordan.","translation":"然而，伊朗国家媒体在夜间发布了新视频，称他们通过向巴林、科威特的目标以及约旦的一个空军基地发射导弹来报复美国。"},{"paragraph":"Joining me now with the latest, CNN international correspondent Paula Hancocks in Abu Dhabi.\n\nPaula, can you talk about this? We know Iran, throughout the last couple of weeks, has -- they've tried to spread the war throughout the region. What have you heard from officials in Kuwait or Bahrain about confirmed damage?","translation":"现在连线CNN国际记者保拉·汉考克斯，她在阿布扎比带来最新消息。\n\n保拉，你能谈谈这个吗？我们知道伊朗在过去几周里一直试图将战争蔓延到整个地区。你从科威特或巴林官员那里听到了关于确认损失的消息吗？"},{"paragraph":"PAULA HANCOCKS, CNN INTERNATIONAL CORRESPONDENT: The next few hours are going to be crucial as to whether or not this is an isolated escalation between the U.S. and Iran, or whether it is a step on the escalatory ladder.","translation":"保拉·汉考克斯，CNN国际记者：接下来的几个小时将至关重要，以确定这是美国和伊朗之间的孤立升级，还是升级阶梯上的一步。"},{"paragraph":"Now, at this point, we have not heard any damage assessment or casualty figures from those countries which were targeted by Iran. That is, Jordan, Kuwait, and Bahrain.","translation":"目前，我们还没有听到来自伊朗目标国家的任何损失评估或伤亡数字。即约旦、科威特和巴林。"},{"paragraph":"Iran said that it had targeted the fifth fleet headquarters in Bahrain. They also say that they targeted a military base in Jordan, Kuwait, as well, saying that it was intercepting incoming aerial missiles and drones.","translation":"伊朗表示，他们瞄准了巴林的第五舰队总部。他们还表示，他们瞄准了约旦、科威特的一个军事基地，称其正在拦截来袭的空中导弹和无人机。"},{"paragraph":"So, what we've heard from Iran's side is that they have said that there will -- no attack will go unanswered from the United States. What we had seen from U.S. CENTRAL COMMAND is they said they had\n\ncarried out what they called a, quote, \"proportional response\" to the shooting down of that Apache helicopter, saying that there were three locations along the Strait of Hormuz that were targeted.","translation":"所以，我们从伊朗方面听到的是，他们表示——任何攻击都不会不得到美国的回应。我们从美国中央司令部看到的是，他们表示他们对那架阿帕奇直升机被击落进行了他们所谓的“相称回应”，称霍尔木兹海峡沿岸的三个地点成为目标。"},{"paragraph":"They say that they hit air defense, ground control stations, radar sites, as well.\n\nNow, one U.S. official telling CNN that this was really intended to be a warning to Iran, and they do hope that they will still be able to keep the talks on track, that it won't hinder those talks, although we've heard from Iran's foreign ministry spokesperson that Iran is reviewing negotiations at this point, accusing the U.S. of negotiating in bad faith, Audie.","translation":"他们说他们击中了防空、地面控制站、雷达站点等。\n\n现在，一位美国官员告诉CNN，这实际上是为了向伊朗发出警告，他们确实希望仍能保持谈判顺利进行，不会阻碍这些谈判，尽管我们从伊朗外交部发言人那里听到，伊朗正在审查谈判，指责美国谈判不诚信，奥黛。"},{"paragraph":"CORNISH: OK. That's Paula Hancocks with that update. Thank you so much.\n\nIt is now 17 minutes past the hour. I want to give you your morning roundup.","translation":"科尼什：好的。这是保拉·汉考克斯带来的最新消息。非常感谢。\n\n现在是整点过后17分钟。我想给你带来早间简报。"},{"paragraph":"Happening today, the House Oversight Committee will hear from Microsoft billionaire Bill Gates behind closed doors. He's scheduled to testify about his professional relationship with Jeffrey Epstein.\n\nGates has not been accused of wrongdoing.","translation":"今天发生的事，众议院监督委员会将闭门听取微软亿万富翁比尔·盖茨的证词。他计划就他与杰弗里·爱泼斯坦的职业关系作证。\n\n盖茨未被指控有不当行为。"},{"paragraph":"Meanwhile, Epstein's former assistant, Lesley Groff, testified on Tuesday, saying that she, quote, \"never witnessed anything improper or illegal.\"\n\nShe also told lawmakers she arranged multiple calls between Epstein and Donald Trump before he was president. President Trump is not accused of any wrongdoing in connection to Epstein.","translation":"与此同时，爱泼斯坦的前助理莱斯利·格罗夫周二作证，称她“从未目睹任何不当或非法行为”。\n\n她还告诉立法者，她在特朗普成为总统前安排了爱泼斯坦和唐纳德·特朗普之间的多次通话。特朗普总统未被指控与爱泼斯坦有任何不当行为。"},{"paragraph":"And in Texas, a teen who fatally stabbed a 17-year-old track athlete from a rival team has been convicted of murder and sentenced to 35 years in prison.\n\nA jury rejected Karmelo Anthony's claims of self-defense during a confrontation with Austin Metcalf in the stadium bleachers last year.","translation":"在德克萨斯州，一名刺死对手队17岁田径运动员的青少年被判谋杀罪，判处35年监禁。\n\n陪审团驳回了卡梅洛·安东尼在去年与奥斯汀·梅特卡夫在体育场看台对峙时的自卫主张。"},{"paragraph":"UNIDENTIFIED MALE: It's just sad that it had to come to this. It was just a bad, bad decision he made. But he took a life. And it's unfortunate that two young lives are affected so negatively about this.","translation":"身份不明的男性：真遗憾事情发展到这一步。他只是做了一个非常糟糕的决定。但他夺走了一条生命。不幸的是，两个年轻的生命因此受到如此负面的影响。"},{"paragraph":"CORNISH: Anthony did not testify. His mother took the stand during the sentencing phase, telling jurors her son was sorry.","translation":"科尼什：安东尼没有作证。他的母亲在量刑阶段出庭，告诉陪审员她的儿子很抱歉。"},{"paragraph":"And CNN now projecting Republican Steve Hilton will advance to the November election in the California governor's race against Democrat Xavier Becerra.\n\nBecerra, the former health secretary, finished on top with nearly 28 percent of the vote, three points ahead of Hilton, a former FOX News host who has President Trump's endorsement.","translation":"CNN现在预测共和党人史蒂夫·希尔顿将进入加州州长竞选的十一月选举，对阵民主党人泽维尔·贝塞拉。\n\n前卫生部长贝塞拉以近28%的得票率位居榜首，领先前福克斯新闻主持人、获得特朗普总统支持的希尔顿三个百分点。"},{"paragraph":"STEVE HILTON (R), CALIFORNIA GUBERNATORIAL CANDIDATE; Californians will have a real choice for change in November. Whether they want to keep going with the policies that have brought us to the highest poverty rate, the highest unemployment rate, the highest cost of living in the country, where they want more of that with Xavier Becerra, or whether they want to go in a new direction.","translation":"史蒂夫·希尔顿（共和党），加州州长候选人：加州人在十一月将有一个真正的变革选择。他们是希望继续推行那些导致我们国家最高贫困率、最高失业率、最高生活成本的政策，他们是否想要泽维尔·贝塞拉带来的更多同样情况，还是他们想要走向新的方向。"},{"paragraph":"CORNISH: I have to ask quickly: if Hilton does well, is California still going to be the corrupt election state that Republicans are saying it is?","translation":"科尼什：我必须快速问一下：如果希尔顿表现良好，加州还会是共和党人所说的腐败选举州吗？"},{"paragraph":"STEPMAN: Yes. I mean, the question is how well, of course. How much can he actually make some --","translation":"斯特普曼：是的。我的意思是，问题当然是他表现有多好。他实际上能取得多少——"},{"paragraph":"CORNISH: Is there a certain threshold after which --\n\nCORNISH: -- it's no longer considered corrupt if a Republican wins?","translation":"科尼什：是否存在某个门槛，之后——\n\n科尼什：——如果共和党人获胜，就不再被认为是腐败？"},{"paragraph":"STEPMAN: Well, you know, you know what? Especially given the state, it'll depend on how the votes are counted. I feel that especially after the next --","translation":"斯特普曼：嗯，你知道，你知道吗？特别是考虑到这个州，这将取决于选票如何计算。我觉得尤其是在下一次——"},{"paragraph":"LEON: I knew that answer.","translation":"莱昂：我就知道那个答案。"},{"paragraph":"CORNISH: Yes. But you can see why I'm asking, right? Like, if he wins, it's fine. But if he doesn't win, it's corrupt.","translation":"科尼什：是的。但你能看出我为什么问，对吧？比如，如果他赢了，那就没问题。但如果他没赢，那就是腐败。"},{"paragraph":"CORNISH: But if he wins, it's still corrupt, but somehow --\n\nROSE: Maybe, maybe. I think it's still fairly unlikely that he's going to win this race. I will also say that it's been the process in California taking so long to discover who --","translation":"科尼什：但如果他赢了，它仍然是腐败的，但不知何故——\n\n罗斯：也许，也许。我认为他赢得这场竞选的可能性仍然相当小。我还要说，加州的过程花了这么长时间才发现谁——"},{"paragraph":"CORNISH: Yes, everyone's talking about that.\n\nROSE: -- is going to win it. Everybody's talking about this.","translation":"科尼什：是的，每个人都在谈论这个。\n\n罗斯：——会赢。每个人都在谈论这个。"},{"paragraph":"CORNISH: But everyone's disagreeing on what that means.\n\nCORNISH: That's by definition nefarious.","translation":"科尼什：但每个人都在那意味着什么上意见不一。\n\n科尼什：那从定义上就是邪恶的。"},{"paragraph":"ROSE: But it makes people uncomfortable with the results.","translation":"罗斯：但这让人们对结果感到不舒服。"},{"paragraph":"CORNISH: I have to mention one other thing, just because the number's astounding. Tom Steyer's spending: 215 million.\n\nI'm not good at long division, so I didn't want to know how much per voter that spend was, and I can't do it. I can't do it. And someone on -- online was saying, oh, have you ever heard of effective altruism, and that this was ineffective altruism, basically.","translation":"科尼什：我必须提另一件事，只是因为数字惊人。汤姆·斯泰尔的支出：2.15亿美元。\n\n我不擅长长除法，所以我不想知道每个选民花了多少钱，我算不出来。我算不出来。网上有人说，哦，你听说过有效利他主义吗，这基本上就是无效利他主义。"},{"paragraph":"LEON: Basically, an ROI in the business term, right? You need a return on that investment.\n\nThis is twice for Steyer now. He has not gotten that ROI. When is enough, enough?\n\nIf I had that kind of money, I would invest it in something else. He has tried this political acumen.","translation":"莱昂：基本上，用商业术语来说就是投资回报率，对吧？你需要那笔投资有回报。\n\n这已经是斯泰尔第二次了。他没有得到那个投资回报率。什么时候才够？\n\n如果我有那么多钱，我会投资到别的东西上。他尝试了这种政治敏锐度。"},{"paragraph":"LEON: It has not worked out.\n\nCORNISH: Yes. I was about to say --\n\nLEON: Voters have said that.","translation":"莱昂：没有成功。\n\n科尼什：是的。我正要——\n\n莱昂：选民们已经说了。"},{"paragraph":"CORNISH: The voters have rejected it.\n\nLEON: Especially with the billionaire. When the billionaire class. We've got AOC and others that have talked about the billionaire class, and we have somebody here spending his own money like this, it seems like a waste where it could be invested in other.","translation":"科尼什：选民们已经拒绝了。\n\n莱昂：尤其是亿万富翁。当亿万富翁阶层。我们有AOC和其他人谈论过亿万富翁阶层，而我们这里有人这样花自己的钱，这似乎是一种浪费，本可以投资到其他地方。"},{"paragraph":"CORNISH: Well, it's been a wild race coming from last year to all of a sudden have Becerra at the front.\n\nCORNISH: We couldn't have seen that then.\n\nCORNISH: Now, after the break on CNN THIS MORNING, two controversial to win? So, the Colorado frontrunner for governor claims he killed a man when he was 7 years old. I have more stories like that from him.","translation":"科尼什：嗯，从去年开始，这是一场疯狂的竞选，突然之间贝塞拉领先了。\n\n科尼什：我们当时无法预见。\n\n科尼什：现在，在CNN今晨节目休息之后，两个有争议的获胜者？科罗拉多州州长竞选的领跑者声称他7岁时杀了一个人。我还有很多关于他的类似故事。"},{"paragraph":"Plus, A.I. companies are rushing to the stock market. Is it the next tech boom or is the A.I. bubble about to burst?\n\nAnd for viewers watching us from right here in New York City, Knicks versus Spurs again tonight at the Garden. Good morning.","translation":"另外，人工智能公司纷纷涌入股市。这是下一个科技繁荣还是人工智能泡沫即将破裂？\n\n对于在纽约市观看我们节目的观众，今晚尼克斯队将在花园球场再次对阵马刺队。早上好。"},{"paragraph":"CORNISH: So, a bunch of IPOs in the A.I. sector are about to hit Wall Street after OpenAI announced on Monday it filed for an initial public offering, an IPO.\n\nThe three biggest A.I. companies are now in line to go public, as well. That includes Anthropic and SpaceX. A fourth, Perplexity, is expected to file in 2028.","translation":"科尼什：所以，在OpenAI周一宣布提交首次公开募股（IPO）申请后，人工智能领域的一批IPO即将登陆华尔街。\n\n三家最大的人工智能公司现在也排队上市。其中包括Anthropic和SpaceX。第四家Perplexity预计将在2028年提交申请。"},{"paragraph":"DONALD TRUMP, U.S. PRESIDENT: We're talking about it. Where the American people can benefit from the success of A.I. And by doing that, they're going to like it better. Because we're leading China. We're leading everybody in the world with A.I., and we want to keep it that way. It's like you make them a partnership in this revolution. It would be a beautiful thing.","translation":"唐纳德·特朗普，美国总统：我们正在讨论。美国人民可以从人工智能的成功中受益。通过这样做，他们会更喜欢它。因为我们领先中国。我们在人工智能方面领先全世界，我们想保持这种状态。这就像你让他们成为这场革命的合作伙伴。这将是一件美好的事情。"},{"paragraph":"CORNISH: Now, investors who get in early could make a fortune. But has the A.I. boom gotten ahead of itself?\n\nMadison Mills joins the group chat. She's the senior A.I. reporter at Axios. You guys have done some fantastic reporting on this industry.","translation":"科尼什：现在，早期入场的投资者可以赚大钱。但人工智能热潮是否超前了？\n\n麦迪逊·米尔斯加入群聊。她是Axios的高级人工智能记者。你们对这个行业做了一些精彩的报道。"},{"paragraph":"Just to show people the amount of money at stake. When you look at OpenAI and SpaceX and Anthropic, there were 3.5 trillion. We dug around, and we found out that's, like, as much money as, you know, France. Like, OK? So, we're dealing with a lot of money.\n\nBut is it a bubble? And I ask because we've got some people on TikTok who think that it is. I'm going to play for you, the finance experts online.","translation":"只是为了向人们展示涉及的资金量。当你看到OpenAI、SpaceX和Anthropic时，有3.5万亿美元。我们四处挖掘，发现这相当于法国的资金量，你知道。就像，好吗？所以，我们面对的是大量资金。\n\n但这是泡沫吗？我问是因为TikTok上有些人认为它是。我将为你播放网上的金融专家。"},{"paragraph":"UNIDENTIFIED MALE: A.I. companies are now trying to save themselves by applying for IPOs.\n\nUNIDENTIFIED MALE: OpenAI and Anthropic plan to have IPOs at release before the end of this year, signaling to me that the A.I. bubble is about to pop and that these insiders and institutional investors know that they better cash out now, or they may not ever get the chance.","translation":"身份不明的男性：人工智能公司现在正试图通过申请IPO来拯救自己。\n\n身份不明的男性：OpenAI和Anthropic计划在今年年底前进行IPO，这向我表明人工智能泡沫即将破裂，这些内部人士和机构投资者知道他们最好现在套现，否则可能再也没有机会了。"},{"paragraph":"CORNISH: Why is this the word on the street?\n\nMADISON MILLS, SENIOR A.I. REPORTER, AXIOS: Yes, I would push back on a lot of the financial finfluencing that we hear about on finance.","translation":"科尼什：为什么这是街上的说法？\n\n麦迪逊·米尔斯，Axios高级人工智能记者：是的，我会反驳我们在金融领域听到的许多金融影响。"},{"paragraph":"CORNISH: Finfluencing. You said it. Go on. MILLS: Yes. But -- but just because companies are IPOing doesn't\n\nnecessarily mean that the bubble is going to happen this Friday when SpaceX lists on the NASDAQ.","translation":"科尼什：金融影响。你说出来了。继续。\n\n米尔斯：是的。但——但仅仅因为公司进行IPO并不一定意味着泡沫会在本周五SpaceX在纳斯达克上市时发生。"},{"paragraph":"MILLS: Right? But the concept of the bubble is this idea that valuations are completely divorced from reality: the underlying business fundamentals, the things that we would learn about in journalism and business school --","translation":"米尔斯：对吧？但泡沫的概念是估值完全脱离现实：潜在的业务基本面，我们在新闻和商学院学到的东西——"},{"paragraph":"MILLS: -- that make a company profitable, right?\n\nCORNISH: So, the street phrase would be they're high on their own supply?","translation":"米尔斯：——使公司盈利的东西，对吧？\n\n科尼什：所以，街上的说法是它们自产自销？"},{"paragraph":"MILLS: Absolutely. And that's very clear with a company like SpaceX. Their expected valuation is $1.8 trillion. They're trading at about 90 times their sales -- not their profits, just their sales -- as of this Friday, when they're expected to list.","translation":"米尔斯：绝对。这在像SpaceX这样的公司非常明显。他们的预期估值为1.8万亿美元。截至本周五他们预计上市时，他们的交易价格约为销售额的90倍——不是利润，只是销售额。"},{"paragraph":"So, that is an example of a company you might look at and say, not sure if the valuation is high.\n\nCORNISH: I know. There's also this thing I've been learning about circular financing.","translation":"所以，这是一个例子，你可能会看着一家公司说，不确定估值是否高。\n\n科尼什：我知道。还有我一直在学习的循环融资。"},{"paragraph":"CORNISH: So, I'm understanding this as, you use money from one A.I. company to do work in your A.I. company. and then another A.I. company gets work from you. It's like the same money going around and around. Do I have that right?","translation":"科尼什：所以，我的理解是，你用一家人工智能公司的钱在你的公司工作。然后另一家人工智能公司从你那里得到工作。就像同一笔钱在转来转去。我理解得对吗？"},{"paragraph":"MILLS: Absolutely. That's perfect. And part of --\n\nCORNISH: I'm ready to finfluence.\n\nMILLS: You're ready to finfluence. And more than that, you can be the CFO of an A.I. company. You know?","translation":"米尔斯：绝对。完美。而且部分——\n\n科尼什：我准备好金融影响了。\n\n米尔斯：你准备好金融影响了。不仅如此，你可以成为一家人工智能公司的首席财务官。你知道吗？"},{"paragraph":"But part of the problem with that is that Anthropic can -- or OpenAI, any of the A.I. labs, can book that as revenue. And that feeds into that valuation number that we're getting.","translation":"但问题的一部分是，Anthropic或OpenAI，任何人工智能实验室，都可以将其记为收入。这会影响我们得到的估值数字。"},{"paragraph":"But that revenue could also just be money that they are getting from Google, that then they're giving back to Google in the form of compute capacity. And then Google has that compute capacity and is giving it over to another A.I. lab. And so, it's all very circular right now. And that's the concern.","translation":"但那些收入也可能只是他们从谷歌获得的钱，然后他们以计算能力的形式返还给谷歌。然后谷歌拥有这些计算能力，并将其交给另一个人工智能实验室。所以，现在这一切都非常循环。这就是担忧所在。"},{"paragraph":"CORNISH: And it's giving shell game. I'm going to listen to you, because I believe that this market is the future. I understand that, but I think people rightly have questions. [06:30:00]","translation":"科尼什：这就像在玩猜壳游戏。我会听你的，因为我相信这个市场是未来。我理解这一点，但我认为人们有疑问是合理的。[06:30:00]"}],"vocabulary":[{"word":"primary","phonetic":"/ˈpraɪmeri/","pos":"n.","level":"考研","cn":"初选","en":"a preliminary election to appoint delegates to a party conference or to select the candidates for a principal election","excerpt":"Platner Easily Wins Democratic Senate Primary in Maine","example_cn":"普拉特纳轻松赢得缅因州民主党参议院初选"},{"word":"flip","phonetic":"/flɪp/","pos":"v.","level":"六级","cn":"翻转，改变","en":"to change or cause to change position or direction suddenly","excerpt":"Could that cost the party a shot at flipping the Senate this fall?","example_cn":"这会否让该党失去今年秋天翻转参议院的机会？"},{"word":"weigh","phonetic":"/weɪ/","pos":"v.","level":"考研","cn":"权衡","en":"to consider carefully the relative importance or value of something","excerpt":"that's the situation that we have to weigh.","example_cn":"那就是我们必须权衡的情况。"},{"word":"ceasefire","phonetic":"/ˈsiːsfaɪər/","pos":"n.","level":"六级","cn":"停火","en":"a temporary suspension of fighting, typically one during which peace talks take place","excerpt":"Will the strained ceasefire last long enough for the U.S. to deliver that long-promised deal with Iran?","example_cn":"紧张的停火能否持续足够长的时间，让美国兑现与伊朗长期承诺的协议？"},{"word":"convicted","phonetic":"
