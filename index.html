ons rise in the Middle East, so do oil prices. Both Brent Crude and WTI Crude up this morning. We've got live team coverage throughout the region. And we're going to start in Jerusalem with CNN's Oren Liebermann. Oren, first, can you just give us the latest on the strikes, what you've witnessed today?","translation":"随着中东紧张局势升级，油价也随之上涨。布伦特原油和西德克萨斯中质原油今早均上涨。我们在整个地区有现场团队报道。我们将从耶路撒冷开始，连线CNN的Oren Liebermann。Oren，首先，你能给我们介绍一下袭击的最新情况吗，你今天目睹了什么？"},{"paragraph":"OREN LIEBERMANN, CNN JERUSALEM BUREAU CHIEF: We have seen and heard several waves of incoming Iranian ballistic missiles since about 10:00 or 11 O'clock at night here local time. So, this has been going on for several hours. There were approximately three barrages in that first wave.","translation":"OREN LIEBERMANN，CNN耶路撒冷分社社长：自当地时间晚上10点或11点左右以来，我们看到并听到了几波伊朗弹道导弹来袭。所以，这已经持续了几个小时。第一波大约有三轮齐射。"},{"paragraph":"And then we have seen a few subsequent waves of incoming Iranian ballistic missiles. According to Israel's military, most of those have been intercepted. At first, they said all of those -- but when we followed up after what appeared to be some Iranian video of missiles getting through, they said it only applied to an earlier wave.","translation":"随后我们又看到了几波伊朗弹道导弹来袭。据以色列军方称，其中大部分已被拦截。起初，他们称全部被拦截——但当我们跟进一段似乎显示导弹突破的伊朗视频后，他们表示这仅适用于较早的一波。"},{"paragraph":"So, we're waiting to see if there is an update there. Meanwhile, Iran's military said they targeted the Ramat David Air Force Base in northern Israel. Israel has responded with its own attacks, and we have seen those progressively escalate from what Israel's ambassador to the U.S. described as attacks on surface-to-surface missiles and non-energy infrastructure to the strike.","translation":"因此，我们正在等待是否有更新。与此同时，伊朗军方称他们瞄准了以色列北部的拉马特戴维空军基地。以色列已用自己的攻击进行回应，我们看到这些攻击逐步升级，从以色列驻美大使所称的对地对地导弹和非能源基础设施的攻击，发展到对石化设施的打击。"},{"paragraph":"You mentioned on the petrochemical facility in western Iran. And then just an hour-and-a-half ago or so, the Israeli military said they carried out strikes against what they called strategic defense systems that would open up the skies to the Israeli Air Force if it moves in that direction.","translation":"你提到了伊朗西部的石化设施。大约一个半小时前，以色列军方称他们对所谓的战略防御系统进行了打击，这些系统如果被清除，将为以色列空军在该方向行动打开天空。"},{"paragraph":"We saw at the beginning of this war a few months ago that one of the first targets was Iran's surface-to-air missiles, and the idea there is that, if you take those out, then Israel's Air Force has to a large extent, freedom of the skies over Iran.","translation":"几个月前这场战争开始时，我们看到首批目标之一就是伊朗的地对空导弹，其思路是，如果摧毁这些导弹，以色列空军在很大程度上就能获得伊朗上空的自由。"},{"paragraph":"And that would also include the U.S. Air Force should this turn into a joint operation. Obviously, that's something we're watching very closely. Crucially, this very much looks like it's heating up, and on the escalation ladder, it's also worth noting, Audie, that the Houthis in Yemen; an Iranian proxy there, fired at least, one missile towards Israel several hours ago that was intercepted here.","translation":"如果这演变成联合行动，那也将包括美国空军。显然，这是我们密切关注的事情。关键是，这看起来正在升温，在升级阶梯上，值得注意的是，Audie，也门的胡塞武装——伊朗在那里的代理人——几个小时前向以色列发射了至少一枚导弹，但被拦截。"},{"paragraph":"We have heard interceptions behind us over Jerusalem. We have seen warnings of incoming missiles in several other areas across the country. Here, as both Israel and Iran have indicated and publicly stated that they are prepared for at least days of this to continue.","translation":"我们听到身后耶路撒冷上空有拦截声。我们看到全国其他几个地区有导弹来袭警告。在这里，以色列和伊朗都已表示并公开声明，他们准备让这种情况至少持续数天。"},{"paragraph":"CORNISH: You talked about that escalation ladder, and we have been hearing for weeks about Israel's sort of move into southern Lebanon as it goes after Hezbollah. We have the President of Lebanon here -- I want to play this clip so you can help us understand how these things intersect. Here he is.","translation":"CORNISH：你谈到了升级阶梯，几周来我们一直听到以色列在追击真主党时进入黎巴嫩南部的行动。我们有黎巴嫩总统——我想播放这段片段，以便你帮助我们理解这些事件如何相互关联。这是他的讲话。"},{"paragraph":"JOSEPH AOUN, PRESIDENT, LEBANON: Our people being killed, our people being -- our houses being destroyed. They are using Lebanon as a chip -- bargaining chip in their negotiation with the United States. It's unacceptable.","translation":"JOSEPH AOUN，黎巴嫩总统：我们的人民被杀，我们的房屋被毁。他们正在利用黎巴嫩作为筹码——与美国谈判中的讨价还价筹码。这是不可接受的。"},{"paragraph":"CORNISH: So, he was speaking there about Tehran. Can you talk about their most recent strike in southern Lebanon, why it triggered this escalation?","translation":"CORNISH：他当时是在谈论德黑兰。你能谈谈他们最近在黎巴嫩南部的袭击吗，为什么它引发了这次升级？"},{"paragraph":"LIEBERMANN: Well, Iran said last week that if Israel were to carry out an attack, the capital of Beirut, then Iran would directly attack Israel. And that's what we saw happen over what was a very volatile weekend between Israel and Hezbollah.","translation":"LIEBERMANN：嗯，伊朗上周表示，如果以色列对贝鲁特首都发动攻击，伊朗将直接攻击以色列。这正是我们在以色列和真主党之间一个非常动荡的周末所看到的情况。"},{"paragraph":"We saw -- we saw the number of people killed in Israeli strikes in Lebanon, according to the Lebanese Ministry of Public Health, rise above 3,600 since this war began some three months ago. And then, even since the latest U.S.-brokered ceasefire which was just several days ago, we saw Hezbollah carry out an attack on northern Israel.","translation":"我们看到——根据黎巴嫩公共卫生部的数据，自大约三个月前这场战争开始以来，以色列在黎巴嫩袭击中造成的死亡人数已超过3600人。然后，即使在几天前美国斡旋的最新停火协议之后，我们看到真主党对以色列北部发动了袭击。"},{"paragraph":"[05:05:00] That crossed Israel's red line, and Israel then carried out a strike\n\non the Dahiya neighborhood in Beirut, which is considered a Hezbollah stronghold. Iran then carried out its threat or carried out on its threat launching those ballistic missiles on Sunday night directly at Israel.","translation":"[05:05:00] 这越过了以色列的红线，以色列随后对贝鲁特的达希耶社区发动了袭击，该社区被认为是真主党的据点。伊朗随后兑现了威胁，于周日晚上直接向以色列发射了那些弹道导弹。"},{"paragraph":"And that has led us to where we are right now. President Joseph Aoun, who was interviewed by our Christiane Amanpour, he made clear that he is trying to exercise Lebanese sovereignty, and that includes getting some sort of control over Iran's proxy, Hezbollah, and trying to find some sort of agreement that will lead to a withdrawal of Israeli forces from southern Lebanon and make Lebanon more whole.","translation":"这导致了我们现在的局面。接受我们Christiane Amanpour采访的约瑟夫·奥恩总统明确表示，他正在努力行使黎巴嫩主权，包括对伊朗代理人真主党进行某种控制，并试图找到某种协议，导致以色列军队从黎巴嫩南部撤出，使黎巴嫩更加完整。"},{"paragraph":"The problem is, you have an Israeli government that isn't in a position and doesn't want to withdraw from southern Lebanon now. You have an Iranian government that sees Hezbollah as its foothold in Lebanon, Hezbollah rejected the latest iteration of the -- of the ceasefire there.","translation":"问题是，以色列政府现在既没有能力也不愿意从黎巴嫩南部撤军。伊朗政府将真主党视为其在黎巴嫩的立足点，真主党拒绝了最新版本的停火协议。"},{"paragraph":"And that puts the President Joseph Aoun in a very difficult situation. His Lebanese Armed Forces don't have the power and perhaps don't have the will to carry out any serious action against Hezbollah, even as he has tried to outlaw and ban Hezbollah's military activity.","translation":"这使约瑟夫·奥恩总统处于非常困难的境地。他的黎巴嫩武装部队没有能力，也许也没有意愿对真主党采取任何严肃行动，尽管他试图宣布真主党的军事活动为非法并予以禁止。"},{"paragraph":"What's crucial here, Audie, is that what happens in Lebanon affects the U.S.-Iran ceasefire. Iran knows that. They know that President Donald Trump wants to get to a deal, and they're able to try to use Hezbollah and to some extent, use Lebanon as a bargaining chip to pressure Trump to try to rein in Prime Minister Benjamin Netanyahu when it comes to Lebanon.","translation":"关键的是，Audie，黎巴嫩发生的事情会影响美伊停火。伊朗知道这一点。他们知道唐纳德·特朗普总统想要达成协议，他们能够试图利用真主党，并在一定程度上利用黎巴嫩作为筹码，向特朗普施压，以在黎巴嫩问题上约束本雅明·内塔尼亚胡总理。"},{"paragraph":"CORNISH: Is there any chance of doing that? I think a lot of people are looking at these actions and thinking about how the President has spoken to Netanyahu, talked about taking down the temperature. What's the view in Israel about how Trump has been talking?","translation":"CORNISH：有没有可能做到这一点？我想很多人都在关注这些行动，并思考总统是如何与内塔尼亚胡交谈的，谈到降低紧张局势。以色列方面如何看待特朗普的言论？"},{"paragraph":"LIEBERMANN: Trump made a number of public statements, or rather, gave a number of interviews to reporters in which he said it is Trump who calls the shots, not Netanyahu, saying he would -- he would urge Israel not to retaliate or delay Israel's retaliation.","translation":"LIEBERMANN：特朗普发表了一些公开声明，或者更确切地说，接受了一些记者采访，他在采访中表示是特朗普说了算，而不是内塔尼亚胡，他说他会——他会敦促以色列不要报复或推迟以色列的报复。"},{"paragraph":"That's at least, the public part of the messaging. What we don't really know, and this is the key question for us to have a much better sense of what's happening here is, what was the phone call like between Trump and Netanyahu?","translation":"这至少是信息传递的公开部分。我们真正不知道的是，也是我们更好地了解这里情况的关键问题是，特朗普和内塔尼亚胡之间的电话内容是什么？"},{"paragraph":"It is possible that Trump essentially gave this the green light and said, yes, Israel has to respond in some fashion, but keep that response limited. It's also possible that Trump told Israel not to respond, and Netanyahu is acting on his own here, though I think that's unlikely, given how much Netanyahu needs Trump to be on his side, and has never sort of publicly criticized him.","translation":"有可能特朗普基本上开了绿灯，说，是的，以色列必须以某种方式回应，但保持回应有限。也有可能特朗普告诉以色列不要回应，而内塔尼亚胡在这里自行其是，尽管我认为这不太可能，因为内塔尼亚胡非常需要特朗普站在他一边，而且从未公开批评过他。"},{"paragraph":"So, there's a spectrum here of what Trump is allowing of Netanyahu. It's worth remembering here that Trump has forced Netanyahu to end wars in Gaza, Lebanon, and previously in Iran. And I think right now, it's still the expectation that Trump will do that once again.","translation":"所以，特朗普允许内塔尼亚胡做什么有一个范围。值得记住的是，特朗普曾迫使内塔尼亚胡结束加沙、黎巴嫩以及此前伊朗的战争。我认为现在，人们仍然预期特朗普会再次这样做。"},{"paragraph":"The question is when and how. For that, Trump needs to essentially get the day started in D.C., so, we can learn more about what's happening behind the scenes. Audie.","translation":"问题在于何时以及如何做。为此，特朗普基本上需要在华盛顿开始新的一天，这样我们才能了解更多幕后情况。Audie。"},{"paragraph":"CORNISH: That's right, we're waking up here in Washington, Oren Liebermann talking to us from Jerusalem. Our breaking news coverage continues after the break on CNN THIS MORNING. We're going to talk about under what circumstance would Trump consider bringing U.S. troops home? His answer next. Plus, a deadly quake hits in the Philippines. The urgent search for survivors.","translation":"CORNISH：没错，我们在华盛顿醒来，Oren Liebermann从耶路撒冷与我们连线。我们的突发新闻报道在CNN《今晨》节目广告后继续。我们将讨论特朗普在什么情况下会考虑将美军带回家？他的答案接下来。另外，菲律宾发生致命地震。紧急搜寻幸存者。"},{"paragraph":"CORNISH: Breaking news this morning. Israel and Iran trading strikes in the worst escalation since the ceasefire agreement in April. We just heard from our CNN's Oren Liebermann in Jerusalem, where there are sounds of sirens and explosions after the interception of missiles.","translation":"CORNISH：今早突发新闻。以色列和伊朗互相发动袭击，这是自4月停火协议以来最严重的升级。我们刚刚听到CNN的Oren Liebermann在耶路撒冷的报道，那里在拦截导弹后传来警报声和爆炸声。"},{"paragraph":"A U.S. official told CNN that President Trump urged Israeli Prime Minister Benjamin Netanyahu to hold off on retaliating against Iran. So, joining us to talk more about the military strategy here is retired Air Force Colonel and CNN military analyst Cedric Leighton. Good morning.","translation":"一位美国官员告诉CNN，特朗普总统敦促以色列总理本雅明·内塔尼亚胡暂缓对伊朗进行报复。因此，我们邀请退休空军上校、CNN军事分析师Cedric Leighton加入我们，进一步讨论军事战略。早上好。"},{"paragraph":"So, first, I want to talk about this escalation because people may be hearing about the back-and-forth between Israel and Hezbollah for many weeks. Why did this particular round of strikes kick off?","translation":"首先，我想谈谈这次升级，因为人们可能几周来一直听到以色列和真主党之间的来回交锋。为什么这一轮特定的袭击会爆发？"},{"paragraph":"CEDRIC LEIGHTON, CNN MILITARY ANALYST: Yes, good morning, Audie. The reason this particular round of strikes kicked off was because the Israelis hit the suburb of Beirut, suburb of Dahiya. That's where Hezbollah has its main headquarters. And there are a lot of Hezbollah personnel for lack of a better term, in the Dahiya neighborhood.","translation":"CEDRIC LEIGHTON，CNN军事分析师：是的，早上好，Audie。这一轮特定袭击爆发的原因是以色列袭击了贝鲁特郊区达希耶。那里是真主党的主要总部所在地。达希耶社区有很多真主党人员，恕我直言。"},{"paragraph":"So, the reason the Iranians basically came to the defense of the Hezbollah entities there was because Hezbollah is basically Iran's main proxy in the region, and they need Hezbollah in order not only to keep an eye on Israel, but also to potentially mount attacks on Israel.","translation":"所以，伊朗人基本上为那里的真主党实体辩护的原因是真主党基本上是伊朗在该地区的主要代理人，他们需要真主党不仅是为了监视以色列，而且是为了可能对以色列发动攻击。"},{"paragraph":"So, every time that there is destruction to Hezbollah, Iran sees this as not only destruction of Hezbollah, but also of their own forces, even though they are absolutely separate. So, this is, in essence, what's going on.","translation":"所以，每当真主党遭到破坏，伊朗不仅将其视为对真主党的破坏，也视为对其自身力量的破坏，尽管它们是完全分开的。所以，这基本上就是正在发生的事情。"},{"paragraph":"They decided -- the Iranians decided that it was time to respond to the Israeli attacks, and especially one as blatant as the one on Dahiya, in their view. And the reason they did that is because they want the ceasefire to cover not just Iran, but also the Lebanese territory, where the Israelis have conducted repeated actions against Hezbollah.","translation":"他们决定——伊朗人决定是时候回应以色列的袭击了，尤其是像达希耶那样公然的一次，在他们看来。他们这样做的原因是他们希望停火不仅涵盖伊朗，也涵盖黎巴嫩领土，以色列在那里对真主党进行了反复行动。"},{"paragraph":"CORNISH: You talked about proxies, and then this also brings me to the Houthis in Yemen, because there's some reporting there that they were saying they wanted to prevent shipping through the Red Sea, which sounds very familiar to those of us who have been hearing about Iran preventing shipping through the Strait of Hormuz. Does this threaten broader conflict? Are we seeing hints of that?","translation":"CORNISH：你谈到了代理人，这也让我想到也门的胡塞武装，因为有一些报道称他们想阻止船只通过红海，这对我们这些一直听说伊朗阻止船只通过霍尔木兹海峡的人来说听起来非常熟悉。这会威胁到更广泛的冲突吗？我们是否看到了迹象？"},{"paragraph":"LEIGHTON: Yes, there's definitely the possibility that this could widen into a bigger regional conflict, at least. So, on the eastern side of the Arabian Peninsula, you have the Strait of Hormuz, which is the area that we've been talking about for quite some time.","translation":"LEIGHTON：是的，至少有可能扩大为更大的地区冲突。在阿拉伯半岛的东侧，有霍尔木兹海峡，这是我们讨论了一段时间的地区。"},{"paragraph":"And then on the western side, you have what's known as the Bab al- Mandab, and that is that very narrow point between the Red Sea as it empties out into the Indian Ocean. So, this is an area where these are so-called choke points.","translation":"然后在西侧，有所谓的曼德海峡，那是红海流入印度洋的一个非常狭窄的点。所以，这是一个所谓的咽喉要道区域。"},{"paragraph":"And every time those are cut off, that impacts global shipping, global trade. And it means that prices go up, oil becomes scarcer. And that creates the economic issues that we're seeing in a lot of the world right now.","translation":"每当这些被切断，就会影响全球航运、全球贸易。这意味着价格上涨，石油变得更加稀缺。这造成了我们目前在世界许多地方看到的经济问题。"},{"paragraph":"CORNISH: We hear President Trump framing the U.S. involvement more as precaution, not escalation. I want to play for you something that happened on \"NBC's\" \"Meet the Press\". This was before all of this news about this escalation. But here it is.","translation":"CORNISH：我们听到特朗普总统将美国的参与更多地描述为预防，而不是升级。我想为你播放一段发生在NBC《与媒体见面》节目中的内容。这是在所有关于这次升级的消息之前。但这是它。"},{"paragraph":"UNIDENTIFIED FEMALE: If you're not specifically calling it a war, would you consider sending some of the troops who are stationed there, who were sent because of Operation Epic Fury --","translation":"未具名女性：如果你不特别称之为战争，你会考虑派遣一些驻扎在那里的部队吗？这些部队是因为“史诗之怒”行动而派遣的——"},{"paragraph":"DONALD TRUMP, PRESIDENT OF THE UNITED STATES: You mean boots on the ground --","translation":"唐纳德·特朗普，美国总统：你是指地面部队——"},{"paragraph":"UNIDENTIFIED FEMALE: There at home? No --","translation":"未具名女性：在那里还是回家？不——"},{"paragraph":"TRUMP: Are you talking --","translation":"特朗普：你在说——"},{"paragraph":"UNIDENTIFIED FEMALE: Would you consider sending them home if it's not technically a war?","translation":"未具名女性：如果严格来说不是战争，你会考虑送他们回家吗？"},{"paragraph":"TRUMP: We don't need as many troops. I think you just -- like it's on the -- to err on the side of caution.","translation":"特朗普：我们不需要那么多部队。我认为你只是——就像在——宁可谨慎一点。"},{"paragraph":"CORNISH: What are we looking at? Is it a kind of carrot and stick? Meaning the U.S. is doing the negotiating, but Israel is leaning hard on the military pressure?","translation":"CORNISH：我们看到了什么？这是一种胡萝卜加大棒吗？意思是美国在进行谈判，但以色列在施加军事压力？"},{"paragraph":"LEIGHTON: Well, potentially so. You know, it's interesting when you look at President Trump's remarks, they -- you know, on the one hand, he's kind of hedging his bets here. He does, you know, admit to the possibility of withdrawing some of the troops that are in the Middle East.","translation":"LEIGHTON：嗯，有可能。你知道，当你看到特朗普总统的言论时，很有趣——一方面，他在这里有点两面下注。他确实承认有可能撤出一些在中东的部队。"},{"paragraph":"And I think what he's referring to, are the troops that came in, in addition to the ones that were already stationed in the Middle East. So, what he doesn't want to do is withdraw completely from the region, which is actually Iran's goal.","translation":"我认为他指的是除了已经驻扎在中东的部队之外新增的部队。所以，他不想做的是完全撤出该地区，而这实际上是伊朗的目标。"},{"paragraph":"So, if he withdrew completely from the region, that would satisfy Iran. But it wouldn't protect the Arab Gulf states like Saudi Arabia, Qatar, the UAE, Kuwait and Bahrain. So, that becomes a critical point right here.","translation":"所以，如果他完全撤出该地区，那将满足伊朗。但这不会保护阿拉伯海湾国家，如沙特阿拉伯、卡塔尔、阿联酋、科威特和巴林。所以，这成为一个关键点。"},{"paragraph":"He, in essence, really can't withdraw if he -- if he doesn't want to show weakness. And that becomes, I think, the critical point right here.","translation":"他本质上真的不能撤军，如果他不想示弱的话。我认为这成为关键点。"},{"paragraph":"CORNISH: One more thing. We know that these strikes started back earlier in the year. They were U.S.-Israeli joint strikes, the U.S. gives a lot of military support, Intelligence support to Israel. So, could what we're seeing right now even happen without U.S. support.","translation":"CORNISH：还有一件事。我们知道这些袭击早在今年早些时候就开始了。它们是美以联合打击，美国向以色列提供了大量军事支持和情报支持。那么，我们现在看到的这些是否可能在没有美国支持的情况下发生？"},{"paragraph":"LEIGHTON: It could. And the reason I think we see limited strikes in the western and central parts of Iran, at least so far, is because the Israelis do have a capability to conduct those strikes on their own. They have their own refueling capability, although it's somewhat limited compared to what the U.S. can offer.","translation":"LEIGHTON：有可能。我认为我们看到伊朗西部和中部地区有限打击的原因，至少到目前为止，是因为以色列确实有能力自行进行这些打击。他们有自己的加油能力，尽管与美国能提供的相比有些有限。"},{"paragraph":"Generally-speaking, if the strikes were much more extensive or repeated over a series of days, then that would probably indicate a greater U.S. involvement. There may be some U.S. involvement, but it is absolutely possible that these strikes are occurring without direct U.S. involvement at the moment.","translation":"一般来说，如果打击范围更广或连续几天重复进行，那可能表明美国参与程度更高。可能有一些美国参与，但目前这些打击绝对有可能是在没有美国直接参与的情况下发生的。"},{"paragraph":"CORNISH: OK, that's Colonel Cedric Leighton, thank you for your insight. Appreciate you. After the break on CNN THIS MORNING, our breaking news coverage continues.","translation":"CORNISH：好的，这是Cedric Leighton上校，感谢你的见解。感谢你。在CNN《今晨》节目广告后，我们的突发新闻报道继续。"},{"paragraph":"UNIDENTIFIED MALE: To turn this on Israel, it would be a bit of a joke. Iran is the one that decided to break the truce.","translation":"未具名男性：把责任推给以色列，有点可笑。是伊朗决定打破停火的。"},{"paragraph":"CORNISH: President Trump urged Israel not to retaliate. We're going to talk about that more. Plus, Trump's cage fight just days away. Could it get knocked out before round one? There's a new lawsuit looking to stop it.","translation":"CORNISH：特朗普总统敦促以色列不要报复。我们将进一步讨论。另外，特朗普的铁笼格斗赛就在几天后。它会在第一轮之前就被取消吗？有一项新的诉讼试图阻止它。"},{"paragraph":"CORNISH: It's now 23 minutes past the hour. Here are five things making the news this morning. Democratic Senate primary candidate Graham Platner held an event in Maine in front of an enthusiastic and cheering crowd just two days before the primary. He declared he is very much just some random guy from Sullivan, Maine.","translation":"CORNISH：现在是整点过后23分钟。以下是今早的五条新闻。民主党参议院初选候选人Graham Platner在初选前两天在缅因州举行了一场活动，面对热情欢呼的人群。他宣称自己只是来自缅因州沙利文的一个普通人。"},{"paragraph":"GRAHAM PLATNER, SENATE PRIMARY CANDIDATE: In a moment like this in history, if we can show that a regular person from the regular world who simply comes out with a message saying that we all have to work together to push back against all of the structures of power that have been exploiting and oppressing us for generations.","translation":"GRAHAM PLATNER，参议院初选候选人：在历史上的这样一个时刻，如果我们能证明一个来自普通世界的普通人，只是站出来传递一个信息，说我们都必须共同努力，反击那些世代剥削和压迫我们的权力结构。"},{"paragraph":"If we show that, that works, we get to show this country the way forward.","translation":"如果我们证明这行得通，我们就能向这个国家展示前进的道路。"},{"paragraph":"CORNISH: Platner is still favored to win Tuesday's primary, despite the \"New York Times\" publishing a report from three of Platner's ex- girlfriends describing, quote, \"volatile and toxic relationships\". And in one account, physical intimidation. Platner has denied that.","translation":"CORNISH：尽管《纽约时报》发表了一篇报道，引用Platner的三位前女友描述“动荡且有毒的关系”，其中一则描述还涉及身体恐吓，但Platner仍被看好赢得周二的初选。Platner否认了这些指控。"},{"paragraph":"As New York is set to host the NBA finals and President Trump tonight, security concerns have been heightened after six people were hurt in a stabbing at Penn station. Officials say one of the victims suffered serious injuries, the others suffered non-life-threatening injuries.","translation":"由于纽约将举办NBA总决赛，且特朗普总统今晚到场，安全担忧加剧，此前宾夕法尼亚车站发生持刀伤人事件，造成六人受伤。官员称一名受害者伤势严重，其他人无生命危险。"},{"paragraph":"The suspect is in custody. And there was a deadly 7.8 magnitude earthquake in the Philippines. Video from the area is showing you here, massive damage, crumbling buildings and several people were killed. Rescues are currently underway.","translation":"嫌疑人已被拘留。菲律宾发生致命7.8级地震。来自该地区的视频显示，巨大破坏、建筑物倒塌，数人死亡。救援正在进行中。"},{"paragraph":"And then in just a few hours, the U.S. special forces soldier charged with betting on the raid to capture Nicolas Maduro will appear in court. Gannon Ken Van Dyke is due for a status hearing in Manhattan federal court.","translation":"几个小时后，被指控押注抓捕尼古拉斯·马杜罗突袭行动的美军特种部队士兵将出庭。Gannon Ken Van Dyke将在曼哈顿联邦法院出席状态听证会。"},{"paragraph":"Prosecutors are alleging that he made more than $400,000 on prediction markets by making trades related to Venezuela before that January raid to capture Maduro. In a cage fight on President Trump's birthday this weekend is in danger of being knocked out.","translation":"检察官指控他在1月抓捕马杜罗的突袭行动之前，通过进行与委内瑞拉相关的交易，在预测市场上获利超过40万美元。本周末在特朗普总统生日当天举行的一场铁笼格斗赛面临被取消的危险。"},{"paragraph":"Two Virginia residents have filed a lawsuit to stop the UFC fight at the White House. The suit argues that the claw, built on the White House grounds was not approved by Congress or an environmental review.","translation":"两名弗吉尼亚州居民提起诉讼，要求停止在白宫举行的UFC比赛。诉讼称，在白宫场地建造的“爪子”未经国会批准或环境审查。"},{"paragraph":"It also cited that UFC is selling VIP packages of more than a million dollars. And they argue that due to Trump's stock in UFC, he would profit off the fight. The fight is scheduled for this Saturday. And our breaking news coverage continues next.","translation":"诉讼还指出，UFC正在销售超过一百万美元的VIP套餐。他们辩称，由于特朗普持有UFC股份，他将从比赛中获利。比赛定于本周六举行。我们的突发新闻报道接下来继续。"},{"paragraph":"CNN is on the ground in Tehran with their new warning to Israel this morning as more missiles fly. Plus, six days after the elections, the reality TV villain hoping to be the hero for L.A., could Spencer Pratt's bid for mayor be crumbling?","translation":"CNN在德黑兰现场报道，今早随着更多导弹飞过，伊朗向以色列发出新警告。另外，选举六天后，希望成为洛杉矶英雄的真人秀反派，Spencer Pratt的市长竞选是否正在瓦解？"}],"vocabulary":[{"word":"trade","phonetic":"/treɪd/","pos":"v.","level":"考研","cn":"交换，互相进行","en":"to exchange (something) for something else, typically as a commercial transaction","excerpt":"Israel, Iran Trade Missile Attacks","example_cn":"以色列与伊朗互相发动导弹袭击"},{"word":"target","phonetic":"/ˈtɑːrɡɪt/","pos":"v.","level":"考研","cn":"以...为目标","en":"to select as an object of attention or attack","excerpt":"After Iran Targets Israeli Ramat David Airbase","example_cn":"在伊朗瞄准以色列拉马特戴维空军基地之后"},{"word":"threaten","phonetic":"/ˈθretn/","pos":"v.","level":"考研","cn":"威胁","en":"to state one's intention to take hostile action against (someone) in retribution for something done or not done","excerpt":"Iran Threatens to Block Critical Bab al-Mandab Strait","example_cn":"伊朗威胁封锁关键的曼德海峡"},{"word":"critical","phonetic":"/ˈkrɪtɪkl/","pos":"adj.","level":"考研","cn":"关键的","en":"having a decisive or crucial importance in the success or failure of something","excerpt":"critical Bab al-Mandab Strait","example_cn":"关键的曼德海峡"},{"word":"magnitude","phonetic":"/ˈmæɡnɪtuːd/","pos":"n.","level":"考研","cn":"震级；大小","en":"the great size or extent of something; the degree of brightness of a star","excerpt":"Deadly 7.8 Magnitude Earthquake","example_cn":"致命7.8级地震"},{"word":"fragile","phonetic":"/ˈfrædʒaɪl/","pos":"adj.","level":"考研","cn":"脆弱的","en":"easily broken or damaged","excerpt":"the fragile ceasefire survive this test","example_cn":"脆弱的停火协议经受住这次考验"},{"word":"ceasefire","phonetic":"/ˈsiːsfaɪər/","pos":"n.","level":"六级","cn":"停火","en":"a temporary suspension of fighting, typically one during which peace talks take place","excerpt":"the fragile ceasefire survive this test","example_cn":"脆弱的停火协议经受住这次考验"},{"word":"identify","phonetic":"/aɪˈdentɪfaɪ/","pos":"v.","level":"考研","cn":"识别，确认","en":"to establish or indicate who or what (someone or something) is","excerpt":"Israel says it has identified a wave of missiles","example_cn":"以色列称已识别出一波导弹"},{"word":"retaliatory","phonetic":"/rɪˈtæliətɔːri/","pos":"adj.","level":"六级","cn":"报复性的","en":"relating to or involving retaliation","excerpt":"those retaliatory strikes appear to be in defiance of President Trump","example_cn":"那些报复性袭击似乎是在违抗特朗普总统"},{"word":"defiance","phonetic":"/dɪˈfaɪəns/","pos":"n.","level":"六级","cn":"违抗，蔑视","en":"open resistance; bold disobedience","excerpt":"in defiance of President Trump","example_cn":"违抗特朗普总统"},{"word":"hold off","phonetic":"/hoʊld ɔːf/","pos":"phr.","level":"考研","cn":"推迟，暂缓","en":"to delay or postpone an action","excerpt":"had told him to hold off on striking back","example_cn":"曾告诉他暂缓反击"},{"word":"tension","phonetic":"/ˈtenʃn/","pos":"n.","level":"考研","cn":"紧张局势","en":"the state of being stretched tight; mental or emotional strain","excerpt":"As tensions rise in the Middle East","example_cn":"随着中东紧张局势升级"},{"word":"witness","phonetic":"/ˈwɪtnəs/","pos":"v.","level":"考研","cn":"目睹","en":"to see (an event, typically a crime or accident) take place","excerpt":"what you've witnessed today","example_cn":"你今天目睹了什么"},{"word":"ballistic missile","phonetic":"/bəˈlɪstɪk ˈmɪsaɪl/","pos":"n.","level":"六级","cn":"弹道导弹","en":"a missile that follows a ballistic trajectory","excerpt":"several waves of incoming Iranian ballistic missiles","example_cn":"几波伊朗弹道导弹来袭"},{"word":"barrage","phonetic":"/bəˈrɑːʒ/","pos":"n.","level":"六级","cn":"齐射，弹幕","en":"a concentrated artillery bombardment over a wide area","excerpt":"approximately three barrages in that first wave","example_cn":"第一波大约有三轮齐射"},{"word":"intercept","phonetic":"/ˌɪntərˈsept/","pos":"v.","level":"考研","cn":"拦截","en":"to stop, deflect, or seize (something) on its way from one place to another","excerpt":"most of those have been intercepted","example_cn":"其中大部分已被拦截"},{"word":"escalate","phonetic":"/ˈeskəleɪt/","pos":"v.","level":"六级","cn":"升级","en":"to increase rapidly in intensity or extent","excerpt":"we have seen those progressively escalate","example_cn":"我们看到这些攻击逐步升级"},{"word":"infrastructure","phonetic":"/ˈɪnfrəstrʌktʃər/","pos":"n.","level":"考研","cn":"基础设施","en":"the basic physical and organizational structures and facilities needed for the operation of a society or enterprise","excerpt":"non-energy infrastructure","example_cn":"非能源基础设施"},{"word":"strategic","phonetic":"/strəˈtiːdʒɪk/","pos":"adj.","level":"考研","cn":"战略的","en":"relating to the identification of long-term or overall aims and interests and the means of achieving them","excerpt":"strategic defense systems","example_cn":"战略防御系统"},{"word":"surface-to-air missile","phonetic":"/ˈsɜːrfɪs tuː er ˈmɪsaɪl/","pos":"n.","level":"专四","cn":"地对空导弹","en":"a missile designed to be launched from the ground against airborne targets","excerpt":"Iran's surface-to-air missiles","example_cn":"伊朗的地对空导弹"},{"word":"proxy","phonetic":"/ˈprɑːksi/","pos":"n.","level":"六级","cn":"代理人","en":"a person authorized to act on behalf of another","excerpt":"an Iranian proxy there","example_cn":"伊朗在那里的代理人"},{"word":"volatile","phonetic":"/ˈvɑːlətl/","pos":"adj.","level":"六级","cn":"动荡的，易变的","en":"liable to change rapidly and unpredictably, especially for the worse","excerpt":"a very volatile weekend","example_cn":"一个非常动荡的周末"},{"word":"broker","phonetic":"/ˈbroʊkər/","pos":"v.","level":"六级","cn":"斡旋，促成","en":"to arrange or negotiate (a settlement, deal, etc.)","excerpt":"the latest U.S.-brokered ceasefire","example_cn":"美国斡旋的最新停火协议"},{"word":"red line","phonetic":"/red laɪn/","pos":"n.","level":"六级","cn":"红线，底线","en":"a figurative limit beyond which someone's actions are considered unacceptable","excerpt":"That crossed Israel's red line","example_cn":"这越过了以色列的红线"},{"word":"stronghold","phonetic":"/ˈstrɔːŋhoʊld/","pos":"n.","level":"六级","cn":"据点，堡垒","en":"a place that has been fortified so as to protect it against attack","excerpt":"a Hezbollah stronghold","example_cn":"真主党的据点"},{"word":"sovereignty","phonetic":"/ˈsɑːvrənti/","pos":"n.","level":"六级","cn":"主权","en":"supreme power or authority","excerpt":"exercise Lebanese sovereignty","example_cn":"行使黎巴嫩主权"},{"word":"foothold","phonetic":"/ˈfʊthoʊld/","pos":"n.","level":"六级","cn":"立足点","en":"a secure position from which further progress may be made","excerpt":"its foothold in Lebanon","example_cn":"其在黎巴嫩的立足点"},{"word":"bargaining chip","phonetic":"/ˈbɑːrɡɪnɪŋ tʃɪp/","pos":"n.","level":"六级","cn":"谈判筹码","en":"something used as a lever in negotiations to gain an advantage","excerpt":"use Lebanon as a bargaining chip","example_cn":"利用黎巴嫩作为谈判筹码"},{"word":"rein in","phonetic":"/reɪn ɪn/","pos":"phr.","level":"考研","cn":"控制，约束","en":"to restrain or control (someone or something)","excerpt":"to try to rein in Prime Minister Benjamin Netanyahu","example_cn":"试图约束本雅明·内塔尼亚胡总理"},{"word":"call the shots","phonetic":"/kɔːl ðə ʃɑːts/","pos":"phr.","level":"六级","cn":"发号施令，掌控","en":"to be in charge; to make the important decisions","excerpt":"it is Trump who calls the shots","example_cn":"是特朗普说了算"},{"word":"green light","phonetic":"/ɡriːn laɪt/","pos":"n.","level":"考研","cn":"绿灯，许可","en":"permission to proceed with a project or action","excerpt":"Trump essentially gave this the green light","example_cn":"特朗普基本上开了绿灯"},{"word":"spectrum","phonetic":"/ˈspektrəm/","pos":"n.","level":"考研","cn":"范围，光谱","en":"a range of different positions or opinions between two extreme points","excerpt":"there's a spectrum here of what Trump is allowing of Netanyahu","example_cn":"特朗普允许内塔尼亚胡做什么有一个范围"},{"word":"hedge one's bets","phonetic":"/hedʒ wʌnz bets/","pos":"phr.","level":"六级","cn":"两面下注，规避风险","en":"to reduce the risk of loss by making two or more investments or taking two or more courses of action","excerpt":"he's kind of hedging his bets here","example_cn":"他在这里有点两面下注"},{"word":"choke point","phonetic":"/tʃoʊk pɔɪnt/","pos":"n.","level":"专四","cn":"咽喉要道","en":"a narrow passage that restricts movement or flow","excerpt":"these are so-called choke points","example_cn":"这些是所谓的咽喉要道"},{"word":"carrot and stick","phonetic":"/ˈkærət ænd stɪk/","pos":"phr.","level":"六级","cn":"胡萝卜加大棒，软硬兼施","en":"a combination of reward and punishment to induce compliance","excerpt":"Is it a kind of carrot and stick?","example_cn":"这是一种胡萝卜加大棒吗？"},{"word":"lawsuit","phonetic":"/ˈlɔːsuːt/","pos":"n.","level":"考研","cn":"诉讼","en":"a claim or dispute brought to a court of law","excerpt":"Two Virginia residents have filed a lawsuit","example_cn":"两名弗吉尼亚州居民提起诉讼"}],"sentences":[{"en":"Israel, Iran Trade Missile Attacks After Iran Targets Israeli Ramat David Airbase; Iran Threatens to Block Critical Bab al-Mandab Strait; Deadly 7.8 Magnitude Earthquake Hits Southern Philippines.","cn":"以色列与伊朗互射导弹，此前伊朗袭击以色列拉马特戴维空军基地；伊朗威胁封锁关键曼德海峡；菲律宾南部发生致命7.8级地震。","structure":"并列句，由分号连接三个独立分句。","analysis":"第一个分句主语Israel和Iran，谓语Trade，宾语Missile Attacks，后接After引导的时间状语从句；第二个分句主语Iran，谓语Threatens，不定式to Block作宾语；第三个分句主语Earthquake，谓语Hits，宾语Southern Philippines。"},{"en":"We are following this breaking news out of the Middle East.","cn":"我们正在关注中东的突发新闻。","structure":"主谓宾结构。","analysis":"主语We，谓语are following，宾语this breaking news，介词短语out of the Middle East作定语修饰news。"},{"en":"Israel says it has identified a wave of missiles launched from Iran.","cn":"以色列称已识别出一波从伊朗发射的导弹。","structure":"主谓宾+宾语从句。","analysis":"主语Israel，谓语says，宾语从句it has identified a wave of missiles，过去分词短语launched from Iran作定语修饰missiles。"},{"en":"Now, those retaliatory strikes appear to be in defiance of President Trump, who called Israeli Prime Minister Benjamin Netanyahu and had told him to hold off on striking back.","cn":"这些报复性袭击似乎是在违抗特朗普总统的意愿，他曾致电以色列总理本雅明·内塔尼亚胡，要求他暂缓反击。","structure":"主系表+定语从句。","analysis":"主语those retaliatory strikes，系动词appear，不定式to be in defiance of President Trump作表语；who引导非限制性定语从句修饰President Trump，从句中谓语called和had told并列。"},{"en":"According to Israel's military, most of those have been intercepted.","cn":"据以色列军方称，其中大部分已被拦截。","structure":"简单句，被动语态。","analysis":"介词短语According to Israel's military作状语，主语most of those，谓语have been intercepted。"},{"en":"We saw at the beginning of this war a few months ago that one of the first targets was Iran's surface-to-air missiles, and the idea there is that, if you take those out, then Israel's Air Force has to a large extent, freedom of the skies over Iran.","cn":"几个月前这场战争开始时，我们看到首批目标之一就是伊朗的地对空导弹，其思路是，如果摧毁这些导弹，以色列空军在很大程度上就能获得伊朗上空的自由。","structure":"复合句，包含宾语从句和表语从句。","analysis":"主句We saw，宾语从句that one of the first targets was Iran's surface-to-air missiles；and连接并列句，主语the idea，系动词is，表语从句that...，其中包含if引导的条件状语从句。"},{"en":"And that would also include the U.S. Air Force should this turn into a joint operation.","cn":"如果这演变成联合行动，那也将包括美国空军。","structure":"虚拟条件句，省略if的倒装结构。","analysis":"主句And that would also include the U.S. Air Force，条件状语从句should this turn into a joint operation（相当于if this should turn into...）。"},{"en":"Crucially, this very much looks like it's heating up, and on the escalation ladder, it's also worth noting, Audie, that the Houthis in Yemen; an Iranian proxy there, fired at least, one missile towards Israel several hours ago that was intercepted here.","cn":"关键是，这看起来正在升温，在升级阶梯上，值得注意的是，Audie，也门的胡塞武装——伊朗在那里的代理人——几个小时前向以色列发射了至少一枚导弹，但被拦截。","structure":"并列复合句。","analysis":"第一分句this very much looks like it's heating up；第二分句it's also worth noting that...，其中that引导主语从句，从句主语the Houthis，谓语fired，宾语one missile，后接定语从句that was intercepted here。"},{"en":"We have heard interceptions behind us over Jerusalem.","cn":"我们听到身后耶路撒冷上空有拦截声。","structure":"主谓宾结构。","analysis":"主语We，谓语have heard，宾语interceptions，介词短语behind us over Jerusalem作地点状语。"},{"en":"Iran said last week that if Israel were to carry out an attack, the capital of Beirut, then Iran would directly attack Israel.","cn":"伊朗上周表示，如果以色列对贝鲁特首都发动攻击，伊朗将直接攻击以色列。","structure":"主谓宾+宾语从句，内含虚拟条件句。","analysis":"主语Iran，谓语said，宾语从句that...，从句中包含if引导的虚拟条件句（were to carry out），主句Iran would directly attack Israel。"},{"en":"We saw -- we saw the number of people killed in Israeli strikes in Lebanon, according to the Lebanese Ministry of Public Health, rise above 3,600 since this war began some three months ago.","cn":"我们看到——根据黎巴嫩公共卫生部的数据，自大约三个月前这场战争开始以来，以色列在黎巴嫩袭击中造成的死亡人数已超过3600人。","structure":"主谓宾+宾语补足语。","analysis":"主语We，谓语saw，宾语the number of people，过去分词短语killed in Israeli strikes in Lebanon作定语修饰people，不定式短语rise above 3,600作宾语补足语，since引导时间状语从句。"},{"en":"President Joseph Aoun, who was interviewed by our Christiane Amanpour, he made clear that he is trying to exercise Lebanese sovereignty, and that includes getting some sort of control over Iran's proxy, Hezbollah, and trying to find some sort of agreement that will lead to a withdrawal of Israeli forces from southern Lebanon and make Lebanon more whole.","cn":"接受我们Christiane Amanpour采访的约瑟夫·奥恩总统明确表示，他正在努力行使黎巴嫩主权，包括对伊朗代理人真主党进行某种控制，并试图找到某种协议，导致以色列军队从黎巴嫩南部撤出，使黎巴嫩更加完整。","structure":"复合句，包含定语从句和宾语从句。","analysis":"主语President Joseph Aoun，后接who引导的非限制性定语从句；主句he made clear that...，其中that引导宾语从句，从句谓语is trying to exercise，and连接并列谓语includes和trying，includes后接动名词短语getting...and trying...，trying后接不定式to find，that引导定语从句修饰agreement。"},{"en":"What's crucial here, Audie, is that what happens in Lebanon affects the U.S.-Iran ceasefire.","cn":"关键的是，Audie，黎巴嫩发生的事情会影响美伊停火。","structure":"主语从句+表语从句。","analysis":"主语从句What's crucial here，系动词is，表语从句that what happens in Lebanon affects the U.S.-Iran ceasefire，其中what happens in Lebanon是主语从句。"},{"en":"It is possible that Trump essentially gave this the green light and said, yes, Israel has to respond in some fashion, but keep that response limited.","cn":"有可能特朗普基本上开了绿灯，说，是的，以色列必须以某种方式回应，但保持回应有限。","structure":"形式主语it引导的主语从句。","analysis":"形式主语It，系动词is，表语possible，真正主语that从句，从句中谓语gave和said并列，said后接直接引语，直接引语中but连接两个祈使句。"},{"en":"It's worth remembering here that Trump has forced Netanyahu to end wars in Gaza, Lebanon, and previously in Iran.","cn":"值得记住的是，特朗普曾迫使内塔尼亚胡结束加沙、黎巴嫩以及此前伊朗的战争。","structure":"固定句型。","analysis":"It's worth remembering that...是固定句型，其中that引导宾语从句。"},{"en":"The reason this particular round of strikes kicked off was because the Israelis hit the suburb of Beirut, suburb of Dahiya.","cn":"这一轮特定袭击爆发的原因是以色列袭击了贝鲁特郊区达希耶。","structure":"主系表结构，包含定语从句和表语从句。","analysis":"主语The reason，后接省略关系副词的定语从句this particular round of strikes kicked off，系动词was，表语从句because the Israelis hit...。"},{"en":"So, the reason the Iranians basically came to the defense of the Hezbollah entities there was because Hezbollah is basically Iran's main proxy in the region, and they need Hezbollah in order not only to keep an eye on Israel, but also to potentially mount attacks on Israel.","cn":"所以，伊朗人基本上为那里的真主党实体辩护的原因是真主党基本上是伊朗在该地区的主要代理人，他们需要真主党不仅是为了监视以色列，而且是为了可能对以色列发动攻击。","structure":"主系表结构，包含定语从句和表语从句。","analysis":"主语The reason，后接定语从句the Iranians...came to the defense...，系动词was，表语从句because...，从句中and连接两个并列分句，第二个分句包含not only...but also结构。"},{"en":"Generally-speaking, if the strikes were much more extensive or repeated over a series of days, then that would probably indicate a greater U.S. involvement.","cn":"一般来说，如果打击范围更广或连续几天重复进行，那可能表明美国参与程度更高。","structure":"虚拟条件句。","analysis":"if引导虚拟条件句（were），主句that would probably indicate...。"},{"en":"Prosecutors are alleging that he made more than $400,000 on prediction markets by making trades related to Venezuela before that January raid to capture Maduro.","cn":"检察官指控他在1月抓捕马杜罗的突袭行动之前，通过进行与委内瑞拉相关的交易，在预测市场上获利超过40万美元。","structure":"主谓宾+宾语从句。","analysis":"主语Prosecutors，谓语are alleging，宾语从句that he made...，从句中包含by引导的方式状语和before引导的时间状语。"},{"en":"The suit argues that the claw, built on the White House grounds was not approved by Congress or an environmental review.","cn":"诉讼称，在白宫场地建造的“爪子”未经国会批准或环境审查。","structure":"主谓宾+宾语从句。","analysis":"主语The suit，谓语argues，宾语从句that the claw...was not approved...，过去分词短语built on the White House grounds作定语修饰claw。"}],"topics":[{"title":"以色列与伊朗冲突","content":"以色列和伊朗之间的直接军事对抗，包括导弹袭击和报复行动，涉及地区代理人和战略目标。","keywords":"Israel, Iran, missile attacks, retaliation, ceasefire"},{"title":"拉马特戴维空军基地","content":"以色列北部的一个主要空军基地，伊朗声称对其进行了导弹袭击。","keywords":"Ramat David Airbase, Israel, Iran, target"},{"title":"曼德海峡","content":"连接红海和亚丁湾的关键航道，伊朗威胁封锁以影响全球航运。","keywords":"Bab al-Mandab Strait, choke point, shipping, Iran"},{"title":"菲律宾地震","content":"菲律宾南部发生7.8级地震，造成人员伤亡和建筑倒塌，救援正在进行。","keywords":"Philippines, earthquake, 7.8 magnitude, rescue"},{"title":"真主党与黎巴嫩局势","content":"真主党作为伊朗在黎巴嫩的代理人，与以色列的冲突导致黎巴嫩南部局势紧张，黎巴嫩总统试图维护主权。","keywords":"Hezbollah, Lebanon, proxy, sovereignty, ceasefire"},{"title":"特朗普与内塔尼亚胡关系","content":"美国总统特朗普与以色列总理内塔尼亚胡之间的互动，包括电话外交和公开声明，影响以色列的军事决策。","keywords":"Trump, Netanyahu, phone call, diplomacy, retaliation"},{"title":"胡塞武装与红海威胁","content":"也门胡塞武装作为伊朗代理人，向以色列发射导弹并威胁红海航运，可能扩大地区冲突。","keywords":"Houthis, Yemen, Red Sea, proxy, shipping"},{"title":"石油价格与地缘政治","content":"中东紧张局势导致布伦特原油和WTI原油价格上涨，反映地缘政治风险对能源市场的影响。","keywords":"oil prices, Brent Crude, WTI, geopolitical risk"},{"title":"美国军事介入与撤军","content":"特朗普考虑从中东撤军，但需平衡地区盟友安全与伊朗目标，体现美国军事战略的复杂性。","keywords":"U.S. troops, withdrawal, Middle East, strategy"},{"title":"白宫铁笼格斗赛争议","content":"计划在白宫举行的UFC比赛因法律诉讼面临取消，涉及环境审查、利益冲突等问题。","keywords":"UFC, White House, lawsuit, cage fight, Trump"},{"title":"Graham Platner参选争议","content":"民主党参议院初选候选人Graham Platner面临前女友指控，但仍被看好赢得初选。","keywords":"Graham Platner, Senate primary, allegations, Maine"},{"title":"预测市场与内幕交易","content":"美军特种部队士兵因在预测市场上押注抓捕马杜罗行动而被指控，涉及内幕交易和金融犯罪。","keywords":"prediction markets, insider trading, Maduro, special forces"}],"raw_transcript":"Return to Transcripts main page\n\nIsrael, Iran Trade Missile Attacks After Iran Targets Israeli Ramat David Airbase; Iran Threatens to Block Critical Bab al-Mandab Strait; Deadly 7.8 Magnitude Earthquake Hits Southern Philippines. Aired 5-5:30a ET\n\nAired June 08, 2026 - 05:00   ET\n\nTHIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED.\n\nANNOUNCER: This is CNN Breaking News!\n\nAUDIE CORNISH, ANCHOR, CNN THIS MORNING: We are following this breaking news out of the Middle East. Israel and Iran trading missile attacks, and the fragile ceasefire survive this test. Good morning, everybody, I'm Audie Cornish.\n\nWe're going to start with the strikes that have happened in the last few hours. Israel says it has identified a wave of missiles launched from Iran. New video into CNN overnight showing damage inside a home in the West Bank.\n\nNow, this follows Israeli strikes on an Iranian petrochemical plant. The IDF saying that it hit several targets at that complex. Now, those retaliatory strikes appear to be in defiance of President Trump, who called Israeli Prime Minister Benjamin Netanyahu and had told him to hold off on striking back.\n\nAs tensions rise in the Middle East, so do oil prices. Both Brent Crude and WTI Crude up this morning. We've got live team coverage throughout the region. And we're going to start in Jerusalem with CNN's Oren Liebermann. Oren, first, can you just give us the latest on the strikes, what you've witnessed today?\n\nOREN LIEBERMANN, CNN JERUSALEM BUREAU CHIEF: We have seen and heard several waves of incoming Iranian ballistic missiles since about 10:00 or 11 O'clock at night here local time. So, this has been going on for several hours. There were approximately three barrages in that first wave.\n\nAnd then we have seen a few subsequent waves of incoming Iranian ballistic missiles. According to Israel's military, most of those have been intercepted. At first, they said all of those -- but when we followed up after what appeared to be some Iranian video of missiles getting through, they said it only applied to an earlier wave.\n\nSo, we're waiting to see if there is an update there. Meanwhile, Iran's military said they targeted the Ramat David Air Force Base in northern Israel. Israel has responded with its own attacks, and we have seen those progressively escalate from what Israel's ambassador to the U.S. described as attacks on surface-to-surface missiles and non-energy infrastructure to the strike.\n\nYou mentioned on the petrochemical facility in western Iran. And then just an hour-and-a-half ago or so, the Israeli military said they carried out strikes against what they called strategic defense systems that would open up the skies to the Israeli Air Force if it moves in that direction.\n\nWe saw at the beginning of this war a few months ago that one of the first targets was Iran's surface-to-air missiles, and the idea there is that, if you take those out, then Israel's Air Force has to a large extent, freedom of the skies over Iran.\n\nAnd that would also include the U.S. Air Force should this turn into a joint operation. Obviously, that's something we're watching very closely. Crucially, this very much looks like it's heating up, and on the escalation ladder, it's also worth noting, Audie, that the Houthis in Yemen; an Iranian proxy there, fired at least, one missile towards Israel several hours ago that was intercepted here.\n\nWe have heard interceptions behind us over Jerusalem. We have seen warnings of incoming missiles in several other areas across the country. Here, as both Israel and Iran have indicated and publicly stated that they are prepared for at least days of this to continue.\n\nCORNISH: You talked about that escalation ladder, and we have been hearing for weeks about Israel's sort of move into southern Lebanon as it goes after Hezbollah. We have the President of Lebanon here -- I want to play this clip so you can help us understand how these things intersect. Here he is.\n\nJOSEPH AOUN, PRESIDENT, LEBANON: Our people being killed, our people being -- our houses being destroyed. They are using Lebanon as a chip -- bargaining chip in their negotiation with the United States. It's unacceptable.\n\nCORNISH: So, he was speaking there about Tehran. Can you talk about their most recent strike in southern Lebanon, why it triggered this escalation?\n\nLIEBERMANN: Well, Iran said last week that if Israel were to carry out an attack, the capital of Beirut, then Iran would directly attack Israel. And that's what we saw happen over what was a very volatile weekend between Israel and Hezbollah.\n\nWe saw -- we saw the number of people killed in Israeli strikes in Lebanon, according to the Lebanese Ministry of Public Health, rise above 3,600 since this war began some three months ago. And then, even since the latest U.S.-brokered ceasefire which was just several days ago, we saw Hezbollah carry out an attack on northern Israel.\n\n[05:05:00] That crossed Israel's red line, and Israel then carried out a strike\n\non the Dahiya neighborhood in Beirut, which is considered a Hezbollah stronghold. Iran then carried out its threat or carried out on its threat launching those ballistic missiles on Sunday night directly at Israel.\n\nAnd that has led us to where we are right now. President Joseph Aoun, who was interviewed by our Christiane Amanpour, he made clear that he is trying to exercise Lebanese sovereignty, and that includes getting some sort of control over Iran's proxy, Hezbollah, and trying to find some sort of agreement that will lead to a withdrawal of Israeli forces from southern Lebanon and make Lebanon more whole.\n\nThe problem is, you have an Israeli government that isn't in a position and doesn't want to withdraw from southern Lebanon now. You have an Iranian government that sees Hezbollah as its foothold in Lebanon, Hezbollah rejected the latest iteration of the -- of the ceasefire there.\n\nAnd that puts the President Joseph Aoun in a very difficult situation. His Lebanese Armed Forces don't have the power and perhaps don't have the will to carry out any serious action against Hezbollah, even as he has tried to outlaw and ban Hezbollah's military activity.\n\nWhat's crucial here, Audie, is that what happens in Lebanon affects the U.S.-Iran ceasefire. Iran knows that. They know that President Donald Trump wants to get to a deal, and they're able to try to use Hezbollah and to some extent, use Lebanon as a bargaining chip to pressure Trump to try to rein in Prime Minister Benjamin Netanyahu when it comes to Lebanon.\n\nCORNISH: Is there any chance of doing that? I think a lot of people are looking at these actions and thinking about how the President has spoken to Netanyahu, talked about taking down the temperature. What's the view in Israel about how Trump has been talking?\n\nLIEBERMANN: Trump made a number of public statements, or rather, gave a number of interviews to reporters in which he said it is Trump who calls the shots, not Netanyahu, saying he would -- he would urge Israel not to retaliate or delay Israel's retaliation.\n\nThat's at least, the public part of the messaging. What we don't really know, and this is the key question for us to have a much better sense of what's happening here is, what was the phone call like between Trump and Netanyahu?\n\nIt is possible that Trump essentially gave this the green light and said, yes, Israel has to respond in some fashion, but keep that response limited. It's also possible that Trump told Israel not to respond, and Netanyahu is acting on his own here, though I think that's unlikely, given how much Netanyahu needs Trump to be on his side, and has never sort of publicly criticized him.\n\nSo, there's a spectrum here of what Trump is allowing of Netanyahu. It's worth remembering here that Trump has forced Netanyahu to end wars in Gaza, Lebanon, and previously in Iran. And I think right now, it's still the expectation that Trump will do that once again.\n\nThe question is when and how. For that, Trump needs to essentially get the day started in D.C., so, we can learn more about what's happening behind the scenes. Audie.\n\nCORNISH: That's right, we're waking up here in Washington, Oren Liebermann talking to us from Jerusalem. Our breaking news coverage continues after the break on CNN THIS MORNING. We're going to talk about under what circumstance would Trump consider bringing U.S. troops home? His answer next. Plus, a deadly quake hits in the Philippines. The urgent search for survivors.\n\nCORNISH: Breaking news this morning. Israel and Iran trading strikes in the worst escalation since the ceasefire agreement in April. We just heard from our CNN's Oren Liebermann in Jerusalem, where there are sounds of sirens and explosions after the interception of missiles.\n\nA U.S. official told CNN that President Trump urged Israeli Prime Minister Benjamin Netanyahu to hold off on retaliating against Iran. So, joining us to talk more about the military strategy here is retired Air Force Colonel and CNN military analyst Cedric Leighton. Good morning.\n\nSo, first, I want to talk about this escalation because people may be hearing about the back-and-forth between Israel and Hezbollah for many weeks. Why did this particular round of strikes kick off?\n\nCEDRIC LEIGHTON, CNN MILITARY ANALYST: Yes, good morning, Audie. The reason this particular round of strikes kicked off was because the Israelis hit the suburb of Beirut, suburb of Dahiya. That's where Hezbollah has its main headquarters. And there are a lot of Hezbollah personnel for lack of a better term, in the Dahiya neighborhood.\n\nSo, the reason the Iranians basically came to the defense of the Hezbollah entities there was because Hezbollah is basically Iran's main proxy in the region, and they need Hezbollah in order not only to keep an eye on Israel, but also to potentially mount attacks on Israel.\n\nSo, every time that there is destruction to Hezbollah, Iran sees this as not only destruction of Hezbollah, but also of their own forces, even though they are absolutely separate. So, this is, in essence, what's going on.\n\nThey decided -- the Iranians decided that it was time to respond to the Israeli attacks, and especially one as blatant as the one on Dahiya, in their view. And the reason they did that is because they want the ceasefire to cover not just Iran, but also the Lebanese territory, where the Israelis have conducted repeated actions against Hezbollah.\n\nCORNISH: You talked about proxies, and then this also brings me to the Houthis in Yemen, because there's some reporting there that they were saying they wanted to prevent shipping through the Red Sea, which sounds very familiar to those of us who have been hearing about Iran preventing shipping through the Strait of Hormuz. Does this threaten broader conflict? Are we seeing hints of that?\n\nLEIGHTON: Yes, there's definitely the possibility that this could widen into a bigger regional conflict, at least. So, on the eastern side of the Arabian Peninsula, you have the Strait of Hormuz, which is the area that we've been talking about for quite some time.\n\nAnd then on the western side, you have what's known as the Bab al- Mandab, and that is that very narrow point between the Red Sea as it empties out into the Indian Ocean. So, this is an area where these are so-called choke points.\n\nAnd every time those are cut off, that impacts global shipping, global trade. And it means that prices go up, oil becomes scarcer. And that creates the economic issues that we're seeing in a lot of the world right now.\n\nCORNISH: We hear President Trump framing the U.S. involvement more as precaution, not escalation. I want to play for you something that happened on \"NBC's\" \"Meet the Press\". This was before all of this news about this escalation. But here it is.\n\nUNIDENTIFIED FEMALE: If you're not specifically calling it a war, would you consider sending some of the troops who are stationed there, who were sent because of Operation Epic Fury --\n\nDONALD TRUMP, PRESIDENT OF THE UNITED STATES: You mean boots on the ground --\n\nUNIDENTIFIED FEMALE: There at home? No --\n\nTRUMP: Are you talking --\n\nUNIDENTIFIED FEMALE: Would you consider sending them home if it's not technically a war?\n\nTRUMP: We don't need as many troops. I think you just -- like it's on the -- to err on the side of caution.\n\nCORNISH: What are we looking at? Is it a kind of carrot and stick? Meaning the U.S. is doing the negotiating, but Israel is leaning hard on the military pressure?\n\nLEIGHTON: Well, potentially so. You know, it's interesting when you look at President Trump's remarks, they -- you know, on the one hand, he's kind of hedging his bets here. He does, you know, admit to the possibility of withdrawing some of the troops that are in the Middle East.\n\nAnd I think what he's referring to, are the troops that came in, in addition to the ones that were already stationed in the Middle East. So, what he doesn't want to do is withdraw completely from the region, which is actually Iran's goal.\n\nSo, if he withdrew completely from the region, that would satisfy Iran. But it wouldn't protect the Arab Gulf states like Saudi Arabia, Qatar, the UAE, Kuwait and Bahrain. So, that becomes a critical point right here.\n\nHe, in essence, really can't withdraw if he -- if he doesn't want to show weakness. And that becomes, I think, the critical point right here.\n\nCORNISH: One more thing. We know that these strikes started back earlier in the year. They were U.S.-Israeli joint strikes, the U.S. gives a lot of military support, Intelligence support to Israel. So, could what we're seeing right now even happen without U.S. support.\n\nLEIGHTON: It could. And the reason I think we see limited strikes in the western and central parts of Iran, at least so far, is because the Israelis do have a capability to conduct those strikes on their own. They have their own refueling capability, although it's somewhat limited compared to what the U.S. can offer.\n\nGenerally-speaking, if the strikes were much more extensive or repeated over a series of days, then that would probably indicate a greater U.S. involvement. There may be some U.S. involvement, but it is absolutely possible that these strikes are occurring without direct U.S. involvement at the moment.\n\nCORNISH: OK, that's Colonel Cedric Leighton, thank you for your insight. Appreciate you. After the break on CNN THIS MORNING, our breaking news coverage continues.\n\nUNIDENTIFIED MALE: To turn this on Israel, it would be a bit of a joke. Iran is the one that decided to break the truce.\n\nCORNISH: President Trump urged Israel not to retaliate. We're going to talk about that more. Plus, Trump's cage fight just days away. Could it get knocked out before round one? There's a new lawsuit looking to stop it.\n\nCORNISH: It's now 23 minutes past the hour. Here are five things making the news this morning. Democratic Senate primary candidate Graham Platner held an event in Maine in front of an enthusiastic and cheering crowd just two days before the primary. He declared he is very much just some random guy from Sullivan, Maine.\n\nGRAHAM PLATNER, SENATE PRIMARY CANDIDATE: In a moment like this in history, if we can show that a regular person from the regular world who simply comes out with a message saying that we all have to work together to push back against all of the structures of power that have been exploiting and oppressing us for generations.\n\nIf we show that, that works, we get to show this country the way forward.\n\nCORNISH: Platner is still favored to win Tuesday's primary, despite the \"New York Times\" publishing a report from three of Platner's ex- girlfriends describing, quote, \"volatile and toxic relationships\". And in one account, physical intimidation. Platner has denied that.\n\nAs New York is set to host the NBA finals and President Trump tonight, security concerns have been heightened after six people were hurt in a stabbing at Penn station. Officials say one of the victims suffered serious injuries, the others suffered non-life-threatening injuries.\n\nThe suspect is in custody. And there was a deadly 7.8 magnitude earthquake in the Philippines. Video from the area is showing you here, massive damage, crumbling buildings and several people were killed. Rescues are currently underway.\n\nAnd then in just a few hours, the U.S. special forces soldier charged with betting on the raid to capture Nicolas Maduro will appear in court. Gannon Ken Van Dyke is due for a status hearing in Manhattan federal court.\n\nProsecutors are alleging that he made more than $400,000 on prediction markets by making trades related to Venezuela before that January raid to capture Maduro. In a cage fight on President Trump's birthday this weekend is in danger of being knocked out.\n\nTwo Virginia residents have filed a lawsuit to stop the UFC fight at the White House. The suit argues that the claw, built on the White House grounds was not approved by Congress or an environmental review.\n\nIt also cited that UFC is selling VIP packages of more than a million dollars. And they argue that due to Trump's stock in UFC, he would profit off the fight. The fight is scheduled for this Saturday. And our breaking news coverage continues next.\n\nCNN is on the ground in Tehran with their new warning to Israel this morning as more missiles fly. Plus, six days after the elections, the reality TV villain hoping to be the hero for L.A., could Spencer Pratt's bid for mayor be crumbling?","segments":[{"seg":1,"url":"https://transcripts.cnn.com/show/ctmo/date/2026-06-08/segment/01","title":"CNN.com - Transcripts","text":"Return to Transcripts main page\n\nIsrael, Iran Trade Missile Attacks After Iran Targets Israeli Ramat David Airbase; Iran Threatens to Block Critical Bab al-Mandab Strait; Deadly 7.8 Magnitude Earthquake Hits Southern Philippines. Aired 5-5:30a ET\n\nAired June 08, 2026 - 05:00   ET\n\nTHIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED.\n\nANNOUNCER: This is CNN Breaking News!\n\nAUDIE CORNISH, ANCHOR, CNN THIS MORNING: We are following this breaking news out of the Middle East. Israel and Iran trading missile attacks, and the fragile ceasefire survive this test. Good morning, everybody, I'm Audie Cornish.\n\nWe're going to start with the strikes that have happened in the last few hours. Israel says it has identified a wave of missiles launched from Iran. New video into CNN overnight showing damage inside a home in the West Bank.\n\nNow, this follows Israeli strikes on an Iranian petrochemical plant. The IDF saying that it hit several targets at that complex. Now, those retaliatory strikes appear to be in defiance of President Trump, who called Israeli Prime Minister Benjamin Netanyahu and had told him to hold off on striking back.\n\nAs tensions rise in the Middle East, so do oil prices. Both Brent Crude and WTI Crude up this morning. We've got live team coverage throughout the region. And we're going to start in Jerusalem with CNN's Oren Liebermann. Oren, first, can you just give us the latest on the strikes, what you've witnessed today?\n\nOREN LIEBERMANN, CNN JERUSALEM BUREAU CHIEF: We have seen and heard several waves of incoming Iranian ballistic missiles since about 10:00 or 11 O'clock at night here local time. So, this has been going on for several hours. There were approximately three barrages in that first wave.\n\nAnd then we have seen a few subsequent waves of incoming Iranian ballistic missiles. According to Israel's military, most of those have been intercepted. At first, they said all of those -- but when we followed up after what appeared to be some Iranian video of missiles getting through, they said it only applied to an earlier wave.\n\nSo, we're waiting to see if there is an update there. Meanwhile, Iran's military said they targeted the Ramat David Air Force Base in northern Israel. Israel has responded with its own attacks, and we have seen those progressively escalate from what Israel's ambassador to the U.S. described as attacks on surface-to-surface missiles and non-energy infrastructure to the strike.\n\nYou mentioned on the petrochemical facility in western Iran. And then just an hour-and-a-half ago or so, the Israeli military said they carried out strikes against what they called strategic defense systems that would open up the skies to the Israeli Air Force if it moves in that direction.\n\nWe saw at the beginning of this war a few months ago that one of the first targets was Iran's surface-to-air missiles, and the idea there is that, if you take those out, then Israel's Air Force has to a large extent, freedom of the skies over Iran.\n\nAnd that would also include the U.S. Air Force should this turn into a joint operation. Obviously, that's something we're watching very closely. Crucially, this very much looks like it's heating up, and on the escalation ladder, it's also worth noting, Audie, that the Houthis in Yemen; an Iranian proxy there, fired at least, one missile towards Israel several hours ago that was intercepted here.\n\nWe have heard interceptions behind us over Jerusalem. We have seen warnings of incoming missiles in several other areas across the country. Here, as both Israel and Iran have indicated and publicly stated that they are prepared for at least days of this to continue.\n\nCORNISH: You talked about that escalation ladder, and we have been hearing for weeks about Israel's sort of move into southern Lebanon as it goes after Hezbollah. We have the President of Lebanon here -- I want to play this clip so you can help us understand how these things intersect. Here he is.\n\nJOSEPH AOUN, PRESIDENT, LEBANON: Our people being killed, our people being -- our houses being destroyed. They are using Lebanon as a chip -- bargaining chip in their negotiation with the United States. It's unacceptable.\n\nCORNISH: So, he was speaking there about Tehran. Can you talk about their most recent strike in southern Lebanon, why it triggered this escalation?\n\nLIEBERMANN: Well, Iran said last week that if Israel were to carry out an attack, the capital of Beirut, then Iran would directly attack Israel. And that's what we saw happen over what was a very volatile weekend between Israel and Hezbollah.\n\nWe saw -- we saw the number of people killed in Israeli strikes in Lebanon, according to the Lebanese Ministry of Public Health, rise above 3,600 since this war began some three months ago. And then, even since the latest U.S.-brokered ceasefire which was just several days ago, we saw Hezbollah carry out an attack on northern Israel.\n\n[05:05:00] That crossed Israel's red line, and Israel then carried out a strike\n\non the Dahiya neighborhood in Beirut, which is considered a Hezbollah stronghold. Iran then carried out its threat or carried out on its threat launching those ballistic missiles on Sunday night directly at Israel.\n\nAnd that has led us to where we are right now. President Joseph Aoun, who was interviewed by our Christiane Amanpour, he made clear that he is trying to exercise Lebanese sovereignty, and that includes getting some sort of control over Iran's proxy, Hezbollah, and trying to find some sort of agreement that will lead to a withdrawal of Israeli forces from southern Lebanon and make Lebanon more whole.\n\nThe problem is, you have an Israeli government that isn't in a position and doesn't want to withdraw from southern Lebanon now. You have an Iranian government that sees Hezbollah as its foothold in Lebanon, Hezbollah rejected the latest iteration of the -- of the ceasefire there.\n\nAnd that puts the President Joseph Aoun in a very difficult situation. His Lebanese Armed Forces don't have the power and perhaps don't have the will to carry out any serious action against Hezbollah, even as he has tried to outlaw and ban Hezbollah's military activity.\n\nWhat's crucial here, Audie, is that what happens in Lebanon affects the U.S.-Iran ceasefire. Iran knows that. They know that President Donald Trump wants to get to a deal, and they're able to try to use Hezbollah and to some extent, use Lebanon as a bargaining chip to pressure Trump to try to rein in Prime Minister Benjamin Netanyahu when it comes to Lebanon.\n\nCORNISH: Is there any chance of doing that? I think a lot of people are looking at these actions and thinking about how the President has spoken to Netanyahu, talked about taking down the temperature. What's the view in Israel about how Trump has been talking?\n\nLIEBERMANN: Trump made a number of public statements, or rather, gave a number of interviews to reporters in which he said it is Trump who calls the shots, not Netanyahu, saying he would -- he would urge Israel not to retaliate or delay Israel's retaliation.\n\nThat's at least, the public part of the messaging. What we don't really know, and this is the key question for us to have a much better sense of what's happening here is, what was the phone call like between Trump and Netanyahu?\n\nIt is possible that Trump essentially gave this the green light and said, yes, Israel has to respond in some fashion, but keep that response limited. It's also possible that Trump told Israel not to respond, and Netanyahu is acting on his own here, though I think that's unlikely, given how much Netanyahu needs Trump to be on his side, and has never sort of publicly criticized him.\n\nSo, there's a spectrum here of what Trump is allowing of Netanyahu. It's worth remembering here that Trump has forced Netanyahu to end wars in Gaza, Lebanon, and previously in Iran. And I think right now, it's still the expectation that Trump will do that once again.\n\nThe question is when and how. For that, Trump needs to essentially get the day started in D.C., so, we can learn more about what's happening behind the scenes. Audie.\n\nCORNISH: That's right, we're waking up here in Washington, Oren Liebermann talking to us from Jerusalem. Our breaking news coverage continues after the break on CNN THIS MORNING. We're going to talk about under what circumstance would Trump consider bringing U.S. troops home? His answer next. Plus, a deadly quake hits in the Philippines. The urgent search for survivors.\n\nCORNISH: Breaking news this morning. Israel and Iran trading strikes in the worst escalation since the ceasefire agreement in April. We just heard from our CNN's Oren Liebermann in Jerusalem, where there are sounds of sirens and explosions after the interception of missiles.\n\nA U.S. official told CNN that President Trump urged Israeli Prime Minister Benjamin Netanyahu to hold off on retaliating against Iran. So, joining us to talk more about the military strategy here is retired Air Force Colonel and CNN military analyst Cedric Leighton. Good morning.\n\nSo, first, I want to talk about this escalation because people may be hearing about the back-and-forth between Israel and Hezbollah for many weeks. Why did this particular round of strikes kick off?\n\nCEDRIC LEIGHTON, CNN MILITARY ANALYST: Yes, good morning, Audie. The reason this particular round of strikes kicked off was because the Israelis hit the suburb of Beirut, suburb of Dahiya. That's where Hezbollah has its main headquarters. And there are a lot of Hezbollah personnel for lack of a better term, in the Dahiya neighborhood.\n\nSo, the reason the Iranians basically came to the defense of the Hezbollah entities there was because Hezbollah is basically Iran's main proxy in the region, and they need Hezbollah in order not only to keep an eye on Israel, but also to potentially mount attacks on Israel.\n\nSo, every time that there is destruction to Hezbollah, Iran sees this as not only destruction of Hezbollah, but also of their own forces, even though they are absolutely separate. So, this is, in essence, what's going on.\n\nThey decided -- the Iranians decided that it was time to respond to the Israeli attacks, and especially one as blatant as the one on Dahiya, in their view. And the reason they did that is because they want the ceasefire to cover not just Iran, but also the Lebanese territory, where the Israelis have conducted repeated actions against Hezbollah.\n\nCORNISH: You talked about proxies, and then this also brings me to the Houthis in Yemen, because there's some reporting there that they were saying they wanted to prevent shipping through the Red Sea, which sounds very familiar to those of us who have been hearing about Iran preventing shipping through the Strait of Hormuz. Does this threaten broader conflict? Are we seeing hints of that?\n\nLEIGHTON: Yes, there's definitely the possibility that this could widen into a bigger regional conflict, at least. So, on the eastern side of the Arabian Peninsula, you have the Strait of Hormuz, which is the area that we've been talking about for quite some time.\n\nAnd then on the western side, you have what's known as the Bab al- Mandab, and that is that very narrow point between the Red Sea as it empties out into the Indian Ocean. So, this is an area where these are so-called choke points.\n\nAnd every time those are cut off, that impacts global shipping, global trade. And it means that prices go up, oil becomes scarcer. And that creates the economic issues that we're seeing in a lot of the world right now.\n\nCORNISH: We hear President Trump framing the U.S. involvement more as precaution, not escalation. I want to play for you something that happened on \"NBC's\" \"Meet the Press\". This was before all of this news about this escalation. But here it is.\n\nUNIDENTIFIED FEMALE: If you're not specifically calling it a war, would you consider sending some of the troops who are stationed there, who were sent because of Operation Epic Fury --\n\nDONALD TRUMP, PRESIDENT OF THE UNITED STATES: You mean boots on the ground --\n\nUNIDENTIFIED FEMALE: There at home? No --\n\nTRUMP: Are you talking --\n\nUNIDENTIFIED FEMALE: Would you consider sending them home if it's not technically a war?\n\nTRUMP: We don't need as many troops. I think you just -- like it's on the -- to err on the side of caution.\n\nCORNISH: What are we looking at? Is it a kind of carrot and stick? Meaning the U.S. is doing the negotiating, but Israel is leaning hard on the military pressure?\n\nLEIGHTON: Well, potentially so. You know, it's interesting when you look at President Trump's remarks, they -- you know, on the one hand, he's kind of hedging his bets here. He does, you know, admit to the possibility of withdrawing some of the troops that are in the Middle East.\n\nAnd I think what he's referring to, are the troops that came in, in addition to the ones that were already stationed in the Middle East. So, what he doesn't want to do is withdraw completely from the region, which is actually Iran's goal.\n\nSo, if he withdrew completely from the region, that would satisfy Iran. But it wouldn't protect the Arab Gulf states like Saudi Arabia, Qatar, the UAE, Kuwait and Bahrain. So, that becomes a critical point right here.\n\nHe, in essence, really can't withdraw if he -- if he doesn't want to show weakness. And that becomes, I think, the critical point right here.\n\nCORNISH: One more thing. We know that these strikes started back earlier in the year. They were U.S.-Israeli joint strikes, the U.S. gives a lot of military support, Intelligence support to Israel. So, could what we're seeing right now even happen without U.S. support.\n\nLEIGHTON: It could. And the reason I think we see limited strikes in the western and central parts of Iran, at least so far, is because the Israelis do have a capability to conduct those strikes on their own. They have their own refueling capability, although it's somewhat limited compared to what the U.S. can offer.\n\nGenerally-speaking, if the strikes were much more extensive or repeated over a series of days, then that would probably indicate a greater U.S. involvement. There may be some U.S. involvement, but it is absolutely possible that these strikes are occurring without direct U.S. involvement at the moment.\n\nCORNISH: OK, that's Colonel Cedric Leighton, thank you for your insight. Appreciate you. After the break on CNN THIS MORNING, our breaking news coverage continues.\n\nUNIDENTIFIED MALE: To turn this on Israel, it would be a bit of a joke. Iran is the one that decided to break the truce.\n\nCORNISH: President Trump urged Israel not to retaliate. We're going to talk about that more. Plus, Trump's cage fight just days away. Could it get knocked out before round one? There's a new lawsuit looking to stop it.\n\nCORNISH: It's now 23 minutes past the hour. Here are five things making the news this morning. Democratic Senate primary candidate Graham Platner held an event in Maine in front of an enthusiastic and cheering crowd just two days before the primary. He declared he is very much just some random guy from Sullivan, Maine.\n\nGRAHAM PLATNER, SENATE PRIMARY CANDIDATE: In a moment like this in history, if we can show that a regular person from the regular world who simply comes out with a message saying that we all have to work together to push back against all of the structures of power that have been exploiting and oppressing us for generations.\n\nIf we show that, that works, we get to show this country the way forward.\n\nCORNISH: Platner is still favored to win Tuesday's primary, despite the \"New York Times\" publishing a report from three of Platner's ex- girlfriends describing, quote, \"volatile and toxic relationships\". And in one account, physical intimidation. Platner has denied that.\n\nAs New York is set to host the NBA finals and President Trump tonight, security concerns have been heightened after six people were hurt in a stabbing at Penn station. Officials say one of the victims suffered serious injuries, the others suffered non-life-threatening injuries.\n\nThe suspect is in custody. And there was a deadly 7.8 magnitude earthquake in the Philippines. Video from the area is showing you here, massive damage, crumbling buildings and several people were killed. Rescues are currently underway.\n\nAnd then in just a few hours, the U.S. special forces soldier charged with betting on the raid to capture Nicolas Maduro will appear in court. Gannon Ken Van Dyke is due for a status hearing in Manhattan federal court.\n\nProsecutors are alleging that he made more than $400,000 on prediction markets by making trades related to Venezuela before that January raid to capture Maduro. In a cage fight on President Trump's birthday this weekend is in danger of being knocked out.\n\nTwo Virginia residents have filed a lawsuit to stop the UFC fight at the White House. The suit argues that the claw, built on the White House grounds was not approved by Congress or an environmental review.\n\nIt also cited that UFC is selling VIP packages of more than a million dollars. And they argue that due to Trump's stock in UFC, he would profit off the fight. The fight is scheduled for this Saturday. And our breaking news coverage continues next.\n\nCNN is on the ground in Tehran with their new warning to Israel this morning as more missiles fly. Plus, six days after the elections, the reality TV villain hoping to be the hero for L.A., could Spencer Pratt's bid for mayor be crumbling?"}]},"2026-06-07":{"date":"2026-06-07","source_url":"https://transcripts.cnn.com/show/ctmo/date/2026-06-07/segment/01","raw_transcript":"Return to Transcripts main page\n\nPolice Search For Suspects After 12 Shot Near Ohio Festival; Missing American Student Found Dead In Japan After Dayslong Search; U.S. And Iran Exchange Strikes, Peace Talks At Stalemate; Pakistan Delegation Arrives In Tehran For Peace Talks; Iran Demands U.S. Unfreeze $24 Billion In Iranian Assets; Trump: War With Iran Will Be Over Soon; Pope Leo Leads Holy Mass On Second Day Of Trip To Spain; State Rests In Karmelo Anthony Murder Trial, Defense Continues Monday; Trump To Attend Game Three Of The NBA Finals; World Cup Security In Focus As Host Cities Prepare For Crowds; Mexico City Sports Fans Attempt Record For Largest Wave. World Cup Kickoff Nears As Fans Bring Energy Worldwide; 1 Killed, Several Hurt In Suspected Terror Attack In Israel; Friday Marks 10 Years Since Mass Shooting At Gay Club; Thousands Without Power Across Northeast; \"UFC At The White House\" Airs Tonight At 8PM ET/PT On CNN. Aired 6-7a ET\n\nAired June 07, 2026 - 06:00   ET\n\nTHIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED.\n\nVICTOR BLACKWELL, CNN ANCHOR: Welcome to CNN THIS MORNING. Here's what's happening now. Police are on the hunt for at least two people who started shooting at each other at a festival. Twelve people were hurt in the process.\n\nUNIDENTIFIED FEMALE: We went to the restroom in the church, and then we just heard shooting. Like shooting. We thought maybe it was fireworks.\n\nBLACKWELL: What we know about the conditions of the victims and how this all started. In Japan, search and rescue volunteers have now found the body of that missing American student. New details are coming of what we're learning about where he was found, and what we're hearing from his family.\n\nAlso, Pope Leo just held the first mass of his trip to Spain. Our Chris Lamb was there and has more on the pope's message.\n\nVINCE VELAZQUEZ, RETIRED ATLANTA POLICE OFFICER: The fans are going to come here and enjoy this World Cup experience and not have an idea of all the security measures that are going on.\n\n(END VIDEO CLIP) BLACKWELL: The World Cup kicks off in just a few days and security, you know, will be tight in cities hosting matches. A look at the preparations and which teams are early favorites.\n\nIt's Sunday, June 7th. Welcome to a brand new week. I'm Victor Blackwell. Good to have you along.\n\nHappening now, police are searching for two suspects after at least 12 people were shot. This happened at a festival in Toledo, Ohio. Here's the moment that sparked the chaos there. Watch.\n\nNow, police say the two shooters appeared to have been shooting at each other. Neither suspect is in custody. Twelve people were hurt in the crossfire, two of them critically. All of them are expected to survive.\n\nNow, police say they spoke to victims ages 14 to 61. Investigators said that they were shocked by what they saw.\n\nDAN GERKEN, INVESTIGATIVE LT. TOLEDO POLICE: As far as violence, this is over the top, right? So, 12 people being shot. That's the most I've been to a scene. I've been to a lot of scenes. But this is -- this is way over the top.\n\nBLACKWELL: Now police are asking people to avoid the area while they continue this investigation, but they want to hear from people if they have any information. Also to send in cellphone video from the scene. The shooting is just one of at least 170 mass shootings in the U.S. so far this year.\n\nSearch and rescue volunteers have now found the body of an Auburn University student who was missing during a family vacation in Japan. James Weston Higginbotham disappeared after leaving his family to explore parts of Kyoto on his own after a disagreement with his mother. CNN's Hanako Montgomery has more.\n\nHANAKO MONTGOMERY, CNN CORRESPONDENT: This is an extremely tragic end to a dayslong search for Weston Higginbotham. His mother, Nancy,
