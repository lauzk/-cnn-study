t the gator was safely returned to a nearby bayou.\n\nWell, that does it for CNN HEADLINE EXPRESS. I'm Brad Smith. CNN THIS MORNING with Audie Cornish starts right now.\n\nAUDIE CORNISH, CNN ANCHOR: There are polls opening up right at this moment in Maine. Today in the group chat, should Graham Platner be the Democrat on the ballot in November, even if he wins today's primary?\n\nUNIDENTIFIED FEMALE: The most important thing in this election is unseating Susan Collins.\n\nCORNISH: Donald Trump becomes the first sitting president to attend an NBA finals game, and the home team blows a 13-game winning streak. Coincidence?\n\nUNIDENTIFIED FEMALE: I yelled for help and that's -- Thank God for them. You know, because I (EXPLETIVE DELETED) made it.\n\nCORNISH: There are flood waters on the rise in the Midwest. The harrowing rescue tales this morning as waters recede.\n\nAnd a private jet bursts into a massive fireball during an emergency crash landing. The investigation into what went wrong this morning.\n\nBRAD PAISLEY, COUNTRY SUPERSTAR: That they want to build next to the Nashville Zoo, which is an absolute nightmare scenario. (END VIDEO CLIP)\n\nCORNISH: That's country superstar Brad Paisley, speaking out against a proposed data center near the Nashville Zoo. Could it pose a threat to the thousands of animals there?\n\nAnd the World Cup starts this week. Could money and greed overshadow the beautiful game?\n\nUNIDENTIFIED MALE: Senegal-France game, it's almost like $2,000 ticket. That's outrageous. That's outrageous.\n\nCORNISH: So, people here in New York waking up -- I don't know -- in a foul mood, maybe pointing fingers after the Knicks lose a much-hyped game three of the NBA finals.\n\nGood morning, everybody. Good morning to New York. I'm Audie Cornish.\n\nYou know, when you mix sports and politics, you do so at your own peril. For instance, here's Stephen A. Smith before last night's tipoff at the Garden.\n\nSTEPHEN A. SMITH, SPORTS BROADCASTER: If the New York Knicks lose game three, this is on Donald Trump.\n\nYou think I've been on him before? I'm going to be on his ass like back pockets. Like white on rice. He got no business doing this. He doesn't belong at this game. No president does. None of them. Democrat, Republican, independent. I don't give a damn.\n\nCORNISH: So, the president, who is a New Yorker, showed up anyway. And that's not unusual. Trump has attended the Super Bowl, the U.S. Open, college football national championship. He's now the first sitting president to attend the NBA finals.\n\nBut now, the Knicks' 13-game playoff winning streak is over. And Knicks fans, well, this is what they're saying about it.\n\nUNIDENTIFIED MALE: -- right there.\n\nUNIDENTIFIED MALE: I wanted the Knicks to win this game. Trump just had to bring his ass down.\n\nUNIDENTIFIED MALE: He's a jinx. It's like the goat in Chicago. He freaking jinxed everything.\n\nCORNISH: OK, today in the group chat, we've got Brianna Lyman, reporter for \"The Federalist\"; and Christine Quinn, executive committee chair for the New York state Democratic committee.\n\nSports people are very superstitious. Let's just say that. There was this tweet from Ron Filipkowski: \"I'm not an expert on jinxes, hexes, curses, and voodoo. Not superstitious either, but if I was the Knicks, I probably wouldn't let Trump near the arena for game four, just to be on the safe side.\"\n\nWhat was the point of this for Trump?\n\nBRIANNA LYMAN, REPORTER, \"THE FEDERALIST\": Well, I think Trump has been a lifelong Knicks fan. There are pictures of him with Marla Maples, with Melania Trump in the '90s and early 2000s. So, this is someone who probably is rooting for the same team he's been rooting for, for decades.\n\nCORNISH: Yes. This is the argument from Whoopi Goldberg. She said --\n\nCORNISH: -- the same thing. Trump --\n\nLYMAN: She defended him.\n\nCORNISH: -- and Mamdani are Knicks fans. They've been New Yorkers.\n\nCORNISH: You can't tell them what they're not going to do.\n\nI think the thing I found interesting is Trump is very much our sports president.\n\nCORNISH: Has been. Obama was an NBA guy. And he didn't go to games, because he said it creates too much of a problem for the fans.\n\nCHRISTINE QUINN, EXECUTIVE COMMITTEE CHAIR, NEW YORK STATE DEMOCRATIC COMMITTEE: Absolutely. Look, I live on the west side of Manhattan. It was a mess yesterday.\n\nCORNISH: I was about to say, how are you here?\n\nQUINN: Exactly, exactly. It was a total mess. Fans had to get there at least two hours early. There didn't get to be a watch party right outside the Garden.\n\nI -- I get that he may be a fan, but you have to really appreciate when you're president, you're not just popping in and popping out. You're putting a whole bunch of people out. And in this case, he was a jinx. There is no question about it.\n\nLYMAN: Mamdani could have been the jinx.\n\nCORNISH: Completely like, he was a jinx. Christine Quinn, jinx expert.\n\nCORNISH: Put that under your name.\n\nWell, here's the thing. The reason why I'm asking about this is not just because it's funny, but also because one of the things people are accusing the administration of being in this moment, when there's economic difficulty for people, is tone deaf.\n\nThe idea that, look, we're here, the regular schmoes who want to be involved in this thing, and he comes and just says, kind of let them eat cake, right? You can watch it on TV.\n\nAnd was -- what was the sort of -- I understand he's a fan, but does that contribute to the tone-deaf narrative?\n\nLYMAN: Oh, I don't think this was tone-deaf at all. I think, first of all, a lot of those tickets, I mean, some of them are going for thousands of dollars. I think I saw one ticket price at $7,000.\n\nLYMAN: And the people who were buying them and who were courtside were a lot of people very popular among the left and celebrities, right? And I don't --\n\nCORNISH: Did they have motorcades and massive security. Or --\n\nLYMAN: No, but those are the same people who, for four years, lectured us that things were fine under Joe Biden. So, they also could be considered tone-deaf.\n\nBut I think the president -- politics is obviously very hostile, but sports is one of those last remaining arenas where people do put politics aside. I do --\n\nCORNISH: Let me play for you the reception Trump got.\n\nLYMAN: I know he got booed.\n\nCORNISH: I just want to play it.\n\nLYMAN: Because it's also New York City.\n\nCORNISH: Because it's -- it's Madison Square Garden. He is the New Yorker of New Yorkers.\n\nCORNISH: And this is how people reacted.\n\n(BEGIN VIDEO CLIP) DONALD TRUMP, U.S. PRESIDENT: It was amazing actually. You mean when they had the camera on me? I thought it was very good. Yes, it was certainly amazing. It was -- it was, I think, mostly cheers. It was --\n\nCORNISH: Cari Champion here, CNN contributor and host of the \"Flagrant and Funny\" podcast. We had to bring in a little bit of an expert, because we're political people. We don't know. We know about jinxes.\n\nCARI CHAMPION, CNN CONTRIBUTOR: Yes.\n\nCORNISH: We know about hoaxes. We don't know when politics and sports clash --\n\nCORNISH: -- What is the outcome? It's just New York. New York wasn't voting for Trump, en masse, anyway. But is this a problem?\n\nCHAMPION: Listen, well, first of all, you said, you know, people in sports normally I hear you say that normally they don't really care so much about politics. They absolutely cared about politics.\n\nThis is such a rare moment for New Yorkers. People have waited their entire lives. The last time they won a ship (Ph) was 1973.\n\nCORNISH: Yes. But isn't that why the president of the United States, who is a New Yorker, would want to be there?\n\nCHAMPION: No. In fact, you should not want to be there, because you want to keep that same momentum going.\n\nYou know, New York is such a rare place. I've never seen fans like this before in my entire life, and they deserve to have this moment. And it was supposed to be uninterrupted, meaning we were supposed to have our watch parties around MSG. We were supposed to be in that moment.\n\nAnd I do believe -- and you know, the great Stephen A. Smith said just the other day --\n\nCORNISH: Yes, we played him earlier.\n\nCHAMPION: You played him? So, he fully blames him. But. So that was the -- that was the vibe.\n\nCORNISH: You can't be the cooler, Brianna. You can't be on a streak and then have someone come in and cool the street.\n\nCORNISH: That's not political.\n\nCHAMPION: He was the cooler.\n\nCORNISH: I'm saying cooler. Let me play one more thing. Tommy Vietor, \"Pod Save America\" host. Obviously, these are Obama guys. But they're talking about the power of sports and why politicians would want to be involved. Here's that.\n\nTOMMY VIETOR, HOST, \"POST SAVE AMERICA\": He knows the power of live professional sports. And that's the only, like, kind of mono cultural events we really have left. That's why he goes to a lot of games. Usually, it's the NFL. He went to the Super Bowl.\n\nUsually he's more welcome in those, you know, sort of Southern NFL spaces. I -- I don't think he will be here. I mean, he's also buddies with James Dolan, I think, the owner of the Knicks.\n\nUNIDENTIFIED MALE: Always pals with the owners.\n\nUNIDENTIFIED MALE: Not a real player guy.\n\nVIETOR: Yes. No. But like, look, he loves the limelight. He loves every spotlight. And he will attempt to co-opt this one, too.\n\nCORNISH: Just that word. Corrupt -- co-opt. We know that he loves sports. UFC Claw rising like a phoenix on the lawn.\n\nCHAMPION: I don't know if he -- do you really think? I don't think he loves sports. I --\n\nCORNISH: He's always been. He's been going to ringside games and matches.\n\nCHAMPION: No sitting -- no sitting president has ever attended a finals. Right?\n\nLook, Barack loved NBA, as you pointed out.\n\nCHAMPION: And he went to a few games, but he would never do that. One, it's on our dime. Two, it disrupts everything that goes on while you're there.\n\nAnd yes, UFC is a different thing for him in terms of for Donald Trump. That's more of his fan base. That's where he lives. That's where people love to see him. He has, obviously, the relationship with Dana. So, when we see him at the NBA finals, it really throws off everything\n\nthat people wanted to be a part of. It changes the --\n\nCORNISH: Yes, it'll be interesting to see if any of this comes down on Dolan, who obviously --\n\nCORNISH: -- has some interesting --\n\nCHAMPION: Like, why invite?\n\nCORNISH: Renovating Penn Station. And there's a bunch of questions there about that relationship that I wonder if people are going to probe more now that they are -- I don't know -- angry.\n\nCORNISH: Being from Boston, let me tell you, I know to keep my mouth shut. I'm not messing with no New York fans, because I'm trying to live out a long, happy life.\n\nAll right. Coming up on CNN THIS MORNING, we're going to talk about L.A. now. It looks like Spencer Pratt might be out in that mayoral race. The former reality TV star finding he's falling behind. So, was the red wave in L.A. just a splash?\n\nPlus, the queen ready for her return. Serena Williams back on the tennis court today. Why now?\n\nAnd then were going to talk about Hunter Biden trying to reclaim the narrative. Is it working?\n\nHUNTER BIDEN, FORMER PRESIDENT JOE BIDEN'S SON: I know there's going to be a lot of haters, and a lot of trolls, and a lot of people saying really, really awful things. But I've heard it all before. It doesn't even faze me.\n\nCORNISH: It is now 15 minutes past the hour. This is your morning roundup.\n\nSam Bankman-Fried, who orchestrated one of the world's largest financial frauds, wants a pardon.\n\nThe co-founder and CEO of the crypto exchange FTX was convicted on multiple counts of fraud and conspiracy. And in fact, he's serving a 25-year prison sentence. He officially applied for a pardon, according to the Justice Department.\n\nBut back in January, Trump told \"The New York Times\" he would not pardon Bankman-Fried.\n\nAnd two people confirmed dead after a private jet crashed while attempting to land in the Dominican Republic. The plane blew up in flames after skidding across the runway.\n\nOfficials say the pilot and copilot, both U.S. nationals, died. No passengers were on board.\n\nAnd the Nashville Zoo pushing back on a proposal to build a nearly 70,000-square-foot data center right on the edge of its property.\n\nCountry music star, Nashville resident Brad Paisley, trying to drum up support for a petition against the project.\n\nPAISLEY: Let's stop it. We don't have to do this here. Build them somewhere else. But let's keep Nashville as beautiful and as -- as great an attraction as it's always been.\n\nCORNISH: D.C. Blocks, the company behind the proposal, assures there would be no health risks to the residents or the animals.\n\nAnd don't call it a comeback. Today, the GOAT, Serena Williams, officially coming out of retirement. The 44-year-old will play a doubles match at the Queens Club Championships alongside a Canadian teenager.\n\nWhen asked why now, she told reporters why not? Now is the best time for her and her family.\n\nI have to take this to Cari Champion. What is your thesis on the coming back?\n\nCHAMPION: So, I love how she's like, she's preparing us. She's managing us. She's managing upwards, as they would say.\n\nCORNISH: Managing the expectations.\n\nCHAMPION: Exactly. She says, oh, it's just for my kids to see me play.\n\nI totally believe that. But I think she, like Allyson Felix, like Lindsey Vonn had done. Everyone's prepping for the Olympics. My theory is that she's like, yes, I'll work my way to playing singles.\n\nCORNISH: Hey, don't say Lindsey Vonn, then. I mean --\n\nCHAMPION: Well, not in that way. But she came out of retirement.\n\nCORNISH: Yes, yes. CHAMPION: All of these women are coming out of retirement, because they're meeting the expectations of guess what? So what if I'm 40? So, what if I'm 40 plus?\n\nCHAMPION: I'm still going to play. I still have the desire.\n\nCORNISH: I thought she did it because she saw big sis on the court and was like, you know what? I miss it.\n\nCHAMPION: I know. I mean --\n\nCORNISH: I have a sister so I feel like that's what would happen.\n\nCHAMPION: That might be a little bit of it, but I have a feeling she'll play the Olympics.\n\nCORNISH: Well, listen, I want her kid to see her play, too.\n\nCORNISH: Shout-out to Olympia. OK.\n\nAfter the break on CNN THIS MORNING, prediction markets and pro sports. Is it time for new rules to protect players and the integrity of the games?\n\nPlus, there is dangerous flooding. There's also efforts to rescue people from rising waters.\n\nWe're going to be going live to Mexico City, as well, which will host their first World Cup match two days from now. Mexico versus South Africa.\n\nPAT MCAFEE, ESPN SPORTS ANALYST: We are getting a ruling just one day after the NCAA basically comes out and says, This guy's not allowed. OK? This is not -- we're not doing this. This judge comes out and says, Actually, can play.\n\nCORNISH: All right. As the sports world grapples with the world of sports gambling and prediction markets, a new ruling is sending shock waves through college football.\n\nThe NCAA ruled Texas Tech quarterback Brendan Sorsby was ineligible after placing more than $90,000 in bets on college sports, and that includes 40 bets on his own team when he played at Indiana. Now, a federal judge has overruled all of that. The judge,\n\nconveniently based in Texas Tech's hometown of Lubbock, argued that Sorsby will suffer, quote, \"probable, imminent and irreparable injury\" if he's not able to play for the Red Raiders this year.\n\nAnd the chairman of the NCAA calls the decision a glaring integrity threat. He wants Congress to pass a new bill which would allow them to enforce their gambling restrictions, adding, quote, \"It's needed now more than ever.\"\n\nI want to note here that CNN has a partnership with Kalshi, a prediction market.\n\nAnd I'm bringing in Randall Williams, sports business reporter at Bloomberg.\n\nI wanted to talk to you, because as we are having this conversation about betting in general --\n\nRANDALL WILLIAMS, SPORTS BUSINESS REPORTER, BLOOMBERG NEWS: Sure.\n\nCORNISH: -- there is this push to regulate harder prediction markets. What's the difference between betting in a prediction market and betting with DraftKings or regular sports betting book at Vegas?\n\nWILLIAMS: Sure. So, let's say sports gambling is more \"I'm putting money into a sports book\" than \"I'm going to get that money right back.\"\n\nIn Kalshi and Polymarket, it's derivative based. And so, what the offerings of Kalshi and Polymarket have seen, you've been able to bet on Gatorade. You've been able to bet on the Gatorade color after a team wins a Super Bowl. You've been able to --\n\nCORNISH: Strikes in Iran.\n\nCORNISH: Capturing Maduro.\n\nWILLIAMS: All of these things are very, very manipulative because of the fact that people will seek out information in order to make a ton of money. That's called insider trading.\n\nAnd so, from a sports perspective, the last thing that you want, especially after all of these years of sports gambling with the MLB, with the NBA, with the NFL. We've seen suspensions across all of them in different cases and even at the federal level, as well. They're trying to get a handle on these things.\n\nWILLIAMS: Now, different leagues have different approaches. Some are partnering with them and trying to say, Hey, if we don't partner with them, then they're going to run rampant. Others are saying, not so fast. CORNISH: Yes.\n\nWILLIAMS: We want to see what happens first.\n\nCORNISH: So, to your point, the MLB has a data sharing agreement again, because they're trying to catch bad actors.\n\nCORNISH: I've been paying attention to this story, because we've actually talked here at CNN to, like, college-age adults. There was one story where the student said, the ads got me, and he was talking about prediction markets specifically.\n\nHe says, \"Predictions absolutely mean gambling. And frankly, I'm surprised you loopholed this so well to allow someone like me to gamble on this stuff.\"\n\nThis is what he was writing in his comments.\n\nCORNISH: \"A hundred percent should be banned before my -- before more kids like me use it, because God knows they shouldn't.\"\n\nNow, there's a couple of things that the sports leagues have written to federal regulators asking for: raising the betting age from 18 to 21.\n\nCORNISH: A ban on waging on your own team. We just talked about that in the introduction. Ban over/under bets on fouls and injuries, getting injured.\n\nCORNISH: And then mandatory fan conduct rules. What's going on there?\n\nWILLIAMS: Well, first of all, multifaceted. As far as the betting age, when you think about if you're on TikTok, if you're on ESPN, if you're on NBC, there are so many betting ads; and there's even betting sections of the shows.\n\nAs far as the kids themselves, when you're watching these things, whether it be Pat McAfee, whether it be \"First Take,\" whether it be \"SportsCenter,\" whether it be from FS1 and FOX, you're going to see so much of it that you're going to be like, well, why not?\n\nCORNISH: How bad could it be?\n\nWILLIAMS: How bad could it be? And then, it's like, you win once. Now you're chasing that thrill. And that can be a very addictive process. So, from the league perspective, they're like, OK, let's try to push\n\nthis until their brain is a little bit more fully developed, and then they can make their own decisions.\n\nBut the reality is the floodgates of gambling are already open. When you accept money, this is a possibility, and people are going to try to win a lot of it.\n\nCORNISH: So, Donald Trump actually was just posting about this on Truth Social, where he said, \"It's critically important that the CFTC's exclusive authority over prediction markets is maintained and that they will thrive.\"\n\nCan you talk about where he's coming down on this issue and where that compares to what the leagues are asking?\n\nWILLIAMS: Well, I think what President Trump is asking, I think is more impartial to or more partial to the fact that Kalshi and Polymarket have things that are outside of sports offering.\n\nYou mentioned some of the Iran war strikes. You mentioned when President Maduro was -- was captured. If you can bet on some of those things, like who's to say that doesn't leak and compromise an operation?\n\nAnd so, he is trying to get a hold on and say, hey, we have some things going on at the federal level that are a serious issue. I think those things run in line with some of the sports offerings, as well.\n\nBut it remains to be seen how well the sports world and President Trump will work together on these, because President Trump was at the Knicks game yesterday. He's also targeted the NFL for the Sports Broadcasting Act and trying to see if -- if you know, the district -- excuse me, the distribution among streamers and traditional broadcasters is too wide.\n\nSo, I think they are walking in the same path, but just at different paces.\n\nCORNISH: Do you have a question? You were looking.\n\nCHAMPION: No, I was just really curious, like, why is that his business?\n\nWILLIAMS: President Trump's?\n\nWILLIAMS: I think it's his business because of the fact that he just doesn't want leaks out there. He doesn't want to be known as the president who had insider trading at all of these different things that were going on that were a result of him. So, if someone's going to be making money from his operations, he wants it to be himself or the people around him.\n\nCORNISH: Well, I -- I should say -- we should note there is currently, I think, a U.S. service member who is facing --\n\nCORNISH: -- charges for allegedly placing wagers, contracts in prediction markets over the when and where of Maduro. So, it feels like these things are just now sort of entering the judicial system --\n\nCORNISH: -- where a lot of it will be hashed out.\n\nRandall, I want to let you go. But before I do, Knicks. Are you -- where are you on Trump as cooler or Knicks just had a bad night?\n\nWILLIAMS: Oh, I believe President Trump absolutely cursed the Knicks.\n\nCORNISH: Strong language. All day.\n\nWILLIAMS: Listen, I've been to several events that President Trump has attended: UFC events. I was at the Super Bowl that he attended, and all of them had different results.\n\nBut this one, I was like, I don't think he should go to this one just because of the fact that they were riding high. And now he shows up, and we see what happens.\n\nCHAMPION: Cooler. Yes.\n\nCORNISH: OK, the word from Bloomberg business. Local man says. No.\n\nStraight ahead on CNN THIS MORNING, it's primary day in Maine. We want to talk about that. Can voters there get over the scandals weighing down Democrat Graham Platner's campaign?\n\nPlus, a U.S. Army helicopter goes down in the Middle East. President Trump will be giving an update on the crew on board."},{"seg":2,"url":"https://transcripts.cnn.com/show/ctmo/date/2026-06-09/segment/02","title":"CNN.com - Transcripts","text":"Return to Transcripts main page\n\nJamie Harrison is Interviewed about the Platner Controversies; Trump Claims California Elections are Rigged; Hunter Biden Steps Back into Public. Aired 6:30-7a ET\n\nAired June 09, 2026 - 06:30   ET\n\nTHIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED.\n\nUNIDENTIFIED FEMALE: I'm a Democrat, but I don't feel like he's going to be my choice.\n\nUNIDENTIFIED FEMALE: I don't want Susan Collins to win. And I think that maybe Janet Mills has a greater chance of beating Susan than Graham did.\n\nAUDIE CORNISH, CNN ANCHOR: So, voting is underway for primary day in Maine. Democrats choosing between Graham Platner or Janet Mills, who is still on the ballot. We're going to talk about that more in a moment.\n\nGood morning, everybody. I'm Audie Cornish. And thank you for joining me on CNN THIS MORNING.\n\nIt is now half past the hour. And here's what's happening right now.\n\nPresident Trump saying pilots are OK after a report of an Apache helicopter going down near the Strait of Hormuz. \"The New York Times\" reported that two crew members had to be rescued. The president says he plans to release more detail about what happened later today.\n\nChinese President Xi Jinping wrapping up his two-day visit in North Korea with leader Kim Jong-un.\n\nIt's been seven years since Xi's last visit. He's called for deepening, quote, \"strategic cooperation\" with North Korea.\n\nAnd intense flash flooding hits Missouri, with multiple people needing to be rescued from their homes and cars. We're talking about four to six inches of rain falling on parts of the state on Monday. And it did trigger an emergency.\n\nUNIDENTIFIED FEMALE: We pretty much just woke up to our whole house completely full of water.\n\nUNIDENTIFIED MALE: We're screwed. I mean, there's no really -- no other way to put it.\n\nCORNISH: Local officials are saying that it remains unclear exactly how many people were impacted by the floods.\n\nAnd some polls are now open in Maine, one of four states holding primaries today. Voters will decide who will go head-to-head in a race that could decide which party controls the Senate. Graham Platner is essentially running unopposed after his primary rival, Governor Janet Mills, suspended her campaign. But here's the thing, she's still on the ballot and votes for her will still count. Platner is seeking to overcome a wave of scandal, including claims of knowingly getting a Nazi tattoo and allegations of inappropriate behavior with past girlfriends, all of which he has denied. Democrats are wondering if his past will derail their chances to unseat Republican Susan Collins in November.\n\nUNIDENTIFIED FEMALE: I don't like it.\n\nBut if he votes the way I want him to, and he can defeat Susan Collins, yes, go for it.\n\nUNIDENTIFIED FEMALE: The truth is, is the Nazi tattoo should have been enough.\n\nUNIDENTIFIED FEMALE: If his wife can deal with it, who am I to argue?\n\nUNIDENTIFIED FEMALE: The problems that are facing Maine and this country are too serious for us to focus on this purity politics kind of stuff.\n\nUNIDENTIFIED FEMALE: I'm definitely voting for him. I, honestly, I would vote for a doorknob over Susan Collins.\n\nCORNISH: Joining me now, Jamie Harrison, former chair of the former Democratic National Committee.\n\nJamie, thank you so much for being here.\n\nI wanted you to be here because this race has gotten so much attention. Platner was recruited by people who weren't the Democratic Party, right?\n\nJAMIE HARRISON, FORMER DEMOCRATIC NATIONAL COMMITTEE CHAIR: Yes.\n\nCORNISH: And now we've seen a lot of questions as a result.\n\n\"The Wall Street Journal\" actually interviewed the people who recruited him, and they said, did you vet this guy? What questions did you ask? How do you feel about it with the controversies now? Here's how they replied.\n\nDANIEL MORAFF, SENIOR STRATEGIST, Platner CAMPAIGN: I think, if what the voters wanted were people who were grown in vats and had never done or said anything that they might regret their entire lives, we'd have a very different country. Part of our thesis here is that people do not want their candidates grown in vats. They want people who are real human beings, and they want people who do not look and sound like the vat-grown people who have been leading this country off a cliff for the last century. And that was Graham.\n\nCORNISH: What side of the argument are you on here?\n\nHARRISON: Well, my apologies for being in this little, small phone booth in an American Airlines lounge, Audie.\n\nBut listen, the bottom line is this. I supported Governor Janet Mills because I thought she was the strongest candidate in the race. And I can tell you, if I were voting in Maine today, she would still get my vote.\n\nBut the Democratic voters will --\n\nCORNISH: But can you address the argument that they're saying? Like, they -- we're seeing this more and more. Mamdani is a great example.\n\nCORNISH: People who are entering and they don't enter with the permission, so to speak, of the DNC or anyone from any formal organization.\n\nHARRISON: Well, but this is the thing. When you -- when you don't go through the regular process, then you get problems and issues like we have now, folks who aren't properly vetted, folks whose backgrounds have a lot of issues and problems in it that that jeopardize whether or not you win in the general election.\n\nI get and understand the frustration of going through the party filter sometimes. I totally get that as someone who's been a state party chair and the national chair. But at -- but there's a level of quality checks that, when you go through that process, you understand what you are getting in the end, instead of this wild card now. And then, you know, there are folks who are hand-wringing and trying to figure out how they support the candidate or not.\n\nIn the end of the day, you know, Graham Platner becomes the nominee because Mainers in the Democratic primary vote for him. This will be a contest between Graham Platner and Susan Collins. And we know what we get with Susan Collins. Her legacy is tied to Supreme Court confirmations that have fundamentally changed the country.\n\nCORNISH: Well, Jamie, let me stop you there, because we also just heard a voter say that they'd rather vote for a doorknob than Collins. So, you don't have to sell it on election day.\n\nBut it is seen as one of a pickup opportunity.\n\nCORNISH: You said you're a supporter of Mills. She suspended her campaign.\n\nBut she's not all the way gone, right?\n\nCORNISH: Like, not formally withdrawn.\n\nHere's what she told \"The Portland Press.\" And I think she was saying that, \"people have the impression that I 'withdrew' or 'dropped out,' but I simply suspended active campaigning. And I'm still on the ballot.\"\n\nSo, then Senator John Fetterman weighs in on why he thinks she may not be connecting with voters.\n\nSEN. JOHN FETTERMAN (D-PA): In was a setting --\n\nMANU RAJU, CNN CHIEF CONGRESSIONAL CORRESPONDENT: She's the sitting governor and upstanding as a -- as a committed Democrat, you know. And it seems like the only thing wrong with her is she happens to be 78. So --\n\nCORNISH: He's talking about age as a factor. Can you talk about whether or not people, do you think, will be writing her in today or will be checking her name off, since she's still on the ballot, or is that wishful thinking?\n\nHARRISON: No, I think people would. I mean, if I were voting in Maine today, that's who I would be voting for as well. And that's the problem that I have with some parts of the Democratic Party at this point. It is -- you know, they can look past every other flaw but age, right? If you're an older Democrat, then that -- that is the fundamental flaw that everything else breaks down.\n\nBut in the end of the day, what people want is, somebody's going to fight for them regardless of their age. Someone who has experience, who can be effective in terms of legislating. And Janet Mills has that proven record. And it's a shame that, you know, the chattering class was all in for someone who has all these flaws. And we knew it from the start.\n\nBut in the end, again, you know, regardless of what happens in this primary, it's about the general election.\n\nCORNISH: Well one -- yes, it is.\n\nHARRISON: And it's between Susan Collins and likely Graham Platner. Yes.\n\nCORNISH: Thank you for being on. This is a fascinating race, especially since it was voters, right, in polling who put Platner so far ahead. And I'm going to be interested to see what kind of lessons Democrats take from this.\n\nJamie, thank you for your time. Good luck catching your flight.\n\nCORNISH: And tonight at 8 Eastern, CNN has live coverage of some of these key primaries across the country. And you can watch them on CNN or on the CNN app.\n\nIn California, former reality star Spencer Pratt is out in the Los Angeles mayoral election. The CNN decision desk projects that Nithya Raman will advance to the general election to take on incumbent Karen Bass. In the governor's race, the CNN decision desk projects that Democrat Xavier Becerra will advance to November. Republican Steve Hilton is holding a lead for second.\n\nCalifornia's elections often take days to get resolved because postmarked mail-in ballots, received up to a week after election day, can still be counted, again, as long as they are postmarked on election day.\n\nThis has fueled President Trump's claims that the California elections are rigged. There is no evidence provided for that. Steve Hilton told CNN's Erin Burnett last night that's not what he's seeing.\n\nSTEVE HILTON (R), CALIFORNIA GUBERNATORIAL CANDIDATE: We've got teams standing by, lawyers standing by, and actually, it's the same answer that actually I've been giving for a few days now. We've seen nothing that would give us cause to intervene in that way.\n\nCORNISH: I want to bring it back to the group chat.\n\nWe've got this sort of thing where, again, you've got the leading Republican in the statewide race saying, I actually think it's going pretty well, probably because he's second. But we also saw Trump blow up at Kristen Welker at NBC for getting -- specifically on this issue, which is crazy considering they were talking about Iran and a variety of other things.\n\nWhy do you think this issue has captured the imagination, especially on the right? Like, why are people looking at these two races and saying, aha, indicative of nationwide problems?\n\nBRIANNA LYMAN, REPORTER, \"THE FEDERALIST\": Well, I think it's fair skepticism for voters to look at a place like Los Angeles, for example. And you see that on election night, Spencer Pratt was up by about eight to 10 points. And when you went to bed, he was up by eight to 10 points. The next morning --\n\nCORNISH: And that's what the percentage of vote counted being 28 percent, 35 percent.\n\nCORNISH: Just as a reporter, you're not looking at the full count.\n\nLYMAN: Sure. Sure. So, traditionally, Americans, for decades, have expected to receive results on election night. That has not been the same for probably the past six years, really, with Covid starting, people began to expect a delay in results. But for a lot of Americans, they expect results on election night. And I think that there are Americans who say, look, a week after this election, a week after Nithya Raman, she gave a speech that even CSPAN characterized as a concession speech. She almost publicly dismissed any possibility for a path forward.\n\nLYMAN: So, you put that into play. And then you see all these ballot drops, which tend to favor Nithya Raman even over Karen Bass, especially when Nithya Raman actually underperformed in her own city council district.\n\nI do think it's fair for people just to say, a week later suddenly the guy who was in second place on the night of the election, there are some questions --\n\nCORNISH: So, let me bring in someone who's run a mayoral race and may have some thoughts about why you give a concession speech when there's only x amount of percentage of the ballots counted.\n\nWas that a mistake? Can you talk about the dynamics at play here?\n\nCHRISTINE QUINN, EXEC. COMMITTEE CHAIR, NY STATE DEMOCRATIC COMMITTEE: I mean the way it works in California is very different than a lot of other states. The way you can mail in ballots. And one thing we see in California is the ballots that come in later tend to be Democratic ballots, which is not a surprise.\n\nCORNISH: Yes. But then so why wouldn't Raman be like, hey, everyone chill.\n\nQUINN: I thought it was strange.\n\nQUINN: I thought it was strange that she gave that kind of a speech, as opposed to, let's all wait and see.\n\nQUINN: I think she missed the mark and probably got, you know, I think it -- look, election night is crazy. And if you're not winning, clearly you just want it to end and be over.\n\nCARI CHAMPION, HOST, \"FLAGRANT AND FUNNY\": That is what I thought. I thought the narrative got to her.\n\nQUINN: Yes, I think that's right.\n\nCHAMPION: I think that's what happened. I think the narrative of perhaps this Spencer Pratt being someone that people were really excited about, and it's usually those who can't vote for mayor in L.A.\n\nCHAMPION: Because I am a California resident. I vote --\n\nCORNISH: Yes, he was the internet's mayor for a week.\n\nCORNISH: Mamdani was the internet's mayor last fall.\n\nCHAMPION: Exactly. Exactly.\n\nCORNISH: Won our hearts with vigorous use of A.I.\n\nWhen I look at the L.A. voter breakdown, he was winning areas, you're talking about Westside, Pacific Palisades, which makes sense. He was fighting for their issue around rebuilding after the fires.\n\nCORNISH: You've got Karen Bass getting south of L.A., south of Santa Monica Freeway. Nithya Raman, Echo Park, Hollywood, to Highland Park.\n\nCHAMPION: Makes sense.\n\nCORNISH: The reason why it -- yes, it makes sense, right, for California here.\n\nCHAMPION: It makes perfect sense.\n\nCORNISH: I think the reason why I wanted to ask is because we're in this weird situation now where we're like, oh, this heavily Democratic city went to Democrats. Scandal. Skepticism. You know what I mean? And I feel like when I look at the Texas race, I'm not like, there should be bigger numbers here for the DSA. It's like, well, it kind of is breaking down the way the overall voter rolls break down.\n\nQUINN: And it's interesting for the president to be kind of so, you know, animated, to put it mildly, about the mayor's race when in the governor's race you're probably most likely going to have a Republican and a Democrat. So --\n\nCHAMPION: Yes, which is why Hilton's like, it's fine to me. No big deal.\n\nQUINN: Exactly. Exactly.\n\nCHAMPION: Everything looks good here.\n\nCORNISH: How will people -- I just want to give the last word to you, Brianna, because you are bringing this up. We're in a moment where you've got several states fighting Trump and fighting his DOJ on having to turn over their voter rolls. The administration has a new initiative where they say, look, states, we want everybody's unredacted voter rolls, names, birth dates, all the things. We're going to check it against a database we have. And there are some states who are saying, yes, and some states that are like, wait, that's not legal. Under the Constitution, states deal with voter rolls. Is his talking about California really about this fight?\n\nLYMAN: Well, I think so. And actually, when it comes to voter rolls, so under HAV (ph) and HAVA, which are 2001 and 2004 election, federal election laws, states do have to comply with federal election voter roll audits.\n\nLYMAN: California is one of those states that said, I am not going to comply. And I do think there is reason for people to question California's audit rules (ph).\n\nFor example, in California, you're supposed to provide your driver's license identification number and your Social Security Number when registering to vote, which neither one of them necessarily guarantees a check citizenship, but it's a pretty decent check. But in California, if you are unable to provide either of those documents, you can actually provide proof of identity to register to vote with something as simple as a gym membership.\n\nLYMAN: What kind of you, you know, rigger roll (ph) do you go through?\n\nCORNISH: And so far they have not reported widespread fraud when they've done their audits.\n\nLYMAN: Well, they're also not -- they 're also -- right, but they're also not letting the federal government check their audits. So, I think that's a concern that people have.\n\nCORNISH: Absolutely. And I think -- the reason why I'm not addressing it now is because it's before the courts, right?\n\nCORNISH: Actively asking whether or not the government has the right to ask for it.\n\nCORNISH: And the extent of information they do, and to use that to check against a database with known flaws, right? Because then you're kicking people off the rolls based on a database that isn't working so well.\n\nSo, this story is not going to go away.\n\nCORNISH: Even though it sounds like it's just about California's races.\n\nNext on CNN THIS MORNING, Hunter Biden has been out talking a lot, and now he's really clapping back. We're going to ask why? Why now?\n\nUNIDENTIFIED MALE: We can't afford it. We can't -- we'd rather stay home and just watch the game.\n\nCORNISH: Staggering prices. The ugly cost of the beautiful game.\n\nUNIDENTIFIED MALE: Hunter Biden, my guy, a natural born poster, a beacon of light in a dark world.\n\nUNIDENTIFIED MALE: Hunter Biden is proof that you can't hurt somebody's feelings if they are 100 percent honest about who they are.\n\nUNIDENTIFIED FEMALE: When they go low, we go Hunter Biden. And I will not be explaining any further.\n\nCORNISH: I can't do better than that. Hunter Biden has entered the chat. The son of the former president, Joe Biden, has become the clapback king online after reactivating his X account. His posts are a mix of political attacks, hitting back at critics, personal reflection and addressing his past addictions and controversies.\n\nHUNTER BIDEN: I know there's going to be a lot of haters, a lot of trolls, a lot of people saying really, really awful things. But I've heard it all before. It doesn't even faze me. I promise you. I know who I am. I know what I've done. I know the amends that I need to make.\n\nCORNISH: Hunter's reshaping of his image comes at the same time his stepmother, former First Lady Jill Biden, is getting mixed reviews from her post-White House memoir, where she shares her view of the 2024 election. Some Democrats say it's reopening old political wounds.\n\nI don't know who to start with here.\n\nCari, who actually went, oh, when you were watching that, or Christine, who maybe has more doubts. More doubts. Why do people have political comebacks? Like, where are they effective? Where are they not?\n\nQUINN: Well, when you're Hunter Biden and your father had to, you know, pardon you for everything you may ever think, do or possibly have done, comeback, it should not be in your vocabulary. Keep your head down. Hope that people forget. That should be in your vocabulary.\n\nCORNISH: See, that is the least American thing you could say.\n\nCHAMPION: That's the least of what -- yes.\n\nCORNISH: We love a second act (ph).\n\nQUINN: But as a Democrat, I -- as a Democrat, I do not need Hunter Biden out there reminding people.\n\nCHAMPION: Oh, no. Oh, no. I totally -- I totally disagree with that. And I think it goes very much to what we were talking about earlier. We were talking about what was going on in Maine.\n\nI think people really enjoy the fact that he is so authentic, almost to the point where it's embarrassing. And yes, he is reopening probably perhaps some new -- old wounds, but he's saying, so what? This is what it is.\n\nWhat do you do when someone -- you say, you know what, you really are a horrible human. You're right. I am. There's no response to that. Like, and I'm not saying that he's a horrible human, but I'm like, there's just --\n\nCORNISH: Yes, yes, yes. Although that lady was. That was --\n\nQUINN: Yes, she was. Right. CORNISH: (INAUDIBLE) compliment I've ever heard.\n\nCORNISH: So, you said no Democrats want him back. But I can think of some people do.\n\nCORNISH: This is Hunter Biden on the Candace Owens podcast.\n\nHUNTER BIDEN: But they had a problem with me as being this emblematic emblem of corruption. These guys, OK, Don Junior got the single largest loan guarantee from the Department of Defense ever handed out of over $600 million for an energy company, a fusion energy company, of which he has zero, zero experience in it.\n\nCORNISH: Brianna, I think it's interesting that he is relitigating some of these issues direct into the lifeblood of the media ecosystem on the right. He's not going to any random place, right? He's going to Candace Owens, who's in the middle of a massive brawl, so to speak, with TPUSA. He's talking about Epstein. He's talking about things that this particular world of people agree with him on.\n\nLYMAN: Well, I think, first of all, I think Hunter Biden coming back into the limelight, this is a way to kind of sanitize the public image of himself that I think he himself had tarnished for a few years.\n\nCORNISH: But why would Candace Owens sanitize it?\n\nLYMAN: Candace Owens -- well, Candace Owens has been platforming people that have spewed stuff that is egregiously false and controversial and insulting to a lot of people, and I don't think she's someone that should be platformed. So, I'm not going to take any -- I'm going to take this interview with a grain of salt.\n\nI think when it comes to Hunter Biden, I will say, something that appeals to younger people is that level of honesty. You know, he said, look, if those were my drugs at the White House, you think I'd leave them there?\n\nLYMAN: And it's very reminiscent of when Charlie Sheen had said, if there are drugs --\n\nLYMAN: He was like, if there are drugs in the house I'm going to find them. That was Charlie Sheen years ago. And that's kind of become an internet meme. So, I think Hunter Biden is trying to reestablish himself and maybe in part because he does see himself as needing some kind of online support base in order to have a future career. I think he said he's opening a Substack soon. So, he wants to garner --\n\nCHAMPION OK. Who doesn't have a Substack?\n\nCORNISH: OK. Next you're going to say he has a podcast.\n\nLYMAN: But he wants to -- he wants to garner that -- that big audience.\n\nCORNISH: You think it's laying the ground for something else?\n\nLYMAN: I think he's laying the ground for a future career.\n\nCORNISH: This is like the Serena Williams Olympics thesis over here.\n\nCHAMPION: Right. He's not -- and, by the way, he's not even managing our expectations. He's letting us know that people he's going to be that problematic fave, as they say.\n\nCHAMPION: And people will enjoy it and they'll go to him and they're like, I don't know why I enjoy it, but I simply do.\n\nCORNISH: OK. I want to turn to our group chats because in mine are all the family in the Cornish Hen WhatsApp group. They're not loving these World Cup prices. It's a problem. They are very unhappy.\n\nCORNISH: Before we get to yours, what's the deal? Like, are people just going to have to suck it up?\n\nCORNISH: Or is FIFA creating long term engendering frustration?\n\nCHAMPION: No, I think -- and I hate to even bring up, you know, game three last night, those prices were astronomically ridiculous. And let me tell you, just side note, Spurs, this is what the Spurs have done. They have season ticket holders who have these courtside seats and they've been reselling them on the second market -- secondary market to other players, other people, like the Knicks. The Spurs have revoked those memberships and revoked those season ticket holders because they want to give them -- they're making a point here.\n\nLook, this is ridiculous. The prices are out of control.\n\nCORNISH: So, there are things they can do?\n\nCHAMPION: There are things you can do. But for the most part we're just going to -- if you really want to see it, this is every so often it's here. People are going to pay.\n\nCHAMPION: People have saved up all -- you have no choice. You just have no choice.\n\nCORNISH: I know. It's what the market will (ph) bear.\n\nCHAMPION: It's what it is.\n\nCORNISH: OK, Christine, what's in your group chat?\n\nQUINN: Well, this past weekend, Thursday and Friday actually of last week, I went to the two kickoff concerts for the Bruce Springsteen Center for American Music.\n\nCORNISH: We're -- whoa, wait, Bruce Springsteen has a museum?\n\nQUINN: Monmouth University. Yes. It just opened at Monmouth University, down the shore in Jersey. And it's obviously about him, but more broadly it's about the history of American music. And this concert was fascinating because they went from the Revolutionary War to the present, kind of decade by decade.\n\nCORNISH: What? For Bruce Springsteen?\n\nCORNISH: Is this his presidential library?\n\nQUINN: It was kind of like that.\n\nCORNISH: What's happening here?\n\nQUINN: It was kind of like that, but it was uplifting and exciting.\n\nCORNISH: OK, I take it. .I'll take time land cleanse from you, Christine.\n\nBrianna, what are you thinking about? What's going on in the group chat?\n\nLYMAN: Well, she brought up the Revolution. My family knows I bog them every single day with history stuff. And this week is very important in America 250.\n\nCORNISH: Your America 250.\n\nLYMAN: Robert E. Lee had introduced -- or Richard Henry Lee had introduced a motion just on June 8th which said that the colony should call for independence. And this next week you will see the committee of five appointed on June 11th Thursday, which is when Thomas Jefferson was assigned to write the Declaration of Independence. And then we'll see, in about two and a half weeks from now, they actually vote on that declaration on July 2nd. So, I've been reminding --\n\nCORNISH: You're doing a timeline. You're doing these --\n\nLYMAN: A whole -- every -- my parents know about it every day.\n\nCORNISH: I like it. I like it.\n\nCORNISH: Also, I've been trying to find ways to celebrate the 250 that are not from the government.\n\nCORNISH: Like, there's just ways to look into your own history and share that with family and friends. What are you thinking about?\n\nCHAMPION: Well, I wasn't -- this wasn't in my group chat, but since she said it, for 250 anniversary, a group of friends, we have decided to write our own Declaration of Independence.\n\nLYMAN: Oh, I love it.\n\nCHAMPION: And it's a group of us, a large group rather. And we all have decided, let me tell you what I am independent of. And so mine has been, just as a black woman here in the United States of America, I removed the mask of trying to fit in to something that I can't fit into. And I write down all the different things that I'm declaring for myself. And it's more of an affirmation so that I know that I can push forward. And all of us have done something like that. Something where we --\n\nCORNISH: That's amazing.\n\nThat is a great idea.\n\nCHAMPION: Yes, where we -- it really is.\n\nCORNISH: And also, if you write it on a scroll, in a --\n\nLYMAN: In a Chrome Pad (ph).\n\nCORNISH: In the Bruce Springsteen Museum of American History.\n\nQUINN: Exactly. Exactly. And it all goes together.\n\nCORNISH: You guys are a fantastic group. I'm so glad to be with you.\n\nThank you for waking up with us. We have plenty more headlines. So, please, stick around.\n\nI'm Audie Cornish. And you're going to be listening to CNC, \"NEWS CENTRAL,\" next."}],"vocabulary":[{"word":"wrangle","phonetic":"/ˈræŋɡl/","pos":"v.","level":"六级","cn":"设法对付；成功获取","en":"to obtain or succeed in getting something, especially after a struggle","excerpt":"An employee was able to wrangle the reptile with a lasso and pull it into an empty horse stall.","example_cn":"一名员工用套索成功制服了这只爬行动物，并将其拖进一个空的马厩。"},{"word":"bayou","phonetic":"/ˈbaɪuː/","pos":"n.","level":"专八","cn":"（美国南部的）牛轭湖；长沼","en":"a slow-moving stream or river, especially in the southern US","excerpt":"Game wardens say that the gator was safely returned to a nearby bayou.","example_cn":"野生动物管理员说，这只短吻鳄被安全地放回了附近的一条长沼。"},{"word":"unseat","phonetic":"/ʌnˈsiːt/","pos":"v.","level":"六级","cn":"使下台；罢免","en":"to remove someone from a position of power","excerpt":"The most important thing in this election is unseating Susan Collins.","example_cn":"这次选举中最重要的事情是让苏珊·柯林斯下台。"},{"word":"jinx","phonetic":"/dʒɪŋks/","pos":"n.","level":"六级","cn":"厄运；不祥的人或物","en":"a person or thing that is believed to bring bad luck","excerpt":"He's a jinx. It's like the goat in Chicago. He freaking jinxed everything.","example_cn":"他是个扫把星。就像芝加哥的那只山羊。他他妈的把一切都搞砸了。"},{"word":"superstitious","phonetic":"/ˌsuːpərˈstɪʃəs/","pos":"adj.","level":"六级","cn":"迷信的","en":"having or showing a belief in superstitions","excerpt":"Sports people are very superstitious.","example_cn":"体育界人士非常迷信。"},{"word":"tone-deaf","phonetic":"/ˈtoʊn def/","pos":"adj.","level":"六级","cn":"不合时宜的；缺乏敏感度的","en":"not understanding or not sympathetic to the mood or opinions of others","excerpt":"The idea that, look, we're here, the regular schmoes who want to be involved in this thing, and he comes and just says, kind of let them eat cake, right? You can watch it on TV. And was -- what was the sort of -- I understand he's a fan, but does that contribute to the tone-deaf narrative?","example_cn":"这种想法是，你看，我们这些普通人想参与其中，他却来了，然后说，让他们吃蛋糕吧，对吧？你可以在电视上看。我理解他是球迷，但这会不会助长那种不合时宜的说法？"},{"word":"motorcade","phonetic":"/ˈmoʊtərkeɪd/","pos":"n.","level":"六级","cn":"车队","en":"a line of vehicles traveling together, especially for a VIP","excerpt":"Did they have motorcades and massive security?","example_cn":"他们有车队和大量安保吗？"},{"word":"co-opt","phonetic":"/koʊ ˈɑːpt/","pos":"v.","level":"专八","cn":"吸收；同化；利用","en":"to take or use something for your own purposes","excerpt":"He will attempt to co-opt this one, too.","example_cn":"他也会试图利用这一点。"},{"word":"limelight","phonetic":"/ˈlaɪmlaɪt/","pos":"n.","level":"六级","cn":"公众注意的中心","en":"the center of public attention","excerpt":"He loves the limelight. He loves every spotlight.","example_cn":"他喜欢成为公众关注的焦点。他喜欢每一个聚光灯。"},{"word":"disrupt","phonetic":"/dɪsˈrʌpt/","pos":"v.","level":"考研","cn":"扰乱；使中断","en":"to cause disorder or interruption in","excerpt":"It disrupts everything that goes on while you're there.","example_cn":"它会扰乱你在那里时发生的一切。"},{"word":"probe","phonetic":"/proʊb/","pos":"v.","level":"考研","cn":"探查；探究","en":"to investigate or examine thoroughly","excerpt":"I wonder if people are going to probe more now that they are -- I don't know -- angry.","example_cn":"我想知道现在人们是否会更多地探究，因为他们——我不知道——很生气。"},{"word":"orchestrate","phonetic":"/ˈɔːrkɪstreɪt/","pos":"v.","level":"六级","cn":"精心策划；密谋","en":"to plan and organize something carefully and sometimes secretly","excerpt":"Sam Bankman-Fried, who orchestrated one of the world's largest financial frauds, wants a pardon.","example_cn":"山姆·班克曼-弗里德策划了世界上最大的金融欺诈案之一，他想要获得赦免。"},{"word":"fraud","phonetic":"/frɔːd/","pos":"n.","level":"考研","cn":"欺诈；骗局","en":"the crime of deceiving someone in order to get money or goods illegally","excerpt":"The co-founder and CEO of the crypto exchange FTX was convicted on multiple counts of fraud and conspiracy.","example_cn":"加密货币交易所FTX的联合创始人兼首席执行官被判多项欺诈和共谋罪名成立。"},{"word":"pardon","phonetic":"/ˈpɑːrdn/","pos":"n.","level":"考研","cn":"赦免；宽恕","en":"an official decision to forgive someone for a crime and free them from punishment","excerpt":"He officially applied for a pardon, according to the Justice Department.","example_cn":"据司法部称，他已正式申请赦免。"},{"word":"skid","phonetic":"/skɪd/","pos":"v.","level":"六级","cn":"打滑；滑行","en":"to slide sideways or forward without control","excerpt":"The plane blew up in flames after skidding across the runway.","example_cn":"飞机在跑道上滑行后起火爆炸。"},{"word":"drum up","phonetic":"/drʌm ʌp/","pos":"phr.","level":"六级","cn":"竭力争取；招揽","en":"to try to get support or business","excerpt":"Country music star, Nashville resident Brad Paisley, trying to drum up support for a petition against the project.","example_cn":"乡村音乐明星、纳什维尔居民布拉德·佩斯利试图为反对该项目的请愿争取支持。"},{"word":"comeback","phonetic":"/ˈkʌmbæk/","pos":"n.","level":"考研","cn":"复出；重返","en":"a return to a former position or state, especially in sports or entertainment","excerpt":"Don't call it a comeback. Today, the GOAT, Serena Williams, officially coming out of retirement.","example_cn":"别叫它复出。今天，史上最佳球员塞雷娜·威廉姆斯正式退役复出。"},{"word":"retirement","phonetic":"/rɪˈtaɪərmənt/","pos":"n.","level":"考研","cn":"退役；退休","en":"the act of leaving your job and stopping working, especially because you are old","excerpt":"Today, the GOAT, Serena Williams, officially coming out of retirement.","example_cn":"今天，史上最佳球员塞雷娜·威廉姆斯正式退役复出。"},{"word":"thesis","phonetic":"/ˈθiːsɪs/","pos":"n.","level":"考研","cn":"论点；主张","en":"a statement or theory that is put forward as a premise to be maintained or proved","excerpt":"What is your thesis on the coming back?","example_cn":"你对复出有什么看法？"},{"word":"manage upwards","phonetic":"/ˈmænɪdʒ ˈʌpwərdz/","pos":"phr.","level":"专八","cn":"向上管理（管理上级的期望）","en":"to manage the expectations and perceptions of those above you in an organization","excerpt":"She's managing us. She's managing upwards, as they would say.","example_cn":"她在管理我们。她在向上管理，就像他们说的那样。"},{"word":"integrity","phonetic":"/ɪnˈteɡrəti/","pos":"n.","level":"考研","cn":"完整性；正直","en":"the quality of being honest and having strong moral principles","excerpt":"Is it time for new rules to protect players and the integrity of the games?","example_cn":"是时候制定新规则来保护球员和比赛的完整性了吗？"},{"word":"ineligible","phonetic":"/ɪnˈelɪdʒəbl/","pos":"adj.","level":"六级","cn":"不合格的；无资格的","en":"not having the necessary qualifications to do something","excerpt":"The NCAA ruled Texas Tech quarterback Brendan Sorsby was ineligible after placing more than $90,000 in bets on college sports.","example_cn":"NCAA裁定德克萨斯理工大学四分卫布伦丹·索斯比在大学生体育赛事上投注超过9万美元后无参赛资格。"},{"word":"overrule","phonetic":"/ˌoʊvərˈruːl/","pos":"v.","level":"六级","cn":"否决；驳回","en":"to reject or disallow by exercising superior authority","excerpt":"Now, a federal judge has overruled all of that.","example_cn":"现在，一名联邦法官否决了所有这些。"},{"word":"irreparable","phonetic":"/ɪˈrepərəbl/","pos":"adj.","level":"六级","cn":"不可挽回的；无法弥补的","en":"impossible to repair or make right again","excerpt":"The judge argued that Sorsby will suffer 'probable, imminent and irreparable injury' if he's not able to play.","example_cn":"法官认为，如果索斯比不能上场，他将遭受“可能的、迫在眉睫的、不可挽回的伤害”。"},{"word":"glaring","phonetic":"/ˈɡlerɪŋ/","pos":"adj.","level":"六级","cn":"明显的；突出的","en":"very obvious and noticeable","excerpt":"The chairman of the NCAA calls the decision a glaring integrity threat.","example_cn":"NCAA主席称这一决定是对诚信的明显威胁。"},{"word":"derivative","phonetic":"/dɪˈrɪvətɪv/","pos":"adj.","level":"六级","cn":"衍生的；派生的","en":"based on or derived from something else","excerpt":"In Kalshi and Polymarket, it's derivative based.","example_cn":"在Kalshi和Polymarket，它是基于衍生产品的。"},{"word":"insider trading","phonetic":"/ˈɪnsaɪdər ˈtreɪdɪŋ/","pos":"n.","level":"专八","cn":"内幕交易","en":"the illegal practice of trading stocks based on confidential information","excerpt":"That's called insider trading.","example_cn":"这被称为内幕交易。"},{"word":"rampant","phonetic":"/ˈræmpənt/","pos":"adj.","level":"六级","cn":"猖獗的；泛滥的","en":"existing or spreading in an uncontrolled way","excerpt":"If we don't partner with them, then they're going to run rampant.","example_cn":"如果我们不与他们合作，他们就会猖獗起来。"},{"word":"loophole","phonetic":"/ˈluːphoʊl/","pos":"n.","level":"六级","cn":"漏洞；空子","en":"a small mistake or omission in a law or set of rules that allows someone to avoid doing something","excerpt":"I'm surprised you loopholed this so well to allow someone like me to gamble on this stuff.","example_cn":"我很惊讶你们把这个漏洞钻得这么好，让我这样的人也能赌这些东西。"},{"word":"addictive","phonetic":"/əˈdɪktɪv/","pos":"adj.","level":"六级","cn":"上瘾的；使人成瘾的","en":"causing addiction","excerpt":"That can be a very addictive process.","example_cn":"那可能是一个非常容易上瘾的过程。"},{"word":"floodgates","phonetic":"/ˈflʌdɡeɪts/","pos":"n.","level":"六级","cn":"闸门；控制物","en":"something that controls the flow of something, especially emotions or events","excerpt":"The floodgates of gambling are already open.","example_cn":"赌博的闸门已经打开。"},{"word":"impartial","phonetic":"/ɪmˈpɑːrʃl/","pos":"adj.","level":"六级","cn":"公正的；不偏不倚的","en":"treating all rivals or disputants equally; fair and just","excerpt":"I think what President Trump is asking, I think is more impartial to or more partial to the fact that Kalshi and Polymarket have things that are outside of sports offering.","example_cn":"我认为特朗普总统所要求的，更多的是对Kalshi和Polymarket提供体育之外的东西这一事实的公正或偏袒。"},{"word":"compromise","phonetic":"/ˈkɑːmprəmaɪz/","pos":"v.","level":"考研","cn":"危及；损害","en":"to cause something to be less good or less effective","excerpt":"Who's to say that doesn't leak and compromise an operation?","example_cn":"谁能说这不会泄露并危及行动呢？"},{"word":"curse","phonetic":"/kɜːrs/","pos":"v.","level":"考研","cn":"诅咒；使遭殃","en":"to use a magic spell to cause bad things to happen to someone","excerpt":"I believe President Trump absolutely cursed the Knicks.","example_cn":"我相信特朗普总统绝对诅咒了尼克斯队。"},{"word":"rigged","phonetic":"/rɪɡd/","pos":"adj.","level":"六级","cn":"被操纵的","en":"dishonestly arranged to achieve a particular result","excerpt":"Trump Claims California Elections are Rigged","example_cn":"特朗普声称加州选举被操纵。"},{"word":"unopposed","phonetic":"/ˌʌnəˈpoʊzd/","pos":"adj.","level":"六级","cn":"无对手的","en":"with no opponent or competitor","excerpt":"Graham Platner is essentially running unopposed after his primary rival, Governor Janet Mills, suspended her campaign.","example_cn":"格雷厄姆·普拉特纳基本上是在无对手的情况下参选，因为他的初选对手、州长珍妮特·米尔斯暂停了竞选活动。"},{"word":"scandal","phonetic":"/ˈskændl/","pos":"n.","level":"考研","cn":"丑闻","en":"an action or event that causes public outrage","excerpt":"Platner is seeking to overcome a wave of scandal, including claims of knowingly getting a Nazi tattoo and allegations of inappropriate behavior with past girlfriends.","example_cn":"普拉特纳正试图克服一波丑闻，包括明知故犯地纹纳粹纹身以及与前女友不当行为的指控。"},{"word":"allegation","phonetic":"/ˌæləˈɡeɪʃn/","pos":"n.","level":"考研","cn":"指控","en":"a claim that someone has done something illegal or wrong","excerpt":"allegations of inappropriate behavior with past girlfriends","example_cn":"关于与前女友不当行为的指控。"},{"word":"derail","phonetic":"/dɪˈreɪl/","pos":"v.","level":"六级","cn":"使偏离轨道；破坏","en":"to prevent something from continuing as planned","excerpt":"Democrats are wondering if his past will derail their chances to unseat Republican Susan Collins in November.","example_cn":"民主党人想知道他的过去是否会破坏他们在11月击败共和党人苏珊·柯林斯的机会。"},{"word":"unseat","phonetic":"/ʌnˈsiːt/","pos":"v.","level":"六级","cn":"使下台；罢免","en":"to remove someone from a position of power","excerpt":"Democrats are wondering if his past will derail their chances to unseat Republican Susan Collins in November.","example_cn":"民主党人想知道他的过去是否会破坏他们在11月击败共和党人苏珊·柯林斯的机会。"},{"word":"vet","phonetic":"/vet/","pos":"v.","level":"六级","cn":"审查","en":"to examine someone or something carefully to decide if they are suitable","excerpt":"did you vet this guy?","example_cn":"你们审查过这个人吗？"},{"word":"vat-grown","phonetic":"/væt ɡroʊn/","pos":"adj.","level":"专八","cn":"人工培养的；非自然的","en":"produced artificially in a vat, not naturally","excerpt":"Part of our thesis here is that people do not want their candidates grown in vats.","example_cn":"我们的论点之一是，人们不希望他们的候选人是人工培养出来的。"},{"word":"hand-wringing","phonetic":"/ˈhænd rɪŋɪŋ/","pos":"n.","level":"专八","cn":"焦虑；束手无策","en":"an expression of worry or distress","excerpt":"And then, you know, there are folks who are hand-wringing and trying to figure out how they support the candidate or not.","example_cn":"然后，你知道，有些人焦虑不安，试图弄清楚他们是否支持这位候选人。"},{"word":"chattering class","phonetic":"/ˈtʃætərɪŋ klæs/","pos":"n.","level":"专八","cn":"评论界；舆论界","en":"people who comment on current events, especially in the media","excerpt":"And it's a shame that, you know, the chattering class was all in for someone who has all these flaws.","example_cn":"遗憾的是，舆论界全力支持一个有这样那样缺点的人。"},{"word":"postmarked","phonetic":"/ˈpoʊstmɑːrkt/","pos":"adj.","level":"六级","cn":"盖邮戳的","en":"having an official postmark","excerpt":"postmarked mail-in ballots, received up to a week after election day, can still be counted","example_cn":"盖有邮戳的邮寄选票，在选举日后一周内收到，仍可计入。"},{"word":"rigger roll","phonetic":"/ˈrɪɡər roʊl/","pos":"n.","level":"专八","cn":"选民名册（非标准术语，此处为口误或特定用法）","en":"voter roll (non-standard term, possibly a slip)","excerpt":"What kind of you, you know, rigger roll do you go through?","example_cn":"你经过什么样的选民名册审查？"},{"word":"clapback","phonetic":"/ˈklæpbæk/","pos":"n.","level":"六级","cn":"回击；反驳","en":"a sharp or witty response to criticism","excerpt":"Hunter Biden has become the clapback king online after reactivating his X account.","example_cn":"亨特·拜登在重新激活他的X账户后，成为了网络回击之王。"},{"word":"relitigate","phonetic":"/riːˈlɪtɪɡeɪt/","pos":"v.","level":"专八","cn":"重新争论","en":"to argue about something again, especially in a legal context","excerpt":"I think it's interesting that he is relitigating some of these issues direct into the lifeblood of the media ecosystem on the right.","example_cn":"我认为有趣的是，他正在重新争论其中一些问题，直接触及右翼媒体生态系统的命脉。"},{"word":"platform","phonetic":"/ˈplætfɔːrm/","pos":"v.","level":"六级","cn":"为…提供平台","en":"to give someone an opportunity to express their views","excerpt":"Candace Owens has been platforming people that have spewed stuff that is egregiously false and controversial.","example_cn":"坎迪斯·欧文斯一直在为那些散布极其虚假和有争议言论的人提供平台。"},{"word":"egregiously","phonetic":"/ɪˈɡriːdʒəsli/","pos":"adv.","level":"专八","cn":"极其地；惊人地","en":"in a shocking or outstandingly bad way","excerpt":"Candace Owens has been platforming people that have spewed stuff that is egregiously false and controversial.","example_cn":"坎迪斯·欧文斯一直在为那些散布极其虚假和有争议言论的人提供平台。"},{"word":"sanitize","phonetic":"/ˈsænɪtaɪz/","pos":"v.","level":"六级","cn":"美化；净化","en":"to make something seem more acceptable or less offensive","excerpt":"I think Hunter Biden coming back into the limelight, this is a way to kind of sanitize the public image of himself.","example_cn":"我认为亨特·拜登重新回到聚光灯下，这是一种美化自己公众形象的方式。"},{"word":"limelight","phonetic":"/ˈlaɪmlaɪt/","pos":"n.","level":"六级","cn":"公众注意的中心","en":"the focus of public attention","excerpt":"I think Hunter Biden coming back into the limelight","example_cn":"我认为亨特·拜登重新回到聚光灯下"},{"word":"Substack","phonetic":"/ˈsʌbstæk/","pos":"n.","level":"六级","cn":"Substack（新闻通讯平台）","en":"a platform for publishing newsletters","excerpt":"I think he said he's opening a Substack soon.","example_cn":"我想他说他很快就要开一个Substack。"},{"word":"problematic fave","phonetic":"/ˌprɑːbləˈmætɪk feɪv/","pos":"n.","level":"专八","cn":"有问题的喜爱对象","en":"a favorite person or thing that is controversial or problematic","excerpt":"He's letting us know that people he's going to be that problematic fave, as they say.","example_cn":"他让我们知道，他会成为人们所说的那种有问题的喜爱对象。"},{"word":"astronomically","phonetic":"/ˌæstrəˈnɑːmɪkli/","pos":"adv.","level":"六级","cn":"天文数字地；极其","en":"extremely; to a very large degree","excerpt":"those prices were astronomically ridiculous.","example_cn":"那些价格高得离谱。"},{"word":"revoke","phonetic":"/rɪˈvoʊk/","pos":"v.","level":"考研","cn":"撤销；取消","en":"to officially cancel something","excerpt":"The Spurs have revoked those memberships and revoked those season ticket holders","example_cn":"马刺队已经撤销了那些会员资格和季票持有者资格。"},{"word":"kickoff","phonetic":"/ˈkɪkɔːf/","pos":"n.","level":"六级","cn":"开始；开幕","en":"the start of something","excerpt":"I went to the two kickoff concerts for the Bruce Springsteen Center for American Music.","example_cn":"我参加了布鲁斯·斯普林斯汀美国音乐中心的两场开幕音乐会。"},{"word":"uplifting","phonetic":"/ʌpˈlɪftɪŋ/","pos":"adj.","level":"六级","cn":"令人振奋的","en":"making someone feel happier or more hopeful","excerpt":"it was uplifting and exciting.","example_cn":"它令人振奋且激动人心。"},{"word":"bog","phonetic":"/bɑːɡ/","pos":"v.","level":"六级","cn":"使陷入；纠缠","en":"to cause someone to be stuck or overwhelmed","excerpt":"My family knows I bog them every single day with history stuff.","example_cn":"我的家人知道，我每天都用历史知识纠缠他们。"},{"word":"motion","phonetic":"/ˈmoʊʃn/","pos":"n.","level":"考研","cn":"动议；提议","en":"a formal proposal put to a vote","excerpt":"Richard Henry Lee had introduced a motion just on June 8th which said that the colony should call for independence.","example_cn":"理查德·亨利·李在6月8日提出了一项动议，称殖民地应该要求独立。"},{"word":"committee of five","phonetic":"/kəˈmɪti əv faɪv/","pos":"n.","level":"专八","cn":"五人委员会（指起草《独立宣言》的委员会）","en":"the committee appointed to draft the Declaration of Independence","excerpt":"the committee of five appointed on June 11th Thursday, which is when Thomas Jefferson was assigned to write the Declaration of Independence.","example_cn":"6月11日星期四任命的五人委员会，正是托马斯·杰斐逊被指派撰写《独立宣言》的时候。"},{"word":"declaration","phonetic":"/ˌdekləˈreɪʃn/","pos":"n.","level":"考研","cn":"宣言；声明","en":"a formal statement","excerpt":"they actually vote on that declaration on July 2nd.","example_cn":"他们实际上在7月2日对那份宣言进行了投票。"},{"word":"affirmation","phonetic":"/ˌæfərˈmeɪʃn/","pos":"n.","level":"六级","cn":"肯定； affirmation","en":"a statement that something is true or that you support something","excerpt":"And I write down all the different things that I'm declaring for myself. And it's more of an affirmation","example_cn":"我写下所有我为自己宣告的不同事物。这更像是一种肯定。"},{"word":"scroll","phonetic":"/skroʊl/","pos":"n.","level":"六级","cn":"卷轴","en":"a long roll of paper or parchment for writing","excerpt":"if you write it on a scroll","example_cn":"如果你把它写在卷轴上"}],"sentences":[{"en":"The NCAA ruled Texas Tech quarterback Brendan Sorsby was ineligible after placing more than $90,000 in bets on college sports, and that includes 40 bets on his own team when he played at Indiana.","cn":"NCAA裁定德克萨斯理工大学四分卫布伦丹·索斯比在大学生体育赛事上投注超过9万美元后无参赛资格，其中包括他在印第安纳大学效力时对自己球队的40次投注。","structure":"主句（The NCAA ruled）+ 宾语从句（Texas Tech quarterback...was ineligible）+ 时间状语（after placing...）+ 并列结构（and that includes...）","analysis":"ruled后接省略that的宾语从句；placing是动名词作介词after的宾语；that指代前文的bets。"},{"en":"Now, a federal judge has overruled all of that, the judge, conveniently based in Texas Tech's hometown of Lubbock, argued that Sorsby will suffer, quote, 'probable, imminent and irreparable injury' if he's not able to play for the Red Raiders this year.","cn":"现在，一名联邦法官否决了所有这些，这位法官恰好在德克萨斯理工大学所在地拉伯克，他认为索斯比如果不能在今年为红色突击者队效力，将遭受“可能的、迫在眉睫的、不可挽回的伤害”。","structure":"主句（a federal judge has overruled...）+ 同位语（the judge...）+ 谓语（argued）+ 宾语从句（that Sorsby will suffer...）+ 条件状语从句（if he's not able to play...）","analysis":"conveniently based...是过去分词短语作定语修饰the judge；quote用于引出直接引语。"},{"en":"The chairman of the NCAA calls the decision a glaring integrity threat, he wants Congress to pass a new bill which would allow them to enforce their gambling restrictions, adding, quote, 'It's needed now more than ever.'","cn":"NCAA主席称这一决定是对诚信的明显威胁，他希望国会通过一项新法案，允许他们执行赌博限制，并补充说，“现在比以往任何时候都更需要它。”","structure":"并列句（The chairman...calls...he wants...）+ 定语从句（which would allow...）+ 现在分词短语（adding...）","analysis":"calls the decision a glaring integrity threat是“动词+宾语+宾语补足语”结构；which引导定语从句修饰bill；adding是现在分词作伴随状语。"},{"en":"I think what President Trump is asking, I think is more impartial to or more partial to the fact that Kalshi and Polymarket have things that are outside of sports offering.","cn":"我认为特朗普总统所要求的，更多的是对Kalshi和Polymarket提供体育之外的东西这一事实的公正或偏袒。","structure":"主句（I think）+ 宾语从句（what President Trump is asking...is more impartial...）+ 同位语从句（the fact that...）","analysis":"what引导主语从句；that引导同位语从句修饰fact；that are outside of sports offering是定语从句修饰things。"},{"en":"If you can bet on some of those things, like who's to say that doesn't leak and compromise an operation?","cn":"如果你能赌其中一些事情，比如谁能说这不会泄露并危及行动呢？","structure":"条件状语从句（If you can bet...）+ 主句（who's to say...）+ 宾语从句（that doesn't leak...）","analysis":"who's to say是固定表达，意为“谁能说”；that指代前文提到的信息泄露的可能性。"},{"en":"He doesn't want to be known as the president who had insider trading at all of these different things that were going on that were a result of him.","cn":"他不想被称为那个在所有因他而起的不同事情上进行内幕交易的总统。","structure":"主句（He doesn't want to be known as the president）+ 定语从句（who had insider trading...）+ 定语从句（that were going on）+ 定语从句（that were a result of him）","analysis":"三个that引导的定语从句层层修饰：第一个修饰things，第二个修饰things，第三个修饰things。"},{"en":"Platner is seeking to overcome a wave of scandal, including claims of knowingly getting a Nazi tattoo and allegations of inappropriate behavior with past girlfriends, all of which he has denied.","cn":"普拉特纳正试图克服一波丑闻，包括明知故犯地纹纳粹纹身以及与前女友不当行为的指控，所有这些他都否认了。","structure":"主谓宾 + 同位语（including...） + 定语从句（all of which...）","analysis":"主句为Platner is seeking to overcome a wave of scandal，后接including引导的短语作同位语，列举丑闻内容，最后all of which引导非限制性定语从句修饰claims和allegations。"},{"en":"Part of our thesis here is that people do not want their candidates grown in vats; they want people who are real human beings, and they want people who do not look and sound like the vat-grown people who have been leading this country off a cliff for the last century.","cn":"我们的论点之一是，人们不希望他们的候选人是人工培养出来的；他们想要真实的人，他们想要那些看起来和听起来都不像上个世纪一直把这个国家引向悬崖的人工培养的人。","structure":"主系表 + 表语从句（that...） + 并列句（they want...）","analysis":"主句为Part of our thesis here is that...，that引导表语从句，从句中包含两个并列分句，第二个分句中包含两个who引导的定语从句修饰people。"},{"en":"I get and understand the frustration of going through the party filter sometimes, but there's a level of quality checks that, when you go through that process, you understand what you are getting in the end, instead of this wild card now.","cn":"我理解有时通过政党筛选的挫败感，但有一定程度的质量检查，当你经历那个过程时，你最终会明白你得到的是什么，而不是现在这种未知数。","structure":"主谓宾 + but连接并列句 + that引导定语从句 + when引导时间状语从句","analysis":"主句为I get and understand the frustration，but后为并列句，其中that引导定语从句修饰quality checks，从句中嵌套when引导的时间状语从句。"},{"en":"And it's a shame that, you know, the chattering class was all in for someone who has all these flaws, and we knew it from the start.","cn":"遗憾的是，你知道，舆论界全力支持一个有这样那样缺点的人，而我们从一开始就知道。","structure":"主系表 + that引导主语从句 + who引导定语从句","analysis":"主句为It's a shame，that引导主语从句，从句中who引导定语从句修饰someone。"},{"en":"California's elections often take days to get resolved because postmarked mail-in ballots, received up to a week after election day, can still be counted, again, as long as they are postmarked on election day.","cn":"加州的选举通常需要几天才能有结果，因为盖有邮戳的邮寄选票，在选举日后一周内收到，仍可计入，只要它们在选举日当天盖有邮戳。","structure":"主谓宾 + because引导原因状语从句 + as long as引导条件状语从句","analysis":"主句为California's elections often take days to get resolved，because引导原因状语从句，从句中嵌套as long as引导的条件状语从句。"},{"en":"I think it's interesting that he is relitigating some of these issues direct into the lifeblood of the media ecosystem on the right.","cn":"我认为有趣的是，他正在重新争论其中一些问题，直接触及右翼媒体生态系统的命脉。","structure":"主谓宾 + that引导宾语从句","analysis":"主句为I think，后接省略that的宾语从句，从句中it为形式主语，真正主语为that引导的从句。"},{"en":"And it's very reminiscent of when Charlie Sheen had said, if there are drugs in the house I'm going to find them.","cn":"这让人想起查理·辛曾说过的话：如果房子里有毒品，我会找到它们。","structure":"主系表 + of介词短语 + when引导宾语从句 + if引导条件状语从句","analysis":"主句为It's very reminiscent of...，of后接when引导的宾语从句，从句中嵌套if引导的条件状语从句。"},{"en":"And this concert was fascinating because they went from the Revolutionary War to the present, kind of decade by decade.","cn":"这场音乐会非常吸引人，因为他们从独立战争一直演到现在，差不多每十年一个阶段。","structure":"主系表 + because引导原因状语从句","analysis":"主句为this concert was fascinating，because引导原因状语从句。"},{"en":"And this next week you will see the committee of five appointed on June 11th Thursday, which is when Thomas Jefferson was assigned to write the Declaration of Independence.","cn":"下周你将看到6月11日星期四任命的五人委员会，正是托马斯·杰斐逊被指派撰写《独立宣言》的时候。","structure":"主谓宾 + which引导非限制性定语从句 + when引导表语从句","analysis":"主句为you will see the committee of five，which引导非限制性定语从句修饰committee，从句中when引导表语从句。"},{"en":"And all of us have done something like that, something where we —","cn":"我们所有人都做过类似的事情，一些我们——","structure":"主谓宾 + 同位语 + where引导定语从句","analysis":"主句为all of us have done something，something like that为同位语，where引导定语从句修饰something。"}],"topics":[{"title":"Trump attends NBA Finals","content":"美国总统特朗普成为首位出席NBA总决赛的在任总统，但纽约尼克斯队输掉了比赛，球迷和评论员将其归咎于特朗普带来的“霉运”。讨论涉及体育与政治的交叉、总统出席对赛事的影响以及公众反应。","keywords":"Trump, NBA Finals, Knicks, jinx, sports and politics"},{"title":"Sports betting and prediction markets","content":"NCAA因德州理工四分卫布伦丹·索斯比投注大学体育赛事而裁定其无参赛资格，但联邦法官推翻了该决定。讨论涉及体育博彩、预测市场（如Kalshi和Polymarket）的监管、内幕交易风险以及保护比赛完整性的必要性。","keywords":"NCAA, sports betting, prediction markets, insider trading, integrity"},{"title":"Serena Williams comeback","content":"44岁的塞雷娜·威廉姆斯宣布退役复出，将在女王俱乐部锦标赛中参加双打比赛。评论员猜测她可能为奥运会做准备，并讨论年龄对运动员的影响。","keywords":"Serena Williams, comeback, retirement, tennis, Olympics"},{"title":"Maine primary election","content":"缅因州初选日，民主党候选人格雷厄姆·普拉特纳面临丑闻困扰，但党内认为击败共和党参议员苏珊·柯林斯是首要任务。讨论选举策略和候选人资格。","keywords":"Maine primary, Graham Platner, Susan Collins, election, scandal"},{"title":"Nashville data center controversy","content":"纳什维尔动物园附近拟建大型数据中心，乡村歌手布拉德·佩斯利发起请愿反对，认为该项目威胁动物和城市美观。公司保证无健康风险。","keywords":"Nashville Zoo, data center, Brad Paisley, petition, environmental impact"},{"title":"Private jet crash in Dominican Republic","content":"一架私人飞机在多米尼加共和国紧急降落时起火爆炸，两名美国籍飞行员遇难，无乘客。调查正在进行中。","keywords":"private jet, crash, Dominican Republic, pilot, investigation"},{"title":"Sam Bankman-Fried pardon request","content":"FTX创始人山姆·班克曼-弗里德因欺诈被判25年监禁，现正式申请总统赦免。特朗普此前表示不会赦免他。","keywords":"Sam Bankman-Fried, FTX, fraud, pardon, Trump"},{"title":"Maine Democratic Primary and Candidate Scandal","content":"缅因州民主党初选中，候选人Graham Platner面临纳粹纹身和不当行为指控，但其仍领先。前州长Janet Mills虽暂停竞选但仍出现在选票上。讨论涉及政党筛选、选民对丑闻的态度以及民主党内部策略。","keywords":"Maine primary, Graham Platner, Nazi tattoo, Janet Mills, Democratic Party, scandal, voter behavior"},{"title":"California Election Integrity and Trump's Claims","content":"加州选举因邮寄选票计票缓慢引发争议，特朗普声称选举被操纵，但无证据。共和党候选人Steve Hilton表示未发现问题。讨论涉及选举制度、选民信任以及联邦与州在选民名单管理上的冲突。","keywords":"California election, mail-in ballots, Trump, rigged, voter rolls, HAVA, federal vs state"},{"title":"Hunter Biden's Public Comeback","content":"亨特·拜登重新活跃于社交媒体，回击批评者，并接受右翼媒体采访。讨论其动机、公众形象重塑以及民主党内部对其复出的不同看法。","keywords":"Hunter Biden, clapback, public image, Candace Owens, Substack, Democratic reaction"},{"title":"World Cup Ticket Prices and Fan Frustration","content":"世界杯门票价格高昂引发球迷不满，讨论市场定价、球队管理以及球迷的应对方式。","keywords":"World Cup, ticket prices, fan frustration, Spurs, secondary market"},{"title":"America 250 and Personal Declarations of Independence","content":"美国250周年纪念，讨论历史事件如《独立宣言》的起草，以及个人如何通过撰写自己的独立宣言来庆祝。","keywords":"America 250, Declaration of Independence, Richard Henry Lee, Thomas Jefferson, personal declaration"}]},"2026-06-08":{"date":"2026-06-08","source_url":"https://transcripts.cnn.com/show/ctmo/date/2026-06-08/segment/01","full_translation":[{"paragraph":"Return to Transcripts main page\n\nIsrael, Iran Trade Missile Attacks After Iran Targets Israeli Ramat David Airbase; Iran Threatens to Block Critical Bab al-Mandab Strait; Deadly 7.8 Magnitude Earthquake Hits Southern Philippines. Aired 5-5:30a ET","translation":"返回文稿主页\n\n以色列与伊朗互射导弹，此前伊朗袭击以色列拉马特戴维空军基地；伊朗威胁封锁关键曼德海峡；菲律宾南部发生致命7.8级地震。美国东部时间凌晨5点至5点30分播出"},{"paragraph":"Aired June 08, 2026 - 05:00   ET\n\nTHIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED.","translation":"播出日期：2026年6月8日 - 美国东部时间05:00\n\n此为速记文稿。本稿可能并非最终版本，且可能更新。"},{"paragraph":"ANNOUNCER: This is CNN Breaking News!","translation":"播音员：这里是CNN突发新闻！"},{"paragraph":"AUDIE CORNISH, ANCHOR, CNN THIS MORNING: We are following this breaking news out of the Middle East. Israel and Iran trading missile attacks, and the fragile ceasefire survive this test. Good morning, everybody, I'm Audie Cornish.","translation":"AUDIE CORNISH，CNN《今晨》主播：我们正在关注中东的突发新闻。以色列和伊朗互相发动导弹袭击，脆弱的停火协议能否经受住这次考验。大家早上好，我是Audie Cornish。"},{"paragraph":"We're going to start with the strikes that have happened in the last few hours. Israel says it has identified a wave of missiles launched from Iran. New video into CNN overnight showing damage inside a home in the West Bank.","translation":"我们先从过去几小时内发生的袭击说起。以色列称已识别出一波从伊朗发射的导弹。CNN连夜收到的新视频显示约旦河西岸一处房屋内部受损。"},{"paragraph":"Now, this follows Israeli strikes on an Iranian petrochemical plant. The IDF saying that it hit several targets at that complex. Now, those retaliatory strikes appear to be in defiance of President Trump, who called Israeli Prime Minister Benjamin Netanyahu and had told him to hold off on striking back.","translation":"此前，以色列袭击了伊朗一家石化厂。以色列国防军称击中了该综合体的多个目标。这些报复性袭击似乎是在违抗特朗普总统的意愿，他曾致电以色列总理本雅明·内塔尼亚胡，要求他暂缓反击。"},{"paragraph":"As tensi
