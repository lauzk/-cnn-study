for those big cities on the East Coast, but right now we are already seeing some shower and storm activity in the Corn Belt and the Midwest, as well, right ahead of this cold front.\n\nSo, that will be the trigger point, along with heat to fire up more storms later on today.\n\nCouple those moving now through the south side of Chicago, we'll see them regenerate this afternoon as we add that daytime heating, lot of spots getting to the 80s and 90s this afternoon, and you can see those storms popping up in interior new east -- New England and northeast, and then, moving in towards the 95 corridor after 8:00 this evening. So, it might be a hot and sunny afternoon, but then those storms will come in, and they could pack a punch to the south, though a lot of moisture coming off the Gulf produces that localized flash flooding threat, even though the severe weather threat is not as high there.\n\nAll right. So, little relief coming from some of these cities, for some of these cities. Thanks to this cold front, but it's not going to last for long. I do expect more heat to build in later in the week. Another day in the 90s there, New York, and also Washington, D.C. Boston, 86 degrees, that's about 15 degrees above average for them. Little cool down coming the second half of the weekend, more heat builds later next week. Victor?\n\nBLACKWELL: All right. Melissa, thank you very much.\n\nStill ahead, President Trump is facing backlash over his pick to lead the intelligence community. The president is waving off questions about Bill Pulte's qualifications.\n\nHey, if you are headed out, I'll ride shotgun. You can watch the show, stream our show from anywhere in the U.S., right from the CNN app. You can also go to cnn.com/watch.\n\nBLACKWELL: Top stories this morning. The chief of staff for Texas Republican Pete Sessions has been charged with carrying a gun onto U.S. Capitol grounds. Capitol police say they found a black pistol and ammunition in the staffer's bag as he was going through a security checkpoint in December.\n\nPolice say he admitted he did not have a license to carry that gun. Court documents note the staffer typically enters the House Office Building with Sessions, who is exempt from being screened.\n\nThe FAA says President Trump's proposed triumphal arch does not appear to pose a potential risk to air travel.\n\nThis is 250 feet tall. Now, it's set to be a place less than two miles from the Ronald Reagan Washington Airport. However, officials at the FAA are recommending that red obstruction lights be added.\n\nPresident Trump says he is interviewing five well-known people to be the next director of National Intelligence. This is after the bipartisan backlash to his choice of Bill Pulte to succeed Tulsi Gabbard in that position. Now, critics say Pulte has no known national security qualifications. Trump has since said that Pulte, who will continue to head up the Federal Housing Finance Agency, will only serve as acting director of National Intelligence. So, up to 210 days.\n\nWe are joined now by Shawn Turner, the former Director of Communications for U.S. National Intelligence.\n\nSean, welcome back to the show. Let me read here first from the Wall Street Journal's interview with the president about his choice of Bill Pulte. He says, \"Frankly, it might be good for him to shake it up before people come. Because if he reduced the size in conjunction with me and in conjunction with possibly the person coming in, he can do a lot of the hard work, and we wouldn't have to saddle somebody that goes in. We've made the Department of Education much smaller, and likewise, this should be much smaller. And this should maybe even be terminated, and we'll make that decision.\"\n\nWhat's your reaction to hearing that the president -- once Pulte -- essentially, going to be the hatchet man? Make it smaller, or maybe we'll just get rid of the ODNI.\n\nSHAWN TURNER, FORMER DIRECTOR OF COMMUNICATION FOR UNITED STATES NATIONAL INTELLIGENCE: Yes, Victor. Good morning. It's good to see you. Good to be with you again.\n\nWhen I hear those words, that maybe even the Office of the Director of National Intelligence should be terminated, I will tell you, as a student of history and someone who spent a long time in government national security, and intelligence, that's a scary thought.\n\nWe have to remember that there are few places in government where the stakes are higher than in the intelligence community. The most consequential decisions that any p\n\n","segments":[{"seg":1,"url":"https://transcripts.cnn.com/show/ctmo/date/2026-06-06/segment/01","title":"CNN.com - Transcripts","text":"Return to Transcripts main page\n\nPresident Trump Visits Northwestern Wisconsin To Talk Agriculture; Graham Platner Faces New Allegations Just Days Ahead Of Maine Primary; Iran Warns Of Wider War, Demands Release Of Frozen Assets; Israel Ramps Up Strikes Against Hezbollah In Lebanon; Brendan Banfield Sentenced To Life In Au Pair Affair Murder Case. Justice Department Tells Courts that Challenges to Trump's \"Anti- Weaponization\" Fund are Moot; Tech Stocks Lose Ground Amid Weakness in A.I. Stocks; Sherpa Rescued After Surviving on Mount Everest Without Food and Oxygen. Aired 6-7a ET\n\nAired June 06, 2026 - 06:00   ET\n\nTHIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED.\n\nVICTOR BLACKWELL, CNN ANCHOR: Welcome to CNN This Morning. Here's what you need to know to start your weekend.\n\nPresident Trump was in Wisconsin yesterday to pitch farmers on his trade policy kind of.\n\nDONALD TRUMP, U.S. PRESIDENT: Come up here today. I don't need this. I got elected. I don't know. What the hell do I have to be here for. I got elected. I'm here because I like the farmer.\n\nBLACKWELL: So we'll talk about the importance of his visit, what he was supposed to do there, and the GOP efforts to hold the Senate in the midterms.\n\nThe road to the Senate majority also runs through Maine. And Democrats are being forced to make some tough choices.\n\nUNIDENTIFIED FEMALE: Either get it all out there or shut up. One of the two.\n\nUNIDENTIFIED FEMALE: I'm going to vote for him. Yes, but I don't like it.\n\nBLACKWELL: How Graham Platner's mounted controversies are impacting that race.\n\nAnd a new U.N. report says that AI data centers put out as much pollution as some large countries. One of the authors of that study is here.\n\nPlus a Sherpa guide stuck for six days on Mount Everest. No food, no bottled oxygen. Everyone thought that he was dead until he came crawling back to base camp.\n\nIt's Saturday, June 6th, 2026. I'm Victor Blackwell. Good to have you along.\n\nPresident Trump returned to the campaign trail yesterday as he tries to rally his MAGA base for the upcoming midterm elections. The president visited Chippewa, Wisconsin, for a rally branded as Fighting for American Farmers. Some farmers say that they've been hurt by some of the administration's trade policies and the war with Iran.\n\nBut in his remarks, the president seemed more focused on other topics, like his beautification projects. Back in D.C. CNN's Jeff Zeleny is in Wisconsin with more on the president's message to farmers.\n\nJEFF ZELENY, CNN CHIEF NATIONAL AFFAIRS CORRRESPONDENT: Victor, it was a return to the campaign trail of sorts for President Trump on Friday as he campaigned here in western Wisconsin. Now this is the makings of the roundtable. It actually had more of a feeling of a rally as his supporters are taking their lead.\n\nNow this is one of the biggest battlegrounds in the country in the fight for the midterm elections. Republican Representative Derek Van Orden is in a very tough race. Even Republicans acknowledge that and the impact of the President's tariff policies and trade policies are being felt quite deeply here in rural America.\n\nThe President signaled that he's interested in helping the American farmer, but he also seemed to suggest he doesn't need to be campaigning at all.\n\nTRUMP: I fought for the American farmer like no one has ever fought before. Nobody's like, I'm up here today. I don't need this. I got elected. I don't have. What the hell do I have to be here for? I got elected. I'm here because I like the farmer.\n\nI mean, when you think about it, I guess there's a lot of truth to that, right? I could be home right now in the beautiful White House, enjoying watching somebody else on television talking. Life is much better than my life. I will tell you. Your ear wasn't a little pierced over here. You didn't get pierced. You have a nice, safe, beautiful life.\n\nZELENY: There's no doubt we'll be seeing more from the President over the next five months between now and November as Republicans try and hold their House majority and their Senate majority as well. A question here is, are Democrats more energized by the President visiting these areas? Are they more turned on by trying to change policies or is the president really trying to rally his base?\n\nHe of course won reelection less than two years ago, but history shows that the midterm election is always rough for the President's party Victor.\n\nBLACKWELL: Jeff Zeleny, thank you. New this morning, CNN projects that Democrat Javier Becerra will advance to the November general election in the race for California Governor. Becerra previously served as California's Attorney General and L.A. based congressman.\n\nBallots in California are still being counted so it is still not clear who Becerra will run against. He will either face off against Trump backed Republican Steve Hilton or fellow Democratic candidate Tom Steyer. The eventual winner will succeed term limited, Democratic Governor Gavin Newsom.\n\nDemocratic Senate candidate Graham Platner, let's talk about him. He may be a favorite to win Tuesday's primary in Maine, but he is also quickly losing voters enthusiasm.\n\nPlatner is a Marine vet, an oyster farmer and the frontrunner to take on Susan Collins in the November election. But a barrage of scandals, from a covered up Nazi link tattoo to toxic relationship allegations has voters ready to cast their ballots while holding their noses. CNN's Danny Freeman talked to voters in Maine about how they feel about voting for Platner.\n\nBONNIE DEPP, MAINE DEMOCRAT: Either get it all out there or shut up. One of the two.\n\nDANNY FREEMAN, CNN CORRESPONDENT (voice-over): Many Maine Democratic voters we spoke with, they said they're frustrated with Democratic Senate candidate Graham Platner, who they feel could give them their best shot at defeating longtime Republican Senator Susan Collins and help pave the way for Democrats to retake control of the Senate.\n\nFREEMAN: Are you considering holding your breath and voting for him?\n\nDEPP: I got until Tuesday to decide, but I'm pretty sure I'll vote for him. I don't think a lot of this crime is anybody else's business.\n\nFREEMAN (voice-over): For some Democrats, they're willing to look past the interpersonal stories.\n\nZOO CAIN, MAINE DEMOCRAT: I'm not really interested in the guy's foibles, you know, I'm interested in his vision and what he has to say. And I love what he has to say. So yes, it's been definitely difficult because everybody is piling on this guy.\n\nFREEMAN (voice-over): But others did not buy Platner's tattoo explanation.\n\nSANDRA BRADEN, MAINE DEMOCRAT: He's an intelligent man. Of course he knew about it. I don't blame him for denying it.\n\nFREEMAN: But that's still not enough not to vote for him. You're still going to vote for him likely?\n\nBRADEN: I'm going to vote for him, yes. But I don't like it. I'm not in favor of all that.\n\nFREEMAN (voice-over): Still for some, the drip, drip has left voters confused.\n\nWOODY HAYWOOD, MAINE DEMOCRAT: I don't know if it's misinformation or disinformation. Right? Like I don't know, do we -- do any of us really know what's going to be or what kind of character he has? Don't know, unproven. Unproven. So is it the devil that we have or the devil, the devil we know or the devil that we don't know yet?\n\nFREEMAN (voice-over): According to a pair of recent polls conducted before the latest allegations, a head to head matchup between Platner and Senator Collins appears competitive. One with no clear leader and the other showing Platner with an advantage. While Platner is the clear favorite to win the Democratic nomination on Tuesday, another high profile candidate's name is still on the ballot. Governor Janet Mills suspended her campaign back in April, but a source now tells CNN she's been getting encouragement to reenter the primary.\n\nBeth Dindas, a Mills supporter from the start, thinks it's likely too late.\n\nBETH DINDAS, MAINE DEMOCRAT: I think that ultimately, unfortunately, we're going to lose this race again and we're going to have six more years of Susan Collins, who has let down the people of Maine time after time.\n\nFREEMAN: Now, Victor, on Friday night, Platner had a rally in Bar Harbor, Maine, and he was defiant, saying we are in the of our lives and adding, when politically motivated, serious and false accusations are made against me, Maine, you have my back. We'll see what voters say on Tuesday. Victor.\n\nBLACKWELL: Indeed we will. Danny Freeman reporting. Thank you very much. Peace talks between the U.S. and Iran have reached a critical stage. A top official in Iran tells CNN a potential deal hinges on the Trump administration agreeing to end its naval blockade and releasing $24 billion in frozen Iranian assets.\n\nGEN. MOHSEN REZAEI, SENIOR MILITARY ADVISER TO IRAN'S SUPREME LEADER (through translator): If the war continues and the naval blockade is not lifted, we will drag the war to the Indian Ocean, the Bab El Mandeb Strait, the Red Sea and the Mediterranean. (END VIDEO CLIP)\n\nOvernight, the U.S. military struck several coastal sites in Iran. It also intercepted a wave of missiles and drones launched by Iran toward the Strait of Hormuz as well as toward Kuwait and Bahrain that's threatening an already fragile ceasefire. Israeli forces also ramped up attacks against Hezbollah targets in Lebanon. It killed more than 20 people.\n\nCNN's Barbie Nadeau is tracking the latest developments. She joins us now live from Rome. Barbie?\n\nBARBIE NADEAU, CNN CORRESPONDENT: Yes, you know, Victor, there's a lot of talk about peace, but when you see this sort of escalation of military activity over the last couple of days, it's really hard to understand what that is starting to look like. We've had 20 people killed in Lebanon. We heard the president of Lebanon tell CNN's Christiane Amanpour that he felt Lebanon was being used as a bargaining chip. We hear Iran saying that's not true. There's just a lot of back and forth.\n\nAnd as you say, these interceptions of drones and missiles and attacks towards Kuwait and Bahrain, sending people to take shelters, very unsettling. But we did hear from President Donald Trump. Let's listen for a second, hear what he had to say about these peace talks.\n\nTRUMP: We're at a point we're going to come out of Iran very quickly and it's going to be very strong one way or the other, whether it's a piece of paper or the very tough way. OK. The very tough way is maybe the easier way.\n\nNADEAU: And you know, Victor, one way or another, the tough way, the piece of paper, that's very unsettling for people in the region there, you know, and for the global economy as it stands. So it's a lot of waiting, wishing, wondering and trying to interpret what messages really mean. Victor.\n\nBLACKWELL: Barbara Nadeau reporting for us. Thank you, Barbie.\n\nHappening now, we are following Pope Leo as he kicks off a six-day tour of Spain. How he's confronting one of the church's biggest controversies along the way.\n\nPlus, father in Virginia is sentenced in that double murder plot involving his family's au pair. We have details for you that ahead.\n\nAnd President Trump is facing backlash over his pick to lead the intelligence community. Why the president is waving off questions about Bill Pulte's qualifications.\n\nBLACKWELL: All right. Here are some of the headlines we're watching this morning. Pope Leo is kicking off a visit to Spain with political polarization and migration front and center. Pope Leo is set to visit migrant centers and address Spain's parliament. Investigate -- immigration rather has become a key priority for his papacy. And he's been outspoken about how migrants are treated.\n\nThis six-day trip also includes a major stop in Barcelona to visit Sagrada Familia Basilica. It is also expected that he will meet with sexual abuse survivors.\n\nThe search is intensifying in the Bahamas in that mysterious disappearance of an American sailor. The U.S. Coast Guard has now taken custody of the dinghy where Lynette Hooker was last seen. Her husband, Brian Hooker, told investigators that she fell overboard on April 8. Officials opened a criminal investigation three days later after raising questions about that account.\n\nCadaver dogs, divers, specialized equipment, they were brought in earlier this week as search teams look for any remains. So far, no suspects have been publicly identified. Her husband has repeatedly denied any wrongdoing.\n\nIn California, a jury has awarded millions to the family of two young boys killed in a hit and run. It happened back in 2020. Prosecutors say the boys were hit in a crosswalk. Their parents and younger brother were awarded $176 million after the jury found socialite Rebecca Grossman and former major league pitcher Scott Erickson negligent. Grossman was driving the car and was already convicted in a criminal case. She's serving 15 years to life.\n\nIn Virginia, a man convicted in a double murder plot has been sentenced to life in prison. In February, a jury convicted Brendan Banfield of killing his wife and another man. This was a case that centered on an affair with the family's au pair. You might remember it. The family members faced him in court yesterday and delivered emotional statements before the sentence. CNN's Sherrell Hubbard has more.\n\nUNIDENTIFIED MALE: Sir, is there anything you wish to say?\n\nSHERRELL HUBBARD, CNN CORRESPONDENT (voice-over): Convicted murderer Brendan Banfield, a former IRS agent still attempting to maintain his innocence before being sentenced to life in prison without parole Friday.\n\nBRENDAN BANFIELD, SENTENCED TO LIFE IN PRISON: I loved her very much, despite what you may think of my affairs.\n\nHUBBARD (voice-over): The judge in the case said she had no qualms about handing down the sentence. JUDGE PENNEY AZCARATE, CIRCUIT COURT IN FAIRFAX COUNTY: The level of cruelty calculation and inhumanity in this case reflects something far deeper than anger or impulse. It reflects evil.\n\nHUBBARD (voice-over): Prosecutors said Banfield hatched a plan to kill his wife, Christine Banfield, and another man, Joseph Ryan. They say he used a fetish website to lure Ryan to his house under the guise of having consensual sex with his wife. The plot was to frame Ryan, whom Banfield would allege attacked his wife, telling the jury he killed Ryan in an attempt to save his wife's life.\n\nDANIELLE HOCKER, CHRISTINE'S OLDER SISTER: I didn't truly know Brendan at all. I don't believe anyone did. Not family, not friends, and certainly not Christine.\n\nDEIRDRE FISHER, JOSEPH RYAN'S MOTHER: Joe wasn't just the disposable caricature. He had a name. My son was a kind human being.\n\nHUBBARD (voice-over): Over five days of the trial, Fairfax county prosecutors called more than 20 witnesses, including the au pair at the center of the case, who testified about the scheme to, quote, get rid of Christine Banfield. The au pair said Banfield wanted to be with her but did not want to pay for a divorce or share custody of the couple's daughter.\n\nUNIDENTIFIED MALE: He thought he could create the perfect crime. He thought he was smarter than everybody else. He wasn't.\n\nHUBBARD (voice-over): I'm Sherrell Hubbard reporting.\n\nBLACKWELL: All right, Sherrell, thank you. The au pair is serving a 10-year sentence. She pleaded guilty in October 2020 -- 2024 to involuntary manslaughter for fatally shooting Ryan and agreed to testify against her former lover in exchange for that plea deal.\n\nStill ahead, the Justice Department has officially killed plans for President Trump's so called anti-weaponization fund. But is there a chance that it could come back?\n\nBLACKWELL: President Trump says he's interviewing five candidates for the job of Director of National Intelligence. Trump made these remarks yesterday aboard Air Force One. Now, this is after the firestorm over his decision to install Bill Pulte, his Federal Housing Finance Agency director, in that position. And Trump, of course, clarified that his appointment is only temporary.\n\nAnd he does plan to name another permanent replacement. Pulte has no known intelligence experience. He also did not have a security clearance before Trump chose him.\n\nLet's talk about this now with Errol Louis, political anchor for Spectrum News. He's also the host of the Big Deal with Errol Lewis. Errol, good morning to you.\n\nSo let's start here. The President probably knew that Bill Pulte didn't have the security clearance, but he knew that he was loyal. Right? And that is what is most important to the President.\n\nLet me play here what the President said about his choice.\n\nTRUMP: I don't think he'd want to be permanent, but he's a very smart guy, and he may find out some things about the rigged elections, et cetera, et cetera. I think he'd like to do it.\n\nBLACKWELL: Trump also told the Wall Street Journal that he wants him to make the ODNI smaller and maybe consider getting rid of it. What do you make of the marching orders to Bill Pulte?\n\nERROL LOUIS, POLITICAL ANCHOR, SPECTRUM NEWS: Good morning, Victor. Well, it was kind of obvious what Bill Pulte is there to do or selected to do. This was the same person who provided a lot of the information for some of the baseless indictments of Donald Trump's enemies. These are indictments that grand juries rejected in one jurisdiction after another.\n\nBut it was based on information, in part, whenever you hear about these allegedly fraudulent mortgages that the president's enemies appear to or have been accused of taking out. Well, this was information from the housing agencies controlled by Bill Pulte.\n\nSo this was somebody who was already working hand in glove with the President to try and take out his enemies. And I think some of the alarm that you saw on Capitol Hill at the notion of this person getting intel -- control of the intelligence apparatus is that he's already shown that he's part of the retribution campaign that the President is waging.\n\nBLACKWELL: He's got 210 days max in that position, which, of course, if anybody's counting, takes us right through the November elections.\n\nLet's talk about Graham Platner, likely to be the Democratic nominee for Senate in Maine. The claims that he admits to and those that he denies. Do those complicate the races outside of Maine?\n\nLOUIS: I mean, you talk with Democrats about Graham Platner, they bring up Ken Paxton, the Republican nominee in Texas. Does this have residue that stains other races for Democrats across the country?\n\nLOUIS: Well, there's a resource question, if nothing else. Republicans have said they're going to spend $42 million to defend Susan Collins in Maine. Democrats have said that they're going to spend $24 million to try and prop up Graham Platner. Now, that number may change Depending on what else is learned about him.\n\nAnd if it starts to look like he's not viable, that might change. But that's $24 million that would not go to other candidates. So, yes, it all works together as far as brain space, you know, talking about scandals. Sure. It enables Republicans to say, well, we've got Ken Paxton, who's got a lot of problems. Well, you've got this guy, Graham Platner. And so everybody's got problems. And it kind of takes away certainly a talking point for Democrats.\n\nBLACKWELL: Let me ask you about the so called anti-weaponization fund. The Department of Justice has now told two federal courts that cases challenging that fund are moot because the administration has abandoned the program. Two points here. First, one of the cases is 35 former federal judges alleging that the President and the Department of Justice defrauded the court, that there was no real conflict and they colluded to create this fund.\n\nDoes that just go away? Because Todd Blanch says, never mind.\n\nLOUIS: Oh no. Oh no, no. The issue of whether or not there was a fraud on the court, whether or not there was a real case and controversy at the core of all of this, that's been reopened and there judges, I think the jurisdiction is in Florida where they're looking at that.\n\nOh no, by no means has that question gone away. Now the funding is there for the slush fund. And by the way, Victor, you have to point out there have already been a number of settlements. I mean, using existing programs, the Justice Department can funnel maybe not $2 billion, but quite a lot of money to two people that the administration or the President thinks are deserving of some, quote, anti-weaponization money.\n\nSo the issue has not gone away. The question of whether or not the fund should ever have been created has not gone away. And what Todd Blanche says about what they plan to do with it, frankly, never really had very much credibility. You really have to watch the numbers, not the statements from Todd Blanche.\n\nBLACKWELL: And there are some members of Congress, including Republicans, Senator Cassidy, Senator Tillis, who wanted to codify that this fund would never exist. Is it possible even if we hear from and read from the DOJ to courts, that it's a moot point because they've abandoned it, that it could be resurrected?\n\nLOUIS: Well, you know, it can be resurrected because the two gentlemen you just mentioned, Thom Tillis, Senator Cassidy, Senator Cornyn, these are all Republicans who are on their way out because they were not hand-in-glove, in lockstep with the President.\n\nAnd so, yes, they -- they're trying to sort of maybe show a glimmer of independence now, but it's too late and they don't have the votes. And the bill that just passed, in fact, did not outlaw it as they could have when they considered getting rid of this fund and making clear that it should not exist. And so, now the fund -- the fund will probably exist, it will be\n\nfunded. It's going to take real guardrails, you know, sort of talking about it, talking about breaking from the pack after you've been defeated, after you're on your way out and you're a lame duck, that's really not going to get it.\n\nBLACKWELL: One more here for a New Yorker. The President says that he's going to be at game three of the NBA finals at Madison Square Garden. Knicks up 2-0. NBA Commissioner Adam Silver said that the President will be the first sitting President to attend the NBA finals.\n\nHe also said that sports is something where we can emphasize, we -- what we have in common, not what pulls us apart. It creates a sense of belonging. I wonder, Errol, is that what you expect we'll see when the President's face is flashed up on the big board at MSG?\n\nLOUIS: No, I don't think so. This is much bigger than the President, to be honest with you -- the energy here. You spent many years living up here, Victor --\n\nLOUIS: You know how long we've been waiting, half a century, most of my adult life we've been waiting for this. So, no, I don't think so. In fact, you know, to be honest with you, positive or negative reaction when the President's face is flashed on the screen, that's just a sideshow. I mean, we got real business here. We've got -- we've got a really important third game to win.\n\nBLACKWELL: All right, we'll see if they can do it in four. They're up 2-0. Errol Louis, always good to have you on a Saturday morning, thanks so much.\n\nBLACKWELL: Wall Street closed for the week with most major indices in the red. And tech stocks accounted for much of the heavy losses. CNN's Richard Quest breaks down what led to the massive downturns in that space, and why A.I. could be responsible.\n\nRICHARD QUEST, CNN BUSINESS EDITOR-AT-LARGE (on camera): It was an unpleasant end to the stock market week with the Nasdaq, the S&P and the Dow all losing ground, and in some cases, the worst sessions for many months. But today's accident didn't just happen on a Friday.\n\nThe warning signs had been there for several days, particularly when Broadcom announced its results and the market gave it a thorough beating up. It simply wasn't good enough. And then, as the week continued, so the rot set in.\n\nBy the time you get to Friday, where we're seeing some impressive losses, Nvidia down 6.25 percent, Broadcom down another 7.9 percent, Intel off 11 percent. And the reason is the same. The market is coming to the realization that the sheer amount of money being plowed into A.I. by these companies simply will not bring the returns in the short to medium term.\n\nThey are worried that huge sums are being spent and the path to profitability, whilst certainly, the businesses are making money, can't justify those levels of investment. But here's the conundrum. Everybody knows that A.I. is the only game in town.\n\nTherefore, if you are one of those companies, you have no choice. You have to find the money and you have to keep spending, and yes, the market will exact its wrath. Richard Quest, CNN, New York.\n\nBLACKWELL: All right, Richard, thank you very much. And let's stay with this, this theme of A.I., because there's a new report that really paints a troubling picture as there are more data centers being built across the U.S. What we're learning about the economic and the environmental costs.\n\nAnd if you're heading out, take me with you, please. Remember, you can go straight to the CNN app and stream our show anywhere in the U.S. You can also go to cnn.com/watch.\n\nBLACKWELL: President Trump announced plans to host leaders from major A.I. companies in the White House, possibly as soon as next week. The President signed a new A.I. and cybersecurity executive order, asking tech companies to voluntarily submit new A.I. models to federal government for review before releasing them to the public.\n\nThis week, a new report by the United Nations University raised concerns about the real-world environmental impact of A.I. It found that A.I. data centers consume more electricity than most countries on average, and they also require massive amounts of water.\n\nProfessor Kay Ivey Mamdani is co-author of that study and its lead investigator, and he joins me now. Thank you so much for being with me. And I want to start with just some of the numbers that are astonishing from this report.\n\nLet's put them on the screen. Global data centers use 448 trillion- watt hours of electricity. That electricity used to produce about 208 million tons of carbon dioxide, and consumed about 1.2 trillion gallons of water, and you predict the water and energy usage will double by 2030. Talk to me about the environmental impact of just the extraordinary level of consumption.\n\nKAVEH MADANI, UNITED NATIONS UNIVERSITY: And let me tell you that this is only the tip of the iceberg, because those numbers are only related to the electricity consumption and the amount of water, we need for the electricity consumption and some other elements of the process.\n\nIt doesn't include the water that we pollute and use during the extraction of critical minerals that we need to produce the basic infrastructure and hardware for our A.I. operations. And then also, what we need to do at the end with its e-waste, and all those processes, we use water and energy.\n\nAnd there's nothing there that is dry and doesn't require water. Why is this important? Because most people around the world, most societies, still the dominant discourse around A.I. is thinking that A.I. is just a virtual thing, right? It's a -- it's a virtual product.\n\nIt's a digital technology, not associating it with all this massive infrastructure, the physics behind it, the major material supply chains behind A.I. And then that was the -- what we wanted to do. Not to say that A.I. is bad, not to say that governments should not be investing in A.I., but to remind them that we have to also worry about these impacts because we already know that the world is water bankrupt.\n\nWe don't have enough water in many regions of the world. We know that carbon emissions are high and adding more electricity demand to our needs, to our portfolio means that we have to -- we will compromise the decarbonization process and create a lot of problems.\n\nThat's why you see in many parts of the world, including the United States, now, people are having conflicts over the establishment of these data centers because farmers are worried or cities are worried, urban population, indigenous communities around the world are worried about these data centers coming to their place, and they are only bearing the cost, not taking advantage of the benefits.\n\nBLACKWELL: Yes, and there are some communities who are trying to keep these data centers out of their communities locally. More on this report. It explores the tens of billions of watt hours that it takes to train some of these A.I. models, massive amounts of energy.\n\nI want you to listen here to OpenAI CEO Sam Altman on what he says when it comes to training these models is an unfair comparison. Watch.\n\nSAM ALTMAN, CEO, OPENAI: One of the things that is always unfair in this comparison is people talk about how much energy it takes to train an A.I. model, relative to how much it costs a human to do one inference query.\n\nBut it also takes a lot of energy to train a human. It takes like 20 years of life, and all of the food you eat during that time before you get smart. And not only that, it took like the very widespread evolution of the 100 billion people that have ever lived and learned not to get eaten by predators and learned how to --\n\nUNIDENTIFIED MALE: Yes --\n\nALTMAN: Like, figure out science and whatever to produce you. And then you took whatever you know, you took. So, the fair comparison is, if you ask ChatGPT a question, how much energy does it take once its model is trained to answer that question versus a human, and probably A.I. has already caught up on an energy efficiency basis measured that way.\n\nBLACKWELL: Do you agree with that? You think it's -- his framework is fair?\n\nMADANI: His framework is reflective of part of the problem. His narrative is correct, but not necessarily complete. Actually, it is true that, and the -- it is not enough to only focus on training. Training uses a lot of energy that "},{"seg":2,"url":"https://transcripts.cnn.com/show/ctmo/date/2026-06-06/segment/02","title":"CNN.com - Transcripts","text":"Return to Transcripts main page\n\nIran Warns Of Wider War, Demands Release Of Frozen Assets; Dept. Of Justice Sends Prosecutor To Observe LA Ballot Counting; Pope Leo Kicks Off High-Stakes Visit To Spain; Search For Alabama Engineering Student Continues, Trump Selected Acting Director Of National Intelligence With No Intelligence Experience; Knicks Take 2-0 Finals Lead After Wemby Misses Last Shot. Aired 7-8a ET\n\nAired June 06, 2026 - 07:00   ET\n\nTHIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED.\n\nVICTOR BLACKWELL, CNN ANCHOR: Welcome back to CNN THIS MORNING WEEKEND. Here's what's happening. The U.S. says it has intercepted new Iranian attacks in the Strait of Hormuz. What President Trump is saying about the war, now in its third month. The president was in Wisconsin yesterday to pitch farmers on his trade policy. He kind of did that.\n\nDONALD TRUMP, PRESIDENT OF THE UNITED STATES: Come up here today. I don't need this. I got elected. I don't know what the hell do I have to be here for? I got elected. I'm here because I like the farmer.\n\nBLACKWELL: We'll talk about the purpose of the visit for both his base and for the GOP efforts to keep the majority. And the family of a man missing in Japan is holding out hope that he will be found alive.\n\nNANCY HIGGINBOTHAM, MISSING STUDENT'S MOTHER: I know Weston. I know he's in those woods. And I know he's alive.\n\nBLACKWELL: What we know about what led up to his disappearance and the moment his family knew something was wrong. Plus, why NASA ordered the crew aboard the International Space Station to seek shelter in an emergency escape capsule.\n\nWelcome to your weekend. Saturday, June 6. I'm Victor Blackwell.\n\nIran is threatening to expand its war with the U.S. Peace talks are at a stalemate between the two countries. A top Iranian official tells CNN the Trump administration must agree to end its naval blockade and also release $24 billion in frozen Iranian assets to end this war. Overnight, the U.S. military struck several coastal sites in Iran. And the Iranians launched waves of missiles and drones toward the Strait of Hormuz, toward Kuwait, Bahrain, threatening to unravel a very fragile ceasefire.\n\nIsraeli forces? They also ramped up attacks against Hezbollah targets in Lebanon that killed more than 20 people. Here's what President Trump had to say about the war during that event in Wisconsin yesterday.\n\nTRUMP: We're at a point where we're going to come out of Iran very quickly, and it's going to be very strong one way or the other. Whether it's a piece of paper or the very tough way. OK? The very tough way is maybe the easier way.\n\nBLACKWELL: Let's get more now from CNN'S Oren Liebermann.\n\nOREN LIEBERMANN, CNN JERUSALEM CORRESPONDENT: We have seen a number of attacks and intercepts on Saturday morning in the Gulf region and between the U.S. and Iran. And all of that puts into question the fragile ceasefire itself, as well as the diplomatic track around that ceasefire to try to get to a broader agreement.\n\nEarly on Saturday morning, Iran's semiofficial news agency says they launched what they called warning shots to what they say may have been U.S. Navy vessels operating in the region. U.S. Central Command, which governs military operations in the Middle East and in the Gulf, says they intercepted four one-way attack drones and then carried out strikes on two surveillance radar sites on Iran's coast that they say will ensure the safety and maritime security in the region there. Iran then launched seven ballistic missiles, according to CENTCOM. Six of those were intercepted, CENTCOM said, while one of those did not reach its target.\n\nThe targets of those ballistic missiles were Kuwait and Bahrain. And we saw warning sirens in both of those countries as well as Kuwait, saying they were responding to incoming fire. It was just earlier this week that an Iranian attack struck Kuwait's airport, killing one and wounding more than 60 others. So, you see here, what is a pattern of ongoing fighting around that ceasefire here.\n\nNow, President Donald Trump has said that the ceasefire negotiations and the talks were moving very fast. But it doesn't appear that anything is moving fast here. Certainly, not the reopening of the Strait of Hormuz, which is supposed to be the first step in that ceasefire agreement and the immediate goal of the talks here.\n\nMeanwhile, an adviser to Iran's supreme leader says the talks are deadlocked. Iran continues to operate and negotiate from what they see as a -- as a position of strength. They're not rushing to an agreement, no matter what Trump has claimed about Iran trying to get to an agreement.\n\nAnd that's why, you see -- at least part of the reason why you see this long, dragged-out process and the fighting that's ongoing around a fragile ceasefire. Oren Liebermann, CNN in Jerusalem.\n\nBLACKWELL: Oren, thank you for that report. President Trump was back on the campaign trail yesterday. He's trying to rally his MAGA base for the upcoming midterm elections. The president visited Chippewa Falls, Wisconsin, for a rally branded as Fighting for American Farmers. Now, some farmers say that they've been hurt by some of the administration's trade policies and the war with Iran.\n\nBut in his remarks, the president seemed more focused on fountains and reflecting pools back in D.C. Even went so far as to say that he didn't need to campaign for Republicans, and suggested he would rather be at home watching TV.\n\nTRUMP: As president, I fought for the American farmer like no one has ever fought before. Nobodys -- like, I'm up here today. I don't need this.\n\nI got elected. I don't know what the hell do I have to be here for? I got elected. I'm here because I like the farmer.\n\nI mean, when you think about it, I guess there's a lot of truth to that, right? I could be home right now in the beautiful White House, enjoying watching somebody else on television talk.\n\nBLACKWELL: President Trump is expected to continue campaigning for Republicans over the next five months, as they try to hold on to the House and Senate majorities.\n\nNew this morning. CNN projects that democrat and former HHS Secretary Xavier Becerra will advance to the November general election in the race for California governor. Ballots in California are still being counted, so it's not clear who Becerra will run against. California has long had a reputation for being really slow to report election results.\n\nIt's largely due to the time it takes to count the mail-in ballots. And the slow pace has made it a target for critics, including the president. The Justice Department has now sent one of its attorneys to observe ballot processing in Los Angeles. President Trump has made false claims of election fraud there. Here's CNN'S Evan Perez.\n\nEVAN PEREZ, CNN SENIOR JUSTICE CORRESPONDENT: The Justice Department sent an attorney to observe ballot processing in Los Angeles on Friday. The move comes days after President Donald Trump said that the top federal prosecutor there was investigating the vote counting after Tuesday's primary elections. The L.A. County elections office told CNN that it was notified that an assistant U.S. Attorney was being dispatched to watch ballot-counting activities.\n\nNow, it's not uncommon for election results in California to take sometimes weeks before they're finalized, in part because of the processing of mail-in ballots. Trump has claimed, without evidence, that the slow pace of the count from Tuesday's primary was a sign of Democratic \"Cheating.\" Several key races in the state, including for governor and LA mayor, are still being counted.\n\nWe haven't seen any public signs that the Justice Department has found any evidence of a crime. Earlier Friday, First Assistant U.S. Attorney Bill Essayli, a Trump appointee who leads the U.S. Attorney's office in Los Angeles, said that his office had \"Multiple election fraud investigations underway,\" in a social media post that also bashed California's election system.\n\nCounty officials have defended their processes, writing on social media on Thursday that the dedicated staff is working to ensure that every vote is accurately processed and verified for counting. The Los Angeles County district attorney's office told CNN that it had not received any complaints from the federal government regarding criminal misconduct related to the vote counting or fraud in the Los Angeles County primary election. Evan Perez, CNN, Washington.\n\nBLACKWELL: All right. Here's what else we're following this morning. Ukraine has launched a major drone strike on Saint Petersburg as Russia hosts President Vladimir Putin's signature economic forum. Russian officials say more than 100 drones were shot down, with damage and fires reported across that region. People were told to stay indoors as air defenses responded.\n\nThis is after another strike earlier this week during that same high- profile gathering. It's often called Putin's Davos. It has drawn thousands of attendees from around the world.\n\nThe CDC says the current Ebola outbreak in the Democratic Republic of Congo could become the largest on record. It's already the fourth largest, with at least 60 confirmed deaths. Researchers say without rapid public health action, the outbreak could surpass past epidemics. They warned that it could approach the scale of the 2014 to 2016 West Africa outbreak that infected more than 28,000 people and killed more than 11,000.\n\nFive astronauts on the International Space Station were told to take shelter on Friday. Now, this order came after a leak was found in the Russian-controlled side of the orbiting lab. NASA moved them into a SpaceX Crew Dragon Capsule so that they could escape quickly if needed. Now, the all-clear was given later after repairs were delayed, in order to assess more information about that leak. Still not clear when repair efforts will resume. [07:10:23]\n\nPope Leo is in Madrid this morning, the first stop on his six-day tour of Spain. We'll talk about how he's using the trip to address one of the church's biggest controversies.\n\nAlso, an American student is missing in Japan. His family says they're now getting extra help in their desperate search. Well explain when we return.\n\nBLACKWELL: This morning, Pope Leo is kicking off a visit to Spain with political polarization and migration front and center. Live pictures for you in Madrid. There's Pope Leo. The pope landed there about half an hour -- half an hour ago. He's expected to visit migrant centers and address Spain's parliament.\n\nCNN Vatican Correspondent Christopher Lamb joins us now. So, six days. What should we expect during this visit?\n\nCHRISTOPHER LAMB, CNN VATICAN CORRESPONDENT: Well, Victor, it is a significant trip by Pope Leo because it's his first major European visit since his election. Spain, traditionally a catholic stronghold of Europe. This is the first papal visit in 15 years.\n\nWe're expected to see a strong focus on migration. The pope's going to go to the Canary Islands, which is a major entry point for immigrants from Africa. He's also going to address the political scene here in Spain, which is very polarized.\n\nHe's going to be talking to Spain's parliament. That's the first time a pope has done that. He'll also be meeting with Prime Minister Pedro Sanchez, who is something of an ally of Pope Leo when it comes to the war in Iran.\n\nPedro Sanchez, the prime minister, has been outspoken against the war. That's something that Pope Leo has also spoken out against. And Sanchez also defended the pope when President Trump attacked Leo those weeks ago in April.\n\nLeo starting the trip by meeting with the king and queen of Spain and will address the political and civic authorities. He's also here to try and encourage the catholic church in Spain, which, you know, it's a secularized country here, but there are strong catholic roots. I actually spoke to him on board the plane about the rise in numbers that we're seeing in young people converting or showing an interest in Catholicism. And he said he's encouraged by that.\n\nHe also pointed out, though, that his trip to Madrid coincides with a concert by the musician Bad Bunny. And he said that, you know, many young people will probably go to see Bad Bunny rather than see the pope. But there are some seeing the pope. So, that is at least something. So, quite a lot for the Pope on this action-packed schedule in Spain. Victor.\n\nBLACKWELL: Yes, competing with Bad Bunny for attention here. Christopher Lamb reporting on the pope's trip to Spain. Thanks so much.\n\nStill ahead. The search continues for that missing American in Japan. Investigators are now getting extra help in their search. We'll get that information for you when we return.\n\nPlus, customers at one restaurant got dinner and a show. More of this amazing video after the break.\n\nBLACKWELL: Peace talks are at an impasse, and the violence is escalating in the war with Iran. Iran's military launched a wave of missile and drone strikes overnight, targeted the Strait of Hormuz, Kuwait, Bahrain. The U.S. countered with strikes on several targets along Iran's coastline.\n\nLet's bring in now Behnam Ben Taleblu. He's the senior director of the Iran program at the Foundation for Defense of Democracies. Thank you so much for being back.\n\nWe have heard from the principals in this war over the last 24 hours. I'm going to play a lot of the sound. I want you to give us the context around it.\n\nLet's start with President Trump, who spoke with NBC News. And Kristen Welker asked him if the Iranians are so desperate to reach a deal, as he has said they are for months, why have they not reached one? Here's what the president said.\n\nTRUMP: I think they can't believe they're in the situation where they've been virtually decapitated.\n\nKRISTEN WELKER, ANCHOR, NBC NEWS: But if they're so desperate, Mr. President, why haven't they said yes to the terms you're proposing?\n\nTRUMP: Because they're proud. There are things they never thought they'd be doing that they're going to have to do. They've got no choice.\n\nBLACKWELL: So, what do you think of that? The president says that this is just a delayed resignation to the inevitable.\n\nBEHNAM BEN TALEBLU, SENIOR DIRECTOR OF IRAN PROGRAM, FOUNDATION FOR DEFENSE OF DEMOCRACIES: Well, great to be with you. That seems to be the million-dollar question. But forgive me, that seems to also misunderstand elements of Iran's strategy. Yes, the regime is hubristic and proud. But more importantly, it's ideological. And it's keen to avoid giving America -- not just American presidents, but this American president, a victory image, particularly after not one but two rounds of overt military action against the Islamic Republic. There's that.\n\nBut then there's also the larger strategy here at play. And that strategy is to force America either into a bad deal that kind of guarantees more Iranian access to cash or a conflict that doesn't guarantee a military and political outcome that America and/or Israel would be willing to pay for. So, you may remember back in Trump term one, Trump administration officials talked about putting Iran to the choice. The Iranian strategy here by exploiting the gray zone, by continuing low intensity fighting during the ceasefire, and also saying yes, no, and maybe to talks all at the same time, is designed to put America to the choice and see what we'll want versus what we will settle for.\n\nBLACKWELL: All right. So, you pointed out the military element and the cash element that Iran is forcing here. Our Fred Pleitgen had an exclusive interview with the military advisor to the Ayatollah Mojtaba Khamenei. And I want to play for you first on the fighting. Here's what he said could happen if this blockade continues.\n\nMOHSEN REZAI, SENIOR MILITARY ADVISER TO IRAN'S SUPREME LEADER (through a translator): If the war continues and the naval blockade is not lifted, we will drag the war to the Indian Ocean, the Bab El Mandeb Strait, the Red Sea, and the Mediterranean. And we will give another dimension to the war by attacking these other American bases that we have been attacking so far.\n\nBLACKWELL: And so, what do you know about the capabilities of the Iranians to make good on that threat?\n\nTALEBLU: Well, certainly, the Islamic Republic has proven an ability to export maritime harassment and terrorism. You know, when the Houthis were doing that a few years ago, that was actually because they had learned from their patron and were equipped from weapons from their patron, the Islamic Republic of Iran, the ability to go after these ships, these vessels, and to go after a strategic chokepoint in the Red Sea and the Bab El Mandeb. As we saw the Houthis do, their partners on the southern part of the Arabian Peninsula just a few years back.\n\nNow, that's a sort of Damocles. The regime is dangling over, not just the Arab States, not just over the West, but over the international economy. And in my view, that only heightens the choice before the Trump administration.\n\nAnd here, actually, we have other tools, not just military, but economic tools against the administration -- against the regime that the administration should consider. The latest data, particularly for the month of May, which is when the full blockade has been in effect, meaning start to finish the whole month was Iran was only able to export 64,000 barrels of oil per day. Meaning, only four vessels -- four smaller vessels got past the U.S. blockade.\n\nWhen the regime's, you know, major parts of its economy are reliant on hydrocarbons and petrochemical product sales, and they can only export up to 64,000 barrels per day, when just back in February, before the conflict began, they were exporting over 2.1 million barrels of oil per day, they are facing bankruptcy. And that's precisely why they're going to be lashing out and threatening this wider circle of escalation.\n\nBLACKWELL: Yes. And of course, as we reported that the Iranians are demanding a $24 billion release of their assets. $12 billion ahead of the signing and $12 billion later. Control room, let's go to the Christiane Amanpour exclusive interview with the Lebanese president, Joseph Aoun. And this is what he said about the accusations -- strong accusations about the IRGC and their influence on what's happening in Lebanon. Let's watch.\n\nJOSEPH AOUN, PRESIDENT, LEBANON: Our people being killed. Our people being -- our houses being destroyed. They are using Lebanon as a bargaining chip in their negotiation with the United States. It's unacceptable.\n\nBLACKWELL: Now, the IRGC denies that. Is he right? You've written that the IRGC is feeling emboldened as it relates to Lebanon.\n\nTALEBLU: Certainly, feeling emboldened as it relates to Lebanon and their proxy -- their Hezbollah, which is their most powerful proxy, and still the one that they're hoping to recreate and rebuild, hoping that America and Israel tire of this conflict. But no, the Lebanese president you mentioned right now is absolutely right. 110 percent right.\n\nThe Islamic Republic of Iran's entire military strategy is basically reliant on working by, with, and through downtrodden and dispossessed persons in the heartland of the Arab and Muslim world to continue its fighting for it. And unfortunately, Lebanon, a proud country, has been one of the main theaters that has been sacrificed in this larger, decades-long war against Israel, America, and the West. And certainly, Lebanese citizenry and even Lebanese Shia have been paying a price for being this battleground.\n\nThe question is, what kind of capacity does the Lebanese state have to push back? Lebanese society, what can they do to push back, and what can and can't America and Israel do to help them? And this is why it's critical to know who is your friend and who is your ally versus who is a fair-weather friend, and who is your adversary. Because look at what the Islamic Republic of Iran is doing. Its most powerful proxy in Lebanon got clobbered by Israel. And yet still, as much as this regime needs cash, and you mentioned the billions that it wants and is trying to get from America, it is risking losing all of that just to stand by its partner and proxy, Hezbollah. The question is, where are we when it comes to standing with our partners?\n\nBLACKWELL: Behnam Ben Taleblu, always good to have the analysis. Thank you.\n\nBLACKWELL: A desperate search for an Alabama student who was missing -- is still missing in Japan, is continuing this morning after a typhoon impacted those rescue efforts.\n\n20-year-old Auburn University student, James Weston Higginbotham, disappeared last month, while on vacation with his family. They have refused to leave the country without him. His mother, Nancy, spoke last night with our Erin Burnett.\n\nNANCY HIGGINBOTHAM, MOTHER OF MISSING STUDENT: We had a little argument, so, after lunch we reconvened in the hotel and decided, you know, that we all probably needed a little bit of space. So, Weston, we went -- my son -- my husband, and I went to a temple, and Weston chilled out in the hotel room for a little bit. And then, he walked by the river and went to a couple stores, and then he took the train, and that's when, you know, unfortunately, he turned off his location.\n\nBLACKWELL: CNN's Hanako Montgomery has the latest details on the search in Kyoto.\n\nHANAKO MONTGOMERY, CNN INTERNATIONAL CORRESPONDENT (voice over): Deep in Japan's forests, a search is underway for Weston Higginbotham, a 20-year-old college student from Alabama, who vanished during a family vacation.\n\nMONTGOMERY: So, this is the type of trail that the Japanese police have been investigating to search for Weston. He is known as an avid hiker, so, they think that maybe he might have disappeared into the woods when he went missing on May 29th.\n\nMONTGOMERY (voice over): Police are relying on K-9 units to sniff out any trace of Weston. But the forest search ends for now with no answers. Just more anguish for a family still waiting for news.\n\nHIGGINBOTHAM: There are so many possibilities that we have thought through. KEITH HIGGINBOTHAM, FATHER OF MISSING STUDENT: Yes.\n\nN. HIGGINBOTHAM: Because as a -- you know, as a parent, you don't want to think the worst, and you know, you keep seeing these sightings here and there. It's like, well, maybe, you know, I don't know. I don't know.\n\nMONTGOMERY (voice over): The day Weston disappeared, the Higginbothams were vacationing in Kyoto, Japan, a major tourist destination in one of the world's safest countries.\n\nBut after a small disagreement with his mom, they agreed to give each other some space.\n\nNancy, his mother, tells me, it's not unusual for Weston to clear his head in nature.\n\nN. HIGGINBOTHAM: But I will say that, you know, a local resident --\n\nMONTGOMERY (voice over): But when he seemingly turned off his phone location, panic set in.\n\nN. HIGGINBOTHAM: Well, it was scary, because that's not Weston. I mean, we are just -- we don't do that in our family. Even when we are mad, we don't do that in our family.\n\nMONTGOMERY: Since then, Nancy has posted daily appeals on social media, asking anyone with information to come forward.\n\nN. HIGGINBOTHAM: He has a heart of gold, and we all want him to come back safely.\n\nMONTGOMERY: Strangers have answered her call. Sharing Weston's photo and distributing flyers to help find him.\n\nMANAMI NAKAGAWA, VOLUNTEER (text): The search ends when people stop looking. For as long as it takes, I'll keep doing everything I can until he is found.\n\nMONTGOMERY: The police have told us that until they find Weston, they won't stop looking, and as the search continues, so does a mother's hope.\n\nAnd today, the search is getting extra help. Citizen hikers are now heading to the mountains after Higginbotham's family organized a search and rescue party of volunteers.\n\nHanako Montgomery, CNN, Kyoto.\n\nBLACKWELL: Huge waves had people nearby screaming in Hawaii. Now, officials say that the waves were up to six feet high, but I mean, look at that. The witnesses thought they were even higher.\n\nThese big waves started on Tuesday on the west side of the Big Island of Hawaii. Now, a stormy weather system out of New Zealand last week is what generated these huge waves. That looked like more than six feet.\n\nHeat is building up, and so, is the storm threat from the Midwest and the Northeast. Millions of people could see some strong storms today.\n\nMeteorologist Melissa Nord, is tracking it all. That's more than six feet.\n\nMELISSA NORD, PART-TIME CNN METEOROLOGIST: It looks more. And you know, it hits the sea wall, so it all comes crashing over, and it's a little startling.\n\nBLACKWELL: Yes. I mean, it's good entertainment if you are inside. Right?\n\nBLACKWELL: If you are there on the wall, it's not as entertaining.\n\nNORD: And not a good situation as well, for surfers the last couple days with those large swells, as well, dangerous. So, some events were canceled there.\n\nWe do have to talk about storms, though, because it's going to be a highly populated area in the risk of severe weather later on today. Victor, we are talking about New York City, we are talking about Philadelphia, even out towards Pittsburgh, Cleveland, and also Columbus, Ohio, in a level two risk of severe weather today.\n\nNow, this is mostly going to be a damaging wind threat. Some of those winds could be easily 60, even 70 miles an hour, but also some hail possible. Quarter size approaching that 95 corridor. The timing for that is going to be later this evening for those big cities on the East Coast, but right now we are already seeing some shower and storm activity in the Corn Belt and the Midwest, as well, right ahead of this cold front.\n\nSo, that will be the trigger point, along with heat to fire up more storms later on today.\n\nCouple those moving now through the south side of Chicago, we'll see them regenerate this afternoon as we add that daytime heating, lot of spots getting to the 80s and 90s this afternoon, and you can see those storms popping up in interior new east -- New England and northeast, and then, moving in towards the 95 corridor after 8:00 this evening. So, it might be a hot and sunny afternoon, but then those storms will come in, and they could pack a punch to the south, though a lot of moisture coming off the Gulf produces that localized flash flooding threat, even though the severe weather threat is not as high there.\n\nAll right. So, little relief coming from some of these cities, for some of these cities. Thanks to this cold front, but it's not going to last for long. I do expect more heat to build in later in the week. Another day in the 90s there, New York, and also Washington, D.C. Boston, 86 degrees, that's about 15 degrees above average for them. Little cool down coming the second half of the weekend, more heat builds later next week. Victor?\n\nBLACKWELL: All right. Melissa, thank you very much.\n\nStill ahead, President Trump is facing backlash over his pick to lead the intelligence community. The president is waving off questions about Bill Pulte's qualifications.\n\nHey, if you are headed out, I'll ride shotgun. You can watch the show, stream our show from anywhere in the U.S., right from the CNN app. You can also go to cnn.com/watch.\n\nBLACKWELL: Top stories this morning. The chief of staff for Texas Republican Pete Sessions has been charged with carrying a gun onto U.S. Capitol grounds. Capitol police say they found a black pistol and ammunition in the staffer's bag as he was going through a security checkpoint in December.\n\nPolice say he admitted he did not have a license to carry that gun. Court documents note the staffer typically enters the House Office Building with Sessions, who is exempt from being screened.\n\nThe FAA says President Trump's proposed triumphal arch does not appear to pose a potential risk to air travel.\n\nThis is 250 feet tall. Now, it's set to be a place less than two miles from the Ronald Reagan Washington Airport. However, officials at the FAA are recommending that red obstruction lights be added.\n\nPresident Trump says he is interviewing five well-known people to be the next director of National Intelligence. This is after the bipartisan backlash to his choice of Bill Pulte to succeed Tulsi Gabbard in that position. Now, critics say Pulte has no known national security qualifications. Trump has since said that Pulte, who will continue to head up the Federal Housing Finance Agency, will only serve as acting director of National Intelligence. So, up to 210 days.\n\nWe are joined now by Shawn Turner, the former Director of Communications for U.S. National Intelligence.\n\nSean, welcome back to the show. Let me read here first from the Wall Street Journal's interview with the president about his choice of Bill Pulte. He says, \"Frankly, it might be good for him to shake it up before people come. Because if he reduced the size in conjunction with me and in conjunction with possibly the person coming in, he can do a lot of the hard work, and we wouldn't have to saddle somebody that goes in. We've made the Department of Education much smaller, and likewise, this should be much smaller. And this should maybe even be terminated, and we'll make that decision.\"\n\nWhat's your reaction to hearing that the president -- once Pulte -- essentially, going to be the hatchet man? Make it smaller, or maybe we'll just get rid of the ODNI.\n\nSHAWN TURNER, FORMER DIRECTOR OF COMMUNICATION FOR UNITED STATES NATIONAL INTELLIGENCE: Yes, Victor. Good morning. It's good to see you. Good to be with you again.\n\nWhen I hear those words, that maybe even the Office of the Director of National Intelligence should be terminated, I will tell you, as a student of history and someone who spent a long time in government national security, and intelligence, that's a scary thought.\n\nWe have to remember that there are few places in government where the stakes are higher than in the intelligence community. The most consequential decisions that any p"}],"vocabulary":[{"word":"rally","phonetic":"/ˈræli/","pos":"n.","level":"六级","cn":"集会","en":"a large public meeting, especially one held to support a particular idea or political party","excerpt":"President Trump returned to the campaign trail yesterday as he tries to rally his MAGA base for the upcoming midterm elections.","example_cn":"总统特朗普昨日重返竞选之路，试图为其MAGA基础选民在即将到来的中期选举中鼓劲。"},{"word":"midterm","phonetic":"/ˌmɪdˈtɜːrm/","pos":"adj.","level":"六级","cn":"中期的","en":"relating to the middle of a period of time, especially a political term of office","excerpt":"President Trump returned to the campaign trail yesterday as he tries to rally his MAGA base for the upcoming midterm elections.","example_cn":"总统特朗普昨日重返 hat that is starting to look like.","example_cn":"是的，你知道，维克多，有很多关于和平的讨论，但当你看到过去几天这种军事活动的升级，真的很难理解那开始看起来像什么。"},{"word":"bargaining chip","phonetic":"/ˈbɑːrɡənɪŋ tʃɪp/","pos":"n.","level":"六级","cn":"谈判筹码","en":"something that you can use to get an advantage when you are trying to make a deal","excerpt":"We heard the president of Lebanon tell CNN's Christiane Amanpour that he felt Lebanon was being used as a bargaining chip.","example_cn":"我们听到黎巴嫩总统告诉CNN的克里斯蒂安·阿曼普尔，他感到黎巴嫩被用作谈判筹码。"},{"word":"polarization","phonetic":"/ˌpoʊlərəˈzeɪʃn/","pos":"n.","level":"六级","cn":"两极分化","en":"the process of dividing into two opposite groups","excerpt":"Pope Leo is kicking off a visit to Spain with political polarization and migration front and center.","example_cn":"教皇利奥开始对西班牙的访问，政治两极分化和移民问题成为焦点。"},{"word":"migration","phonetic":"/maɪˈɡreɪʃn/","pos":"n.","level":"六级","cn":"移民；迁徙","en":"the movement of people from one place to another, especially to live or work","excerpt":"Pope Leo is kicking off a visit to Spain with political polarization and migration front and center.","example_cn":"教皇利奥开始对西班牙的访问，政治两极分化和移民问题成为焦点。"},{"word":"papacy","phonetic":"/ˈpeɪpəsi/","pos":"n.","level":"六级","cn":"教皇职位；教皇任期","en":"the position or period of office of the Pope","excerpt":"Investigate -- immigration rather has become a key priority for his papacy.","example_cn":"调查——移民已成为他教皇任期的一个关键优先事项。"},{"word":"cadaver dog","phonetic":"/kəˈdævər dɔːɡ/","pos":"n.","level":"六级","cn":"尸体搜寻犬","en":"a dog trained to find human remains","excerpt":"Cadaver dogs, divers, specialized equipment, they were brought in earlier this week as search teams look for any remains.","example_cn":"本周早些时候，尸体搜寻犬、潜水员、专业设备被调来，搜索队寻找任何遗骸。"},{"word":"negligent","phonetic":"/ˈneɡlɪdʒənt/","pos":"adj.","level":"六级","cn":"疏忽的","en":"failing to take proper care of something","excerpt":"The jury found socialite Rebecca Grossman and former major league pitcher Scott Erickson negligent.","example_cn":"陪审团认定社交名流丽贝卡·格罗斯曼和前大联盟投手斯科特·埃里克森疏忽。"},{"word":
