<script>
const ALL_DATA = {"2026-06-12":{"date":"2026-06-12","source_url":"https://transcripts.cnn.com/show/ctmo/date/2026-06-12/segment/01","raw_transcript":"Return to Transcripts main page\n\nTrump Touts 'Great Settlement' with Iran, Calls Off Strikes; Could Jilted GOP Lawmakers Turn on Trump's Agenda?; Rubio Compares UFC to U.S. Landing on the Moon. Aired 6-6:30a ET\n\nAired June 12, 2026 - 06:00   ET\n\nTHIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED.\n\nBRAD SMITH, CNN ANCHOR: Got to catch them all. The robbers, that is.\n\nWhat started out as somebody trying to sell Pokemon cards ended in a robbery in San Francisco. A suspect pepper-sprayed the victim and stole their cards after they met up for the sale.\n\nPolice released a video of the moment officers arrested two suspects in the case last month. Officers had identified them the day after the crime.\n\nThat does it for CNN HEADLINE EXPRESS. I'm Brad Smith. CNN THIS MORNING with Audie Cornish starts right now.\n\nERICA HILL, CNN ANCHOR: Today in the group chat, President Trump announcing a great settlement to end the war. So, is it real this time?\n\nDONALD TRUMP, U.S. PRESIDENT: The strait will officially open as soon as we sign, which could be soon. Very soon. Maybe over the weekend.\n\nHILL: Dangerous weather turns deadly in the Midwest. Tornadoes touch down, with severe storms heading East today.\n\nMARCO RUBIO, U.S. SECRETARY OF STATE: When President Kennedy announced that we were going to put a man on the Moon and return him safely to the Earth, no one thought that was possible.\n\nAnd at some level, that's what this whole company, what UFC has been.\n\nHILL: Marco Rubio comparing a deal with the UFC to the Moon landing. Just what do cage fights actually have to do with diplomacy?\n\n(BEGIN VIDEO CLIP) REP. MIKE JOHNSON (R-LA): Let's have votes on an election the day of the election. That's what many states are able to do. I think California is playing around with us.\n\nHILL: Republicans continuing to cast doubt on California's voting tactics. So, will President Trump now try to control state elections?\n\nThe World Cup finally arriving in the U.S. today. Does the U.S. men's national team have a shot at winning this thing?\n\nUNIDENTIFIED MALE: -- is the Super Bowl of IPOs SpaceX?\n\nUNIDENTIFIED FEMALE: Everybody's talking about the SpaceX IPO.\n\nUNIDENTIFIED FEMALE: Nine, eight --\n\nHILL: SpaceX launching on the NASDAQ this morning. Elon Musk now set to become the world's first trillionaire.\n\nTRUMP: We just made a great settlement of the war with Iran. Probably have a signing, maybe in Europe. And it's a great thing.\n\nHILL: President Trump says the war is over; a deal is close. So, why do both Iran and Israel seem surprised by the news?\n\nGood morning, everyone. I'm Erica Hill, in for Audie Cornish. Very happy Friday morning to you.\n\nWe begin with the great settlement. President Trump calling off new strikes on Iran, saying both sides have now agreed to stop the fighting.\n\nTRUMP (via phone): I don't know if you heard, but we ended the war with Iran today. And they have agreed never to have a nuclear weapon, something that we -- we insisted on. That was the whole purpose. That was the -- 95 percent of it.\n\nHILL: Apparently, though, no one told Iran.\n\nESMAIL BAGHAEL, IRANIAN FOREIGN MINISTRY SPOKESMAN (through translator) (via phone): Regardless of the rhetoric, threats and claims of the other side, we are focused on the interests of the Iranian nation. We are doing our own work.\n\nRegarding the text and the overall understanding, whenever we conclude that it secures the interests of the Iranian nation, we will certainly announce it transparently.\n\nAs I speak to you at this moment, we have not reached a final conclusion on this matter.\n\nIsrael, also seemingly taken by surprise, a source telling CNN Israeli Prime Minister Benjamin Netanyahu wasn't aware of an agreement with Iran; that he actually found out on social media.\n\nSo, is this just the latest effort by President Trump to move stalled negotiations -- negotiations forward? Or is there really a deal?\n\nJoining me now, CNN political and national security analyst David Sanger. David, always good to talk to you.\n\nSo, Trump is claiming right now that the end of the war is at hand. The reopening of the Strait of Hormuz could actually happen this weekend once this deal is signed.\n\nAnd yet, we have this warning from one Iran -- Iranian leader that the -- and I'm quoting here -- \"the probability of deception by Trump is high.\"\n\nBased on everything we know and your sources, David, do signs actually point to an agreement at this point?\n\nDAVID SANGER, CNN POLITICAL AND NATIONAL SECURITY ANALYST: Well, they certainly point to some agreement coming together on four major pillars of a -- of some restraint on the nuclear program.\n\nBut it's not a peace agreement. It doesn't end the war. It may be a ceasefire that opens up another negotiation.\n\nSo, there are some reasons to be skeptical of the president's claim. I think CNN -- by CNN's count, he has over the past three months declared on about 39 occasions -- not sure if that's exactly right -- that the war was over.\n\nThis time, he's gone a little bit differently. He said they've come to an agreement on this. And as you noted, the -- that's certainly not how the Iranians are describing it now.\n\nBut they may be close.\n\nSANGER: The president -- the president did say the most important thing was to get them to agree never to build a nuclear weapon.\n\nWell, of course, they've agreed to that many times before: when they signed the nuclear nonproliferation treaty; when they signed the agreement with President Obama 11 years ago.\n\nHILL: Yes. Which is -- which is a key point. That is, of course, in some of the key points that we have, according to a diplomat who's been briefed on this agreement, this memorandum of understanding, if you will.\n\nAnother one that's in there is a 60-day ceasefire, quote, \"on all fronts.\" It would include Lebanon. This has been a key sticking point, as we know, for Iran, which of course, led to some of what we saw over the weekend in terms of both Iran and Israel trading missiles.\n\nThe fact that Israel's prime minister reportedly found out about this on social media, that really stands out to me, especially when we're talking about the potential ceasefire with Lebanon, with activity in Lebanon -- David.\n\nSANGER: That's right. The prime minister does not want to be part of this agreement and has made clear that he won't feel bound by a commitment that he didn't sign up to.\n\nSo, the Iranian position is that this has got to be a ceasefire across all of the active areas of combat. And that means Iran itself. But it also means in Lebanon, where Israel is taking on Hezbollah.\n\nSo, this has been a point of division between the president and Prime Minister Netanyahu. There have been some screaming phone calls we've -- we've heard about along the way.\n\nAnd it does pose a real point of tension in the relationship with Israel, because if they don't respect that ceasefire, and it plunges everything back in again, you'll have the president blaming Prime Minister Netanyahu.\n\nHILL: Mm-hmm. It's -- it's notable, too, some of what we're hearing from lawmakers. I want to just play some comments from a Republican and a Democrat. I do want to note these comments from Congressman Don Bacon actually came just before we heard from the president about this potential agreement.\n\nBut there is a very interesting similarity, if you will, in what he and Adam Schiff have to say. Take a listen.\n\nREP DON BACON (R-NE): Iran needs to come to us wanting a deal right now. We're going to them, and they are abusing the president in these negotiations. They think they have the advantage over President Trump.\n\nREP. ADAM SCHIFF (D-CA): Every time the president talks about how eager Iran is for a deal, it's basically a reveal that he's talking about his own eagerness for a deal.\n\nHILL: So, Adam Schiff talking about the eagerness. But -- but, you know, Congressman Bacon --\n\nHILL: -- also noting there, too, basically, the president needs to stop saying what he wants in public. Is Trump undermining his efforts at this point, showing those cards?\n\nSANGER: Well, certainly, the Iranians think that the president needs this right now more than -- than they do. And I think that was behind the president's decision to renew military activity for a couple of days, to try to show that they could be plunged back into the war.\n\nBut frankly, the problem that's been haunting the president here is that 38 days of pounding the Iranians, starting in late February, did not result in the political concessions he was looking for. And it's not clear that additional days of pounding them will.\n\nNow, I reported two days ago that there were there were four pillars of an agreement that are emerging, and they have to do with everything from what to do with Iran's nuclear stockpile to its future enrichment activity, and so forth. And it looks like on those four, they're coming closer.\n\nBut all this memorandum of agreement would -- of understanding would do is start a negotiation that would probably run all summer, and many fear could run much longer than that, on the details of the nuclear program.\n\nHILL: Yes. David, always good to talk to you. Appreciate it. Thank you.\n\nHILL: Still ahead here on CNN THIS MORNING, the president facing pushback. So, now he's got a new pick to lead the nation's intelligence community. Could it be a rare sign of compromise, or is it caving? What do we really know?\n\nPlus, a federal prosecutor making claims about voter fraud in California. Very explicit public claims.\n\nBut first, perhaps you've heard them called the YOLO Caucus of Congress. Just one of the memes, if you will, for some of the most prominent members now promising revenge.\n\nREP. NANCY MACE (R-SC): As a survivor, I chose to stand on principle.\n\nHILL: The current Republican lawmakers who lost out on Donald Trump's endorsement in the primaries and are now heading for the exit in about six months, are a little bit more vocal these days: raising questions about whether they could actually be a bit of a thorn in the side of the president in the coming months, with their remaining time in Washington.\n\nAmong them is South Carolina Congresswoman Nancy Mace, fresh off her last-place finish for the GOP nomination for governor in her state, joking that she could still come in first, if Mike Pence has the courage.\n\nA reference there, of course, a bit of a dig to Trump's infamous message on January 6th.\n\nMace said she will be adding to the unemployment numbers and also promised to be a, quote, \"more of a menace than ever.\"\n\nTexas Senator John Cornyn, in his first interview since that loss to a Trump-backed challenger in his primary in Texas, telling \"The New York Times,\" quote, \"It is going to be a pretty bumpy ride for the next seven months,\" saying, \"It does give some of us a little more freedom and certainly leverage.\"\n\nJoining me in the group chat, Elliot Williams, CNN legal analyst and former federal prosecutor; Rob Bluey, president and executive editor of \"The Daily Signal\"; and Maria Cardona, CNN political commentator and Democratic strategist.\n\nIt's good to see all of you this morning. So, you know, you've got there the YOLO Caucus. It's the Lame Duck Rebellion. Whatever you want to call them.\n\nWhat is clear is the gloves really appear to be coming off now. And it's also, I would say, further evidence of the hold that Donald Trump has, not just on the party, but specifically on lawmakers.\n\nElliot, how much of a difference do you think this could actually make?\n\nELLIOT WILLIAMS, CNN LEGAL ANALYST: In terms of passing laws or policies, somewhat, only because you will have vocal members of Congress speaking out against the president.\n\nBut you know, Erica, you hit it right on the head with the idea of this being about how singular Donald Trump is as a politician and a figure.\n\nCertainly, there's nothing new about politicians feeling, when the wings are clipped, or I guess -- I don't know if that's the right metaphor. You know what I mean? When -- when they can vote their conscience after elections, they, you know, sort of stray from the fold a little bit. That's a better animal metaphor there.\n\nBut this has happened before. The difference is you have a singular figure at the top of the party who, in private, there's -- there's a bunch of reporting that Republican members of Congress do not take the party line with Trump that they do publicly. And so, they're just feeling more free to speak their minds.\n\nHILL: And part of that, you know, Cornyn also speaking to part of that, you know, continuing in that interview with \"The Times.\" I was struck by noting that he gave voice, they write that he gave voice \"in starkly candid terms to this growing sentiment among Senate Republicans that Trump is actually hurting his own party with self- serving decisions and his insistence on slavish loyalty, ultimately setting himself up for a midterm disaster that would pave the way for the most miserable two years of his life.\n\nYou know, when you -- when you look at that, Rob, I mean, calling it out here, about what this has done and sort of the promise there of what is to come. How much do you see that playing out?\n\nROB BLUEY, PRESIDENT/EXECUTIVE EDITOR, \"THE DAILY SIGNAL\": Well, Erica, first of all, I think we need to remember that it was the voters of Texas, and South Carolina, and Kentucky, and some of these other states that ultimately decided to fire these politicians, because they weren't, quite frankly, representing their values in the U.S. Congress.\n\nIn the case of John Cornyn, I would say just take a look. A couple of hours ago, him picking a fight with Senator Mike Lee over the SAVE America Act.\n\nNow, John Cornyn is a sponsor of the SAVE America Act, but he doesn't have the backbone to stand on the Senate floor and make the Democrats debate this until they get to the point where it can pass with a simple majority vote.\n\nAnd so, I think that you're right. This is probably going to be a challenge for President Trump and other conservatives for the months to come.\n\nBut I would just encourage these lawmakers to remember that the American people are paying attention, and they expect this Republican Congress to actually get some things done, whether it be the SAVE America Act or another reconciliation bill.\n\nHILL: I mean, you know, respectfully, there hasn't been a lot of getting anything done across this Congress --\n\nHILL: -- since they were sworn in. So, it will be interesting to see if this changes anything.\n\nMaria, how much more public do you anticipate these lawmakers? I mean, Democrats are probably loving this moment, but words are one thing. Actions are quite another.\n\nMARIA CARDONA, CNN POLITICAL COMMENTATOR: That's exactly right, Erica. And what I think a lot of these lawmakers are focused on is exactly what the American people want.\n\nWhereas before, they were so beholden to what Trump wanted, because they were scared of him. They didn't have any backbone to stand up against him.\n\nNow, I think they feel free to actually focus on what their voters want. And they're seeing what everyone else is seeing across the board, Erica. Donald Trump's poll numbers are in the toilet. Republicans poll numbers are in the toilet. Democrats have been winning across the board all of these elections, including in ruby-red places.\n\nAnd so, what Republicans are saying is, look, now is the time for me to stand up against Trump. They even said it. What Trump has been doing, the self-dealing has really put their majority in -- in -- in jeopardy. Because the American people don't see that Republicans are focused on what they want.\n\nIn fact, it's completely the opposite. They have focused on higher costs. They have focused on corruption. They have focused on chaos.\n\nAnd they've done nothing to go up against Trump to say, Look, you promised the American people to bring down costs, to bring down inflation. And everything that you're doing is doing exactly the opposite of that.\n\nSo now, maybe they're going to say, let's actually do what the American people want. I think it's too late for them to save their majority in both the House and the Senate. But that's what you're going to see, I think, from here on out.\n\nHILL: All right. We will be watching.\n\nA lot more to tackle ahead this hour, including betting big on the space race. Elon Musk's SpaceX making its Wall Street debut, investors rushing to buy a piece of history that will also be historic for Elon Musk.\n\nPlus, we've got a live look for you at the White House. There it is. The UFC cage all set for the president's birthday on Sunday. Why officials are calling this -- are now referring to the UFC, by the way -- not this match -- the UFC as the United Nations of fighting.\n\nUNIDENTIFIED MALE: So, the UFC arena at the White House for Donald Trump's birthday has been completed. And it looks like total crap.\n\nUNIDENTIFIED MALE: If you think for a second that I'm going to watch any of this, then you would be absolutely correct.\n\n(END VIDEO CLIP) [06:25:08]\n\nHILL: The Trump administration is asking a federal judge to reject the lawsuit which seeks to stop this weekend's UFC fights at the White House. That ruling could come down today.\n\nMeantime, that 92-foot-high claw that dwarfs the White House -- you see it there, all lit up. It has been tested and is now operational.\n\nOn Thursday, Secretary of State Marco Rubio signed a memorandum of understanding with the UFC to create a public-private partnership with the White House.\n\nSo, the UFC now joins 24 other sports -- from the MLB, the NBA, the WNBA, the U.S. Men's national team -- in the State Department sports envoy program.\n\nThat also includes big stars like Baseball Hall of Famer Cal Ripken. He was an envoy to Greece.\n\nRUBIO: When President Kennedy announced that we were going to put a man on the Moon and return him safely to the Earth, no one thought that was possible. And we did it.\n\nWe are a nation founded on doing what no one else dared to do, and no one else aspired to do. And at some level, that's what this whole company, what UFC has been.\n\nWe're excited about what this brand means about America's ability to expand and reach out to different parts of the world.\n\nHILL: Rubio also described the UFC as the United Nations of fighting.\n\nMixed martial arts analyst Luke Thomas joins us now.\n\nLuke, it' s great to have you here. So, as we point out, there's some two dozen sports, right? And envoys, you know -- in many ways, this is sort of like a goodwill ambassador program, right? The -- showing the soft-power tools of the U.S. government.\n\nSo, how effective do you think, with this new public-private partnership, UFC fighters and the sport could be in that role for the U.S.?\n\nLUKE THOMAS, MIXED MARTIAL ARTS ANALYST: I don't really understand exactly what the return on investment is. I mean, I sort of get the generic arguments that are made about the -- the value of sport in building community. And -- and cultivating good kinds of traits and character. I understand that.\n\nBut I don't understand what the value is as it ultimately gets back to the shores. I mean, if you look at the way in which soft power has been implemented in this country for basically decades, generations across multiple presidencies, both Democratic and Republican, it was some kind of effort at both giving something abroad that created better sympathies and had a material impact on the lives of those we were trying to affect, such that it created better sympathies for us or, you know, better bilateral relations.\n\nI don't understand exactly what this does. You can make an argument that it is inoffensive. You can make an argument that, to your point, if the NFL is doing it, well, you know, there's no scandal here in that particular sense.\n\nBut in terms of, like -- I mean, if Donald Trump doesn't believe in soft power, it is very, very difficult for me to understand how this is a different but more enlightened version of it.\n\nHILL: It's an interesting point when you look at the cuts that were made to USAID, right, which was a major instrument, in many ways, of soft power.\n\nYou know, according to his statement, it's going to be used to -- for joint educational content development, using MMA to teach English and leadership skills.\n\nWhat I think is remarkable -- and I think you've noted this -- is the areas where UFC is gaining ground. This is -- or could be, perhaps, used because it's a really popular MMA market, a place like Brazil -- is not really the target of this program.\n\nTHOMAS: Yes. I mean, this is -- we'll have to see how it's implemented ultimately, right? We'll have to see how it's implemented.\n\nI think, to me, the lesson I take from all of this is, listen, could there be some kind of benefit down the road? I suppose it's at least worth taking seriously on some level.\n\nBut that's really not how I understand the nature of this relationship. That, if you look at the White House lawn, and if you look at the way in which the parent company for UFC -- it's called TKO. They also own WWE. If you just look at the way in which they do business, every year seems to greet or bring with it a new level of entanglement in government.\n\nNow, not just local municipal government or even state or national government, but just sort of broadly, they do deals internationally with governments all the time.\n\nI make this point. You know, why are they going this year to Azerbaijan and Serbia, and they're not going to Brazil, the most important market -- or arguably, one of the most important markets in MMA? It's because they're getting paid by the governments there to go.\n\nIt's this enmeshing of the business between the public and the private in which they're talking about, but it extends well beyond this memorandum of understanding.\n\nAnd I know for sports fans out there, you're saying, well, you know, government largesse isn't necessarily a new thing for pro sports owners. Fine. But it's at least worth having a conversation about the role that it plays.\n\nHILL: When we look at what is about to unfold on Sunday. Look, some people are really excited about it. Some people are not. There are very distinct camps, which I think are leading to certain stereotypes that are probably not accurate on both of those sides.\n\nWhat do you think, in your view Sunday's fight has now come to symbolize? And is it what was intended, which we're told is a celebration of the nation's 250th birthday, which happens to fall on this president's 80th birthday?\n\nTHOMAS: To me, this is something approximating the union of these two identities or brands or, you know, between the UFC and between the Trump administration.\n\nYou could even argue, maybe, that it's not so much --\n\nReturn to Transcripts main page\n\nCelebrating 250; 2026 World Cup; Lawn Mystery. Aired 6:30-7a ET\n\nAired June 12, 2026 - 06:30   ET\n\nTHIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED.\n\nLUKE THOMAS, MIXED MARTIAL ARTS ANALYST: -- creating the union of these two identities or brands or, you know, between the UFC and between the Trump administration. You could even argue maybe that it's not so much a one and done kind of an event, although that's what they're suggesting, but that rather it marks a new period of entanglement between them.\n\nWhat was very interesting was the UFC helped launder Donald Trump's reputation following January 6th all the way through into 2024, when they helped boost his candidacy. And the mainstream media never made them pay for that. I was very, very surprised at the time.\n\nSo this is a thing that has been in motion for a very, very long time. I get asked all the time, do you think the UFC risks being seen as political? I'm like, risk is being seen. This has been an open thing for years at this point. This weekend, to me is the culmination of all of those kinds of efforts.\n\nHILL: Luke Thomas, really great to have you with your insight. Thank you.\n\nHILL: Still to come here on CNN THIS MORNING, in honor of the nation's 250th birthday, President Trump is staging a state fair in the nation's capital. But a number of states say they're not going to be able to join the party. We'll tell you why. Plus a round of severe weather, including tornadoes across multiple states, leaving thousands without power and also turning deadly.\n\nHILL: Good Friday morning, I'm Erica Hill. Nice to have you with us here on CNN THIS MORNING. Thirty five minutes past the hour now, here's a look at what's happening.\n\nOne person is dead amidst severe weather across the Midwest and Iowa. Those storms packing 70 to 90 mile per hour winds, that is what helped to kill, unfortunately, a 54-year-old man after he was struck by a tree in Des Moines. Meantime, a large tornado in Central Illinois caught on camera. Look at the size of this. Perhaps not surprisingly, it destroyed homes, leveled businesses. One man was rescued after being trapped under the rubble of his own home. More than 600,000 customers across nine states are waking up without power this morning.\n\nWall Street preparing now for the largest IPO in history as Space X makes its debut on the NASDAQ. Shares of the rocket company being offered at $135 each, that is set to raise some $75 billion and would also make founder, Elon Musk, the world's first billionaire.\n\nDonald Trump offering up a new pick for director of National Intelligence, nominating Jay Clayton, US attorney for the Southern District of New York. And this, of course, follows the intense backlash over Bill Pulte, his initial pick, who has zero intel experience. Though Trump says Pulte will stay in that interim role for the time being.\n\nDONALD TRUMP, UNITED STATES PRESIDENT: He's only there for a little while. He's running it for a short while we get a very talented person, Jay Clayton. As you know, Jay Clayton is an incredible talent, head of Sullivan & Cromwell. He was head of the SEC.\n\nHe was now Southern District. I mean, nobody has better credentials. But Bill will run for sure. Well --\n\nHILL: The Senate had scheduled a confirmation hearing for Clayton for next week. So just what do we know about Trump's new choice to take over as director of National Intelligence? Well, Jay Clayton is, as I noted, currently the US attorney for the Southern District of New York.\n\nHe's also spent time over the past weeks joking the administration's baseless claims of fraud when it comes to voting by mail in California's elections. Take a listen.\n\nJAY CLAYTON, US ATTORNEY, SOUTHERN DISTRICT OF NEW YORK: It makes the opportunity for fraud so much greater when that is not necessary. It is not necessary for ballot access.\n\nUNIDENTIFIED MALE: Is mail in voting being used by one group and not another?\n\nHILL: So he's not the only one here, the US attorney, in Los Angeles is now actually speculating about filing charges.\n\n(BEGIN VIDEO CLIP) BILL ESSAYLI, US ATTORNEY, CENTRAL DISTRICT OF CALIFORNIA: I will just say it will be election fraud charges in the next, I hate to put timelines on things, but one to two months, I believe. We need some of these results to be certified so we can, you know, prove some of the allegations. But we will be charging some people.\n\nHILL: Joining me to discuss Devlin Barrett, Justice Department reporter for the New York Times. He's also the author of the new book, \"The Department of Revenge: How Trump Took Control of American Justice.\"\n\nI mean, Devlin, can you just put into perspective for us how unorthodox perhaps those comments are that we just heard when it comes to this promise that charges are coming? I mean, that would just never happen, I mean, in the normal operation of the Department of Justice. We are no longer living in those times.\n\nDEVLIN BARRETT, JUSTICE DEPARTMENT REPORTER, NEW YORK TIMES: Well, that's exactly right. There are Department of Justice regulations specifically designed to prevent those kind of statements and that kind of activity, because the department and lawyers, and election experts, have long viewed that kind of behavior by the Justice Department as dangerous because it might, you know, cast doubt upon the election. But look, this is the Trump administration, and one of their core beliefs is casting doubt upon the election.\n\nAnd you see that not just with the comments in Los Angeles, but you see that with the comments by Jay Clayton. And in terms of Jay Clayton, there are those comments that are raising alarm bells. There are also questions about his qualifications for this role of DNI. How does he stack up?\n\nBARRETT: So, Jay Clayton is a very experienced Wall Street lawyer, a very experienced corporate lawyer, and he's been the head of the New York prosecutor's office for about a year or so. But he doesn't come with an intelligence background other than what he encountered in his most recent job.\n\nSo, you know, this isn't the resume certainly most people would pick to run an intelligence agency. But the most important credential he has is that Donald Trump trusts him. They golf together. Jay Clayton was assigned a sensitive part of the whole Epstein fiasco last year when the Justice Department was wrestling with that problem.\n\nAnd like everything that, or many things that the President does, it's based on who he likes and how loyal he believes they are.\n\nHILL: In terms of that loyalty, right, elections are key. So those comments that we heard from Jay Clayton are really important here because this president, right, has not given up, despite these baseless claims when it comes to election interference, election fraud. This is something that the President has really zeroed in on, and that we have seen become a focus on for this administration.\n\nBased on what we know about Jay Clayton, if he is, in fact, confirmed, how do you see that potentially intensifying?\n\nBARRETT: Well, so look, it's pretty clear at this point that the President likes to have the DNI pursuing voter fraud claims. We saw that with Tulsi Gabbard when she was the DNI, when she went to personally participate in an FBI search in Atlanta. That's very unusual.\n\nAnd I think it helps to understand what's happening here if you just realize that the DNI in Trump's mind is an election investigating operation, which I think a lot of intelligence officials would say that's only a pretty small part of the DNI's job.\n\nBut here it's the most important part because here it's what the President wants. And you see in Jay Clayton's public comments, which you showed, you see almost sort of a soft audition for that role. I think the question is, once he takes the job or if he gets confirmed, how far is he willing to go for the President?\n\nHILL: Yes. We Will see, too, what the line of questioning is in some of those hearings. Devlin, Barrett, great to have you with us this morning. Thank you. And just a reminder of Devlin's new book, \"The Department of Revenge: How Trump Took Control of American Justice.\"\n\nWell, President Trump's big birthday bash for America hitting another snag. So he had first pitched this idea of the Great American State Fair two years ago, billed as a patriotic world fair, but for states, to unite Americans.\n\nTRUMP: I will work with all 50 governors, Republican and Democrat alike, to create the Great American State Fair. The Great American State Fair will showcase the glory of every state in the union.\n\nHILL: Right? So why not? Sounds like a great idea. It turns out, though, that six states are now bowing out. Now, it's important to note all 50 states will still be represented in some way. But these six states have said it's just too much money for them to spend that total cost, somewhere between $70,000 and $100,000. And for most of those states, that was a major factor in the decision.\n\nMAURA HEALEY, MASSACHUSETTS GOVERNOR: Great American Fair, he invited all the states to participate and wants to charge us, charge us to go down and put something on his exhibit, whatever he's creating for Freedom 250. It's just ridiculous.\n\nHILL: There are also concerns that politics will or have already tainted the celebration. The spokesperson for Oregon's governor saying there are \"growing concerns\" that the event in Washington, DC is shaping up to be a more partisan affair than originally presented. And if that language sounds familiar, perhaps it should. As we remember the concert.\n\nThe panel is back. Look, there are concerns, and it's important to note this is not the broader America 250, which, you know, we see that logo everywhere. I mean, I see it in my town. There are banners up. That's separate from Freedom 250.\n\nRob, do you have concerns that this has become more partisan? I mean, this should be -- there should be no politics in the celebration of America's 250th birthday.\n\nROB BLUEY, PRESIDENT AND EXECUTIVE EDITOR, THE DAILY SIGNAL: That's right, Erica. I agree with you. I don't think that it should be a partisan event, and I don't think that the Great American State Fair was becoming partisan. Unfortunately, some of these Democrat governors seem that they want to pick a fight with Donald Trump and they're using the excuse of budget constraints to do so.\n\nI think it goes entirely to their disagreements with the President and wanting to stoke some of these fears in the minds of voters in their states that somehow the President is going to politicize this state fair. Now, you're right, Erica. There have been other concerns that certain aspects of the America 250th anniversary might be taking a more political tone.\n\nBut I think just by the nature of what you look in the grand scheme of things overall, this is a great celebration of our country's founding, and we should come to Washington and take part in it.\n\nHILL: You talk about some of those concerns. The President, you know, turning what was supposed to be a concert, a number of artists pulling out because they said they found out after the fact that this was more of a partisan event. He's now turning that into a rally.\n\nFlo Rida, Vanilla Ice, they're still going to participate. Vanilla Ice had some really interesting comments right here on CNN, in the wake of all that backlash and other artists canceling. I want to play his take on his decision to be a part of it.\n\nVANILLA ICE, PERFORMING AT FREEDOM 250 STATE FAIR: This is a huge honor to play the birthday. It's one in a lifetime, you know, 250. So I'm honored, and I just, you know, I respect everybody else.\n\nI know there's a lot of tension everywhere. This whole world is like a snow globe, but it shouldn't be that. And music is here to bring people together, man. And, you know, it shouldn't be that this music is dragged into politics. This is a moment to celebrate our country turning 250 years, no matter who puts it on.\n\nHILL: Maria, is that the answer? Is it really about, you know, individuals celebrating how they want to celebrate and not allowing it to become partisan?\n\nMARIA CARDONA, DEMOCRATIC STRATEGIST: It should be that way, Erica. But when you have somebody like Donald Trump who is focused on all of these celebrations and he's the one who's politicizing it. I mean, why did he have to create a Freedom 250 to begin with? Why couldn't he just have worked with the original group, America 250, to focus on making this a celebration for everyone? But he can't do that.\n\nAnd I think ultimately what Americans see is that, when Donald Trump gets involved with something, especially some kind of celebration, it's not about anything or anyone other than Donald Trump. And so that's why you have these states, I think, very concerned that they didn't want to participate in an event that was going to be exclusively partisan, especially when they were being made to pay for it.\n\nAnd I think the other part of this, Erica, is that there are so many states in this country that have felt attacked by this president because they have been attacked by this president figuratively and literally. And so, to then -- for Donald Trump to say that he wants to bring the country together is kind of laughable. And Americans just don't believe that he has it in him to do anything that is other than partisan and division, and focused on anything or anyone other than himself.\n\nHILL: We're going to have to leave that one there. Elliot, you are first for the next group chat, I promise, because we do have a lot more to come here, including a mystery on the National Mall. Just who etched 8647 into the grass? And is it a dig at President Trump just before his big birthday celebration on Sunday?\n\nUNIDENTIFIED FEMALE: I love all the World cup events going on around the city. Really build a sense of community.\n\nHILL: The World Cup finally kicking off across North America. The matches, you don't have to have one of those expensive tickets, by the way. Still plenty of ways to enjoy the excitement. Stay with us.\n\nUNIDENTIFIED FEMALE: I love all the World Cup events going on around the city. Really build a sense of community. But I'm super excited to watch my country win, Viva Mexico.\n\nUNIDENTIFIED FEMALE: I've been in US for a long time, but every time I see my flag that, the music, and today in Estadio Azteca, like I wanted to cry.\n\nHILL: I love it. So there is a lot of hope that the US team is going to bring fans just that same level of joy tonight. The World cup, of course, now officially in full swing. Game 1, Mexico defeating South Africa 2-0 in Mexico City. Tonight, the first games on US soil, Team USA taking on Paraguay. That's 9:00pm Eastern in Los Angeles.\n\nCarlos Bocanegra joins us now. He's the former captain of the US Men's National Soccer Team and also played for the team in the 2006 and 2010 World Cups, all right.\n\nFirst of all, let's call on that World cup experience. What is this moment like, right? The tournament finally kicks off. You're waiting all these years for it, what is the men's national team going through right now as they wait for that first match?\n\nCARLOS BOCANEGRA, FORMER CAPTAIN, US MEN'S NATIONAL SOCCER TEAM: A lot of excitement. I mean, these guys have been building up to it for a couple of years now. And so, you know, just for it to arrive that day, the butterflies, I think it's just going to be a release of emotion.\n\nAnd so, I think you'll see the first 10, 15 minutes, maybe a very hectic game, a very intense getting all their feelings out and getting all that energy out that they've been holding in. And it's on home soil, so it's got an even more special feeling to it. Their friends, their family, you know, the whole country behind them. So it's going to be a really cool experience.\n\nHILL: Certainly when you're doing it right on US soil, talk to me about what you've seen in terms of the level of excitement. There was a real hope, right, that with the World Cup being in North America, especially in the. In the US that this would really kind of light a fire under the love of the game here in the United States.\n\nWhat have you seen over the last couple of years building up to this moment?\n\nBOCANEGRA: Yes. I have, I think, we had a runway since about 2018 when it got announced that we would host the World Cup here in 2026. So we've had a bit of a runway, and I think leagues like MLS soccer have really used this platform to kind of generate the buzz, but generate interest, investment, building infrastructure, attracting players to come play in the league.\n\nSo it's done wonders for that. The academy systems in our country have really propelled forward as well, which is super important because that's what ultimately develops the players and puts them into our leagues as well as putting them into the national teams. And I think now you see there's over 40 players that have gone through the MLS academies, and MLS that are playing in the tournament.\n\nOver 100 former and current MLS players playing in this tournament. And so, you know, it's there. The fandom is there, the excitement is there, and it's really helped propel the game in our country, where, you know, it's not the number one sport in the United States, which is OK. But, you know, for this month it is.\n\nHILL: Yes, for this month it is. It's interesting, I think, you know, among women, you see such an interest in women's soccer, and that has sort of exploded in a lot of ways when we look at the men. Walk me through what you're seeing in this moment. What do you see as the men's team strengths and weaknesses for Team USA? What are you expecting from these guys?\n\nBOCANEGRA: Yes. The women have done a fantastic job, and that's been a great program. I think, you know, on the men's side, really still trying to win that first World Cup. But, you know, this team is energetic. They're one of the most talented teams we've ever had as a country. Now, that's -- individually, can we do it collectively?\n\nYou know, we've got players in the attack that can get goals. You know, the midfield seems pretty strong. I think the questions right now are around the defense, and we have a situation with the goalkeeper. Matt Freese is probably going to be the number one. It looks like that was not settled maybe until a couple months ago, which has not been the case traditionally for US goalkeeper has been our strongest position.\n\nThat doesn't mean Matt can't go out and have a fantastic tournament, but we will need him to have a big tournament. He's someone, I think, is flying under the radar. Great kid, great work ethic, and he's a good goalkeeper as well. So I think if he has a great tournament and sort of comes into his own, that's really going to give the backline some confidence and propel the team forward.\n\nHILL: A lot of great soccer certainly out there for the next several weeks, and it's great to have it here so close to home. Carlos, thanks so much for coming in this morning.\n\nBOCANEGRA: Thank you.\n\nHILL: Well, the National Park Service is now investigating a case of vandalism on the National Mall. So it appears a huge 8647, 8647 has somehow been etched into the grass on the mall just days before crowds, of course, are expected for the UFC fight at the White House. That phrase has been used to signal opposition to Trump.\n\nIt's at the heart of an indictment of former FBI Director James Comey. A spokesman for the Department of the Interior, which actually manages the National Mall, described the markings as deranged vandalism, which will not be tolerated.\n\nThe group chat is back. Elliot, as promised, I'm going to let you kick this one off. So in that same statement from the Interior Department, it went on to say, \"any threat against the president is taken very seriously by the department and that the US Park Police would investigate.\"\n\nIs this on the surface? And this really goes back to, you know, the discussion around James Comey, is this actually a threat against the president or is it just a protest?\n\nELLIOT WILLIAMS, CNN LEGAL ANALYST: I don't know. But on its face, it's not a threat against the president. But to be clear, and just the big picture on this is that free speech and free expression are always OK, threats never are.\n\nNow, the line between that can be quite blurry. And quite frankly, Erica, depends on context, right? If I'm at a baseball game and say, man, I'm going to kill this hot dog, that same statement has a very different meaning if I'm pointing a firearm at someone saying, man, I'm going to kill this person. And you have to look at, and investigators will have to look at the different circumstances surrounding any work of speech, including etching it into the lawn.\n\nIt might have been whatever we think of this speech, it might have been just a form of speech by itself, or it actually could have been a threat. And I think that is for investigators and prosecutors to really take a close look at.\n\nHILL: And Could be difficult to determine, Rob, quite honestly, right, because you also have to figure out who did it and when.\n\nBLUEY: That's true, Erica. And with all of the cameras that we have around Washington, DC you'd think that it might be relatively easy to figure out how this actually happened. I've seen some of the time lapse video.\n\nBut, Erica, I'd also say that, you know, I think it's so sad that here we are, as we just talked about during this hour, the 250th anniversary of the United States, that something like this is what people who are visiting our nation's capital will see. But to end on a hopeful note, the US Catholic Bishops did just consecrate the United States to the Sacred Heart of Jesus. So maybe we could all just use a moment to reflect on some of the positive things that are happening in our country as this anniversary approaches.\n\nHILL: That was an interesting turn, Rob. Maria, you've got the last 30 seconds.\n\nCARDONA: You know, I think that this is something that people should take a look at and say, let's try to come together. Let's actually try to come together for the country for the 250th anniversary. Let's try to do something that is completely the opposite of Donald Trump, and actually bring people together to celebrate our freedoms, to celebrate this country and the values it was founded on.\n\nHILL: I would like to thank the three of you for coming together on this Friday morning, because it's always a pleasure to see all three of you. I hope you all have a great weekend. We'll see you soon.\n\nCardona: Thanks, Erica.\n\nHILL: Thanks to all of you for joining us this morning, I'm Erica Hill. The headlines are next.\n\n","segments":[{"seg":1,"url":"https://transcripts.cnn.com/show/ctmo/date/2026-06-12/segment/01","title":"CNN.com - Transcripts","text":"Return to Transcripts main page\n\nTrump Touts 'Great Settlement' with Iran, Calls Off Strikes; Could Jilted GOP Lawmakers Turn on Trump's Agenda?; Rubio Compares UFC to U.S. Landing on the Moon. Aired 6-6:30a ET\n\nAired June 12, 2026 - 06:00   ET\n\nTHIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED.\n\nBRAD SMITH, CNN ANCHOR: Got to catch them all. The robbers, that is.\n\nWhat started out as somebody trying to sell Pokemon cards ended in a robbery in San Francisco. A suspect pepper-sprayed the victim and stole their cards after they met up for the sale.\n\nPolice released a video of the moment officers arrested two suspects in the case last month. Officers had identified them the day after the crime.\n\nThat does it for CNN HEADLINE EXPRESS. I'm Brad Smith. CNN THIS MORNING with Audie Cornish starts right now.\n\nERICA HILL, CNN ANCHOR: Today in the group chat, President Trump announcing a great settlement to end the war. So, is it real this time?\n\nDONALD TRUMP, U.S. PRESIDENT: The strait will officially open as soon as we sign, which could be soon. Very soon. Maybe over the weekend.\n\nHILL: Dangerous weather turns deadly in the Midwest. Tornadoes touch down, with severe storms heading East today.\n\nMARCO RUBIO, U.S. SECRETARY OF STATE: When President Kennedy announced that we were going to put a man on the Moon and return him safely to the Earth, no one thought that was possible.\n\nAnd at some level, that's what this whole company, what UFC has been.\n\nHILL: Marco Rubio comparing a deal with the UFC to the Moon landing. Just what do cage fights actually have to do with diplomacy?\n\n(BEGIN VIDEO CLIP) REP. MIKE JOHNSON (R-LA): Let's have votes on an election the day of the election. That's what many states are able to do. I think California is playing around with us.\n\nHILL: Republicans continuing to cast doubt on California's voting tactics. So, will President Trump now try to control state elections?\n\nThe World Cup finally arriving in the U.S. today. Does the U.S. men's national team have a shot at winning this thing?\n\nUNIDENTIFIED MALE: -- is the Super Bowl of IPOs SpaceX?\n\nUNIDENTIFIED FEMALE: Everybody's talking about the SpaceX IPO.\n\nUNIDENTIFIED FEMALE: Nine, eight --\n\nHILL: SpaceX launching on the NASDAQ this morning. Elon Musk now set to become the world's first trillionaire.\n\nTRUMP: We just made a great settlement of the war with Iran. Probably have a signing, maybe in Europe. And it's a great thing.\n\nHILL: President Trump says the war is over; a deal is close. So, why do both Iran and Israel seem surprised by the news?\n\nGood morning, everyone. I'm Erica Hill, in for Audie Cornish. Very happy Friday morning to you.\n\nWe begin with the great settlement. President Trump calling off new strikes on Iran, saying both sides have now agreed to stop the fighting.\n\nTRUMP (via phone): I don't know if you heard, but we ended the war with Iran today. And they have agreed never to have a nuclear weapon, something that we -- we insisted on. That was the whole purpose. That was the -- 95 percent of it.\n\nHILL: Apparently, though, no one told Iran.\n\nESMAIL BAGHAEL, IRANIAN FOREIGN MINISTRY SPOKESMAN (through translator) (via phone): Regardless of the rhetoric, threats and claims of the other side, we are focused on the interests of the Iranian nation. We are doing our own work.\n\nRegarding the text and the overall understanding, whenever we conclude that it secures the interests of the Iranian nation, we will certainly announce it transparently.\n\nAs I speak to you at this moment, we have not reached a final conclusion on this matter.\n\nIsrael, also seemingly taken by surprise, a source telling CNN Israeli Prime Minister Benjamin Netanyahu wasn't aware of an agreement with Iran; that he actually found out on social media.\n\nSo, is this just the latest effort by President Trump to move stalled negotiations -- negotiations forward? Or is there really a deal?\n\nJoining me now, CNN political and national security analyst David Sanger. David, always good to talk to you.\n\nSo, Trump is claiming right now that the end of the war is at hand. The reopening of the Strait of Hormuz could actually happen this weekend once this deal is signed.\n\nAnd yet, we have this warning from one Iran -- Iranian leader that the -- and I'm quoting here -- \"the probability of deception by Trump is high.\"\n\nBased on everything we know and your sources, David, do signs actually point to an agreement at this point?\n\nDAVID SANGER, CNN POLITICAL AND NATIONAL SECURITY ANALYST: Well, they certainly point to some agreement coming together on four major pillars of a -- of some restraint on the nuclear program.\n\nBut it's not a peace agreement. It doesn't end the war. It may be a ceasefire that opens up another negotiation.\n\nSo, there are some reasons to be skeptical of the president's claim. I think CNN -- by CNN's count, he has over the past three months declared on about 39 occasions -- not sure if that's exactly right -- that the war was over.\n\nThis time, he's gone a little bit differently. He said they've come to an agreement on this. And as you noted, the -- that's certainly not how the Iranians are describing it now.\n\nBut they may be close.\n\nSANGER: The president -- the president did say the most important thing was to get them to agree never to build a nuclear weapon.\n\nWell, of course, they've agreed to that many times before: when they signed the nuclear nonproliferation treaty; when they signed the agreement with President Obama 11 years ago.\n\nHILL: Yes. Which is -- which is a key point. That is, of course, in some of the key points that we have, according to a diplomat who's been briefed on this agreement, this memorandum of understanding, if you will.\n\nAnother one that's in there is a 60-day ceasefire, quote, \"on all fronts.\" It would include Lebanon. This has been a key sticking point, as we know, for Iran, which of course, led to some of what we saw over the weekend in terms of both Iran and Israel trading missiles.\n\nThe fact that Israel's prime minister reportedly found out about this on social media, that really stands out to me, especially when we're talking about the potential ceasefire with Lebanon, with activity in Lebanon -- David.\n\nSANGER: That's right. The prime minister does not want to be part of this agreement and has made clear that he won't feel bound by a commitment that he didn't sign up to.\n\nSo, the Iranian position is that this has got to be a ceasefire across all of the active areas of combat. And that means Iran itself. But it also means in Lebanon, where Israel is taking on Hezbollah.\n\nSo, this has been a point of division between the president and Prime Minister Netanyahu. There have been some screaming phone calls we've -- we've heard about along the way.\n\nAnd it does pose a real point of tension in the relationship with Israel, because if they don't respect that ceasefire, and it plunges everything back in again, you'll have the president blaming Prime Minister Netanyahu.\n\nHILL: Mm-hmm. It's -- it's notable, too, some of what we're hearing from lawmakers. I want to just play some comments from a Republican and a Democrat. I do want to note these comments from Congressman Don Bacon actually came just before we heard from the president about this potential agreement.\n\nBut there is a very interesting similarity, if you will, in what he and Adam Schiff have to say. Take a listen.\n\nREP DON BACON (R-NE): Iran needs to come to us wanting a deal right now. We're going to them, and they are abusing the president in these negotiations. They think they have the advantage over President Trump.\n\nREP. ADAM SCHIFF (D-CA): Every time the president talks about how eager Iran is for a deal, it's basically a reveal that he's talking about his own eagerness for a deal.\n\nHILL: So, Adam Schiff talking about the eagerness. But -- but, you know, Congressman Bacon --\n\nHILL: -- also noting there, too, basically, the president needs to stop saying what he wants in public. Is Trump undermining his efforts at this point, showing those cards?\n\nSANGER: Well, certainly, the Iranians think that the president needs this right now more than -- than they do. And I think that was behind the president's decision to renew military activity for a couple of days, to try to show that they could be plunged back into the war.\n\nBut frankly, the problem that's been haunting the president here is that 38 days of pounding the Iranians, starting in late February, did not result in the political concessions he was looking for. And it's not clear that additional days of pounding them will.\n\nNow, I reported two days ago that there were there were four pillars of an agreement that are emerging, and they have to do with everything from what to do with Iran's nuclear stockpile to its future enrichment activity, and so forth. And it looks like on those four, they're coming closer.\n\nBut all this memorandum of agreement would -- of understanding would do is start a negotiation that would probably run all summer, and many fear could run much longer than that, on the details of the nuclear program.\n\nHILL: Yes. David, always good to talk to you. Appreciate it. Thank you.\n\nHILL: Still ahead here on CNN THIS MORNING, the president facing pushback. So, now he's got a new pick to lead the nation's intelligence community. Could it be a rare sign of compromise, or is it caving? What do we really know?\n\nPlus, a federal prosecutor making claims about voter fraud in California. Very explicit public claims.\n\nBut first, perhaps you've heard them called the YOLO Caucus of Congress. Just one of the memes, if you will, for some of the most prominent members now promising revenge.\n\nREP. NANCY MACE (R-SC): As a survivor, I chose to stand on principle.\n\nHILL: The current Republican lawmakers who lost out on Donald Trump's endorsement in the primaries and are now heading for the exit in about six months, are a little bit more vocal these days: raising questions about whether they could actually be a bit of a thorn in the side of the president in the coming months, with their remaining time in Washington.\n\nAmong them is South Carolina Congresswoman Nancy Mace, fresh off her last-place finish for the GOP nomination for governor in her state, joking that she could still come in first, if Mike Pence has the courage.\n\nA reference there, of course, a bit of a dig to Trump's infamous message on January 6th.\n\nMace said she will be adding to the unemployment numbers and also promised to be a, quote, \"more of a menace than ever.\"\n\nTexas Senator John Cornyn, in his first interview since that loss to a Trump-backed challenger in his primary in Texas, telling \"The New York Times,\" quote, \"It is going to be a pretty bumpy ride for the next seven months,\" saying, \"It does give some of us a little more freedom and certainly leverage.\"\n\nJoining me in the group chat, Elliot Williams, CNN legal analyst and former federal prosecutor; Rob Bluey, president and executive editor of \"The Daily Signal\"; and Maria Cardona, CNN political commentator and Democratic strategist.\n\nIt's good to see all of you this morning. So, you know, you've got there the YOLO Caucus. It's the Lame Duck Rebellion. Whatever you want to call them.\n\nWhat is clear is the gloves really appear to be coming off now. And it's also, I would say, further evidence of the hold that Donald Trump has, not just on the party, but specifically on lawmakers.\n\nElliot, how much of a difference do you think this could actually make?\n\nELLIOT WILLIAMS, CNN LEGAL ANALYST: In terms of passing laws or policies, somewhat, only because you will have vocal members of Congress speaking out against the president.\n\nBut you know, Erica, you hit it right on the head with the idea of this being about how singular Donald Trump is as a politician and a figure.\n\nCertainly, there's nothing new about politicians feeling, when the wings are clipped, or I guess -- I don't know if that's the right metaphor. You know what I mean? When -- when they can vote their conscience after elections, they, you know, sort of stray from the fold a little bit. That's a better animal metaphor there.\n\nBut this has happened before. The difference is you have a singular figure at the top of the party who, in private, there's -- there's a bunch of reporting that Republican members of Congress do not take the party line with Trump that they do publicly. And so, they're just feeling more free to speak their minds.\n\nHILL: And part of that, you know, Cornyn also speaking to part of that, you know, continuing in that interview with \"The Times.\" I was struck by noting that he gave voice, they write that he gave voice \"in starkly candid terms to this growing sentiment among Senate Republicans that Trump is actually hurting his own party with self- serving decisions and his insistence on slavish loyalty, ultimately setting himself up for a midterm disaster that would pave the way for the most miserable two years of his life.\n\nYou know, when you -- when you look at that, Rob, I mean, calling it out here, about what this has done and sort of the promise there of what is to come. How much do you see that playing out?\n\nROB BLUEY, PRESIDENT/EXECUTIVE EDITOR, \"THE DAILY SIGNAL\": Well, Erica, first of all, I think we need to remember that it was the voters of Texas, and South Carolina, and Kentucky, and some of these other states that ultimately decided to fire these politicians, because they weren't, quite frankly, representing their values in the U.S. Congress.\n\nIn the case of John Cornyn, I would say just take a look. A couple of hours ago, him picking a fight with Senator Mike Lee over the SAVE America Act.\n\nNow, John Cornyn is a sponsor of the SAVE America Act, but he doesn't have the backbone to stand on the Senate floor and make the Democrats debate this until they get to the point where it can pass with a simple majority vote.\n\nAnd so, I think that you're right. This is probably going to be a challenge for President Trump and other conservatives for the months to come.\n\nBut I would just encourage these lawmakers to remember that the American people are paying attention, and they expect this Republican Congress to actually get some things done, whether it be the SAVE America Act or another reconciliation bill.\n\nHILL: I mean, you know, respectfully, there hasn't been a lot of getting anything done across this Congress --\n\nHILL: -- since they were sworn in. So, it will be interesting to see if this changes anything.\n\nMaria, how much more public do you anticipate these lawmakers? I mean, Democrats are probably loving this moment, but words are one thing. Actions are quite another.\n\nMARIA CARDONA, CNN POLITICAL COMMENTATOR: That's exactly right, Erica. And what I think a lot of these lawmakers are focused on is exactly what the American people want.\n\nWhereas before, they were so beholden to what Trump wanted, because they were scared of him. They didn't have any backbone to stand up against him.\n\nNow, I think they feel free to actually focus on what their voters want. And they're seeing what everyone else is seeing across the board, Erica. Donald Trump's poll numbers are in the toilet. Republicans poll numbers are in the toilet. Democrats have been winning across the board all of these elections, including in ruby-red places.\n\nAnd so, what Republicans are saying is, look, now is the time for me to stand up against Trump. They even said it. What Trump has been doing, the self-dealing has really put their majority in -- in -- in jeopardy. Because the American people don't see that Republicans are focused on what they want.\n\nIn fact, it's completely the opposite. They have focused on higher costs. They have focused on corruption. They have focused on chaos.\n\nAnd they've done nothing to go up against Trump to say, Look, you promised the American people to bring down costs, to bring down inflation. And everything that you're doing is doing exactly the opposite of that.\n\nSo now, maybe they're going to say, let's actually do what the American people want. I think it's too late for them to save their majority in both the House and the Senate. But that's what you're going to see, I think, from here on out.\n\nHILL: All right. We will be watching.\n\nA lot more to tackle ahead this hour, including betting big on the space race. Elon Musk's SpaceX making its Wall Street debut, investors rushing to buy a piece of history that will also be historic for Elon Musk.\n\nPlus, we've got a live look for you at the White House. There it is. The UFC cage all set for the president's birthday on Sunday. Why officials are calling this -- are now referring to the UFC, by the way -- not this match -- the UFC as the United Nations of fighting.\n\nUNIDENTIFIED MALE: So, the UFC arena at the White House for Donald Trump's birthday has been completed. And it looks like total crap.\n\nUNIDENTIFIED MALE: If you think for a second that I'm going to watch any of this, then you would be absolutely correct.\n\n(END VIDEO CLIP) [06:25:08]\n\nHILL: The Trump administration is asking a federal judge to reject the lawsuit which seeks to stop this weekend's UFC fights at the White House. That ruling could come down today.\n\nMeantime, that 92-foot-high claw that dwarfs the White House -- you see it there, all lit up. It has been tested and is now operational.\n\nOn Thursday, Secretary of State Marco Rubio signed a memorandum of understanding with the UFC to create a public-private partnership with the White House.\n\nSo, the UFC now joins 24 other sports -- from the MLB, the NBA, the WNBA, the U.S. Men's national team -- in the State Department sports envoy program.\n\nThat also includes big stars like Baseball Hall of Famer Cal Ripken. He was an envoy to Greece.\n\nRUBIO: When President Kennedy announced that we were going to put a man on the Moon and return him safely to the Earth, no one thought that was possible. And we did it.\n\nWe are a nation founded on doing what no one else dared to do, and no one else aspired to do. And at some level, that's what this whole company, what UFC has been.\n\nWe're excited about what this brand means about America's ability to expand and reach out to different parts of the world.\n\nHILL: Rubio also described the UFC as the United Nations of fighting.\n\nMixed martial arts analyst Luke Thomas joins us now.\n\nLuke, it' s great to have you here. So, as we point out, there's some two dozen sports, right? And envoys, you know -- in many ways, this is sort of like a goodwill ambassador program, right? The -- showing the soft-power tools of the U.S. government.\n\nSo, how effective do you think, with this new public-private partnership, UFC fighters and the sport could be in that role for the U.S.?\n\nLUKE THOMAS, MIXED MARTIAL ARTS ANALYST: I don't really understand exactly what the return on investment is. I mean, I sort of get the generic arguments that are made about the -- the value of sport in building community. And -- and cultivating good kinds of traits and character. I understand that.\n\nBut I don't understand what the value is as it ultimately gets back to the shores. I mean, if you look at the way in which soft power has been implemented in this country for basically decades, generations across multiple presidencies, both Democratic and Republican, it was some kind of effort at both giving something abroad that created better sympathies and had a material impact on the lives of those we were trying to affect, such that it created better sympathies for us or, you know, better bilateral relations.\n\nI don't understand exactly what this does. You can make an argument that it is inoffensive. You can make an argument that, to your point, if the NFL is doing it, well, you know, there's no scandal here in that particular sense.\n\nBut in terms of, like -- I mean, if Donald Trump doesn't believe in soft power, it is very, very difficult for me to understand how this is a different but more enlightened version of it.\n\nHILL: It's an interesting point when you look at the cuts that were made to USAID, right, which was a major instrument, in many ways, of soft power.\n\nYou know, according to his statement, it's going to be used to -- for joint educational content development, using MMA to teach English and leadership skills.\n\nWhat I think is remarkable -- and I think you've noted this -- is the areas where UFC is gaining ground. This is -- or could be, perhaps, used because it's a really popular MMA market, a place like Brazil -- is not really the target of this program.\n\nTHOMAS: Yes. I mean, this is -- we'll have to see how it's implemented ultimately, right? We'll have to see how it's implemented.\n\nI think, to me, the lesson I take from all of this is, listen, could there be some kind of benefit down the road? I suppose it's at least worth taking seriously on some level.\n\nBut that's really not how I understand the nature of this relationship. That, if you look at the White House lawn, and if you look at the way in which the parent company for UFC -- it's called TKO. They also own WWE. If you just look at the way in which they do business, every year seems to greet or bring with it a new level of entanglement in government.\n\nNow, not just local municipal government or even state or national government, but just sort of broadly, they do deals internationally with governments all the time.\n\nI make this point. You know, why are they going this year to Azerbaijan and Serbia, and they're not going to Brazil, the most important market -- or arguably, one of the most important markets in MMA? It's because they're getting paid by the governments there to go.\n\nIt's this enmeshing of the business between the public and the private in which they're talking about, but it extends well beyond this memorandum of understanding.\n\nAnd I know for sports fans out there, you're saying, well, you know, government largesse isn't necessarily a new thing for pro sports owners. Fine. But it's at least worth having a conversation about the role that it plays.\n\nHILL: When we look at what is about to unfold on Sunday. Look, some people are really excited about it. Some people are not. There are very distinct camps, which I think are leading to certain stereotypes that are probably not accurate on both of those sides.\n\nWhat do you think, in your view Sunday's fight has now come to symbolize? And is it what was intended, which we're told is a celebration of the nation's 250th birthday, which happens to fall on this president's 80th birthday?\n\nTHOMAS: To me, this is something approximating the union of these two identities or brands or, you know, between the UFC and between the Trump administration.\n\nYou could even argue, maybe, that it's not so much --"},{"seg":2,"url":"https://transcripts.cnn.com/show/ctmo/date/2026-06-12/segment/02","title":"CNN.com - Transcripts","text":"Return to Transcripts main page\n\nCelebrating 250; 2026 World Cup; Lawn Mystery. Aired 6:30-7a ET\n\nAired June 12, 2026 - 06:30   ET\n\nTHIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED.\n\nLUKE THOMAS, MIXED MARTIAL ARTS ANALYST: -- creating the union of these two identities or brands or, you know, between the UFC and between the Trump administration. You could even argue maybe that it's not so much a one and done kind of an event, although that's what they're suggesting, but that rather it marks a new period of entanglement between them.\n\nWhat was very interesting was the UFC helped launder Donald Trump's reputation following January 6th all the way through into 2024, when they helped boost his candidacy. And the mainstream media never made them pay for that. I was very, very surprised at the time.\n\nSo this is a thing that has been in motion for a very, very long time. I get asked all the time, do you think the UFC risks being seen as political? I'm like, risk is being seen. This has been an open thing for years at this point. This weekend, to me is the culmination of all of those kinds of efforts.\n\nHILL: Luke Thomas, really great to have you with your insight. Thank you.\n\nHILL: Still to come here on CNN THIS MORNING, in honor of the nation's 250th birthday, President Trump is staging a state fair in the nation's capital. But a number of states say they're not going to be able to join the party. We'll tell you why. Plus a round of severe weather, including tornadoes across multiple states, leaving thousands without power and also turning deadly.\n\nHILL: Good Friday morning, I'm Erica Hill. Nice to have you with us here on CNN THIS MORNING. Thirty five minutes past the hour now, here's a look at what's happening.\n\nOne person is dead amidst severe weather across the Midwest and Iowa. Those storms packing 70 to 90 mile per hour winds, that is what helped to kill, unfortunately, a 54-year-old man after he was struck by a tree in Des Moines. Meantime, a large tornado in Central Illinois caught on camera. Look at the size of this. Perhaps not surprisingly, it destroyed homes, leveled businesses. One man was rescued after being trapped under the rubble of his own home. More than 600,000 customers across nine states are waking up without power this morning.\n\nWall Street preparing now for the largest IPO in history as Space X makes its debut on the NASDAQ. Shares of the rocket company being offered at $135 each, that is set to raise some $75 billion and would also make founder, Elon Musk, the world's first billionaire.\n\nDonald Trump offering up a new pick for director of National Intelligence, nominating Jay Clayton, US attorney for the Southern District of New York. And this, of course, follows the intense backlash over Bill Pulte, his initial pick, who has zero intel experience. Though Trump says Pulte will stay in that interim role for the time being.\n\nDONALD TRUMP, UNITED STATES PRESIDENT: He's only there for a little while. He's running it for a short while we get a very talented person, Jay Clayton. As you know, Jay Clayton is an incredible talent, head of Sullivan & Cromwell. He was head of the SEC.\n\nHe was now Southern District. I mean, nobody has better credentials. But Bill will run for sure. Well --\n\nHILL: The Senate had scheduled a confirmation hearing for Clayton for next week. So just what do we know about Trump's new choice to take over as director of National Intelligence? Well, Jay Clayton is, as I noted, currently the US attorney for the Southern District of New York.\n\nHe's also spent time over the past weeks joking the administration's baseless claims of fraud when it comes to voting by mail in California's elections. Take a listen.\n\nJAY CLAYTON, US ATTORNEY, SOUTHERN DISTRICT OF NEW YORK: It makes the opportunity for fraud so much greater when that is not necessary. It is not necessary for ballot access.\n\nUNIDENTIFIED MALE: Is mail in voting being used by one group and not another?\n\nHILL: So he's not the only one here, the US attorney, in Los Angeles is now actually speculating about filing charges.\n\n(BEGIN VIDEO CLIP) BILL ESSAYLI, US ATTORNEY, CENTRAL DISTRICT OF CALIFORNIA: I will just say it will be election fraud charges in the next, I hate to put timelines on things, but one to two months, I believe. We need some of these results to be certified so we can, you know, prove some of the allegations. But we will be charging some people.\n\nHILL: Joining me to discuss Devlin Barrett, Justice Department reporter for the New York Times. He's also the author of the new book, \"The Department of Revenge: How Trump Took Control of American Justice.\"\n\nI mean, Devlin, can you just put into perspective for us how unorthodox perhaps those comments are that we just heard when it comes to this promise that charges are coming? I mean, that would just never happen, I mean, in the normal operation of the Department of Justice. We are no longer living in those times.\n\nDEVLIN BARRETT, JUSTICE DEPARTMENT REPORTER, NEW YORK TIMES: Well, that's exactly right. There are Department of Justice regulations specifically designed to prevent those kind of statements and that kind of activity, because the department and lawyers, and election experts, have long viewed that kind of behavior by the Justice Department as dangerous because it might, you know, cast doubt upon the election. But look, this is the Trump administration, and one of their core beliefs is casting doubt upon the election.\n\nAnd you see that not just with the comments in Los Angeles, but you see that with the comments by Jay Clayton. And in terms of Jay Clayton, there are those comments that are raising alarm bells. There are also questions about his qualifications for this role of DNI. How does he stack up?\n\nBARRETT: So, Jay Clayton is a very experienced Wall Street lawyer, a very experienced corporate lawyer, and he's been the head of the New York prosecutor's office for about a year or so. But he doesn't come with an intelligence background other than what he encountered in his most recent job.\n\nSo, you know, this isn't the resume certainly most people would pick to run an intelligence agency. But the most important credential he has is that Donald Trump trusts him. They golf together. Jay Clayton was assigned a sensitive part of the whole Epstein fiasco last year when the Justice Department was wrestling with that problem.\n\nAnd like everything that, or many things that the President does, it's based on who he likes and how loyal he believes they are.\n\nHILL: In terms of that loyalty, right, elections are key. So those comments that we heard from Jay Clayton are really important here because this president, right, has not given up, despite these baseless claims when it comes to election interference, election fraud. This is something that the President has really zeroed in on, and that we have seen become a focus on for this administration.\n\nBased on what we know about Jay Clayton, if he is, in fact, confirmed, how do you see that potentially intensifying?\n\nBARRETT: Well, so look, it's pretty clear at this point that the President likes to have the DNI pursuing voter fraud claims. We saw that with Tulsi Gabbard when she was the DNI, when she went to personally participate in an FBI search in Atlanta. That's very unusual.\n\nAnd I think it helps to understand what's happening here if you just realize that the DNI in Trump's mind is an election investigating operation, which I think a lot of intelligence officials would say that's only a pretty small part of the DNI's job.\n\nBut here it's the most important part because here it's what the President wants. And you see in Jay Clayton's public comments, which you showed, you see almost sort of a soft audition for that role. I think the question is, once he takes the job or if he gets confirmed, how far is he willing to go for the President?\n\nHILL: Yes. We Will see, too, what the line of questioning is in some of those hearings. Devlin, Barrett, great to have you with us this morning. Thank you. And just a reminder of Devlin's new book, \"The Department of Revenge: How Trump Took Control of American Justice.\"\n\nWell, President Trump's big birthday bash for America hitting another snag. So he had first pitched this idea of the Great American State Fair two years ago, billed as a patriotic world fair, but for states, to unite Americans.\n\nTRUMP: I will work with all 50 governors, Republican and Democrat alike, to create the Great American State Fair. The Great American State Fair will showcase the glory of every state in the union.\n\nHILL: Right? So why not? Sounds like a great idea.
