 not involved, and they added the incident involved workers leaving the facility. The company that runs the site has not commented.\n\nAn NBA Finals watch party outside Madison Square Garden turned violent. Police say they arrested 26 people. Officials say one person punched an officer Friday, then bit another officer. New York Mayor Zohran Mamdani posted on X yesterday urging fans to celebrate responsibly, and he says there's no tolerance for violence.\n\nThe Knicks now lead the final two games to none. Game three tomorrow night at MSG.\n\nFour states hold primaries this week, but most people will be watching Maine and the Democratic Senate candidate Graham Platner. A look at the mounting controversy surrounding his run.\n\nAlso, the prosecution has wrapped its case in the track meet murder trial in Texas. We've got the latest developments there.\n\nBLACKWELL: Democrats are collectively holding their breath and hoping for the best ahead of Tuesday's critical Senate primary in Maine. Now, Graham Platner is the favored Democratic candidate. He's likely going to win. He's refusing to exit the race. He claims his past behavior is being exploited by his political opponents.\n\nGRAHAM PLATNER (D), MAINE SENATE CANDIDATE: Now, as every single piece of that past and journey gets dug up, litigated and weaponized, you have my back.\n\nBLACKWELL: But Platner has acknowledged going through what he called a period of darkness after his military service.\n\nJoining me now is Steve Mistler, he's the chief political correspondent for the Maine Republic. Steve, good morning to you. And so, when I say that Democrats will be holding their breath, they likely know who is going to win that Democratic Senate primary.\n\nBut Governor Janet Mills is still on the ballot there. Is their consideration that there will be a significant turnout for her, that there may be a message in margin here. What are we expecting on Tuesday night?\n\nSTEVE MISTLER, CHIEF POLITICAL CORRESPONDENT, MAINE REPUBLIC: That's a good question. I mean, I think, you know, the governor in recent weeks or in the past week, I should say, has, you know, signaled through the press that, you know, list -- to remind people that she's still on the ballot. Now she suspended her campaign in late April and really hasn't campaigned since then.\n\nAnd so the question is, is whether or not just those signals in and of itself will, you know, move voters who are antsy about Graham Platner and some of these controversies and the cumulative effects of those. It's unclear if, you know, if there's a critical mass of Janet Mills supporters out there to make this close on Tuesday, but certainly there's going to be a lot of attention paid to Platner's vote share, even if he wins.\n\nBLACKWELL: You've recently interviewed Graham Platner and he is denied becoming physical with any of the women that he casually dated. He said that he told his campaign staff or members staff about these text messages early in his marriage. He also said that he expected that this would be a tough campaign.\n\nMaybe he didn't expect, you know, it coming out from his own campaign, but what did he tell you about the eventuality of having to deal with this? Did he expect that at some point the public would know about this part of his life? MISTLER: Well, he expected that, you know, his life would be a closely examined. He was pretty clear about that. He didn't know -- you know, he didn't anticipate the specifics of it. But he -- it's interesting because he, you know, he views this -- these -- the scrutiny of his personal life and these old Reddit posts.\n\nAnd, of course, the -- his old relationships back when he was living in Washington, D.C., he's used those as evidence that his message is a threat to what he calls the political establishment.\n\nSo, you know, while he's frustrated by the attacks and the examination of his personal life, he also views that as evidence that his messages is working and a threat to what he says is the political establishment that wants to stop him at all costs. So it's interesting.\n\nHe's -- it's a mix of sort of defiance and also, you know, anger I think at the fact that, you know, his life is being examined this closely. There's also an acknowledgement though, I would say, that, you know, he -- that that's fair game. I mean, he does say that too, but I think it's just the nature of some of the -- these attacks that's has him frustrated, but again, defiant.\n\nBLACKWELL: And what is he hearing from the state party, from the national party about his campaign?\n\nMISTLER: Yes, I asked him about that on Friday and asked if he had, you know, heard from any officials in the Maine Democratic Party or any -- the national party or any of its affiliates to drop out. And he said, no. And he also said that, you know, if he wouldn't do it anyway, he just feels like he's going to survive this.\n\nHe doesn't believe that the attacks are going to work. He thinks the movement, as he describes it, that he's building here is enough to just push past all of this. And also that voters are tired of that kind of politics. That's the way he described it to me.\n\nSo he thinks that, you know, voters are going to look past a lot of these controversies. And, you know, to some extent, he was right about that when some of his old social media posts. Surfaced in last fall. And a lot of people were writing him off then, but his campaign proved to be very resilient.\n\nAnd I think a lot of that is because he talked about it at town halls. He's held something like 80 of them. And also in the press and in talking about it, he kind of crafted this story of redemption, which I think if you talk to some of his diehard supporters, they really believe in that.\n\nThe question of course, is whether or not, you know, Maine Independent voters, which, you know, occupy a big clock of the voting population here, whether it's persuasive to them.\n\nBLACKWELL: We will all be watching Tuesday night.\n\nSteve Mistler, thank you so much.\n\nElon Musk is poised to become the first trillionaire. So just how much money is $1 trillion? The numbers we've been talking about them this morning. You will not believe. We'll take a look at this morning's roundup.\n\nBLACKWELL: Welcome back. Picking up on our last conversation in Maine, Democratic Senate candidate Graham Platner will hold a town hall today, just two days before Tuesday's primary. He's favored to win, but with his recent scandals, voters are torn.\n\nJoining me today for the roundup, we've got Atlanta Reporter Kaitlyn Ross, SiriusXM Culture and Economics Contributor Drew McCaskill, and Retired Judge Ashley Willcott. All vets of the roundup. Big conversation for you this morning.\n\nLet me start with you, Drew, and Graham Platner. I asked the reporter there in Maine about, is there potentially a message in the margin with the governor, Janet Mills, reminding people that she suspended her campaign, but she's still on the ballot. And so some of those people who don't like the allegations that have come out, that maybe she's a way to express that.\n\nDREW MCCASKILL, SIRIUSXM CULTURE & ECONOMICS CONTRIBUTOR: I honestl\n\n","segments":[{"seg":1,"url":"https://transcripts.cnn.com/show/ctmo/date/2026-06-07/segment/01","title":"CNN.com - Transcripts","text":"Return to Transcripts main page\n\nPolice Search For Suspects After 12 Shot Near Ohio Festival; Missing American Student Found Dead In Japan After Dayslong Search; U.S. And Iran Exchange Strikes, Peace Talks At Stalemate; Pakistan Delegation Arrives In Tehran For Peace Talks; Iran Demands U.S. Unfreeze $24 Billion In Iranian Assets; Trump: War With Iran Will Be Over Soon; Pope Leo Leads Holy Mass On Second Day Of Trip To Spain; State Rests In Karmelo Anthony Murder Trial, Defense Continues Monday; Trump To Attend Game Three Of The NBA Finals; World Cup Security In Focus As Host Cities Prepare For Crowds; Mexico City Sports Fans Attempt Record For Largest Wave. World Cup Kickoff Nears As Fans Bring Energy Worldwide; 1 Killed, Several Hurt In Suspected Terror Attack In Israel; Friday Marks 10 Years Since Mass Shooting At Gay Club; Thousands Without Power Across Northeast; \"UFC At The White House\" Airs Tonight At 8PM ET/PT On CNN. Aired 6-7a ET\n\nAired June 07, 2026 - 06:00   ET\n\nTHIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED.\n\nVICTOR BLACKWELL, CNN ANCHOR: Welcome to CNN THIS MORNING. Here's what's happening now. Police are on the hunt for at least two people who started shooting at each other at a festival. Twelve people were hurt in the process.\n\nUNIDENTIFIED FEMALE: We went to the restroom in the church, and then we just heard shooting. Like shooting. We thought maybe it was fireworks.\n\nBLACKWELL: What we know about the conditions of the victims and how this all started. In Japan, search and rescue volunteers have now found the body of that missing American student. New details are coming of what we're learning about where he was found, and what we're hearing from his family.\n\nAlso, Pope Leo just held the first mass of his trip to Spain. Our Chris Lamb was there and has more on the pope's message.\n\nVINCE VELAZQUEZ, RETIRED ATLANTA POLICE OFFICER: The fans are going to come here and enjoy this World Cup experience and not have an idea of all the security measures that are going on.\n\n(END VIDEO CLIP) BLACKWELL: The World Cup kicks off in just a few days and security, you know, will be tight in cities hosting matches. A look at the preparations and which teams are early favorites.\n\nIt's Sunday, June 7th. Welcome to a brand new week. I'm Victor Blackwell. Good to have you along.\n\nHappening now, police are searching for two suspects after at least 12 people were shot. This happened at a festival in Toledo, Ohio. Here's the moment that sparked the chaos there. Watch.\n\nNow, police say the two shooters appeared to have been shooting at each other. Neither suspect is in custody. Twelve people were hurt in the crossfire, two of them critically. All of them are expected to survive.\n\nNow, police say they spoke to victims ages 14 to 61. Investigators said that they were shocked by what they saw.\n\nDAN GERKEN, INVESTIGATIVE LT. TOLEDO POLICE: As far as violence, this is over the top, right? So, 12 people being shot. That's the most I've been to a scene. I've been to a lot of scenes. But this is -- this is way over the top.\n\nBLACKWELL: Now police are asking people to avoid the area while they continue this investigation, but they want to hear from people if they have any information. Also to send in cellphone video from the scene. The shooting is just one of at least 170 mass shootings in the U.S. so far this year.\n\nSearch and rescue volunteers have now found the body of an Auburn University student who was missing during a family vacation in Japan. James Weston Higginbotham disappeared after leaving his family to explore parts of Kyoto on his own after a disagreement with his mother. CNN's Hanako Montgomery has more.\n\nHANAKO MONTGOMERY, CNN CORRESPONDENT: This is an extremely tragic end to a dayslong search for Weston Higginbotham. His mother, Nancy, posted on Facebook that his body was found on Saturday in a mountainous area just outside of Kyoto by a volunteer search and rescue party.\n\nNow on Facebook, his mother said, quote, \"the grief we feel is impossible to put into words. We are forever grateful for the time we had with our sweet, precious Weston, but cannot begin to understand what life without him will be like.\"\n\nLocal police have told CNN that the cause of death is still under investigation. And in terms of what led up to this tragedy, we know that the family originally from Alabama, first got to Japan on May 22nd to celebrate their younger son's high school graduation. Now, after exploring other parts of the country, they got to Kyoto on May 29th. One of their last stops.\n\nAnd on that day, Weston and his mom had a small disagreement over ChatGPT and its environmental impact. Weston is a passionate naturalist and is very much passionate about the environment.\n\nNow, after this small disagreement, the family decided that they needed to take some space to cool down, and Weston chose to split off from his parents and from his brother, and he explored the city on his own.\n\nNow, this was around 6:00 p.m. local time on May 29th he was found walking around Kyoto station. Two hours later, he was seen walking around the Yamashina area of Kyoto on a path that leads to a hiking trail. Now, this is the last known sighting of Weston.\n\nAnd several hours later, when Weston still did not return to the hotel, his parents filed a missing person's report. Now, since then, the authorities have been combing through the Japanese forest to look for Weston. But a typhoon hampered the efforts somewhat. On June 5th, the authorities concluded their forest search for Weston, and that is when the family chose to organize their own volunteer search and rescue party.\n\nNow, this is an unimaginable loss for the Higginbothams. I've spoken to the family several times over the past few days, and they told me just how close they are as a family, how they love to go hiking together, explore new cities and cultures together. And his mother also told me how Weston had a heart of gold.\n\nNANCY HIGGINBOTHAM, WESTON'S MOTHER: Like he's just this little, just amazing person that everybody loves, everybody loves. He's got a heart of gold.\n\nMONTGOMERY: His parents have asked for privacy as they mourn their son and come to terms with their new reality.\n\nHanako Montgomery, CNN.\n\nBLACKWELL: Thank you. The war that President Trump promised would only last four to six weeks has now reached 100 days and counting. Here's where things. The U.S. military reports shooting down six Iranian attack drones over the past two days that were targeting the Strait of Hormuz. Seven ballistic missiles were also fired at Kuwait and Bahrain, and most were intercepted.\n\nPakistan's interior minister has arrived in Tehran for a new round of peace talks. A top adviser to Iran's supreme leader tells CNN that the ball is in President Trump's court. He's demanding the U.S. unfreeze billions in Iranian assets.\n\nMOHSEN REZAEI, SENIOR MILITARY ADVISER TO IRAN'S SUPREME LEADER (through translator): If he wants to reach an agreement with Iran, this $24 billion is a test of trust that Iran wants to have with Trump. This is a test that America must pass, and the path will be opened. This is our own money, not America's money.\n\nBLACKWELL: CNN's Barbie Latza Nadeau is tracking the latest developments. She's joining us from Rome. Barbie, what do we know about these talks that are happening now?\n\nBARBIE LATZA NADEAU, CNN CORRESPONDENT: Well, you know, I think the fact that they're happening is giving a little bit of optimism. I think people are cautiously optimistic. They're meant to solidify the ceasefire, which of course started in April. But there are several points of contention. Now, that $24 billion worth of Iranian assets that the Iranians want to have unfrozen. That's a major, major point.\n\nBut also the freeing up of the Strait of Hormuz for commerce to flow through. And that will help, of course, the global economy. And one of the points that, of course, they're going to have to agree on is the stance on Iran's nuclear program. And of course, that's what started this conflict in the first place.\n\nBut U.S. President Donald Trump says he believes that the Iranians are ready to make a deal, even though we hear that cautious, cautious warning from the Iranian side. So, these talks are important. There is a sense of optimism, but there is also a sense of reality when you consider the amount of military back and forth going on in that region right now. And that's worrying, of course, to everyone in that region and globally, to be honest, Victor.\n\nBLACKWELL: Indeed. Barbie Latza Nadeau, reporting live from Rome, thank you. And President Trump insists that the war with Iran will be over soon. As he puts it, one way or another. Let's get more now from CNN's Julia Benbrook.\n\nJULIA BENBROOK, CNN CORRESPONDENT: This recent exchange of fire leads to a lot of questions about the ceasefire and the peace negotiations, which seem to be at an impasse right now. As a top Iranian official tells CNN, those negotiations are deadlocked. Over 24 billion in frozen Iranian assets.\n\nNow, the most recent comments we've heard from President Donald Trump on all of this came in an interview with NBC's Meet the Press, where he was asked if the Iranians are so desperate to make a deal, which he has said repeatedly, why have they not yet accepted his terms.\n\nTake a listen to part of this exchange. This is with NBC's Kristen Welker.\n\n(BEGIN VIDEO CLIP) KRISTEN WELKER, NBC HOST: You have been saying for months, Mr. President, that Iran is begging to make a deal.\n\nDONALD TRUMP, PRESIDENT OF THE UNITED STATES: True.\n\nWELKER: They are so desperate to make a deal, why haven't they made a deal with you yet?\n\nTRUMP: Because they -- it's a very hard thing for them. They've had great independence. They've dealt with very weak and ineffective leadership on behalf of the United States and other countries, frankly, that were -- that allowed them to get away with murder. And I don't -- I think they can't believe they're in the situation where they've been virtually decapitated.\n\nBENBROOK: He went on to say that the Iranians are strong and proud. And while it may take time, ultimately, he believes that they will have no choice but to make a deal.\n\nWhen it comes to the timeline of all of this, following those first joint U.S. Israel strikes against Iran back in February, he said again and again that this conflict would end very soon. He's now pushing back against any criticism of how long this has gone on, saying that he believes he's moving quickly, that these things take time, sometimes even years to resolve.\n\nNow, when it comes to the negotiations, one of the last major updates that we received from the White House officials told us that Trump had sent back changes to a proposed deal with Iran, and that he was asking for tougher language when it comes to Iran's nuclear commitments and its pledge to reopen the Strait of Hormuz. That was about a week ago now, Victor.\n\nBLACKWELL: Julia Benbrook, thank you very much. Still ahead, we go live to Madrid, where Pope Leo is celebrating mass this morning. We'll have the latest on the huge crowds turning out to see him. The first American pope traveling in Spain.\n\nPlus, the 2026 World Cup is about to kick off in 16 cities across the U.S., Mexico and Canada. What's being done to keep everyone safe.\n\nBLACKWELL: New this morning, Pope Leo led holy mass on the second day of his weeklong visit to Spain. This morning, crowds greeted the pontiff with cheers as he rode in the popemobile through the streets of Madrid. Yesterday, while he was making a speech at the Royal Palace, the pope denounced populists who are, in his words, fanning the flames of polarization, and he called for peace.\n\nLet's go to Vatican correspondent Christopher Lamb now. Tell us more about what the pope had to say this morning.\n\nCHRISTOPHER LAMB, CNN VATICAN CORRESPONDENT: Well, Victor, there's absolutely huge crowd gathered here in Central Madrid for the mass led by Pope Leo. Around 1.2 million people are estimated to have turned out for it.\n\nAnd Pope Leo had a strong message during the mass which saying that whilst Spain has this extraordinary Catholic history, that history should not be seen as a sort of museum or something to be looked at with nostalgia, but actually faith must mean something to people in Spain today and into the future, particularly in trying to build a better world.\n\nNow, the mass is coming to an end. You can hear the processions coming to an end so you can hear applause. You know, Leo has really been greeted with great enthusiasm here in Madrid for what is going to be a six-day visit to Spain. He seems very at home in this country.\n\nOf course, he's the first American Pope, but he is a fluent Spanish speaker who spent a number of years in Peru, and he's visited Spain many times. And he had these big crowds today for the mass and then the procession afterwards. And on Saturday night, a prayer vigil with around half a million young people.\n\nSo, I've been just about 600 meters from the mass that's been taking place. And, you know, the crowds have really been quite something. Families, young people here, huge numbers have turned out for Leo, and there's really very, very intense interest in his visit to Spain.\n\nBLACKWELL: Christopher, you're competing with all the sound around you. So we're having a little tough time hearing you, but this is day two of day six. What else are we expecting from the pope?\n\nLAMB: Well, the pope is on -- Monday, tomorrow, is going to be addressing the Spanish parliament. That's the first time a pope has done that. We're expecting him to talk about polarization and how to overcome that. And he's also expected, at some point during his visit to meet with abuse survivors. Of course, the clerical sexual abuse scandal has been a big thing here in Spain. And the Vatican has confirmed that he will be meeting with the victims of abuse.\n\nAnd he's also going to be going to Barcelona to visit the Sagrada Familia Church, the iconic basilica, which was designed by Gaudi. And he will then finish his visit with a trip to the Canary Islands, where migration and the plight of immigrants and refugees is going to be front and center. And Leo is going to be meeting with migrants and those groups who are helping them.\n\nSo it's a visit with, obviously, you know, that strong faith element. Leo wants to encourage the Catholic church in Spain, but there's also a political focus. Leo wanting to bring a message of unity to what is quite a polarized society, Victor.\n\nBLACKWELL: Yes. Every visit by the pope is historic, but this one especially.\n\nSo, Christopher Lamb from Madrid, thank you very much. So, it's the week the world has been waiting for. The World Cup tournament kicks off this week with two matches in Mexico. The teams to watch out for and what's new this year.\n\nBLACKWELL: Police in Ohio are searching for two suspects after at least 12 people were shot near a festival in Toledo on Saturday. The victims range in age from 14 to 61. Two are in critical condition, but Toledo's mayor says they're all expected to survive.\n\nPolice say the two shooters appeared to be shooting at each other. This morning, there are no suspects in custody.\n\nA new development in the murder trial of Karmelo Anthony. Prosecutors rested their case yesterday after calling 21 witnesses in the case against this Texas teenager. He's charged in the stabbing death of Austin Metcalf. Anthony's defense team started calling witnesses, Saturday, and set out to prove this was a justified killing in self- defense. Testimony resumes tomorrow.\n\nPresident Trump is expected to be in Madison Square Garden tomorrow to watch the Knicks take on the Spurs in game three of the NBA finals. Trump says he was invited by Knicks' owner James Dolan. The Knicks' lead, two-zero.\n\nThe FIFA World Cup is now just four days away, and security is a big part of the preparation. With matches across the U.S., Canada and Mexico, host cities are working to handle large crowds and keep everyone safe. Officials are also looking at recent incidents and how transportation systems and venues will hold up. CNN's Ryan Young takes a closer look.\n\nMARKWAYNE MULLIN, DHS SECRETARY: Through 11 different cities. And we're going to have 78 Super Bowls in 38 days.\n\nRYAN YOUNG, CNN CORRESPONDENT (voice-over): Across the U.S. and Canada and Mexico, this year, FIFA World Cup on tap to be the largest tournament in history. With stadiums averaging nearly 70,000 seats, organizers expect the event to draw 5 million fans. That will also mean intense security. Some recent unprovoked attacks give people reason to worry.\n\nIn Los Angeles, where the U.S. tournament kicks off, police say someone stabbed and beat a 70-year-old woman back in March, leaving her with a broken neck. Not far away in Long Beach, California, last month, police say another woman was stabbed and left hospitalized. And last week in Atlanta, police say a woman was fatally stabbed on a train operated by MARTA, the city's public transportation line. In months past, the Transportation Department called for improved safety measures in cities to include Chicago, D.C., New York, L.A., Charlotte and Philadelphia. Now, Transportation Secretary Sean Duffy wants an investigation in Atlanta saying, every American should be disturbed by the horrific crimes we have seen on MARTA in the last month.\n\n(on camera): There's a big focus on safety and whether or not MARTA can meet the need when it comes to all the international guests that will be coming to town. And some things have really frightened people in the city, especially a deadly stabbing that happened just last week, having people asking questions, is MARTA safe enough and ready for the World Cup?\n\nGARY GALE, ATLANTA TOURIST FROM CALIFORNIA: I think there should be extra security for sure on a day to day basis, especially with the World Cup coming up.\n\nUNIDENTIFIED FEMALE: Traveling alone would no"},{"seg":2,"url":"https://transcripts.cnn.com/show/ctmo/date/2026-06-07/segment/02","title":"CNN.com - Transcripts","text":"Return to Transcripts main page\n\nPolice Search For Suspects After 12 Shot Near Ohio Festival; Pakistan Delegation Arrives In Tehran For Peace Talks; U.S. And Iran Exchange Strikes, Peace Talks At Stalemate; Missing American Student Found Dead In Japan After Days-Long Search; Platner Claims His Troubled Past Is Being \"Weaponized\"; Platner Faces New Allegations Days Before Maine Primary. Karmelo Anthony Trial Underway with No Black Jurors; Prosecutor: Texas Track Meet Killing was Murder, Not Self-Defense; Elon Musk to Become World's First Trillionaire; U.S. Prepares for FIFA World Cup Kickoff. Aired 7-8a ET\n\nAired June 07, 2026 - 07:00   ET\n\nTHIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED.\n\nVICTOR BLACKWELL, CNN HOST: Welcome back to CNN This Morning. Here's what you need to know today. Police are searching for at least two people who started shooting at a festival in Ohio. Twelve people were hit in the crossfire. We have the latest on that manhunt coming up.\n\nAlso new this morning, CNN spoke to Iran's foreign minister as the U.S. and Iran work to negotiate some permanent ceasefire. We have his reaction to how things are going so far.\n\nAlso in Japan, the search and rescue volunteers there have found the body of that missing American student. We have new details. We're learning about where he was found and what we're learning from his family.\n\nAnd Decision Day is looming for Democrats in Maine as they choose their candidate to run for Senate, choose their nominee. Graham Platner is favored to win the primary, but there are these, as you've heard, mounting controversies. Some Democrats wonder, is he too risky a bet?\n\nIt is Sunday, June 7th. Good to have you along. I'm Victor Blackwell.\n\nHappening right now, police are searching for two suspects after at least 12 people were shot near a festival in Toledo, Ohio, yesterday. Look at this. This was the scene as the shooting started.\n\n(END VIDEO CLIP) BLACKWELL: Police say the two shooters appeared to have been shooting at each other. Neither suspect is in custody this morning. Twelve people were hurt in that crossfire, two of them critically. All of them are expected to survive.\n\nHere's CNN's Gloria Pazmino with details.\n\nGLORIA PAZMINO, CNN NATIONAL CORRESPONDENT: That's right, Victor. Panic at what was supposed to be a summertime festival in Toledo, Ohio. Scenes like this have become a just commonplace across our country.\n\nHere's what we know. Law enforcement officials said at least two shooters were involved and that 12 people were struck by gunfire. Two of them are in critical condition. Police are still looking for the suspects and no one is in custody. An investigation is ongoing.\n\nNow, Toledo police said the incident occurred shortly after 5:30 in the afternoon on Saturday, local time, at the Old West End Festival. This is an annual two-day event which takes place in the city's historic district. The event kicked off on Saturday morning with a parade and live music. And police initially said that many victims were transported to nearby hospitals for treatment.\n\nNow, eyewitnesses told a local CNN affiliate, WTOL, that they heard multiple shots and then a panic among the festival-goers. The shooting is one of at least 170 mass shootings across the U.S. this year alone. That's according to the Gun Violence Archive. Victor?\n\nBLACKWELL: Gloria, thank you.\n\nToday marks 100 days since the U.S.-Israeli war with Iran started. Despite President Trump promising the conflict would last only four to six weeks, both sides are exchanging strikes during this really fragile ceasefire. Six Iranian attack drones have been shot down. That's according to U.S. Central Command.\n\nPakistan's interior minister also arrived in Tehran to try to salvage peace talks. Minutes ago, the spokesperson for Iran's foreign ministry explained the challenge they see with negotiating with the U.S.\n\nESMAEIL BAGHAEI, IRANIAN FOREIGN MINISTER SPOKESPERSON: The main problem of negotiating with this administration is that you have to face so many changing positions, moving the goalposts, different statements, contradictory remarks by different officials. So it makes the whole process very cumbersome, very unstable, and very uncertain. So, the exchange of communications still are ongoing.\n\nBLACKWELL: CNN's Jerusalem Bureau Chief Oren Liebermann has more for us. OREN LIEBERMANN, CNN JERUSALEM BUREAU CHIEF: The 24 hours from early Saturday morning until early Sunday morning have put tremendous pressure on the U.S.-Iran ceasefire and raised serious questions on whether there is a viable diplomatic path forward on negotiations and any means of making sure this ceasefire becomes a real broader agreement.\n\nOn Saturday morning, according to U.S. Central Command, they intercepted four one-way attack drones in the Gulf and around the Strait of Hormuz. Iranian state media had said these targeted what may have been U.S. Navy vessels operating in the region.\n\nIn response, according to Central Command, which governs U.S. military operations in the region, the U.S. struck surveillance radar sites, which Iran said they consider a grave violation of the ceasefire. Several hours later, we saw seven ballistic missiles fired at Kuwait and Bahrain. Six of those intercepted, one didn't reach its target.\n\nBut all of this puts pressure on the ceasefire. Then in the overnight hours from Saturday to Sunday, the U.S. says they intercepted two more one-way attack drones. So this, you see the difficulties here of not only making the ceasefire really take effect, but also trying to find some diplomatic path forward.\n\nPakistan's interior minister is holding meetings in Tehran throughout the weekend and on Sunday in particular, trying to make sure there is a path forward. But you see the difficulties in trying to move that ahead.\n\nMeanwhile, a source familiar with the thinking of U.S. Treasury Secretary Scott Bessent says he is considering, and the Treasury Department is considering using Iranian assets to not only pay for the damage of future Iranian attacks, but also considering the possibility of using them to pay for past damage from Iranian attacks.\n\nFor example, last week we saw an Iranian attack on Kuwait's airport kill one person, wound at least 60 others, and cause severe damage at the airport itself. Meanwhile, Iran has insisted that any U.S.-Iran ceasefire agreement include Lebanon as well.\n\nBut just like we see in the Gulf region, the ceasefire in there also appears to be under tremendous pressure. According to Lebanon's Ministry of Public Health, Israeli strikes killed 21 people on Friday. Then on Saturday, an Israeli strike on a vehicle in southern Lebanon killed a general and several other officers who were in that vehicle near the city of Nabatiyah.\n\nThe Israeli military acknowledged the strike and said it was moving suspiciously and operating in an area that had been under an evacuation warning. They say the strike itself will be looked at and learned from and that any movement in that area requires coordination with the Israeli military.\n\nMeanwhile, Hezbollah, which rejected the latest U.S.-Israel ceasefire, has attacked northern Israel for the first time since that ceasefire went into effect, launching two projectiles, according to the Israeli military. Meanwhile, two Israeli soldiers were killed in southern Lebanon, one on Friday, one on Saturday.\n\nSo you see the difficulty not only in the Gulf region between the U.S. and Iran of making a ceasefire real, bringing it to fruition, but also in Lebanon as well.\n\nOren Liebermann, CNN, in Jerusalem.\n\nBLACKWELL: Well, now to Russia's war on Ukraine. Ukrainian President Volodymyr Zelenskyy is expected to meet with European allies. The leaders of Germany, Britain, and France say that they'll focus on coordinating support for Ukraine. They'll also talk about how to apply more pressure on the Kremlin.\n\nNow, President Zelenskyy recently proposed a face-to-face meeting with Russian President Vladimir Putin, but Putin dismissed Zelenskyy's offer.\n\nSearch and rescue volunteers in Japan say they have found the body of a missing American college student, 20-year-old James \"Weston\" Higginbotham. He disappeared May 29 while he was on a trip with his family.\n\nJenn Sullivan has details.\n\nJENN SULLIVAN, CNN REPORTER (voice-over): It was supposed to be a celebration, the Higginbotham family traveling from Alabama to Japan to celebrate their youngest son's high school graduation. But the trip turned into a tragedy when their oldest son went missing.\n\nAfter days of searching, the body of 20-year-old James Weston Higginbotham was found Saturday. His family posting on Facebook, saying in part, \"Our family is heartbroken to share that Weston was found deceased by a volunteer search and rescue group in a mountainous area outside of Kyoto. The grief we feel is impossible to put into words.\"\n\nWeston was a college student at Auburn University. He disappeared on May 29 after getting into an argument with his mom over the environmental impact of her use of AI. His mother spoke to CNN's Erin Burnett Friday night before his body was found.\n\nNANCY HIGGINBOTHAM, MOTHER OF JAMES \"WESTON\" HIGGINBOTHAM: He turned off his location, so the police were able to track through CCT video that he stopped at the Yamashina station.\n\nSULLIVAN (voice-over): The multi-day search involved more than 100 police officers, K-9 units, and helicopters. On Saturday, the family launched their own search efforts with help from local residents and a hired search and rescue team.\n\nHis family focused their search in a mountainous area because they said Weston loved nature and hiking and thought that's where he may have gone.\n\nHIGGINBOTHAM: He just loves to go outside and go for a walk on a trail or go for a small hike. No matter what time of day, that's just fun to him.\n\nSULLIVAN (voice-over): His family thanking the volunteers who helped them look for him on their Facebook page. Closing out their message by saying, \"Thank you for your thoughts, prayers, and support. We will need them now more than ever. We will always love you, Weston.\"\n\nI'm Jenn Sullivan reporting.\n\nBLACKWELL: Here are some of the other stories we're watching this morning. The CDC says that millions of Americans could soon face new hurdles to keep or get Medicaid coverage. A new federal rule sets stricter standards for who qualifies for an exemption from work requirements. Patients now have to show their condition significantly limits their ability to work.\n\nA photographer is recovering after being hit by a car outside Delaney Immigration Detention Center in New Jersey. This is the moment of impact.\n\nUNIDENTIFIED MALE: Wow.\n\nUNIDENTIFIED MALE: Jesus!\n\nBLACKWELL: Josh Pacheco says that they were covering a protest in Newark when vehicles drove out of a gated area. ICE says it was not involved, and they added the incident involved workers leaving the facility. The company that runs the site has not commented.\n\nAn NBA Finals watch party outside Madison Square Garden turned violent. Police say they arrested 26 people. Officials say one person punched an officer Friday, then bit another officer. New York Mayor Zohran Mamdani posted on X yesterday urging fans to celebrate responsibly, and he says there's no tolerance for violence.\n\nThe Knicks now lead the final two games to none. Game three tomorrow night at MSG.\n\nFour states hold primaries this week, but most people will be watching Maine and the Democratic Senate candidate Graham Platner. A look at the mounting controversy surrounding his run.\n\nAlso, the prosecution has wrapped its case in the track meet murder trial in Texas. We've got the latest developments there.\n\nBLACKWELL: Democrats are collectively holding their breath and hoping for the best ahead of Tuesday's critical Senate primary in Maine. Now, Graham Platner is the favored Democratic candidate. He's likely going to win. He's refusing to exit the race. He claims his past behavior is being exploited by his political opponents.\n\nGRAHAM PLATNER (D), MAINE SENATE CANDIDATE: Now, as every single piece of that past and journey gets dug up, litigated and weaponized, you have my back.\n\nBLACKWELL: But Platner has acknowledged going through what he called a period of darkness after his military service.\n\nJoining me now is Steve Mistler, he's the chief political correspondent for the Maine Republic. Steve, good morning to you. And so, when I say that Democrats will be holding their breath, they likely know who is going to win that Democratic Senate primary.\n\nBut Governor Janet Mills is still on the ballot there. Is their consideration that there will be a significant turnout for her, that there may be a message in margin here. What are we expecting on Tuesday night?\n\nSTEVE MISTLER, CHIEF POLITICAL CORRESPONDENT, MAINE REPUBLIC: That's a good question. I mean, I think, you know, the governor in recent weeks or in the past week, I should say, has, you know, signaled through the press that, you know, list -- to remind people that she's still on the ballot. Now she suspended her campaign in late April and really hasn't campaigned since then.\n\nAnd so the question is, is whether or not just those signals in and of itself will, you know, move voters who are antsy about Graham Platner and some of these controversies and the cumulative effects of those. It's unclear if, you know, if there's a critical mass of Janet Mills supporters out there to make this close on Tuesday, but certainly there's going to be a lot of attention paid to Platner's vote share, even if he wins.\n\nBLACKWELL: You've recently interviewed Graham Platner and he is denied becoming physical with any of the women that he casually dated. He said that he told his campaign staff or members staff about these text messages early in his marriage. He also said that he expected that this would be a tough campaign.\n\nMaybe he didn't expect, you know, it coming out from his own campaign, but what did he tell you about the eventuality of having to deal with this? Did he expect that at some point the public would know about this part of his life? MISTLER: Well, he expected that, you know, his life would be a closely examined. He was pretty clear about that. He didn't know -- you know, he didn't anticipate the specifics of it. But he -- it's interesting because he, you know, he views this -- these -- the scrutiny of his personal life and these old Reddit posts.\n\nAnd, of course, the -- his old relationships back when he was living in Washington, D.C., he's used those as evidence that his message is a threat to what he calls the political establishment.\n\nSo, you know, while he's frustrated by the attacks and the examination of his personal life, he also views that as evidence that his messages is working and a threat to what he says is the political establishment that wants to stop him at all costs. So it's interesting.\n\nHe's -- it's a mix of sort of defiance and also, you know, anger I think at the fact that, you know, his life is being examined this closely. There's also an acknowledgement though, I would say, that, you know, he -- that that's fair game. I mean, he does say that too, but I think it's just the nature of some of the -- these attacks that's has him frustrated, but again, defiant.\n\nBLACKWELL: And what is he hearing from the state party, from the national party about his campaign?\n\nMISTLER: Yes, I asked him about that on Friday and asked if he had, you know, heard from any officials in the Maine Democratic Party or any -- the national party or any of its affiliates to drop out. And he said, no. And he also said that, you know, if he wouldn't do it anyway, he just feels like he's going to survive this.\n\nHe doesn't believe that the attacks are going to work. He thinks the movement, as he describes it, that he's building here is enough to just push past all of this. And also that voters are tired of that kind of politics. That's the way he described it to me.\n\nSo he thinks that, you know, voters are going to look past a lot of these controversies. And, you know, to some extent, he was right about that when some of his old social media posts. Surfaced in last fall. And a lot of people were writing him off then, but his campaign proved to be very resilient.\n\nAnd I think a lot of that is because he talked about it at town halls. He's held something like 80 of them. And also in the press and in talking about it, he kind of crafted this story of redemption, which I think if you talk to some of his diehard supporters, they really believe in that.\n\nThe question of course, is whether or not, you know, Maine Independent voters, which, you know, occupy a big clock of the voting population here, whether it's persuasive to them.\n\nBLACKWELL: We will all be watching Tuesday night.\n\nSteve Mistler, thank you so much.\n\nElon Musk is poised to become the first trillionaire. So just how much money is $1 trillion? The numbers we've been talking about them this morning. You will not believe. We'll take a look at this morning's roundup.\n\nBLACKWELL: Welcome back. Picking up on our last conversation in Maine, Democratic Senate candidate Graham Platner will hold a town hall today, just two days before Tuesday's primary. He's favored to win, but with his recent scandals, voters are torn.\n\nJoining me today for the roundup, we've got Atlanta Reporter Kaitlyn Ross, SiriusXM Culture and Economics Contributor Drew McCaskill, and Retired Judge Ashley Willcott. All vets of the roundup. Big conversation for you this morning.\n\nLet me start with you, Drew, and Graham Platner. I asked the reporter there in Maine about, is there potentially a message in the margin with the governor, Janet Mills, reminding people that she suspended her campaign, but she's still on the ballot. And so some of those people who don't like the allegations that have come out, that maybe she's a way to express that.\n\nDREW MCCASKILL, SIRIUSXM CULTURE & ECONOMICS CONTRIBUTOR: I honestl"}],"vocabulary":[{"word":"suspect","phonetic":"/səˈspekt/","pos":"n.","level":"考研","cn":"嫌疑犯","en":"a person thought to be guilty of a crime or offense","excerpt":"Police are searching for two suspects after at least 12 people were n":"今年的FIFA世界杯有望成为历史上规模最大的赛事。"},{"word":"crossfire","phonetic":"/ˈkrɒsfaɪər/","pos":"n.","level":"六级","cn":"交叉火力","en":"gunfire from two or more directions passing through the same area","excerpt":"Twelve people were hit in the crossfire.","example_cn":"十二人在交叉火力中受伤。"},{"word":"manhunt","phonetic":"/ˈmænhʌnt/","pos":"n.","level":"六级","cn":"搜捕","en":"an organized search for a person, especially a criminal","excerpt":"We have the latest on that manhunt coming up.","example_cn":"我们即将带来关于那次搜捕的最新消息。"},{"word":"ceasefire","phonetic":"/ˈsiːsfaɪər/","pos":"n.","level":"六级","cn":"停火","en":"a temporary suspension of fighting","excerpt":"the U.S. and Iran work to negotiate some permanent ceasefire.","example_cn":"美国和伊朗正在努力谈判达成某种永久停火。"},{"word":"salvage","phonetic":"/ˈsælvɪdʒ/","pos":"v.","level":"六级","cn":"挽救","en":"to save something from loss or destruction","excerpt":"Pakistan's interior minister also arrived in Tehran to try to salvage peace talks.","example_cn":"巴基斯坦内政部长也抵达德黑兰，试图挽救和平谈判。"},{"word":"mounting","phonetic":"/ˈmaʊntɪŋ/","pos":"adj.","level":"六级","cn":"日益增加的","en":"increasing in amount or intensity","excerpt":"there are these, as you've heard, mounting controversies.","example_cn":"正如你所听到的，存在这些日益增加的争议。"},{"word":"primary","phonetic":"/ˈpraɪməri/","pos":"n.","level":"六级","cn":"初选","en":"a preliminary election to appoint delegates to a party conference or to select the candidates for a principal election","excerpt":"Graham Platner is favored to win the primary.","example_cn":"格雷厄姆·普拉特纳有望赢得初选。"},{"word":"suspect","phonetic":"/səˈspekt/","pos":"n.","level":"考研","cn":"嫌疑犯","en":"a person thought to be guilty of a crime or offense","excerpt":"police are searching for two suspects after at least 12 people were shot","example_cn":"警方正在搜寻至少12人被枪击案的两名嫌疑人。"},{"word":"custody","phonetic":"/ˈkʌstədi/","pos":"n.","level":"六级","cn":"拘留","en":"the state of being held by the police","excerpt":"Neither suspect is in custody this morning.","example_cn":"今早两名嫌疑人均未被拘留。"},{"word":"critical","phonetic":"/ˈkrɪtɪkl/","pos":"adj.","level":"考研","cn":"危急的","en":"extremely ill and at risk of death","excerpt":"two of them critically.","example_cn":"其中两人情况危急。"},{"word":"commonplace","phonetic":"/ˈkɒmənpleɪs/","pos":"adj.","level":"六级","cn":"常见的","en":"not unusual; ordinary","excerpt":"Scenes like this have become a just commonplace across our country.","example_cn":"这样的场景在我国已经变得司空见惯。"},{"word":"incident","phonetic":"/ˈɪnsɪdənt/","pos":"n.","level":"考研","cn":"事件","en":"an event or occurrence","excerpt":"the incident occurred shortly after 5:30 in the afternoon on Saturday","example_cn":"事件发生在周六下午5点30分后不久。"},{"word":"annual","phonetic":"/ˈænjuəl/","pos":"adj.","level":"考研","cn":"每年的","en":"occurring once every year","excerpt":"This is an annual two-day event","example_cn":"这是一个为期两天的年度活动。"},{"word":"historic","phonetic":"/hɪˈstɒrɪk/","pos":"adj.","level":"考研","cn":"历史性的","en":"famous or important in history","excerpt":"the city's historic district","example_cn":"该市的历史街区。"},{"word":"eyewitness","phonetic":"/ˈaɪwɪtnəs/","pos":"n.","level":"六级","cn":"目击者","en":"a person who has seen something happen and can give a first-hand description of it","excerpt":"eyewitnesses told a local CNN affiliate","example_cn":"目击者告诉当地CNN附属机构。"},{"word":"multiple","phonetic":"/ˈmʌltɪpl/","pos":"adj.","level":"考研","cn":"多个的","en":"many or several","excerpt":"they heard multiple shots","example_cn":"他们听到了多声枪响。"},{"word":"mass shooting","phonetic":"/mæs ˈʃuːtɪŋ/","pos":"n.","level":"六级","cn":"大规模枪击","en":"an incident involving multiple victims of gun violence","excerpt":"one of at least 170 mass shootings across the U.S. this year alone","example_cn":"仅今年美国就发生了至少170起大规模枪击事件之一。"},{"word":"fragile","phonetic":"/ˈfrædʒaɪl/","pos":"adj.","level":"六级","cn":"脆弱的","en":"easily broken or damaged","excerpt":"this really fragile ceasefire","example_cn":"这个非常脆弱的停火协议。"},{"word":"intercept","phonetic":"/ˌɪntəˈsept/","pos":"v.","level":"六级","cn":"拦截","en":"to stop, catch, or seize something in transit","excerpt":"Six Iranian attack drones have been shot down. That's according to U.S. Central Command.","example_cn":"六架伊朗攻击无人机被击落。据美国中央司令部称。"},{"word":"drone","phonetic":"/drəʊn/","pos":"n.","level":"六级","cn":"无人机","en":"an unmanned aircraft or ship guided by remote control or onboard computers","excerpt":"Six Iranian attack drones have been shot down.","example_cn":"六架伊朗攻击无人机被击落。"},{"word":"spokesperson","phonetic":"/ˈspəʊkspɜːrsn/","pos":"n.","level":"六级","cn":"发言人","en":"a person who speaks on behalf of a group or organization","excerpt":"the spokesperson for Iran's foreign ministry","example_cn":"伊朗外交部发言人。"},{"word":"negotiate","phonetic":"/nɪˈɡəʊʃieɪt/","pos":"v.","level":"考研","cn":"谈判","en":"to try to reach an agreement through discussion","excerpt":"the challenge they see with negotiating with the U.S.","example_cn":"他们认为与美国谈判面临的挑战。"},{"word":"contradictory","phonetic":"/ˌkɒntrəˈdɪktəri/","pos":"adj.","level":"六级","cn":"矛盾的","en":"mutually opposed or inconsistent","excerpt":"contradictory remarks by different officials","example_cn":"不同官员的矛盾言论。"},{"word":"cumbersome","phonetic":"/ˈkʌmbəsəm/","pos":"adj.","level":"六级","cn":"繁琐的","en":"slow or complicated and therefore inefficient","excerpt":"it makes the whole process very cumbersome","example_cn":"这使得整个过程非常繁琐。"},{"word":"viable","phonetic":"/ˈvaɪəbl/","pos":"adj.","level":"六级","cn":"可行的","en":"capable of working successfully; feasible","excerpt":"whether there is a viable diplomatic path forward","example_cn":"是否存在可行的外交前进道路。"},{"word":"violation","phonetic":"/ˌvaɪəˈleɪʃn/","pos":"n.","level":"六级","cn":"违反","en":"the action of breaking or failing to comply with a rule or formal agreement","excerpt":"a grave violation of the ceasefire","example_cn":"严重违反停火协议。"},{"word":"ballistic missile","phonetic":"/bəˈlɪstɪk ˈmɪsaɪl/","pos":"n.","level":"六级","cn":"弹道导弹","en":"a missile that follows a ballistic trajectory","excerpt":"seven ballistic missiles fired at Kuwait and Bahrain","example_cn":"向科威特和巴林发射了七枚弹道导弹。"},{"word":"assets","phonetic":"/ˈæsets/","pos":"n.","level":"考研","cn":"资产","en":"property owned by a person or company, regarded as having value","excerpt":"using Iranian assets to not only pay for the damage","example_cn":"利用伊朗资产不仅支付损失。"},{"word":"coordination","phonetic":"/kəʊˌɔːdɪˈneɪʃn/","pos":"n.","level":"六级","cn":"协调","en":"the organization of different elements to work together effectively","excerpt":"requires coordination with the Israeli military","example_cn":"需要与以色列军方协调。"},{"word":"projectile","phonetic":"/prəˈdʒektail/","pos":"n.","level":"六级","cn":"抛射物","en":"a missile, such as a bullet or shell, fired from a gun","excerpt":"launching two projectiles","example_cn":"发射了两枚抛射物。"},{"word":"ceasefire agreement","phonetic":"/ˈsiːsfaɪər əˈɡriːmənt/","pos":"n.","level":"六级","cn":"停火协议","en":"a formal agreement to stop fighting","excerpt":"any U.S.-Iran ceasefire agreement include Lebanon as well","example_cn":"任何美伊停火协议也应包括黎巴嫩。"}],"sentences":[{"en":"Police are on the hunt for at least two people who started shooting at each other at a festival.","cn":"警方正在搜捕至少两名在节日上互相开枪的人。","structure":"主句 + who引导的定语从句","analysis":"主句为Police are on the hunt for at least two people，定语从句who started shooting at each other at a festival修饰people。"},{"en":"Search and rescue volunteers have now found the body of an Auburn University student who was missing during a family vacation in Japan.","cn":"搜救志愿者现已找到一名在日本家庭度假期间失踪的奥本大学学生的尸体。","structure":"主句 + who引导的定语从句","analysis":"主句为Search and rescue volunteers have now found the body of an Auburn University student，定语从句who was missing during a family vacation in Japan修饰student。"},{"en":"The war that President Trump promised would only last four to six weeks has now reached 100 days and counting.","cn":"特朗普总统承诺只会持续四到六周的战争现已达到100天，而且还在继续。","structure":"主句 + that引导的定语从句","analysis":"主句为The war has now reached 100 days and counting，定语从句that President Trump promised would only last four to six weeks修饰war。"},{"en":"A top adviser to Iran's supreme leader tells CNN that the ball is in President Trump's court.","cn":"伊朗最高领袖的一名高级顾问告诉CNN，球在特朗普总统的场上（即轮到特朗普采取行动）。","structure":"主句 + that引导的宾语从句","analysis":"主句为A top adviser tells CNN，宾语从句that the ball is in President Trump's court。"},{"en":"If he wants to reach an agreement with Iran, this $24 billion is a test of trust that Iran wants to have with Trump.","cn":"如果他希望与伊朗达成协议，这240亿美元是伊朗希望与特朗普建立的信任考验。","structure":"If引导的条件状语从句 + 主句 + that引导的定语从句","analysis":"条件状语从句If he wants to reach an agreement with Iran，主句this $24 billion is a test of trust，定语从句that Iran wants to have with Trump修饰trust。"},{"en":"He went on to say that the Iranians are strong and proud, and while it may take time, ultimately, he believes that they will have no choice but to make a deal.","cn":"他接着说，伊朗人坚强而自豪，虽然可能需要时间，但最终他相信他们别无选择，只能达成协议。","structure":"主句 + that引导的宾语从句（含while引导的让步状语从句）","analysis":"主句He went on to say，宾语从句that the Iranians are strong and proud, and while it may take time, ultimately, he believes that they will have no choice but to make a deal，其中while it may take time为让步状语从句。"},{"en":"Pope Leo had a strong message during the mass which saying that whilst Spain has this extraordinary Catholic history, that history should not be seen as a sort of museum or something to be looked at with nostalgia, but actually faith must mean something to people in Spain today and into the future, particularly in trying to build a better world.","cn":"教皇利奥在弥撒中传达了一个强有力的信息，即尽管西班牙拥有非凡的天主教历史，但这段历史不应被视为博物馆或怀旧之物，而实际上信仰必须对当今和未来的西班牙人民有意义，特别是在努力建设更美好世界方面。","structure":"主句 + which引导的定语从句（含that引导的宾语从句）","analysis":"主句Pope Leo had a strong message，定语从句which saying that...修饰message，其中that引导宾语从句，宾语从句内含whilst引导的让步状语从句。"},{"en":"He's the first American Pope, but he is a fluent Spanish speaker who spent a number of years in Peru, and he's visited Spain many times.","cn":"他是第一位美国教皇，但能说流利的西班牙语，曾在秘鲁生活多年，并多次访问西班牙。","structure":"并列句 + who引导的定语从句","analysis":"两个并列句由but连接，第二个分句含who引导的定语从句修饰speaker。"},{"en":"With matches across the U.S., Canada and Mexico, host cities are working to handle large crowds and keep everyone safe.","cn":"随着比赛在美国、加拿大和墨西哥各地进行，主办城市正努力应对大量人群并确保每个人的安全。","structure":"With复合结构 + 主句","analysis":"With matches across the U.S., Canada and Mexico为伴随状语，主句为host cities are working to handle large crowds and keep everyone safe。"},{"en":"Some recent unprovoked attacks give people reason to worry.","cn":"最近一些无端的袭击让人们有理由担忧。","structure":"简单句","analysis":"主语Some recent unprovoked attacks，谓语give，间接宾语people，直接宾语reason to worry。"},{"en":"Police say the two shooters appeared to have been shooting at each other.","cn":"警方称，两名枪手似乎是在互相射击。","structure":"主语+谓语+宾语从句（主语+谓语+不定式完成式）","analysis":"'appeared to have been shooting' 是不定式完成进行式，表示动作在过去持续发生且可能仍在进行。"},{"en":"The shooting is one of at least 170 mass shootings across the U.S. this year alone, according to the Gun Violence Archive.","cn":"据枪支暴力档案，仅今年一年，这起枪击事件就是全美至少170起大规模枪击事件之一。","structure":"主语+系动词+表语（名词短语+介词短语+状语）","analysis":"'one of at least 170 mass shootings' 是表语，'across the U.S.' 和 'this year alone' 是地点和时间状语。"},{"en":"The main problem of negotiating with this administration is that you have to face so many changing positions, moving the goalposts, different statements, contradictory remarks by different officials.","cn":"与本届政府谈判的主要问题是，你必须面对如此多变化的立场、不断改变的目标、不同的声明以及不同官员的矛盾言论。","structure":"主语+系动词+表语从句（主语+谓语+宾语）","analysis":"'that' 引导表语从句，从句中 'have to face' 是谓语，后面跟多个并列宾语。"},{"en":"A source familiar with the thinking of U.S. Treasury Secretary Scott Bessent says he is considering, and the Treasury Department is considering using Iranian assets to not only pay for the damage of future Iranian attacks, but also considering the possibility of using them to pay for past damage from Iranian attacks.","cn":"一位熟悉美国财政部长斯科特·贝森特想法的人士表示，他正在考虑，财政部也在考虑利用伊朗资产不仅支付未来伊朗袭击造成的损失，还考虑用它们支付过去伊朗袭击造成的损失。","structure":"主语+定语+谓语+宾语从句（主语+谓语+宾语+不定式短语）","analysis":"'familiar with...' 是形容词短语作定语修饰 'source'；'says' 后接宾语从句，从句中 'is considering' 和 'is considering' 并列，'using...to not only...but also...' 是动名词短语作宾语。"},{"en":"The Israeli military acknowledged the strike and said it was moving suspiciously and operating in an area that had been under an evacuation warning.","cn":"以色列军方承认了这次袭击，并称该车辆当时在可疑地移动，并在一个已处于疏散警告的区域活动。","structure":"主语+谓语+宾语从句（主语+谓语+表语+定语从句）","analysis":"'said' 后接宾语从句，从句中 'it was moving...and operating...' 是并列谓语，'that had been under...' 是定语从句修饰 'area'。"},{"en":"Hezbollah, which rejected the latest U.S.-Israel ceasefire, has attacked northern Israel for the first time since that ceasefire went into effect, launching two projectiles, according to the Israeli military.","cn":"据以色列军方称，拒绝最新美以停火协议的真主党，自该停火协议生效以来首次袭击了以色列北部，发射了两枚抛射物。","structure":"主语+非限制性定语从句+谓语+宾语+状语+现在分词短语","analysis":"'which rejected...' 是非限制性定语从句修饰 'Hezbollah'；'launching two projectiles' 是现在分词短语作伴随状语。"},{"en":"After days of searching, the body of 20-year-old James Weston Higginbotham was found Saturday.","cn":"经过数日搜寻，20岁的詹姆斯·韦斯顿·希金博特姆的尸体于周六被发现。","structure":"状语+主语+谓语+状语","analysis":"'After days of searching' 是时间状语，'was found' 是被动语态谓语，'Saturday' 是时间状语。"},{"en":"He disappeared on May 29 after getting into an argument with his mom over the environmental impact of her use of AI.","cn":"他于5月29日失踪，此前他与母亲就她使用人工智能对环境的影响发生了争执。","structure":"主语+谓语+时间状语+时间状语从句（介词+动名词短语）","analysis":"'after getting into an argument...' 是介词短语作时间状语，'over...' 是介词短语修饰 'argument'。"},{"en":"The multi-day search involved more than 100 police officers, K-9 units, and helicopters.","cn":"为期多日的搜寻动用了100多名警察、警犬队和直升机。","structure":"主语+谓语+宾语（并列名词短语）","analysis":"'involved' 是谓语，后面跟三个并列宾语。"},{"en":"His family focused their search in a mountainous area because they said Weston loved nature and hiking and thought that's where he may have gone.","cn":"他的家人将搜索重点放在山区，因为他们说韦斯顿热爱自然和徒步旅行，并认为他可能去了那里。","structure":"主语+谓语+宾语+状语从句（主语+谓语+宾语从句+并列谓语+宾语从句）","analysis":"'because' 引导原因状语从句，从句中 'said' 后接宾语从句，'thought' 后接宾语从句。"},{"en":"A new federal rule sets stricter standards for who qualifies for an exemption from work requirements.","cn":"一项新的联邦规则为谁有资格获得工作要求豁免设定了更严格的标准。","structure":"主语+谓语+宾语+介词+宾语从句","analysis":"'for who qualifies...' 是介词短语，'who' 引导宾语从句作介词宾语。"},{"en":"Josh Pacheco says that they were covering a protest in Newark when vehicles drove out of a gated area.","cn":"乔什·帕切科说，他们当时正在纽瓦克报道一场抗议活动，突然有车辆驶出一个有门禁的区域。","structure":"主语+谓语+宾语从句（主语+谓语+宾语+时间状语从句）","analysis":"'that' 引导宾语从句，从句中 'were covering' 是过去进行时，'when' 引导时间状语从句表示突然发生。"},{"en":"The company that runs the site has not commented.","cn":"运营该地点的公司尚未发表评论。","structure":"主语+定语从句+谓语+状语","analysis":"'that runs the site' 是定语从句修饰 'company'，'has not commented' 是现在完成时谓语。"},{"en":"He also said that he told his campaign staff or members staff about these text messages early in his marriage.","cn":"他还说，他在婚姻早期就告诉了他的竞选工作人员或成员这些短信内容。","structure":"主语+谓语+宾语从句（主语+谓语+间接宾语+直接宾语+状语）","analysis":"'that' 引导宾语从句，从句中 'told' 接双宾语，'about these text messages' 是介词短语作直接宾语。"},{"en":"He doesn't believe that the attacks are going to work.","cn":"他不相信这些攻击会奏效。","structure":"主语+谓语+宾语从句（主语+谓语+不定式短语）","analysis":"'that' 引导宾语从句，从句中 'are going to work' 是将来时结构。"},{"en":"He thinks the movement, as he describes it, that he's building here is enough to just push past all of this.","cn":"他认为，正如他所描述的，他在这里建立的运动足以克服这一切。","structure":"主语+谓语+宾语从句（主语+插入语+定语从句+系动词+表语+不定式短语）","analysis":"'as he describes it' 是插入语，'that he's building here' 是定语从句修饰 'movement'，'is enough to push past' 是系表结构加不定式。"},{"en":"He also said that, you know, if he wouldn't do it anyway, he just feels like he's going to survive this.","cn":"他还说，你知道，即使他无论如何都不会这么做，他只是觉得自己会挺过去。","structure":"主语+谓语+宾语从句（插入语+条件状语从句+主句）","analysis":"'that' 引导宾语从句，从句中包含 'if' 引导的条件状语从句，主句是 'he just feels like...'。"},{"en":"The question of course, is whether or not, you know, Maine Independent voters, which, you know, occupy a big clock of the voting population here, whether it's persuasive to them.","cn":"当然，问题是，你知道，缅因州的独立选民——他们占据了这里选民的一大部分——是否会被说服。","structure":"主语+系动词+表语从句（插入语+主语+非限制性定语从句+谓语+表语）","analysis":"'whether or not' 引导表语从句，从句中 'which' 引导非限制性定语从句修饰 'voters'，'whether it's persuasive' 是表语从句。"},{"en":"He also said that, you know, if he wouldn't do it anyway, he just feels like he's going to survive this.","cn":"他还说，你知道，即使他无论如何都不会这么做，他只是觉得自己会挺过去。","structure":"主语+谓语+宾语从句（插入语+条件状语从句+主句）","analysis":"'that' 引导宾语从句，从句中包含 'if' 引导的条件状语从句，主句是 'he just feels like...'。"},{"en":"The question of course, is whether or not, you know, Maine Independent voters, which, you know, occupy a big clock of the voting population here, whether it's persuasive to them.","cn":"当然，问题是，你知道，缅因州的独立选民——他们占据了这里选民的一大部分——是否会被说服。","structure":"主语+系动词+表语从句（插入语+主语+非限制性定语从句+谓语+表语）","analysis":"'whether or not' 引导表语从句，从句中 'which' 引导非限制性定语从句修饰 'voters'，'whether it's persuasive' 是表语从句。"}],"topics":[{"title":"Ohio Festival Shooting","content":"2026年6月6日，俄亥俄州托莱多市一个节日活动附近发生枪击事件，至少12人受伤，其中两人伤势危急。警方称两名枪手互相射击，目前无人被捕。受害者年龄从14岁到61岁不等。这是美国今年至少第170起大规模枪击事件。","keywords":"mass shooting, Ohio, festival, suspects, victims"},{"title":"Missing American Student Found Dead in Japan","content":"奥本大学学生詹姆斯·韦斯顿·希金博瑟姆在京都与家人度假时失踪，搜救志愿者于6月6日发现其尸体。他与母亲因ChatGPT的环境影响发生争执后独自离开。死因仍在调查中。","keywords":"missing student, Japan, Kyoto, search and rescue, family"},{"title":"U.S.-Iran Conflict and Peace Talks","content":"美国与伊朗的冲突已持续100天，尽管有停火协议，但双方仍在交火。巴基斯坦内政部长抵达德黑兰进行新一轮和谈。伊朗要求美国解冻240亿美元资产作为信任测试。特朗普称战争将很快结束。","keywords":"Iran, U.S., ceasefire, peace talks, assets, Strait of Hormuz"},{"title":"Pope Leo's Visit to Spain","content":"教皇利奥（首位美国教皇）访问西班牙，在马德里主持弥撒，约120万人参加。他谴责两极分化，呼吁和平。访问期间还将与性虐待受害者会面，并前往巴塞罗那和加那利群岛关注移民问题。","keywords":"Pope Leo, Spain, Madrid, mass, polarization, migration"},{"title":"2026 FIFA World Cup Security","content":"2026年世界杯即将在美国、加拿大和墨西哥16个城市举行，预计吸引500万球迷。安全措施加强，近期美国多起无端袭击引发担忧，特别是亚特兰大MARTA系统发生致命刺伤事件。","keywords":"World Cup, security, host cities, fans, MARTA"},{"title":"美国大规模枪击事件","content":"美国频繁发生大规模枪击事件，引发对枪支管控的讨论。本文提到俄亥俄州托莱多市节日期间发生枪击，12人受伤，两名枪手在逃。","keywords":"mass shooting, gun violence, Toledo, Ohio, festival"},{"title":"美伊冲  myself in a real-life situation like that.\n\nCORNISH: A do-or-die struggle on a plane. How an MMA fighter saved the day.\n\nAnd then, of course, the New York Knicks look to pull off something we have not seen since Nixon was in office.\n\n(BEGIN VIDEO CLIP) UNIDENTIFIED MALE: Oh, what a sweet move.\n\nUNIDENTIFIED MALE: Jalen Brunson, the No. 1 player in the country. No. 1 player in the NBA. Knicks in four, baby. That's how I feel.\n\nREP. THOMAS MASSIE (R-KY): People are tired of this. They're tired of $5 a gallon gas and $6 a gallon diesel and fertilizer. We can't afford to. I think it sends a good message that the people's House, which represents the people, is tired of this war.\n\nCORNISH: All right. GOP defectors crossing party lines to limit President Trump's war powers. Will anything come of this in the long term?\n\nGood morning, everybody. I'm Audie Cornish. And here's where we start, because this is a rare Republican rebuke on the Hill. You've got four Republicans siding with Democrats on that resolution that directs Trump to remove U.S. armed forces from hostilities with Iran.\n\nBefore the vote, House Speaker Mike Johnson had this warning to members of his party looking to flip.\n\nREP. MIKE JOHNSON (R-KY): I think it is a -- a very dangerous prospect to take away from the administration and the commander in chief right now, the ability to negotiate. That's what this does. It -- it weakens us.\n\nCORNISH: But for the Republicans who ended up voting yes, they say several factors weighed into their decision.\n\nREP. BRIAN FITZPATRICK (R-pa): We have to follow the law. There's a law on the books. The War Powers Act of '73 says 48-hour notification and 60-day concurrence of Congress. We're past the 60 days. So, you have two choices. You either follow the law or you change the law.\n\nBARRETT: People are frustrated, certainly, but that's not the only consideration in this.\n\nI fill up my gas tank, too. I have four kids.\n\nI share the -- the interest in making sure that Iran does not develop a nuclear weapon. But we have to do this in a way that is done through the use of force authorization that Congress has the exclusive authority over. Congress alone declares war.\n\n(END VIDEO CLIP) CORNISH: Joining me now in the group chat, Eleanor Mueller, White House economics reporter from seminar -- from \"Semafor\"; of former Trump White House communications director Mike Dubke; and Meghan Hays, former Biden White House director of message planning.\n\nOK, so when it comes to a story like this, it's not the usual suspects, your Thomas Massie of Kentucky, that we are looking at. It's the other folks. Brian Fitzpatrick, Pennsylvania; Tom Barrett, Michigan; Warren Davidson, Ohio. All pretty important states, in general, in elections.\n\nCan you talk about what's going on, why these particular people might be the ones to make this shift?\n\nELEANOR MUELLER, WHITE HOUSE ECONOMICS REPORTER, \"SEMAFOR\": I think it tells us a lot about how much pressure these Republican congressmen are under to show voters that they're doing something on affordability. You know --\n\nCORNISH: We should be clear, they were just at home.\n\nCORNISH: So, they were just there last week.\n\nMUELLER: They were just hearing from constituents.\n\nFitzpatrick has been someone that leaders have had their eye on for a long time as somebody who might vote against this war. And I would argue that him and Barrett, specifically, right, are under a ton of pressure to, again, show their districts that they are doing something to bring energy costs down.\n\nAnd so, in addition to these concerns over constitutionality that I think Davidson and Massie share, Barrett and Fitzpatrick are really feeling the heat. And this vote was a sign of that.\n\nCORNISH: So, then you've got this \"New York Times\" reporting that even if oil prices peak soon, the global economy is going to slow down. Meaning the damage has been done.\n\nAnd Secretary Bessent was on the Hill yesterday, and he, of course, was asked about the economy for the same reasons that this war vote saw the erosion of some support, because people are worried. And here is what Bessent had to say on the Hill.\n\nSEN. TINA SMITH (D-MN): Could you just explain to me and to farmers in Minnesota how those increased prices, driven by the war and Iran, are worth the pain that they are feeling right now?\n\nBESSENT: Senator, do you believe that Iran can have a nuclear weapon? As a former farmer, I will tell you that -- and maybe you know that 75 percent of the fertilizer had already been purchased this year. There --\n\nSMITH: That is not -- not what my farmers in Minnesota are telling me, sir.\n\nBESSENT: They're -- they're --\n\nSMITH: They are telling me that they cannot afford their fertilizer, and they know the reason why. They know the reason.\n\nBESSENT: There is -- there is no doubt --\n\nBESSENT: -- that -- that farmers have been struggling. But much of that, that there was a record crop last year, Senator. And what do record crops lead to?\n\nSMITH: What my farmers are telling me --\n\nBESSENT: Lower prices.\n\nCORNISH: OK. So, our messaging folks, what do you think of that back and forth, both sides of it, frankly?\n\nMEGHAN HAYS, FORMER BIDEN WHITE HOUSE DIRECTOR OF MESSAGE PLANNING: I mean, I think that there's a complete disconnect from how people are feeling. And I think if you're not going to show empathy from people, that's really what gets you here.\n\nIt's not necessarily the policy. It's when people don't understand -- don't say to you, I understand where you're coming from. We are doing this for this reason.\n\nCORNISH: But his reply was pretty straightforward.\n\nHAYS: But I -- but I just don't think farmers have already bought fertilizer. They have no -- there's no empathy or humanity for people who are actually suffering, who are actually paying the bills.\n\nThese people are multibillionaires. They are taking people for a ride. They are getting money from taxpayers. And that's all the American people see.\n\nWe can't afford our gas. We can't afford electricity. We can't afford groceries. But you're down here building a ballroom and having a UFC fight. That is it.\n\nAnd so, when you sit up there in front of Congress and have no empathy for people, that is what they see. And that's the problem here.\n\nWhen Trump went to this war, he never went to the American people and said, this is why I'm going, and this is what I'm doing. So, this is what we're left with.\n\nCORNISH: Any lessons learned from the Biden era folks about empathy and the economy?\n\nMIKE DUBKE, FORMER TRUMP WHITE HOUSE COMMUNICATIONS DIRECTOR: Really? Yes. Of course. Don't do what Biden did.\n\nDUBKE: And that's exactly where we are.\n\nCORNISH: Oh, no, no. I'm being serious. So, when --\n\nDUBKE: I'm being serious, too.\n\nCORNISH: -- you look at his answer, you see it as in the same way?\n\nDUBKE: I see it in the same way.\n\nLook, when I -- when I do, you know, media training or anything on a professional level in communications, one of the things that you need to talk about, especially with public officials, is to show some empathy. And I totally agree with Meghan on that.\n\nNow, I will take -- I will say that these four defectors, defectors on the House side, you know, there are other reasons that are going into it, I think --\n\nDUBKE: -- besides affordability. And we can get into that if you want to.\n\nBut yes, from -- from the message perspective, this administration does need to understand that there is pain being felt right now.\n\nCORNISH: And I understand what you're saying about someone like Thomas Massie, who's a perennial thorn in the side of the administration.\n\nI want to put up some information about Representative Tom Barrett, who is a first-term Republican. OK? So, you've got a newbie.\n\nBut he also is a former Army helicopter pilot. I'm really paying attention to how veterans are behaving politically right now across the political spectrum. And he's facing reelection.\n\nAnd one other person I want to show you, Representative Brian Fitzpatrick of Pennsylvania, represents the Philadelphia suburbs, which I'm sure we'll hear about ad nauseam come election time.\n\nBut more importantly, former FBI agent; has broken away from the administration before.\n\nThere is a world of veteran law enforcement -- like, people who kind of speak the lingo and understand the conversation around conflict. And they are not afraid to have a different point of view.\n\nMUELLER: One hundred percent. I mean, they are bringing a perspective to this that not everyone on the Hill is. I think, you know, Republicans, congressional Republicans are\n\nconstantly talking to constituents who are veterans. But it's one thing to be having those conversations and another thing to be coming at it, having done this work yourself.\n\nCORNISH: OK, you guys, we're going to talk more about this and some other topics later.\n\nLater on CNN, though, I want to get to this, because it doesn't sound like the president is actually letting go of his plans for some sort of anti-weaponization payout fund. And what could, basically, that mean going forward?\n\nAnd then there's actually pandemonium on the streets of New York. The Knicks give fans a reason to be rowdy.\n\nAnd a plane passenger tries to open an exit door mid-flight. Luckily, there was a trained black belt on board.\n\nLONGOOD: The guy tried to, like, attack him and choked him, and I was already ready for something to happen.\n\nCORNISH: It is 13 minutes past the hour. Here is your morning roundup.\n\nNow, you're looking at the moment an unruly passenger is subdued on a Frontier flight. So, the man allegedly tried to open an exit door, then breached the cockpit, and choked an off-duty flight attendant.\n\nPassengers quickly helped take him down. And it just so happens one of those good Samaritans is a trained fighter.\n\nLONGOOD: You can't control what people are going to do and \n\nBut you can't tell the people here who have been chanting \"Knicks in four\" for hours. I was talking to them beforehand. They were saying \"Knicks in four\" beforehand, too.\n\nSo, this is just the beginning. They got a game one. It came down to a back-and-forth game throughout all of it.\n\nBut the excitement in New York City is the chance to do something they have not done in over five decades. Now that they are back in a place they have not been in more than two decades.\n\nSo, moving forward, like we said, is a long series, but the enthusiasm here --\n\nUNIDENTIFIED MALE: Yes!!!\n\nJIMENEZ: -- it is not going anywhere. It's not going anywhere. See, you can't go far. This is New York.\n\nCORNISH: And Omar was never seen again. Omar is fine. He's going to be following game two. Tips off tomorrow night in San Antonio.\n\nI love a happy fandom.\n\nDUBKE: I'm glad you've heard from him, though.\n\nCORNISH: Yes. He's good. He's good.\n\nCORNISH: He's also tall. You know, he's very, very lucky.\n\nOK, you guys, after the break on CNN THIS MORNING, the White House Correspondents' Dinner is getting a second act.\n\nPlus, the anti-weaponization fund may be dead, but the president isn't done talking about it.\n\nIn the meantime, good morning to our viewers in New York, just waking up or still awake after a Knicks win.\n\nTODD BLANCHE, U.S. ACTING ATTORNEY GENERAL: Look, we're not moving forward with the fund. We are not moving forward with the fund, period.\n\nWe are not moving forward with the fund.\n\nREP. GRACE MENG (D-NY): Not moving forward ever?\n\nBLANCHE: Correct. We're not moving forward with the fund.\n\nWe're not moving forward with the fund.\n\nWe're not moving forward with the fund.\n\nWe're not moving forward with the fund.\n\nCORNISH: Here's the thing. Somehow, people are still asking, are they moving forward with the fund?\n\nThat $1.776 billion so-called anti-weaponization fund. That was quickly condemned in a bipartisan way when it was rolled out a f ed as one of the president's personal defense attorneys. He's been currently serving as acting AG since the firing of Pam Bondi back in April.\n\nThe White House Correspondents Dinner rescheduled. The event back in April was disrupted by a gunman. President Trump said he wanted it back on. The new dinner will take place July 24th. In a \"Truth Social\" post, the president says he'll be there.\n\nAnd then, a stunning rebuke of Trump. The House approving a War Powers resolution on Wednesday that would halt the US military action against Iran. A handful of Republicans actually joined with Democrats this time, and the resolution is supposed to limit the president's ability to initiate or escalate military hostilities without congressional approval.\n\nSo the question is, are we at the end or are as some lawmakers are worried about? Are we at the start of something that will be long and protracted with Iran?\n\nOn Wednesday, Secretary of State Marco Rubio told lawmakers that the war is over.\n\nREP. SARA JACOBS (D-CA): We're taking you at your word. The war is over. Who won?\n\nMARCO RUBIO, SECRETARY OF STATE: But first of all, you're not taking me at my word. It's a fact. We're no longer conducting sustained strikes inside of Iran to degrade their military because Epic Fury is over.\n\nCORNISH: Here's how the president described it.\n\nTRUMP: We hit them pretty hard the night before and actually last night.\n\nCORNISH: So there are fresh hostilities between the U.S. and Iran overnight spilling into neighboring Gulf countries. One person was killed, more than 60 injured, in an Iranian drone strike on Kuwait's airport.\n\nSo we're bringing in Harrison Mann to the Group Chat. He's a former U.S. Army major and former executive officer of the Defense Intelligence Agency.\n\nThank you so much for being here. So as we talk, we talked about the potential, the hostilities here. I want to talk about the possibility for the deal. Iran over and over keeps bringing up restitution. It wants to be basically its assets unfrozen.\n\nCan you talk about what they're looking for and how much of a sticking point this is for the U.S.?\n\nHARRISON MANN, FORMER EXECUTIVE OFFICER, DEFENSE INTELLIGENCE AGENCY: First, I want to point out that, you know, this so-called sticking point was that was a demand from before the war, right? When Trump did the surprise attack with Israel in February, what the US and Iran were discussing was some kind of sanctions relief, which would be a de facto release of funds in exchange for freeze on Iran's nuclear enrichment.\n\nAnd so I think it's, in my mind, a little misleading to say this thing that we've known is always going to be in Iranian demand is a sticking point. I think really the principal sticking point remains Trump's lack of interest in actually pushing for a deal.\n\nCORNISH: Okay, let me just play a little of it first --\n\nCORNISH: -- so people have some context for what you're talking about.\n\nHere's what he said about whether or not a deal could be reached in the coming days.\n\nTRUMP: The negotiation itself has gone very well, actually, very well.\n\nREPORTER: Mr. President --\n\nTRUMP: It could have -- even if it happens, and it might not happen, who knows? But if it happens, it could happen like over the weekend.\n\nThe blockade is the most powerful thing. I think the blockade maybe has more impact than the bombing has, but the blockade that we have the naval blockade is incredible. Not one ship has gotten through unless we wanted it to. And people respect it a lot.\n\nMANN: Yeah, so I think -- you know, Trump may actually believe that the blockade is working and he might believe that it's sustainable. The Iranians don't believe either. I think they're pretty confident their ability to withstand some loss of oil sales.\n\nAnd they really don't like the status quo. It seems like Trump kind of thinks he basically ended the war, and occasional tit-for-tat strikes can go on really forever.\n\nThe Iranians ar on terror in some capacity, contrasted maybe with Lindsey Graham, who's also a veteran.\n\nCORNISH: Well, Pete Hegseth.\n\nMANN: Or Pete Hegseth.\n\nCORNISH: I mean, remember, there are people in power here who have that same experience. That's why I'm wondering about the divide.\n\nMANN: Yeah, I do. You know, as a veteran, I don't want to say that putting a veteran in a leadership position automatically means they're going to make a good decision, right? You got Pete Hegseth. You got J.D. Vance. You had Tulsi Gabbard, you know, for her short-lived DNI career.\n\nBut some of them clearly took the correct lesson away from the war on terror, which was we shouldn't be doing these stupid, destructive wars for no reason. And it's really clear, it's been clear from the start, that's what this is going to be. I think tons of Republicans, both veterans and not, have understood this, were biting their tongue basically to see if Trump could resolve this quickly and they could avoid having to take a stand.\n\nSo yeah, I think these four are probably just the tip of the iceberg. You know, we've seen some Republican senators also threaten in the past to support War Powers resolutions. And I think we're only going to see more of this --\n\nMANN: -- especially as, you know folks understand that their lives are getting qualitatively worse and more expensive because of the war.\n\nCORNISH: Well, right now, it's still just a trickle politically. I'll let you know and bring you back when it becomes a wave, all right, if we see more people jump on.\n\nThank you so much for being here. We just mentioned national intelligence and the president's choice to\n\nbecome acting director of national intelligence is actually getting a lot of blowback on Capitol Hill. The person he's chosen is named Bill Pulte to oversee the nation's intelligence agencies. He does not have a background in intelligence. His current job is at the administration's Federal Housing Finance Agency and Fannie Mae and
