<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CNN 英语精读</title>
<style>
:root{
  --bg:#f8f9fc;
  --bg2:#ffffff;
  --bg3:#f1f3f7;
  --bg4:#e9ecef;
  --border:#dee2e6;
  --border2:#ced4da;
  --text:#1e2a3e;
  --text2:#4a5b6e;
  --text3:#6c7a8e;
  --blue:#2c7da0;
  --blue-dim:#e2f0f5;
  --blue2:#1f5e7a;
  --red:#c93a3a;
  --green:#2e7d64;
  --amber:#d97706;
  --coral:#d95b3a;
  --teal:#0f8b8b;
  --purple:#7c5cbf;
  --hl-yellow:rgba(255,235,160,0.6);
  --hl-yellow-border:rgba(240,180,40,0.8);
  --hl-active:rgba(255,220,100,0.8);
  --r:10px;
  --font:'Segoe UI',system-ui,-apple-system,sans-serif;
  --mono:'Consolas',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}

.layout{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
@media(max-width:800px){.layout{grid-template-columns:1fr}.sidebar{display:none}}

.sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:1.25rem 0;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;gap:0}
.sidebar-logo{padding:.75rem 1.25rem 1rem;font-size:17px;font-weight:700;letter-spacing:-.5px;border-bottom:1px solid var(--border);margin-bottom:.5rem}
.sidebar-logo span{color:var(--red)}
.sidebar-section{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding:.75rem 1.25rem .25rem}
.hist-item{display:flex;align-items:center;padding:.55rem 1.25rem;cursor:pointer;font-size:13px;color:var(--text2);gap:8px;transition:all .15s;border-left:2px solid transparent}
.hist-item:hover{background:var(--bg3);color:var(--text)}
.hist-item.active{background:var(--bg3);color:var(--blue);border-left-color:var(--blue)}
.hist-item .date{font-family:var(--mono);font-size:12px}
.hist-item .dot{width:6px;height:6px;border-radius:50%;background:var(--border2);flex-shrink:0}
.hist-item.active .dot{background:var(--blue)}
.sidebar-nav{margin-top:auto;border-top:1px solid var(--border);padding-top:.5rem}
.nav-item{display:flex;align-items:center;gap:8px;padding:.55rem 1.25rem;cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s}
.nav-item:hover{color:var(--text)}
.nav-item.active{color:var(--blue)}

.main{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.topbar-title{font-size:15px;font-weight:500;flex:1}
.topbar-date{font-size:12px;color:var(--text2);font-family:var(--mono)}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.badge-auto{background:#e9f5ef;color:var(--green);border:1px solid #cce8dc}
.btn{padding:6px 14px;border:none;border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
.btn-src{background:var(--bg3);color:var(--text2);font-size:12px}
.btn-src:hover{color:var(--blue)}

.content{flex:1;padding:1rem 1.2rem}
@media(max-width:600px){.content{padding:0.8rem}}

.tabs{display:flex;gap:4px;margin-bottom:1.5rem;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:4px}
.tab{flex:1;padding:7px 0;font-size:13px;text-align:center;border-radius:7px;cursor:pointer;color:var(--text2);transition:all .15s}
.tab.active{background:var(--blue);color:#fff}
.section{display:none}.section.active{display:block}

.transcript-wrap{display:grid;grid-template-columns:1fr 320px;gap:1.25rem;align-items:start}
@media(max-width:900px){.transcript-wrap{grid-template-columns:1fr}}
.transcript-body{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;font-size:14.5px;line-height:2;position:relative}
.transcript-hint{font-size:12px;color:var(--text2);margin-bottom:1rem;padding:.5rem .75rem;background:var(--bg3);border-radius:6px;border-left:2px solid var(--blue)}

.translation-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem}
.translation-box .card-label{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
#fullTranslation{white-space:pre-wrap;line-height:1.8;font-size:14px}

.hl{background:var(--hl-yellow);border-bottom:2px solid var(--hl-yellow-border);border-radius:2px;cursor:pointer;transition:background .15s;padding:0 1px}
.hl:hover,.hl.active{background:var(--hl-active)}
.hl.level-考研{border-bottom-color:#f0a500}
.hl.level-六级{border-bottom-color:#4a9eff}

.vocab-popup{position:fixed;z-index:200;max-width:300px;background:var(--bg4);border:1px solid var(--border2);border-radius:var(--r);padding:1rem 1.1rem;box-shadow:0 8px 32px rgba(0,0,0,0.15);display:none;pointer-events:none}
.vocab-popup.show{display:block}
.vp-word{font-size:17px;font-weight:700;color:var(--text)}
.vp-ph{font-size:12px;color:var(--text2);font-family:var(--mono);margin-left:6px}
.vp-badges{display:flex;gap:5px;margin:5px 0}
.vp-pos{font-size:11px;padding:1px 7px;border-radius:20px;background:#e2f0f5;color:#1f5e7a;font-weight:500}
.vp-lv{font-size:11px;padding:1px 7px;border-radius:20px;background:#fef2e0;color:#b45b0a;font-weight:500}
.vp-cn{font-size:14px;color:var(--blue);font-weight:500;margin-bottom:3px}
.vp-en{font-size:12px;color:var(--text2);line-height:1.6}

.word-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1rem;position:sticky;top:80px}
.word-panel-title{font-size:12px;font-weight:600;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.word-list{display:flex;flex-direction:column;gap:4px;max-height:calc(100vh - 200px);overflow-y:auto}
.word-chip{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:7px;cursor:pointer;transition:all .15s;border:1px solid transparent}
.word-chip:hover{background:var(--bg3);border-color:var(--border)}
.word-chip.active{background:var(--blue-dim);border-color:var(--blue)}
.wc-word{font-size:14px;font-weight:500;color:var(--text)}
.wc-cn{font-size:12px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wc-lv{width:6px;height:6px;border-radius:50%;flex-shrink:0}

.vocab-grid{display:flex;flex-direction:column;gap:10px}
.vcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem;transition:border .15s}
.vcard:hover{border-color:var(--border2)}
.vhead{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.vword{font-size:18px;font-weight:700;color:var(--text)}
.vph{font-size:13px;color:var(--text2);font-family:var(--mono)}
.bpos{font-size:11px;padding:2px 8px;border-radius:20px;background:#e2f0f5;color:#1f5e7a;font-weight:500}
.blv{font-size:11px;padding:2px 8px;border-radius:20px;background:#fef2e0;color:#b45b0a;font-weight:500}
.vcn{font-size:14px;color:var(--blue);font-weight:500;margin-bottom:4px}
.ven{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:8px}
.veg{padding:8px 12px;background:var(--bg3);border-left:2px solid var(--blue);border-radius:0 6px 6px 0;font-size:13px;line-height:1.75}
.veg em{color:var(--blue);font-style:normal;font-weight:600}
.vegcn{font-size:12px;color:var(--text2);margin-top:4px}

.scard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:12px}
.snum{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--blue);color:#fff;font-size:12px;font-weight:700;margin-bottom:10px}
.sen-en{font-size:15px;line-height:1.9;margin-bottom:10px}
.sen-cn{font-size:14px;color:#1f5e7a;line-height:1.75;padding:8px 12px;background:var(--bg3);border-radius:6px;margin-bottom:10px}
.alabel{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
.abody{font-size:13px;line-height:1.75;margin-bottom:8px}
.divider{height:1px;background:var(--border);margin:10px 0}

.tcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:12px}
.ttitle{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:600;margin-bottom:10px}
.tdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tcontent{font-size:13px;color:var(--text2);line-height:1.85;margin-bottom:8px}
.tkw{font-size:12px;color:var(--blue)}

.empty{text-align:center;padding:5rem 1rem;color:var(--text2)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>
<div class="layout">

<aside class="sidebar">
  <div class="sidebar-logo"><span>CNN</span> 英语精读</div>
  <div class="sidebar-section">历史记录</div>
  <div id="histList"><div class="hist-item active" data-date="2026-06-08" onclick="loadDate('2026-06-08')"><span class="dot"></span><span class="date">2026-06-08</span></div></div>
  <div class="sidebar-nav">
    <div class="nav-item" onclick="window.open('https://transcripts.cnn.com','_blank')">🔗 CNN Transcripts</div>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="topbarTitle">CNN This Morning</div>
    <span class="topbar-date" id="topbarDate"></span>
    <span class="badge badge-auto">⚡ 每日自动更新</span>
    <button class="btn btn-src" id="srcBtn" onclick="openSource()">查看原文 →</button>
  </div>

  <div class="content">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('transcript')">📝 全文稿</div>
      <div class="tab" onclick="switchTab('translation')">🌐 全文翻译</div>
      <div class="tab" onclick="switchTab('vocab')">📚 词汇</div>
      <div class="tab" onclick="switchTab('sentences')">🔍 难句</div>
      <div class="tab" onclick="switchTab('topics')">🌍 背景</div>
    </div>

    <div id="transcript" class="section active">
      <div class="transcript-wrap">
        <div>
          <div class="transcript-hint">💡 点击 <span style="background:var(--hl-yellow);padding:0 4px;border-radius:2px;border-bottom:2px solid var(--hl-yellow-border)">高亮词汇</span> 查看注释 · 颜色：<span style="color:#f0a500">■</span>考研 <span style="color:#4a9eff">■</span>六级</div>
          <div class="transcript-body" id="transcriptBody"></div>
        </div>
        <div>
          <div class="word-panel">
            <div class="word-panel-title">词汇索引</div>
            <div class="word-list" id="wordList"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="translation" class="section">
      <div class="translation-box">
        <div class="card-label">📖 完整中文翻译</div>
        <div id="fullTranslation">加载中...</div>
      </div>
    </div>

    <div id="vocab" class="section">
      <div class="vocab-grid" id="vocabGrid"></div>
    </div>

    <div id="sentences" class="section">
      <div id="sentenceList"></div>
    </div>

    <div id="topics" class="section">
      <div id="topicList"></div>
    </div>
  </div>
</div>
</div>

<div class="vocab-popup" id="vocabPopup">
  <div><span class="vp-word" id="vpWord"></span><span class="vp-ph" id="vpPh"></span></div>
  <div class="vp-badges"><span class="vp-pos" id="vpPos"></span><span class="vp-lv" id="vpLv"></span></div>
  <div class="vp-cn" id="vpCn"></div>
  <div class="vp-en" id="vpEn"></div>
</div>

<script>
const ALL_DATA = {"2026-06-08":{"date":"2026-06-08","source_url":"https://transcripts.cnn.com/show/ctmo/date/2026-06-08/segment/01","full_translation":"ANNOUNCER: 这里是CNN突发新闻！\nAUDIE CORNISH, CNN THIS MORNING主播: 我们正在关注中东的突发新闻。以色列和伊朗互相发射导弹，脆弱的停火能否经受住这次考验？大家早上好，我是Audie Cornish。我们将从过去几小时发生的袭击开始。以色列称已识别出从伊朗发射的一波导弹。CNN连夜收到的新视频显示约旦河西岸一处房屋内部受损。此前，以色列袭击了伊朗一家石化厂。以色列国防军称击中了该综合体的多个目标。这些报复性袭击似乎是在违抗特朗普总统的命令，他曾致电以色列总理本雅明·内塔尼亚胡，要求他暂缓报复。随着中东紧张局势升级，油价也在上涨。布伦特原油和WTI原油今早均上涨。我们在该地区有现场团队报道。我们将从耶路撒冷开始，连线CNN的Oren Liebermann。Oren，首先，你能告诉我们关于袭击的最新情况吗？你今天目睹了什么？\nOREN LIEBERMANN, CNN耶路撒冷分社社长: 自当地时间晚上10点或11点左右以来，我们已看到并听到几波来袭的伊朗弹道导弹。这已经持续了几个小时。第一波大约有三轮齐射。随后我们又看到几波后续的伊朗弹道导弹来袭。据以色列军方称，其中大部分已被拦截。起初，他们说所有导弹都被拦截——但当我们跟进似乎显示导弹突破的伊朗视频后，他们表示这仅适用于较早的一波。因此，我们正在等待是否有更新。与此同时，伊朗军方称他们瞄准了以色列北部的拉马特大卫空军基地。以色列已用自己的袭击作出回应，我们看到这些袭击从以色列驻美大使所描述的对地对地导弹和非能源基础设施的袭击，逐步升级到你提到的对伊朗西部石化设施的打击。大约一个半小时前，以色列军方称他们对所谓的战略防御系统进行了打击，这些系统将为以色列空军打开天空，如果它朝那个方向行动的话。几个月前这场战争开始时，我们看到首批目标之一是伊朗的地对空导弹，其想法是，如果摧毁这些导弹，以色列空军在很大程度上将拥有伊朗上空的自由。如果这变成联合行动，这也将包括美国空军。显然，这是我们密切关注的事情。关键是，这看起来正在升温，在升级阶梯上，值得注意的是，Audie，也门的胡塞武装——伊朗的代理人——几小时前向以色列发射了至少一枚导弹，已被拦截。我们在耶路撒冷身后听到了拦截声。我们在全国其他几个地区也看到了来袭导弹的警告。在这里，以色列和伊朗都已表示并公开声明，他们准备至少持续数天的这种状态。\nCORNISH: 你谈到了升级阶梯，几周来我们一直听到以色列进入黎巴嫩南部追击真主党的行动。这里有黎巴嫩总统——我想播放一段视频，这样你可以帮助我们理解这些事件如何交织。这是他说的。\n（视频片段开始）\nJOSEPH AOUN, 黎巴嫩总统: 我们的人民被杀害，我们的房屋被摧毁。他们正在把黎巴嫩当作与美国谈判的筹码。这是不可接受的。\n（视频片段结束）\nCORNISH: 他当时在谈论德黑兰。你能谈谈他们最近对黎巴嫩南部的袭击吗？为什么这引发了升级？\nLIEBERMANN: 伊朗上周表示，如果以色列袭击贝鲁特首都，伊朗将直接攻击以色列。这就是我们在以色列和真主党之间一个非常动荡的周末所看到的情况。我们看到——我们看到，根据黎巴嫩公共卫生部的数据，自大约三个月前这场战争开始以来，以色列在黎巴嫩的袭击造成的死亡人数已超过3600人。然后，即使在几天前美国斡旋的最新停火之后，我们看到真主党对以色列北部发动了袭击。这越过了以色列的红线，以色列随后对贝鲁特的达希耶社区进行了打击，该社区被认为是真主党的据点。伊朗随后兑现了其威胁，于周日晚上直接向以色列发射了那些弹道导弹。这导致了我们现在的情况。约瑟夫·奥恩总统接受了我们的Christiane Amanpour的采访，他明确表示他正在努力行使黎巴嫩主权，包括对伊朗代理人真主党进行某种控制，并试图找到某种协议，导致以色列军队从黎巴嫩南部撤出，使黎巴嫩更加完整。问题是，以色列政府目前既没有立场也不愿意从黎巴嫩南部撤军。伊朗政府将真主党视为其在黎巴嫩的立足点，真主党拒绝了最新的停火方案。这使约瑟夫·奥恩总统处于非常困难的境地。他的黎巴嫩武装部队没有力量，也许也没有意愿对真主党采取任何严肃行动，尽管他试图取缔和禁止真主党的军事活动。关键的是，Audie，黎巴嫩发生的事情会影响美伊停火。伊朗知道这一点。他们知道唐纳德·特朗普总统想要达成协议，他们能够试图利用真主党，并在某种程度上利用黎巴嫩作为筹码，向特朗普施压，以在黎巴嫩问题上约束本雅明·内塔尼亚胡总理。\nCORNISH: 有没有可能做到这一点？我想很多人都在看这些行动，并思考总统是如何与内塔尼亚胡交谈的，谈到降低温度。在以色列，人们如何看待特朗普的言论？\nLIEBERMANN: 特朗普发表了一些公开声明，或者更确切地说，接受了一些记者采访，他说是特朗普说了算，而不是内塔尼亚胡，说他将敦促以色列不要报复或推迟以色列的报复。这至少是公开信息的一部分。我们真正不知道的是，这也是我们更好地了解这里情况的关键问题，特朗普和内塔尼亚胡之间的电话是什么样的？有可能特朗普基本上开了绿灯，说以色列必须以某种方式回应，但将回应限制在一定范围内。也有可能特朗普告诉以色列不要回应，而内塔尼亚胡自行其是，尽管我认为这不太可能，因为内塔尼亚胡非常需要特朗普站在他一边，而且从未公开批评过他。因此，特朗普允许内塔尼亚胡做什么有一个范围。值得记住的是，特朗普曾迫使内塔尼亚胡结束了加沙、黎巴嫩以及之前的伊朗战争。我认为现在，人们仍然期望特朗普会再次这样做。问题是什么时候以及如何做。为此，特朗普需要基本上在华盛顿开始新的一天，这样我们才能了解更多幕后发生的事情。Audie。\nCORNISH: 没错，我们在华盛顿醒来，Oren Liebermann从耶路撒冷与我们连线。我们的突发新闻报道在CNN THIS MORNING广告后继续。我们将讨论在什么情况下特朗普会考虑让美军回家？他的回答接下来。此外，菲律宾发生致命地震。紧急搜寻幸存者。\n（商业广告）\n[05:10:00]\nCORNISH: 今早突发新闻。以色列和伊朗互相袭击，这是自4月停火协议以来最严重的升级。我们刚刚听到CNN的Oren Liebermann从耶路撒冷发回的报道，那里有警报声和导弹拦截后的爆炸声。一位美国官员告诉CNN，特朗普总统敦促以色列总理本雅明·内塔尼亚胡暂缓对伊朗的报复。现在加入我们讨论军事战略的是退役空军上校、CNN军事分析师Cedric Leighton。早上好。首先，我想谈谈这次升级，因为人们可能几周来一直听到以色列和真主党之间的来回交锋。为什么这一轮袭击会爆发？\nCEDRIC LEIGHTON, CNN军事分析师: 是的，早上好，Audie。这一轮袭击爆发的原因是以色列袭击了贝鲁特郊区达希耶。那里是真主党的主要总部。达希耶社区有很多真主党人员，恕我直言。伊朗基本上为那里的真主党实体辩护的原因是，真主党基本上是伊朗在该地区的主要代理人，他们需要真主党不仅监视以色列，而且可能发动对以色列的袭击。因此，每当真主党遭到破坏时，伊朗都认为这不仅是对真主党的破坏，也是对他们自己力量的破坏，尽管他们完全是分开的。所以，这基本上就是正在发生的事情。伊朗人决定是时候回应以色列的袭击了，尤其是像对达希耶那样明目张胆的袭击，在他们看来。他们这样做的原因是，他们希望停火不仅覆盖伊朗，也覆盖黎巴嫩领土，以色列在那里对真主党进行了多次行动。\n[05:15:00]\nCORNISH: 你谈到了代理人，这也让我想到也门的胡塞武装，因为有报道称他们想阻止船只通过红海，这对我们这些一直听说伊朗阻止船只通过霍尔木兹海峡的人来说听起来很熟悉。这是否威胁到更广泛的冲突？我们是否看到了迹象？\nLEIGHTON: 是的，这有可能至少扩大为更大的地区冲突。在阿拉伯半岛的东侧，有霍尔木兹海峡，这是我们谈论了相当长时间的地区。在西侧，有所谓的曼德海峡，那是红海流入印度洋的非常狭窄的点。因此，这些地区是所谓的咽喉要道。每当这些被切断，就会影响全球航运、全球贸易。这意味着价格上涨，石油变得更加稀缺。这造成了我们在世界许多地方看到的经济问题。\nCORNISH: 我们听到特朗普总统将美国的参与描述为预防而非升级。我想播放一段他在NBC的《与媒体见面》节目中的发言。这是在所有这些新闻之前发生的。\n（视频片段开始）\nDONALD TRUMP, 美国总统: 我们正在做的是预防性的。我们不想看到第三次世界大战。我们不想看到中东发生大规模冲突。所以，我们正在做的是确保以色列拥有自卫所需的一切，但我们也试图降低温度。\n（视频片段结束）\nCORNISH: 所以，这是特朗普总统在所有这些升级之前所说的。Cedric，你认为美国在多大程度上能够控制局势？\nLEIGHTON: 嗯，我认为美国有很大的影响力，但最终，以色列和伊朗都有自己的议程。特朗普总统试图做的是在支持以色列和防止更广泛战争之间走钢丝。但正如我们所见，以色列有自己的安全关切，伊朗有自己的地区野心。因此，尽管美国可以施加压力，但最终决定是由以色列和伊朗做出的。","vocabulary":[{"word":"fragile ceasefire","phonetic":"/ˈfrædʒaɪl ˈsiːsfaɪər/","pos":"n he first targets was Iran's surface-to-air missiles","example_cn":"首批目标之一是伊朗的地对空导弹"},{"word":"proxy","phonetic":"/ˈprɒksi/","pos":"noun","level":"考研","cn":"代理人","en":"a person or entity authorized to act on behalf of another","excerpt":"the Houthis in Yemen; an Iranian proxy there","example_cn":"也门的胡塞武装；伊朗在那里的代理人"},{"word":"bargaining chip","phonetic":"/ˈbɑːrɡɪnɪŋ tʃɪp/","pos":"noun phrase","level":"考研","cn":"谈判筹码","en":"something used to gain an advantage in negotiations","excerpt":"They are using Lebanon as a chip -- bargaining chip in their negotiation with the United States.","example_cn":"他们正在把黎巴嫩当作与美国谈判的筹码。"},{"word":"volatile","phonetic":"/ˈvɒlətaɪl/","pos":"adjective","level":"考研","cn":"动荡的，易变的","en":"likely to change suddenly and unexpectedly","excerpt":"over what was a very volatile weekend between Israel and Hezbollah.","example_cn":"在以色列和真主党之间一个非常动荡的周末"},{"word":"red line","phonetic":"/red laɪn/","pos":"noun phrase","level":"考研","cn":"红线，不可逾越的界限","en":"a limit beyond which action will be taken","excerpt":"That crossed Israel's red line","example_cn":"这越过了以色列的红线"},{"word":"stronghold","phonetic":"/ˈstrɒŋhoʊld/","pos":"noun","level":"六级","cn":"据点，堡垒","en":"a place where a particular group is dominant","excerpt":"the Dahiya neighborhood in Beirut, which is considered a Hezbollah stronghold.","example_cn":"贝鲁特的达希耶社区，该社区被认为是真主党的据点。"},{"word":"sovereignty","phonetic":"/ˈsɒvrənti/","pos":"noun","level":"考研","cn":"主权","en":"supreme authority within a territory","excerpt":"he is trying to exercise Lebanese sovereignty","example_cn":"他正在努力行使黎巴嫩主权"},{"word":"foothold","phonetic":"/ˈfʊthoʊld/","pos":"noun","level":"六级","cn":"立足点","en":"a secure position from which further progress may be made","excerpt":"Iranian government that sees Hezbollah as its foothold in Lebanon","example_cn":"伊朗政府将真主党视为其在黎巴嫩的立足点"},{"word":"outlaw","phonetic":"/ˈaʊtlɔː/","pos":"verb","level":"考研","cn":"宣布…为非法","en":"to make something illegal","excerpt":"even as he has tried to outlaw and ban Hezbollah's military activity.","example_cn":"尽管他试图取缔和禁止真主党的军事活动。"},{"word":"rein in","phonetic":"/reɪn ɪn/","pos":"phrasal verb","level":"考研","cn":"控制，约束","en":"to restrain or control","excerpt":"to try to rein in Prime Minister Benjamin Netanyahu when it comes to Lebanon.","example_cn":"在黎巴嫩问题上约束本雅明·内塔尼亚胡总理。"},{"word":"call the shots","phonetic":"/kɔːl ðə ʃɒts/","pos":"idiom","level":"考研","cn":"发号施令，掌控局面","en":"to be in charge; to make the decisions","excerpt":"it is Trump who calls the shots, not Netanyahu","example_cn":"是特朗普说了算，而不是内塔尼亚胡"},{"word":"green light","phonetic":"/ɡriːn laɪt/","pos":"noun phrase","level":"考研","cn":"绿灯，许可","en":"permission to proceed","excerpt":"Trump essentially gave this the green light","example_cn":"特朗普基本上开了绿灯"},{"word":"choke point","phonetic":"/tʃoʊk pɔɪnt/","pos":"noun phrase","level":"六级","cn":"咽喉要道，瓶颈","en":"a narrow passage that restricts movement or flow","excerpt":"these are so-called choke points.","example_cn":"这些是所谓的咽喉要道。"}],"sentences":[{"en":"Israel says it has identified a wave of missiles launched from Iran.","cn":"以色列称已识别出从伊朗发射的一波导弹。","structure":"主句（Israel says）+ 宾语从句（it has identified a wave of missiles launched from Iran）","analysis":"过去分词短语 'launched from Iran' 作后置定语修饰 'missiles'。"},{"en":"Now, those retaliatory strikes appear to be in defiance of President Trump, who called Israeli Prime Minister Benjamin Netanyahu and had told him to hold off on striking back.","cn":"那些报复性袭击似乎是在违抗特朗普总统的命令，他曾致电以色列总理本雅明·内塔尼亚胡，要求他暂缓报复。","structure":"主句（those retaliatory strikes appear to be in defiance of President Trump）+ 非限制性定语从句（who called... and had told him to hold off on striking back）","analysis":"定语从句中 'who' 指代 President Trump，并列谓语 'called' 和 'had told'，'hold off on' 是固定短语，意为'推迟'。"},{"en":"According to Israel's military, most of those have been intercepted.","cn":"据以色列军方称，其中大部分已被拦截。","structure":"介词短语（According to Israel's military）+ 主句（most of those have been intercepted）","analysis":"'According to' 表示信息来源，被动语态 'have been intercepted'。"},{"en":"At first, they said all of those -- but when we followed up after what appeared to be some Iranian video of missiles getting through, they said it only applied to an earlier wave.","cn":"起初，他们说所有导弹都被拦截——但当我们跟进似乎显示导弹突破的伊朗视频后，他们表示这仅适用于较早的一波。","structure":"并列句：第一分句（they said all of those）+ 第二分句（but when... they said it only applied to an earlier wave），其中包含时间状语从句（when we followed up after what appeared to be some Iranian video of missiles getting through）","analysis":"'what appeared to be' 是名词性从句作介词 'after' 的宾语；'getting through' 是现在分词短语作定语修饰 'missiles'。"},{"en":"And then just an hour-and-a-half ago or so, the Israeli military said they carried out strikes against what they called strategic defense systems that would open up the skies to the Israeli Air Force if it moves in that direction.","cn":"大约一个半小时前，以色列军方称他们对所谓的战略防御系统进行了打击，这些系统将为以色列空军打开天空，如果它朝那个方向行动的话。","structure":"主句（the Israeli military said）+ 宾语从句（they carried out strikes against what they called strategic defense systems that would open up the skies to the Israeli Air Force if it moves in that direction），其中 'what they called' 是名词性从句作介词 'against' 的宾语，'that' 引导定语从句修饰 'systems'，'if' 引导条件状语从句","analysis":"这是一个多层嵌套的复杂句，包含名词性从句、定语从句和条件状语从句。"},{"en":"We saw at the beginning of this war a few months ago that one of the first targets was Iran's surface-to-air missiles, and the idea there is that, if you take those out, then Israel's Air Force has to a large extent, freedom of the skies over Iran.","cn":"几个月前这场战争开始时，我们看到首批目标之一是伊朗的地对空导弹，其想法是，如果摧毁这些导弹，以色列空军在很大程度上将拥有伊朗上空的自由。","structure":"主句（We saw）+ 宾语从句（that one of the first targets was Iran's surface-to-air missiles）+ 并列句（and the idea there is that, if you take those out, then Israel's Air Force has to a large extent, freedom of the skies over Iran），其中 'that' 引导表语从句，'if' 引导条件状语从句","analysis":"'to a large extent' 是插入语，表示程度。"},{"en":"And that would also include the U.S. Air Force should this turn into a joint operation.","cn":"如果这变成联合行动，这也将包括美国空军。","structure":"主句（And that would also include the U.S. Air Force）+ 条件状语从句（should this turn into a joint operation），为倒装结构，相当于 'if this should turn into a joint operation'","analysis":"'should' 置于句首表示虚拟语气，是一种正式的条件表达方式。"},{"en":"Crucially, this very much looks like it's heating up, and on the escalation ladder, it's also worth noting, Audie, that the Houthis in Yemen; an Iranian proxy there, fired at least, one missile towards Israel several hours ago that was intercepted here.","cn":"关键是，这看起来正在升温，在升级阶梯上，值得注意的是，Audie，也门的胡塞武装——伊朗的代理人——几小时前向以色列发射了至少一枚导弹，已被拦截。","structure":"并列句：第一分句（this very much looks like it's heating up）+ 第二分句（it's also worth noting... that the Houthis... fired... one missile... that was intercepted here），其中 'that' 引导主语从句（实际是形式主语 'it' 的真正主语），'that was intercepted' 是定语从句修饰 'missile'","analysis":"'it's worth noting that...' 是固定句型，意为'值得注意的是...'。"},{"en":"Iran said last week that if Israel were to carry out an attack, the capital of Beirut, then Iran would directly attack Israel.","cn":"伊朗上周表示，如果以色列袭击贝鲁特首都，伊朗将直接攻击以色列。","structure":"主句（Iran said）+ 宾语从句（that if Israel were to carry out an attack... then Iran would directly attack Israel），其中 'if' 引导条件状语从句，使用虚拟语气（were to）","analysis":"'were to' 表示对将来情况的虚拟假设。"},{"en":"We saw -- we saw the number of people killed in Israeli strikes in Lebanon, according to the Lebanese Ministry of Public Health, rise above 3,600 since this war began some three months ago.","cn":"我们看到——我们看到，根据黎巴嫩公共卫生部的数据，自大约三个月前这场战争开始以来，以色列在黎巴嫩的袭击造成的死亡人数已超过3600人。","structure":"主句（We saw）+ 宾语（the number of people）+ 过去分词短语（killed in Israeli strikes in Lebanon）+ 插入语（according to...）+ 不定式短语（rise above 3,600）+ 时间状语从句（since this war began some three months ago）","analysis":"'see... rise' 是感官动词+宾语+不定式（不带to）的结构。"},{"en":"And then even since the latest U.S.-brokered ceasefire which was just several days ago, we saw Hezbollah carry out an attack on northern Israel.","cn":"然后，即使在几天前美国斡旋的最新停火之后，我们看到真主党对以色列北部发动了袭击。","structure":"时间状语（since the latest U.S.-brokered ceasefire which was just several days ago）+ 主句（we saw Hezbollah carry out an attack on northern Israel），其中 'which' 引导定语从句修饰 'ceasefire'","analysis":"'see... carry out' 是感官动词+宾语+不定式（不带to）的结构。"},{"en":"President Joseph Aoun, who was interviewed by our Christiane Amanpour, he made clear that he is trying to exercise Lebanese sovereignty, and that includes getting some sort of control over Iran's proxy, Hezbollah, and trying to find some sort of agreement that will lead to a withdrawal of Israeli forces from southern Lebanon and make Lebanon more whole.","cn":"约瑟夫·奥恩总统接受了我们的Christiane Amanpour的采访，他明确表示他正在努力行使黎巴嫩主权，包括对伊朗代理人真主党进行某种控制，并试图找到某种协议，导致以色列军队从黎巴嫩南部撤出，使黎巴嫩更加完整。","structure":"主句（President Joseph Aoun... he made clear）+ 宾语从句（that he is trying to exercise Lebanese sovereignty）+ 并列结构（and that includes... and trying to find...），其中 'who' 引导非限制性定语从句修饰 'President Joseph Aoun'，'that will lead to...' 是定语从句修饰 'agreement'","analysis":"句子较长，包含定语从句、宾语从句和并列结构。"},{"en":"His Lebanese Armed Forces don't have the power and perhaps don't have the will to carry out any serious action against Hezbollah, even as he has tried to outlaw and ban Hezbollah's military activity.","cn":"他的黎巴嫩武装部队没有力量，也许也没有意愿对真主党采取任何严肃行动，尽管他试图取缔和禁止真主党的军事活动。","structure":"主句（His Lebanese Armed Forces don't have the power and perhaps don't have the will to carry out any serious action against Hezbollah）+ 让步状语从句（even as he has tried to outlaw and ban Hezbollah's military activity）","analysis":"'even as' 引导让步状语从句，意为'尽管'。"},{"en":"What's crucial here, Audie, is that what happens in Lebanon affects the U.S.-Iran ceasefire.","cn":"关键的是，Audie，黎巴嫩发生的事情会影响美伊停火。","structure":"主语从句（What's crucial here）+ 系动词（is）+ 表语从句（that what happens in Lebanon affects the U.S.-Iran ceasefire），其中 'what happens in Lebanon' 是主语从句作表语从句的主语","analysis":"这是一个嵌套的主语从句和表语从句结构。"},{"en":"They know that President Donald Trump wants to get to a deal, and they're able to try to use Hezbollah and to some extent, use Lebanon as a bargaining chip to pressure Trump to try to rein in Prime Minister Benjamin Netanyahu when it comes to Lebanon.","cn":"他们知道唐纳德·特朗普总统想要达成协议，他们能够试图利用真主党，并在某种程度上利用黎巴嫩作为筹码，向特朗普施压，以在黎巴嫩问题上约束本雅明·内塔尼亚胡总理。","structure":"并列句：第一分句（They know that President Donald Trump wants to get to a deal）+ 第二分句（and they're able to try to use Hezbollah and... use Lebanon as a bargaining chip to pressure Trump to try to rein in Prime Minister Benjamin Netanyahu when it comes to Lebanon），其中 'that' 引导宾语从句，'when it comes to' 是固定短语","analysis":"'to some extent' 是插入语，'when it comes to' 意为'当谈到...时'。"},{"en":"It is possible that Trump essentially gave this the green light and said, yes, Israel has to respond in some fashion, but keep that response limited.","cn":"有可能特朗普基本上开了绿灯，说，是的，以色列必须以某种方式回应，但将回应限制在一定范围内。","structure":"形式主语（It）+ 系动词（is）+ 表语（possible）+ 主语从句（that Trump essentially gave this the green light and said...），其中 'said' 后为直接引语","analysis":"'it is possible that...' 是常见句型，意为'有可能...'。"},{"en":"It's also possible that Trump told Israel not to respond, and Netanyahu is acting on his own here, though I think that's unlikely, given how much Netanyahu needs Trump to be on his side, and has never sort of publicly criticized him.","cn":"也有可能特朗普告诉以色列不要回应，而内塔尼亚胡自行其是，尽管我认为这不太可能，因为内塔尼亚胡非常需要特朗普站在他一边，而且从未公开批评过他。","structure":"形式主语（It）+ 系动词（is）+ 表语（possible）+ 主语从句（that Trump told Israel not to respond, and Netanyahu is acting on his own here）+ 让步状语从句（though I think that's unlikely）+ 原因状语（given how much Netanyahu needs Trump to be on his side, and has never sort of publicly criticized him）","analysis":"'given' 是介词，意为'考虑到'，后接名词性从句。"},{"en":"It's worth remembering here that Trump has forced Netanyahu to end wars in Gaza, Lebanon, and previously in Iran.","cn":"值得记住的是，特朗普曾迫使内塔尼亚胡结束了加沙、黎巴嫩以及之前的伊朗战争。","structure":"形式主语（It）+ 系动词（is）+ 表语（worth remembering）+ 主语从句（that Trump has forced Netanyahu to end wars in Gaza, Lebanon, and previously in Iran）","analysis":"'it's worth doing that...' 是固定句型。"},{"en":"The reason this particular round of strikes kicked off was because the Israelis hit the suburb of Beirut, suburb of Dahiya.","cn":"这一轮袭击爆发的原因是以色列袭击了贝鲁特郊区达希耶。","structure":"主语（The reason）+ 定语从句（this particular round of strikes kicked off）+ 系动词（was）+ 表语从句（because the Israelis hit the suburb of Beirut, suburb of Dahiya）","analysis":"'the reason... was because...' 是常见结构，但有时被认为冗余，此处为口语表达。"},{"en":"And the reason they did that is because they want the ceasefire to cover not just Iran, but also the Lebanese territory, where the Israelis have conducted repeated actions against Hezbollah.","cn":"他们这样做的原因是，他们希望停火不仅覆盖伊朗，也覆盖黎巴嫩领土，以色列在那里对真主党进行了多次行动。","structure":"主语（The reason）+ 定语从句（they did that）+ 系动词（is）+ 表语从句（because they want the ceasefire to cover not just Iran, but also the Lebanese territory, where the Israelis have conducted repeated actions against Hezbollah），其中 'where' 引导非限制性定语从句修饰 'Lebanese territory'","analysis":"与上一句结构类似，包含定语从句和表语从句。"}],"topics":[{"title":"以色列与伊朗的导弹袭击与停火危机","content":"2026年6月8日，以色列和伊朗互相发射导弹，这是自4月停火协议以来最严重的升级。以色列袭击了伊朗的石化厂和战略防御系统，伊朗则瞄准了以色列北部的拉马特大卫空军基地。美国特朗普总统曾要求以色列暂缓报复，但以色列似乎违抗了命令。此次冲突可能破坏脆弱的停火，并影响全球油价。","keywords":"Israel · Iran · missile attack · ceasefire · escalation"},{"title":"真主党与黎巴嫩在地区冲突中的角色","content":"真主党是伊朗在黎巴嫩的主要代理人，其总部位于贝鲁特的达希耶社区。以色列对达希耶的袭击触发了伊朗的直接报复。黎巴嫩总统约瑟夫·奥恩试图行使主权，控制真主党，但黎巴嫩武装力量不足。真主党被伊朗用作谈判筹码，以影响美国对以色列的约束。","keywords":"Hezbollah · Lebanon · proxy · Dahiya · sovereignty"},{"title":"特朗普政府对以色列-伊朗冲突的立场","content":"特朗普总统公开表示希望降低中东温度，避免第三次世界大战，并曾致电内塔尼亚胡要求暂缓报复。然而，以色列仍进行了反击。分析认为特朗普可能暗中允许有限回应，或内塔尼亚胡自行其是。特朗普此前曾迫使以色列结束加沙、黎巴嫩和伊朗的战争，此次可能再次介入。","keywords":"Trump · Netanyahu · U.S. policy · retaliation · diplomacy"},{"title":"胡塞武装与红海航运威胁","content":"也门的胡塞武装是伊朗的另一个代理人，他们向以色列发射导弹，并威胁阻止船只通过红海的曼德海峡。曼德海峡是连接红海和印度洋的咽喉要道，若被封锁将影响全球航运和贸易，导致油价上涨。这与伊朗威胁封锁霍尔木兹海峡类似，可能扩大地区冲突。","keywords":"Houthis · Yemen · Bab al-Mandab · Red Sea · choke point"},{"title":"中东冲突对全球石油市场的影响","content":"以色列与伊朗的冲突导致布伦特原油和WTI原油价格上涨。中东地区是石油主要产区，任何军事升级都可能扰乱供应。霍尔木兹海峡和曼德海峡等咽喉要道的潜在封锁将进一步推高油价，影响全球经济。","keywords":"oil prices · Brent Crude · WTI · Strait of Hormuz · global trade"}],"raw_transcript":"CNN.com - Transcripts var cnnSiteWideCurrDate = new Date(2013, 1, 12); window.CNNSTATICSECTION = ''; var CNNENV = \"//www.cnn.com\"; Transcript Providers Return to Transcripts main page CNN This Morning Israel, Iran Trade Missile Attacks After Iran Targets Israeli Ramat David Airbase; Iran Threatens to Block Critical Bab al-Mandab Strait; Deadly 7.8 Magnitude Earthquake Hits Southern Philippines. Aired 5-5:30a ET Aired June 08, 2026 - 05:00 ET THIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED. [05:00:00] ANNOUNCER: This is CNN Breaking News! AUDIE CORNISH, ANCHOR, CNN THIS MORNING: We are following this breaking news out of the Middle East. Israel and Iran trading missile attacks, and the fragile ceasefire survive this test. Good morning, everybody, I'm Audie Cornish. We're going to start with the strikes that have happened in the last few hours. Israel says it has identified a wave of missiles launched from Iran. New video into CNN overnight showing damage inside a home in the West Bank. Now, this follows Israeli strikes on an Iranian petrochemical plant. The IDF saying that it hit several targets at that complex. Now, those retaliatory strikes appear to be in defiance of President Trump, who called Israeli Prime Minister Benjamin Netanyahu and had told him to hold off on striking back. As tensions rise in the Middle East, so do oil prices. Both Brent Crude and WTI Crude up this morning. We've got live team coverage throughout the region. And we're going to start in Jerusalem with CNN's Oren Liebermann. Oren, first, can you just give us the latest on the strikes, what you've witnessed today? OREN LIEBERMANN, CNN JERUSALEM BUREAU CHIEF: We have seen and heard several waves of incoming Iranian ballistic missiles since about 10:00 or 11 O'clock at night here local time. So, this has been going on for several hours. There were approximately three barrages in that first wave. And then we have seen a few subsequent waves of incoming Iranian ballistic missiles. According to Israel's military, most of those have been intercepted. At first, they said all of those -- but when we followed up after what appeared to be some Iranian video of missiles getting through, they said it only applied to an earlier wave. So, we're waiting to see if there is an update there. Meanwhile, Iran's military said they targeted the Ramat David Air Force Base in northern Israel. Israel has responded with its own attacks, and we have seen those progressively escalate from what Israel's ambassador to the U.S. described as attacks on surface-to-surface missiles and non-energy infrastructure to the strike. You mentioned on the petrochemical facility in western Iran. And then just an hour-and-a-half ago or so, the Israeli military said they carried out strikes against what they called strategic defense systems that would open up the skies to the Israeli Air Force if it moves in that direction. We saw at the beginning of this war a few months ago that one of the first targets was Iran's surface-to-air missiles, and the idea there is that, if you take those out, then Israel's Air Force has to a large extent, freedom of the skies over Iran. And that would also include the U.S. Air Force should this turn into a joint operation. Obviously, that's something we're watching very closely. Crucially, this very much looks like it's heating up, and on the escalation ladder, it's also worth noting, Audie, that the Houthis in Yemen; an Iranian proxy there, fired at least, one missile towards Israel several hours ago that was intercepted here. We have heard interceptions behind us over Jerusalem. We have seen warnings of incoming missiles in several other areas across the country. Here, as both Israel and Iran have indicated and publicly stated that they are prepared for at least days of this to continue. CORNISH: You talked about that escalation ladder, and we have sn't want to withdraw from southern Lebanon now. You have an Iranian government that sees Hezbollah as its foothold in Lebanon, Hezbollah rejected the latest iteration of the -- of the ceasefire there. And that puts the President Joseph Aoun in a very difficult situation. His Lebanese Armed Forces don't have the power and perhaps don't have the will to carry out any serious action against Hezbollah, even as he has tried to outlaw and ban Hezbollah's military activity. What's crucial here, Audie, is that what happens in Lebanon affects the U.S.-Iran ceasefire. Iran knows that. They know that President Donald Trump wants to get to a deal, and they're able to try to use Hezbollah and to some extent, use Lebanon as a bargaining chip to pressure Trump to try to rein in Prime Minister Benjamin Netanyahu when it comes to Lebanon. CORNISH: Is there any chance of doing that? I think a lot of people are looking at these actions and thinking about how the President has spoken to Netanyahu, talked about taking down the temperature. What's the view in Israel about how Trump has been talking? LIEBERMANN: Trump made a number of public statements, or rather, gave a number of interviews to reporters in which he said it is Trump who calls the shots, not Netanyahu, saying he would -- he would urge Israel not to retaliate or delay Israel's retaliation. That's at least, the public part of the messaging. What we don't really know, and this is the key question for us to have a much better sense of what's happening here is, what was the phone call like between Trump and Netanyahu? It is possible that Trump essentially gave this the green light and said, yes, Israel has to respond in some fashion, but keep that response limited. It's also possible that Trump told Israel not to respond, and Netanyahu is acting on his own here, though I think that's unlikely, given how much Netanyahu needs Trump to be on his side, and has never sort of publicly criticized him. So, there's a spectrum here of what Trump is allowing of Netanyahu. It's worth remembering here that Trump has forced Netanyahu to end wars in Gaza, Lebanon, and previously in Iran. And I think right now, it's still the expectation that Trump will do that once again. The question is when and how. For that, Trump needs to essentially get the day started in D.C., so, we can learn more about what's happening behind the scenes. Audie. CORNISH: That's right, we're waking up here in Washington, Oren Liebermann talking to us from Jerusalem. Our breaking news coverage continues after the break on CNN THIS MORNING. We're going to talk about under what circumstance would Trump consider bringing U.S. troops home? His answer next. Plus, a deadly quake hits in the Philippines. The urgent search for survivors. (COMMERCIAL BREAK) [05:10:00] CORNISH: Breaking news this morning. Israel and Iran trading strikes in the worst escalation since the ceasefire agreement in April. We just heard from our CNN's Oren Liebermann in Jerusalem, where there are sounds of sirens and explosions after the interception of missiles. A U.S. official told CNN that President Trump urged Israeli Prime Minister Benjamin Netanyahu to hold off on retaliating against Iran. So, joining us to talk more about the military strategy here is retired Air Force Colonel and CNN military analyst Cedric Leighton. Good morning. So, first, I want to talk about this escalation because people may be hearing about the back-and-forth between Israel and Hezbollah for many weeks. Why did this particular round of strikes kick off? CEDRIC LEIGHTON, CNN MILITARY ANALYST: Yes, good morning, Audie. The reason this particular round of strikes kicked off was because the Israelis hit the suburb of Beirut, suburb of Dahiya. That's where Hezbollah has its main headquarters. And there are a lot of Hezbollah personnel for lack of a better term, in the Dahiya neighborhood. So, the reason the Iranians basically came to the defense of the Hezbollah entities there was because pened on \"NBC's\" \"Meet the Press\". This was before all of this news about this es"}};

let currentData = null;
const LV_COLORS = {'考研':'#f0a500','六级':'#4a9eff'};

(function init(){
  const latest = '2026-06-08';
  if(ALL_DATA[latest]) loadDate(latest);
  document.querySelector(`[data-date="${latest}"]`)?.classList.add('active');
})();

function openSource(){
  if(currentData?.source_url) window.open(currentData.source_url,'_blank');
}

function loadDate(date){
  if(!ALL_DATA[date]) return;
  document.querySelectorAll('.hist-item').forEach(b=>
    b.classList.toggle('active', b.dataset.date===date));
  renderAll(ALL_DATA[date]);
}

function renderAll(data){
  currentData = data;
  document.getElementById('topbarDate').textContent = data.date||'';
  document.getElementById('topbarTitle').textContent = 'CNN This Morning · ' + (data.date||'');

  renderRawTranscript(data.raw_transcript || '', data.vocabulary || []);
  renderWordList(data.vocabulary || []);
  renderVocab(data.vocabulary || []);
  renderSentences(data.sentences || []);
  renderTopics(data.topics || []);

  const transDiv = document.getElementById('fullTranslation');
  if(transDiv) transDiv.innerHTML = esc(data.full_translation || '暂无全文翻译，请重新运行生成。');
}

function renderRawTranscript(rawText, vocab){
  const container = document.getElementById('transcriptBody');
  if(!rawText){
    container.innerHTML = '<div style="color:var(--text2)">无原文数据</div>';
    return;
  }
  const vocabMap = {};
  vocab.forEach(v=>{ vocabMap[v.word.toLowerCase()] = v; });
  const sortedWords = Object.keys(vocabMap).sort((a,b)=>b.length-a.length);
  const highlighted = highlightWords(rawText, sortedWords, vocabMap);
  container.innerHTML = `<div style="white-space:pre-wrap;line-height:1.8;">${highlighted}</div>`;
}

function highlightWords(text, sortedWords, vocabMap){
  const positions = [];
  const lc = text.toLowerCase();
  sortedWords.forEach(word=>{
    let idx = 0;
    while((idx = lc.indexOf(word, idx)) !== -1){
      const before = idx === 0 || !/[a-z]/i.test(text[idx-1]);
      const after  = idx+word.length >= text.length || !/[a-z]/i.test(text[idx+word.length]);
      if(before && after){
        const overlaps = positions.some(p=> idx < p.end && idx+word.length > p.start);
        if(!overlaps){
          positions.push({start:idx, end:idx+word.length, word, vocab:vocabMap[word]});
        }
      }
      idx += word.length;
    }
  });
  if(!positions.length) return esc(text);
  positions.sort((a,b)=>a.start-b.start);
  let html = '', last = 0;
  positions.forEach(p=>{
    html += esc(text.slice(last, p.start));
    const lv = p.vocab.level||'';
    const lvClass = `level-${lv}`;
    html += `<span class="hl ${lvClass}" data-word="${esc(p.vocab.word)}" onclick="showVocabPopup(event,'${esc(p.vocab.word)}')">${esc(text.slice(p.start,p.end))}</span>`;
    last = p.end;
  });
  html += esc(text.slice(last));
  return html;
}

function showVocabPopup(e, word){
  e.stopPropagation();
  const data = currentData?.vocabulary?.find(v=>v.word===word);
  if(!data) return;

  document.querySelectorAll('.hl').forEach(el=>{
    el.classList.toggle('active', el.dataset.word===word);
  });
  document.querySelectorAll('.word-chip').forEach(el=>{
    el.classList.toggle('active', el.dataset.word===word);
  });

  document.getElementById('vpWord').textContent = data.word;
  document.getElementById('vpPh').textContent   = data.phonetic||'';
  document.getElementById('vpPos').textContent  = data.pos||'';
  document.getElementById('vpLv').textContent   = data.level||'';
  document.getElementById('vpCn').textContent   = data.cn||'';
  document.getElementById('vpEn').textContent   = data.en||'';

  const popup = document.getElementById('vocabPopup');
  popup.classList.add('show');
  popup.style.pointerEvents = 'auto';

  let x = e.clientX + 12, y = e.clientY + 12;
  if(x + 300 > window.innerWidth) x = e.clientX - 312;
  if(y + 160 > window.innerHeight) y = e.clientY - 160;
  popup.style.left = x + 'px';
  popup.style.top  = y + 'px';
}

document.addEventListener('click', e=>{
  if(!e.target.classList.contains('hl') && !e.target.closest('.vocab-popup') && !e.target.closest('.word-chip')){
    document.getElementById('vocabPopup').classList.remove('show');
    document.querySelectorAll('.hl.active').forEach(el=>el.classList.remove('active'));
    document.querySelectorAll('.word-chip.active').forEach(el=>el.classList.remove('active'));
  }
});

function renderWordList(vocab){
  document.getElementById('wordList').innerHTML = vocab.map(v=>`
    <div class="word-chip" data-word="${esc(v.word)}" onclick="jumpToWord('${esc(v.word)}')">
      <span class="wc-lv" style="background:${LV_COLORS[v.level]||'#4a9eff'}"></span>
      <span class="wc-word">${esc(v.word)}</span>
      <span class="wc-cn">${esc(v.cn||'')}</span>
    </div>`).join('');
}

function jumpToWord(word){
  switchTab('transcript');
  setTimeout(()=>{
    const el = document.querySelector(`.hl[data-word="${word}"]`);
    if(el){
      el.scrollIntoView({behavior:'smooth', block:'center'});
      el.click();
    }
  }, 50);
}

function renderVocab(list){
  document.getElementById('vocabGrid').innerHTML = list.map(v=>`
    <div class="vcard">
      <div class="vhead">
        <span class="vword">${esc(v.word)}</span>
        <span class="vph">${esc(v.phonetic||'')}</span>
        <span class="bpos">${esc(v.pos||'')}</span>
        <span class="blv">${esc(v.level||'')}</span>
      </div>
      <div class="vcn">${esc(v.cn)}</div>
      <div class="ven">${esc(v.en||'')}</div>
      <div class="veg">
        ${hlWord(v.excerpt||v.example||'', v.word)}
        <div class="vegcn">${esc(v.example_cn||'')}</div>
      </div>
    </div>`).join('');
}

function hlWord(text, word){
  if(!word||!text) return esc(text);
  const re = new RegExp(`(${word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return esc(text).replace(re,'<em>$1</em>');
}

function renderSentences(list){
  document.getElementById('sentenceList').innerHTML = list.map((s,i)=>`
    <div class="scard">
      <div class="snum">${i+1}</div>
      <div class="sen-en">${esc(s.en)}</div>
      <div class="sen-cn">${esc(s.cn)}</div>
      <div class="divider"></div>
      <div class="alabel">句子结构</div>
      <div class="abody">${esc(s.structure||'')}</div>
      <div class="alabel">语法分析</div>
      <div class="abody">${esc(s.analysis||'')}</div>
    </div>`).join('');
}

function renderTopics(list){
  const colors = ['#2c7da0','#d95b3a','#0f8b8b','#7c5cbf'];
  document.getElementById('topicList').innerHTML = list.map((t,i)=>`
    <div class="tcard">
      <div class="ttitle">
        <span class="tdot" style="background:${colors[i%colors.length]}"></span>
        ${esc(t.title)}
      </div>
      <div class="tcontent">${esc(t.content)}</div>
      <div class="tkw">🔑 ${esc(t.keywords||'')}</div>
    </div>`).join('');
}

function switchTab(id){
  const tabs = ['transcript','translation','vocab','sentences','topics'];
  tabs.forEach(t=>{
    const idx = tabs.indexOf(t);
    const tabBtn = document.querySelectorAll('.tab')[idx];
    if(tabBtn) tabBtn.classList.toggle('active', t===id);
    const section = document.getElementById(t);
    if(section) section.classList.toggle('active', t===id);
  });
}

function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
</script>
