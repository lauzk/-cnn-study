imony is helpful to the work, important work of the committee to find justice for the victims. Thank you.\n\nHILL: Gates has not been accused in connection with Epstein's crimes.\n\nIf you are counting on Social Security as part of your retirement plan, well, listen up. The latest government projections suggest the fund could run out of money in late 2032.\n\nSo, that means the agency would no longer be able to pay 100 percent of benefits in the fourth quarter of that year. And in the years after, the monthly benefits will drastically decline.\n\nSome new details for you on that upcoming UFC fight at the White House. Specifically, the cost: some $60 million. Now, that's according to court documents submitted by the Trump administration, which says the money will cover logistics; things like food and porta-potties.\n\nThe fight is set for Sunday night, which, of course, is also the president's birthday.\n\nStill to come here on CNN THIS MORNING, a record-setting win for the Knicks. Will Leitch is here with more on New York's 29-point comeback and the push on to game five.\n\nPlus, the World Cup kicking off across America, North America today. Not without controversy. How about a live look for you here in Mexico City, the site of the opening match between Mexico and South Africa.\n\nSo, can the action on the pitch finally offer a much-needed vibe shift?\n\nUNIDENTIFIED MALE: I say, \"New York,\" you say, \"Yes!\"\n\nUNIDENTIFIED MALE: Yes!\n\nUNIDENTIFIED MALE: Yes!\n\nUNIDENTIFIED MALE: Yes!\n\nUNIDENTIFIED MALE: New York!\n\nUNIDENTIFIED MALE: Yes!\n\nUNIDENTIFIED MALE: Yes!\n\nUNIDENTIFIED MALE: Yes!\n\nHILL: A little excitement there on the subway. Frankly, everywhere in New York after the Knicks pulled off the greatest comeback in NBA finals history, securing a two-game lead over the Spurs.\n\nUNIDENTIFIED MALE: At the top, one on one.\n\nUNIDENTIFIED MALE: Brunson gets it, fires up a three. No good. The triplet's good! It's good! It's good with 1.20 left.\n\nHILL: It was very good. The stunning end to a 29-point comeback. O.G. Anunoby's tip-in with 1.2 seconds remaining. The Knicks beating the Spurs by just one point, 107 to 106.\n\nUNIDENTIFIED MALE: I can't believe it.\n\nANUNOBY: Feels cool. I mean, everyone's pretty excited. I'm excited, too. I'm excited, too. We're all excited. We're enjoying it right now, but we're just focused on the next game now.\n\nHILL: Knicks fans celebrating, perhaps not surprisingly, into the wee hours of the morning. New York now has the opportunity to clinch its first NBA title since\n\n1973. The next game, game five, Saturday night in San Antonio.\n\nJoining us now, Will Leitch. He's a contributing editor at \"New York\" magazine and a columnist with \"The Washington Post.\" He's got his Knicks blue jacket on, his Jalen Brunson bobblehead somewhere.\n\nI mean, Knicks in five. There is -- I know we've talked a lot about this. I have to say being in New York City. And it's true. You're on the subway. Everywhere you go, the excitement and the camaraderie, and the way this city has come together. It is something. And that was a hell of a game.\n\nWILL LEITCH, CONTRIBUTING EDITOR, \"NEW YORK\" MAGAZINE: It's incredible to watch the streets everywhere. You know, I lived in New York for 13 years. My old street packed with people.\n\nAnd what was amazing about that comeback last night, the vibes had been so off since Monday. This -- the scenes of -- of all those people in the street had been replaced by scowling billionaires courtside. Right? Like -- like scowling celebrities and upset people.\n\nHILL: No one wants to see a scowling billionaire.\n\nLEITCH: And that all changed in the course of last night. There's a lot of them. There's a -- there's a lot -- a lot of leaders and a lot of celebrities out there. And they -- everyone looked very sad. I looked very sad.\n\nAnd so, to see -- to see that that comeback was really something incredible. And that O.G. Anunoby tip-in, it's something, frankly, that I place that piece that really not just Knicks fans will remember forever, but really NBA fans. That's an NBA historic play.\n\nHILL: Yes. Absolutely. And it was quite a game. I mean, I -- full disclosure, I had to watch the highlights this morning and read about it, because some of us had to go to bed early.\n\nBut you know, the fact that this was this 29-point comeback. Just -- just set the scene for us. What are you seeing going into game five from both teams?\n\nLEITCH: Certainly, you know, they'll go back to San Antonio for game five. And so, the next game won't have the Garden environment.\n\nBut the Knicks just won two games in San Antonio. And you know, the Spurs are obviously incredibly talented. I think everyone assumes Victor Wembanyama is going to win several championships throughout his career. But they are very, very young.\n\nAnd I think that was kind of revealed last night. Wembanyama even talked about that, about how they felt like they'd lost their hunger in the fourth quarter.\n\nSo, I think that we'll see. That's a lot to overcome. Generally, historically speaking, when you have that kind of loss or just a heart -- rips the heart out of your chest loss --\n\nLEITCH: -- like the Spurs just had, it's very difficult to recover from, even -- even if you -- you're at home. But even if they lose that game, the Knicks will be back for game six. I can't imagine what the Garden would be like for a game six.\n\nHILL: Oh, wow. Yes. Me either. We'll deal with that when, if and when we come to it.\n\nLet's talk a little soccer, shall we? Football, depending on where you are, you know, in the rest of the world.\n\nThis has been tough, heading into this moment: between ticket prices, immigration issues this week. First match today in Mexico City. Are we now getting into the heart of what this tournament is about?\n\nLEITCH: I mean, I think certainly FIFA hopes so, because this has really been a real mess for them. You know. this was -- after Russia eight years ago and Qatar four years ago, this was supposed to be the World Cup that went smoothly.\n\nThey've been waiting for -- to get back to North America, you know, for -- since 1994.\n\nEverything was supposed to be, like, this -- U.S. was a burgeoning soccer market. Everyone was supposed to be working out in that direction. And it just -- it's been the opposite of that in every possible way.\n\nThe hope is -- and frankly, historically, there is some signs that this happens -- once the ball is kicked --\n\nLEITCH: -- and once things get going, and once this incredible experience -- you know, one of the great things about the World Cup is that we'll see. And remember, there's 16 more nations involved in this one.\n\nEvery game takes on its own unique personality. The personality of the fan bases. And, you know, these games are still going to be -- the stands are still going to be full. As high as the ticket prices have been, these stands are generally.\n\nAnd Azteca today with the Mexico game, that's going to be an incredible environment. The opening of the World Cup at the Azteca with the Mexican team.\n\nThese fans are -- like, every game takes on the personality of these varying fan base. The entire world is looking at this. Maybe the U.S. is not maybe looking at its best right now, hosting this tournament, in a lot of ways.\n\nBut once the game gets going, certainly, the hope is among not just FIFA, but I think a lot of soccer fans, that a lot of this will fade away a little bit. But you know, we'll see.\n\nHILL: Yes, yes. As long as you don't have to, you know, pay for a train ticket into New Jersey.\n\nHILL: When we -- you talked about the stands -- stands being full, rather. What are the chances that some of those -- there are still tickets available, right? That they start to drop to make sure that the stands are full?\n\nLEITCH: I think they will. You know, I'm -- I'm based outside of Atlanta. There's a game between Uzbekistan and Qatar that takes place at 7:30 on a Wednesday. The get-in price is $400.\n\nNow I -- I suppose it's possible there's more Uzbekistan fans outside of Mercedes-Benz stadium in Atlanta than I think, but I suspect that's really because FIFA's kind of controlling the market a little bit on this.\n\nLEITCH: So, controlling the resale market, as well.\n\nThey're not going to want empty stands. I think that once these game gets going, once I think some of the realism that they do not want to see empty stands, I think you're going to see some of these prices go down.\n\nNow, I don't want to imply that, all of a sudden, you're going to be getting $5 tickets to these games.\n\nLEITCH: But some of these obscene prices, given prices that you're seeing, I do think you'll fall.\n\nNow, not for the larger games, right? Like obviously, the finals still going to be. Spain.\n\nLEITCH: You know, a lot -- a lot of the larger teams, Brazil, those are all going to be sold out and very expensive.\n\nBut I think there's 48 teams in this thing. There's a lot of games. If you want to be able to just say, I went to a World Cup game, a lot of these prices are going to fall. I think for -- for a reasonable amount to at least get in and see what's going on.\n\nHILL: That's great. And you know, a watch party is always fun, too, having been to a couple.\n\nLEITCH: I've seen more -- HILL: You know, almost 30 years ago when the World Cup was in France.\n\nLEITCH: Really incredible.\n\nHILL: Really good time. Will, appreciate it. Thank you.\n\nLEITCH: Thanks for having me.\n\nHILL: Straight ahead here on CNN THIS MORNING, President Trump's unique take on rising costs for Americans. Why he loves the latest inflation news.\n\nAnd a stabbing, sparking days of unrest now in Northern Ireland. Why officials are worried this violence could spread."}]},"2026-06-10":{"date":"2026-06-10","source_url":"https://transcripts.cnn.com/show/ctmo/date/2026-06-10/segment/01","full_translation":[{"paragraph":"Return to Transcripts main page\n\nPlatner Easily Wins Democratic Senate Primary in Maine; U.S. Hits Iran after Helicopter Downed; OpenAI Files for IPO, Joins Anthropic and SpaceX. Aired 6-6:30a ET\n\nAired June 10, 2026 - 06:00   ET\n\nTHIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED.","translation":"返回文字记录主页\n\n普拉特纳轻松赢得缅因州民主党参议院初选；直升机被击落后美国打击伊朗；OpenAI申请IPO，加入Anthropic和SpaceX行列。播出时间：美国东部时间早上6点至6点30分\n\n播出日期：2026年6月10日 - 美国东部时间06:00\n\n此为速记文字稿。本稿件可能并非最终版本，且可能更新。"},{"paragraph":"AUDIE CORNISH, CNN ANCHOR: Today in the group chat, Democrats in Maine vote to stick with Graham Platner. Could that cost the party a shot at flipping the Senate this fall?","translation":"CNN主播奥黛·科尼什：今天在群聊中，缅因州的民主党人投票支持格雷厄姆·普拉特纳。这会否让该党失去今年秋天翻转参议院的机会？"},{"paragraph":"REP. ALEXANDRIA OCASIO-CORTEZ (D-NY): If the choice on the ballot is between that and a senator who's voted to take health care away from millions of Americans, that's the situation that we have to weigh.","translation":"众议员亚历山大·奥卡西奥-科尔特斯（纽约州民主党）：如果选票上的选择是在那和一位投票剥夺数百万美国人医保的参议员之间，那就是我们必须权衡的情况。"},{"paragraph":"CORNISH: Missiles light up the sky in the Middle East again. Will the strained ceasefire last long enough for the U.S. to deliver that long-promised deal with Iran?","translation":"科尼什：导弹再次照亮中东的天空。紧张的停火能否持续足够长的时间，让美国兑现与伊朗长期承诺的协议？"},{"paragraph":"And a big day for the Epstein files. What will Bill Gates tell lawmakers about his links to the late convicted sex offender.","translation":"还有爱泼斯坦文件的重要一天。比尔·盖茨将就他与已故被定罪性犯罪者的联系向立法者说些什么。"},{"paragraph":"UNIDENTIFIED MALE: Do you think that you've killed people as an adult?\n\nVICTOR MARX (R), COLORADO GUBERNATORIAL CANDIDATE: Does it matter?","translation":"身份不明的男性：你认为你成年后杀过人吗？\n\n维克多·马克斯（共和党），科罗拉多州州长候选人：这重要吗？"},{"paragraph":"CORNISH: This is a candidate who also claims he killed someone as a child. Meet the frontrunner in the Republican race for governor of Colorado.","translation":"科尼什：这是一位自称小时候杀过人的候选人。来认识一下科罗拉多州共和党州长竞选的领跑者。"},{"paragraph":"And it's the $3.5 trillion question on Wall Street. Has the A.I. boom gotten ahead of itself?","translation":"还有华尔街3.5万亿美元的问题。人工智能热潮是否超前了？"},{"paragraph":"UNIDENTIFIED MALE: OpenAI and Anthropic plan to have IPOs at release before the end of this year, signaling to me that the A.I. bubble is about to pop.","translation":"身份不明的男性：OpenAI和Anthropic计划在今年年底前进行IPO，这向我表明人工智能泡沫即将破裂。"},{"paragraph":"(END VIDEO CLIP) (BEGIN VIDEO CLIP)\n\nGRAHAM PLATNER (D), MAINE SENATE CANDIDATE: To any of those who feel let down or disappointed or disillusioned, it is my job to earn your trust, faith, and support. And I will spend every day of this campaign. And if I have the privilege every day in the United States Senate doing exactly that.","translation":"（视频片段结束）（视频片段开始）\n\n格雷厄姆·普拉特纳（民主党），缅因州参议员候选人：对于任何感到失望、沮丧或幻灭的人，我的工作是赢得你们的信任、信念和支持。我将用尽这场竞选的每一天。如果我有幸每天在美国参议院做同样的事。"},{"paragraph":"CORNISH: Graham Platner punches his ticket. But now he's got to convince voters to choose him over a five-term senator.\n\nGood morning everybody. I'm Audie Cornish. Here is where we begin. That big statement out of Maine.","translation":"科尼什：格雷厄姆·普拉特纳获得了入场券。但现在他必须说服选民选择他而不是一位连任五届的参议员。\n\n大家早上好。我是奥黛·科尼什。我们开始吧。来自缅因州的重大声明。"},{"paragraph":"Democrat Graham Platner, despite all the scandals, earned about three-fourths of primary voters' support over Governor Janet Mills.","translation":"民主党人格雷厄姆·普拉特纳，尽管丑闻缠身，仍赢得了约四分之三初选选民的支持，击败了州长珍妮特·米尔斯。"},{"paragraph":"Moments after clinching the nomination, he turned his attention to his new opponent, Republican Senator Susan Collins.","translation":"在锁定提名后不久，他将注意力转向了他的新对手，共和党参议员苏珊·柯林斯。"},{"paragraph":"PLATNER: Susan Collins may have started -- may have started her career decades ago in Washington with good intentions, but she has become just as spineless and corrupt as the establishment she now serves. If you are an independent voice, why do you vote with Donald Trump 95 percent of the time?","translation":"普拉特纳：苏珊·柯林斯可能几十年前在华盛顿开始她的职业生涯时怀有良好意图，但她已经变得和她现在所服务的建制派一样软弱和腐败。如果你是一个独立的声音，为什么你95%的时间都投票支持唐纳德·特朗普？"},{"paragraph":"CORNISH: Platner has a lot of work to do to get Mills voters on his side.","translation":"科尼什：普拉特纳需要做大量工作来争取米尔斯选民的支持。"},{"paragraph":"UNIDENTIFIED FEMALE: I couldn't honestly support Platner, even though some of the things that he says are really good.","translation":"身份不明的女性：我无法诚实地支持普拉特纳，尽管他说的有些话确实很好。"},{"paragraph":"UNIDENTIFIED MALE: I don't think he's ready to be a senator. I'm leaning towards Collins unless the guy shows something else, but I just -- he's not there yet. And --","translation":"身份不明的男性：我认为他还没准备好当参议员。我倾向于柯林斯，除非那家伙表现出其他东西，但我只是——他还没到那个程度。而且——"},{"paragraph":"UNIDENTIFIED FEMALE: And so, what will you do in November if its Platner versus Collins?\n\nUNIDENTIFIED FEMALE: That's a really good question. I'm a Democrat, but I voted for Susan Collins several times, because I think that she does care about the state of Maine. But it's going to be a real problem for me in November.","translation":"身份不明的女性：那么，如果十一月是普拉特纳对阵柯林斯，你会怎么做？\n\n身份不明的女性：这真是个很好的问题。我是民主党人，但我多次投票给苏珊·柯林斯，因为我认为她确实关心缅因州。但十一月对我来说将是一个真正的问题。"},{"paragraph":"CORNISH: So, today in the group chat, Mike Leon, host of the \"Can We Please Talk\" podcast; Jared Stepman, columnist with \"The Daily Signal\"; and Max Rose, former Democratic congressman from New York.","translation":"科尼什：所以，今天在群聊中，有《我们能谈谈吗》播客主持人迈克·莱昂；《每日信号》专栏作家贾里德·斯特普曼；以及前纽约州民主党众议员马克斯·罗斯。"},{"paragraph":"And Max, I'm actually going to start with you, because you're with VoteVets, which means you guys had a dog in the fight in this race. You guys have been giving a lot of money across the country.","translation":"马克斯，我实际上要从你开始，因为你在VoteVets，这意味着你们在这场竞选中有利害关系。你们在全国各地投入了大量资金。"},{"paragraph":"And what is it? Let me just show what -- what's at stake here.\n\nDemocrats' chances of flipping the Maine Senate seat. It was pretty good. Maybe this has jeopardized it. We're going to show people a chart while you're talking so you can see what's at stake.","translation":"是什么？让我展示一下——这里的关键是什么。\n\n民主党翻转缅因州参议院席位的机会。本来相当不错。也许这已经危及到了。我们会在你说话时向人们展示一张图表，这样你就能看到利害关系。"},{"paragraph":"Is this race as close as you all hoped it would be, now that Graham has struggled with these scandals?","translation":"既然格雷厄姆因这些丑闻而挣扎，这场竞选是否像你们所有人希望的那样接近？"},{"paragraph":"MAX ROSE (D), FORMER NEW YORK CONGRESSMAN: The race is always going to be close. Because --","translation":"马克斯·罗斯（民主党），前纽约州众议员：这场竞选总是会很接近。因为——"},{"paragraph":"CORNISH: Not with a five-term senator, it's not. A lot of times it can be a blowout, right? Like what -- how do you look at what he needs to accomplish?","translation":"科尼什：面对一位连任五届的参议员，不会。很多时候可能是一边倒，对吧？比如——你怎么看他需要完成什么？"},{"paragraph":"ROSE: Well, I think that we're saying the same thing --\n\nROSE: -- in essence, right? Susan Collins is tough to beat.","translation":"罗斯：嗯，我认为我们说的是同一件事——\n\n罗斯：——本质上，对吧？苏珊·柯林斯很难击败。"},{"paragraph":"What I would say about the Susan Collins race is that we've seen in the past, is you're not going to win this seat by electing a Susan Collins light or putting forward a Susan Collins light in a race.","translation":"关于苏珊·柯林斯的竞选，我想说的是，我们过去看到的是，你不会通过选出一个“苏珊·柯林斯轻量版”或在竞选中推出一个“苏珊·柯林斯轻量版”来赢得这个席位。"},{"paragraph":"You are going to beat her by energizing your base, particularly in a midterm election.","translation":"你要通过激励你的基本盘来击败她，尤其是在中期选举中。"},{"paragraph":"There is no doubt, though, that this election has got to be a referendum on Susan Collins: on the ways in which she has voted to empower Donald Trump; on her refusal to hold Donald Trump accountable; on the ways in which she has said, I might be fair, but I want to take healthcare away from millions of people. Says the right thing often; does the wrong thing very frequently.","translation":"不过，毫无疑问，这次选举必须是对苏珊·柯林斯的一次公投：关于她投票支持唐纳德·特朗普的方式；关于她拒绝追究唐纳德·特朗普责任的方式；关于她所说的，我可能公平，但我想剥夺数百万人的医保。经常说正确的话；但经常做错误的事。"},{"paragraph":"CORNISH: Yes. So, this is very much the message we hear over and over again. And I love that Platner in front of him, it said, \"They don't know Maine.\" You know what I mean? Usually not his own name, not a bunch of other things. It was like, hello, media, this one is for you.","translation":"科尼什：是的。所以，这正是我们反复听到的信息。我喜欢普拉特纳在他面前说的，“他们不了解缅因州。”你明白我的意思吗？通常不是他自己的名字，不是一堆其他东西。就像，你好，媒体，这个是给你的。"},{"paragraph":"I want to play two clips back-to-back, because it sort of, I think, represents something of this race.\n\nFirst, I'm going to play for you J.D. Vance and how he talks about Susan Collins. And then I'm going to play AOC and how she's talking about Platner. You tell me how you hear the tone of these.","translation":"我想连续播放两段视频，因为我认为这代表了这场竞选的某些方面。\n\n首先，我将播放J.D.万斯谈论苏珊·柯林斯的片段。然后我将播放AOC谈论普拉特纳的片段。你告诉我你如何听出这些的语气。"},{"paragraph":"J.D. VANCE (R), U.S. VICE PRESIDENT: Here's the thing I'll say about Susan Collins, is sometimes I get frustrated with Susan Collins. I almost wish that she was more partisan.\n\nBut the thing I love about Susan is she is independent, because Maine is an independent state. And frankly, if she was as partisan as I sometimes wish that she was, she would not be a good fit for the people of Maine.\n\nSo, let's give a shout-out to Susan Collins, who's doing a great job.","translation":"J.D.万斯（共和党），美国副总统：关于苏珊·柯林斯，我要说的是，有时我对苏珊·柯林斯感到沮丧。我几乎希望她更党派化一些。\n\n但我喜欢苏珊的一点是她很独立，因为缅因州是一个独立的州。坦率地说，如果她像我有时希望的那样党派化，她就不适合缅因州的人民。\n\n所以，让我们向苏珊·柯林斯致敬，她做得很好。"},{"paragraph":"OCASIO-CORTEZ: When it comes to the substance of this reporting, obviously, there's a lot in that behavior that's really challenging. It's hard to stomach, you know, in some of it.\n\nBut -- but at the end of the day, I think that this is a choice. If that choice on the ballot is between that and a senator who's voted to take healthcare away from millions of Americans, that's the situation that we have to weigh.","translation":"奥卡西奥-科尔特斯：当谈到这份报道的实质内容时，显然，那种行为中有很多确实具有挑战性。有些部分难以接受，你知道。\n\n但——但归根结底，我认为这是一个选择。如果选票上的选择是在那和一位投票剥夺数百万美国人医保的参议员之间，那就是我们必须权衡的情况。"},{"paragraph":"CORNISH: I played these, because one is like, it's hard to stomach. And the other is like, I get frustrated. Shout-out though, anyway, because I guess Maine. And I was, like, these are not ringing endorsements.","translation":"科尼什：我播放这些，因为一个像是难以接受。另一个像是感到沮丧。不过还是致敬，因为我想是缅因州。我当时想，这些都不是响亮的支持。"},{"paragraph":"MIKE LEON, HOST, \"CAN WE PLEASE TALK?\" PODCAST: But Audie, not only are they not ringing endorsements, the voter that we played in the package before listen to her tone. Maine independents are the second largest party in Maine.","translation":"迈克·莱昂，《我们能谈谈吗》播客主持人：但是奥黛，它们不仅是非响亮的支持，我们之前播放的片段中的那位选民，听听她的语气。缅因州的独立人士是缅因州第二大政党。"},{"paragraph":"CORNISH: Yes. And a woman, in particular.\n\nLEON: And a woman and a Democrat who said she voted for Susan Collins, against her will, it sounded like, from that thing.","translation":"科尼什：是的。尤其是一位女性。\n\n莱昂：一位女性和一位民主党人，她说她投票给了苏珊·柯林斯，听起来像是违背了她的意愿。"},{"paragraph":"So -- but those are -- those are some of the things that we're going to have to consider now. It's really about the character quality is what something that Graham Platner has been trying to say: Forget about that. I'm from here. It's how she's voted, to Max's point.","translation":"所以——但那些是——那些是我们现在必须考虑的一些事情。这实际上关乎品格质量，这是格雷厄姆·普拉特纳一直试图说的：忘掉那个。我来自这里。重要的是她如何投票，正如马克斯所说。"},{"paragraph":"LEON: But then also you hear the voters, and they're, like, a little, still unsure because of those character issues with Platner. So, it's going to be really interesting.","translation":"莱昂：但随后你也听到选民们，他们有点，仍然不确定，因为普拉特纳的那些品格问题。所以，这将非常有趣。"},{"paragraph":"CORNISH: And he's been telling a story for a while of, like, you know, I was -- went through difficult times. Now I'm a person who has changed.","translation":"科尼什：他一直在讲述一个故事，比如，你知道，我——经历了困难时期。现在我是一个改变了的人。"},{"paragraph":"I want to ask one more thing. Collins and Trump, that's not a tight bond. OK? Can I just put it that way? Here's a list I'm going to play for you. Just some moments over the past couple of months where you hear her talking around Trump policies and where she stands on them.","translation":"我想再问一件事。柯林斯和特朗普，那不是紧密的联系。好吗？我可以这么说吗？这里有一个列表，我将播放给你。只是过去几个月的一些时刻，你听到她谈论特朗普政策以及她对这些政策的立场。"},{"paragraph":"(BEGIN VIDEO CLIP) SEN. SUSAN COLLINS (R-ME): The 60 days is a trigger. After 60 days, in\n\nmy view, the president has to obtain congressional approval or Congress can block it.\n\nI do not believe that individuals who were convicted of violence against police officers on January 6th should be entitled to reimbursement for their legal fees.\n\nConcerned about the cuts in Medicaid and the impact on my state, but other states, as well.\n\nI've talked with the secretary of homeland security. I have strongly recommended to her that there be a pause on the enforcement surge in both Maine and in Minnesota.","translation":"（视频片段开始）参议员苏珊·柯林斯（缅因州共和党）：60天是一个触发点。60天后，在我看来，总统必须获得国会批准，否则国会可以阻止它。\n\n我不认为那些因1月6日对警察实施暴力而被定罪的人应该有权报销他们的法律费用。\n\n担心医疗补助的削减对我州的影响，但也对其他州的影响。\n\n我已经与国土安全部部长谈过。我强烈建议她在缅因州和明尼苏达州暂停执法激增。"},{"paragraph":"CORNISH: Now, I've chased her in the hallways before, too. She often ends up voting with Republicans, whatever that party line is.\n\nBut is Trump going to get involved in this simply because of what's at stake with the Senate? Or is he going to send surrogates? He'll be like, OK, J.D., you go there? Like, can she expect any support there?","translation":"科尼什：现在，我以前也在走廊里追过她。她最终经常投票支持共和党，无论党派路线是什么。\n\n但特朗普会仅仅因为参议院的利害关系而介入吗？还是他会派代理人？他会说，好的，J.D.，你去那里？比如，她能期待那里的任何支持吗？"},{"paragraph":"JARRETT STEPMAN, COLUMNIST, \"THE DAILY SIGNAL\": Yes, I feel that's why he sent J.D. and I feel he will, if he's smart, actually keep some distance from this. I mean part of the -- the thing at stake here is that they're independent. Maine is a little bit different.","translation":"贾里德·斯特普曼，《每日信号》专栏作家：是的，我觉得这就是他派J.D.的原因，而且我觉得如果他聪明的话，实际上会与此保持一些距离。我的意思是部分——这里的关键是他们独立。缅因州有点不同。"},{"paragraph":"I mean, both these candidates come from sort of -- almost independent of the party.\n\nSTEPMAN: Because they -- they really focus on the issues related to Maine.","translation":"我的意思是，这两位候选人都来自某种——几乎独立于政党。\n\n斯特普曼：因为他们——他们真正关注与缅因州相关的问题。"},{"paragraph":"CORNISH: We should say, Platner is recruiting from outside the party. Yes.\n\nSTEPMAN: Exactly. So, they're both sort of weirdly outsiders, even though Collins has been Republican part of the party for a long time, she's always struck an independent game this entire time.","translation":"科尼什：我们应该说，普拉特纳是从党外招募的。是的。\n\n斯特普曼：正是。所以，他们俩都有点奇怪地是局外人，尽管柯林斯长期以来一直是共和党的一部分，但她一直保持着独立的姿态。"},{"paragraph":"So, I think that's going to continue during this race. That is her path. Because if she does get too close to Trump, that's going to be the argument saying, whoa, she's too MAGA. She's not -- too much for me, which is more or less a blue state.","translation":"所以，我认为这将在这次竞选中继续。那是她的道路。因为如果她确实与特朗普走得太近，那就会成为争论点，说，哇，她太MAGA了。她不是——对我来说太过分了，这或多或少是一个蓝州。"},{"paragraph":"CORNISH: So, you're saying there's nothing to be gained there of him coming.\n\nCORNISH: OK, you guys stay with me, because we're going to talk about a couple other states this hour, as well.","translation":"科尼什：所以，你是说他来那里没有什么好处。\n\n科尼什：好的，你们继续听我说，因为我们这个小时还要讨论其他几个州。"},{"paragraph":"We're also still waiting for news about some sort of proposed deal with Iran. But in the meantime, the U.S. has launched new strikes against Iran overnight.","translation":"我们还在等待关于某种与伊朗拟议协议的消息。但与此同时，美国在夜间对伊朗发动了新的打击。"},{"paragraph":"Plus, Epstein's former assistant testifies before Congress. What she says she did not see.\n\nAnd a Texas teenager convicted of killing a rival track star. Why the jury rejected his claim of self-defense.","translation":"另外，爱泼斯坦的前助理在国会作证。她说她没有看到什么。\n\n还有一名德克萨斯州青少年因杀害一名对手田径明星而被定罪。为什么陪审团驳回了他的自卫主张。"},{"paragraph":"UNIDENTIFIED MALE: It's just sad that it had to come to this. It was just a bad, bad decision he made.","translation":"身份不明的男性：真遗憾事情发展到这一步。他只是做了一个非常糟糕的决定。"},{"paragraph":"CORNISH: Right now, we are following the latest round of escalation between the U.S. and Iran. U.S. CENTRAL COMMAND saying they are now finished hitting targets in Iran in response to an Army helicopter getting shot down over the Strait of Hormuz.","translation":"科尼什：现在，我们正在关注美国和伊朗之间最新一轮的升级。美国中央司令部表示，他们现已完成对伊朗目标的打击，以回应一架陆军直升机在霍尔木兹海峡上空被击落。"},{"paragraph":"Iran's state media, however, released new video overnight, saying they retaliated to the U.S. by attack -- by launching missiles against targets in Bahrain and Kuwait and an air base in Jordan.","translation":"然而，伊朗国家媒体在夜间发布了新视频，称他们通过向巴林、科威特的目标以及约旦的一个空军基地发射导弹来报复美国。"},{"paragraph":"Joining me now with the latest, CNN international correspondent Paula Hancocks in Abu Dhabi.\n\nPaula, can you talk about this? We know Iran, throughout the last couple of weeks, has -- they've tried to spread the war throughout the region. What have you heard from officials in Kuwait or Bahrain about confirmed damage?","translation":"现在连线CNN国际记者保拉·汉考克斯，她在阿布扎比带来最新消息。\n\n保拉，你能谈谈这个吗？我们知道伊朗在过去几周里一直试图将战争蔓延到整个地区。你从科威特或巴林官员那里听到了关于确认损失的消息吗？"},{"paragraph":"PAULA HANCOCKS, CNN INTERNATIONAL CORRESPONDENT: The next few hours are going to be crucial as to whether or not this is an isolated escalation between the U.S. and Iran, or whether it is a step on the escalatory ladder.","translation":"保拉·汉考克斯，CNN国际记者：接下来的几个小时将至关重要，以确定这是美国和伊朗之间的孤立升级，还是升级阶梯上的一步。"},{"paragraph":"Now, at this point, we have not heard any damage assessment or casualty figures from those countries which were targeted by Iran. That is, Jordan, Kuwait, and Bahrain.","translation":"目前，我们还没有听到来自伊朗目标国家的任何损失评估或伤亡数字。即约旦、科威特和巴林。"},{"paragraph":"Iran said that it had targeted the fifth fleet headquarters in Bahrain. They also say that they targeted a military base in Jordan, Kuwait, as well, saying that it was intercepting incoming aerial missiles and drones.","translation":"伊朗表示，他们瞄准了巴林的第五舰队总部。他们还表示，他们瞄准了约旦、科威特的一个军事基地，称其正在拦截来袭的空中导弹和无人机。"},{"paragraph":"So, what we've heard from Iran's side is that they have said that there will -- no attack will go unanswered from the United States. What we had seen from U.S. CENTRAL COMMAND is they said they had\n\ncarried out what they called a, quote, \"proportional response\" to the shooting down of that Apache helicopter, saying that there were three locations along the Strait of Hormuz that were targeted.","translation":"所以，我们从伊朗方面听到的是，他们表示——任何攻击都不会不得到美国的回应。我们从美国中央司令部看到的是，他们表示他们对那架阿帕奇直升机被击落进行了他们所谓的“相称回应”，称霍尔木兹海峡沿岸的三个地点成为目标。"},{"paragraph":"They say that they hit air defense, ground control stations, radar sites, as well.\n\nNow, one U.S. official telling CNN that this was really intended to be a warning to Iran, and they do hope that they will still be able to keep the talks on track, that it won't hinder those talks, although we've heard from Iran's foreign ministry spokesperson that Iran is reviewing negotiations at this point, accusing the U.S. of negotiating in bad faith, Audie.","translation":"他们说他们击中了防空、地面控制站、雷达站点等。\n\n现在，一位美国官员告诉CNN，这实际上是为了向伊朗发出警告，他们确实希望仍能保持谈判顺利进行，不会阻碍这些谈判，尽管我们从伊朗外交部发言人那里听到，伊朗正在审查谈判，指责美国谈判不诚信，奥黛。"},{"paragraph":"CORNISH: OK. That's Paula Hancocks with that update. Thank you so much.\n\nIt is now 17 minutes past the hour. I want to give you your morning roundup.","translation":"科尼什：好的。这是保拉·汉考克斯带来的最新消息。非常感谢。\n\n现在是整点过后17分钟。我想给你带来早间简报。"},{"paragraph":"Happening today, the House Oversight Committee will hear from Microsoft billionaire Bill Gates behind closed doors. He's scheduled to testify about his professional relationship with Jeffrey Epstein.\n\nGates has not been accused of wrongdoing.","translation":"今天发生的事，众议院监督委员会将闭门听取微软亿万富翁比尔·盖茨的证词。他计划就他与杰弗里·爱泼斯坦的职业关系作证。\n\n盖茨未被指控有不当行为。"},{"paragraph":"Meanwhile, Epstein's former assistant, Lesley Groff, testified on Tuesday, saying that she, quote, \"never witnessed anything improper or illegal.\"\n\nShe also told lawmakers she arranged multiple calls between Epstein and Donald Trump before he was president. President Trump is not accused of any wrongdoing in connection to Epstein.","translation":"与此同时，爱泼斯坦的前助理莱斯利·格罗夫周二作证，称她“从未目睹任何不当或非法行为”。\n\n她还告诉立法者，她在特朗普成为总统前安排了爱泼斯坦和唐纳德·特朗普之间的多次通话。特朗普总统未被指控与爱泼斯坦有任何不当行为。"},{"paragraph":"And in Texas, a teen who fatally stabbed a 17-year-old track athlete from a rival team has been convicted of murder and sentenced to 35 years in prison.\n\nA jury rejected Karmelo Anthony's claims of self-defense during a confrontation with Austin Metcalf in the stadium bleachers last year.","translation":"在德克萨斯州，一名刺死对手队17岁田径运动员的青少年被判谋杀罪，判处35年监禁。\n\n陪审团驳回了卡梅洛·安东尼在去年与奥斯汀·梅特卡夫在体育场看台对峙时的自卫主张。"},{"paragraph":"UNIDENTIFIED MALE: It's just sad that it had to come to this. It was just a bad, bad decision he made. But he took a life. And it's unfortunate that two young lives are affected so negatively about this.","translation":"身份不明的男性：真遗憾事情发展到这一步。他只是做了一个非常糟糕的决定。但他夺走了一条生命。不幸的是，两个年轻的生命因此受到如此负面的影响。"},{"paragraph":"CORNISH: Anthony did not testify. His mother took the stand during the sentencing phase, telling jurors her son was sorry.","translation":"科尼什：安东尼没有作证。他的母亲在量刑阶段出庭，告诉陪审员她的儿子很抱歉。"},{"paragraph":"And CNN now projecting Republican Steve Hilton will advance to the November election in the California governor's race against Democrat Xavier Becerra.\n\nBecerra, the former health secretary, finished on top with nearly 28 percent of the vote, three points ahead of Hilton, a former FOX News host who has President Trump's endorsement.","translation":"CNN现在预测共和党人史蒂夫·希尔顿将进入加州州长竞选的十一月选举，对阵民主党人泽维尔·贝塞拉。\n\n前卫生部长贝塞拉以近28%的得票率位居榜首，领先前福克斯新闻主持人、获得特朗普总统支持的希尔顿三个百分点。"},{"paragraph":"STEVE HILTON (R), CALIFORNIA GUBERNATORIAL CANDIDATE; Californians will have a real choice for change in November. Whether they want to keep going with the policies that have brought us to the highest poverty rate, the highest unemployment rate, the highest cost of living in the country, where they want more of that with Xavier Becerra, or whether they want to go in a new direction.","translation":"史蒂夫·希尔顿（共和党），加州州长候选人：加州人在十一月将有一个真正的变革选择。他们是希望继续推行那些导致我们国家最高贫困率、最高失业率、最高生活成本的政策，他们是否想要泽维尔·贝塞拉带来的更多同样情况，还是他们想要走向新的方向。"},{"paragraph":"CORNISH: I have to ask quickly: if Hilton does well, is California still going to be the corrupt election state that Republicans are saying it is?","translation":"科尼什：我必须快速问一下：如果希尔顿表现良好，加州还会是共和党人所说的腐败选举州吗？"},{"paragraph":"STEPMAN: Yes. I mean, the question is how well, of course. How much can he actually make some --","translation":"斯特普曼：是的。我的意思是，问题当然是他表现有多好。他实际上能取得多少——"},{"paragraph":"CORNISH: Is there a certain threshold after which --\n\nCORNISH: -- it's no longer considered corrupt if a Republican wins?","translation":"科尼什：是否存在某个门槛，之后——\n\n科尼什：——如果共和党人获胜，就不再被认为是腐败？"},{"paragraph":"STEPMAN: Well, you know, you know what? Especially given the state, it'll depend on how the votes are counted. I feel that especially after the next --","translation":"斯特普曼：嗯，你知道，你知道吗？特别是考虑到这个州，这将取决于选票如何计算。我觉得尤其是在下一次——"},{"paragraph":"LEON: I knew that answer.","translation":"莱昂：我就知道那个答案。"},{"paragraph":"CORNISH: Yes. But you can see why I'm asking, right? Like, if he wins, it's fine. But if he doesn't win, it's corrupt.","translation":"科尼什：是的。但你能看出我为什么问，对吧？比如，如果他赢了，那就没问题。但如果他没赢，那就是腐败。"},{"paragraph":"CORNISH: But if he wins, it's still corrupt, but somehow --\n\nROSE: Maybe, maybe. I think it's still fairly unlikely that he's going to win this race. I will also say that it's been the process in California taking so long to discover who --","translation":"科尼什：但如果他赢了，它仍然是腐败的，但不知何故——\n\n罗斯：也许，也许。我认为他赢得这场竞选的可能性仍然相当小。我还要说，加州的过程花了这么长时间才发现谁——"},{"paragraph":"CORNISH: Yes, everyone's talking about that.\n\nROSE: -- is going to win it. Everybody's talking about this.","translation":"科尼什：是的，每个人都在谈论这个。\n\n罗斯：——会赢。每个人都在谈论这个。"},{"paragraph":"CORNISH: But everyone's disagreeing on what that means.\n\nCORNISH: That's by definition nefarious.","translation":"科尼什：但每个人都在那意味着什么上意见不一。\n\n科尼什：那从定义上就是邪恶的。"},{"paragraph":"ROSE: But it makes people uncomfortable with the results.","translation":"罗斯：但这让人们对结果感到不舒服。"},{"paragraph":"CORNISH: I have to mention one other thing, just because the number's astounding. Tom Steyer's spending: 215 million.\n\nI'm not good at long division, so I didn't want to know how much per voter that spend was, and I can't do it. I can't do it. And someone on -- online was saying, oh, have you ever heard of effective altruism, and that this was ineffective altruism, basically.","translation":"科尼什：我必须提另一件事，只是因为数字惊人。汤姆·斯泰尔的支出：2.15亿美元。\n\n我不擅长长除法，所以我不想知道每个选民花了多少钱，我算不出来。我算不出来。网上有人说，哦，你听说过有效利他主义吗，这基本上就是无效利他主义。"},{"paragraph":"LEON: Basically, an ROI in the business term, right? You need a return on that investment.\n\nThis is twice for Steyer now. He has not gotten that ROI. When is enough, enough?\n\nIf I had that kind of money, I would invest it in something else. He has tried this political acumen.","translation":"莱昂：基本上，用商业术语来说就是投资回报率，对吧？你需要那笔投资有回报。\n\n这已经是斯泰尔第二次了。他没有得到那个投资回报率。什么时候才够？\n\n如果我有那么多钱，我会投资到别的东西上。他尝试了这种政治敏锐度。"},{"paragraph":"LEON: It has not worked out.\n\nCORNISH: Yes. I was about to say --\n\nLEON: Voters have said that.","translation":"莱昂：没有成功。\n\n科尼什：是的。我正要——\n\n莱昂：选民们已经说了。"},{"paragraph":"CORNISH: The voters have rejected it.\n\nLEON: Especially with the billionaire. When the billionaire class. We've got AOC and others that have talked about the billionaire class, and we have somebody here spending his own money like this, it seems like a waste where it could be invested in other.","translation":"科尼什：选民们已经拒绝了。\n\n莱昂：尤其是亿万富翁。当亿万富翁阶层。我们有AOC和其他人谈论过亿万富翁阶层，而我们这里有人这样花自己的钱，这似乎是一种浪费，本可以投资到其他地方。"},{"paragraph":"CORNISH: Well, it's been a wild race coming from last year to all of a sudden have Becerra at the front.\n\nCORNISH: We couldn't have seen that then.\n\nCORNISH: Now, after the break on CNN THIS MORNING, two controversial to win? So, the Colorado frontrunner for governor claims he killed a man when he was 7 years old. I have more stories like that from him.","translation":"科尼什：嗯，从去年开始，这是一场疯狂的竞选，突然之间贝塞拉领先了。\n\n科尼什：我们当时无法预见。\n\n科尼什：现在，在CNN今晨节目休息之后，两个有争议的获胜者？科罗拉多州州长竞选的领跑者声称他7岁时杀了一个人。我还有很多关于他的类似故事。"},{"paragraph":"Plus, A.I. companies are rushing to the stock market. Is it the next tech boom or is the A.I. bubble about to burst?\n\nAnd for viewers watching us from right here in New York City, Knicks versus Spurs again tonight at the Garden. Good morning.","translation":"另外，人工智能公司纷纷涌入股市。这是下一个科技繁荣还是人工智能泡沫即将破裂？\n\n对于在纽约市观看我们节目的观众，今晚尼克斯队将在花园球场再次对阵马刺队。早上好。"},{"paragraph":"CORNISH: So, a bunch of IPOs in the A.I. sector are about to hit Wall Street after OpenAI announced on Monday it filed for an initial public offering, an IPO.\n\nThe three biggest A.I. companies are now in line to go public, as well. That includes Anthropic and SpaceX. A fourth, Perplexity, is expected to file in 2028.","translation":"科尼什：所以，在OpenAI周一宣布提交首次公开募股（IPO）申请后，人工智能领域的一批IPO即将登陆华尔街。\n\n三家最大的人工智能公司现在也排队上市。其中包括Anthropic和SpaceX。第四家Perplexity预计将在2028年提交申请。"},{"paragraph":"DONALD TRUMP, U.S. PRESIDENT: We're talking about it. Where the American people can benefit from the success of A.I. And by doing that, they're going to like it better. Because we're leading China. We're leading everybody in the world with A.I., and we want to keep it that way. It's like you make them a partnership in this revolution. It would be a beautiful thing.","translation":"唐纳德·特朗普，美国总统：我们正在讨论。美国人民可以从人工智能的成功中受益。通过这样做，他们会更喜欢它。因为我们领先中国。我们在人工智能方面领先全世界，我们想保持这种状态。这就像你让他们成为这场革命的合作伙伴。这将是一件美好的事情。"},{"paragraph":"CORNISH: Now, investors who get in early could make a fortune. But has the A.I. boom gotten ahead of itself?\n\nMadison Mills joins the group chat. She's the senior A.I. reporter at Axios. You guys have done some fantastic reporting on this industry.","translation":"科尼什：现在，早期入场的投资者可以赚大钱。但人工智能热潮是否超前了？\n\n麦迪逊·米尔斯加入群聊。她是Axios的高级人工智能记者。你们对这个行业做了一些精彩的报道。"},{"paragraph":"Just to show people the amount of money at stake. When you look at OpenAI and SpaceX and Anthropic, there were 3.5 trillion. We dug around, and we found out that's, like, as much money as, you know, France. Like, OK? So, we're dealing with a lot of money.\n\nBut is it a bubble? And I ask because we've got some people on TikTok who think that it is. I'm going to play for you, the finance experts online.","translation":"只是为了向人们展示涉及的资金量。当你看到OpenAI、SpaceX和Anthropic时，有3.5万亿美元。我们四处挖掘，发现这相当于法国的资金量，你知道。就像，好吗？所以，我们面对的是大量资金。\n\n但这是泡沫吗？我问是因为TikTok上有些人认为它是。我将为你播放网上的金融专家。"},{"paragraph":"UNIDENTIFIED MALE: A.I. companies are now trying to save themselves by applying for IPOs.\n\nUNIDENTIFIED MALE: OpenAI and Anthropic plan to have IPOs at release before the end of this year, signaling to me that the A.I. bubble is about to pop and that these insiders and institutional investors know that they better cash out now, or they may not ever get the chance.","translation":"身份不明的男性：人工智能公司现在正试图通过申请IPO来拯救自己。\n\n身份不明的男性：OpenAI和Anthropic计划在今年年底前进行IPO，这向我表明人工智能泡沫即将破裂，这些内部人士和机构投资者知道他们最好现在套现，否则可能再也没有机会了。"},{"paragraph":"CORNISH: Why is this the word on the street?\n\nMADISON MILLS, SENIOR A.I. REPORTER, AXIOS: Yes, I would push back on a lot of the financial finfluencing that we hear about on finance.","translation":"科尼什：为什么这是街上的说法？\n\n麦迪逊·米尔斯，Axios高级人工智能记者：是的，我会反驳我们在金融领域听到的许多金融影响。"},{"paragraph":"CORNISH: Finfluencing. You said it. Go on. MILLS: Yes. But -- but just because companies are IPOing doesn't\n\nnecessarily mean that the bubble is going to happen this Friday when SpaceX lists on the NASDAQ.","translation":"科尼什：金融影响。你说出来了。继续。\n\n米尔斯：是的。但——但仅仅因为公司进行IPO并不一定意味着泡沫会在本周五SpaceX在纳斯达克上市时发生。"},{"paragraph":"MILLS: Right? But the concept of the bubble is this idea that valuations are completely divorced from reality: the underlying business fundamentals, the things that we would learn about in journalism and business school --","translation":"米尔斯：对吧？但泡沫的概念是估值完全脱离现实：潜在的业务基本面，我们在新闻和商学院学到的东西——"},{"paragraph":"MILLS: -- that make a company profitable, right?\n\nCORNISH: So, the street phrase would be they're high on their own supply?","translation":"米尔斯：——使公司盈利的东西，对吧？\n\n科尼什：所以，街上的说法是它们自产自销？"},{"paragraph":"MILLS: Absolutely. And that's very clear with a company like SpaceX. Their expected valuation is $1.8 trillion. They're trading at about 90 times their sales -- not their profits, just their sales -- as of this Friday, when they're expected to list.","translation":"米尔斯：绝对。这在像SpaceX这样的公司非常明显。他们的预期估值为1.8万亿美元。截至本周五他们预计上市时，他们的交易价格约为销售额的90倍——不是利润，只是销售额。"},{"paragraph":"So, that is an example of a company you might look at and say, not sure if the valuation is high.\n\nCORNISH: I know. There's also this thing I've been learning about circular financing.","translation":"所以，这是一个例子，你可能会看着一家公司说，不确定估值是否高。\n\n科尼什：我知道。还有我一直在学习的循环融资。"},{"paragraph":"CORNISH: So, I'm understanding this as, you use money from one A.I. company to do work in your A.I. company. and then another A.I. company gets work from you. It's like the same money going around and around. Do I have that right?","translation":"科尼什：所以，我的理解是，你用一家人工智能公司的钱在你的公司工作。然后另一家人工智能公司从你那里得到工作。就像同一笔钱在转来转去。我理解得对吗？"},{"paragraph":"MILLS: Absolutely. That's perfect. And part of --\n\nCORNISH: I'm ready to finfluence.\n\nMILLS: You're ready to finfluence. And more than that, you can be the CFO of an A.I. company. You know?","translation":"米尔斯：绝对。完美。而且部分——\n\n科尼什：我准备好金融影响了。\n\n米尔斯：你准备好金融影响了。不仅如此，你可以成为一家人工智能公司的首席财务官。你知道吗？"},{"paragraph":"But part of the problem with that is that Anthropic can -- or OpenAI, any of the A.I. labs, can book that as revenue. And that feeds into that valuation number that we're getting.","translation":"但问题的一部分是，Anthropic或OpenAI，任何人工智能实验室，都可以将其记为收入。这会影响我们得到的估值数字。"},{"paragraph":"But that revenue could also just be money that they are getting from Google, that then they're giving back to Google in the form of compute capacity. And then Google has that compute capacity and is giving it over to another A.I. lab. And so, it's all very circular right now. And that's the concern.","translation":"但那些收入也可能只是他们从谷歌获得的钱，然后他们以计算能力的形式返还给谷歌。然后谷歌拥有这些计算能力，并将其交给另一个人工智能实验室。所以，现在这一切都非常循环。这就是担忧所在。"},{"paragraph":"CORNISH: And it's giving shell game. I'm going to listen to you, because I believe that this market is the future. I understand that, but I think people rightly have questions. [06:30:00]","translation":"科尼什：这就像在玩猜壳游戏。我会听你的，因为我相信这个市场是未来。我理解这一点，但我认为人们有疑问是合理的。[06:30:00]"}],"vocabulary":[{"word":"primary","phonetic":"/ˈpraɪmeri/","pos":"n.","level":"考研","cn":"初选","en":"a preliminary election to appoint delegates to a party conference or to select the candidates for a principal election","excerpt":"Platner Easily Wins Democratic Senate Primary in Maine","example_cn":"普拉特纳轻松赢得缅因州民主党参议院初选"},{"word":"flip","phonetic":"/flɪp/","pos":"v.","level":"六级","cn":"翻转，改变","en":"to change or cause to change position or direction suddenly","excerpt":"Could that cost the party a shot at flipping the Senate this fall?","example_cn":"这会否让该党失去今年秋天翻转参议院的机会？"},{"word":"weigh","phonetic":"/weɪ/","pos":"v.","level":"考研","cn":"权衡","en":"to consider carefully the relative importance or value of something","excerpt":"that's the situation that we have to weigh.","example_cn":"那就是我们必须权衡的情况。"},{"word":"ceasefire","phonetic":"/ˈsiːsfaɪər/","pos":"n.","level":"六级","cn":"停火","en":"a temporary suspension of fighting, typically one during which peace talks take place","excerpt":"Will the strained ceasefire last long enough for the U.S. to deliver that long-promised deal with Iran?","example_cn":"紧张的停火能否持续足够长的时间，让美国兑现与伊朗长期承诺的协议？"},{"word":"convicted","phonetic":"/kənˈvɪktɪd/","pos":"adj.","level":"考研","cn":"已被定罪的","en":"having been declared guilty of a criminal offense by the verdict of a jury or the decision of a judge","excerpt":"his links to the late convicted sex offender.","example_cn":"他与已故被定罪性犯罪者的联系。"},{"word":"gubernatorial","phonetic":"/ˌɡuːbərnəˈtɔːriəl/","pos":"adj.","level":"专八","cn":"州长的","en":"relating to a governor, especially of a state","excerpt":"Victor Marx (R), Colorado Gubernatorial Candidate","example_cn":"维克多·马克斯（共和党），科罗拉多州州长候选人"},{"word":"frontrunner","phonetic":"/ˈfrʌntrʌnər/","pos":"n.","level":"六级","cn":"领跑者","en":"the contestant that is leading in a race or competition","excerpt":"Meet the frontrunner in the Republican race for governor of Colorado.","example_cn":"来认识一下科罗拉多州共和党州长竞选的领跑者。"},{"word":"bubble","phonetic":"/ˈbʌbl/","pos":"n.","level":"考研","cn":"泡沫","en":"a situation in which the price of an asset is inflated beyond its intrinsic value, often leading to a sudden collapse","excerpt":"the A.I. bubble is about to pop.","example_cn":"人工智能泡沫即将破裂。"},{"word":"disillusioned","phonetic":"/ˌdɪsɪˈluːʒnd/","pos":"adj.","level":"六级","cn":"幻灭的","en":"disappointed in someone or something that one discovers to be less good than one had believed","excerpt":"To any of those who feel let down or disappointed or disillusioned","example_cn":"对于任何感到失望、沮丧或幻灭的人"},{"word":"clinch","phonetic":"/klɪntʃ/","pos":"v.","level":"六级","cn":"锁定，赢得","en":"to settle or finalize something, especially a victory or agreement","excerpt":"Moments after clinching the nomination","example_cn":"在锁定提名后不久"},{"word":"spineless","phonetic":"/ˈspaɪnləs/","pos":"adj.","level":"专四","cn":"没有骨气的，软弱的","en":"lacking courage or determination; weak-willed","excerpt":"she has become just as spineless and corrupt as the establishment she now serves.","example_cn":"她已经变得和她现在所服务的建制派一样软弱和腐败。"},{"word":"corrupt","phonetic":"/kəˈrʌpt/","pos":"adj.","level":"考研","cn":"腐败的","en":"having or showing a willingness to act dishonestly in return for money or personal gain","excerpt":"she has become just as spineless and corrupt as the establishment she now serves.","example_cn":"她已经变得和她现在所服务的建制派一样软弱和腐败。"},{"word":"establishment","phonetic":"/ɪˈstæblɪʃmənt/","pos":"n.","level":"考研","cn":"建制派，当权派","en":"a group in a society exercising power and influence over matters of policy or taste, and seen as resisting change","excerpt":"the establishment she now serves.","example_cn":"她现在所服务的建制派。"},{"word":"independent","phonetic":"/ˌɪndɪˈpendənt/","pos":"adj.","level":"考研","cn":"独立的","en":"free from outside control; not subject to another's authority","excerpt":"If you are an independent voice, why do you vote with Donald Trump 95 percent of the time?","example_cn":"如果你是一个独立的声音，为什么你95%的时间都投票支持唐纳德·特朗普？"},{"word":"referendum","phonetic":"/ˌrefəˈrendəm/","pos":"n.","level":"六级","cn":"公投","en":"a general vote by the electorate on a single political question that has been referred to them for a direct decision","excerpt":"this election has got to be a referendum on Susan Collins","example_cn":"这次选举必须是对苏珊·柯林斯的一次公投"},{"word":"empower","phonetic":"/ɪmˈpaʊər/","pos":"v.","level":"考研","cn":"授权，赋予权力","en":"to give someone the authority or power to do something","excerpt":"on the ways in which she has voted to empower Donald Trump","example_cn":"关于她投票支持唐纳德·特朗普的方式"},{"word":"accountable","phonetic":"/əˈkaʊntəbl/","pos":"adj.","level":"六级","cn":"负有责任的","en":"required or expected to justify actions or decisions; responsible","excerpt":"on her refusal to hold Donald Trump accountable","example_cn":"关于她拒绝追究唐纳德·特朗普责任的方式"},{"word":"endorsement","phonetic":"/ɪnˈdɔːrsmənt/","pos":"n.","level":"六级","cn":"支持，背书","en":"an act of giving one's public support to someone or something","excerpt":"these are not ringing endorsements.","example_cn":"这些都不是响亮的支持。"},{"word":"partisan","phonetic":"/ˈpɑːrtɪzn/","pos":"adj.","level":"六级","cn":"党派性的","en":"prejudiced in favor of a particular cause or group","excerpt":"I almost wish that she was more partisan.","example_cn":"我几乎希望她更党派化一些。"},{"word":"surrogate","phonetic":"/ˈsɜːrəɡət/","pos":"n.","level":"专八","cn":"代理人","en":"a person or thing acting as a substitute","excerpt":"Or is he going to send surrogates?","example_cn":"还是他会派代理人？"},{"word":"escalation","phonetic":"/ˌeskəˈleɪʃn/","pos":"n.","level":"六级","cn":"升级","en":"an increase in the intensity or seriousness of something","excerpt":"the latest round of escalation between the U.S. and Iran","example_cn":"美国和伊朗之间最新一轮的升级"},{"word":"retaliate","phonetic":"/rɪˈtælieɪt/","pos":"v.","level":"六级","cn":"报复","en":"to make an attack or assault in return for a similar attack","excerpt":"saying they retaliated to the U.S. by attack","example_cn":"称他们通过攻击来报复美国"},{"word":"proportional","phonetic":"/prəˈpɔːrʃənl/","pos":"adj.","level":"考研","cn":"相称的，成比例的","en":"corresponding in size or amount to something else","excerpt":"a proportional response","example_cn":"相称的回应"},{"word":"testify","phonetic":"/ˈtestɪfaɪ/","pos":"v.","level":"考研","cn":"作证","en":"to give evidence as a witness in a law court","excerpt":"Epstein's former assistant testifies before Congress.","example_cn":"爱泼斯坦的前助理在国会作证。"},{"word":"convicted","phonetic":"/kənˈvɪktɪd/","pos":"v.","level":"考研","cn":"定罪","en":"to declare someone guilty of a criminal offense","excerpt":"a Texas teenager convicted of killing a rival track star","example_cn":"一名德克萨斯州青少年因杀害一名对手田径明星而被定罪"},{"word":"self-defense","phonetic":"/ˌself dɪˈfens/","pos":"n.","level":"六级","cn":"自卫","en":"the defense of oneself or one's property, especially through the use of force","excerpt":"Why the jury rejected his claim of self-defense.","example_cn":"为什么陪审团驳回了他的自卫主张。"},{"word":"initial public offering (IPO)","phonetic":"/ɪˈnɪʃl ˈpʌblɪk ˈɔːfərɪŋ/","pos":"n.","level":"六级","cn":"首次公开募股","en":"the first sale of stock by a private company to the public","excerpt":"OpenAI announced on Monday it filed for an initial public offering","example_cn":"OpenAI周一宣布提交首次公开募股申请"},{"word":"valuation","phonetic":"/ˌvæljuˈeɪʃn/","pos":"n.","level":"六级","cn":"估值","en":"an estimation of the worth of something, especially one carried out by a professional valuer","excerpt":"valuations are completely divorced from reality","example_cn":"估值完全脱离现实"},{"word":"circular","phonetic":"/ˈsɜːrkjələr/","pos":"adj.","level":"考研","cn":"循环的","en":"having the form of a circle; moving in a circle","excerpt":"it's all very circular right now.","example_cn":"现在这一切都非常循环。"},{"word":"finfluencing","phonetic":"/fɪnˈfluːənsɪŋ/","pos":"n.","level":"专八","cn":"金融影响（网络用语）","en":"the act of influencing people's financial decisions through social media","excerpt":"I would push back on a lot of the financial finfluencing that we hear about on finance.","example_cn":"我会反驳我们在金融领域听到的许多金融影响。"}],"sentences":[{"en":"If the choice on the ballot is between that and a senator who's voted to take health care away from millions of Americans, that's the situation that we have to weigh.","cn":"如果选票上的选择是在那和一位投票剥夺数百万美国人医保的参议员之间，那就是我们必须权衡的情况。","structure":"条件状语从句 + 主句 + 定语从句","analysis":"If引导条件状语从句，主句为that's the situation，定语从句that we have to weigh修饰situation。"},{"en":"There is no doubt, though, that this election has got to be a referendum on Susan Collins: on the ways in which she has voted to empower Donald Trump; on her refusal to hold Donald Trump accountable; on the ways in which she has said, I might be fair, but I want to take healthcare away from millions of people.","cn":"不过，毫无疑问，这次选举必须是对苏珊·柯林斯的一次公投：关于她投票支持唐纳德·特朗普的方式；关于她拒绝追究唐纳德·特朗普责任的方式；关于她所说的，我可能公平，但我想剥夺数百万人的医保。","structure":"主句 + 同位语从句 + 并列介词短语","analysis":"主句There is no doubt，that引导同位语从句说明doubt的内容，冒号后三个on引导的介词短语并列，具体说明referendum的方面。"},{"en":"What I would say about the Susan Collins race is that we've seen in the past, is you're not going to win this seat by electing a Susan Collins light or putting forward a Susan Collins light in a race.","cn":"关于苏珊·柯林斯的竞选，我想说的是，我们过去看到的是，你不会通过选出一个“苏珊·柯林斯轻量版”或在竞选中推出一个“苏珊·柯林斯轻量版”来赢得这个席位。","structure":"主语从句 + 系动词 + 表语从句","analysis":"What I would say about the Susan Collins race是主语从句，is是系动词，that we've seen in the past是表语从句，is you're not going to...是另一个表语从句，省略了that。"},{"en":"The next few hours are going to be crucial as to whether or not this is an isolated escalation between the U.S. and Iran, or whether it is a step on the escalatory ladder.","cn":"接下来的几个小时将至关重要，以确定这是美国和伊朗之间的孤立升级，还是升级阶梯上的一步。","structure":"主句 + 介词短语 + 并列宾语从句","analysis":"主句The next few hours are going to be crucial，as to引导介词短语，后接whether or not引导的宾语从句和whether引导的宾语从句，由or连接。"},{"en":"But the concept of the bubble is this idea that valuations are completely divorced from reality: the underlying business fundamentals, the things that we would learn about in journalism and business school -- that make a company profitable, right?","cn":"但泡沫的概念是估值完全脱离现实：潜在的业务基本面，我们在新闻和商学院学到的东西——使公司盈利的东西，对吧？","structure":"主句 + 同位语从句 + 并列名词短语 +  governor, Victor Marx, controversy, killing"},{"title":"AI IPOs and Market Bubble","content":"OpenAI、Anthropic和SpaceX等AI公司计划IPO，市场估值达3.5万亿美元。讨论AI泡沫风险、循环融资及估值脱离基本面问题。","keywords":"AI, IPO, OpenAI, Anthropic, SpaceX, bubble, valuation, circular financing"},{"title":"Susan Collins' Voting Record","content":"参议员Susan Collins在特朗普政策上的立场，包括60天触发点、1月6日暴力者法律费用、医疗补助削减及移民执法暂停。她常与共和党投票一致，但保持独立形象。","keywords":"Susan Collins, voting record, Trump, independent, Maine"},{"title":"Maine Independent Voters","content":"缅因州独立选民是第二大政党，对参议员选举至关重要。选民对Platner的品格问题犹豫，部分民主党人曾投票给Collins。","keywords":"Maine, independent voters, Graham Platner, Susan Collins, swing voters"}],"raw_transcript":"Return to Transcripts main page\n\nPlatner Easily Wins Democratic Senate Primary in Maine; U.S. Hits Iran after Helicopter Downed; OpenAI Files for IPO, Joins Anthropic and SpaceX. Aired 6-6:30a ET\n\nAired June 10, 2026 - 06:00   ET\n\nTHIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED.\n\nAUDIE CORNISH, CNN ANCHOR: Today in the group chat, Democrats in Maine vote to stick with Graham Platner. Could that cost the party a shot at flipping the Senate this fall?\n\nREP. ALEXANDRIA OCASIO-CORTEZ (D-NY): If the choice on the ballot is between that and a senator who's voted to take health care away from millions of Americans, that's the situation that we have to weigh.\n\nCORNISH: Missiles light up the sky in the Middle East again. Will the strained ceasefire last long enough for the U.S. to deliver that long- promised deal with Iran?\n\nAnd a big day for the Epstein files. What will Bill Gates tell lawmakers about his links to the late convicted sex offender.\n\nUNIDENTIFIED MALE: Do you think that you've killed people as an adult?\n\nVICTOR MARX (R), COLORADO GUBERNATORIAL CANDIDATE: Does it matter?\n\nCORNISH: This is a candidate who also claims he killed someone as a child. Meet the frontrunner in the Republican race for governor of Colorado.\n\nAnd it's the $3.5 trillion question on Wall Street. Has the A.I. boom gotten ahead of itself?\n\nUNIDENTIFIED MALE: OpenAI and Anthropic plan to have IPOs at release before the end of this year, signaling to me that the A.I. bubble is about to pop.\n\n(END VIDEO CLIP) (BEGIN VIDEO CLIP)\n\nGRAHAM PLATNER (D), MAINE SENATE CANDIDATE: To any of those who feel let down or disappointed or disillusioned, it is my job to earn your trust, faith, and support. And I will spend every day of this campaign. And if I have the privilege every day in the United States Senate doing exactly that.\n\nCORNISH: Graham Platner punches his ticket. But now he's got to convince voters to choose him over a five-term senator.\n\nGood morning everybody. I'm Audie Cornish. Here is where we begin. That big statement out of Maine.\n\nDemocrat Graham Platner, despite all the scandals, earned about three- fourths of primary voters' support over Governor Janet Mills.\n\nMoments after clinching the nomination, he turned his attention to his new opponent, Republican Senator Susan Collins.\n\nPLATNER: Susan Collins may have started -- may have started her career decades ago in Washington with good intentions, but she has become just as spineless and corrupt as the establishment she now serves. If you are an independent voice, why do you vote with Donald Trump 95 percent of the time?\n\nCORNISH: Platner has a lot of work to do to get Mills voters on his side.\n\nUNIDENTIFIED FEMALE: I couldn't honestly support Platner, even though some of the things that he says are really good.\n\nUNIDENTIFIED MALE: I don't think he's ready to be a senator. I'm leaning towards Collins unless the guy shows something else, but I just -- he's not there yet. And --\n\nUNIDENTIFIED FEMALE: And so, what will you do in November if its Platner versus Collins?\n\nUNIDENTIFIED FEMALE: That's a really good question. I'm a Democrat, but I voted for Susan Collins several times, because I think that she does care about the state of Maine. But it's going to be a real problem for me in November.\n\nCORNISH: So, today in the group chat, Mike Leon, host of the \"Can We Please Talk\" podcast; Jared Stepman, columnist with \"The Daily Signal\"; and Max Rose, former Democratic congressman from New York.\n\nAnd Max, I'm actually going to start with you, because you're with VoteVets, which means you guys had a dog in the fight in this race. You guys have been giving a lot of money across the country.\n\nAnd what is it? Let me just show what -- what's at stake here.\n\nDemocrats' chances of flipping the Maine Senate seat. It was pretty good. Maybe this has jeopardized it. We're going to show people a chart while you're talking so you can see what's at stake.\n\nIs this race as close as you all hoped it would be, now that Graham has struggled with these scandals?\n\nMAX ROSE (D), FORMER NEW YORK CONGRESSMAN: The race is always going to be close. Because --\n\nCORNISH: Not with a five-term senator, it's not. A lot of times it can be a blowout, right? Like what -- how do you look at what he needs to accomplish?\n\nROSE: Well, I think that we're saying the same thing --\n\nROSE: -- in essence, right? Susan Collins is tough to beat.\n\nWhat I would say about the Susan Collins race is that we've seen in the past, is you're not going to win this seat by electing a Susan Collins light or putting forward a Susan Collins light in a race.\n\nYou are going to beat her by energizing your base, particularly in a midterm election.\n\nThere is no doubt, though, that this election has got to be a referendum on Susan Collins: on the ways in which she has voted to empower Donald Trump; on her refusal to hold Donald Trump accountable; on the ways in which she has said, I might be fair, but I want to take healthcare away from millions of people. Says the right thing often; does the wrong thing very frequently.\n\nCORNISH: Yes. So, this is very much the message we hear over and over again. And I love that Platner in front of him, it said, \"They don't know Maine.\" You know what I mean? Usually not his own name, not a bunch of other things. It was like, hello, media, this one is for you.\n\nI want to play two clips back-to-back, because it sort of, I think, represents something of this race.\n\nFirst, I'm going to play for you J.D. Vance and how he talks about Susan Collins. And then I'm going to play AOC and how she's talking about Platner. You tell me how you hear the tone of these.\n\nJ.D. VANCE (R), U.S. VICE PRESIDENT: Here's the thing I'll say about Susan Collins, is sometimes I get frustrated with Susan Collins. I almost wish that she was more partisan.\n\nBut the thing I love about Susan is she is independent, because Maine is an independent state. And frankly, if she was as partisan as I sometimes wish that she was, she would not be a good fit for the people of Maine.\n\nSo, let's give a shout-out to Susan Collins, who's doing a great job.\n\nOCASIO-CORTEZ: When it comes to the substance of this reporting, obviously, there's a lot in that behavior that's really challenging. It's hard to stomach, you know, in some of it.\n\nBut -- but at the end of the day, I think that this is a choice. If that choice on the ballot is between that and a senator who's voted to take healthcare away from millions of Americans, that's the situation that we have to weigh.\n\nCORNISH: I played these, because one is like, it's hard to stomach. And the other is like, I get frustrated. Shout-out though, anyway, because I guess Maine. And I was, like, these are not ringing endorsements.\n\nMIKE LEON, HOST, \"CAN WE PLEASE TALK?\" PODCAST: But Audie, not only are they not ringing endorsements, the voter that we played in the package before listen to her tone. Maine independents are the second largest party in Maine.\n\nCORNISH: Yes. And a woman, in particular.\n\nLEON: And a woman and a Democrat who said she voted for Susan Collins, against her will, it sounded like, from that thing.\n\nSo -- but those are -- those are some of th ffrey Epstein.\n\nGates has not been accused of wrongdoing.\n\nMeanwhile, Epstein's former assistant, Lesley Groff, testified on Tuesday, saying that she, quote, \"never witnessed anything improper or illegal.\"\n\nShe also told lawmakers she arranged multiple calls between Epstein and Donald Trump before he was president. President Trump is not accused of any wrongdoing in connection to Epstein.\n\nAnd in Texas, a teen who fatally stabbed a 17-year-old track athlete from a rival team has been convicted of murder and sentenced to 35 years in prison.\n\nA jury rejected Karmelo Anthony's claims of self-defense during a confrontation with Austin Metcalf in the stadium bleachers last year.\n\nUNIDENTIFIED MALE: It's just sad that it had to come to this. It was just a bad, bad decision he made. But he took a life. And it's unfortunate that two young lives are affected so negatively about this.\n\nCORNISH: Anthony did not testify. His mother took the stand during the sentencing phase, telling jurors her son was sorry.\n\nAnd CNN now projecting Republican Steve Hilton will advance to the November election in the California governor's race against Democrat Xavier Becerra.\n\nBecerra, the former health secretary, finished on top with nearly 28 percent of the vote, three points ahead of Hilton, a former FOX News host who has President Trump's endorsement.\n\nSTEVE HILTON (R), CALIFORNIA GUBERNATORIAL CANDIDATE; Californians will have a real choice for change in November. Whether they want to keep going with the policies that have brought us to the highest poverty rate, the highest unemployment rate, the highest cost of living in the country, where they want more of that with Xavier Becerra, or whether they want to go in a new direction.\n\nCORNISH: I have to ask quickly: if Hilton does well, is California still going to be the corrupt election state that Republicans are saying it is?\n\nSTEPMAN: Yes. I mean, the question is how well, of course. How much can he actually make s re it could be invested in other.\n\nCORNISH: Well, it's been a wild race coming from last year to all of a sudden have Becerra at the front.\n\nCORNISH: We couldn't have seen that then.\n\nCORNISH: Now, after the break on CNN THIS MORNING, two controversial to win? So, the Colorado frontrunner for governor claims he killed a man when he was 7 years old. I have more stories like that from him.\n\nPlus, A.I. companies are rushing to the stock market. Is it the next tech boom or is the A.I. bubble about to burst?\n\nAnd for viewers watching us from right here in New York City, Knicks versus Spurs again tonight at the Garden. Good morning.\n\nCORNISH: So, a bunch of IPOs in the A.I. sector are about to hit Wall Street after OpenAI announced on Monday it filed for an initial public offering, an IPO.\n\nThe three biggest A.I. companies are now in line to go public, as well. That includes Anthropic and SpaceX. A fourth, Perplexity, is expected to file in 2028.\n\nDONALD TRUMP, U.S. PRESIDENT: We're talking about it. Where the American people can benefit from the success of A.I. And by doing that, they're going to like it better. Because we're leading China. We're leading everybody in the world with A.I., and we want to keep it that way. It's like you make them a partnership in this revolution. It would be a beautiful thing.\n\nCORNISH: Now, investors who get in early could make a fortune. But has the A.I. boom gotten ahead of itself?\n\nMadison Mills joins the group chat. She's the senior A.I. reporter at Axios. You guys have done some fantastic reporting on this industry.\n\nJust to show people the amount of money at stake. When you look at OpenAI and SpaceX and Anthropic, there were 3.5 trillion. We dug around, and we found out that's, like, as much money as, you know, France. Like, OK? So, we're dealing with a lot of money.\n\nBut is it a bubble? And I ask because we've got some people on TikTok who think that it is. I'm going to play for you, the finance experts onlin w?\n\nBut part of the problem with that is that Anthropic can -- or OpenAI, any of the A.I. labs, can book that as revenue. And that feeds into that valuation number that we're getting.\n\nBut that revenue could also just be money that they are getting from Google, that then they're giving back to Google in the form of compute capacity. And then Google has that compute capacity and is giving it over to another A.I. lab. And so, it's all very circular right now. And that's the concern.\n\nCORNISH: And it's giving shell game. I'm going to listen to you, because I believe that this market is the future. I understand that, but I think people rightly have questions. [06:30:00]","segments":[{"seg":1,"url":"https://transcripts.cnn.com/show/ctmo/date/2026-06-10/segment/01","title":"CNN.com - Transcripts","text":"Return to Transcripts main page\n\nPlatner Easily Wins Democratic Senate Primary in Maine; U.S. Hits Iran after Helicopter Downed; OpenAI Files for IPO, Joins Anthropic and SpaceX. Aired 6-6:30a ET\n\nAired June 10, 2026 - 06:00   ET\n\nTHIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED.\n\nAUDIE CORNISH, CNN ANCHOR: Today in the group chat, Democrats in Maine vote to stick with Graham Platner. Could that cost the party a shot at flipping the Senate this fall?\n\nREP. ALEXANDRIA OCASIO-CORTEZ (D-NY): If the choice on the ballot is between that and a senator who's voted to take health care away from millions of Americans, that's the situation that we have to weigh.\n\nCORNISH: Missiles light up the sky in the Middle East again. Will the strained ceasefire last long enough for the U.S. to deliver that long- promised deal with Iran?\n\nAnd a big day for the Epstein files. What will Bill Gates tell lawmakers about his links to the late convicted sex offender.\n\nUNIDENTIFIED MALE: Do you think that you've killed people as an adult?\n\nVICTOR MARX (R), COLORADO GUBERNATORIAL CANDIDATE: Does it matter?\n\nCORNISH: This is a candidate who let currentData = null;
let currentDate = null;
const LEVEL_COLORS = {
    '考研': '#e68a2e',
    '六级': '#0a58ca',
    '专四': '#6f42c1',
    '专八': '#d6336c'
};

(function init() {
    // 为每个目录项绑定点击事件
    document.querySelectorAll('.directory-item').forEach(item => {
        const date = item.getAttribute('data-date');
        if (date) {
            item.addEventListener('click', () => loadDate(date));
        }
    });
    const latestDate = '2026-06-11';
    if (latestDate && ALL_DATA[latestDate]) {
        loadDate(latestDate);
    } else {
        const firstDate = Object.keys(ALL_DATA)[0];
        if (firstDate) loadDate(firstDate);
    }
})();

function loadDate(date) {
    if (!ALL_DATA[date]) return;
    currentDate = date;
    currentData = ALL_DATA[date];
    document.getElementById('topbarDate').textContent = date;
    renderContent(currentData);
    switchTab('transcript');
    document.querySelectorAll('.directory-item').forEach(item => {
        if (item.getAttribute('data-date') === date) item.classList.add('active');
        else item.classList.remove('active');
    });
}

function renderContent(data) {
    const segments = data.segments || [];
    const vocab = data.vocabulary || [];
    if (!segments.length) {
        document.getElementById('contentContainer').innerHTML = '<div class="empty">暂无内容</div>';
        return;
    }
    const vocabMap = {};
    vocab.forEach(v => { vocabMap[v.word.toLowerCase()] = v; });
    const sortedWords = Object.keys(vocabMap).sort((a,b) => b.length - a.length);
    
    let html = `
        <div class="section active" id="transcriptSection">
            <div class="transcript-wrap">
                <div><div class="transcript-body" id="transcriptBody"></div></div>
                <div><div class="word-panel"><div class="word-panel-title">词汇索引</div><div class="word-list" id="wordList"></div></div></div>
            </div>
        </div>
        <div class="section" id="translationSection">
            <div class="translation-box"><div class="card-label">📖 完整中文翻译</div><div id="fullTranslation"></div></div>
        </div>
        <div class="section" id="vocabSection"><div class="vocab-grid" id="vocabGrid"></div></div>
        <div class="section" id="sentencesSection"><div id="sentenceList"></div></div>
        <div class="section" id="topicsSection"><div id="topicList"></div></div>
    `;
    document.getElementById('contentContainer').innerHTML = html;
    
    // 原文
    let transcriptHtml = '';
    for (let seg of segments) {
        const title = seg.title || `Segment ${seg.seg}`;
        const rawText = seg.text || '';
        const highlighted = highlightWords(rawText, sortedWords, vocabMap);
        transcriptHtml += `<div class="segment-block"><div class="segment-title">📺 ${escapeHtml(title)}</div><div class="para">${highlighted}</div></div>`;
    }
    document.getElementById('transcriptBody').innerHTML = transcriptHtml;
    
    // 词汇索引
    renderWordList(vocab);
    
    // 翻译：只显示中文（不显示英文原文）
    const transDiv = document.getElementById('fullTranslation');
    if (Array.isArray(data.full_translation) && data.full_translation.length) {
        let transHtml = '';
        for (let item of data.full_translation) {
            if (item.translation) {
                transHtml += `<div style="margin-bottom: 1rem;">${escapeHtml(item.translation)}</div>`;
            } else if (item.cn) {
                transHtml += `<div style="margin-bottom: 1rem;">${escapeHtml(item.cn)}</div>`;
            } else {
                transHtml += `<div>${escapeHtml(JSON.stringify(item))}</div>`;
            }
        }
        transDiv.innerHTML = transHtml;
    } else if (typeof data.full_translation === 'string') {
        transDiv.innerHTML = escapeHtml(data.full_translation).replace(/\n/g, '<br>');
    } else {
        transDiv.innerHTML = '暂无全文翻译';
    }
    
    // 词汇卡片、难句、背景
    renderVocabCards(vocab);
    renderSentencesList(data.sentences || []);
    renderTopicsList(data.topics || []);
}

function highlightWords(text, sortedWords, vocabMap) {
    if (!text) return '';
    const positions = [];
    const lc = text.toLowerCase();
    sortedWords.forEach(word => {
        let idx = 0;
        while ((idx = lc.indexOf(word, idx)) !== -1) {
            const before = idx === 0 || !/[a-z]/i.test(text[idx-1]);
            const after = idx+word.length >= text.length || !/[a-z]/i.test(text[idx+word.length]);
            if (before && after) {
                const overlaps = positions.some(p => idx < p.end && idx+word.length > p.start);
                if (!overlaps) positions.push({start:idx, end:idx+word.length, word, vocab:vocabMap[word]});
            }
            idx += word.length;
        }
    });
    if (!positions.length) return escapeHtml(text);
    positions.sort((a,b) => a.start - b.start);
    let result = '', last = 0;
    for (let p of positions) {
        result += escapeHtml(text.slice(last, p.start));
        const lv = p.vocab.level || '';
        let levelClass = '';
        if (lv.includes('考研')) levelClass = '考研';
        else if (lv.includes('六级')) levelClass = '六级';
        else if (lv.includes('专四')) levelClass = '专四';
        else if (lv.includes('专八')) levelClass = '专八';
        else levelClass = lv;
        result += `<span class="hl level-${levelClass}" data-word="${escapeHtml(p.word)}" onclick="showVocabPopup(event, '${escapeHtml(p.word)}')">${escapeHtml(p.word)}</span>`;
        last = p.end;
    }
    result += escapeHtml(text.slice(last));
    return result;
}

function showVocabPopup(e, word) {
    e.stopPropagation();
    const data = currentData?.vocabulary?.find(v => v.word === word);
    if (!data) return;
    document.querySelectorAll('.hl').forEach(el => el.classList.toggle('active', el.dataset.word === word));
    document.querySelectorAll('.word-chip').forEach(el => el.classList.toggle('active', el.dataset.word === word));
    document.getElementById('popupWord').textContent = data.word;
    document.getElementById('popupPhonetic').textContent = data.phonetic || '';
    document.getElementById('popupPos').textContent = data.pos || '';
    document.getElementById('popupLevel').textContent = data.level || '';
    document.getElementById('popupCn').textContent = data.cn || '';
    document.getElementById('popupEn').textContent = data.en || '';
    let excerptText = data.excerpt || data.example || '';
    if (excerptText) {
        document.getElementById('popupExcerpt').innerHTML = `<strong>原文：</strong> ${escapeHtml(excerptText)}<br><strong>译文：</strong> ${escapeHtml(data.example_cn || '')}`;
    } else {
        document.getElementById('popupExcerpt').innerHTML = '';
    }
    const popup = document.getElementById('vocabPopup');
    popup.classList.add('show');
    let x = e.clientX + 12, y = e.clientY + 12;
    if (x + 320 > window.innerWidth) x = e.clientX - 332;
    if (y + 200 > window.innerHeight) y = e.clientY - 210;
    popup.style.left = x + 'px';
    popup.style.top = y + 'px';
}

document.addEventListener('click', e => {
    if (!e.target.classList.contains('hl') && !e.target.closest('.vocab-popup') && !e.target.closest('.word-chip')) {
        document.getElementById('vocabPopup').classList.remove('show');
        document.querySelectorAll('.hl.active').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.word-chip.active').forEach(el => el.classList.remove('active'));
    }
});

function renderWordList(vocab) {
    const container = document.getElementById('wordList');
    if (!container) return;
    container.innerHTML = vocab.map(v => {
        let level = v.level || '';
        let levelKey = '';
        if (level.includes('考研')) levelKey = '考研';
        else if (level.includes('六级')) levelKey = '六级';
        else if (level.includes('专四')) levelKey = '专四';
        else if (level.includes('专八')) levelKey = '专八';
        else levelKey = level;
        const color = LEVEL_COLORS[levelKey] || '#0a58ca';
        return `
            <div class="word-chip" data-word="${escapeHtml(v.word)}" onclick="jumpToWord('${escapeHtml(v.word)}')">
                <span style="display:inline-block; width:8px; height:8px; background:${color}; border-radius:50%; margin-right:6px;"></span>
                <span>${escapeHtml(v.word)}</span>
                <span style="margin-left:8px; color:var(--text2);">${escapeHtml(v.cn || '')}</span>
            </div>
        `;
    }).join('');
}

function jumpToWord(word) {
    switchTab('transcript');
    setTimeout(() => {
        const el = document.querySelector(`.hl[data-word="${word}"]`);
        if (el) { el.scrollIntoView({behavior:'smooth', block:'center'}); el.click(); }
    }, 50);
}

function renderVocabCards(vocab) {
    const container = document.getElementById('vocabGrid');
    if (!container) return;
    container.innerHTML = vocab.map(v => `
        <div class="vcard">
            <div><span class="vword">${escapeHtml(v.word)}</span> <span>${escapeHtml(v.phonetic || '')}</span> <span>${escapeHtml(v.pos || '')}</span> <span>${escapeHtml(v.level || '')}</span></div>
            <div>${escapeHtml(v.cn)}</div>
            <div>${escapeHtml(v.en || '')}</div>
            <div><em>${escapeHtml(v.excerpt || v.example || '')}</em><div>${escapeHtml(v.example_cn || '')}</div></div>
        </div>
    `).join('');
}

function renderSentencesList(sentences) {
    const container = document.getElementById('sentenceList');
    if (!container) return;
    container.innerHTML = sentences.map((s,i) => `
        <div class="scard"><strong>${i+1}.</strong> <div>${escapeHtml(s.en)}</div><div>${escapeHtml(s.cn)}</div><div><em>结构：</em>${escapeHtml(s.structure || '')}</div><div><em>分析：</em>${escapeHtml(s.analysis || '')}</div></div>
    `).join('');
}

function renderTopicsList(topics) {
    const container = document.getElementById('topicList');
    if (!container) return;
    const colors = ['#0a58ca','#d6336c','#146c43','#e68a2e'];
    container.innerHTML = topics.map((t,i) => `
        <div class="tcard"><strong style="color:${colors[i%colors.length]}">${escapeHtml(t.title)}</strong><div>${escapeHtml(t.content)}</div><div>🔑 ${escapeHtml(t.keywords || '')}</div></div>
    `).join('');
}

function switchTab(tabId) {
    const sections = ['transcriptSection', 'translationSection', 'vocabSection', 'sentencesSection', 'topicsSection'];
    const tabMap = { transcript: 0, translation: 1, vocab: 2, sentences: 3, topics: 4 };
    const idx = tabMap[tabId];
    if (idx === undefined) return;
    document.querySelectorAll('.tab').forEach((tab,i) => {
        if (i === idx) tab.classList.add('active');
        else tab.classList.remove('active');
    });
    sections.forEach((id, i) => {
        const el = document.getElementById(id);
        if (el) el.classList.toggle('active', i === idx);
    });
}

function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
}

function openSource() {
    if (currentData?.source_url) window.open(currentData.source_url, '_blank');
}
