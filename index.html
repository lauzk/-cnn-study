<script>
const ALL_DATA = {"2026-06-10":{"date":"2026-06-10","source_url":"https://transcripts.cnn.com/show/ctmo/date/2026-06-10/segment/01","full_translation":[{"en":"CNN This Morning 逐字稿（2026-06-10）：","cn":"CNN This Morning 逐字稿（2026-06-10）："},{"en":"Return to Transcripts main page","cn":"返回文稿主页"},{"en":"Platner Easily Wins Democratic Senate Primary in Maine; U.S. Hits Iran after Helicopter Downed; OpenAI Files for IPO, Joins Anthropic and SpaceX. Aired 6-6:30a ET","cn":"普拉特纳轻松赢得缅因州民主党参议员初选；直升机被击落后美国打击伊朗；OpenAI申请IPO，加入Anthropic和SpaceX。美国东部时间上午6点至6点30分播出。"},{"en":"Aired June 10, 2026 - 06:00   ET","cn":"播出日期：2026年6月10日 - 美国东部时间06:00"},{"en":"THIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED.","cn":"这是速记稿。此副本可能不是最终版本，可能会更新。"},{"en":"AUDIE CORNISH, CNN ANCHOR: Today in the group chat, Democrats in Maine vote to stick with Graham Platner. Could that cost the party a shot at flipping the Senate this fall?","cn":"CNN主播奥黛·科尼什：今天在群聊中，缅因州民主党人投票支持格雷厄姆·普拉特纳。这会令该党失去今年秋天翻转参议院的机会吗？"},{"en":"REP. ALEXANDRIA OCASIO-CORTEZ (D-NY): If the choice on the ballot is between that and a senator who's voted to take health care away from millions of Americans, that's the situation that we have to weigh.","cn":"纽约州民主党众议员亚历山大·奥卡西奥-科尔特斯：如果选票上的选择是在那（指普拉特纳的丑闻）和一位投票剥夺数百万美国人医保的参议员之间，那就是我们必须权衡的情况。"},{"en":"CORNISH: Missiles light up the sky in the Middle East again. Will the strained ceasefire last long enough for the U.S. to deliver that long- promised deal with Iran?","cn":"科尼什：导弹再次照亮中东天空。紧张的停火能否持续足够长的时间，让美国兑现与伊朗长期承诺的协议？"},{"en":"And a big day for the Epstein files. What will Bill Gates tell lawmakers about his links to the late convicted sex offender.","cn":"爱泼斯坦文件迎来重要一天。比尔·盖茨将就他与已故被定罪性犯罪者的联系向立法者说些什么。"},{"en":"UNIDENTIFIED MALE: Do you think that you've killed people as an adult?","cn":"身份不明的男性：你认为你成年后杀过人吗？"},{"en":"VICTOR MARX (R), COLORADO GUBERNATORIAL CANDIDATE: Does it matter?","cn":"科罗拉多州共和党州长候选人维克多·马克斯：这重要吗？"},{"en":"CORNISH: This is a candidate who also claims he killed someone as a child. Meet the frontrunner in the Republican race for governor of Colorado.","cn":"科尼什：这是一位自称童年时杀过人的候选人。来认识一下科罗拉多州共和党州长竞选的领跑者。"},{"en":"And it's the $3.5 trillion question on Wall Street. Has the A.I. boom gotten ahead of itself?","cn":"华尔街面临3.5万亿美元的问题。人工智能热潮是否超前了？"},{"en":"UNIDENTIFIED MALE: OpenAI and Anthropic plan to have IPOs at release before the end of this year, signaling to me that the A.I. bubble is about to pop.","cn":"身份不明的男性：OpenAI和Anthropic计划在今年年底前进行IPO，这向我表明人工智能泡沫即将破裂。"},{"en":"(END VIDEO CLIP) (BEGIN VIDEO CLIP)","cn":"（视频片段结束）（视频片段开始）"},{"en":"GRAHAM PLATNER (D), MAINE SENATE CANDIDATE: To any of those who feel let down or disappointed or disillusioned, it is my job to earn your trust, faith, and support. And I will spend every day of this campaign. And if I have the privilege every day in the United States Senate doing exactly that.","cn":"缅因州参议员候选人格雷厄姆·普拉特纳（民主党）：对于任何感到失望、沮丧或幻灭的人，我的工作是赢得你们的信任、信念和支持。我将用尽这场竞选的每一天。如果我有幸进入美国参议院，每一天都会这样做。"},{"en":"CORNISH: Graham Platner punches his ticket. But now he's got to convince voters to choose him over a five-term senator.","cn":"科尼什：格雷厄姆·普拉特纳获得了提名。但现在他必须说服选民选择他而不是一位连任五届的参议员。"},{"en":"Good morning everybody. I'm Audie Cornish. Here is where we begin. That big statement out of Maine.","cn":"大家早上好。我是奥黛·科尼什。我们开始吧。来自缅因州的重磅声明。"},{"en":"Democrat Graham Platner, despite all the scandals, earned about three- fourths of primary voters' support over Governor Janet Mills.","cn":"民主党人格雷厄姆·普拉特纳，尽管丑闻缠身，仍赢得了约四分之三初选选民的支持，击败了州长珍妮特·米尔斯。"},{"en":"Moments after clinching the nomination, he turned his attention to his new opponent, Republican Senator Susan Collins.","cn":"在获得提名后不久，他将注意力转向了他的新对手，共和党参议员苏珊·柯林斯。"},{"en":"PLATNER: Susan Collins may have started -- may have started her career decades ago in Washington with good intentions, but she has become just as spineless and corrupt as the establishment she now serves. If you are an independent voice, why do you vote with Donald Trump 95 percent of the time?","cn":"普拉特纳：苏珊·柯林斯可能几十年前在华盛顿开始她的职业生涯时怀有良好意图，但她已经变得和她现在所服务的建制派一样软弱和腐败。如果你是一个独立的声音，为什么你95%的时间都和唐纳德·特朗普投票一致？"},{"en":"CORNISH: Platner has a lot of work to do to get Mills voters on his side.","cn":"科尼什：普拉特纳需要做很多工作来争取米尔斯选民的支持。"},{"en":"UNIDENTIFIED FEMALE: I couldn't honestly support Platner, even though some of the things that he says are really good.","cn":"身份不明的女性：我无法诚实地支持普拉特纳，尽管他说的一些话确实很好。"},{"en":"UNIDENTIFIED MALE: I don't think he's ready to be a senator. I'm leaning towards Collins unless the guy shows something else, but I just -- he's not there yet. And --","cn":"身份不明的男性：我认为他还没有准备好成为参议员。我倾向于柯林斯，除非这家伙表现出其他东西，但我只是——他还没到那个水平。而且——"},{"en":"UNIDENTIFIED FEMALE: And so, what will you do in November if its Platner versus Collins?","cn":"身份不明的女性：那么，如果11月是普拉特纳对阵柯林斯，你会怎么做？"},{"en":"UNIDENTIFIED FEMALE: That's a really good question. I'm a Democrat, but I voted for Susan Collins several times, because I think that she does care about the state of Maine. But it's going to be a real problem for me in November.","cn":"身份不明的女性：这是个非常好的问题。我是民主党人，但我多次投票给苏珊·柯林斯，因为我认为她确实关心缅因州。但这对11月的我来说将是一个真正的问题。"},{"en":"CORNISH: So, today in the group chat, Mike Leon, host of the \"Can We Please Talk\" podcast; Jared Stepman, columnist with \"The Daily Signal\"; and Max Rose, former Democratic congressman from New York.","cn":"科尼什：所以，今天在群聊中，有《我们能谈谈吗》播客主持人迈克·莱昂；《每日信号》专栏作家贾里德·斯特普曼；以及前纽约州民主党众议员马克斯·罗斯。"},{"en":"And Max, I'm actually going to start with you, because you're with VoteVets, which means you guys had a dog in the fight in this race. You guys have been giving a lot of money across the country.","cn":"马克斯，我实际上要从你开始，因为你在VoteVets工作，这意味着你们在这场竞选中有利害关系。你们在全国各地投入了大量资金。"},{"en":"And what is it? Let me just show what -- what's at stake here.","cn":"这是什么？让我展示一下——这里的关键是什么。"},{"en":"Democrats' chances of flipping the Maine Senate seat. It was pretty good. Maybe this has jeopardized it. We're going to show people a chart while you're talking so you can see what's at stake.","cn":"民主党翻转缅因州参议院席位的机会。本来相当不错。也许这已经危及到了。我们会在你说话时向人们展示一张图表，这样你就能看到关键所在。"},{"en":"Is this race as close as you all hoped it would be, now that Graham has struggled with these scandals?","cn":"既然格雷厄姆因这些丑闻而挣扎，这场竞选是否像你们所有人希望的那样接近？"},{"en":"MAX ROSE (D), FORMER NEW YORK CONGRESSMAN: The race is always going to be close. Because --","cn":"前纽约州民主党众议员马克斯·罗斯：这场竞选总是会很接近。因为——"},{"en":"CORNISH: Not with a five-term senator, it's not. A lot of times it can be a blowout, right? Like what -- how do you look at what he needs to accomplish?","cn":"科尼什：面对一位连任五届的参议员，不会。很多时候可能是压倒性的，对吧？比如——你怎么看他需要完成什么？"},{"en":"ROSE: Well, I think that we're saying the same thing --","cn":"罗斯：嗯，我认为我们说的是同一件事——"},{"en":"ROSE: -- in essence, right? Susan Collins is tough to beat.","cn":"罗斯：——本质上，对吧？苏珊·柯林斯很难击败。"},{"en":"What I would say about the Susan Collins race is that we've seen in the past, is you're not going to win this seat by electing a Susan Collins light or putting forward a Susan Collins light in a race.","cn":"关于苏珊·柯林斯的竞选，我想说的是，我们过去看到的是，你不可能通过选举一个“苏珊·柯林斯轻量版”或在竞选中推出一个“苏珊·柯林斯轻量版”来赢得这个席位。"},{"en":"You are going to beat her by energizing your base, particularly in a midterm election.","cn":"你要通过激励你的基本盘来击败她，尤其是在中期选举中。"},{"en":"There is no doubt, though, that this election has got to be a referendum on Susan Collins: on the ways in which she has voted to empower Donald Trump; on her refusal to hold Donald Trump accountable; on the ways in which she has said, I might be fair, but I want to take healthcare away from millions of people. Says the right thing often; does the wrong thing very frequently.","cn":"不过，毫无疑问，这次选举必须是对苏珊·柯林斯的公投：关于她投票赋予唐纳德·特朗普权力的方式；关于她拒绝追究唐纳德·特朗普责任的方式；关于她所说的，我可能公平，但我想剥夺数百万人的医保。经常说正确的话；却非常频繁地做错误的事。"},{"en":"CORNISH: Yes. So, this is very much the message we hear over and over again. And I love that Platner in front of him, it said, \"They don't know Maine.\" You know what I mean? Usually not his own name, not a bunch of other things. It was like, hello, media, this one is for you.","cn":"科尼什：是的。所以，这正是我们反复听到的信息。我喜欢普拉特纳面前的标语，上面写着“他们不了解缅因州”。你明白我的意思吗？通常不是他自己的名字，不是一堆其他东西。就像是在说，媒体你好，这个是给你的。"},{"en":"I want to play two clips back-to-back, because it sort of, I think, represents something of this race.","cn":"我想连续播放两段视频，因为我认为这在一定程度上代表了这场竞选。"},{"en":"First, I'm going to play for you J.D. Vance and how he talks about Susan Collins. And then I'm going to play AOC and how she's talking about Platner. You tell me how you hear the tone of these.","cn":"首先，我将播放J.D.万斯谈论苏珊·柯林斯的片段。然后我将播放AOC谈论普拉特纳的片段。你告诉我你如何听出这些的语气。"},{"en":"J.D. VANCE (R), U.S. VICE PRESIDENT: Here's the thing I'll say about Susan Collins, is sometimes I get frustrated with Susan Collins. I almost wish that she was more partisan.","cn":"美国副总统J.D.万斯（共和党）：关于苏珊·柯林斯，我要说的是，有时我对苏珊·柯林斯感到沮丧。我几乎希望她更党派化一些。"},{"en":"But the thing I love about Susan is she is independent, because Maine is an independent state. And frankly, if she was as partisan as I sometimes wish that she was, she would not be a good fit for the people of Maine.","cn":"但我喜欢苏珊的一点是她很独立，因为缅因州是一个独立的州。坦率地说，如果她像我有时希望的那样党派化，她就不适合缅因州人民。"},{"en":"So, let's give a shout-out to Susan Collins, who's doing a great job.","cn":"所以，让我们向苏珊·柯林斯致敬，她做得很好。"},{"en":"OCASIO-CORTEZ: When it comes to the substance of this reporting, obviously, there's a lot in that behavior that's really challenging. It's hard to stomach, you know, in some of it.","cn":"奥卡西奥-科尔特斯：关于这份报道的实质内容，显然，那种行为中有很多非常具有挑战性。有些部分令人难以接受，你知道。"},{"en":"But -- but at the end of the day, I think that this is a choice. If that choice on the ballot is between that and a senator who's voted to take healthcare away from millions of Americans, that's the situation that we have to weigh.","cn":"但是——但归根结底，我认为这是一个选择。如果选票上的选择是在那（指普拉特纳的丑闻）和一位投票剥夺数百万美国人医保的参议员之间，那就是我们必须权衡的情况。"},{"en":"CORNISH: I played these, because one is like, it's hard to stomach. And the other is like, I get frustrated. Shout-out though, anyway, because I guess Maine. And I was, like, these are not ringing endorsements.","cn":"科尼什：我播放这些，因为一个像是“难以接受”，另一个像是“我感到沮丧”。不过还是致敬，因为我想是缅因州。我当时想，这些都不是有力的支持。"},{"en":"MIKE LEON, HOST, \"CAN WE PLEASE TALK?\" PODCAST: But Audie, not only are they not ringing endorsements, the voter that we played in the package before listen to her tone. Maine independents are the second largest party i","cn":"《我们能谈谈吗》播客主持人迈克·莱昂：但是奥黛，它们不仅不是有力的支持，我们之前播放的片段中那位选民，听听她的语气。缅因州独立人士是第二大政党，我"}],"vocabulary":[{"word":"primary","phonetic":"/ˈpraɪməri/","pos":"n.","level":"考研","cn":"初选","en":"a preliminary election to appoint delegates to a party conference or to select the candidates for a principal election","excerpt":"Platner Easily Wins Democratic Senate Primary in Maine","example_cn":"普拉特纳轻松赢得缅因州民主党参议员初选"},{"word":"flip","phonetic":"/flɪp/","pos":"v.","level":"六级","cn":"翻转，改变（政治控制）","en":"to change the political control of a seat or district from one party to another","excerpt":"Could that cost the party a shot at flipping the Senate this fall?","example_cn":"这会令该党失去今年秋天翻转参议院的机会吗？"},{"word":"weigh","phonetic":"/weɪ/","pos":"v.","level":"考研","cn":"权衡，考虑","en":"to consider carefully the relative importance of factors","excerpt":"that's the situation that we have to weigh.","example_cn":"那就是我们必须权衡的情况。"},{"word":"ceasefire","phonetic":"/ˈsiːsfaɪər/","pos":"n.","level":"六级","cn":"停火","en":"a temporary suspension of fighting","excerpt":"Will the strained ceasefire last long enough for the U.S. to deliver that long-promised deal with Iran?","example_cn":"紧张的停火能否持续足够长的时间，让美国兑现与伊朗长期承诺的协议？"},{"word":"convicted","phonetic":"/kənˈvɪktɪd/","pos":"adj.","level":"考研","cn":"已被定罪的","en":"having been found guilty of a crime","excerpt":"his links to the late convicted sex offender.","example_cn":"他与已故被定罪性犯罪者的联系。"},{"word":"frontrunner","phonetic":"/ˈfrʌntrʌnər/","pos":"n.","level":"六级","cn":"领先者，领跑者","en":"the person or thing that is most likely to win a competition","excerpt":"Meet the frontrunner in the Republican race for governor of Colorado.","example_cn":"来认识一下科罗拉多州共和党州长竞选的领跑者。"},{"word":"bubble","phonetic":"/ˈbʌbl/","pos":"n.","level":"考研","cn":"泡沫（经济）","en":"a situation in which the price of an asset is inflated beyond its intrinsic value","excerpt":"the A.I. bubble is about to pop.","example_cn":"人工智能泡沫即将破裂。"},{"word":"clinch","phonetic":"/klɪntʃ/","pos":"v.","level":"六级","cn":"赢得，确定（胜利）","en":"to settle or finalize something, especially a victory","excerpt":"Moments after clinching the nomination","example_cn":"在获得提名后不久"},{"word":"spineless","phonetic":"/ˈspaɪnləs/","pos":"adj.","level":"六级","cn":"没有骨气的，软弱的","en":"lacking courage or determination","excerpt":"she has become just as spineless and corrupt as the establishment she now serves.","example_cn":"她已经变得和她现在所服务的建制派一样软弱和腐败。"},{"word":"corrupt","phonetic":"/kəˈrʌpt/","pos":"adj.","level":"考研","cn":"腐败的","en":"willing to act dishonestly in return for money or personal gain","excerpt":"she has become just as spineless and corrupt as the establishment she now serves.","example_cn":"她已经变得和她现在所服务的建制派一样软弱和腐败。"},{"word":"establishment","phonetic":"/ɪˈstæblɪʃmənt/","pos":"n.","level":"考研","cn":"建制派，当权派","en":"the group in a society exercising power and influence over matters of policy or opinion","excerpt":"the establishment she now serves.","example_cn":"她现在所服务的建制派。"},{"word":"referendum","phonetic":"/ˌrefəˈrendəm/","pos":"n.","level":"六级","cn":"公投，全民公决","en":"a general vote by the electorate on a single political question","excerpt":"this election has got to be a referendum on Susan Collins","example_cn":"这次选举必须是对苏珊·柯林斯的公投"},{"word":"energize","phonetic":"/ˈenərdʒaɪz/","pos":"v.","level":"六级","cn":"激励，激发","en":"to give energy or enthusiasm to","excerpt":"You are going to beat her by energizing your base","example_cn":"你要通过激励你的基本盘来击败她"},{"word":"base","phonetic":"/beɪs/","pos":"n.","level":"考研","cn":"基本盘，支持者群体","en":"the group of people who support a political party or candidate","excerpt":"energizing your base","example_cn":"激励你的基本盘"},{"word":"midterm","phonetic":"/ˈmɪdtɜːrm/","pos":"adj.","level":"六级","cn":"中期（选举）的","en":"relating to an election held in the middle of a presidential term","excerpt":"particularly in a midterm election.","example_cn":"尤其是在中期选举中。"},{"word":"accountable","phonetic":"/əˈkaʊntəbl/","pos":"adj.","level":"考研","cn":"负有责任的","en":"required or expected to justify actions or decisions","excerpt":"her refusal to hold Donald Trump accountable","example_cn":"她拒绝追究唐纳德·特朗普的责任"},{"word":"partisan","phonetic":"/ˈpɑːrtɪzən/","pos":"adj.","level":"六级","cn":"党派性的，偏袒的","en":"prejudiced in favor of a particular cause or party","excerpt":"I almost wish that she was more partisan.","example_cn":"我几乎希望她更党派化一些。"},{"word":"independent","phonetic":"/ˌɪndɪˈpendənt/","pos":"adj./n.","level":"考研","cn":"独立的；独立人士","en":"not belonging to or influenced by a political party","excerpt":"Maine independents are the second largest party","example_cn":"缅因州独立人士是第二大政党"},{"word":"ringing endorsement","phonetic":"/ˈrɪŋɪŋ ɪnˈdɔːrsmənt/","pos":"phrase","level":"六级","cn":"有力的支持","en":"a strong and enthusiastic expression of support","excerpt":"these are not ringing endorsements.","example_cn":"这些都不是有力的支持。"},{"word":"stomach","phonetic":"/ˈstʌmək/","pos":"v.","level":"六级","cn":"忍受，接受","en":"to endure or tolerate something unpleasant","excerpt":"It's hard to stomach","example_cn":"难以接受"}],"sentences":[{"en":"If the choice on the ballot is between that and a senator who's voted to take health care away from millions of Americans, that's the situation that we have to weigh.","cn":"如果选票上的选择是在那（指普拉特纳的丑闻）和一位投票剥夺数百万美国人医保的参议员之间，那就是我们必须权衡的情况。","structure":"条件状语从句（If...）+ 主句（that's...），其中包含定语从句（who's voted...）修饰senator，以及定语从句（that we have to weigh）修饰situation。","analysis":"习语'weigh the situation'意为权衡情况。'take health care away from'意为剥夺医保。"},{"en":"Susan Collins may have started -- may have started her career decades ago in Washington with good intentions, but she has become just as spineless and corrupt as the establishment she now serves.","cn":"苏珊·柯林斯可能几十年前在华盛顿开始她的职业生涯时怀有良好意图，但她已经变得和她现在所服务的建制派一样软弱和腐败。","structure":"并列句（may have started... but...），包含插入语（-- may have started...），以及比较结构（just as... as...）和定语从句（she now serves）。","analysis":"'may have started'表示对过去的推测。'just as... as...'表示同等程度。'spineless and corrupt'是并列形容词。"},{"en":"There is no doubt, though, that this election has got to be a referendum on Susan Collins: on the ways in which she has voted to empower Donald Trump; on her refusal to hold Donald Trump accountable; on the ways in which she has said, I might be fair, but I want to take healthcare away from millions of people.","cn":"不过，毫无疑问，这次选举必须是对苏珊·柯林斯的公投：关于她投票赋予唐纳德·特朗普权力的方式；关于她拒绝追究唐纳德·特朗普责任的方式；关于她所说的，我可能公平，但我想剥夺数百万人的医保。","structure":"主句（There is no doubt...）+ 同位语从句（that...），后接三个并列的介词短语（on...），每个包含定语从句（in which...）。","analysis":"'has got to be'表示强烈必要性。'referendum on'意为对...的公投。'hold...accountable'意为追究...的责任。"},{"en":"But the thing I love about Susan is she is independent, because Maine is an independent state.","cn":"但我喜欢苏珊的一点是她很独立，因为缅因州是一个独立的州。","structure":"主句（the thing... is...），包含定语从句（I love about Susan）和表语从句（she is independent），后接原因状语从句（because...）。","analysis":"'the thing I love about Susan'是主语，'is'是系动词，'she is independent'是表语从句。"},{"en":"When it comes to the substance of this reporting, obviously, there's a lot in that behavior that's really challenging.","cn":"关于这份报道的实质内容，显然，那种行为中有很多非常具有挑战性。","structure":"时间状语从句（When it comes to...）+ 主句（there's...），包含定语从句（that's really challenging）修饰a lot。","analysis":"'When it comes to'是固定短语，意为'当谈到...时'。'substance'意为实质内容。"},{"en":"If that choice on the ballot is between that and a senator who's voted to take healthcare away from millions of Americans, that's the situation that we have to weigh.","cn":"如果选票上的选择是在那（指普拉特纳的丑闻）和一位投票剥夺数百万美国人医保的参议员之间，那就是我们必须权衡的情况。","structure":"条件状语从句（If...）+ 主句（that's...），从句中包含定语从句（who's voted...），主句包含定语从句（that we have to weigh）。","analysis":"与第一句类似，但'healthcare'连写。'weigh'意为权衡。"}],"topics":[{"title":"缅因州参议员选举与Susan Collins的连任挑战","content":"缅因州是美国东北部的一个州，政治倾向较为独立。现任共和党参议员Susan Collins自1997年起任职，以温和派和独立形象著称，但近年来因投票支持特朗普政策而受到民主党批评。2026年中期选举中，民主党候选人Graham Platner尽管面临丑闻，仍赢得初选，但需争取党内团结以挑战Collins。该选举被视为对Collins的公投，涉及医保、特朗普关联等议题。","keywords":"Susan Collins · Graham Platner · 缅因州 · 中期选举 · 独立选民"},{"title":"美国与伊朗的紧张关系及停火协议","content":"美国与伊朗长期存在冲突，涉及核问题、地区代理战争等。2026年，美国在直升机被击落后对伊朗实施打击，同时试图维持脆弱的停火以推动长期承诺的协议。该协议可能涉及核限制或地区安全，但双方互信不足，停火面临考验。","keywords":"Iran · ceasefire · 美国打击 · 核协议 · 中东"},{"title":"Epstein文件与Bill Gates的国会听证","content":"Jeffrey Epstein是已故美国金融家，因性犯罪和性贩卖被定罪，其案件涉及多名政商名流。2026年，国会就Epstein文件举行听证，Bill Gates因与Epstein的会面等联系被传唤。Gates需解释其与Epstein的关系，可能影响其公众形象。","keywords":"Epstein · Bill Gates · 性犯罪 · 国会听证 · 文件"},{"title":"AI公司IPO热潮与市场泡沫担忧","content":"OpenAI和Anthropic是领先的人工智能公司，分别开发ChatGPT和Claude等模型。2026年，它们计划进行首次公开募股（IPO），引发市场对AI泡沫的担忧。此前，SpaceX等科技公司也推动IPO，但AI行业的高估值和盈利不确定性使投资者警惕泡沫破裂。","keywords":"OpenAI · Anthropic · IPO · AI泡沫 · 华尔街"},{"title":"科罗拉多州州长选举与Victor Marx的争议言论","content":"Victor Marx是科罗拉多州共和党州长候选人，曾声称童年时杀人，并在被问及成年后是否杀人时回应'这重要吗？'，引发道德争议。该言论可能影响其选情，反映美国政治中极端言论的接受度。","keywords":"Victor Marx · 科罗拉多州 · 州长选举 · 争议言论 · 共和党"}],"raw_transcript":"Return to Transcripts main page\n\nPlatner Easily Wins Democratic Senate Primary in Maine; U.S. Hits Iran after Helicopter Downed; OpenAI Files for IPO, Joins Anthropic and SpaceX. Aired 6-6:30a ET\n\nAired June 10, 2026 - 06:00   ET\n\nTHIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED.\n\nAUDIE CORNISH, CNN ANCHOR: Today in the group chat, Democrats in Maine vote to stick with Graham Platner. Could that cost the party a shot at flipping the Senate this fall?\n\nREP. ALEXANDRIA OCASIO-CORTEZ (D-NY): If the choice on the ballot is between that and a senator who's voted to take health care away from millions of Americans, that's the situation that we have to weigh.\n\nCORNISH: Missiles light up the sky in the Middle East again. Will the strained ceasefire last long enough for the U.S. to deliver that long- promised deal with Iran?\n\nAnd a big day for the Epstein files. What will Bill Gates tell lawmakers about his links to the late convicted sex offender.\n\nUNIDENTIFIED MALE: Do you think that you've killed people as an adult?\n\nVICTOR MARX (R), COLORADO GUBERNATORIAL CANDIDATE: Does it matter?\n\nCORNISH: This is a candidate who also claims he killed someone as a child. Meet the frontrunner in the Republican race for governor of Colorado.\n\nAnd it's the $3.5 trillion question on Wall Street. Has the A.I. boom gotten ahead of itself?\n\nUNIDENTIFIED MALE: OpenAI and Anthropic plan to have IPOs at release before the end of this year, signaling to me that the A.I. bubble is about to pop.\n\n(END VIDEO CLIP) (BEGIN VIDEO CLIP)\n\nGRAHAM PLATNER (D), MAINE SENATE CANDIDATE: To any of those who feel let down or disappointed or disillusioned, it is my job to earn your trust, faith, and support. And I will spend every day of this campaign. And if I have the privilege every day in the United States Senate doing exactly that.\n\nCORNISH: Graham Platner punches his ticket. But now he's got to convince voters to choose him over a five-term senator.\n\nGood morning everybody. I'm Audie Cornish. Here is where we begin. That big statement out of Maine.\n\nDemocrat Graham Platner, despite all the scandals, earned about three- fourths of primary voters' support over Governor Janet Mills.\n\nMoments after clinching the nomination, he turned his attention to his new opponent, Republican Senator Susan Collins.\n\nPLATNER: Susan Collins may have started -- may have started her career decades ago in Washington with good intentions, but she has become just as spineless and corrupt as the establishment she now serves. If you are an independent voice, why do you vote with Donald Trump 95 percent of the time?\n\nCORNISH: Platner has a lot of work to do to get Mills voters on his side.\n\nUNIDENTIFIED FEMALE: I couldn't honestly support Platner, even though some of the things that he says are really good.\n\nUNIDENTIFIED MALE: I don't think he's ready to be a senator. I'm leaning towards Collins unless the guy shows something else, but I just -- he's not there yet. And --\n\nUNIDENTIFIED FEMALE: And so, what will you do in November if its Platner versus Collins?\n\nUNIDENTIFIED FEMALE: That's a really good question. I'm a Democrat, but I voted for Susan Collins several times, because I think that she does care about the state of Maine. But it's going to be a real problem for me in November.\n\nCORNISH: So, today in the group chat, Mike Leon, host of the \"Can We Please Talk\" podcast; Jared Stepman, columnist with \"The Daily Signal\"; and Max Rose, former Democratic congressman from New York.\n\nAnd Max, I'm actually going to start with you, because you're with VoteVets, which means you guys had a dog in the fight in this race. You guys have been giving a lot of money across the country.\n\nAnd what is it? Let me just show what -- what's at stake here.\n\nDemocrats' chances of flipping the Maine Senate seat. It was pretty good. Maybe this has jeopardized it. We're going to show people a chart while you're talking so you can see what's at stake.\n\nIs this race as close as you all hoped it would be, now that Graham has struggled with these scandals?\n\nMAX ROSE (D), FORMER NEW YORK CONGRESSMAN: The race is always going to be close. Because --\n\nCORNISH: Not with a five-term senator, it's not. A lot of times it can be a blowout, right? Like what -- how do you look at what he needs to accomplish?\n\nROSE: Well, I think that we're saying the same thing --\n\nROSE: -- in essence, right? Susan Collins is tough to beat.\n\nWhat I would say about the Susan Collins race is that we've seen in the past, is you're not going to win this seat by electing a Susan Collins light or putting forward a Susan Collins light in a race.\n\nYou are going to beat her by energizing your base, particularly in a midterm election.\n\nThere is no doubt, though, that this election has got to be a referendum on Susan Collins: on the ways in which she has voted to empower Donald Trump; on her refusal to hold Donald Trump accountable; on the ways in which she has said, I might be fair, but I want to take healthcare away from millions of people. Says the right thing often; does the wrong thing very frequently.\n\nCORNISH: Yes. So, this is very much the message we hear over and over again. And I love that Platner in front of him, it said, \"They don't know Maine.\" You know what I mean? Usually not his own name, not a bunch of other things. It was like, hello, media, this one is for you.\n\nI want to play two clips back-to-back, because it sort of, I think, represents something of this race.\n\nFirst, I'm going to play for you J.D. Vance and how he talks about Susan Collins. And then I'm going to play AOC and how she's talking about Platner. You tell me how you hear the tone of these.\n\nJ.D. VANCE (R), U.S. VICE PRESIDENT: Here's the thing I'll say about Susan Collins, is sometimes I get frustrated with Susan Collins. I almost wish that she was more partisan.\n\nBut the thing I love about Susan is she is independent, because Maine is an independent state. And frankly, if she was as partisan as I sometimes wish that she was, she would not be a good fit for the people of Maine.\n\nSo, let's give a shout-out to Susan Collins, who's doing a great job.\n\nOCASIO-CORTEZ: When it comes to the substance of this reporting, obviously, there's a lot in that behavior that's really challenging. It's hard to stomach, you know, in some of it.\n\nBut -- but at the end of the day, I think that this is a choice. If that choice on the ballot is between that and a senator who's voted to take healthcare away from millions of Americans, that's the situation that we have to weigh.\n\nCORNISH: I played these, because one is like, it's hard to stomach. And the other is like, I get frustrated. Shout-out though, anyway, because I guess Maine. And I was, like, these are not ringing endorsements.\n\nMIKE LEON, HOST, \"CAN WE PLEASE TALK?\" PODCAST: But Audie, not only are they not ringing endorsements, the voter that we played in the package before listen to her tone. Maine independents are the second largest party in Maine.\n\nCORNISH: Yes. And a woman, in particular.\n\nLEON: And a woman and a Democrat who said she voted for Susan Collins, against her will, it sounded like, from that thing.\n\nSo -- but those are -- those are some of the things that we're going to have to consider now. It's really about the character quality is what something that Graham Platner has been trying to say: Forget about that. I'm from here. It's how she's voted, to Max's point.\n\nLEON: But then also you hear the voters, and they're, like, a little, still unsure because of those character issues with Platner. So, it's going to be really interesting.\n\nCORNISH: And he's been telling a story for a while of, like, you know, I was -- went through difficult times. Now I'm a person who has changed.\n\nI want to ask one more thing. Collins and Trump, that's not a tight bond. OK? Can I just put it that way? Here's a list I'm going to play for you. Just some moments over the past couple of months where you hear her talking around Trump policies and where she stands on them.\n\n(BEGIN VIDEO CLIP) SEN. SUSAN COLLINS (R-ME): The 60 days is a trigger. After 60 days, in\n\nmy view, the president has to obtain congressional approval or Congress can block it.\n\nI do not believe that individuals who were convicted of violence against police officers on January 6th should be entitled to reimbursement for their legal fees.\n\nConcerned about the cuts in Medicaid and the impact on my state, but other states, as well.\n\nI've talked with the secretary of homeland security. I have strongly recommended to her that there be a pause on the enforcement surge in both Maine and in Minnesota.\n\nCORNISH: Now, I've chased her in the hallways before, too. She often ends up voting with Republicans, whatever that party line is.\n\nBut is Trump going to get involved in this simply umen.\n\nLEON: It has not worked out.\n\nCORNISH: Yes. I was about to say --\n\nLEON: Voters have said that.\n\nCORNISH: The voters have rejected it.\n\nLEON: Especially with the billionaire. When the billionaire class. We've got AOC and others that have talked about the billionaire class, and we have somebody here spending his own money like this, it seems like a waste where it could be invested in other.\n\nCORNISH: Well, it's been a wild race coming from last year to all of a sudden have Becerra at the front.\n\nCORNISH: We couldn't have seen that then.\n\nCORNISH: Now, after the break on CNN THIS MORNING, two controversial to win? So, the Colorado frontrunner for governor claims he killed a man when he was 7 years old. I have more stories like that from him.\n\nPlus, A.I. companies are rushing to the stock market. Is it the next tech boom or is the A.I. bubble about to burst?\n\nAnd for viewers watching us from right here in New York City, Knicks versus Spurs again tonight at the Garden. Good morning.\n\nCORNISH: So, a bunch of IPOs in the A.I. sector are about to hit Wall Street after OpenAI announced on Monday it filed for an initial public offering, an IPO.\n\nThe three biggest A.I. companies are now in line to go public, as well. That includes Anthropic and SpaceX. A fourth, Perplexity, is expected to file in 2028.\n\nDONALD TRUMP, U.S. PRESIDENT: We're talking about it. Where the American people can benefit from the success of A.I. And by doing that, they're going to like it better. Because we're leading China. We're leading everybody in the world with A.I., and we want to keep it that way. It's like you make them a partnership in this revolution. It would be a beautiful thing.\n\nCORNISH: Now, investors who get in early could make a fortune. But has the A.I. boom gotten ahead of itself?\n\nMadison Mills joins the group chat. She's the senior A.I. reporter at Axios. You guys have done some fantastic reporting on this industry.\n\nJust to show people the amo oney from one A.I. company to do work in your A.I. company. and then another A.I. company gets work from you. It's like the same money going around and around. Do I have that right?\n\nMILLS: Absolutely. That's perfect. And part of --\n\nCORNISH: I'm ready to finfluence.\n\nMILLS: You're ready to finfluence. And more than that, you can be the CFO of an A.I. company. You know?\n\nBut part of the problem with that is that Anthropic can -- or OpenAI, any of the A.I. labs, can book that as revenue. And that feeds into that valuation number that we're getting.\n\nBut that revenue could also just be money that they are getting from Google, that then they're giving back to Google in the form of compute capacity. And then Google has that compute capacity and is giving it over to another A.I. lab. And so, it's all very circular right now. And that's the concern.\n\nCORNISH: And it's giving shell game. I'm going to listen to you, because I believe that this market is the future. I understand that, but I think people rightly have questions. [06:30:00]","segments":[{"seg":1,"url":"https://transcripts.cnn.com/show/ctmo/date/2026-06-10/segment/01","title":"CNN.com - Transcripts","text":"Return to Transcripts main page\n\nPlatner Easily Wins Democratic Senate Primary in Maine; U.S. Hits Iran after Helicopter Downed; OpenAI Files for IPO, Joins Anthropic and SpaceX. Aired 6-6:30a ET\n\nAired June 10, 2026 - 06:00   ET\n\nTHIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED.\n\nAUDIE CORNISH, CNN ANCHOR: Today in the group chat, Democrats in Maine vote to stick with Graham Platner. Could that cost the party a shot at flipping the Senate this fall?\n\nREP. ALEXANDRIA OCASIO-CORTEZ (D-NY): If the choice on the ballot is between that and a senator who's voted to take health care away from millions of Americans, that's the situation that we have to weigh.\n\nCORNISH: Missiles light up the sky in the Middle East again. Will the strained ceasefire last long let currentData = null;
const LV_COLORS = {'考研':'#e68a2e','六级':'#0a58ca'};

(function init(){
  const latest = '2026-06-10';
  if(ALL_DATA[latest]) loadDate(latest);
  document.querySelector(`[data-date="${latest}"]`)?.classList.add('active');
})();

function openSource(){
  if(currentData?.source_url) window.open(currentData.source_url,'_blank');
}

function loadDate(date){
  if(!ALL_DATA[date]) return;
  document.querySelectorAll('.hist-item').forEach(b=>
    b.classList.toggle('active', b.dataset.date===date));
  renderAll(ALL_DATA[date]);
}

function renderAll(data){
  currentData = data;
  document.getElementById('topbarDate').textContent = data.date||'';
  document.getElementById('topbarTitle').textContent = 'CNN This Morning · ' + (data.date||'');

  renderSegmentedTranscript(data.segments || [], data.vocabulary || []);
  renderWordList(data.vocabulary || []);
  renderVocab(data.vocabulary || []);
  renderSentences(data.sentences || []);
  renderTopics(data.topics || []);

  const transDiv = document.getElementById('fullTranslation');
  if(transDiv) transDiv.innerHTML = esc(data.full_translation || '暂无全文翻译，请重新运行生成。');
}

function renderSegmentedTranscript(segments, vocab){
  const container = document.getElementById('transcriptBody');
  if(!segments || segments.length === 0){
    container.innerHTML = '<div>无分段数据</div>';
    return;
  }
  const vocabMap = {};
  vocab.forEach(v=>{ vocabMap[v.word.toLowerCase()] = v; });
  const sortedWords = Object.keys(vocabMap).sort((a,b)=>b.length-a.length);

  let html = '';
  for(let seg of segments){
    const title = seg.title || `Segment ${seg.seg}`;
    let rawText = seg.text || '';
    // 高亮处理（保留换行）
    const highlighted = highlightWordsKeepWhitespace(rawText, sortedWords, vocabMap);
    html += `
      <div class="segment-block">
        <div class="segment-title">📺 ${esc(title)}</div>
        ${highlighted}
      </div>
    `;
  }
  container.innerHTML = html;
}

function highlightWordsKeepWhitespace(text, sortedWords, vocabMap){
  if(!text) return '';
  // 构建位置数组
  const positions = [];
  const lc = text.toLowerCase();
  sortedWords.forEach(word=>{
    let idx = 0;
    while((idx = lc.indexOf(word, idx)) !== -1){
      const before = idx === 0 || !/[a-z]/i.test(text[idx-1]);
      const after  = idx+word.length >= text.length || !/[a-z]/i.test(text[idx+word.length]);
      if(before && after){
        const overlaps = positions.some(p=> idx < p.end && idx+word.length > p.start);
        if(!overlaps){
          positions.push({start:idx, end:idx+word.length, word, vocab:vocabMap[word]});
        }
      }
      idx += word.length;
    }
  });
  if(!positions.length) return `<pre style="white-space: pre-wrap; margin:0;">${esc(text)}</pre>`;
  positions.sort((a,b)=>a.start-b.start);
  
  let result = '';
  let last = 0;
  for (let p of positions) {
    result += esc(text.slice(last, p.start));
    const word = p.word;
    const vocabData = p.vocab;
    const lv = vocabData.level || '';
    const cnMeaning = vocabData.cn || '';
    const safeTitle = cnMeaning.replace(/["']/g, '&quot;');
    result += `<span class="cnnTransHighlight" data-word="${esc(word)}" title="${safeTitle}" onclick="showVocabPopup(event,'${esc(word)}')">${esc(word)}</span>`;
    last = p.end;
  }
  result += esc(text.slice(last));
  // 使用 pre 包裹以保留原始空白和换行，但允许自动换行
  return `<pre style="white-space: pre-wrap; margin:0; font-family: inherit;">${result}</pre>`;
}

function showVocabPopup(e, word){
  e.stopPropagation();
  const data = currentData?.vocabulary?.find(v=>v.word===word);
  if(!data) return;

  document.querySelectorAll('.cnnTransHighlight').forEach(el=>{
    el.classList.toggle('active', el.dataset.word===word);
  });
  document.querySelectorAll('.word-chip').forEach(el=>{
    el.classList.toggle('active', el.dataset.word===word);
  });

  document.getElementById('vpWord').textContent = data.word;
  document.getElementById('vpPh').textContent   = data.phonetic||'';
  document.getElementById('vpPos').textContent  = data.pos||'';
  document.getElementById('vpLv').textContent   = data.level||'';
  document.getElementById('vpCn').textContent   = data.cn||'';
  document.getElementById('vpEn').textContent   = data.en||'';

  const popup = document.getElementById('vocabPopup');
  popup.style.display = 'block';
  let x = e.clientX + 12, y = e.clientY + 12;
  if(x + 280 > window.innerWidth) x = e.clientX - 290;
  if(y + 150 > window.innerHeight) y = e.clientY - 150;
  popup.style.left = x + 'px';
  popup.style.top  = y + 'px';
}

document.addEventListener('click', e=>{
  if(!e.target.classList.contains('cnnTransHighlight') && !e.target.closest('#vocabPopup') && !e.target.closest('.word-chip')){
    document.getElementById('vocabPopup').style.display = 'none';
    document.querySelectorAll('.cnnTransHighlight.active').forEach(el=>el.classList.remove('active'));
    document.querySelectorAll('.word-chip.active').forEach(el=>el.classList.remove('active'));
  }
});

function renderWordList(vocab){
  document.getElementById('wordList').innerHTML = vocab.map(v=>`
    <div class="word-chip" data-word="${esc(v.word)}" onclick="jumpToWord('${esc(v.word)}')">
      <span style="display:inline-block; width:8px; height:8px; background:${LV_COLORS[v.level]||'#0a58ca'}; border-radius:50%; margin-right:6px;"></span>
      <span>${esc(v.word)}</span>
      <span style="color:#666; margin-left:8px;">${esc(v.cn||'')}</span>
    </div>`).join('');
}

function jumpToWord(word){
  switchTab('transcript');
  setTimeout(()=>{
    const el = document.querySelector(`.cnnTransHighlight[data-word="${word}"]`);
    if(el){
      el.scrollIntoView({behavior:'smooth', block:'center'});
      el.click();
    }
  }, 50);
}

function renderVocab(list){
  document.getElementById('vocabGrid').innerHTML = list.map(v=>`
    <div class="vcard">
      <div><strong class="vword">${esc(v.word)}</strong> <span>${esc(v.phonetic||'')}</span> <span>${esc(v.pos||'')}</span> <span>${esc(v.level||'')}</span></div>
      <div class="vcn">${esc(v.cn)}</div>
      <div class="ven">${esc(v.en||'')}</div>
      <div class="veg"><em>${esc(v.excerpt||v.example||'')}</em><div class="vegcn">${esc(v.example_cn||'')}</div></div>
    </div>`).join('');
}

function renderSentences(list){
  document.getElementById('sentenceList').innerHTML = list.map((s,i)=>`
    <div class="scard"><strong>${i+1}.</strong> <div>${esc(s.en)}</div><div class="sen-cn">${esc(s.cn)}</div><div><em>结构:</em> ${esc(s.structure||'')}</div><div><em>分析:</em> ${esc(s.analysis||'')}</div></div>
  `).join('');
}

function renderTopics(list){
  const colors = ['#cc0000','#006598','#2c7da0','#e68a2e'];
  document.getElementById('topicList').innerHTML = list.map((t,i)=>`
    <div class="tcard"><strong style="color:${colors[i%colors.length]}">${esc(t.title)}</strong><div>${esc(t.content)}</div><div>🔑 ${esc(t.keywords||'')}</div></div>
  `).join('');
}

function switchTab(id){
  const tabs = ['transcript','translation','vocab','sentences','topics'];
  tabs.forEach(t=>{
    const idx = tabs.indexOf(t);
    document.querySelectorAll('.tab')[idx].classList.toggle('active', t===id);
    document.getElementById(t).classList.toggle('active', t===id);
  });
}

function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
