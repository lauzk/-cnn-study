nfluence the politics, but because she wants to help shape and improve the show. And she's clearly trying to drag the show into the digital age. That is for sure.\n\nShe believes the CBS News organization is old-fashioned. She believes \"60 Minutes\" is out of date and archaic, even though it's really valuable and popular, and she wants to reform it.\n\nBut what that looks like, what form that takes, it's anyone's guess. And now, they have to rebuild the show with a very small number of people. Well, correspondents. They had seven last month. They only have three left.\n\nAnd the big question now, Audie, is, are those three remaining correspondents going to stay or go? My sense is they're probably going to stay, but no one knows yet.\n\nCORNISH: Now you have reporting on a memo to staff that was written by Nick Bilton. He's the newly appointed executive producer. I just want to throw up some detail about him, for people who are just learning all these names.\n\nHe was at \"Vanity Fair.\" He was a \"New York Times\" lead technology columnist. I interviewed him about his book about Twitter, and he is, of course, a best-selling author.\n\nCan you talk about sort of what he brings to this role? And if people have a sense of his politics the way they do about Bari Weiss, who, you know, very publicly --\n\nSTELTER: Right, right.\n\nCORNISH: -- sort of with the \"Free Press,\" established a lane for herself.\n\nSTELTER: I've known Bilton for years. He's a tech reporter, and more recently made his mark in Hollywood, trying to become a screenwriter, things like that.\n\nThis is a very unusual position for him to take, but it's the kind of job no one would turn down.\n\nSo, now he's been meeting with staff this week, trying to reassure them, trying to promise that he is up for the job, that he does care about \"60 Minutes.\"\n\nHe put out a statement last night, actually, a memo to staff, but it was really written for the public, as well. And he's clearly trying to reassure everyone that he is going to maintain the program's independence.\n\nHe said in the memo, \"The foundation of '60 Minutes' is its independence. We will always pursue stories without fear or favor.\"\n\nI basically view this memo as him making the commitment publicly so that he can keep these remaining correspondents on board and not lose any more staff members. Because that's a very real concern right now.\n\nWhen it comes to Bilton's politics, there's nothing MAGA about him. He's not MAGA coded, so to speak. He has written critically about Trump in the past.\n\nBut Trump, you know, hangs over this entire conversation, because he sued \"60 Minutes\"; because he's been critical of \"60 Minutes\"; and because Paramount has tried to cozy up to Trump while trying to buy CNN and the rest of WBD.\n\nUltimately, those corporate politics are inescapably part of this story, even though CBS says it's trying to reform \"60 Minutes\" because of the culture, not about the politics.\n\nAnd you know what, Audie? Viewers get to decide at the end of the day, what they believe here.\n\nYou know, when I watch CBS, I don't think the coverage has changed markedly. I don't view it going toward the right. I think they're still aggressively covering Trump and the administration.\n\nBut viewers are the ones that get to determine if they believe that's the case or not. They're going to tune in to \"60 Minutes\" in September. They're going to sense whether the show is changed or not. So, viewers ultimately are the ones who get to decide.\n\nCORNISH: That's Brian Stelter. Thank you so much for your time. Thanks for waking up for us.\n\nCORNISH: Straight ahead on CNN THIS MORNING, should A.I. pump the brakes? Turns out they may not even have a brake to hit.\n\nPlus, new questions surface around Trump's DOJ pick. What former A.G. Pam Bondi said about his role in the Epstein files."},{"seg":2,"url":"https://transcripts.cnn.com/show/ctmo/date/2026-06-05/segment/02","title":"CNN.com - Transcripts","text":"Return to Transcripts main page\n\n\"He Was In Charge\": Bondi Pins Epstein File Release On Blanche; L.A. Sheriff: ICE Enforcement Not Expected At World Cup Matches. Aired 6:30-7a ET\n\nAired June 05, 2026 - 06:30   ET\n\nTHIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED.\n\nAUDIE CORNISH, CNN ANCHOR: Acting Attorney General Todd Blanche will face a Senate confirmation hearing before he can officially take over as leader of the Justice Department. Did his former boss just make that a lot harder?\n\nThe House Oversight Committee just released a transcript of Pam Bondi's closed-door interview with lawmakers last week, and she was asked repeatedly about how the Justice Department handled the release of the Epstein files. And Bondi was quick to point out Blanche as the man in charge, telling lawmakers, quote, \"He was in charge of the process and the entire release of the Epstein files.\"\n\nThe Group Chat is back.\n\nThe reason why I wanted to talk about this is because characterizing what's on paper, right, we can't see it on video, is that is gold for political types.\n\nUNIDENTIFIED FEMALE: It is.\n\nCORNISH: We actually had a former Trump advisor on CNN last night and she thinks that this laid the groundwork for a tougher time in the confirmation process. I want to get your opinion after you hear.\n\nCAROLINE SUNSHINE, DEPUTY COMMUNICATIONS DIRECTOR, TRUMP'S 2024 CAMPAIGN: She used her time in that closed-door session where she was sworn under oath in front of Congress as the former attorney general and as Todd Blanche's former boss to say, he ran the whole process, and he was in charge of the whole release, and the Dow's at 50,000, right? And so she's now laid the groundwork for that to be a confirmation where Democrats can essentially have a lay-up and say, \"There's no way I could vote for this guy.\"\n\nELLIOT WILLIAMS, CNN LEGAL ANALYST: I don't think it's just Democrats. I think the issues that Todd Blanche's name is on right now are the Epstein files or just all things around it, the weaponization fund, and the prosecutions of opponents of the president that many of which are not popular with the public.\n\nHe's attached to those things. There are at least --\n\nCORNISH: Meaning it doesn't matter if she leaned in on it.\n\nWILLIAMS: It doesn't matter if she leaned on it.\n\nThere are probably eight senators who are either up for reelection or in their screw it YOLO phase. I'm doing whatever I want or just tough votes that Republicans need the votes of and they can't afford to lose a lot of them. The idea that this is just about Democrats, no, Republicans have a tough vote on you.\n\nCORNISH: Yeah, and to your point, Thom Tillis, who may be part of that, the BOLO YOLO, I call it, also \"Wall Street Journal\", wounded bear caucus, says it's not an automatic yes vote in the committee. And he wants Blanche's answer to a whole other issue, January 6th.\n\nSEN. THOM TILLIS (R-NC): The key for Todd or anybody going through Judiciary Committee is being pretty tight on January the 6th. They better not have said for one minute that the people that -- that beat up police officers like these right down here were righteous people. You come even close to saying that you don't have a chair of getting my vote in judiciary.\n\nCORNISH: Now I have to say Chuck Grassley is saying look, I actually think it's going to be fine. What are you guys hearing in your reporting? What do you see compared to what Elliott saying?\n\nCARINE HAJJAR, WASHINGTON POST EDITORIAL BOARD MEMBER: In terms of Blanche, I mean, I do think they're going to be complicated questions. And not only you have some Republicans who like Tillis who are bringing up Jan 6, who have been talking about the Weaponization Fund.\n\nBut again, Epstein has become a problem, not just it's not just a tool for Democrats to say, look at this botched rollout that happened under the Trump DOJ. But a lot of Republicans have been really upset about this, too. And I hear from Republican voters who are frustrated with how --\n\nCORNISH: There's like an Epstein voter, so to speak. I think they're a person who for which this is a litmus test on transparency, the thing ruling class. Yeah.\n\nNOEL KING, CO-HOST & EDITORIAL DIRECTOR, \"TODAY, EXPLAINED\" PODCAST: You need to be as far away from Epstein as you possibly can be. And Pam Bondi just shoved them into --\n\nCORNISH: No, not true, OK?\n\nPam Bondi was online on social media saying, not true. This is all caps. Okay, just so you know.\n\nTake a look, Noel. She said, I praise acting A.G. Blanche's management of this Herculean task. I said his ethics are beyond reproach and that he is an incredible attorney general.\n\nSo she's taking issue --\n\nHAJJAR: But let's zoom out here.\n\nCORNISH: She didn't even let me get it out. You're new here, okay? But you're just, you're not buying it.\n\nHAJJAR: Well -- again, this is a creation. Republicans created this problem for themselves. They created it by talking about Epstein and making promises they couldn't keep on the campaign trail. A.G. Bondi at the time talked about a client list. And then you have a lot of voters who are really interested in seeing all these things. And then you have a botched rollout and that erodes trust. And that's going to be a problem for a lot of the people. They're going to be hearing from their constituents and then voting in these confirmation hearings.\n\nCORNISH: Yeah, and as long as Ghislaine Maxwell is like sitting in a comfier position, it feels like that constituency is not going to be appeased by the person who put there now being in charge.\n\nWILLIAMS: Absolutely. And I would also say two things can be true. She can be praising his management and ethics and also throwing him under the bus on a matter that is incredibly popular or unpopular with a bipartisan selection of Americans. People are not happy on the right or left.\n\nThe only small little bit of what I will give Pam Bondi is that within the Justice Department, the deputy attorney general, which he was at the time, is the office that would do something like this.\n\nWILLIAMS: It's the office that runs the department and would be overseeing a major investigation like that. Now, that said, look, if it were a terrorist attack or an assassination on the president, you don't get to say, oh, the other guy was doing it. At a certain point, you have to own what's happening in the building. But yeah, she's right. On practice, he's the guy that would have overseen something like this.\n\nCORNISH: And transcripts are tough, like you said.\n\nAll right, you guys, I want to turn to one other thing, because when it comes to A.I., there's actually some lawyers getting in trouble because there are courts around the country beginning to challenge or even discipline attorneys for using fake case law that was made-up or hallucinated by artificial intelligence. Now, according to \"Reuters\", A.I. hallucinations caused disruptions in\n\nat least seven court cases in the last two years. One large national law firm even sent an urgent e-mail to every one of its attorneys warning artificial intelligence can invent fake case law and using made-up information in a court filing could get you fired. That's right. It's time to lawyer up with CNN legal analysts, Elliot Williams.\n\nWILLIAMS: A.I. touches every aspect of our lives. We can, you know, we talked about it earlier in the program with respect to data centers and so on, but it affects the legal profession. And every industry, including lawyers, is figuring out how to make it work.\n\nNow, a few lawyers in the Ninth Circuit in California got themselves in quite a bit of trouble getting sanctioned and barred from the court for six months for fabricating entire briefs with A.I. And when we use the term hallucinations, it's A.I. in effect making up facts making up information and A.I. made-up or at least fabricated the names of cases that these lawyers were citing which come on, that's the bare minimum that someone.\n\nCORNISH: OK, I'm going to -- well, first of all I actually know a little bit about this story because I remember it was back in a few years ago --\n\nCORNISH: -- Michael Cohen, who's turned on Trump, in some of his cases, he used Google Bard, right? And that was sort of a ha-ha funny thing at the time in that headline. But now when I look at lawyer surveys by \"Reuters\", this one was just last fall, 63 percent of lawyers are using it for work.\n\nAnd I'm not surprised because the whole point of legal stuff is like there's a wall of books behind you and one of them has a clue to winning your case. It's all about information retrieval.\n\nWILLIAMS: We need to ask everyone systemically in America needs to ask the question when we say use it for work, what does that mean?\n\nCORNISH: Yeah, but it like makes sense for lawyers.\n\nWILLIAMS: It makes sense for most things. So first is document review, the idea that many young associates make a lot of money having to go through documents and pull every time you see the word investment or bank. Well, A.I. can do that like that in a matter of moments.\n\nNow, when you start getting into the world of what are the cases I ought to be citing and either fabricating or just pulling information that you as a lawyer have not read, that's a problem. It's a problem for you, for your clients, but also your license. You are putting your name on something and swearing to something that you don't know to be true.\n\nCORNISH: The other thing I've been hearing is that people are overwhelming the courts because now they can file their stuff on their own because they have the A.I., right? You can just be like, oh, help me head of And now the courts are deluge with these like very extensively written complaints that someone has to go through.\n\nWILLIAMS: Yeah, one of the greatest things about our legal system is that there's a very low bar for getting in and we almost invite people to represent themselves either if they can't afford an attorney or if they choose to proceed without one. I think what's happening now is that someone can write a 500-page brief with lots of citations. I did. It can be done.\n\nYou can literally type in, please make this 499.4 pages long inside this thing --\n\nCORNISH: And now we know some of it might be wrong. So you literally have filed something massive to an overwhelmed court where there's probably a fake case in there.\n\nWILLIAMS: Right. And so, you know, again, I don't have the answers as to what what's ethical or not in any industry. It's for everybody to decide. But, you know, just think when you do a regular Google search, even not as a lawyer, A.I. comes up at the top.\n\nNow, are you citing to that thing or checking the site on your own? This is really a check for all, who are swearing to be ethical and transparent in court, but for everybody to look at what is this thing that I am asserting are my words, and it's just something that society needs to get a handle on before, you know, the robot overlords take us all over.\n\nCORNISH: See, Elliot, I thought you would be the one segment where I would not be discussing A.I.\n\nWILLIAMS: No, we have to. We have to.\n\nCORNISH: You really messed it up for me.\n\nNext on CNN THIS MORNING, we're going to be talking about the World Cup. There's been another snag for L.A. just one week ahead of the games. California Representative Sydney Kamlager-Dove joins us to talk about all things World Cup.\n\nAnd in the meantime, my friend Ari Shapiro on engagement party in our podcast episode drops this morning. Check it out.\n\nCORNISH: We are less than a week out from the first matches of the World Cup, and we're learning what role immigration officials will play, maybe.\n\n(BEGIN VIDEO CLIP) ROBERT LUNA, LOS ANGELES COUNTY SHERIFF: There will be federal agents. There are agencies represented here who have spoken because it's going to take all of us to make sure that the all the venues are scoped and unscoped events are secure. But in regards to civil immigration enforcement, they told us that specifically would not be occurring at any of the games. Any of that subject to change.\n\nCORNISH: Subject to change. That's kind of an important detail at the end. It's not exactly easing fears.\n\nAt SoFi Stadium near L.A., 2,000 hospitality workers are ready to go on strike, and ICE is one of the reasons.\n\nYOLANDA FIERRO, WORKER AT SOFI STADIUM: The main concern, first of all, is the ICE issue being on the grounds. Myself and my coworkers are a little bit scared for coming to work because I do have a lot of employees that are here on working visas from different countries. They're in fear of if I get snatched up by ICE, who's going to take care of my family?\n\nCORNISH: So joining the group chat, Democratic Congresswoman Sydney Kamlager-Dove of California.\n\nI know you've talked a lot about the World Cup, prices of tickets, things like that, we'll get to that. But can you talk about this comment from the L.A. sheriff and whether or not this eased fears? Because it's sounding like, certainly to those workers, they're still worried.\n\nREP. SYDNEY KAMLAGER-DOVE (D-CA): So last night I was reading some articles and you see pictures of all of these teams. They're deplaning and they seem very excited to get ready to participate at these games. And then you hear our sheriff say, well, we're going to do as much as we can to make sure folks are safe, but we kind of don't know if ICE is going to show up.\n\nAnd Los Angeles is still recovering from the ICE raids. We're recovering from our senator being, you know, jammed to the ground. We're recovering from young children running for cover in MacArthur Park.\n\nCORNISH: But there's new leadership at ICE and at Homeland Security. Are you not able to have a conversation? Have you not heard from them about what the plans are for an event of this scale?\n\nKAMLAGER-DOVE: Well, remember, ICE and CBP were putting ads on Facebook saying we will be at the World Cup. We will be watching you.\n[06:50:01]\nAnd we haven't gotten any clear direction from Homeland Security about ICE's role in any of these World Cups. And we do know that this administration is still in their feelings about Los Angeles as a blue city standing up to Donald Trump. At the end of the day, we should be celebrating these teams and celebrating this sport and not worried if our workers and fans are going to be snatched up and deported.\n\nCORNISH: The other thing fans are complaining about are ticket prices. I know you've also raised this, but I want to play for the audience, maybe for those who don't have tickets yet, what people are worried about. Here's one fan talking about it.\n\nJACK CLARK, CO-FOUNDER, ANTHROPIC: A lot of these games and these prices are beginning to rebound. For example, Brazil versus Morocco is up $100. Argentina, Austria is up $80. Portugal, Uzbekistan is up $75.\n\nAm I saying that every ticket's going to skyrocket? No. Some matches could even still get cheaper. But the idea that every World Cup ticket is guaranteed to drop before the kickoff isn't supported by the data that we're seeing.\n\nCORNISH: I know you and I think something like 60 other Congress members actually wrote a letter to FIFA about this. Have you heard back? What is it that you hope they would do?\n\nKAMLAGER-DOVE: Well, I think these ticket prices are, in technical terms, a hot mess for fans and for cities. We sent a letter, we haven't heard back from FIFA, but the issue is dynamic pricing.\n\nThe other issue is you buy a ticket, you don't know where that seat is going to be, you're spending over $1,000, and finally you get the seat and you're behind a post and you can't see anything.\n\nWe want to know why ticket prices are changing so dramatically from city to city. I want to know why cities aren't getting any financial support from the World Cup to actually put on the games because World Cup is getting everything -- concessions, merchandise, parking tickets. I mean, Infantino is taking the entire bag and we have gotten no information and in fact when we asked, then they raised tickets more. So what is going on with that?\n\nCORNISH: Okay, I have that same exact question, but for a different topic. The vote in California.\n\nKAMLAGER-DOVE: Yeah.\n\nCORNISH: Several panelists this week have been like, why does this take so long? I know that there are sort of state rules about being able to cast that vote right up until election day by mail, which means some are going to arrive later. But at a certain point, it feels as though it's absurd. Other blue states are able to get their counts in. KAMLAGER-DOVE: Well, we're a big state. We're a big state. We count every vote. It does take time. We have, I think, 58 counties.\n\nWe are close to being done. I think they're about 600,000 votes left to be counted.\n\nCORNISH: Oh, is that all? Do you have somewhere to go now?\n\nKAMLAGER-DOVE: We have like 35 million people in this state. And we want to be accurate. Yes, it does take a little long, but I would rather my vote be counted than have it be snatched up by a sheriff like Chad Bianco who's trying to suppress the vote. So --\n\nCORNISH: It will be this argument about suppressing the vote versus Trump sort of allegations and. Republican claims that, look, maybe this means there's cheating going on. The longer it goes, doesn't it open you up to speculation?\n\nKAMLAGER-DOVE: No, I don't think so. I mean, obviously, the California, we're continuing to work through challenges, but I have complete trust in our secretary of state. I've actually been to the L.A. County Registrar. I have toured the facility. I see how they count, how meticulous they are. I have complete confidence in our system.\n\nCORNISH: Okay. Our panel may jump in a bit, but I just wanted to ask you one other thing. I saw this moment. You're always good for an image in hearings, I think. Okay?\n\nAnd in this one, you had this back and forth with the Secretary of State Marco Rubio. And you were also talking about issues of transparency in the administration. I'm going to try and play a good section of it so people can see what happened.\n\nKAMLAGER-DOVE: Oh, dear.\n\nKAMLAGER-DOVE: We're talking pardons for sale. We're talking about no-bid contracts to those on Trump's family and friends plan. We're talking about a $1.8 billion slush fund.\n\nAnd I think that's corruption. The American people think that's corruption. They want to know if you think that's corruption.\n\nMARCO RUBIO, SECRETARY OF STATE: Okay. Number two, this goes right to the point of transparency. You're absolutely wrong about the way the money flows. It's pretty straightforward, and I'll share it.\n\nKAMLAGER-DOVE: So I'm going to have to reclaim my time again, because the question about corruption --\n\nRUBIO: They get to ask questions you don't get to answer? Why is she leaving? I'm going to answer her questions.\n\nUNIDENTIFIED FEMALE: I will -- RUBIO: Oh, she's -- OK, I got it. Well, thank you for coming.\n\nCORNISH: Why'd you leave?\n\nKAMLAGER-DOVE: I left because I had another hearing and Secretary Rubio, who used to be a senator, knows that. So my time was up. I couldn't get any more time. I had to go to my next committee.\n\nWhat you really saw was a secretary who was filibustering and upset because I was asking him for receipts. Five months ago, Donald, what you really saw was a secretary who was filibustering and upset because I was asking him for receipts. Five months ago, Donald Trump's administration commandeered Venezuelan oil, and we have had zero transparency into that money. The companies --\n\nCORNISH: They're supposed to go through the Treasury and things like that, right?\n\nKAMLAGER-DOVE: Right. There's supposed to be an audit we haven't seen it. There are companies that have gotten these confidential licenses. Who are they? One of them was investigated for bribery by the DOJ. There was an employee at one of them that gave Trump $6 million for his campaign. And we want to know. We want to see those receipts. And I was asking him about that, and he was filibustering, and he was obviously triggered.\n\nKING: Do you think voters really do care about corruption? Because I feel like this is really an outstanding question. What is going on in this administration, if you're following it carefully, is unbelievable.\n\nAnd yet, you don't really hear very much about it from people who are not constantly watching the news, constantly thinking about what the administration is doing. And I wonder, is it a winning issue to say corruption, corruption, corruption, or does it become exhausting?\n\nKAMLAGER-DOVE: It is exhausting, and my constituents believe that this is the most corrupt administration in American history. They were outraged by this $1.8 billion slush fund that could be going to January 6ers.\n\nYou have pardons for sale. You have no bid contracts going to people that are on Trump's family and friends plan. You have attorney generals and FBI secretaries that seem to be working for Donald Trump rather than the American people.\n\nAnd the American people say, hey, this guy just took away my health care. The gas prices are going up and he's getting an arch and he's getting a ballroom.\n\nCORNISH: You can hear the narrative sort of how it comes together. Yeah.\n\nKAMLAGER-DOVE: And now you have -- we don't even know how much money is being siphoned from the sale of this Venezuelan oil and we can't see into it.\n\nCORNISH: All right, welcome back to the Group Chat as well.\n\nWhat is going on in your group chats?\n\nKAMLAGER-DOVE: Pete Hegseth. So there is this video that came out and he was supposed to be exercising with the Marines and it looked like he was about to get cut from a chorus line.\n\nCORNISH: Well, what's been interesting about seeing the Pete Hegseth exercise videos is that people have reset them to other kinds of music. And you mentioned chorus line, it's happened in other things. To the point, very briefly, military recruitment is up. They have met their goals.\n\nKAMLAGER-DOVE: Okay, good for them. But I will also tell you that the Women's Caucus was trying to honor women veterans.\n\nKAMLAGER-DOVE: And it got shut down because of Pete Hegseth, because of DEI. So we can no longer celebrate women of color. We cannot celebrate women who are in the military. And that should shock and outrage everyone who wants to make sure that the most qualified, the most competent --\n\nCORNISH: Never mind the firings that people have been --\n\nKAMLAGER-DOVE: Exactly, or celebrated.\n\nCORNISH: Carine, can you tell me, \"Washington Post\" editorial board -- can you tell me what is in your group chat?\n\nHAJJAR: Well, what's in my group chat is something I think everyone can agree on, which is my dogs are adorable at home.\n\nCORNISH: I thought you were going to say \"Summer House\", which has been the most consistent group chat. Okay, animals. Let's do it.\n\nHAJJAR: On the left is our new family dog Luna, who is Rocky on the right's niece and My dad found out today, and this is what was in the group chat, or he found out this week, that she's been biting off the sprinkler heads in our yard. She's obsessed with water.\n\nSo they bought her another little sprinkler to keep her busy, but she's caused some damage.\n\nCORNISH: I don't know about this headline, loves water. was on metal appliances.\n\nHAJJAR: Kind of destructive but -- CORNISH: Elliot, for you?\n\nWILLIAMS: Keeping it as serious as that. So, you know, the NBA Finals game two tonight, but Elmo from Sesame Street weighed in, hoping that both teams had fun. And as a New York fan myself, this sticks me a little bit. Elmo hopes some of these teams as well. Knicks, that last message, Elmo didn't mean to spur you.\n\nBut it gets worse. New York fans are shredding Elmo, one of them saying, this is not the time for sportsmanship, Elmo. These streets aren't Sesame.\n\nWILLIAMS: I hope Elmo -- I hope Elmo gets priced out and has to move to New Jersey. And don't you dare forget your roots, you red little F.\n\nWILLIAMS: This is worse than going after the Pope. This is worse than going after the Pope.\n\nSo again, Knicks fan, not Knicks fan. It's still New York, but New York's going to New York, you know?\n\nCORNISH: So they're taking stuff for surfacing that important reporting.\n\nOK, Noel, last word to you.\n\nKING: My group chat is should I go see the movie \"Backrooms\", which is supposed to be terrible.\n\nCORNISH: No, I'm going to see it today. Yeah.\n\nKING: Okay, you tell me.\n\nCORNISH: Well, because from the YouTube meme to YouTube to Hollywood pipeline, you know about this, about studios, they'd be worried because if kids are making the films on their own, what can they say yes or no to? Are you going to see any of these horror films?\n\nKAMLAGER-DOVE: No. I live horror every day in the Congress.\n\nCORNISH: That's the back room of the House of Representatives is what you're saying.\n\nOkay, thanks to our group chat. Thank you, Congresswoman, for being here. We truly appreciate it.\n\nI'm Audie Cornish and stay with us because the headlines are next."}],"vocabulary":[{"word":"stinging","phonetic":"/ˈstɪŋɪŋ/","pos":"adj.","level":"六级","cn":"刺痛的；尖锐的","en":"causing a sharp, painful sensation or strong criticism","excerpt":"There was a big Republican victory just moments ago, quickly followed by a stinging setback.","example_cn":"他的评论刺痛了对手。"},{"word":"setback","phonetic":"/ˈsetbæk/","pos":"n.","level":"六级","cn":"挫折；阻碍","en":"a problem that delays or reverses progress","excerpt":"There was a big Republican victory just moments ago, quickly followed by a stinging setback.","example_cn":"项目遭遇了意外的挫折。"},{"word":"charred","phonetic":"/tʃɑːrd/","pos":"adj.","level":"六级","cn":"烧焦的","en":"burned and blackened","excerpt":"The charred interior of a U.S. aircraft carrier after a fast-moving fire on board.","example_cn":"火灾后只剩下烧焦的木头。"},{"word":"contentious","phonetic":"/kənˈtenʃəs/","pos":"adj.","level":"六级","cn":"有争议的；引起争论的","en":"causing or likely to cause disagreement","excerpt":"Seven Senate Republicans voted to block consideration of a contentious bill that would reauthorize the nation's spy powers.","example_cn":"这是一个有争议的话题。"},{"word":"reauthorize","phonetic":"/riːˈɔːθəraɪz/","pos":"v.","level":"六级","cn":"重新授权","en":"to give official permission again for something","excerpt":"Seven Senate Republicans voted to block consideration of a contentious bill that would reauthorize the nation's spy powers.","example_cn":"国会必须重新授权该计划。"},{"word":"volatile","phonetic":"/ˈvɑːlətl/","pos":"adj.","level":"六级","cn":"易变的；动荡的","en":"likely to change suddenly and unexpectedly","excerpt":"A report published in \"The New York Times,\" describing volatile and toxic relationships.","example_cn":"政治局势依然动荡。"},{"word":"toxic","phonetic":"/ˈtɑːksɪk/","pos":"adj.","level":"六级","cn":"有毒的；恶毒的","en":"very harmful or unpleasant","excerpt":"A report published in \"The New York Times,\" describing volatile and toxic relationships.","example_cn":"他们处于一种有害的关系中。"},{"word":"unequivocal","phonetic":"/ˌʌnɪˈkwɪvəkl/","pos":"adj.","level":"六级","cn":"明确的；毫不含糊的","en":"clear and having no doubt","excerpt":"Anything alleging physicality; anything alleging that I knew what my tattoo was. These are the statements of someone who's politically motivated.","example_cn":"他给出了明确的答复。"},{"word":"allege","phonetic":"/əˈledʒ/","pos":"v.","level":"六级","cn":"断言；指控","en":"to state something as a fact but without proof","excerpt":"One of them accuses him of twisting her arm.","example_cn":"原告指控被告欺诈。"},{"word":"self-medicate","phonetic":"/ˌself ˈmedɪkeɪt/","pos":"v.","level":"六级","cn":"自行用药；自我治疗","en":"to treat oneself with medication without professional advice","excerpt":"Certainly, self-medicating with alcohol.","example_cn":"他通过饮酒来自我治疗。"},{"word":"cut bait","phonetic":"/kʌt beɪt/","pos":"phrase","level":"六级","cn":"放弃；断绝关系","en":"to stop supporting or being involved with someone or something","excerpt":"The question this morning for Democrats: is it too late to cut bait?","example_cn":"公司决定放弃这个项目。"},{"word":"flashing red lights","phonetic":"/ˈflæʃɪŋ red laɪts/","pos":"phrase","level":"六级","cn":"警示信号","en":"warning signs indicating danger or problems","excerpt":"I think those are flashing red lights that you have a problematic candidate.","example_cn":"这些数据是警示信号。"},{"word":"spiel","phonetic":"/ʃpiːl/","pos":"n.","level":"六级","cn":"滔滔不绝的讲话；说辞","en":"a long or fast speech that someone has often said before","excerpt":"His whole entire spiel has been, I was a bad guy. I saw the light.","example_cn":"他开始了他的推销说辞。"},{"word":"manosphere","phonetic":"/ˈmænəsfɪr/","pos":"n.","level":"六级","cn":"男性圈（网络亚文化）","en":"a collection of websites, blogs, and forums focusing on men's issues and masculinity","excerpt":"I could have been in the manosphere.","example_cn":"他活跃于男性圈论坛。"},{"word":"ghost","phonetic":"/ɡoʊst/","pos":"v.","level":"六级","cn":"突然断绝联系（尤指恋爱关系）","en":"to suddenly stop all communication with someone, especially in a romantic relationship","excerpt":"I think he ghosted somebody.","example_cn":"他约会后就不再联系她了。"},{"word":"litmus test","phonetic":"/ˈlɪtməs test/","pos":"n.","level":"六级","cn":"试金石；决定性考验","en":"a test that uses a single factor to decide whether something is acceptable or not","excerpt":"The Democratic litmus test has been...","example_cn":"这次选举是对民主的试金石。"},{"word":"original sin","phonetic":"/əˈrɪdʒənl sɪn/","pos":"n.","level":"六级","cn":"原罪；根本问题","en":"the basic or fundamental problem","excerpt":"I think people should be clear as to what exactly they're regarding as the original sin here.","example_cn":"这个项目的原罪是缺乏规划。"},{"word":"weigh in","phonetic":"/weɪ ɪn/","pos":"phrase","level":"六级","cn":"参与讨论；发表意见","en":"to join a discussion or give an opinion","excerpt":"The two categories of people who really need to weigh in are...","example_cn":"专家们就这个问题发表了意见。"},{"word":"scandal-plagued","phonetic":"/ˈskændl pleɪɡd/","pos":"adj.","level":"六级","cn":"丑闻缠身的","en":"affected by many scandals","excerpt":"This campaign has been so scandal-plagued that I think almost the effect has been watered down.","example_cn":"这位丑闻缠身的政客辞职了。"},{"word":"water down","phonetic":"/ˈwɔːtər daʊn/","pos":"phrase","level":"六级","cn":"削弱；淡化","en":"to make something less strong or effective","excerpt":"This campaign has been so scandal-plagued that I think almost the effect has been watered down.","example_cn":"他们淡化了报告中的批评。"},{"word":"whataboutism","phonetic":"/wɒtəˈbaʊtɪzəm/","pos":"n.","level":"六级","cn":"转移话题；你也一样","en":"the practice of responding to an accusation by making a similar accusation against the accuser","excerpt":"There's going to be a lot of whataboutism.","example_cn":"辩论中充满了转移话题。"},{"word":"backtrack","phonetic":"/ˈbæktræk/","pos":"v.","level":"六级","cn":"改变主意；撤回","en":"to change an earlier statement or opinion","excerpt":"Business mogul Kevin O'Leary backtracking from plans to build a massive A.I. data center in Utah.","example_cn":"政府在其政策上退缩了。"},{"word":"guardrails","phonetic":"/ˈɡɑːrdreɪlz/","pos":"n.","level":"六级","cn":"护栏；保护措施","en":"safety measures or limits","excerpt":"We need some guardrails.","example_cn":"人工智能需要监管护栏。"},{"word":"self-replicate","phonetic":"/ˌself ˈreplɪkeɪt/","pos":"v.","level":"六级","cn":"自我复制","en":"to reproduce itself","excerpt":"Because it can self-replicate.","example_cn":"病毒能够自我复制。"},{"word":"commencement address","phonetic":"/kəˈmensmənt əˈdres/","pos":"n.","level":"六级","cn":"毕业典礼演讲","en":"a speech given at a graduation ceremony","excerpt":"Scott Pelley, delivering the commencement address at Wake Forest University just last year.","example_cn":"校长发表了毕业典礼演讲。"},{"word":"axe","phonetic":"/æks/","pos":"v.","level":"六级","cn":"解雇；削减","en":"to dismiss someone from a job or to reduce something","excerpt":"She axed several show staffers and correspondents.","example_cn":"公司裁减了数百个工作岗位。"},{"word":"part ways","phonetic":"/pɑːrt weɪz/","pos":"phrase","level":"六级","cn":"分道扬镳；离开","en":"to end a relationship or association","excerpt":"We had to part ways.","example_cn":"他们决定分道扬镳。"},{"word":"tumultuous","phonetic":"/tuːˈmʌltʃuəs/","pos":"adj.","level":"六级","cn":"动荡的；混乱的","en":"involving a lot of noise, excitement, activity, or violence","excerpt":"These have been the most tumultuous eight days in \"60 Minutes\" history.","example_cn":"这是一个动荡的时期。"},{"word":"archaic","phonetic":"/ɑːrˈkeɪɪk/","pos":"adj.","level":"六级","cn":"过时的；古老的","en":"old and no longer used or suitable for modern times","excerpt":"She believes \"60 Minutes\" is out of date and archaic.","example_cn":"这个系统已经过时了。"},{"word":"cozy up to","phonetic":"/ˈkoʊzi ʌp tuː/","pos":"phrase","level":"六级","cn":"讨好；亲近","en":"to try to become friendly with someone, especially to gain an advantage","excerpt":"Paramount has tried to cozy up to Trump while trying to buy CNN.","example_cn":"他试图讨好老板。"},{"word":"inescapably","phonetic":"/ˌɪnɪˈskeɪpəbli/","pos":"adv.","level":"六级","cn":"不可避免地","en":"in a way that cannot be avoided","excerpt":"Those corporate politics are inescapably part of this story.","example_cn":"他们不可避免地卷入了冲突。"},{"word":"pins","phonetic":"/pɪnz/","pos":"v.","level":"考研","cn":"归咎于","en":"to blame or hold responsible","excerpt":"Bondi Pins Epstein File Release On Blanche","example_cn":"她把失败归咎于队友。"},{"word":"confirmation hearing","phonetic":"/ˌkɑːnfərˈmeɪʃn ˈhɪrɪŋ/","pos":"n.","level":"六级","cn":"确认听证会","en":"a hearing to confirm a nominee","excerpt":"Acting Attorney General Todd Blanche will face a Senate confirmation hearing","example_cn":"法官的确认听证会定于下周举行。"},{"word":"closed-door","phonetic":"/ˌkloʊzd ˈdɔːr/","pos":"adj.","level":"六级","cn":"闭门的","en":"private, not open to the public","excerpt":"Pam Bondi's closed-door interview with lawmakers","example_cn":"他们举行了一次闭门会议。"},{"word":"lay-up","phonetic":"/ˈleɪ ʌp/","pos":"n.","level":"考研","cn":"轻松得分的机会","en":"an easy opportunity","excerpt":"Democrats can essentially have a lay-up","example_cn":"这个问题对他们来说是个轻松得分的机会。"},{"word":"weaponization","phonetic":"/ˌwepənaɪˈzeɪʃn/","pos":"n.","level":"六级","cn":"武器化","en":"the act of turning something into a weapon","excerpt":"the weaponization fund","example_cn":"他们批评将司法系统武器化。"},{"word":"botched","phonetic":"/bɑːtʃt/","pos":"adj.","level":"考研","cn":"搞砸的","en":"done badly or clumsily","excerpt":"this botched rollout","example_cn":"这次搞砸的发布损害了他们的声誉。"},{"word":"litmus test","phonetic":"/ˈlɪtməs test/","pos":"n.","level":"六级","cn":"试金石","en":"a decisive test","excerpt":"a litmus test on transparency","example_cn":"这次投票是对他忠诚度的试金石。"},{"word":"erodes","phonetic":"/ɪˈroʊdz/","pos":"v.","level":"考研","cn":"侵蚀","en":"gradually destroy","excerpt":"that erodes trust","example_cn":"不断的谎言侵蚀了公众的信任。"},{"word":"appeased","phonetic":"/əˈpiːzd/","pos":"v.","level":"六级","cn":"安抚","en":"to calm or satisfy","excerpt":"that constituency is not going to be appeased","example_cn":"政府试图安抚抗议者。"},{"word":"throwing him under the bus","phonetic":"/ˈθroʊɪŋ hɪm ˈʌndər ðə bʌs/","pos":"phrase","level":"六级","cn":"牺牲某人","en":"to sacrifice someone for personal gain","excerpt":"throwing him under the bus","example_cn":"为了保住自己的工作，她把同事推出去当替罪羊。"},{"word":"hallucinated","phonetic":"/həˈluːsɪneɪtɪd/","pos":"v.","level":"六级","cn":"产生幻觉","en":"to experience false perceptions","excerpt":"hallucinated by artificial intelligence","example_cn":"人工智能可能会产生幻觉并编造事实。"},{"word":"sanctioned","phonetic":"/ˈsæŋkʃnd/","pos":"v.","level":"考研","cn":"制裁","en":"to impose a penalty","excerpt":"getting sanctioned and barred from the court","example_cn":"该律师因不当行为受到制裁。"},{"word":"fabricating","phonetic":"/ˈfæbrɪkeɪtɪŋ/","pos":"v.","level":"六级","cn":"捏造","en":"to invent falsely","excerpt":"fabricating entire briefs with A.I.","example_cn":"他被指控捏造证据。"},{"word":"deluge","phonetic":"/ˈdeljuːdʒ/","pos":"n.","level":"考研","cn":"泛滥","en":"a great flood or overwhelming amount","excerpt":"the courts are deluge with these","example_cn":"法院被大量诉讼淹没。"},{"word":"snag","phonetic":"/snæɡ/","pos":"n.","level":"考研","cn":"障碍","en":"an unexpected problem","excerpt":"another snag for L.A.","example_cn":"计划遇到了一个障碍。"},{"word":"deplaning","phonetic":"/diːˈpleɪnɪŋ/","pos":"v.","level":"六级","cn":"下飞机","en":"to get off an aircraft","excerpt":"They're deplaning","example_cn":"乘客正在下飞机。"},{"word":"jammed","phonetic":"/dʒæmd/","pos":"v.","level":"考研","cn":"猛推","en":"to push forcefully","excerpt":"our senator being jammed to the ground","example_cn":"他被推倒在地。"},{"word":"snatched up","phonetic":"/snætʃt ʌp/","pos":"phrase","level":"六级","cn":"抓走","en":"to grab or take quickly","excerpt":"if I get snatched up by ICE","example_cn":"移民官员可能会在街上抓人。"},{"word":"dynamic pricing","phonetic":"/daɪˈnæmɪk ˈpraɪsɪŋ/","pos":"n.","level":"六级","cn":"动态定价","en":"pricing that changes based on demand","excerpt":"the issue is dynamic pricing","example_cn":"机票采用动态定价。"},{"word":"filibustering","phonetic":"/ˈfɪlɪbʌstərɪŋ/","pos":"v.","level":"六级","cn":"阻挠议事","en":"to delay legislation by prolonged speaking","excerpt":"a secretary who was filibustering","example_cn":"参议员通过冗长发言阻挠议案通过。"},{"word":"triggered","phonetic":"/ˈtrɪɡərd/","pos":"adj.","level":"考研","cn":"被激怒的","en":"angry or upset","excerpt":"he was obviously triggered","example_cn":"他的评论让她很生气。"},{"word":"slush fund","phonetic":"/ˈslʌʃ fʌnd/","pos":"n.","level":"六级","cn":"贿赂基金","en":"a fund used for illicit purposes","excerpt":"a $1.8 billion slush fund","example_cn":"他们被指控设立贿赂基金。"},{"word":"siphoned","phonetic":"/ˈsaɪfənd/","pos":"v.","level":"考研","cn":"抽取","en":"to divert or take away","excerpt":"money being siphoned from the sale","example_cn":"资金被从项目中抽走。"},{"word":"chorus line","phonetic":"/ˈkɔːrəs laɪn/","pos":"n.","level":"六级","cn":"合唱队","en":"a line of dancers in a musical","excerpt":"cut from a chorus line","example_cn":"他跳舞像合唱队成员。"},{"word":"DEI","phonetic":"/diː iː aɪ/","pos":"n.","level":"六级","cn":"多元化、公平与包容","en":"diversity, equity, and inclusion","excerpt":"because of DEI","example_cn":"公司致力于DEI倡议。"},{"word":"priced out","phonetic":"/praɪst aʊt/","pos":"phrase","level":"考研","cn":"因价格过高而被排除","en":"to be forced out due to high costs","excerpt":"I hope Elmo gets priced out","example_cn":"许多居民因房价上涨而被挤出市场。"},{"word":"roots","phonetic":"/ruːts/","pos":"n.","level":"考研","cn":"根源","en":"origins or background","excerpt":"don't you dare forget your roots","example_cn":"他从未忘记自己的根源。"},{"word":"pipeline","phonetic":"/ˈpaɪplaɪn/","pos":"n.","level":"考研","cn":"渠道","en":"a channel or process","excerpt":"from YouTube to Hollywood pipeline","example_cn":"这个人才渠道为科技公司输送员工。"},{"word":"Herculean","phonetic":"/ˌhɜːrkjʊˈliːən/","pos":"adj.","level":"六级","cn":"艰巨的","en":"requiring great strength or effort","excerpt":"management of this Herculean task","example_cn":"这是一项艰巨的任务。"},{"word":"beyond reproach","phonetic":"/bɪˈjɑːnd rɪˈproʊtʃ/","pos":"phrase","level":"六级","cn":"无可指责","en":"perfect, without fault","excerpt":"his ethics are beyond reproach","example_cn":"她的行为无可指责。"}],"sentences":[{"en":"The U.S. Senate took almost 20 hours voting down amendment after amendment.","cn":"美国参议院花了近20个小时逐一否决修正案。","structure":"主谓宾结构，'voting down'为现在分词短语作伴随状语。","analysis":"主语：The U.S. Senate；谓语：took；宾语：almost 20 hours；'voting down amendment after amendment'为现在分词短语，表示伴随动作。"},{"en":"But Senate Republicans rejected proposals to formally kill the president's anti-weaponization fund in the process.","cn":"但参议院共和党人拒绝了在此过程中正式废除总统反武器化基金的提议。","structure":"主谓宾结构，不定式短语'to formally kill...'作定语修饰'proposals'。","analysis":"主语：Senate Republicans；谓语：rejected；宾语：proposals；不定式短语'to formally kill...'修饰'proposals'，说明提议的内容。"},{"en":"Now, just minutes later, seven Senate Republicans voted to block consideration of a contentious bill that would reauthorize the nation's spy powers.","cn":"几分钟后，七名参议院共和党人投票阻止审议一项有争议的法案，该法案将重新授权国家的间谍权力。","structure":"主谓宾结构，'that would reauthorize...'为定语从句修饰'bill'。","analysis":"主语：seven Senate Republicans；谓语：voted；宾语：to block consideration of a contentious bill；'that would reauthorize...'为定语从句，修饰'bill'。"},{"en":"A report published in \"The New York Times,\" describing volatile and toxic relationships.","cn":"《纽约时报》发表的一篇报道描述了动荡且有害的关系。","structure":"名词短语，'published in...'和'describing...'均为分词短语作定语。","analysis":"中心词：A report；'published in \"The New York Times\"'为过去分词短语作定语；'describing volatile and toxic relationships'为现在分词短语作定语。"},{"en":"One of them accuses him of twisting her arm.","cn":"其中一人指控他扭伤了她的手臂。","structure":"主谓宾宾补结构，'of twisting her arm'为介词短语作宾语补足语。","analysis":"主语：One of them；谓语：accuses；宾语：him；'of twisting her arm'为介词短语，补充说明指控的内容。"},{"en":"Some accounts go back more than a decade to a time when Platner, a combat veteran, says he was struggling with PTSD.","cn":"一些描述可以追溯到十多年前，当时普拉特纳，一位退伍军人，说他正在与创伤后应激障碍作斗争。","structure":"主谓宾结构，'when...'为定语从句修饰'time'。","analysis":"主语：Some accounts；谓语：go back；宾语：more than a decade to a time；'when Platner...says he was struggling with PTSD'为定语从句，修饰'time'。"},{"en":"And I've been very up front since the beginning of this campaign that that was a pretty dark period of my life after I came back from my combat service.","cn":"自从竞选开始，我就一直非常坦诚，那是我服役归来后人生中相当黑暗的一段时期。","structure":"主系表结构，'that...'为宾语从句。","analysis":"主语：I；系动词：'ve been；表语：very up front；'since the beginning of this campaign'为时间状语；'that...'为宾语从句，说明坦诚的内容。"},{"en":"But those serious allegations are just not true.","cn":"但那些严重的指控根本不属实。","structure":"主系表结构。","analysis":"主语：those serious allegations；系动词：are；表语：not true。"},{"en":"The question this morning for Democrats: is it too late to cut bait?","cn":"今早民主党面临的问题是：现在放弃是否太晚了？","structure":"主系表结构，疑问句。","analysis":"主语：it；系动词：is；表语：too late to cut bait；'The question...'为同位语。"},{"en":"I think those are flashing red lights that you have a problematic candidate and that we're -- that Democrats are scrambling right before the Tuesday primary.","cn":"我认为这些都是警示信号，表明你有一个有问题的候选人，而且我们——民主党人正在周二初选前手忙脚乱。","structure":"主谓宾结构，'that...'为宾语从句，内含并列的定语从句。","analysis":"主语：I；谓语：think；宾语：those are flashing red lights...；'that you have...'和'that we're...'为并列的定语从句，修饰'flashing red lights'。"},{"en":"His whole entire spiel has been, I was a bad guy. I saw the light.","cn":"他整个说辞一直是：我曾经是个坏人，我醒悟了。","structure":"主系表结构，表语为直接引语。","analysis":"主语：His whole entire spiel；系动词：has been；表语：'I was a bad guy. I saw the light.'"},{"en":"And you want more guys like me seeing the light.","cn":"而你想要更多像我这样的人醒悟。","structure":"主谓宾宾补结构，'seeing the light'为现在分词短语作宾补。","analysis":"主语：you；谓语：want；宾语：more guys like me；'seeing the light'为现在分词短语作宾语补足语。"},{"en":"The thing that I think everybody wildly wants to know is do voters abandon this guy because of the problematic behavior?","cn":"我认为大家都非常想知道的是，选民是否会因为他的问题行为而抛弃他？","structure":"主系表结构，主语含定语从句，表语为疑问句。","analysis":"主语：The thing that I think everybody wildly wants to know；系动词：is；表语：do voters abandon this guy because of the problematic behavior?"},{"en":"And a guy who says, Well, in my 20s, I was often drunk and had PTSD, and that is my excuse.","cn":"而一个说“嗯，我二十多岁时经常喝醉，患有创伤后应激障碍，这就是我的借口”的人。","structure":"名词短语，'who says...'为定语从句。","analysis":"中心词：a guy；'who says...'为定语从句，从句中直接引语作宾语。"},{"en":"There are some awful things here with an individual who is clearly struggling with PTSD, depression, alcoholism, and a host of other things.","cn":"这里有一些可怕的事情，涉及一个明显在与创伤后应激障碍、抑郁、酗酒和许多其他问题作斗争的人。","structure":"There be 句型，'who...'为定语从句。","analysis":"There are some awful things；'with an individual'为介词短语；'who is clearly struggling...'为定语从句修饰'individual'。"},{"en":"But I think, you know, the two folk -- the two categories of people who really need to weigh in are, No. 1, Maine voters. And No. 2, Democratic women.","cn":"但我认为，你知道，真正需要发表意见的两类人是：第一，缅因州选民；第二，民主党女性。","structure":"主谓宾结构，'who...'为定语从句。","analysis":"主语：I；谓语：think；宾语：the two categories of people...；'who really need to weigh in'为定语从句修饰'people'。"},{"en":"Like what they are comfortable with defending.","cn":"比如他们愿意为哪些事情辩护。","structure":"介词短语，'what...'为宾语从句。","analysis":"介词：Like；宾语：what they are comfortable with defending。"},{"en":"I saw, buried in our clips, Ms. Gillibrand, right, who at one point was at the forefront of weighing in on this kind of drawing a line.","cn":"我看到，在我们的剪辑中，吉利布兰德女士，她曾一度站在就这种划清界限发表意见的前沿。","structure":"主谓宾结构，'buried in our clips'为插入语，'who...'为定语从句。","analysis":"主语：I；谓语：saw；宾语：Ms. Gillibrand；'buried in our clips'为过去分词短语作插入语；'who...'为定语从句修饰'Ms. Gillibrand'。"},{"en":"But I do think, when you start with a Nazi tattoo, and then scandal after scandal after scandal comes out, you should really -- we should really be focusing on that first big red flag.","cn":"但我确实认为，当你从一个纳粹纹身开始，然后一个又一个丑闻曝光时，你真的应该——我们真的应该关注第一个大的警示信号。","structure":"主谓宾结构，'when...'为时间状语从句。","analysis":"主语：I；谓语：do think；宾语：you should really...；'when...'为时间状语从句。"},{"en":"If there were a Republican candidate with a Nazi tattoo, with allegations of -- forget the ghosting -- literally grabbing women or being abusive or hostile in relationships, Democrats would lose their minds over that.","cn":"如果有一个共和党候选人带有纳粹纹身，被指控——忘了突然断联——实际上抓扯女性或在关系中虐待或敌对，民主党人会对此发疯的。","structure":"虚拟条件句，主句为'would lose'。","analysis":"If引导虚拟条件句，从句：there were a Republican candidate...；主句：Democrats would lose their minds over that。"},{"en":"Business mogul Kevin O'Leary backtracking from plans to build a massive A.I. data center in Utah.","cn":"商业大亨凯文·奥利里从在犹他州建造大型人工智能数据中心的计划中退缩。","structure":"现在分词短语作主语，'to build...'为不定式短语作定语。","analysis":"主语：Business mogul Kevin O'Leary；谓语：backtracking；'from plans'为介词短语；'to build...'为不定式短语修饰'plans'。"},{"en":"The letter comes after weeks of protests at public meetings and just days after Utah's government pressured O'Leary to shrink the size of the development.","cn":"这封信是在数周公众会议抗议之后，以及犹他州政府施压奥利里缩小开发规模几天后发出的。","structure":"主谓结构，'after...'为时间状语。","analysis":"主语：The letter；谓语：comes；'after weeks of protests...'为时间状语。"},{"en":"People are concerned about -- about data centers. They're concerned about the lake. They're concerned about resources.","cn":"人们担心——担心数据中心。他们担心湖泊。他们担心资源。","structure":"主系表结构，'about...'为介词短语作状语。","analysis":"主语：People；系动词：are；表语：concerned；'about data centers'等为介词短语。"},{"en":"Now, Pelley was fired on Tuesday after a heated staff meeting, where he accused editor-in-chief Bari Weiss of, quote, \"murdering '60 Minutes'\" after she axed several show staffers and correspondents.","cn":"周二，佩利在一次激烈的员工会议后被解雇，他在会上指责主编巴里·韦斯在解雇了几名节目工作人员和记者后“谋杀《60分钟》”。","structure":"主谓结构，'after...'为时间状语，'where...'为定语从句。","analysis":"主语：Pelley；谓语：was fired；'after a heated staff meeting'为时间状语；'where...'为定语从句修饰'meeting'。"},{"en":"Despite our attempts to engage with Scott Pelley and to find a way back, unfortunately, we weren't able to do so.","cn":"尽管我们试图与斯科特·佩利接触并找到回归之路，但不幸的是，我们未能做到。","structure":"让步状语从句，主句为'we weren't able to do so'。","analysis":"Despite引导让步状语从句，从句：our attempts to engage...；主句：we weren't able to do so。"},{"en":"Bari Weiss knows what she said is not true.","cn":"巴里·韦斯知道她说的不是真的。","structure":"主谓宾结构，'what...'为宾语从句。","analysis":"主语：Bari Weiss；谓语：knows；宾语：what she said is not true。"},{"en":"There was no effort of any kind to, quote, 'find a way back'.","cn":"没有任何形式的努力，引用一下，“找到回归之路”。","structure":"There be 句型，'to...'为不定式短语作定语。","analysis":"There was no effort；'of any kind'为介词短语；'to find a way back'为不定式短语修饰'effort'。"},{"en":"These have been the most tumultuous eight days in \"60 Minutes\" history, starting off with the layoffs last week of those top producers and correspondents.","cn":"这是《60分钟》历史上最动荡的八天，始于上周解雇那些顶级制片人和记者。","structure":"主系表结构，'starting off...'为现在分词短语作状语。","analysis":"主语：These；系动词：have been；表语：the most tumultuous eight days；'starting off...'为现在分词短语作伴随状语。"},{"en":"She believes the CBS News organization is old-fashioned. She believes \"60 Minutes\" is out of date and archaic, even though it's really valuable and popular, and she wants to reform it.","cn":"她认为CBS新闻组织过时了。她认为《60分钟》过时且陈旧，尽管它确实有价值且受欢迎，她想改革它。","structure":"主谓宾结构，'even though...'为让步状语从句。","analysis":"主语：She；谓语：believes；宾语：the CBS News organization is old-fashioned；'even though...'为让步状语从句。"},{"en":"He put out a statement last night, actually, a memo to staff, but it was really written for the public, as well.","cn":"他昨晚实际上发布了一份声明，一份给员工的备忘录，但它实际上也是写给公众的。","structure":"主谓宾结构，'a memo to staff'为同位语。","analysis":"主语：He；谓语：put out；宾语：a statement；'a memo to staff'为同位语；'but...'为并列句。"},{"en":"I basically view this memo as him making the commitment publicly so that he can keep these remaining correspondents on board and not lose any more staff members.","cn":"我基本上将这份备忘录视为他公开做出承诺，以便他能留住这些剩下的记者，不再失去更多员工。","structure":"主谓宾宾补结构，'so that...'为目的状语从句。","analysis":"主语：I；谓语：view；宾语：this memo；宾补：as him making the commitment publicly；'so that...'为目的状语从句。"},{"en":"But Trump, you know, hangs over this entire conversation, because he sued \"60 Minutes\"; because he's been critical of \"60 Minutes\"; and because Paramount has tried to cozy up to Trump while trying to buy CNN and the rest of WBD.","cn":"但特朗普，你知道，笼罩着整个对话，因为他起诉了《60分钟》；因为他一直批评《60分钟》；还因为派拉蒙在试图收购CNN和WBD其余部分的同时试图讨好特朗普。","structure":"主谓结构，'because...'为并列原因状语从句。","analysis":"主语：Trump；谓语：hangs over；宾语：this entire conversation；'because...'为三个并列的原因状语从句。"},{"en":"Ultimately, those corporate politics are inescapably part of this story, even though CBS says it's trying to reform \"60 Minutes\" because of the culture, not about the politics.","cn":"最终，那些公司政治不可避免地成为这个故事的一部分，尽管CBS表示它试图改革《60分钟》是因为文化，而不是政治。","structure":"主系表结构，'even though...'为让步状语从句。","analysis":"主语：those corporate politics；系动词：are；表语：inescapably part of this story；'even though...'为让步状语从句。"},{"en":"You know, when I watch CBS, I don't think the coverage has changed markedly.","cn":"你知道，当我观看CBS时，我不认为报道发生了显著变化。","structure":"主谓宾结构，'when...'为时间状语从句。","analysis":"主语：I；谓语：don't think；宾语：the coverage has changed markedly；'when I watch CBS'为时间状语从句。"},{"en":"They're going to tune in to \"60 Minutes\" in September. They're going to sense whether the show is changed or not.","cn":"他们将在九月收看《60分钟》。他们会感觉到节目是否改变了。","structure":"主谓宾结构，'whether...'为宾语从句。","analysis":"主语：They；谓语：are going to sense；宾语：whether the show is changed or not。"},{"en":"She used her time in that closed-door session where she was sworn under oath in front of Congress as the former attorney general and as Todd Blanche's former boss to say, he ran the whole process, and he was in charge of the whole release, and the Dow's at 50,000, right?","cn":"她利用在闭门会议上的时间——当时她作为前司法部长和托德·布兰奇的前老板，在国会面前宣誓——说，他负责整个过程，他负责整个发布，而道琼斯指数在50000点，对吧？","structure":"主句：She used her time... to say...；定语从句：where she was sworn...；并列宾语从句：he ran..., he was in charge..., and the Dow's at...","analysis":"这是一个复杂句，主句为She used her time... to say...，其中包含一个由where引导的定语从句修饰closed-door session，定语从句中又有as短语作状语。say后跟三个并列的宾语从句，最后一个用and连接，并带有反问语气。"},{"en":"There are probably eight senators who are either up for reelection or in their screw it YOLO phase, I'm doing whatever I want or just tough votes that Republicans need the votes of and they can't afford to lose a lot of them.","cn":"大概有八位参议员要么面临连任，要么处于“管他呢，你只活一次”的阶段，我想做什么就做什么，或者只是艰难的投票，共和党需要他们的选票，而且他们不能失去太多。","structure":"主句：There are... senators；定语从句1：who are either... or...；定语从句2：that Republicans need...；并列句：and they can't afford...","analysis":"句子主干为There are... senators，后接who引导的定语从句，其中包含either...or...结构。or后接名词短语tough votes，再跟that引导的定语从句修饰tough votes。最后and连接并列句。"},{"en":"The key for Todd or anybody going through Judiciary Committee is being pretty tight on January the 6th.","cn":"对托德或任何通过司法委员会的人来说，关键是要在1月6日问题上立场坚定。","structure":"主系表：The key... is being...；介词短语：for Todd or anybody going through Judiciary Committee","analysis":"主语为The key，后接for短语说明对象，其中going through...是现在分词短语作后置定语。谓语为is，表语为动名词短语being pretty tight on...。"},{"en":"And I hear from Republican voters who are frustrated with how --","cn":"我听到共和党选民对……感到沮丧。","structure":"主谓宾：I hear from... voters；定语从句：who are frustrated with...；介词宾语从句：how...","analysis":"主句为I hear from Republican voters，后接who引导的定语从句，其中with后跟how引导的宾语从句，但句子被截断。"},{"en":"She can be praising his management and ethics and also throwing him under the bus on a matter that is incredibly popular or unpopular with a bipartisan selection of Americans.","cn":"她可以赞扬他的管理和道德，同时也可以在一件在两党美国人中都非常受欢迎或不受欢迎的事情上把他推出去当替罪羊。","structure":"主谓宾：She can be praising... and also throwing...；定语从句：that is... popular or unpopular...","analysis":"谓语为can be praising... and throwing...，并列两个动名词短语。throwing后接宾语him和状语on a matter，后跟that引导的定语从句修饰matter。"},{"en":"Now, when you start getting into the world of what are the cases I ought to be citing and either fabricating or just pulling information that you as a lawyer have not read, that's a problem.","cn":"现在，当你开始进入这样一个世界：哪些是我应该引用的案例，以及捏造或只是提取你作为律师没有读过的信息，那就有问题了。","structure":"时间状语从句：when you start...；主句：that's a problem；介词宾语从句：what are the cases...；定语从句：that you... have not read","analysis":"when引导时间状语从句，其中getting into the world of后接what引导的宾语从句，该从句中又包含省略that的定语从句I ought to be citing和and连接的并列结构，最后that引导定语从句修饰information。"},{"en":"At a certain point, you have to own what's happening in the building.","cn":"在某个时刻，你必须对大楼里发生的事情负责。","structure":"主谓宾：you have to own；宾语从句：what's happening in the building","analysis":"主句为you have to own，后接what引导的宾语从句。own在此意为“承认对……负责”。"},{"en":"The idea that this is just about Democrats, no, Republicans have a tough vote on you.","cn":"认为这只是关于民主党的想法，不，共和党人也要对你进行艰难的投票。","structure":"同位语从句：The idea that...；并列句：no, Republicans have...","analysis":"The idea后接that引导的同位语从句，说明idea的内容。然后no表示否定，后面是并列句。"},{"en":"And we want to know why ticket prices are changing so dramatically from city to city.","cn":"我们想知道为什么票价在不同城市之间变化如此之大。","structure":"主谓宾：we want to know；宾语从句：why ticket prices are changing...","analysis":"主句为we want to know，后接why引导的宾语从句。"},{"en":"What you really saw was a secretary who was filibustering and upset because I was asking him for receipts.","cn":"你真正看到的是一个在阻挠议事并感到不安的部长，因为我在向他要收据。","structure":"主语从句：What you really saw；主系表：was a secretary；定语从句：who was filibustering and upset；原因状语从句：because I was asking...","analysis":"What引导主语从句，谓语为was，表语为a secretary，后接who引导的定语从句，其中包含because引导的原因状语从句。"}],"topics":[{"title":"美国参议院通过700亿美元移民法案","content":"美国参议院经过近20小时的辩论， en White House director of message planning.\n\nOK, so when it comes to a story like this, it's not the usual suspects, your Thomas Massie of Kentucky, that we are looking at. It's the other folks. Brian Fitzpatrick, Pennsylvania; Tom Barrett, Michigan; Warren Davidson, Ohio. All pretty important states, in general, in elections.\n\nCan you talk about what's going on, why these particular people might be the ones to make this shift?\n\nELEANOR MUELLER, WHITE HOUSE ECONOMICS REPORTER, \"SEMAFOR\": I think it tells us a lot about how much pressure these Republican congressmen are under to show voters that they're doing something on affordability. You know --\n\nCORNISH: We should be clear, they were just at home.\n\nCORNISH: So, they were just there last week.\n\nMUELLER: They were just hearing from constituents.\n\nFitzpatrick has been someone that leaders have had their eye on for a long time as somebody who might vote against this war. And I would argue that him and Barrett, specifically, right, are under a ton of pressure to, again, show their districts that they are doing something to bring energy costs down.\n\nAnd so, in addition to these concerns over constitutionality that I think Davidson and Massie share, Barrett and Fitzpatrick are really feeling the heat. And this vote was a sign of that.\n\nCORNISH: So, then you've got this \"New York Times\" reporting that even if oil prices peak soon, the global economy is going to slow down. Meaning the damage has been done.\n\nAnd Secretary Bessent was on the Hill yesterday, and he, of course, was asked about the economy for the same reasons that this war vote saw the erosion of some support, because people are worried. And here is what Bessent had to say on the Hill.\n\nSEN. TINA SMITH (D-MN): Could you just explain to me and to farmers in Minnesota how those increased prices, driven by the war and Iran, are worth the pain that they are feeling right now?\n\nBESSENT: Senator, do you believe that Iran can have a nuclear weapon? As a former farmer, I will tell you that -- and maybe you know that 75 percent of the fertilizer had already been purchased this year. There --\n\nSMITH: That is not -- not what my farmers in Minnesota are telling me, sir.\n\nBESSENT: They're -- they're --\n\nSMITH: They are telling me that they cannot afford their fertilizer, and they know the reason why. They know the reason.\n\nBESSENT: There is -- there is no doubt --\n\nBESSENT: -- that -- that farmers have been struggling. But much of that, that there was a record crop last year, Senator. And what do record crops lead to?\n\nSMITH: What my farmers are telling me --\n\nBESSENT: Lower prices.\n\nCORNISH: OK. So, our messaging folks, what do you think of that back and forth, both sides of it, frankly?\n\nMEGHAN HAYS, FORMER BIDEN WHITE HOUSE DIRECTOR OF MESSAGE PLANNING: I mean, I think that there's a complete disconnect from how people are feeling. And I think if you're not going to show empathy from people, that's really what gets you here.\n\nIt's not necessarily the policy. It's when people don't understand -- don't say to you, I understand where you're coming from. We are doing this for this reason.\n\nCORNISH: But his reply was pretty straightforward.\n\nHAYS: But I -- but I just don't think farmers have already bought fertilizer. They have no -- there's no empathy or humanity for people who are actually suffering, who are actually paying the bills.\n\nThese people are multibillionaires. They are taking people for a ride. They are getting money from taxpayers. And that's all the American people see.\n\nWe can't afford our gas. We can't afford electricity. We can't afford groceries. But you're down here building a ballroom and having a UFC fight. That is it.\n\nAnd so, when you sit up there in front of Congress and have no empathy for people, that is what they see. And that's the problem here.\n\nWhen Trump went to this war, he never went to the American people and said, this is why I'm going, and this is what I'm doing. So, this is what we're left with.\n\nCORNISH: Any lessons learned from the Biden era folks about empathy and the economy?\n\nMIKE DUBKE, FORMER TRUMP WHITE HOUSE COMMUNICATIONS DIRECTOR: Really? Yes. Of course. Don't do what Biden did.\n\nDUBKE: And that's exactly where we are.\n\nCORNISH: Oh, no, no. I'm being serious. So, when --\n\nDUBKE: I'm being serious, too.\n\nCORNISH: -- you look at his answer, you see it as in the same way?\n\nDUBKE: I see it in the same way.\n\nLook, when I -- when I do, you know, media training or anything on a professional level in communications, one of the things that you need to talk about, especially with public officials, is to show some empathy. And I totally agree with Meghan on that.\n\nNow, I will take -- I will say that these four defectors, defectors on the House side, you know, there are other reasons that are going into it, I think --\n\nDUBKE: -- besides affordability. And we can get into that if you want to.\n\nBut yes, from -- from the message perspective, this administration does need to understand that there is pain being felt right now.\n\nCORNISH: And I understand what you're saying about someone like Thomas Massie, who's a perennial thorn in the side of the administration.\n\nI want to put up some information about Representative Tom Barrett, who is a first-term Republican. OK? So, you've got a newbie.\n\nBut he also is a former Army helicopter pilot. I'm really paying attention to how veterans are behaving politically right now across the political spectrum. And he's facing reelection.\n\nAnd one other person I want to show you, Representative Brian Fitzpatrick of Pennsylvania, represents the Philadelphia suburbs, which I'm sure we'll hear about ad nauseam come election time.\n\nBut more importantly, former FBI agent; has broken away from the administration before.\n\nThere is a world of veteran law enforcement -- like, people who kind of speak the lingo and understand the conversation around conflict. And they are not afraid to have a different point of view.\n\nMUELLER: One hundred percent. I mean, they are bringing a perspective to this that not everyone on the Hill is. I think, you know, Republicans, congressional Republicans are\n\nconstantly talking to constituents who are veterans. But it's one thing to be having those conversations and another thing to be coming at it, having done this work yourself.\n\nCORNISH: OK, you guys, we're going to talk more about this and some other topics later.\n\nLater on CNN, though, I want to get to this, because it doesn't sound like the president is actually letting go of his plans for some sort of anti-weaponization payout fund. And what could, basically, that mean going forward?\n\nAnd then there's actually pandemonium on the streets of New York. The Knicks give fans a reason to be rowdy.\n\nAnd a plane passenger tries to open an exit door mid-flight. Luckily, there was a trained black belt on board.\n\nLONGOOD: The guy tried to, like, attack him and choked him, and I was already ready for something to happen.\n\nCORNISH: It is 13 minutes past the hour. Here is your morning roundup.\n\nNow, you're looking at the moment an unruly passenger is subdued on a Frontier flight. So, the man allegedly tried to open an exit door, then breached the cockpit, and choked an off-duty flight attendant.\n\nPassengers quickly helped take him down. And it just so happens one of those good Samaritans is a trained fighter.\n\nLONGOOD: You can't control what people are going to do and where they're going to do it. So, I think it's just best to be trained, be trained in Jiu Jitsu. At least try out a class so you know how to take care of a real-life situation when something happens.\n\nCORNISH: So, the flight was diverted. The suspect was arrested, and he faces multiple charges.\n\nSecretary of State Marco Rubio calls Cuba a growing security concern for the U.S. Testifying before lawmakers, he says the administration is trying to ing a War Powers resolution on Wednesday that would halt the US military action against Iran. A handful of Republicans actually joined with Democrats this time, and the resolution is supposed to limit the president's ability to initiate or escalate military hostilities without congressional approval.\n\nSo the question is, are we at the end or are as some lawmakers are worried about? Are we at the start of something that will be long and protracted with Iran?\n\nOn Wednesday, Secretary of State Marco Rubio told lawmakers that the war is over.\n\nREP. SARA JACOBS (D-CA): We're taking you at your word. The war is over. Who won?\n\nMARCO RUBIO, SECRETARY OF STATE: But first of all, you're not taking me at my word. It's a fact. We're no longer conducting sustained strikes inside of Iran to degrade their military because Epic Fury is over.\n\nCORNISH: Here's how the president described it.\n\nTRUMP: We hit them pretty hard the night before and actually last night.\n\nCORNISH: So there are fresh hostilities between the U.S. and Iran overnight spilling into neighboring Gulf countries. One person was killed, more than 60 injured, in an Iranian drone strike on Kuwait's airport.\n\nSo we're bringing in Harrison Mann to the Group Chat. He's a former U.S. Army major and former executive officer of the Defense Intelligence Agency.\n\nThank you so much for being here. So as we talk, we talked about the potential, the hostilities here. I want to talk about the possibility for the deal. Iran over and over keeps bringing up restitution. It wants to be basically its assets unfrozen.\n\nCan you talk about what they're looking for and how much of a sticking point this is for the U.S.?\n\nHARRISON MANN, FORMER EXECUTIVE OFFICER, DEFENSE INTELLIGENCE AGENCY: First, I want to point out that, you know, this so-called sticking point was that was a demand from before the war, right? When Trump did the surprise attack with Israel in February, what the US and Iran were discussing was some kind of sanctions relief, which would be a de facto release of funds in exchange for freeze on Iran's nuclear enrichment.\n\nAnd so I think it's, in my mind, a little misleading to say this thing that we've known is always going to be in Iranian demand is a sticking point. I think really the principal sticking point remains Trump's lack of interest in actually pushing for a deal.\n\nCORNISH: Okay, let me just play a little of it first --\n\nCORNISH: -- so people have some context for what you're talking about.\n\nHere's what he said about whether or not a deal could be reached in the coming days.\n\nTRUMP: The negotiation itself has gone very well, actually, very well.\n\nREPORTER: Mr. President --\n\nTRUMP: It could have -- even if it happens, and it might not happen, who knows? But if it happens, it could happen like over the weekend.\n\nThe blockade is the most powerful thing. I think the blockade maybe has more impact than the bombing has, but the blockade that we have the naval blockade is incredible. Not one ship has gotten through unless we wanted it to. And people respect it a lot.\n\nMANN: Yeah, so I think -- you know, Trump may actually believe that the blockade is working and he might believe that it's sustainable. The Iranians don't believe either. I think they're pretty confident their ability to withstand some loss of oil sales.\n\nAnd they really don't like the status quo. It seems like Trump kind of thinks he basically ended the war, and occasional tit-for-tat strikes can go on really forever.\n\nThe Iranians don't want that. They think they've got an advantage and they want to press it. And so, like we saw with the attack on the Kuwaiti airport, I think they're going to actually start escalating a little more to try and break this impasse.\n\nCORNISH: Against allies, U.S. allies of the region, this idea of just spreading it into the region more.\n\nMANN: I think against U.S. forces and against U.S. partners, which they still hold responsible because U.S. attacks are sometimes launched from their territory. And so I think they are going to basically -- they have found also their strategy is not working because Trump is not actually convinced that he has to change the status quo.\n\nSo they're pretty willing to go back to war more than Trump is. And I think we're going to see them push closer and closer if Trump doesn't actually get serious about making a peace deal.\n\nCORNISH: Can I also get your opinion on this war vote? We were all talking about why these various Republicans, there's only a few, right, four, who have decided to vote against the president going to war and being able to do more hostilities. And we were looking at issues like reelection, what districts, what state. Can you talk about what you know about their backgrounds and whether\n\nyou think there is also a broader conversation happening within the vet community about this?\n\nMANN: Yeah, I think these defections, which I don't want to call them that because these Congress members of Congress did the right thing, right? They're trying to end this war, represent two things.\n\nOne, the costs of the war and the kind of stupidity of the war have become impossible to ignore, right? We're three months in. You can't pretend Trump's got a plan. You can't ignore the very visible and tangible economic effects, right?\n\nI saw you playing before fertilizer, increasing the cost of food, and of course, the pain at the gas pump.\n\nOn top of that, I think the most recent generation of veterans who served in the war on terror in some capacity, contrasted maybe with Lindsey Graham, who's also a veteran.\n\nCORNISH: Well, Pete Hegseth.\n\nMANN: Or Pete Hegseth.\n\nCORNISH: I mean, remember, there are people in power here who have that same experience. That's why I'm wondering about the divide.\n\nMANN: Yeah, I do. You know, as a veteran, I don't want to say that putting a veteran in a leadership position automatically means they're going to make a good decision, right? You got Pete Hegseth. You got J.D. Vance. You had Tulsi Gabbard, you know, for her short-lived DNI career.\n\nBut some of them clearly took the correct lesson away from the war on terror, which was we shouldn't be doing these stupid, destructive wars for no reason. And it's really clear, it's been clear from the start, that's what this is going to be. I think tons of Republicans, both veterans and not, have understood this, were biting their tongue basically to see if Trump could resolve this quickly and they could avoid having to take a stand.\n\nSo yeah, I think these four are probably just the tip of the iceberg. You know, we've seen some Republican senators also threaten in the past to support War Powers resolutions. And I think we're only going to see more of this --\n\nMANN: -- especially as, you know folks understand that their lives are getting qualitatively worse and more expensive because of the war.\n\nCORNISH: Well, right now, it's still just a trickle politically. I'll let you know and bring you back when it becomes a wave, all right, if we see more people jump on.\n\nThank you so much for being here. We just mentioned national intelligence and the president's choice to\n\nbecome acting director of national intelligence is actually getting a lot of blowback on Capitol Hill. The person he's chosen is named Bill Pulte to oversee the nation's intelligence agencies. He does not have a background in intelligence. His current job is at the administration's Federal Housing Finance Agency and Fannie Mae and Freddie Mac.\n\nBut from that job, he's also managed to launch criminal investigations into several of the president's political foes. One White House source said the change from Trump was easy, saying, quote, Trump likes Tulsi, but she's very methodical. She's a thinker. Bill is a move fast and break things kind of guy, the source said.\n\nMany senators, including Republicans, but Pulte is not the right guy for the job.\n\nSEN. JOHN CORNYN (R-TX): ay.\n\nTILLIS: Did you actually tell Pulte you were going to punch him in the face?\n\nSCOTT BESSENT, TREASURY SECRETARY: No, sir. I actually said I was going to kick his ass.\n\nTILLIS: Good. Okay, good. I share the emotion. Thank you.\n\nBESSENT: And as I said, that was last summer, summer of '25. And many teams have fights in the locker room and then go out and win for the team on the table.\n\nCORNISH: Fights in the locker room. I'm being judgmental. I'm like, you've seen a locker room. What do you see when he's talking about this? I don't think that's totally wrong.\n\nMANN: Yeah, I mean, I think first of all, like Trump, Trump loves it when people are competing for his affection. Like that's -- that's kind of his ideal. You know, I'm not. I'm not. It's tough for me to imagine him getting a fight with anybody, but I think like I'm much more kind of scared here about the idea of putting somebody who's even more of a kind of submissive loyalist than Tulsi Gabbard into this role.\n\nYeah, Pulte has shown kind of extraordinary talent for weaponizing the pretty obscure position that he was originally in. But I think really anybody who's a loyalist to Trump, even if it's not Pulte, even if they find somebody who has like better resume than Pulte, could use the DNI position to cause a lot of harm.\n\nCORNISH: Yeah, and this is one of those things where it starts out about being one thing, like the weaponization fund, and it causes problems for other priorities. In that case, it was immigration. With this one, with Pulte, all of a sudden, you've got some senators\n\nlike Warner who had been working on a bipartisan deal on FISA being like, oh, you want this guy? Well, let's have a conversation about the FISA rules. And can it disrupt other priorities? Is it worth it to get this guy in?\n\nMIKE DUBKE, FORMER TRUMP WHITE HOUSE COMMUNICATIONS DIRECTOR: Well, first of all, Pulte's never going to be the nominee, and I'll just say that. I don't think he --\n\nCORNISH: Oh, really?\n\nDUBKE: I believe that. I think that this is --\n\nMUELLER: That is true. Trump said he was making him acting DNI. I think they knew from the jump that he could never get confirmed by the Senate.\n\nDUBKE: The bigger political question here is why poke the bear of the Senate for any reason on this by putting Pulte in this position? And that, I think, especially when you've got FISA reauthorization, you know, that the deadline for that coming up --\n\nCORNISH: Yeah, it's going to sunset.\n\nDUBKE: It is a -- it is a fight that maybe wasn't worth picking for this guy. But let's be just clear about this. Pulte is a flash in the pan in terms of DNI.\n\nMEGHAN HAYS, FORMER BIDEN WHITE HOUSE DIRECTOR OF MESSAGE PLANNING: Yeah, I just think he can do a lot of harm while he's there, right? We have elections coming up. Their whole thing is to prove that the '20 elections didn't happen.\n\nTulsi Gabbard was in Georgia. Why? Who knows? This guy's already shown that he's going to weaponize more. Now you're going to weaponize 18 intelligence agencies.\n\nI mean, it's just disgusting. I just didn't know -- to his point, I just didn't know that you could have someone less qualified to be in this role. And I think it should scare the American people. And it's clearly making noise in the Senate.\n\nDUBKE: Just because she was a Democrat. I didn't think she was less qualified.\n\nCORNISH: I just want to say that -- I want to end with you, Eleanor, because you talked to like industry people from banking and even they were like, we don't understand why you would put this guy who in his regular real-time job went into the tickle files unprompted. He gained files for people to investigate and presented them and now put him in front of top secret documentation.\n\nMUELLER: I think it shocked many people within the banking industry who have seen firsthand what he's done at FHFA since he was picked last year. I was with Senator Warner when the last DNI stepped down and he said explic
