 posted on Facebook that his body was found on Saturday in a mountainous area just outside of Kyoto by a volunteer search and rescue party.\n\nNow on Facebook, his mother said, quote, \"the grief we feel is impossible to put into words. We are forever grateful for the time we had with our sweet, precious Weston, but cannot begin to understand what life without him will be like.\"\n\nLocal police have told CNN that the cause of death is still under investigation. And in terms of what led up to this tragedy, we know that the family originally from Alabama, first got to Japan on May 22nd to celebrate their younger son's high school graduation. Now, after exploring other parts of the country, they got to Kyoto on May 29th. One of their last stops.\n\nAnd on that day, Weston and his mom had a small disagreement over ChatGPT and its environmental impact. Weston is a passionate naturalist and is very much passionate about the environment.\n\nNow, after this small disagreement, the family decided that they needed to take some space to cool down, and Weston chose to split off from his parents and from his brother, and he explored the city on his own.\n\nNow, this was around 6:00 p.m. local time on May 29th he was found walking around Kyoto station. Two hours later, he was seen walking around the Yamashina area of Kyoto on a path that leads to a hiking trail. Now, this is the last known sighting of Weston.\n\nAnd several hours later, when Weston still did not return to the hotel, his parents filed a missing person's report. Now, since then, the authorities have been combing through the Japanese forest to look for Weston. But a typhoon hampered the efforts somewhat. On June 5th, the authorities concluded their forest search for Weston, and that is when the family chose to organize their own volunteer search and rescue party.\n\nNow, this is an unimaginable loss for the Higginbothams. I've spoken to the family several times over the past few days, and they told me just how close they are as a family, how they love to go hiking together, explore new cities and cultures together. And his mother also told me how Weston had a heart of gold.\n\nNANCY HIGGINBOTHAM, WESTON'S MOTHER: Like he's just this little, just amazing person that everybody loves, everybody loves. He's got a heart of gold.\n\nMONTGOMERY: His parents have asked for privacy as they mourn their son and come to terms with their new reality.\n\nHanako Montgomery, CNN.\n\nBLACKWELL: Thank you. The war that President Trump promised would only last four to six weeks has now reached 100 days and counting. Here's where things. The U.S. military reports shooting down six Iranian attack drones over the past two days that were targeting the Strait of Hormuz. Seven ballistic missiles were also fired at Kuwait and Bahrain, and most were intercepted.\n\nPakistan's interior minister has arrived in Tehran for a new round of peace talks. A top adviser to Iran's supreme leader tells CNN that the ball is in President Trump's court. He's demanding the U.S. unfreeze billions in Iranian assets.\n\nMOHSEN REZAEI, SENIOR MILITARY ADVISER TO IRAN'S SUPREME LEADER (through translator): If he wants to reach an agreement with Iran, this $24 billion is a test of trust that Iran wants to have with Trump. This is a test that America must pass, and the path will be opened. This is our own money, not America's money.\n\nBLACKWELL: CNN's Barbie Latza Nadeau is tracking the latest developments. She's joining us from Rome. Barbie, what do we know about these talks that are happening now?\n\nBARBIE LATZA NADEAU, CNN CORRESPONDENT: Well, you know, I think the fact that they're happening is giving a little bit of optimism. I think people are cautiously optimistic. They're meant to solidify the ceasefire, which of course started in April. But there are several points of contention. Now, that $24 billion worth of Iranian assets that the Iranians want to have unfrozen. That's a major, major point.\n\nBut also the freeing up of the Strait of Hormuz for commerce to flow through. And that will help, of course, the global economy. And one of the points that, of course, they're going to have to agree on is the stance on Iran's nuclear program. And of course, that's what started this conflict in the first place.\n\nBut U.S. President Donald Trump says he believes that the Iranians are ready to make a deal, even though we hear that cautious, cautious warning from the Iranian side. So, these talks are important. There is a sense of optimism, but there is also a sense of reality when you consider the amount of military back and forth going on in that region right now. And that's worrying, of course, to everyone in that region and globally, to be honest, Victor.\n\nBLACKWELL: Indeed. Barbie Latza Nadeau, reporting live from Rome, thank you. And President Trump insists that the war with Iran will be over soon. As he puts it, one way or another. Let's get more now from CNN's Julia Benbrook.\n\nJULIA BENBROOK, CNN CORRESPONDENT: This recent exchange of fire leads to a lot of questions about the ceasefire and the peace negotiations, which seem to be at an impasse right now. As a top Iranian official tells CNN, those negotiations are deadlocked. Over 24 billion in frozen Iranian assets.\n\nNow, the most recent comments we've heard from President Donald Trump on all of this came in an interview with NBC's Meet the Press, where he was asked if the Iranians are so desperate to make a deal, which he has said repeatedly, why have they not yet accepted his terms.\n\nTake a listen to part of this exchange. This is with NBC's Kristen Welker.\n\n(BEGIN VIDEO CLIP) KRISTEN WELKER, NBC HOST: You have been saying for months, Mr. President, that Iran is begging to make a deal.\n\nDONALD TRUMP, PRESIDENT OF THE UNITED STATES: True.\n\nWELKER: They are so desperate to make a deal, why haven't they made a deal with you yet?\n\nTRUMP: Because they -- it's a very hard thing for them. They've had great independence. They've dealt with very weak and ineffective leadership on behalf of the United States and other countries, frankly, that were -- that allowed them to get away with murder. And I don't -- I think they can't believe they're in the situation where they've been virtually decapitated.\n\nBENBROOK: He went on to say that the Iranians are strong and proud. And while it may take time, ultimately, he believes that they will have no choice but to make a deal.\n\nWhen it comes to the timeline of all of this, following those first joint U.S. Israel strikes against Iran back in February, he said again and again that this conflict would end very soon. He's now pushing back against any criticism of how long this has gone on, saying that he believes he's moving quickly, that these things take time, sometimes even years to resolve.\n\nNow, when it comes to the negotiations, one of the last major updates that we received from the White House officials told us that Trump had sent back changes to a proposed deal with Iran, and that he was asking for tougher language when it comes to Iran's nuclear commitments and its pledge to reopen the Strait of Hormuz. That was about a week ago now, Victor.\n\nBLACKWELL: Julia Benbrook, thank you very much. Still ahead, we go live to Madrid, where Pope Leo is celebrating mass this morning. We'll have the latest on the huge crowds turning out to see him. The first American pope traveling in Spain.\n\nPlus, the 2026 World Cup is about to kick off in 16 cities across the U.S., Mexico and Canada. What's being done to keep everyone safe.\n\nBLACKWELL: New this morning, Pope Leo led holy mass on the second day of his weeklong visit to Spain. This morning, crowds greeted the pontiff with cheers as he rode in the popemobile through the streets of Madrid. Yesterday, while he was making a speech at the Royal Palace, the pope denounced populists who are, in his words, fanning the flames of polarization, and he called for peace.\n\nLet's go to Vatican cor aine. Ukrainian President Volodymyr Zelenskyy is expected to meet with European allies. The leaders of Germany, Britain, and France say that they'll focus on coordinating support for Ukraine. They'll also talk about how to apply more pressure on the Kremlin.\n\nNow, President Zelenskyy recently proposed a face-to-face meeting with Russian President Vladimir Putin, but Putin dismissed Zelenskyy's offer.\n\nSearch and rescue volunteers in Japan say they have found the body of a missing American college student, 20-year-old James \"Weston\" Higginbotham. He disappeared May 29 while he was on a trip with his family.\n\nJenn Sullivan has details.\n\nJENN SULLIVAN, CNN REPORTER (voice-over): It was supposed to be a celebration, the Higginbotham family traveling from Alabama to Japan to celebrate their youngest son's high school graduation. But the trip turned into a tragedy when their oldest son went missing.\n\nAfter days of searching, the body of 20-year-old James Weston Higginbotham was found Saturday. His family posting on Facebook, saying in part, \"Our family is heartbroken to share that Weston was found deceased by a volunteer search and rescue group in a mountainous area outside of Kyoto. The grief we feel is impossible to put into words.\"\n\nWeston was a college student at Auburn University. He disappeared on May 29 after getting into an argument with his mom over the environmental impact of her use of AI. His mother spoke to CNN's Erin Burnett Friday night before his body was found.\n\nNANCY HIGGINBOTHAM, MOTHER OF JAMES \"WESTON\" HIGGINBOTHAM: He turned off his location, so the police were able to track through CCT video that he stopped at the Yamashina station.\n\nSULLIVAN (voice-over): The multi-day search involved more than 100 police officers, K-9 units, and helicopters. On Saturday, the family launched their own search efforts with help from local residents and a hired search and rescue team.\n\nHis family focused their search in a mountainous area becau ins.\n\nBLACKWELL: You've recently interviewed Graham Platner and he is denied becoming physical with any of the women that he casually dated. He said that he told his campaign staff or members staff about these text messages early in his marriage. He also said that he expected that this would be a tough campaign.\n\nMaybe he didn't expect, you know, it coming out from his own campaign, but what did he tell you about the eventuality of having to deal with this? Did he expect that at some point the public would know about this part of his life? MISTLER: Well, he expected that, you know, his life would be a closely examined. He was pretty clear about that. He didn't know -- you know, he didn't anticipate the specifics of it. But he -- it's interesting because he, you know, he views this -- these -- the scrutiny of his personal life and these old Reddit posts.\n\nAnd, of course, the -- his old relationships back when he was living in Washington, D.C., he's used those as evidence that his message is a threat to what he calls the political establishment.\n\nSo, you know, while he's frustrated by the attacks and the examination of his personal life, he also views that as evidence that his messages is working and a threat to what he says is the political establishment that wants to stop him at all costs. So it's interesting.\n\nHe's -- it's a mix of sort of defiance and also, you know, anger I think at the fact that, you know, his life is being examined this closely. There's also an acknowledgement though, I would say, that, you know, he -- that that's fair game. I mean, he does say that too, but I think it's just the nature of some of the -- these attacks that's has him frustrated, but again, defiant.\n\nBLACKWELL: And what is he hearing from the state party, from the national party about his campaign?\n\nMISTLER: Yes, I asked him about that on Friday and asked if he had, you know, heard from any officials in the Maine Democratic Party or any -- the national party or any  We thought maybe it was fireworks.\n\nBLACKWELL: What we know about the conditions of the victims and how this all started. In Japan, search and rescue volunteers have now found the body of that missing American student. New details are coming of what we're learning about where he was found, and what we're hearing from his family.\n\nAlso, Pope Leo just held the first mass of his trip to Spain. Our Chris Lamb was there and has more on the pope's message.\n\nVINCE VELAZQUEZ, RETIRED ATLANTA POLICE OFFICER: The fans are going to come here and enjoy this World Cup experience and not have an idea of all the security measures that are going on.\n\n(END VIDEO CLIP) BLACKWELL: The World Cup kicks off in just a few days and security, you know, will be tight in cities hosting matches. A look at the preparations and which teams are early favorites.\n\nIt's Sunday, June 7th. Welcome to a brand new week. I'm Victor Blackwell. Good to have you along.\n\nHappening now, police are searching for two suspects after at least 12 people were shot. This happened at a festival in Toledo, Ohio. Here's the moment that sparked the chaos there. Watch.\n\nNow, police say the two shooters appeared to have been shooting at each other. Neither suspect is in custody. Twelve people were hurt in the crossfire, two of them critically. All of them are expected to survive.\n\nNow, police say they spoke to victims ages 14 to 61. Investigators said that they were shocked by what they saw.\n\nDAN GERKEN, INVESTIGATIVE LT. TOLEDO POLICE: As far as violence, this is over the top, right? So, 12 people being shot. That's the most I've been to a scene. I've been to a lot of scenes. But this is -- this is way over the top.\n\nBLACKWELL: Now police are asking people to avoid the area while they continue this investigation, but they want to hear from people if they have any information. Also to send in cellphone video from the scene. The shooting is just one of at least 170 mass shootings in the U.S. so far this year.\n\nSearch and rescue volunteers have now found the body of an Auburn University student who was missing during a family vacation in Japan. James Weston Higginbotham disappeared after leaving his family to explore parts of Kyoto on his own after a disagreement with his mother. CNN's Hanako Montgomery has more.\n\nHANAKO MONTGOMERY, CNN CORRESPONDENT: This is an extremely tragic end to a dayslong search for Weston Higginbotham. His mother, Nancy, posted on Facebook that his body was found on Saturday in a mountainous area just outside of Kyoto by a volunteer search and rescue party.\n\nNow on Facebook, his mother said, quote, \"the grief we feel is impossible to put into words. We are forever grateful for the time we had with our sweet, precious Weston, but cannot begin to understand what life without him will be like.\"\n\nLocal police have told CNN that the cause of death is still under investigation. And in terms of what led up to this tragedy, we know that the family originally from Alabama, first got to Japan on May 22nd to celebrate their younger son's high school graduation. Now, after exploring other parts of the country, they got to Kyoto on May 29th. One of their last stops.\n\nAnd on that day, Weston and his mom had a small disagreement over ChatGPT and its environmental impact. Weston is a passionate naturalist and is very much passionate about the environment.\n\nNow, after this small disagreement, the family decided that they needed to take some space to cool down, and Weston chose to split off from his parents and from his brother, and he explored the city on his own.\n\nNow, this was around 6:00 p.m. local time on May 29th he was found walking around Kyoto station. Two hours later, he was seen walking around the Yamashina area of Kyoto on a path that leads to a hiking trail. Now, this is the last known sighting of Weston.\n\nAnd several hours later, when Weston still did not return to the hotel, his parents filed a missing person's report. Now, since then, the authorities have been combing through the Japanese forest to look for Weston. But a typhoon hampered the efforts somewhat. On June 5th, the authorities concluded their forest search for Weston, and that is when the family chose to organize their own volunteer search and rescue party.\n\nNow, this is an unimaginable loss for the Higginbothams. I've spoken to the family several times over the past few days, and they told me just how close they are as a family, how they love to go hiking together, explore new cities and cultures together. And his mother also told me how Weston had a heart of gold.\n\nNANCY HIGGINBOTHAM, WESTON'S MOTHER: Like he's just this little, just amazing person that everybody loves, everybody loves. He's got a heart of gold.\n\nMONTGOMERY: His parents have asked for privacy as they mourn their son and come to terms with their new reality.\n\nHanako Montgomery, CNN.\n\nBLACKWELL: Thank you. The war that President Trump promised would only last four to six weeks has now reached 100 days and counting. Here's where things. The U.S. military reports shooting down six Iranian attack drones over the past two days that were targeting the Strait of Hormuz. Seven ballistic missiles were also fired at Kuwait and Bahrain, and most were intercepted.\n\nPakistan's interior minister has arrived in Tehran for a new round of peace talks. A top adviser to Iran's supreme leader tells CNN that the ball is in President Trump's court. He's demanding the U.S. unfreeze billions in Iranian assets.\n\nMOHSEN REZAEI, SENIOR MILITARY ADVISER TO IRAN'S SUPREME LEADER (through translator): If he wants to reach an agreement with Iran, this $24 billion is a test of trust that Iran wants to have with Trump. This is a test that America must pass, and the path will be opened. This is our own money, not America's money.\n\nBLACKWELL: CNN's Barbie Latza Nadeau is tracking the latest developments. She's joining us from Rome. Barbie, what do we know about these talks that are happening now?\n\nBARBIE LATZA NADEAU, CNN CORRESPONDENT: Well, you know, I think the fact that they're happening is giving a little bit of optimism. I think people are cautiously optimistic. They're meant to solidify the ceasefire, which of course started in April. But there are several points of contention. Now, that $24 billion worth of Iranian assets that the Iranians want to have unfrozen. That's a major, major point.\n\nBut also the freeing up of the Strait of Hormuz for commerce to flow through. And that will help, of course, the global economy. And one of the points that, of course, they're going to have to agree on is the stance on Iran's nuclear program. And of course, that's what started this conflict in the first place.\n\nBut U.S. President Donald Trump says he believes that the Iranians are ready to make a deal, even though we hear that cautious, cautious warning from the Iranian side. So, these talks are important. There is a sense of optimism, but there is also a sense of reality when you consider the amount of military back and forth going on in that region right now. And that's worrying, of course, to everyone in that region and globally, to be honest, Victor.\n\nBLACKWELL: Indeed. Barbie Latza Nadeau, reporting live from Rome, thank you. And President Trump insists that the war with Iran will be over soon. As he puts it, one way or another. Let's get more now from CNN's Julia Benbrook.\n\nJULIA BENBROOK, CNN CORRESPONDENT: This recent exchange of fire leads to a lot of questions about the ceasefire and the peace negotiations, which seem to be at an impasse right now. As a top Iranian official tells CNN, those negotiations are deadlocked. Over 24 billion in frozen Iranian assets.\n\nNow, the most recent comments we've heard from President Donald Trump on all of this came in an interview with NBC's Meet the Press, where he was asked if the Iranians are so desperate to make a deal, which he has said repeatedly, why have they not yet accepted his terms.\n\nTake a listen to part of this exchange. This is with NBC's Kristen Welker.\n\n(BEGIN VIDEO CLIP) KRISTEN WELKER, NBC HOST: You have been saying for months, Mr. President, that Iran is begging to make a deal.\n\nDONALD TRUMP, PRESIDENT OF THE UNITED STATES: True.\n\nWELKER: They are so desperate to make a deal, why haven't they made a deal with you yet?\n\nTRUMP: Because they -- it's a very hard thing for them. They've had great independence. They've dealt with very weak and ineffective leadership on behalf of the United States and other countries, frankly, that were -- that allowed them to get away with murder. And I don't -- I think they can't believe they're in the situation where they've been virtually decapitated.\n\nBENBROOK: He went on to say that the Iranians are strong and proud. And while it may take time, ultimately, he believes that they will have no choice but to make a deal.\n\nWhen it comes to the timeline of all of this, following those first joint U.S. Israel strikes against Iran back in February, he said again and again that this conflict would end very soon. He's now pushing back against any criticism of how long this has gone on, saying that he believes he's moving quickly, that these things take time, sometimes even years to resolve.\n\nNow, when it comes to the negotiations, one of the last major updates that we received from the White House officials told us that Trump had sent back changes to a proposed deal with Iran, and that he was asking for tougher language when it comes to Iran's nuclear commitments and its pledge to reopen the Strait of Hormuz. That was about a week ago now, Victor.\n\nBLACKWELL: Julia Benbrook, thank you very much. Still ahead, we go live to Madrid, where Pope Leo is celebrating mass this morning. We'll have the latest on the huge crowds turning out to see him. The first American pope traveling in Spain.\n\nPlus, the 2026 World Cup is about to kick off in 16 cities across the U.S., Mexico and Canada. What's being done to keep everyone safe.\n\nBLACKWELL: New this morning, Pope Leo led holy mass on the second day of his weeklong visit to Spain. This morning, crowds greeted the pontiff with cheers as he rode in the popemobile through the streets of Madrid. Yesterday, while he was making a speech at the Royal Palace, the pope denounced populists who are, in his words, fanning the flames of polarization, and he called for peace.\n\nLet's go to Vatican correspondent Christopher Lamb now. Tell us more about what the pope had to say this morning.\n\nCHRISTOPHER LAMB, CNN VATICAN CORRESPONDENT: Well, Victor, there's absolutely huge crowd gathered here in Central Madrid for the mass led by Pope Leo. Around 1.2 million people are estimated to have turned out for it.\n\nAnd Pope Leo had a strong message during the mass which saying that whilst Spain has this extraordinary Catholic history, that history should not be seen as a sort of museum or something to be looked at with nostalgia, but actually faith must mean something to people in Spain today and into the future, particularly in trying to build a better world.\n\nNow, the mass is coming to an end. You can hear the processions coming to an end so you can hear applause. You know, Leo has really been greeted with great enthusiasm here in Madrid for what is going to be a six-day visit to Spain. He seems very at home in this country.\n\nOf course, he's the first American Pope, but he is a fluent Spanish speaker who spent a number of years in Peru, and he's visited Spain many times. And he had these big crowds today for the mass and then the procession afterwards. And on Saturday night, a prayer vigil with around half a million young people.\n\nSo, I've been just about 600 meters from the mass that's been taking place. And, you know, the crowds have really been quite something. Families, young people here, huge numbers have turned out for Leo, and there's really very, very intense interest in his visit to Spain.\n\nBLACKWELL: Christopher, you're competing with all the sound around you. So we're having a little tough time hearing you, but this is day two of day six. What else are we expecting from the pope?\n\nLAMB: Well, the pope is on -- Monday, tomorrow, is going to be addressing the Spanish parliament. That's the first time a pope has done that. We're expecting him to talk about polarization and how to overcome that. And he's also expected, at some point during his visit to meet with abuse survivors. Of course, the clerical sexual abuse scandal has been a big thing here in Spain. And the Vatican has confirmed that he will be meeting with the victims of abuse.\n\nAnd he's also going to be going to Barcelona to visit the Sagrada Familia Church, the iconic basilica, which was designed by Gaudi. And he will then finish his visit with a trip to the Canary Islands, where migration and the plight of immigrants and refugees is going to be front and center. And Leo is going to be meeting with migrants and those groups who are helping them.\n\nSo it's a visit with, obviously, you know, that strong faith element. Leo wants to encourage the Catholic church in Spain, but there's also a political focus. Leo wanting to bring a message of unity to what is quite a polarized society, Victor.\n\nBLACKWELL: Yes. Every visit by the pope is historic, but this one especially.\n\nSo, Christopher Lamb from Madrid, thank you very much. So, it's the week the world has been waiting for. The World Cup tournament kicks off this week with two matches in Mexico. The teams to watch out for and what's new this year.\n\nBLACKWELL: Police in Ohio are searching for two suspects after at least 12 people were shot near a festival in Toledo on Saturday. The victims range in age from 14 to 61. Two are in critical condition, but Toledo's mayor says they're all expected to survive.\n\nPolice say the two shooters appeared to be shooting at each other. This morning, there are no suspects in custody.\n\nA new development in the murder trial of Karmelo Anthony. Prosecutors rested their case yesterday after calling 21 witnesses in the case against this Texas teenager. He's charged in the stabbing death of Austin Metcalf. Anthony's defense team started calling witnesses, Saturday, and set out to prove this was a justified killing in self- defense. Testimony resumes tomorrow.\n\nPresident Trump is expected to be in Madison Square Garden tomorrow to watch the Knicks take on the Spurs in game three of the NBA finals. Trump says he was invited by Knicks' owner James Dolan. The Knicks' lead, two-zero.\n\nThe FIFA World Cup is now just four days away, and security is a big part of the preparation. With matches across the U.S., Canada and Mexico, host cities are working to handle large crowds and keep everyone safe. Officials are also looking at recent incidents and how transportation systems and venues will hold up. CNN's Ryan Young takes a closer look.\n\nMARKWAYNE MULLIN, DHS SECRETARY: Through 11 different cities. And we're going to have 78 Super Bowls in 38 days.\n\nRYAN YOUNG, CNN CORRESPONDENT (voice-over): Across the U.S. and Canada and Mexico, this year, FIFA World Cup on tap to be the largest tournament in history. With stadiums averaging nearly 70,000 seats, organizers expect the event to draw 5 million fans. That will also mean intense security. Some recent unprovoked attacks give people reason to worry.\n\nIn Los Angeles, where the U.S. tournament kicks off, police say someone stabbed and beat a 70-year-old woman back in March, leaving her with a broken neck. Not far away in Long Beach, California, last month, police say another woman was stabbed and left hospitalized. And last week in Atlanta, police say a woman was fatally stabbed on a train operated by MARTA, the city's public transportation line. In months past, the Transportation Department called for improved safety measures in cities to include Chicago, D.C., New York, L.A., Charlotte and Philadelphia. Now, Transportation Secretary Sean Duffy wants an investigation in Atlanta saying, every American should be disturbed by the horrific crimes we have seen on MARTA in the last month.\n\n(on camera): There's a big focus on safety and whether or not MARTA can meet the need when it comes to all the international guests that will be coming to town. And some things have really frightened people in the city, especially a deadly stabbing that happened just last week, having people asking questions, is MARTA safe enough and ready for the World Cup?\n\nGARY GALE, ATLANTA TOURIST FROM CALIFORNIA: I think there should be extra security for sure on a day to day basis, especially with the World Cup coming up.\n\nUNIDENTIFIED FEMALE: Traveling alone would no"},{"seg":2,"url":"https://transcripts.cnn.com/show/ctmo/date/2026-06-07/segment/02","title":"CNN.com - Transcripts","text":"Return to Transcripts main page\n\nPolice Search For Suspects After 12 Shot Near Ohio Festival; Pakistan Delegation Arrives In Tehran For Peace Talks; U.S. And Iran Exchange Strikes, Peace Talks At Stalemate; Missing American Student Found Dead In Japan After Days-Long Search; Platner Claims His Troubled Past Is Being \"Weaponized\"; Platner Faces New Allegations Days Before Maine Primary. Karmelo Anthony Trial Underway with No Black Jurors; Prosecutor: Texas Track Meet Killing was Murder, Not Self-Defense; Elon Musk to Become World's First Trillionaire; U.S. Prepares for FIFA World Cup Kickoff. Aired 7-8a ET\n\nAired June 07, 2026 - 07:00   ET\n\nTHIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED.\n\nVICTOR BLACKWELL, CNN HOST: Welcome back to CNN This Morning. Here's what you need to know today. Police are searching for at least two people who started shooting at a festival in Ohio. Twelve people were hit in the crossfire. We have the latest on that manhunt coming up.\n\nAlso new this morning, CNN spoke to Iran's foreign minister as the U.S. and Iran work to negotiate some permanent ceasefire. We have his reaction to how things are going so far.\n\nAlso in Japan, the search and rescue volunteers there have found the body of that missing American student. We have new details. We're learning about where he was found and what we're learning from his family.\n\nAnd Decision Day is looming for Democrats in Maine as they choose their candidate to run for Senate, choose their nominee. Graham Platner is favored to win the primary, but there are these, as you've heard, mounting controversies. Some Democrats wonder, is he too risky a bet?\n\nIt is Sunday, June 7th. Good to have you along. I'm Victor Blackwell.\n\nHappening right now, police are searching for two suspects after at least 12 people were shot near a festival in Toledo, Ohio, yesterday. Look at this. This was the scene as the shooting started.\n\n(END VIDEO CLIP) BLACKWELL: Police say the two shooters appeared to have been shooting at each other. Neither suspect is in custody this morning. Twelve people were hurt in that crossfire, two of them critically. All of them are expected to survive.\n\nHere's CNN's Gloria Pazmino with details.\n\nGLORIA PAZMINO, CNN NATIONAL CORRESPONDENT: That's right, Victor. Panic at what was supposed to be a summertime festival in Toledo, Ohio. Scenes like this have become a just commonplace across our country.\n\nHere's what we know. Law enforcement officials said at least two shooters were involved and that 12 people were struck by gunfire. Two of them are in critical condition. Police are still looking for the suspects and no one is in custody. An investigation is ongoing.\n\nNow, Toledo police said the incident occurred shortly after 5:30 in the afternoon on Saturday, local time, at the Old West End Festival. This is an annual two-day event which takes place in the city's historic district. The event kicked off on Saturday morning with a parade and live music. And police initially said that many victims were transported to nearby hospitals for treatment.\n\nNow, eyewitnesses told a local CNN affiliate, WTOL, that they heard multiple shots and then a panic among the festival-goers. The shooting is one of at least 170 mass shootings across the U.S. this year alone. That's according to the Gun Violence Archive. Victor?\n\nBLACKWELL: Gloria, thank you.\n\nToday marks 100 days since the U.S.-Israeli war with Iran started. Despite President Trump promising the conflict would last only four to six weeks, both sides are exchanging strikes during this really fragile ceasefire. Six Iranian attack drones have been shot down. That's according to U.S. Central Command.\n\nPakistan's interior minister also arrived in Tehran to try to salvage peace talks. Minutes ago, the spokesperson for Iran's foreign ministry explained the challenge they see with negotiating with the U.S.\n\nESMAEIL BAGHAEI, IRANIAN FOREIGN MINISTER SPOKESPERSON: The main problem of negotiating with this administration is that you have to face so many changing positions, moving the goalposts, different statements, contradictory remarks by different officials. So it makes the whole process very cumbersome, very unstable, and very uncertain. So, the exchange of communications still are ongoing.\n\nBLACKWELL: CNN's Jerusalem Bureau Chief Oren Liebermann has more for us. OREN LIEBERMANN, CNN JERUSALEM BUREAU CHIEF: The 24 hours from early Saturday morning until early Sunday morning have put tremendous pressure on the U.S.-Iran ceasefire and raised serious questions on whether there is a viable diplomatic path forward on negotiations and any means of making sure this ceasefire becomes a real broader agreement.\n\nOn Saturday morning, according to U.S. Central Command, they intercepted four one-way attack drones in the Gulf and around the Strait of Hormuz. Iranian state media had said these targeted what may have been U.S. Navy vessels operating in the region.\n\nIn response, according to Central Command, which governs U.S. military operations in the region, the U.S. struck surveillance radar sites, which Iran said they consider a grave violation of the ceasefire. Several hours later, we saw seven ballistic missiles fired at Kuwait and Bahrain. Six of those intercepted, one didn't reach its target.\n\nBut all of this puts pressure on the ceasefire. Then in the overnight hours from Saturday to Sunday, the U.S. says they intercepted two more one-way attack drones. So this, you see the difficulties here of not only making the ceasefire really take effect, but also trying to find some diplomatic path forward.\n\nPakistan's interior minister is holding meetings in Tehran throughout the weekend and on Sunday in particular, trying to make sure there is a path forward. But you see the difficulties in trying to move that ahead.\n\nMeanwhile, a source familiar with the thinking of U.S. Treasury Secretary Scott Bessent says he is considering, and the Treasury Department is considering using Iranian assets to not only pay for the damage of future Iranian attacks, but also considering the possibility of using them to pay for past damage from Iranian attacks.\n\nFor example, last week we saw an Iranian attack on Kuwait's airport kill one person, wound at least 60 others, and cause severe damage at the airport itself. Meanwhile, Iran has insisted that any U.S.-Iran ceasefire agreement include Lebanon as well.\n\nBut just like we see in the Gulf region, the ceasefire in there also appears to be under tremendous pressure. According to Lebanon's Ministry of Public Health, Israeli strikes killed 21 people on Friday. Then on Saturday, an Israeli strike on a vehicle in southern Lebanon killed a general and several other officers who were in that vehicle near the city of Nabatiyah.\n\nThe Israeli military acknowledged the strike and said it was moving suspiciously and operating in an area that had been under an evacuation warning. They say the strike itself will be looked at and learned from and that any movement in that area requires coordination with the Israeli military.\n\nMeanwhile, Hezbollah, which rejected the latest U.S.-Israel ceasefire, has attacked northern Israel for the first time since that ceasefire went into effect, launching two projectiles, according to the Israeli military. Meanwhile, two Israeli soldiers were killed in southern Lebanon, one on Friday, one on Saturday.\n\nSo you see the difficulty not only in the Gulf region between the U.S. and Iran of making a ceasefire real, bringing it to fruition, but also in Lebanon as well.\n\nOren Liebermann, CNN, in Jerusalem.\n\nBLACKWELL: Well, now to Russia's war on Ukraine. Ukrainian President Volodymyr Zelenskyy is expected to meet with European allies. The leaders of Germany, Britain, and France say that they'll focus on coordinating support for Ukraine. They'll also talk about how to apply more pressure on the Kremlin.\n\nNow, President Zelenskyy recently proposed a face-to-face meeting with Russian President Vladimir Putin, but Putin dismissed Zelenskyy's offer.\n\nSearch and rescue volunteers in Japan say they have found the body of a missing American college student, 20-year-old James \"Weston\" Higginbotham. He disappeared May 29 while he was on a trip with his family.\n\nJenn Sullivan has details.\n\nJENN SULLIVAN, CNN REPORTER (voice-over): It was supposed to be a celebration, the Higginbotham family traveling from Alabama to Japan to celebrate their youngest son's high school graduation. But the trip turned into a tragedy when their oldest son went missing.\n\nAfter days of searching, the body of 20-year-old James Weston Higginbotham was found Saturday. His family posting on Facebook, saying in part, \"Our family is heartbroken to share that Weston was found deceased by a volunteer search and rescue group in a mountainous area outside of Kyoto. The grief we feel is impossible to put into words.\"\n\nWeston was a college student at Auburn University. He disappeared on May 29 after getting into an argument with his mom over the environmental impact of her use of AI. His mother spoke to CNN's Erin Burnett Friday night before his body was found.\n\nNANCY HIGGINBOTHAM, MOTHER OF JAMES \"WESTON\" HIGGINBOTHAM: He turned off his location, so the police were able to track through CCT video that he stopped at the Yamashina station.\n\nSULLIVAN (voice-over): The multi-day search involved more than 100 police officers, K-9 units, and helicopters. On Saturday, the family launched their own search efforts with help from local residents and a hired search and rescue team.\n\nHis family focused their search in a mountainous area because they said Weston loved nature and hiking and thought that's where he may have gone.\n\nHIGGINBOTHAM: He just loves to go outside and go for a walk on a trail or go for a small hike. No matter what time of day, that's just fun to him.\n\nSULLIVAN (voice-over): His family thanking the volunteers who helped them look for him on their Facebook page. Closing out their message by saying, \"Thank you for your thoughts, prayers, and support. We will need them now more than ever. We will always love you, Weston.\"\n\nI'm Jenn Sullivan reporting.\n\nBLACKWELL: Here are some of the other stories we're watching this morning. The CDC says that millions of Americans could soon face new hurdles to keep or get Medicaid coverage. A new federal rule sets stricter standards for who qualifies for an exemption from work requirements. Patients now have to show their condition significantly limits their ability to work.\n\nA photographer is recovering after being hit by a car outside Delaney Immigration Detention Center in New Jersey. This is the moment of impact.\n\nUNIDENTIFIED MALE: Wow.\n\nUNIDENTIFIED MALE: Jesus!\n\nBLACKWELL: Josh Pacheco says that they were covering a protest in Newark when vehicles drove out of a gated area. ICE says it was not involved, and they added the incident involved workers leaving the facility. The company that runs the site has not commented.\n\nAn NBA Finals watch party outside Madison Square Garden turned violent. Police say they arrested 26 people. Officials say one person punched an officer Friday, then bit another officer. New York Mayor Zohran Mamdani posted on X yesterday urging fans to celebrate responsibly, and he says there's no tolerance for violence.\n\nThe Knicks now lead the final two games to none. Game three tomorrow night at MSG.\n\nFour states hold primaries this week, but most people will be watching Maine and the Democratic Senate candidate Graham Platner. A look at the mounting controversy surrounding his run.\n\nAlso, the prosecution has wrapped its case in the track meet murder trial in Texas. We've got the latest developments there.\n\nBLACKWELL: Democrats are collectively holding their breath and hoping for the best ahead of Tuesday's critical Senate primary in Maine. Now, Graham Platner is the favored Democratic candidate. He's likely going to win. He's refusing to exit the race. He claims his past behavior is being exploited by his political opponents.\n\nGRAHAM PLATNER (D), MAINE SENATE CANDIDATE: Now, as every single piece of that past and journey gets dug up, litigated and weaponized, you have my back.\n\nBLACKWELL: But Platner has acknowledged going through what he called a period of darkness after his military service.\n\nJoining me now is Steve Mistler, he's the chief political correspondent for the Maine Republic. Steve, good morning to you. And so, when I say that Democrats will be holding their breath, they likely know who is going to win that Democratic Senate primary.\n\nBut Governor Janet Mills is still on the ballot there. Is their consideration that there will be a significant turnout for her, that there may be a message in margin here. What are we expecting on Tuesday night?\n\nSTEVE MISTLER, CHIEF POLITICAL CORRESPONDENT, MAINE REPUBLIC: That's a good question. I mean, I think, you know, the governor in recent weeks or in the past week, I should say, has, you know, signaled through the press that, you know, list -- to remind people that she's still on the ballot. Now she suspended her campaign in late April and really hasn't campaigned since then.\n\nAnd so the question is, is whether or not just those signals in and of itself will, you know, move voters who are antsy about Graham Platner and some of these controversies and the cumulative effects of those. It's unclear if, you know, if there's a critical mass of Janet Mills supporters out there to make this close on Tuesday, but certainly there's going to be a lot of attention paid to Platner's vote share, even if he wins.\n\nBLACKWELL: You've recently interviewed Graham Platner and he is denied becoming physical with any of the women that he casually dated. He said that he told his campaign staff or members staff about these text messages early in his marriage. He also said that he expected that this would be a tough campaign.\n\nMaybe he didn't expect, you know, it coming out from his own campaign, but what did he tell you about the eventuality of having to deal with this? Did he expect that at some point the public would know about this part of his life? MISTLER: Well, he expected that, you know, his life would be a closely examined. He was pretty clear about that. He didn't know -- you know, he didn't anticipate the specifics of it. But he -- it's interesting because he, you know, he views this -- these -- the scrutiny of his personal life and these old Reddit posts.\n\nAnd, of course, the -- his old relationships back when he was living in Washington, D.C., he's used those as evidence that his message is a threat to what he calls the political establishment.\n\nSo, you know, while he's frustrated by the attacks and the examination of his personal life, he also views that as evidence that his messages is working and a threat to what he says is the political establishment that wants to stop him at all costs. So it's interesting.\n\nHe's -- it's a mix of sort of defiance and also, you know, anger I think at the fact that, you know, his life is being examined this closely. There's also an acknowledgement though, I would say, that, you know, he -- that that's fair game. I mean, he does say that too, but I think it's just the nature of some of the -- these attacks that's has him frustrated, but again, defiant.\n\nBLACKWELL: And what is he hearing from the state party, from the national party about his campaign?\n\nMISTLER: Yes, I asked him about that on Friday and asked if he had, you know, heard from any officials in the Maine Democratic Party or any -- the national party or any of its affiliates to drop out. And he said, no. And he also said that, you know, if he wouldn't do it anyway, he just feels like he's going to survive this.\n\nHe doesn't believe that the attacks are going to work. He thinks the movement, as he describes it, that he's building here is enough to just push past all of this. And also that voters are tired of that kind of politics. That's the way he described it to me.\n\nSo he thinks that, you know, voters are going to look past a lot of these controversies. And, you know, to some extent, he was right about that when some of his old social media posts. Surfaced in last fall. And a lot of people were writing him off then, but his campaign proved to be very resilient.\n\nAnd I think a lot of that is because he talked about it at town halls. He's held something like 80 of them. And also in the press and in talking about it, he kind of crafted this story of redemption, which I think if you talk to some of his diehard supporters, they really believe in that.\n\nThe question of course, is whether or not, you know, Maine Independent voters, which, you know, occupy a big clock of the voting population here, whether it's persuasive to them.\n\nBLACKWELL: We will all be watching Tuesday night.\n\nSteve Mistler, thank you so much.\n\nElon Musk is poised to become the first trillionaire. So just how much money is $1 trillion? The numbers we've been talking about th he shooting is one of at least 170 mass shootings across the U.S. this year alone, according to the Gun Violence Archive.","cn":"据枪支暴力档案，仅今年一年，这起枪击事件就是全美至少170起大规模枪击事件之一。","structure":"主语+系动词+表语（名词短语+介词短语+状语）","analysis":"'one of at least 170 mass shootings' 是表语，'across the U.S.' 和 'this year alone' 是地点和时间状语。"},{"en":"The main problem of negotiating with this administration is that you have to face so many changing positions, moving the goalposts, different statements, contradictory remarks by different officials.","cn":"与本届政府谈判的主要问题是，你必须面对如此多变化的立场、不断改变的目标、不同的声明以及不同官员的矛盾言论。","structure":"主语+系动词+表语从句（主语+谓语+宾语）","analysis":"'that' 引导表语从句，从句中 'have to face' 是谓语，后面跟多个并列宾语。"},{"en":"A source familiar with the thinking of U.S. Treasury Secretary Scott Bessent says he is considering, and the Treasury Department is considering using Iranian assets to not only pay for the damage of future Iranian attacks, but also considering the possibility of using them to pay for past damage from Iranian attacks.","cn":"一位熟悉美国财政部长斯科特·贝森特想法的人士表示，他正在考虑，财政部也在考虑利用伊朗资产不仅支付未来伊朗袭击造成的损失，还考虑用它们支付过去伊朗袭击造成的损失。","structure":"主语+定语+谓语+宾语从句（主语+谓语+宾语+不定式短语）","analysis":"'familiar with...' 是形容词短语作定语修饰 'source'；'says' 后接宾语从句，从句中 'is considering' 和 'is considering' 并列，'using...to not only...but also...' 是动名词短语作宾语。"},{"en":"The Israeli military acknowledged the strike and said it was moving suspiciously and operating in an area that had been under an evacuation warning.","cn":"以色列军方承认了这次袭击，并称该车辆当时在可疑地移动，并在一个已处于疏散警告的区域活动。","structure":"主语+谓语+宾语从句（主语+谓语+表语+定语从句）","analysis":"'said' 后接宾语从句，从句中 'it was moving...and operating...' 是并列谓语，'that had been under...' 是定语从句修饰 'area'。"},{"en":"Hezbollah, which rejected the latest U.S.-Israel ceasefire, has attacked northern Israel for the first time since that ceasefire went into effect, launching two projectiles, according to the Israeli military.","cn":"据以色列军方称，拒绝最新美以停火协议的真主党，自该停火协议生效以来首次袭击了以色列北部，发射了两枚抛射物。","structure":"主语+非限制性定语从句+谓语+宾语+状语+现在分词短语","analysis":"'which rejected...' 是非限制性定语从句修饰 'Hezbollah'；'launching two projectiles' 是现在分词短语作伴随状语。"},{"en":"After days of searching, the body of 20-year-old James Weston Higginbotham was found Saturday.","cn":"经过数日搜寻，20岁的詹姆斯·韦斯顿·希金博特姆的尸体于周六被发现。","structure":"状语+主语+谓语+状语","analysis":"'After days of searching' 是时间状语，'was found' 是被动语态谓语，'Saturday' 是时间状语。"},{"en":"He disappeared on May 29 after getting into an argument with his mom over the environmental impact of her use of AI.","cn":"他于5月29日失踪，此前他与母亲就她使用人工智能对环境的影响发生了争执。","structure":"主语+谓语+时间状语+时间状语从句（介词+动名词短语）","analysis":"'after getting into an argument...' 是介词短语作时间状语，'over...' 是介词短语修饰 'argument'。"},{"en":"The multi-day search involved more than 100 police officers, K-9 units, and helicopters.","cn":"为期多日的搜寻动用了100多名警察、警犬队和直升机。","structure":"主语+谓语+宾语（并列名词短语）","analysis":"'involved' 是谓语，后面跟三个并列宾语。"},{"en":"His family focused their search in a mountainous area because they said Weston loved nature and hiking and thought that's where he may have gone.","cn":"他的家人将搜索重点放在山区，因为他们说韦斯顿热爱自然和徒步旅行，并认为他可能去了那里。","structure":"主语+谓语+宾语+状语从句（主语+谓语+宾语从句+并列谓语+宾语从句）","analysis":"'because' 引导原因状语从句，从句中 'said' 后接宾语从句，'thought' 后接宾语从句。"},{"en":"A new federal rule sets stricter standards for who qualifies for an exemption from work requirements.","cn":"一项新的联邦规则为谁有资格获得工作要求豁免设定了更严格的标准。","structure":"主语+谓语+宾语+介词+宾语从句","analysis":"'for who qualifies...' 是介词短语，'who' 引导宾语从句作介词宾语。"},{"en":"Josh Pacheco says that they were covering a protest in Newark when vehicles drove out of a gated area.","cn":"乔什·帕切科说，他们当时正在纽瓦克报道一场抗议活动，突然有车辆驶出一个有门禁的区域。","structure":"主语+谓语+宾语从句（主语+谓语+宾语+时间状语从句）","analysis":"'that' 引导宾语从句，从句中 'were covering' 是过去进行时，'when' 引导时间状语从句表示突然发生。"},{"en":"The company that runs the site has not commented.","cn":"运营该地点的公司尚未发表评论。","structure":"主语+定语从句+谓语+状语","analysis":"'that runs the site' 是定语从句修饰 'company'，'has not commented' 是现在完成时谓语。"},{"en":"He also said that he told his campaign staff or members staff about these text messages early in his marriage.","cn" ve you along.\n\nPresident Trump returned to the campaign trail yesterday as he tries to rally his MAGA base for the upcoming midterm elections. The president visited Chippewa, Wisconsin, for a rally branded as Fighting for American Farmers. Some farmers say that they've been hurt by some of the administration's trade policies and the war with Iran.\n\nBut in his remarks, the president seemed more focused on other topics, like his beautification projects. Back in D.C. CNN's Jeff Zeleny is in Wisconsin with more on the president's message to farmers.\n\nJEFF ZELENY, CNN CHIEF NATIONAL AFFAIRS CORRRESPONDENT: Victor, it was a return to the campaign trail of sorts for President Trump on Friday as he campaigned here in western Wisconsin. Now this is the makings of the roundtable. It actually had more of a feeling of a rally as his supporters are taking their lead.\n\nNow this is one of the biggest battlegrounds in the country in the fight for the midterm elections. Republican Representative Derek Van Orden is in a very tough race. Even Republicans acknowledge that and the impact of the President's tariff policies and trade policies are being felt quite deeply here in rural America.\n\nThe President signaled that he's interested in helping the American farmer, but he also seemed to suggest he doesn't need to be campaigning at all.\n\nTRUMP: I fought for the American farmer like no one has ever fought before. Nobody's like, I'm up here today. I don't need this. I got elected. I don't have. What the hell do I have to be here for? I got elected. I'm here because I like the farmer.\n\nI mean, when you think about it, I guess there's a lot of truth to that, right? I could be home right now in the beautiful White House, enjoying watching somebody else on television talking. Life is much better than my life. I will tell you. Your ear wasn't a little pierced over here. You didn't get pierced. You have a nice, safe, beautiful life.\n\nZELENY: There's no doubt we'll be seeing more rats to retake control of the Senate.\n\nFREEMAN: Are you considering holding your breath and voting for him?\n\nDEPP: I got until Tuesday to decide, but I'm pretty sure I'll vote for him. I don't think a lot of this crime is anybody else's business.\n\nFREEMAN (voice-over): For some Democrats, they're willing to look past the interpersonal stories.\n\nZOO CAIN, MAINE DEMOCRAT: I'm not really interested in the guy's foibles, you know, I'm interested in his vision and what he has to say. And I love what he has to say. So yes, it's been definitely difficult because everybody is piling on this guy.\n\nFREEMAN (voice-over): But others did not buy Platner's tattoo explanation.\n\nSANDRA BRADEN, MAINE DEMOCRAT: He's an intelligent man. Of course he knew about it. I don't blame him for denying it.\n\nFREEMAN: But that's still not enough not to vote for him. You're still going to vote for him likely?\n\nBRADEN: I'm going to vote for him, yes. But I don't like it. I'm not in favor of all that.\n\nFREEMAN (voice-over): Still for some, the drip, drip has left voters confused.\n\nWOODY HAYWOOD, MAINE DEMOCRAT: I don't know if it's misinformation or disinformation. Right? Like I don't know, do we -- do any of us really know what's going to be or what kind of character he has? Don't know, unproven. Unproven. So is it the devil that we have or the devil, the devil we know or the devil that we don't know yet?\n\nFREEMAN (voice-over): According to a pair of recent polls conducted before the latest allegations, a head to head matchup between Platner and Senator Collins appears competitive. One with no clear leader and the other showing Platner with an advantage. While Platner is the clear favorite to win the Democratic nomination on Tuesday, another high profile candidate's name is still on the ballot. Governor Janet Mills suspended her campaign back in April, but a source now tells CNN she's been getting encouragement to reenter the primary.\n\nBeth Dindas, a Mills supporter from the start, thinks it's likely too late.\n\nBETH DINDAS, MAINE DEMOCRAT: I think that ultimately, unfortunately, we're going to lose this race again and we're going to have six more years of Susan Collins, who has let down the people of Maine time after time.\n\nFREEMAN: Now, Victor, on Friday night, Platner had a rally in Bar Harbor, Maine, and he was defiant, saying we are in the of our lives and adding, when politically motivated, serious and false accusations are made against me, Maine, you have my back. We'll see what voters say on Tuesday. Victor.\n\nBLACKWELL: Indeed we will. Danny Freeman reporting. Thank you very much. Peace talks between the U.S. and Iran have reached a critical stage. A top official in Iran tells CNN a potential deal hinges on the Trump administration agreeing to end its naval blockade and releasing $24 billion in frozen Iranian assets.\n\nGEN. MOHSEN REZAEI, SENIOR MILITARY ADVISER TO IRAN'S SUPREME LEADER (through translator): If the war continues and the naval blockade is not lifted, we will drag the war to the Indian Ocean, the Bab El Mandeb Strait, the Red Sea and the Mediterranean. (END VIDEO CLIP)\n\nOvernight, the U.S. military struck several coastal sites in Iran. It also intercepted a wave of missiles and drones launched by Iran toward the Strait of Hormuz as well as toward Kuwait and Bahrain that's threatening an already fragile ceasefire. Israeli forces also ramped up attacks against Hezbollah targets in Lebanon. It killed more than 20 people.\n\nCNN's Barbie Nadeau is tracking the latest developments. She joins us now live from Rome. Barbie?\n\nBARBIE NADEAU, CNN CORRESPONDENT: Yes, you know, Victor, there's a lot of talk about peace, but when you see this sort of escalation of military activity over the last couple of days, it's really hard to understand what that is starting to look like. We've had 20 people killed in Lebanon. We heard the president of Lebanon tell CNN's Christiane Amanpour that he felt Lebanon was being used as a bargaining chip. We hear Iran saying that's not true. There's just a lot of back and forth.\n\nAnd as you say, these interceptions of drones and missiles and attacks towards Kuwait and Bahrain, sending people to take shelters, very unsettling. But we did hear from President Donald Trump. Let's listen for a second, hear what he had to say about these peace talks.\n\nTRUMP: We're at a point we're going to come out of Iran very quickly and it's going to be very strong one way or the other, whether it's a piece of paper or the very tough way. OK. The very tough way is maybe the easier way.\n\nNADEAU: And you know, Victor, one way or another, the tough way, the piece of paper, that's very unsettling for people in the region there, you know, and for the global economy as it stands. So it's a lot of waiting, wishing, wondering and trying to interpret what messages really mean. Victor.\n\nBLACKWELL: Barbara Nadeau reporting for us. Thank you, Barbie.\n\nHappening now, we are following Pope Leo as he kicks off a six-day tour of Spain. How he's confronting one of the church's biggest controversies along the way.\n\nPlus, father in Virginia is sentenced in that double murder plot involving his family's au pair. We have details for you that ahead.\n\nAnd President Trump is facing backlash over his pick to lead the intelligence community. Why the president is waving off questions about Bill Pulte's qualifications.\n\nBLACKWELL: All right. Here are some of the headlines we're watching this morning. Pope Leo is kicking off a visit to Spain with political polarization and migration front and center. Pope Leo is set to visit migrant centers and address Spain's parliament. Investigate -- immigration rather has become a key priority for his papacy. And he's been outspoken about how migrants are treated.\n\nThis six-day trip also includes a major stop in Barcelona to visit Sagrada Familia Basilica. It is also expected that he will meet with sexual abuse survivors.\n\nThe search is  The level of cruelty calculation and inhumanity in this case reflects something far deeper than anger or impulse. It reflects evil.\n\nHUBBARD (voice-over): Prosecutors said Banfield hatched a plan to kill his wife, Christine Banfield, and another man, Joseph Ryan. They say he used a fetish website to lure Ryan to his house under the guise of having consensual sex with his wife. The plot was to frame Ryan, whom Banfield would allege attacked his wife, telling the jury he killed Ryan in an attempt to save his wife's life.\n\nDANIELLE HOCKER, CHRISTINE'S OLDER SISTER: I didn't truly know Brendan at all. I don't believe anyone did. Not family, not friends, and certainly not Christine.\n\nDEIRDRE FISHER, JOSEPH RYAN'S MOTHER: Joe wasn't just the disposable caricature. He had a name. My son was a kind human being.\n\nHUBBARD (voice-over): Over five days of the trial, Fairfax county prosecutors called more than 20 witnesses, including the au pair at the center of the case, who testified about the scheme to, quote, get rid of Christine Banfield. The au pair said Banfield wanted to be with her but did not want to pay for a divorce or share custody of the couple's daughter.\n\nUNIDENTIFIED MALE: He thought he could create the perfect crime. He thought he was smarter than everybody else. He wasn't.\n\nHUBBARD (voice-over): I'm Sherrell Hubbard reporting.\n\nBLACKWELL: All right, Sherrell, thank you. The au pair is serving a 10-year sentence. She pleaded guilty in October 2020 -- 2024 to involuntary manslaughter for fatally shooting Ryan and agreed to testify against her former lover in exchange for that plea deal.\n\nStill ahead, the Justice Department has officially killed plans for President Trump's so called anti-weaponization fund. But is there a chance that it could come back?\n\nBLACKWELL: President Trump says he's interviewing five candidates for the job of Director of National Intelligence. Trump made these remarks yesterday aboard Air Force One. Now, this is after the firestorm over his decision to install Bill Pulte, his Federal Housing Finance Agency director, in that position. And Trump, of course, clarified that his appointment is only temporary.\n\nAnd he does plan to name another permanent replacement. Pulte has no known intelligence experience. He also did not have a security clearance before Trump chose him.\n\nLet's talk about this now with Errol Louis, political anchor for Spectrum News. He's also the host of the Big Deal with Errol Lewis. Errol, good morning to you.\n\nSo let's start here. The President probably knew that Bill Pulte didn't have the security clearance, but he knew that he was loyal. Right? And that is what is most important to the President.\n\nLet me play here what the President said about his choice.\n\nTRUMP: I don't think he'd want to be permanent, but he's a very smart guy, and he may find out some things about the rigged elections, et cetera, et cetera. I think he'd like to do it.\n\nBLACKWELL: Trump also told the Wall Street Journal that he wants him to make the ODNI smaller and maybe consider getting rid of it. What do you make of the marching orders to Bill Pulte?\n\nERROL LOUIS, POLITICAL ANCHOR, SPECTRUM NEWS: Good morning, Victor. Well, it was kind of obvious what Bill Pulte is there to do or selected to do. This was the same person who provided a lot of the information for some of the baseless indictments of Donald Trump's enemies. These are indictments that grand juries rejected in one jurisdiction after another.\n\nBut it was based on information, in part, whenever you hear about these allegedly fraudulent mortgages that the president's enemies appear to or have been accused of taking out. Well, this was information from the housing agencies controlled by Bill Pulte.\n\nSo this was somebody who was already working hand in glove with the President to try and take out his enemies. And I think some of the alarm that you saw on Capitol Hill at the notion of this person getting intel -- control of the intelligence apparatus is that he's already shown that he's part of the retribution campaign that the President is waging.\n\nBLACKWELL: He's got 210 days max in that position, which, of course, if anybody's counting, takes us right through the November elections.\n\nLet's talk about Graham Platner, likely to be the Democratic nominee for Senate in Maine. The claims that he admits to and those that he denies. Do those complicate the races outside of Maine?\n\nLOUIS: I mean, you talk with Democrats about Graham Platner, they bring up Ken Paxton, the Republican nominee in Texas. Does this have residue that stains other races for Democrats across the country?\n\nLOUIS: Well, there's a resource question, if nothing else. Republicans have said they're going to spend $42 million to defend Susan Collins in Maine. Democrats have said that they're going to spend $24 million to try and prop up Graham Platner. Now, that number may change Depending on what else is learned about him.\n\nAnd if it starts to look like he's not viable, that might change. But that's $24 million that would not go to other candidates. So, yes, it all works together as far as brain space, you know, talking about scandals. Sure. It enables Republicans to say, well, we've got Ken Paxton, who's got a lot of problems. Well, you've got this guy, Graham Platner. And so everybody's got problems. And it kind of takes away certainly a talking point for Democrats.\n\nBLACKWELL: Let me ask you about the so called anti-weaponization fund. The Department of Justice has now told two federal courts that cases challenging that fund are moot because the administration has abandoned the program. Two points here. First, one of the cases is 35 former federal judges alleging that the President and the Department of Justice defrauded the court, that there was no real conflict and they colluded to create this fund.\n\nDoes that just go away? Because Todd Blanch says, never mind.\n\nLOUIS: Oh no. Oh no, no. The issue of whether or not there was a fraud on the court, whether or not there was a real case and controversy at the core of all of this, that's been reopened and there judges, I think the jurisdiction is in Florida where they're looking at that.\n\nOh no, by no means has that question gone away. Now the funding is there for the slush fund. And by the way, Victor, you have to point out there have already been a number of settlements. I mean, using existing programs, the Justice Department can funnel maybe not $2 billion, but quite a lot of money to two people that the administration or the President thinks are deserving of some, quote, anti-weaponization money.\n\nSo the issue has not gone away. The question of whether or not the fund should ever have been created has not gone away. And what Todd Blanche says about what they plan to do with it, frankly, never really had very much credibility. You really have to watch the numbers, not the statements from Todd Blanche.\n\nBLACKWELL: And there are some members of Congress, including Republicans, Senator Cassidy, Senator Tillis, who wanted to codify that this fund would never exist. Is it possible even if we hear from and read from the DOJ to courts, that it's a moot point because they've abandoned it, that it could be resurrected?\n\nLOUIS: Well, you know, it can be resurrected because the two gentlemen you just mentioned, Thom Tillis, Senator Cassidy, Senator Cornyn, these are all Republicans who are on their way out because they were not hand-in-glove, in lockstep with the President.\n\nAnd so, yes, they -- they're trying to sort of maybe show a glimmer of independence now, but it's too late and they don't have the votes. And the bill that just passed, in fact, did not outlaw it as they could have when they considered getting rid of this fund and making clear that it should not exist. And so, now the fund -- the fund will probably exist, it will be\n\nfunded. It's going to take real guardrails, you know, sort of talking about it, talking about breaking from the pack after you've been defeated, after you're on your way out and you're a lame duck, that's really not going to get it.\n\nBLACKWELL: One more here for a New Yorker. The President says that he's going to be at game three of the NBA finals at Madison Square Garden. Knicks up 2-0. NBA Commissioner Adam Silver said that the President will be the first sitting President to attend the NBA finals.\n\nHe also said that sports is something where we can emphasize, we -- what we have in common, not what pulls us apart. It creates a sense of belonging. I wonder, Errol, is that what you expect we'll see when the President's face is flashed up on the big board at MSG?\n\nLOUIS: No, I don't think so. This is much bigger than the President, to be honest with you -- the energy here. You spent many years living up here, Victor --\n\nLOUIS: You know how long we've been waiting, half a century, most of my adult life we've been waiting for this. So, no, I don't think so. In fact, you know, to be honest with you, positive or negative reaction when the President's face is flashed on the screen, that's just a sideshow. I mean, we got real business here. We've got -- we've got a really important third game to win.\n\nBLACKWELL: All right, we'll see if they can do it in four. They're up 2-0. Errol Louis, always good to have you on a Saturday morning, thanks so much.\n\nBLACKWELL: Wall Street closed for the week with most major indices in the red. And tech stocks accounted for much of the heavy losses. CNN's Richard Quest breaks down what led to the massive downturns in that space, and why A.I. could be responsible.\n\nRICHARD QUEST, CNN BUSINESS EDITOR-AT-LARGE (on camera): It was an unpleasant end to the stock market week with the Nasdaq, the S&P and the Dow all losing ground, and in some cases, the worst sessions for many months. But today's accident didn't just happen on a Friday.\n\nThe warning signs had been there for several days, particularly when Broadcom announced its results and the market gave it a thorough beating up. It simply wasn't good enough. And then, as the week continued, so the rot set in.\n\nBy the time you get to Friday, where we're seeing some impressive losses, Nvidia down 6.25 percent, Broadcom down another 7.9 percent, Intel off 11 percent. And the reason is the same. The market is coming to the realization that the sheer amount of money being plowed into A.I. by these companies simply will not bring the returns in the short to medium term.\n\nThey are worried that huge sums are being spent and the path to profitability, whilst certainly, the businesses are making money, can't justify those levels of investment. But here's the conundrum. Everybody knows that A.I. is the only game in town.\n\nTherefore, if you are one of those companies, you have no choice. You have to find the money and you have to keep spending, and yes, the market will exact its wrath. Richard Quest, CNN, New York.\n\nBLACKWELL: All right, Richard, thank you very much. And let's stay with this, this theme of A.I., because there's a new report that really paints a troubling picture as there are more data centers being built across the U.S. What we're learning about the economic and the environmental costs.\n\nAnd if you're heading out, take me with you, please. Remember, you can go straight to the CNN app and stream our show anywhere in the U.S. You can also go to cnn.com/watch.\n\nBLACKWELL: President Trump announced plans to host leaders from major A.I. companies in the White House, possibly as soon as next week. The President signed a new A.I. and cybersecurity executive order, asking tech companies to voluntarily submit new A.I. models to federal government for review before releasing them to the public.\n\nThis week, a new report by the United Nations University raised concerns about the real-world environmental impact of A.I. It found that A.I. data centers consume more electricity than most countries on average, and they also require massive amounts of water.\n\nProfessor Kay Ivey Mamdani is co-author of that study and its lead investigator, and he joins me now. Thank you so much for being with me. And I want to start with just some of the numbers that are astonishing from this report.\n\nLet's put them on the screen. Global data centers use 448 trillion- watt hours of electricity. That electricity used to produce about 208 million tons of carbon dioxide, and consumed about 1.2 trillion gallons of water, and you predict the water and energy usage will double by 2030. Talk to me about the environmental impact of just the extraordinary level of consumption.\n\nKAVEH MADANI, UNITED NATIONS UNIVERSITY: And let me tell you that this is only the tip of the iceberg, because those numbers are only related to the electricity consumption and the amount of water, we need for the electricity consumption and some other elements of the process.\n\nIt doesn't include the water that we pollute and use during the extraction of critical minerals that we need to produce the basic infrastructure and hardware for our A.I. operations. And then also, what we need to do at the end with its e-waste, and all those processes, we use water and energy.\n\nAnd there's nothing there that is dry and doesn't require water. Why is this important? Because most people around the world, most societies, still the dominant discourse around A.I. is thinking that A.I. is just a virtual thing, right? It's a -- it's a virtual product.\n\nIt's a digital technology, not associating it with all this massive infrastructure, the physics behind it, the major material supply chains behind A.I. And then that was the -- what we wanted to do. Not to say that A.I. is bad, not to say that governments should not be investing in A.I., but to remind them that we have to also worry about these impacts because we already know that the world is water bankrupt.\n\nWe don't have enough water in many regions of the world. We know that carbon emissions are high and adding more electricity demand to our needs, to our portfolio means that we have to -- we will compromise the decarbonization process and create a lot of problems.\n\nThat's why you see in many parts of the world, including the United States, now, people are having conflicts over the establishment of these data centers because farmers are worried or cities are worried, urban population, indigenous communities around the world are worried about these data centers coming to their place, and they are only bearing the cost, not taking advantage of the benefits.\n\nBLACKWELL: Yes, and there are some communities who are trying to keep these data centers out of their communities locally. More on this report. It explores the tens of billions of watt hours that it takes to train some of these A.I. models, massive amounts of energy.\n\nI want you to listen here to OpenAI CEO Sam Altman on what he says when it comes to training these models is an unfair comparison. Watch.\n\nSAM ALTMAN, CEO, OPENAI: One of the things that is always unfair in this comparison is people talk about how much energy it takes to train an A.I. model, relative to how much it costs a human to do one inference query.\n\nBut it also takes a lot of energy to train a human. It takes like 20 years of life, and all of the food you eat during that time before you get smart. And not only that, it took like the very widespread evolution of the 100 billion people that have ever lived and learned not to get eaten by predators and learned how to --\n\nUNIDENTIFIED MALE: Yes --\n\nALTMAN: Like, figure out science and whatever to produce you. And then you took whatever you know, you took. So, the fair comparison is, if you ask ChatGPT a question, how much energy does it take once its model is trained to answer that question versus a human, and probably A.I. has already caught up on an energy efficiency basis measured that way.\n\nBLACKWELL: Do you agree with that? You think it's -- th the military advisor to the Ayatollah Mojtaba Khamenei. And I want to play for you first on the fighting. Here's what he said could happen if this blockade continues.\n\nMOHSEN REZAI, SENIOR MILITARY ADVISER TO IRAN'S SUPREME LEADER (through a translator): If the war continues and the naval blockade is not lifted, we will drag the war to the Indian Ocean, the Bab El Mandeb Strait, the Red Sea, and the Mediterranean. And we will give another dimension to the war by attacking these other American bases that we have been attacking so far.\n\nBLACKWELL: And so, what do you know about the capabilities of the Iranians to make good on that threat?\n\nTALEBLU: Well, certainly, the Islamic Republic has proven an ability to export maritime harassment and terrorism. You know, when the Houthis were doing that a few years ago, that was actually because they had learned from their patron and were equipped from weapons from their patron, the Islamic Republic of Iran, the ability to go after these ships, these vessels, and to go after a strategic chokepoint in the Red Sea and the Bab El Mandeb. As we saw the Houthis do, their partners on the southern part of the Arabian Peninsula just a few years back.\n\nNow, that's a sort of Damocles. The regime is dangling over, not just the Arab States, not just over the West, but over the international economy. And in my view, that only heightens the choice before the Trump administration.\n\nAnd here, actually, we have other tools, not just military, but economic tools against the administration -- against the regime that the administration should consider. The latest data, particularly for the month of May, which is when the full blockade has been in effect, meaning start to finish the whole month was Iran was only able to export 64,000 barrels of oil per day. Meaning, only four vessels -- four smaller vessels got past the U.S. blockade.\n\nWhen the regime's, you know, major parts of its economy are reliant on hydrocarbons and petrochemical product sales, and they can only export up to 64,000 barrels per day, when just back in February, before the conflict began, they were exporting over 2.1 million barrels of oil per day, they are facing bankruptcy. And that's precisely why they're going to be lashing out and threatening this wider circle of escalation.\n\nBLACKWELL: Yes. And of course, as we reported that the Iranians are demanding a $24 billion release of their assets. $12 billion ahead of the signing and $12 billion later. Control room, let's go to the Christiane Amanpour exclusive interview with the Lebanese president, Joseph Aoun. And this is what he said about the accusations -- strong accusations about the IRGC and their influence on what's happening in Lebanon. Let's watch.\n\nJOSEPH AOUN, PRESIDENT, LEBANON: Our people being killed. Our people being -- our houses being destroyed. They are using Lebanon as a bargaining chip in their negotiation with the United States. It's unacceptable.\n\nBLACKWELL: Now, the IRGC denies that. Is he right? You've written that the IRGC is feeling emboldened as it relates to Lebanon.\n\nTALEBLU: Certainly, feeling emboldened as it relates to Lebanon and their proxy -- their Hezbollah, which is their most powerful proxy, and still the one that they're hoping to recreate and rebuild, hoping that America and Israel tire of this conflict. But no, the Lebanese president you mentioned right now is absolutely right. 110 percent right.\n\nThe Islamic Republic of Iran's entire military strategy is basically reliant on working by, with, and through downtrodden and dispossessed persons in the heartland of the Arab and Muslim world to continue its fighting for it. And unfortunately, Lebanon, a proud country, has been one of the main theaters that has been sacrificed in this larger, decades-long war against Israel, America, and the West. And certainly, Lebanese citizenry and even Lebanese Shia have been paying a price for being this battleground.\n\nThe question is, what
