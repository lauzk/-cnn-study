<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNN 英语精读</title>
    <style>
        :root {
            --bg: #ffffff;
            --bg2: #ffffff;
            --bg3: #f8f9fa;
            --bg4: #f1f3f5;
            --border: #e9ecef;
            --border2: #dee2e6;
            --text: #212529;
            --text2: #495057;
            --text3: #6c757d;
            --blue: #0a58ca;
            --blue-dim: #e7f1ff;
            --red: #cc0000;
            --green: #146c43;
            --amber: #e68a2e;
            --coral: #d6336c;
            --teal: #0f8b8b;
            --purple: #6f42c1;
            --hl-yellow: rgba(255, 243, 205, 0.8);
            --hl-yellow-border: rgba(255, 193, 7, 0.8);
            --hl-active: rgba(255, 230, 150, 0.9);
            --r: 6px;
            --font: 'Verdana', 'Arial', 'Helvetica', sans-serif;
            --mono: 'Consolas', 'Monaco', monospace;
        }
        /* ... (重置样式保持不变) ... */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* 全局样式 */
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
        }

        /* 布局 */
        .layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            min-height: 100vh;
        }

        @media (max-width: 800px) {
            .layout {
                grid-template-columns: 1fr;
            }
            .sidebar {
                display: none;
            }
        }

        /* 侧边栏样式（模拟 CNN 目录风格） */
        .sidebar {
            background: var(--bg3);
            border-right: 1px solid var(--border);
            padding: 1.5rem;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-logo {
            font-size: 18px;
            font-weight: bold;
            color: var(--red);
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
            margin-bottom: 1rem;
        }

        .directory-section {
            margin-bottom: 1.5rem;
        }

        .directory-section .section-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .directory-item {
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 4px;
            transition: background 0.15s;
            margin-bottom: 8px;
        }

        .directory-item:hover {
            background: var(--bg4);
        }

        .directory-item.active {
            background: var(--blue-dim);
            border-left: 3px solid var(--blue);
        }

        .item-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
        }

        .item-date {
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
        }

        .item-title {
            font-size: 12px;
            color: var(--text2);
        }

        /* 主内容区 */
        .main {
            padding: 1.5rem;
        }

        /* 顶部栏 */
        .topbar {
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .topbar-title {
            font-size: 18px;
            font-weight: bold;
            color: var(--red);
        }

        .topbar-date {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text2);
        }

        .btn-src {
            background: var(--bg3);
            border: 1px solid var(--border);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            margin-left: auto;
        }

        .btn-src:hover {
            background: var(--bg4);
        }

        /* Tabs 标签页 */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 1.5rem;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 4px;
        }

        .tab {
            flex: 1;
            padding: 7px 0;
            font-size: 13px;
            text-align: center;
            border-radius: 7px;
            cursor: pointer;
            color: var(--text2);
            transition: all .15s;
        }

        .tab.active {
            background: var(--blue);
            color: #fff;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        /* 目录视图 */
        .directory-view {
            display: block;
        }

        /* 原文内容区域 */
        .transcript-wrap {
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 1.25rem;
            align-items: start;
        }

        @media (max-width: 900px) {
            .transcript-wrap {
                grid-template-columns: 1fr;
            }
        }

        .transcript-body {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 1.5rem;
            font-family: var(--font);
            line-height: 1.75;
            position: relative;
        }

        .segment-block {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        .segment-block:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .segment-title {
            font-size: 14px;
            font-weight: bold;
            color: var(--red);
            margin-bottom: 0.75rem;
            padding-bottom: 4px;
            border-bottom: 1px solid var(--border);
        }

        .para {
            margin-bottom: 1rem;
            white-space: pre-wrap;
        }

        .speaker-tag {
            display: inline-block;
            font-size: 12px;
            font-weight: 600;
            color: var(--blue);
            margin-right: 6px;
        }

        /* 翻译区域 */
        .translation-box {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 1.5rem;
        }

        #fullTranslation {
            white-space: pre-wrap;
            line-height: 1.8;
            font-size: 14px;
            font-family: var(--font);
        }

        /* 高亮词汇 */
        .hl {
            background: var(--hl-yellow);
            border-bottom: 1px solid var(--hl-yellow-border);
            border-radius: 2px;
            cursor: pointer;
            transition: background .15s;
            padding: 0 2px;
        }

        .hl:hover,
        .hl.active {
            background: var(--hl-active);
        }

        .hl.level-考研 {
            border-bottom-color: #e68a2e;
        }

        .hl.level-六级 {
            border-bottom-color: #0a58ca;
        }

        /* Tooltip 弹窗 */
        .vocab-popup {
            position: fixed;
            z-index: 200;
            max-width: 300px;
            background: var(--bg4);
            border: 1px solid var(--border2);
            border-radius: var(--r);
            padding: 1rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            display: none;
        }

        .vocab-popup.show {
            display: block;
        }

        /* 词汇索引 */
        .word-panel {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 1rem;
            position: sticky;
            top: 80px;
        }

        .word-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: calc(100vh - 200px);
            overflow-y: auto;
        }

        .word-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 7px;
            cursor: pointer;
            transition: all .15s;
        }

        .word-chip:hover {
            background: var(--bg3);
        }

        .word-chip.active {
            background: var(--blue-dim);
        }

        /* 词汇/句子/话题卡片 */
        .vocab-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .vcard,
        .scard,
        .tcard {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 1rem;
            margin-bottom: 12px;
        }

        .vword {
            font-size: 18px;
            font-weight: 700;
            color: var(--red);
        }

        /* 其他样式... */
        .empty {
            text-align: center;
            padding: 3rem;
            color: var(--text2);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border2);
            border-radius: 3px;
        }
    </style>
</head>

        <div class="sidebar-logo">CNN 英语精读</div>

            <div class="section-title">📅 历史记录</div>

                <span class="item-date">2026-06-10</span>

            </div>

</div>

</div>

<script>
const ALL_DATA = {"2026-06-10":{"date":"2026-06-10","source_url":"https://transcripts.cnn.com/show/ctmo/date/2026-06-10/segment/01","full_translation":[{"paragraph":"CNN This Morning 逐字稿（2026-06-10）：","translation":"CNN This Morning 逐字稿（2026-06-10）："},{"paragraph":"Return to Transcripts main page","translation":"返回文稿主页"},{"paragraph":"Platner Easily Wins Democratic Senate Primary in Maine; U.S. Hits Iran after Helicopter Downed; OpenAI Files for IPO, Joins Anthropic and SpaceX. Aired 6-6:30a ET","translation":"普拉特纳轻松赢得缅因州民主党参议员初选；直升机被击落后美国打击伊朗；OpenAI申请IPO，与Anthropic和SpaceX同列。美国东部时间早上6点至6点30分播出"},{"paragraph":"Aired June 10, 2026 - 06:00   ET","translation":"播出日期：2026年6月10日 - 美国东部时间06:00"},{"paragraph":"THIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED.","translation":"此为速记文稿。本副本可能并非最终版本，且可能更新。"},{"paragraph":"AUDIE CORNISH, CNN ANCHOR: Today in the group chat, Democrats in Maine vote to stick with Graham Platner. Could that cost the party a shot at flipping the Senate this fall?","translation":"CNN主播奥迪·科尼什：今天在群聊中，缅因州的民主党人投票支持格雷厄姆·普拉特纳。这会否让该党失去今年秋天翻转参议院的机会？"},{"paragraph":"REP. ALEXANDRIA OCASIO-CORTEZ (D-NY): If the choice on the ballot is between that and a senator who's voted to take health care away from millions of Americans, that's the situation that we have to weigh.","translation":"众议员亚历山大·奥卡西奥-科尔特斯（纽约州民主党）：如果选票上的选择是在那和一位投票剥夺数百万美国人医保的参议员之间，那就是我们必须权衡的情况。"},{"paragraph":"CORNISH: Missiles light up the sky in the Middle East again. Will the strained ceasefire last long enough for the U.S. to deliver that long- promised deal with Iran?","translation":"科尼什：导弹再次照亮中东天空。紧张的停火能否持续足够长的时间，让美国兑现与伊朗长期承诺的协议？"},{"paragraph":"And a big day for the Epstein files. What will Bill Gates tell lawmakers about his links to the late convicted sex offender.","translation":"爱泼斯坦文件迎来重要一天。比尔·盖茨将就他与已故被定罪性犯罪者的联系向立法者说些什么。"},{"paragraph":"UNIDENTIFIED MALE: Do you think that you've killed people as an adult?","translation":"身份不明的男性：你认为你成年后杀过人吗？"},{"paragraph":"VICTOR MARX (R), COLORADO GUBERNATORIAL CANDIDATE: Does it matter?","translation":"维克多·马克斯（共和党），科罗拉多州州长候选人：这重要吗？"},{"paragraph":"CORNISH: This is a candidate who also claims he killed someone as a child. Meet the frontrunner in the Republican race for governor of Colorado.","translation":"科尼什：这是一位还声称自己小时候杀过人的候选人。认识一下科罗拉多州共和党州长竞选的领跑者。"},{"paragraph":"And it's the $3.5 trillion question on Wall Street. Has the A.I. boom gotten ahead of itself?","translation":"这是华尔街3.5万亿美元的问题。人工智能热潮是否已经超前？"},{"paragraph":"UNIDENTIFIED MALE: OpenAI and Anthropic plan to have IPOs at release before the end of this year, signaling to me that the A.I. bubble is about to pop.","translation":"身份不明的男性：OpenAI和Anthropic计划在今年年底前进行IPO，这向我表明人工智能泡沫即将破裂。"},{"paragraph":"(END VIDEO CLIP) (BEGIN VIDEO CLIP)","translation":"（视频片段结束）（视频片段开始）"},{"paragraph":"GRAHAM PLATNER (D), MAINE SENATE CANDIDATE: To any of those who feel let down or disappointed or disillusioned, it is my job to earn your trust, faith, and support. And I will spend every day of this campaign. And if I have the privilege every day in the United States Senate doing exactly that.","translation":"格雷厄姆·普拉特纳（民主党），缅因州参议员候选人：对于任何感到失望、沮丧或幻灭的人，我的工作是赢得你们的信任、信念和支持。我将花费这场竞选的每一天。如果我有幸每天在美国参议院，我也会这样做。"},{"paragraph":"CORNISH: Graham Platner punches his ticket. But now he's got to convince voters to choose him over a five-term senator.","translation":"科尼什：格雷厄姆·普拉特纳获得了提名。但现在他必须说服选民选择他而不是一位连任五届的参议员。"},{"paragraph":"Good morning everybody. I'm Audie Cornish. Here is where we begin. That big statement out of Maine.","translation":"大家早上好。我是奥迪·科尼什。我们开始吧。来自缅因州的那个重大声明。"},{"paragraph":"Democrat Graham Platner, despite all the scandals, earned about three- fourths of primary voters' support over Governor Janet Mills.","translation":"民主党人格雷厄姆·普拉特纳，尽管丑闻缠身，仍赢得了约四分之三初选选民的支持，击败了州长珍妮特·米尔斯。"},{"paragraph":"Moments after clinching the nomination, he turned his attention to his new opponent, Republican Senator Susan Collins.","translation":"在获得提名后不久，他将注意力转向了他的新对手，共和党参议员苏珊·柯林斯。"},{"paragraph":"PLATNER: Susan Collins may have started -- may have started her career decades ago in Washington with good intentions, but she has become just as spineless and corrupt as the establishment she now serves. If you are an independent voice, why do you vote with Donald Trump 95 percent of the time?","translation":"普拉特纳：苏珊·柯林斯可能几十年前在华盛顿开始她的职业生涯时怀有良好意图，但她已经变得和她现在所服务的建制派一样软弱和腐败。如果你是一个独立的声音，为什么你95%的时间都和唐纳德·特朗普投票一致？"},{"paragraph":"CORNISH: Platner has a lot of work to do to get Mills voters on his side.","translation":"科尼什：普拉特纳还有很多工作要做，才能让米尔斯的选民站到他这边。"},{"paragraph":"UNIDENTIFIED FEMALE: I couldn't honestly support Platner, even though some of the things that he says are really good.","translation":"身份不明的女性：我无法诚实地支持普拉特纳，尽管他说的一些话确实很好。"},{"paragraph":"UNIDENTIFIED MALE: I don't think he's ready to be a senator. I'm leaning towards Collins unless the guy shows something else, but I just -- he's not there yet. And --","translation":"身份不明的男性：我认为他还没有准备好当参议员。我倾向于柯林斯，除非那家伙表现出其他东西，但我只是——他还没到那一步。而且——"},{"paragraph":"UNIDENTIFIED FEMALE: And so, what will you do in November if its Platner versus Collins?","translation":"身份不明的女性：那么，如果十一月是普拉特纳对阵柯林斯，你会怎么做？"},{"paragraph":"UNIDENTIFIED FEMALE: That's a really good question. I'm a Democrat, but I voted for Susan Collins several times, because I think that she does care about the state of Maine. But it's going to be a real problem for me in November.","translation":"身份不明的女性：这真是个很好的问题。我是民主党人，但我多次投票给苏珊·柯林斯，因为我认为她确实关心缅因州。但十一月对我来说将是一个真正的问题。"},{"paragraph":"CORNISH: So, today in the group chat, Mike Leon, host of the \"Can We Please Talk\" podcast; Jared Stepman, columnist with \"The Daily Signal\"; and Max Rose, former Democratic congressman from New York.","translation":"科尼什：那么，今天在群聊中，有《我们能谈谈吗》播客主持人迈克·莱昂；《每日信号》专栏作家贾里德·斯特普曼；以及前纽约州民主党众议员马克斯·罗斯。"},{"paragraph":"And Max, I'm actually going to start with you, because you're with VoteVets, which means you guys had a dog in the fight in this race. You guys have been giving a lot of money across the country.","translation":"马克斯，我实际上要从你开始，因为你在VoteVets，这意味着你们在这场竞选中有利害关系。你们在全国各地投入了大量资金。"},{"paragraph":"And what is it? Let me just show what -- what's at stake here.","translation":"那是什么？让我展示一下——这里的关键是什么。"},{"paragraph":"Democrats' chances of flipping the Maine Senate seat. It was pretty good. Maybe this has jeopardized it. We're going to show people a chart while you're talking so you can see what's at stake.","translation":"民主党翻转缅因州参议院席位的机会。本来相当不错。也许这已经危及了它。我们会在你说话时向人们展示一张图表，这样你就能看到利害关系。"},{"paragraph":"Is this race as close as you all hoped it would be, now that Graham has struggled with these scandals?","translation":"既然格雷厄姆因这些丑闻而挣扎，这场竞选是否像你们所有人希望的那样接近？"},{"paragraph":"MAX ROSE (D), FORMER NEW YORK CONGRESSMAN: The race is always going to be close. Because --","translation":"马克斯·罗斯（民主党），前纽约州众议员：这场竞选总是会很接近。因为——"},{"paragraph":"CORNISH: Not with a five-term senator, it's not. A lot of times it can be a blowout, right? Like what -- how do you look at what he needs to accomplish?","translation":"科尼什：面对一位连任五届的参议员，并非如此。很多时候可能是压倒性的胜利，对吧？比如——你怎么看他需要完成什么？"},{"paragraph":"ROSE: Well, I think that we're saying the same thing --","translation":"罗斯：嗯，我认为我们在说同一件事——"},{"paragraph":"ROSE: -- in essence, right? Susan Collins is tough to beat.","translation":"罗斯：——本质上，对吧？苏珊·柯林斯很难击败。"},{"paragraph":"What I would say about the Susan Collins race is that we've seen in the past, is you're not going to win this seat by electing a Susan Collins light or putting forward a Susan Collins light in a race.","translation":"关于苏珊·柯林斯的竞选，我想说的是，我们过去看到的是，你不会通过选出一个“轻量版苏珊·柯林斯”或在竞选中推出一个“轻量版苏珊·柯林斯”来赢得这个席位。"},{"paragraph":"You are going to beat her by energizing your base, particularly in a midterm election.","translation":"你要通过激励你的基本盘来击败她，尤其是在中期选举中。"},{"paragraph":"There is no doubt, though, that this election has got to be a referendum on Susan Collins: on the ways in which she has voted to empower Donald Trump; on her refusal to hold Donald Trump accountable; on the ways in which she has said, I might be fair, but I want to take healthcare away from millions of people. Says the right thing often; does the wrong thing very frequently.","translation":"不过，毫无疑问，这次选举必须是对苏珊·柯林斯的公投：关于她投票赋予唐纳德·特朗普权力的方式；关于她拒绝追究唐纳德·特朗普责任的方式；关于她所说的，我可能公平，但我想剥夺数百万人的医保。经常说正确的话；却非常频繁地做错误的事。"},{"paragraph":"CORNISH: Yes. So, this is very much the message we hear over and over again. And I love that Platner in front of him, it said, \"They don't know Maine.\" You know what I mean? Usually not his own name, not a bunch of other things. It was like, hello, media, this one is for you.","translation":"科尼什：是的。所以，这正是我们一遍又一遍听到的信息。我喜欢普拉特纳在他面前说的那句话：“他们不了解缅因州。”你明白我的意思吗？通常不是他自己的名字，也不是一堆其他东西。就像是在说，你好，媒体，这个是给你的。"},{"paragraph":"I want to play two clips back-to-back, because it sort of, I think, represents something of this race.","translation":"我想连续播放两段视频，因为我认为这在一定程度上代表了这场竞选的一些东西。"},{"paragraph":"First, I'm going to play for you J.D. Vance and how he talks about Susan Collins. And then I'm going to play AOC and how she's talking about Platner. You tell me how you hear the tone of these.","translation":"首先，我将为你播放J.D.万斯谈论苏珊·柯林斯的方式。然后我将播放AOC谈论普拉特纳的方式。你告诉我你如何听出这些的语气。"},{"paragraph":"J.D. VANCE (R), U.S. VICE PRESIDENT: Here's the thing I'll say about Susan Collins, is sometimes I get frustrated with Susan Collins. I almost wish that she was more partisan.","translation":"J.D.万斯（共和党），美国副总统：关于苏珊·柯林斯，我要说的是，有时我对苏珊·柯林斯感到沮丧。我几乎希望她更党派化一些。"},{"paragraph":"But the thing I love about Susan is she is independent, because Maine is an independent state. And frankly, if she was as partisan as I sometimes wish that she was, she would not be a good fit for the people of Maine.","translation":"但我喜欢苏珊的一点是她独立，因为缅因州是一个独立的州。坦率地说，如果她像我有时希望的那样党派化，她就不适合缅因州的人民。"},{"paragraph":"So, let's give a shout-out to Susan Collins, who's doing a great job.","translation":"所以，让我们向苏珊·柯林斯致敬，她做得很好。"},{"paragraph":"OCASIO-CORTEZ: When it comes to the substance of this reporting, obviously, there's a lot in that behavior that's really challenging. It's hard to stomach, you know, in some of it.","translation":"奥卡西奥-科尔特斯：就这份报道的实质内容而言，显然，那种行为中有很多真的很有挑战性。有些部分很难接受，你知道。"},{"paragraph":"But -- but at the end of the day, I think that this is a choice. If that choice on the ballot is between that and a senator who's voted to take healthcare away from millions of Americans, that's the situation that we have to weigh.","translation":"但是——但归根结底，我认为这是一个选择。如果选票上的选择是在那和一位投票剥夺数百万美国人医保的参议员之间，那就是我们必须权衡的情况。"},{"paragraph":"CORNISH: I played these, because one is like, it's hard to stomach. And the other is like, I get frustrated. Shout-out though, anyway, because I guess Maine. And I was, like, these are not ringing endorsements.","translation":"科尼什：我播放这些，因为一个像是“很难接受”。另一个像是“我感到沮丧”。不过还是致敬，反正，因为我想是缅因州。我当时想，这些都不是有力的支持。"},{"paragraph":"MIKE LEON, HOST, \"CAN WE PLEASE TALK?\" PODCAST: But Audie, not only are they not ringing endorsements, the voter that we played in the package before listen to her tone. Maine independents are the second largest party in Maine.","translation":"迈克·莱昂，《我们能谈谈吗》播客主持人：但是奥迪，它们不仅不是有力的支持，我们之前播放的那位选民，听听她的语气。缅因州的独立人士是缅因州第二大党派。"},{"paragraph":"CORNISH: Yes. And a woman, in particular.","translation":"科尼什：是的。尤其是一位女性。"},{"paragraph":"LEON: And a woman and a Democrat who said she voted for Susan Collins, against her will, it sounded like, from that thing.","translation":"莱昂：一位女性和一位民主党人，她说她投票给了苏珊·柯林斯，听起来像是违背了她的意愿。"},{"paragraph":"So -- but those are -- those are some of the things that we're going to have to consider now. It's really about the character quality is what something that Graham Platner has been trying to say: Forget about that. I'm from here. It's how she's voted, to Max's point.","translation":"所以——但那些是——那些是我们现在必须考虑的一些事情。这实际上关乎品格质量，这正是格雷厄姆·普拉特纳一直试图说的：忘掉那个。我来自这里。重要的是她如何投票，正如马克斯所说。"},{"paragraph":"LEON: But then also you hear the voters, and they're, like, a little, still unsure because of those character issues with Platner. So, it's going to be really interesting.","translation":"莱昂：但随后你也听到选民们，他们有点，仍然不确定，因为普拉特纳的那些品格问题。所以，这将非常有趣。"},{"paragraph":"CORNISH: And he's been telling a story for a while of, like, you know, I was -- went through difficult times. Now I'm a person who has changed.","translation":"科尼什：而且他一直在讲述一个故事，比如，你知道，我经历了困难时期。现在我是一个改变了的人。"},{"paragraph":"I want to ask one more thing. Collins and Trump, that's not a tight bond. OK? Can I just put it that way? Here's a list I'm going to play for you. Just some moments over the past couple of months where you hear her talking around Trump policies and where she stands on them.","translation":"我想再问一件事。柯林斯和特朗普，那不是紧密的联系。好吗？我可以这么说吗？这里有一个列表我要播放给你。只是过去几个月的一些时刻，你听到她谈论特朗普政策以及她对这些政策的立场。"},{"paragraph":"(BEGIN VIDEO CLIP) SEN. SUSAN COLLINS (R-ME): The 60 days is a trigger. After 60 days, in my view, the president has to obtain congressional approval or Congress can block it.","translation":"（视频片段开始）参议员苏珊·柯林斯（缅因州共和党）：60天是一个触发点。60天后，在我看来，总统必须获得国会批准，否则国会可以阻止它。"},{"paragraph":"I do not believe that individuals who were convicted of violence against police officers on January 6th should be entitled to reimbursement for their legal fees.","translation":"我不认为因1月6日暴力袭击警察而被定罪的人有权报销他们的法律费用。"},{"paragraph":"Concerned about the cuts in Medicaid and the impact on my state, but other states, as well.","translation":"担心医疗补助的削减以及对我州的影响，但也对其他州有影响。"},{"paragraph":"I've talked with the secretary of homeland security. I have strongly recommended to her that there be a pause on the enforcement surge in both Maine and in Minnesota.","translation":"我已经与国土安全部部长谈过。我强烈建议她在缅因州和明尼苏达州暂停执法激增。"},{"paragraph":"CORNISH: Now, I've chased her in the hallways before, too. She often ends up voting with Republicans, whatever that party line is.","translation":"科尼什：现在，我以前也在走廊里追过她。她最终经常和共和党人一起投票，不管党派路线是什么。"},{"paragraph":"But is Trump going to get involved in this simply because of what's at stake with the Senate? Or is he going to send surrogates? He'll be like, OK, J.D., you go there? Like, can she expect any support there?","translation":"但特朗普会仅仅因为参议院的利害关系而介入吗？还是他会派代理人？他会说，好的，J.D.，你去那里？比如，她能指望那里有任何支持吗？"},{"paragraph":"JARRETT STEPMAN, COLUMNIST, \"THE DAILY SIGNAL\": Yes, I feel that's why he sent J.D. and I feel he will, if he's smart, actually keep some distance from this. I mean part of the -- the thing at stake here is that they're independent. Maine is a little bit different.","translation":"贾里德·斯特普曼，《每日信号》专栏作家：是的，我觉得这就是他派J.D.的原因，而且我觉得如果他聪明的话，他实际上会与此保持一些距离。我的意思是，部分——这里的关键是他们独立。缅因州有点不同。"},{"paragraph":"I mean, both these candidates come from sort of -- almost independent of the party.","translation":"我的意思是，这两位候选人都来自某种——几乎独立于党派。"},{"paragraph":"STEPMAN: Because they -- they really focus on the issues related to Maine.","translation":"斯特普曼：因为他们——他们真的专注于与缅因州相关的问题。"},{"paragraph":"CORNISH: We should say, Platner is recruiting from outside the party. Yes.","translation":"科尼什：我们应该说，普拉特纳是从党外招募的。是的。"},{"paragraph":"STEPMAN: Exactly. So, they're both sort of weirdly outsiders, even though Collins has been Republican part of the party for a long time, she's always struck an independent game this entire time.","translation":"斯特普曼：正是。所以，他们俩都有点奇怪地是局外人，尽管柯林斯长期以来一直是共和党的一部分，但她一直保持着独立的姿态。"},{"paragraph":"So, I think that's going to continue during this race. That is her path. Because if she does get too close to Trump, that's going to be the argument saying, whoa, she's too MAGA. She's not -- too much for me, which is more or less a blue state.","translation":"所以，我认为这将在这次竞选中继续。那是她的道路。因为如果她确实与特朗普走得太近，那就会成为争论点，说，哇，她太MAGA了。她不适合我——这或多或少是一个蓝州。"},{"paragraph":"CORNISH: So, you're saying there's nothing to be gained there of him coming.","translation":"科尼什：所以，你是说他来那里没有什么好处。"},{"paragraph":"CORNISH: OK, you guys stay with me, because we're going to talk about a couple other states this hour, as well.","translation":"科尼什：好的，你们继续听我说，因为这一小时我们还要讨论其他几个州。"},{"paragraph":"We're also still waiting for news about some sort of proposed deal with Iran. But in the meantime, the U.S. has launched new strikes against Iran overnight.","translation":"我们仍在等待关于某种与伊朗拟议协议的消息。但与此同时，美国在夜间对伊朗发动了新的打击。"},{"paragraph":"Plus, Epstein's former assistant testifies before Congress. What she says she did not see.","translation":"另外，爱泼斯坦的前助理在国会作证。她说她没有看到什么。"},{"paragraph":"And a Texas teenager convicted of killing a rival track star. Why the jury rejected his claim of self-defense.","translation":"还有一名德克萨斯州青少年因杀害一名对手田径明星而被定罪。为什么陪审团驳回了他的自卫主张。"},{"paragraph":"UNIDENTIFIED MALE: It's just sad that it had to come to this. It was just a bad, bad decision he made.","translation":"身份不明的男性：事情发展到这一步真是可悲。他只是做了一个非常糟糕的决定。"},{"paragraph":"CORNISH: Right now, we are following the latest round of escalation between the U.S. and Iran. U.S. CENTRAL COMMAND saying they are now finished hitting targets in Iran in response to an Army helicopter getting shot down over the Strait of Hormuz.","translation":"科尼什：现在，我们正在关注美国和伊朗之间最新一轮的升级。美国中央司令部表示，他们现在已经完成了对伊朗目标的打击，以回应一架陆军直升机在霍尔木兹海峡被击落。"},{"paragraph":"Iran's state media, however, released new video overnight, saying they retaliated to the U.S. by attack -- by launching missiles against targets in Bahrain and Kuwait and an air base in Jordan.","translation":"然而，伊朗国家媒体在夜间发布了新视频，称他们通过攻击——向巴林和科威特的目标以及约旦的一个空军基地发射导弹——来报复美国。"},{"paragraph":"Joining me now with the latest, CNN international correspondent Paula Hancocks in Abu Dhabi.","translation":"现在连线CNN国际记者保拉·汉考克斯，她在阿布扎比带来最新消息。"},{"paragraph":"Paula, can you talk about this? We know Iran, throughout the last couple of weeks, has -- they've tried to spread the war throughout the region. What have you heard from officials in Kuwait or Bahrain about confirmed damage?","translation":"保拉，你能谈谈这个吗？我们知道伊朗在过去几周里——他们试图将战争蔓延到整个地区。你从科威特或巴林官员那里听到了关于确认损失的消息吗？"},{"paragraph":"PAULA HANCOCKS, CNN INTERNATIONAL CORRESPONDENT: The next few hours are going to be crucial as to whether or not this is an isolated escalation between the U.S. and Iran, or whether it is a step on the escalatory ladder.","translation":"保拉·汉考克斯，CNN国际记者：接下来的几个小时将至关重要，以确定这是美国和伊朗之间的孤立升级，还是升级阶梯上的一步。"},{"paragraph":"Now, at this point, we have not heard any damage assessment or casualty figures from those countries which were targeted by Iran. That is, Jordan, Kuwait, and Bahrain.","translation":"目前，我们还没有听到来自伊朗目标国家的任何损失评估或伤亡数字。即约旦、科威特和巴林。"},{"paragraph":"Iran said that it had targeted the fifth fleet headquarters in Bahrain. They also say that they targeted a military base in Jordan, Kuwait, as well, saying that it was intercepting incoming aerial missiles and drones.","translation":"伊朗表示，它瞄准了巴林的第五舰队总部。他们还表示，他们也瞄准了约旦、科威特的一个军事基地，称其正在拦截来袭的空中导弹和无人机。"},{"paragraph":"So, what we've heard from Iran's side is that they have said that there will -- no attack will go unanswered from the United States. What we had seen from U.S. CENTRAL COMMAND is they said they had carried out what they called a, quote, \"proportional response\" to the shooting down of that Apache helicopter, saying that there were three locations along the Strait of Hormuz that were targeted.","translation":"所以，我们从伊朗方面听到的是，他们表示——美国的任何攻击都不会没有回应。我们从美国中央司令部看到的是，他们表示已经对那架阿帕奇直升机被击落进行了他们所谓的“相称回应”，称霍尔木兹海峡沿岸的三个地点被瞄准。"},{"paragraph":"They say that they hit air defense, ground control stations, radar sites, as well.","translation":"他们说他们击中了防空系统、地面控制站、雷达站点等。"},{"paragraph":"Now, one U.S. official telling CNN that this was really intended to be a warning to Iran, and they do hope that they will still be able to keep the talks on track, that it won't hinder those talks, although we've heard from Iran's foreign ministry spokesperson that Iran is reviewing negotiations at this point, accusing the U.S. of negotiating in bad faith, Audie.","translation":"现在，一位美国官员告诉CNN，这实际上是为了向伊朗发出警告，他们确实希望仍然能够保持谈判的轨道，不会阻碍这些谈判，尽管我们从伊朗外交部发言人那里听到，伊朗目前正在审查谈判，指责美国谈判不诚信，奥迪。"},{"paragraph":"CORNISH: OK. That's Paula Hancocks with that update. Thank you so much.","translation":"科尼什：好的。这是保拉·汉考克斯带来的最新消息。非常感谢。"},{"paragraph":"It is now 17 minutes past the hour. I want to give you your morning roundup.","translation":"现在是整点过后17分钟。我想给你带来早间摘要。"},{"paragraph":"Happening today, the House Oversight Committee will hear from Microsoft billionaire Bill Gates behind closed doors. He's scheduled to testify about his professional relationship with Jeffrey Epstein.","translation":"今天，众议院监督委员会将闭门听取微软亿万富翁比尔·盖茨的证词。他计划就他与杰弗里·爱泼斯坦的职业关系作证。"},{"paragraph":"Gates has not been accused of wrongdoing.","translation":"盖茨没有被指控有不当行为。"},{"paragraph":"Meanwhile, Epstein's former assistant, Lesley Groff, testified on Tuesday, saying that she, quote, \"never witnessed anything improper or illegal.\"","translation":"与此同时，爱泼斯坦的前助理莱斯利·格罗夫周二作证说，她“从未目睹任何不当或非法行为”。"},{"paragraph":"She also told lawmakers she arranged multiple calls between Epstein and Donald Trump before he was president. President Trump is not accused of any wrongdoing in connection to Epstein.","translation":"她还告诉立法者，她在爱泼斯坦和唐纳德·特朗普成为总统之前安排了多次通话。特朗普总统没有被指控与爱泼斯坦有任何不当行为。"},{"paragraph":"And in Texas, a teen who fatally stabbed a 17-year-old track athlete from a rival team has been convicted of murder and sentenced to 35 years in prison.","translation":"在德克萨斯州，一名刺死对手队17岁田径运动员的青少年被判谋杀罪，判处35年监禁。"},{"paragraph":"A jury rejected Karmelo Anthony's claims of self-defense during a confrontation with Austin Metcalf in the stadium bleachers last year.","translation":"陪审团驳回了卡梅洛·安东尼去年在体育场看台上与奥斯汀·梅特卡夫对峙时的自卫主张。"},{"paragraph":"UNIDENTIFIED MALE: It's just sad that it had to come to this. It was just a bad, bad decision he made. But he took a life. And it's unfortunate that two young lives are affected so negatively about this.","translation":"身份不明的男性：事情发展到这一步真是可悲。他只是做了一个非常糟糕的决定。但他夺走了一条生命。不幸的是，两个年轻的生命因此受到如此负面的影响。"},{"paragraph":"CORNISH: Anthony did not testify. His mother took the stand during the sentencing phase, telling jurors her son was sorry.","translation":"科尼什：安东尼没有作证。他的母亲在量刑阶段出庭，告诉陪审员她的儿子很抱歉。"},{"paragraph":"And CNN now projecting Republican Steve Hilton will advance to the November election in the California governor's race against Democrat Xavier Becerra.","translation":"CNN现在预测共和党人史蒂夫·希尔顿将进入11月的加州州长选举，对阵民主党人泽维尔·贝塞拉。"},{"paragraph":"Becerra, the former health secretary, finished on top with nearly 28 percent of the vote, three points ahead of Hilton, a former FOX News host who has President Trump's endorsement.","translation":"前卫生部长贝塞拉以近28%的得票率位居榜首，领先于前福克斯新闻主持人、获得特朗普总统支持的希尔顿三个百分点。"},{"paragraph":"STEVE HILTON (R), CALIFORNIA GUBERNATORIAL CANDIDATE; Californians will have a real choice for change in November. Whether they want to keep going with the policies that have brought us to the highest poverty rate, the highest unemployment rate, the highest cost of living in the country, where they want more of that with Xavier Becerra, or whether they want to go in a new direction.","translation":"史蒂夫·希尔顿（共和党），加州州长候选人：加州人在十一月将有一个真正的变革选择。他们是希望继续推行那些导致我们国家最高贫困率、最高失业率、最高生活成本的政策，与泽维尔·贝塞拉一起想要更多同样的东西，还是希望走向新的方向。"},{"paragraph":"CORNISH: I have to ask quickly: if Hilton does well, is California still going to be the corrupt election state that Republicans are saying it is?","translation":"科尼什：我必须快速问一下：如果希尔顿表现良好，加州还会是共和党人所说的腐败选举州吗？"},{"paragraph":"STEPMAN: Yes. I mean, the question is how well, of course. How much can he actually make some --","translation":"斯特普曼：是的。我的意思是，问题当然是他表现有多好。他实际上能取得多少——"},{"paragraph":"CORNISH: Is there a certain threshold after which --","translation":"科尼什：是否有一个特定的门槛，之后——"},{"paragraph":"CORNISH: -- it's no longer considered corrupt if a Republican wins?","translation":"科尼什：——如果共和党人获胜，就不再被认为是腐败？"},{"paragraph":"STEPMAN: Well, you know, you know what? Especially given the state, it'll depend on how the votes are counted. I feel that especially after the next --","translation":"斯特普曼：嗯，你知道，你知道吗？特别是考虑到这个州，这将取决于选票如何计算。我觉得尤其是在下一次——"},{"paragraph":"LEON: I knew that answer.","translation":"莱昂：我就知道那个答案。"},{"paragraph":"CORNISH: Yes. But you can see why I'm asking, right? Like, if he wins, it's fine. But if he doesn't win, it's corrupt.","translation":"科尼什：是的。但你能明白我为什么问，对吧？比如，如果他赢了，那就没问题。但如果他没赢，那就是腐败。"},{"paragraph":"CORNISH: But if he wins, it's still corrupt, but somehow --","translation":"科尼什：但如果他赢了，它仍然是腐败的，但不知何故——"},{"paragraph":"ROSE: Maybe, maybe. I think it's still fairly unlikely that he's going to win this race. I will also say that it's been the process in California taking so long to discover who --","translation":"罗斯：也许，也许。我认为他赢得这场竞选的可能性仍然相当小。我还要说，加州的过程花了这么长时间才发现谁——"},{"paragraph":"CORNISH: Yes, everyone's talking about that.","translation":"科尼什：是的，每个人都在谈论那个。"},{"paragraph":"ROSE: -- is going to win it. Everybody's talking about this.","translation":"罗斯：——会赢。每个人都在谈论这个。"},{"paragraph":"CORNISH: But everyone's disagreeing on what that means.","translation":"科尼什：但每个人都在那意味着什么上意见不一。"},{"paragraph":"CORNISH: That's by definition nefarious.","translation":"科尼什：那从定义上就是邪恶的。"},{"paragraph":"ROSE: But it makes people uncomfortable with the results.","translation":"罗斯：但这让人们结果感到不安。"},{"paragraph":"CORNISH: I have to mention one other thing, just because the number's astounding. Tom Steyer's spending: 215 million.","translation":"科尼什：我必须提另一件事，只是因为数字惊人。汤姆·斯泰尔的支出：2.15亿美元。"},{"paragraph":"I'm not good at long division, so I didn't want to know how much per voter that spend was, and I can't do it. I can't do it. And someone on -- online was saying, oh, have you ever heard of effective altruism, and that this was ineffective altruism, basically.","translation":"我不擅长长除法，所以我不想知道每个选民花了多少钱，我也算不出来。我算不出来。网上有人说，哦，你听说过有效利他主义吗，这基本上就是无效利他主义。"},{"paragraph":"LEON: Basically, an ROI in the business term, right? You need a return on that investment.","translation":"莱昂：基本上，用商业术语来说就是投资回报率，对吧？你需要那笔投资有回报。"},{"paragraph":"This is twice for Steyer now. He has not gotten that ROI. When is enough, enough?","translation":"这已经是斯泰尔第二次了。他没有得到那个投资回报率。什么时候才够？"},{"paragraph":"If I had that kind of money, I would invest it in something else. He has tried this political acumen.","translation":"如果我有那么多钱，我会投资别的东西。他已经尝试过这种政治敏锐度。"},{"paragraph":"LEON: It has not worked out.","translation":"莱昂：它没有成功。"},{"paragraph":"CORNISH: Yes. I was about to say --","translation":"科尼什：是的。我正要說——"},{"paragraph":"LEON: Voters have said that.","translation":"莱昂：选民们已经说过了。"},{"paragraph":"CORNISH: The voters have rejected it.","translation":"科尼什：选民们已经拒绝了它。"},{"paragraph":"LEON: Especially with the billionaire. When the billionaire class. We've got AOC and others that have talked about the billionaire class, and we have somebody here spending his own money like this, it seems like a waste where it could be invested in other.","translation":"莱昂：尤其是亿万富翁。当亿万富翁阶层。我们有AOC和其他人谈论过亿万富翁阶层，而我们这里有人这样花自己的钱，这似乎是一种浪费，本可以投资到其他地方。"},{"paragraph":"CORNISH: Well, it's been a wild race coming from last year to all of a sudden have Becerra at the front.","translation":"科尼什：嗯，从去年开始，这场竞选一直很疯狂，突然之间贝塞拉领先了。"},{"paragraph":"CORNISH: We couldn't have seen that then.","translation":"科尼什：我们当时不可能预见到。"},{"paragraph":"CORNISH: Now, after the break on CNN THIS MORNING, two controversial to win? So, the Colorado frontrunner for governor claims he killed a man when he was 7 years old. I have more stories like that from him.","translation":"科尼什：现在，在CNN THIS MORNING的休息之后，两个有争议的获胜？科罗拉多州州长竞选的领跑者声称他7岁时杀了一个人。我还有很多他那样的故事。"},{"paragraph":"Plus, A.I. companies are rushing to the stock market. Is it the next tech boom or is the A.I. bubble about to burst?","translation":"另外，人工智能公司正争相上市。这是下一个科技繁荣，还是人工智能泡沫即将破裂？"},{"paragraph":"And for viewers watching us from right here in New York City, Knicks versus Spurs again tonight at the Garden. Good morning.","translation":"对于在纽约市观看我们节目的观众，今晚尼克斯队将在花园球场再次对阵马刺队。早上好。"},{"paragraph":"CORNISH: So, a bunch of IPOs in the A.I. sector are about to hit Wall Street after OpenAI announced on Monday it filed for an initial public offering, an IPO.","translation":"科尼什：所以，在OpenAI周一宣布提交首次公开募股（IPO）申请后，人工智能领域的一批IPO即将登陆华尔街。"},{"paragraph":"The three biggest A.I. companies are now in line to go public, as well. That includes Anthropic and SpaceX. A fourth, Perplexity, is expected to file in 2028.","translation":"三家最大的人工智能公司现在也排队上市。其中包括Anthropic和SpaceX。第四家Perplexity预计将在2028年提交申请。"},{"paragraph":"DONALD TRUMP, U.S. PRESIDENT: We're talking about it. Where the American people can benefit from the success of A.I. And by doing that, they're going to like it better. Because we're leading China. We're leading everybody in the world with A.I., and we want to keep it that way. It's like you make them a partnership in this revolution. It would be a beautiful thing.","translation":"唐纳德·特朗普，美国总统：我们正在讨论它。美国人民可以从人工智能的成功中受益。通过这样做，他们会更喜欢它。因为我们领先中国。我们在人工智能方面领先全世界，我们想保持这种状态。这就像你让他们成为这场革命的合作伙伴。这将是一件美好的事情。"},{"paragraph":"CORNISH: Now, investors who get in early could make a fortune. But has the A.I. boom gotten ahead of itself?","translation":"科尼什：现在，早期进入的投资者可以赚大钱。但人工智能热潮是否已经超前？"},{"paragraph":"Madison Mills joins the group chat. She's the senior A.I. reporter at Axios. You guys have done some fantastic reporting on this industry.","translation":"麦迪逊·米尔斯加入群聊。她是Axios的高级人工智能记者。你们对这个行业做了一些精彩的报道。"},{"paragraph":"Just to show people the amount of money at stake. When you look at OpenAI and SpaceX and Anthropic, there were 3.5 trillion. We dug around, and we found out that's, like, as much money as, you know, France. Like, OK? So, we're dealing with a lot of money.","translation":"只是为了向人们展示涉及的资金规模。当你看到OpenAI、SpaceX和Anthropic时，有3.5万亿美元。我们四处挖掘，发现这相当于，你知道，法国的GDP。对吧？所以，我们面对的是巨额资金。"},{"paragraph":"But is it a bubble? I ask because we've got some people on TikTok who think that it is. I'm going to play for you, the finance experts online.","translation":"但这是泡沫吗？我问是因为TikTok上有些人认为它是。我将为你播放网上的金融专家。"},{"paragraph":"UNIDENTIFIED MALE: A.I. companies are now trying to save themselves by applying for IPOs.","translation":"身份不明的男性：人工智能公司现在正试图通过申请IPO来拯救自己。"},{"paragraph":"UNIDENTIFIED MALE: OpenAI and Anthropic plan to have IPOs at release before the end of this year, signaling to me that the A.I. bubble is about to pop and that these insiders and institutional investors know that they better cash out now, or they may not ever get the chance.","translation":"身份不明的男性：OpenAI和Anthropic计划在今年年底前进行IPO，这向我表明人工智能泡沫即将破裂，这些内部人士和机构投资者知道他们最好现在套现，否则可能再也没有机会了。"},{"paragraph":"CORNISH: Why is this the word on the street?","translation":"科尼什：为什么这是街上的说法？"},{"paragraph":"MADISON MILLS, SENIOR A.I. REPORTER, AXIOS: Yes, I would push back on a lot of the financial finfluencing that we hear about on finance.","translation":"麦迪逊·米尔斯，Axios高级人工智能记者：是的，我会反驳我们在金融领域听到的很多金融影响。"},{"paragraph":"CORNISH: Finfluencing. You said it. Go on.","translation":"科尼什：金融影响。你说出来了。继续。"},{"paragraph":"MILLS: Yes. But -- but just because companies are IPOing doesn't necessarily mean that the bubble is going to happen this Friday when SpaceX lists on the NASDAQ.","translation":"米尔斯：是的。但是——但仅仅因为公司进行IPO并不一定意味着泡沫会在本周五SpaceX在纳斯达克上市时发生。"},{"paragraph":"MILLS: Right? But the concept of the bubble is this idea that valuations are completely divorced from reality: the underlying business fundamentals, the things that we would learn about in journalism and business school --","translation":"米尔斯：对吧？但泡沫的概念是估值完全脱离现实：潜在的业务基本面，我们在新闻和商学院学到的东西——"},{"paragraph":"MILLS: -- that make a company profitable, right?","translation":"米尔斯：——使公司盈利的东西，对吧？"},{"paragraph":"CORNISH: So, the street phrase would be they're high on their own supply?","translation":"科尼什：那么，街上的说法是它们自产自销？"},{"paragraph":"MILLS: Absolutely. And that's very clear with a company like SpaceX. Their expected valuation is $1.8 trillion. They're trading at about 90 times their sales -- not their profits, just their sales -- as of this Friday, when they're expected to list.","translation":"米尔斯：绝对。这在像SpaceX这样的公司非常明显。他们的预期估值为1.8万亿美元。截至本周五他们预计上市时，他们的交易价格约为销售额的90倍——不是利润，只是销售额。"},{"paragraph":"So, that is an example of a company you might look at and say, not sure if the valuation is high.","translation":"所以，这是一个例子，你可能会看着一家公司说，不确定估值是否高。"},{"paragraph":"CORNISH: I know. There's also this thing I've been learning about circular financing.","translation":"科尼什：我知道。还有我一直在学习的循环融资。"},{"paragraph":"CORNISH: So, I'm understanding this as, you use money from one A.I. company to do work in your A.I. company. and then another A.I. company gets work from you. It's like the same money going around and around. Do I have that right?","translation":"科尼什：所以，我的理解是，你用一家人工智能公司的钱在你的公司里做工作。然后另一家人工智能公司从你那里得到工作。就像同一笔钱在转来转去。我理解得对吗？"},{"paragraph":"MILLS: Absolutely. That's perfect. And part of --","translation":"米尔斯：绝对。完全正确。而且部分——"},{"paragraph":"CORNISH: I'm ready to finfluence.","translation":"科尼什：我准备好做金融影响了。"},{"paragraph":"MILLS: You're ready to finfluence. And more than that, you can be the CFO of an A.I. company. You know?","translation":"米尔斯：你准备好做金融影响了。不仅如此，你可以成为一家人工智能公司的首席财务官。你知道吗？"},{"paragraph":"But part of the problem with that is that Anthropic can -- or OpenAI, any of the A.I. labs, can book that as revenue. And that feeds into that valuation number that we're getting.","translation":"但部分问题在于，Anthropic或OpenAI，任何人工智能实验室，都可以将其记为收入。而这又助长了我们得到的估值数字。"},{"paragraph":"But that revenue could also just be money that they are getting from Google, that then they're giving back to Google in the form of compute capacity. And then Google has that compute capacity and is giving it over to another A.I. lab. And so, it's all very circular right now. And that's the concern.","translation":"但那些收入也可能只是他们从谷歌获得的钱，然后他们以计算能力的形式返还给谷歌。然后谷歌拥有那计算能力，并将其交给另一个人工智能实验室。所以，现在这一切都非常循环。这就是担忧所在。"},{"paragraph":"CORNISH: And it's giving shell game. I'm going to listen to you, because I believe that this market is the future. I understand that, but I think people rightly have questions. [06:30:00]","translation":"科尼什：而且它给人一种把戏的感觉。我会听你的，因为我相信这个市场是未来。我理解这一点，但我认为人们有疑问是合理的。[06:30:00]"}],"vocabulary":[{"word":"primary","part_of_speech":"n.","definition":"初选","example":"Platner easily won the Democratic Senate primary in Maine."},{"word":"flip","part_of_speech":"v.","definition":"翻转，改变","example":"Could that cost the party a shot at flipping the Senate this fall?"},{"word":"ceasefire","part_of_speech":"n.","definition":"停火","example":"Will the strained ceasefire last long enough?"},{"word":"retaliate","part_of_speech":"v.","definition":"报复","example":"Iran retaliated by launching missiles against targets in Bahrain."},{"word":"escalation","part_of_speech":"n.","definition":"升级","example":"We are following the latest round of escalation between the U.S. and Iran."},{"word":"proportional","part_of_speech":"adj.","definition":"相称的，成比例的","example":"The U.S. carried out a 'proportional response'."},{"word":"testify","part_of_speech":"v.","definition":"作证","example":"Epstein's former assistant testified before Congress."},{"word":"convict","part_of_speech":"v.","definition":"定罪","example":"A Texas teenager was convicted of killing a rival track star."},{"word":"self-defense","part_of_speech":"n.","definition":"自卫","example":"The jury rejected his claim of self-defense."},{"word":"IPO","part_of_speech":"n.","definition":"首次公开募股","example":"OpenAI filed for an initial public offering."},{"word":"valuation","part_of_speech":"n.","definition":"估值","example":"Their expected valuation is $1.8 trillion."},{"word":"bubble","part_of_speech":"n.","definition":"泡沫","example":"The A.I. bubble is about to pop."},{"word":"circular financing","part_of_speech":"n.","definition":"循环融资","example":"There's also this thing I've been learning about circular financing."},{"word":"referendum","part_of_speech":"n.","definition":"公投","example":"This election has got to be a referendum on Susan Collins."},{"word":"spineless","part_of_speech":"adj.","definition":"软弱的，无骨气的","example":"She has become just as spineless and corrupt as the establishment."}],"sentences":[{"sentence":"If the choice on the ballot is between that and a senator who's voted to take health care away from millions of Americans, that's the situation that we have to weigh.","translation":"如果选票上的选择是在那和一位投票剥夺数百万美国人医保的参议员之间，那就是我们必须权衡的情况。","analysis":"条件状语从句嵌套定语从句，主句为that's the situation，定语从句修饰situation。"},{"sentence":"What I would say about the Susan Collins race is that we've seen in the past, is you're not going to win this seat by electing a Susan Collins light or putting forward a Susan Collins light in a race.","translation":"关于苏珊·柯林斯的竞选，我想说的是，我们过去看到的是，你不会通过选出一个“轻量版苏珊·柯林斯”或在竞选中推出一个“轻量版苏珊·柯林斯”来赢得这个席位。","analysis":"主语从句What I would say...，表语从句that we've seen...，主句is you're not going to win...，包含并列动名词短语。"},{"sentence":"There is no doubt, though, that this election has got to be a referendum on Susan Collins: on the ways in which she has voted to empower Donald Trump; on her refusal to hold Donald Trump accountable; on the ways in which she has said, I might be fair, but I want to take healthcare away from millions of people.","translation":"不过，毫无疑问，这次选举必须是对苏珊·柯林斯的公投：关于她投票赋予唐纳德·特朗普权力的方式；关于她拒绝追究唐纳德·特朗普责任的方式；关于她所说的，我可能公平，但我想剥夺数百万人的医保。","analysis":"同位语从句that this election...，冒号后三个并列介词短语，每个包含定语从句。"},{"sentence":"The next few hours are going to be crucial as to whether or not this is an isolated escalation between the U.S. and Iran, or whether it is a step on the escalatory ladder.","translation":"接下来的几个小时将至关重要，以确定这是美国和伊朗之间的孤立升级，还是升级阶梯上的一步。","analysis":"as to引导宾语从句，包含whether...or...并列结构。"},{"sentence":"But that revenue could also just be money that they are getting from Google, that then they're giving back to Google in the form of compute capacity.","translation":"但那些收入也可能只是他们从谷歌获得的钱，然后他们以计算能力的形式返还给谷歌。","analysis":"主句为that revenue could be money，后接两个定语从句，第一个修饰money，第二个修饰money并包含状语in the form of。"}],"topics":[{"topic":"美国中期选举与参议院控制权","description":"缅因州民主党初选结果对参议院控制权的影响，以及候选人普拉特纳的丑闻如何影响选举前景。"},{"topic":"美伊冲突与中东局势","description":"美国对伊朗的打击、伊朗的报复行动，以及停火协议和谈判前景。"},{"topic":"杰弗里·爱泼斯坦案件后续","description":"比尔·盖茨就与爱泼斯坦的关系作证，以及前助理的证词。"},{"topic":"人工智能公司IPO与市场泡沫","description":"OpenAI、Anthropic、SpaceX等AI公司上市，估值过高和循环融资引发的泡沫担忧。"},{"topic":"加州州长选举与选举公正性","description":"共和党候选人希尔顿与民主党候选人贝塞拉的竞争，以及关于选举腐败的争议。"}],"raw_transcript":"Return to Transcripts main page\n\nPlatner Easily Wins Democratic Senate Primary in Maine; U.S. Hits Iran after Helicopter Downed; OpenAI Files for IPO, Joins Anthropic and SpaceX. Aired 6-6:30a ET\n\nAired June 10, 2026 - 06:00   ET\n\nTHIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED.\n\nAUDIE CORNISH, CNN ANCHOR: Today in the group chat, Democrats in Maine vote to stick with Graham Platner. Could that cost the party a shot at flipping the Senate this fall?\n\nREP. ALEXANDRIA OCASIO-CORTEZ (D-NY): If the choice on the ballot is between that and a senator who's voted to take health care away from millions of Americans, that's the situation that we have to weigh.\n\nCORNISH: Missiles light up the sky in the Middle East again. Will the strained ceasefire last long enough for the U.S. to deliver that long- promised deal with Iran?\n\nAnd a big day for the Epstein files. What will Bill Gates tell lawmakers about his links to the late convicted sex offender.\n\nUNIDENTIFIED MALE: Do you think that you've killed people as an adult?\n\nVICTOR MARX (R), COLORADO GUBERNATORIAL CANDIDATE: Does it matter?\n\nCORNISH: This is a candidate who also claims he killed someone as a child. Meet the frontrunner in the Republican race for governor of Colorado.\n\nAnd it's the $3.5 trillion question on Wall Street. Has the A.I. boom gotten ahead of itself?\n\nUNIDENTIFIED MALE: OpenAI and Anthropic plan to have IPOs at release before the end of this year, signaling to me that the A.I. bubble is about to pop.\n\n(END VIDEO CLIP) (BEGIN VIDEO CLIP)\n\nGRAHAM PLATNER (D), MAINE SENATE CANDIDATE: To any of those who feel let down or disappointed or disillusioned, it is my job to earn your trust, faith, and support. And I will spend every day of this campaign. And if I have the privilege every day in the United States Senate doing exactly that.\n\nCORNISH: Graham Platner punches his ticket. But now he's got to convince voters to choose him over a five-term senator.\n\nGood morning everybody. I'm Audie Cornish. Here is where we begin. That big statement out of Maine.\n\nDemocrat Graham Platner, despite all the scandals, earned about three- fourths of primary voters' support over Governor Janet Mills.\n\nMoments after clinching the nomination, he turned his attention to his new opponent, Republican Senator Susan Collins.\n\nPLATNER: Susan Collins may have started -- may have started her career decades ago in Washington with good intentions, but she has become just as spineless and corrupt as the establishment she now serves. If you are an independent voice, why do you vote with Donald Trump 95 percent of the time?\n\nCORNISH: Platner has a lot of work to do to get Mills voters on his side.\n\nUNIDENTIFIED FEMALE: I couldn't honestly support Platner, even though some of the things that he says are really good.\n\nUNIDENTIFIED MALE: I don't think he's ready to be a senator. I'm leaning towards Collins unless the guy shows something else, but I just -- he's not there yet. And --\n\nUNIDENTIFIED FEMALE: And so, what will you do in November if its Platner versus Collins?\n\nUNIDENTIFIED FEMALE: That's a really good question. I'm a Democrat, but I voted for Susan Collins several times, because I think that she does care about the state of Maine. But it's going to be a real problem for me in November.\n\nCORNISH: So, today in the group chat, Mike Leon, host of the \"Can We Please Talk\" podcast; Jared Stepman, columnist with \"The Daily Signal\"; and Max Rose, former Democratic congressman from New York.\n\nAnd Max, I'm actually going to start with you, because you're with VoteVets, which means you guys had a dog in the fight in this race. You guys have been giving a lot of money across the country.\n\nAnd what is it? Let me just show what -- what's at stake here.\n\nDemocrats' chances of flipping the Maine Senate seat. It was pretty good. Maybe this has jeopardized it. We're going to show people a chart while you're talking so you can see what's at stake.\n\nIs this race as close as you all hoped it would be, now that Graham has struggled with these scandals?\n\nMAX ROSE (D), FORMER NEW YORK CONGRESSMAN: The race is always going to be close. Because --\n\nCORNISH: Not with a five-term senator, it's not. A lot of times it can be a blowout, right? Like what -- how do you look at what he needs to accomplish?\n\nROSE: Well, I think that we're saying the same thing --\n\nROSE: -- in essence, right? Susan Collins is tough to beat.\n\nWhat I would say about the Susan Collins race is that we've seen in the past, is you're not going to win this seat by electing a Susan Collins light or putting forward a Susan Collins light in a race.\n\nYou are going to beat her by energizing your base, particularly in a midterm election.\n\nThere is no doubt, though, that this election has got to be a referendum on Susan Collins: on the ways in which she has voted to empower Donald Trump; on her refusal to hold Donald Trump accountable; on the ways in which she has said, I might be fair, but I want to take healthcare away from millions of people. Says the right thing often; does the wrong thing very frequently.\n\nCORNISH: Yes. So, this is very much the message we hear over and over again. And I love that Platner in front of him, it said, \"They don't know Maine.\" You know what I mean? Usually not his own name, not a bunch of other things. It was like, hello, media, this one is for you.\n\nI want to play two clips back-to-back, because it sort of, I think, represents something of this race.\n\nFirst, I'm going to play for you J.D. Vance and how he talks about Susan Collins. And then I'm going to play AOC and how she's talking about Platner. You tell me how you hear the tone of these.\n\nJ.D. VANCE (R), U.S. VICE PRESIDENT: Here's the thing I'll say about Susan Collins, is sometimes I get frustrated with Susan Collins. I almost wish that she was more partisan.\n\nBut the thing I love about Susan is she is independent, because Maine is an independent state. And frankly, if she was as partisan as I sometimes wish that she was, she would not be a good fit for the people of Maine.\n\nSo, let's give a shout-out to Susan Collins, who's doing a great job.\n\nOCASIO-CORTEZ: When it comes to the substance of this reporting, obviously, there's a lot in that behavior that's really challenging. It's hard to stomach, you know, in some of it.\n\nBut -- but at the end of the day, I think that this is a choice. If that choice on the ballot is between that and a senator who's voted to take healthcare away from millions of Americans, that's the situation that we have to weigh.\n\nCORNISH: I played these, because one is like, it's hard to stomach. And the other is like, I get frustrated. Shout-out though, anyway, because I guess Maine. And I was, like, these are not ringing endorsements.\n\nMIKE LEON, HOST, \"CAN WE PLEASE TALK?\" PODCAST: But Audie, not only are they not ringing endorsements, the voter that we played in the package before listen to her tone. Maine independents are the second largest party in Maine.\n\nCORNISH: Yes. And a woman, in particular.\n\nLEON: And a woman and a Democrat who said she voted for Susan Collins, against her will, it sounded like, from that thing.\n\nSo -- but those are -- those are some of the things that we're going to have to consider now. It's really about the character quality is what something that Graham Platner has been trying to say: Forget about that. I'm from here. It's how she's voted, to Max's point.\n\nLEON: But then also you hear the voters, and they're, like, a little, still unsure because of those character issues with Platner. So, it's going to be really interesting.\n\nCORNISH: And he's been telling a story for a while of, like, you know, I was -- went through difficult times. Now I'm a person who has changed.\n\nI want to ask one more thing. Collins and Trump, that's not a tight bond. OK? Can I just put it that way? Here's a list I'm going to play for you. Just some moments over the past couple of months where you hear her talking around Trump policies and where she stands on them.\n\n(BEGIN VIDEO CLIP) SEN. SUSAN COLLINS (R-ME): The 60 days is a trigger. After 60 days, in\n\nmy view, the president has to obtain congressional approval or Congress can block it.\n\nI do not believe that individuals who were convicted of violence against police officers on January 6th should be entitled to reimbursement for their legal fees.\n\nConcerned about the cuts in Medicaid and the impact on my state, but other states, as well.\n\nI've talked with the secretary of homeland security. I have strongly recommended to her that there be a pause on the enforcement surge in both Maine and in Minnesota.\n\nCORNISH: Now, I've chased her in the hallways before, too. She often ends up voting with Republicans, whatever that party line is.\n\nBut is Trump going to get involved in this simply because of what's at stake with the Senate? Or is he going to send surrogates? He'll be like, OK, J.D., you go there? Like, can she expect any support there?\n\nJARRETT STEPMAN, COLUMNIST, \"THE DAILY SIGNAL\": Yes, I feel that's why he sent J.D. and I feel he will, if he's smart, actually keep some distance from this. I mean part of the -- the thing at stake here is that they're independent. Maine is a little bit different.\n\nI mean, both these candidates come from sort of -- almost independent of the party.\n\nSTEPMAN: Because they -- they really focus on the issues related to Maine.\n\nCORNISH: We should say, Platner is recruiting from outside the party. Yes.\n\nSTEPMAN: Exactly. So, they're both sort of weirdly outsiders, even though Collins has been Republican part of the party for a long time, she's always struck an independent game this entire time.\n\nSo, I think that's going to continue during this race. That is her path. Because if she does get too close to Trump, that's going to be the argument saying, whoa, she's too MAGA. She's not -- too much for me, which is more or less a blue state.\n\nCORNISH: So, you're saying there's nothing to be gained there of him coming.\n\nCORNISH: OK, you guys stay with me, because we're going to talk about a couple other states this hour, as well.\n\nWe're also still waiting for news about some sort of proposed deal with Iran. But in the meantime, the U.S. has launched new strikes against Iran overnight.\n\nPlus, Epstein's former assistant testifies before Congress. What she says she did not see.\n\nAnd a Texas teenager convicted of killing a rival track star. Why the jury rejected his claim of self-defense.\n\nUNIDENTIFIED MALE: It's just sad that it had to come to this. It was just a bad, bad decision he made.\n\nCORNISH: Right now, we are following the latest round of escalation between the U.S. and Iran. U.S. CENTRAL COMMAND saying they are now finished hitting targets in Iran in response to an Army helicopter getting shot down over the Strait of Hormuz.\n\nIran's state media, however, released new video overnight, saying they retaliated to the U.S. by attack -- by launching missiles against targets in Bahrain and Kuwait and an air base in Jordan.\n\nJoining me now with the latest, CNN international correspondent Paula Hancocks in Abu Dhabi.\n\nPaula, can you talk about this? We know Iran, throughout the last couple of weeks, has -- they've tried to spread the war throughout the region. What have you heard from officials in Kuwait or Bahrain about confirmed damage?\n\nPAULA HANCOCKS, CNN INTERNATIONAL CORRESPONDENT: The next few hours are going to be crucial as to whether or not this is an isolated escalation between the U.S. and Iran, or whether it is a step on the escalatory ladder.\n\nNow, at this point, we have not heard any damage assessment or casualty figures from those countries which were targeted by Iran. That is, Jordan, Kuwait, and Bahrain.\n\nIran said that it had targeted the fifth fleet headquarters in Bahrain. They also say that they targeted a military base in Jordan, Kuwait, as well, saying that it was intercepting incoming aerial missiles and drones.\n\nSo, what we've heard from Iran's side is that they have said that there will -- no attack will go unanswered from the United States. What we had seen from U.S. CENTRAL COMMAND is they said they had\n\ncarried out what they called a, quote, \"proportional response\" to the shooting down of that Apache helicopter, saying that there were three locations along the Strait of Hormuz that were targeted.\n\nThey say that they hit air defense, ground control stations, radar sites, as well.\n\nNow, one U.S. official telling CNN that this was really intended to be a warning to Iran, and they do hope that they will still be able to keep the talks on track, that it won't hinder those talks, although we've heard from Iran's foreign ministry spokesperson that Iran is reviewing negotiations at this point, accusing the U.S. of negotiating in bad faith, Audie.\n\nCORNISH: OK. That's Paula Hancocks with that update. Thank you so much.\n\nIt is now 17 minutes past the hour. I want to give you your morning roundup.\n\nHappening today, the House Oversight Committee will hear from Microsoft billionaire Bill Gates behind closed doors. He's scheduled to testify about his professional relationship with Jeffrey Epstein.\n\nGates has not been accused of wrongdoing.\n\nMeanwhile, Epstein's former assistant, Lesley Groff, testified on Tuesday, saying that she, quote, \"never witnessed anything improper or illegal.\"\n\nShe also told lawmakers she arranged multiple calls between Epstein and Donald Trump before he was president. President Trump is not accused of any wrongdoing in connection to Epstein.\n\nAnd in Texas, a teen who fatally stabbed a 17-year-old track athlete from a rival team has been convicted of murder and sentenced to 35 years in prison.\n\nA jury rejected Karmelo Anthony's claims of self-defense during a confrontation with Austin Metcalf in the stadium bleachers last year.\n\nUNIDENTIFIED MALE: It's just sad that it had to come to this. It was just a bad, bad decision he made. But he took a life. And it's unfortunate that two young lives are affected so negatively about this.\n\nCORNISH: Anthony did not testify. His mother took the stand during the sentencing phase, telling jurors her son was sorry.\n\nAnd CNN now projecting Republican Steve Hilton will advance to the November election in the California governor's race against Democrat Xavier Becerra.\n\nBecerra, the former health secretary, finished on top with nearly 28 percent of the vote, three points ahead of Hilton, a former FOX News host who has President Trump's endorsement.\n\nSTEVE HILTON (R), CALIFORNIA GUBERNATORIAL CANDIDATE; Californians will have a real choice for change in November. Whether they want to keep going with the policies that have brought us to the highest poverty rate, the highest unemployment rate, the highest cost of living in the country, where they want more of that with Xavier Becerra, or whether they want to go in a new direction.\n\nCORNISH: I have to ask quickly: if Hilton does well, is California still going to be the corrupt election state that Republicans are saying it is?\n\nSTEPMAN: Yes. I mean, the question is how well, of course. How much can he actually make some --\n\nCORNISH: Is there a certain threshold after which --\n\nCORNISH: -- it's no longer considered corrupt if a Republican wins?\n\nSTEPMAN: Well, you know, you know what? Especially given the state, it'll depend on how the votes are counted. I feel that especially after the next --\n\nLEON: I knew that answer.\n\nCORNISH: Yes. But you can see why I'm asking, right? Like, if he wins, it's fine. But if he doesn't win, it's corrupt.\n\nCORNISH: But if he wins, it's still corrupt, but somehow --\n\nROSE: Maybe, maybe. I think it's still fairly unlikely that he's going to win this race. I will also say that it's been the process in California taking so long to discover who --\n\nCORNISH: Yes, everyone's talking about that.\n\nROSE: -- is going to win it.  for an initial public offering, an IPO.\n\nThe three biggest A.I. companies are now in line to go public, as well. That includes Anthropic and SpaceX. A fourth, Perplexity, is expected to file in 2028.\n\nDONALD TRUMP, U.S. PRESIDENT: We're talking about it. Where the American people can benefit from the success of A.I. And by doing that, they're going to like it better. Because we're leading China. We're leading everybody in the world with A.I., and we want to keep it that way. It's like you make them a partnership in this revolution. It would be a beautiful thing.\n\nCORNISH: Now, investors who get in early could make a fortune. But has the A.I. boom gotten ahead of itself?\n\nMadison Mills joins the group chat. She's the senior A.I. reporter at Axios. You guys have done some fantastic reporting on this industry.\n\nJust to show people the amount of money at stake. When you look at OpenAI and SpaceX and Anthropic, there were 3.5 trillion. We dug around, and we found out that's, like, as much money as, you know, France. Like, OK? So, we're dealing with a lot of money.\n\nBut is it a bubble? And I ask because we've got some people on TikTok who think that it is. I'm going to play for you, the finance experts online.\n\nUNIDENTIFIED MALE: A.I. companies are now trying to save themselves by applying for IPOs.\n\nUNIDENTIFIED MALE: OpenAI and Anthropic plan to have IPOs at release before the end of this year, signaling to me that the A.I. bubble is about to pop and that these insiders and institutional investors know that they better cash out now, or they may not ever get the chance.\n\nCORNISH: Why is this the word on the street?\n\nMADISON MILLS, SENIOR A.I. REPORTER, AXIOS: Yes, I would push back on a lot of the financial finfluencing that we hear about on finance.\n\nCORNISH: Finfluencing. You said it. Go on. MILLS: Yes. But -- but just because companies are IPOing doesn't\n\nnecessarily mean that the bubble is going to happen this Friday when SpaceX lists on the gment/01","title":"CNN.com - Transcripts","text":"Return to Transcripts main page\n\nPlatner Easily Wins Democratic Senate Primary in Maine; U.S. Hits Iran after Helicopter Downed; OpenAI Files for IPO, Joins Anthropic and SpaceX. Aired 6-6:30a ET\n\nAired June 10, 2026 - 06:00   ET\n\nTHIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED.\n\nAUDIE CORNISH, CNN ANCHOR: Today in the group chat, Democrats in Maine vote to stick with Graham Platner. Could that cost the party a shot at flipping the Senate this fall?\n\nREP. ALEXANDRIA OCASIO-CORTEZ (D-NY): If the choice on the ballot is between that and a senator who's voted to take health care away from millions of Americans, that's the situation that we have to weigh.\n\nCORNISH: Missiles light up the sky in the Middle East again. Will the strained ceasefire last long enough for the U.S. to deliver that long- promised deal with Iran?\n\nAnd a big day for the Epstein files. What will Bill Gates tell lawmakers about his links to the late convicted sex offender.\n\nUNIDENTIFIED MALE: Do you think that you've killed people as an adult?\n\nVICTOR MARX (R), COLORADO GUBERNATORIAL CANDIDATE: Does it matter?\n\nCORNISH: This is a candidate who also claims he killed someone as a child. Meet the frontrunner in the Republican race for governor of Colorado.\n\nAnd it's the $3.5 trillion question on Wall Street. Has the A.I. boom gotten ahead of itself?\n\nUNIDENTIFIED MALE: OpenAI and Anthropic plan to have IPOs at release before the end of this year, signaling to me that the A.I. bubble is about to pop.\n\n(END VIDEO CLIP) (BEGIN VIDEO CLIP)\n\nGRAHAM PLATNER (D), MAINE SENATE CANDIDATE: To any of those who feel let down or disappointed or disillusioned, it is my job to earn your trust, faith, and support. And I will spend every day of this campaign. And if I have the privilege every day in the United States Senate doing exactly that.\n\nCORNISH: Graham Platner punches his ticket. But now he's got oing to show people a chart while you're talking so you can see what's at stake.\n\nIs this race as close as you all hoped it would be, now that Graham has struggled with these scandals?\n\nMAX ROSE (D), FORMER NEW YORK CONGRESSMAN: The race is always going to be close. Because --\n\nCORNISH: Not with a five-term senator, it's not. A lot of times it can be a blowout, right? Like what -- how do you look at what he needs to accomplish?\n\nROSE: Well, I think that we're saying the same thing --\n\nROSE: -- in essence, right? Susan Collins is tough to beat.\n\nWhat I would say about the Susan Collins race is that we've seen in the past, is you're not going to win this seat by electing a Susan Collins light or putting forward a Susan Collins light in a race.\n\nYou are going to beat her by energizing your base, particularly in a midterm election.\n\nThere is no doubt, though, that this election has got to be a referendum on Susan Collins: on the ways in which she has voted to empower Donald Trump; on her refusal to hold Donald Trump accountable; on the ways in which she has said, I might be fair, but I want to take healthcare away from millions of people. Says the right thing often; does the wrong thing very frequently.\n\nCORNISH: Yes. So, this is very much the message we hear over and over again. And I love that Platner in front of him, it said, \"They don't know Maine.\" You know what I mean? Usually not his own name, not a bunch of other things. It was like, hello, media, this one is for you.\n\nI want to play two clips back-to-back, because it sort of, I think, represents something of this race.\n\nFirst, I'm going to play for you J.D. Vance and how he talks about Susan Collins. And then I'm going to play AOC and how she's talking about Platner. You tell me how you hear the tone of these.\n\nJ.D. VANCE (R), U.S. VICE PRESIDENT: Here's the thing I'll say about Susan Collins, is sometimes I get frustrated with Susan Collins. I almost wish that she was more partisan.\n
