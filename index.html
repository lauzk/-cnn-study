l of a sudden, you've got some senators\n\nlike Warner who had been working on a bipartisan deal on FISA being like, oh, you want this guy? Well, let's have a conversation about the FISA rules. And can it disrupt other priorities? Is it worth it to get this guy in?\n\nMIKE DUBKE, FORMER TRUMP WHITE HOUSE COMMUNICATIONS DIRECTOR: Well, first of all, Pulte's never going to be the nominee, and I'll just say that. I don't think he --\n\nCORNISH: Oh, really?\n\nDUBKE: I believe that. I think that this is --\n\nMUELLER: That is true. Trump said he was making him acting DNI. I think they knew from the jump that he could never get confirmed by the Senate.\n\nDUBKE: The bigger political question here is why poke the bear of the Senate for any reason on this by putting Pulte in this position? And that, I think, especially when you've got FISA reauthorization, you know, that the deadline for that coming up --\n\nCORNISH: Yeah, it's going to sunset.\n\nDUBKE: It is a -- it is a fight that maybe wasn't worth picking for this guy. But let's be just clear about this. Pulte is a flash in the pan in terms of DNI.\n\nMEGHAN HAYS, FORMER BIDEN WHITE HOUSE DIRECTOR OF MESSAGE PLANNING: Yeah, I just think he can do a lot of harm while he's there, right? We have elections coming up. Their whole thing is to prove that the '20 elections didn't happen.\n\nTulsi Gabbard was in Georgia. Why? Who knows? This guy's already shown that he's going to weaponize more. Now you're going to weaponize 18 intelligence agencies.\n\nI mean, it's just disgusting. I just didn't know -- to his point, I just didn't know that you could have someone less qualified to be in this role. And I think it should scare the American people. And it's clearly making noise in the Senate.\n\nDUBKE: Just because she was a Democrat. I didn't think she was less qualified.\n\nCORNISH: I just want to say that -- I want to end with you, Eleanor, because you talked to like industry people from banking and even they were like, we do ly got in the way of itself, and he's disrupting the renewal of FISA Section 702, because I don't want somebody like Pulte or Kash Patel to have access to that kind of basically warrantless surveillance of us. But that's the kind of stuff he could do and could exploit.\n\nA lot of the authorities of the I.C. have already been abused or misused, you know, not just under Gabbard, but under previous administrations. If this is a guy who could weaponize, you know, housing finance, there is a lot he can do with the intel world.\n\nCORNISH: Okay, Harrison, thank you so much for being here.\n\nComing up on CNN, there's another setback for the president. We mentioned the anti-weaponization fund, all but dead. Are we at this kind of turning point in this presidency?\n\n(BEGIN VIDEO CLIP) REP. THOMAS MASSIE (R-KY): I think it sends a good message from the People's House that people are tired of war.\n\nCORNISH: Which leads us to that rebuke. The House passes a War Powers resolution to limit his authority in Iran. We're going to talk with Congressman Kevin Kiley, the only independent in the House, about it. He's here next.\n\nCORNISH: So what's going on with Republicans and President Trump? Well, before the break, we were talking about this outcry ove\n\n","segments":[{"seg":1,"url":"https://transcripts.cnn.com/show/ctmo/date/2026-06-04/segment/01","title":"CNN.com - Transcripts","text":"Return to Transcripts main page\n\nFour Republicans Vote Yes on Iran War Powers Resolution; Knicks Fans Hopeful After Finals Game 1 Win; Blanche Tells Congress DOJ Fund is Dead, But Is It? Aired 6-6:30a ET\n\nAired June 04, 2026 - 06:00   ET\n\nTHIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED.\n\nAUDIE CORNISH, CNN ANCHOR: Today in the group chat, the Republican rebuke. You've got four people in the president's party who have broken with him on the war with Iran. But will it have any impact?\n\nREP. TOM BARRETT (R-MI): -- do that. I definitely feel what people are experiencing back home. You know, I go back home to my district every single week. You know, I fill up my gas tank, too.\n\nCORNISH: President Trump calls his anti-weaponization fund a, quote, \"beautiful thing.\" Does anyone in Washington believe the plan is really dead?\n\nSCOTT BESSENT, U.S. TREASURY SECRETARY: I actually said it was going to kick his ass.\n\nCORNISH: Fighting words from the treasury secretary. But a real battle looms over Trump's pick to lead the national intelligence community.\n\nJOSH LONGOOD, RESTRAINED UNRULY PASSENGER: You know, that's why I do Jiu Jitsu. That's why I train martial arts, just so I can handle myself in a real-life situation like that.\n\nCORNISH: A do-or-die struggle on a plane. How an MMA fighter saved the day.\n\nAnd then, of course, the New York Knicks look to pull off something we have not seen since Nixon was in office.\n\n(BEGIN VIDEO CLIP) UNIDENTIFIED MALE: Oh, what a sweet move.\n\nUNIDENTIFIED MALE: Jalen Brunson, the No. 1 player in the country. No. 1 player in the NBA. Knicks in four, baby. That's how I feel.\n\nREP. THOMAS MASSIE (R-KY): People are tired of this. They're tired of $5 a gallon gas and $6 a gallon diesel and fertilizer. We can't afford to. I think it sends a good message that the people's House, which represents the people, is tired of this war.\n\nCORNISH: All right. GOP defectors crossing party lines to limit President Trump's war powers. Will anything come of this in the long term?\n\nGood morning, everybody. I'm Audie Cornish. And here's where we start, because this is a rare Republican rebuke on the Hill. You've got four Republicans siding with Democrats on that resolution that directs Trump to remove U.S. armed forces from hostilities with Iran.\n\nBefore the vote, House Speaker Mike Johnson had this warning to members of his party looking to flip.\n\nREP. MIKE JOHNSON (R-KY): I think it is a -- a very dangerous prospect to take away from the administration and the commander in chief right now, the ability to negotiate. That's what this does. It -- it weakens us.\n\nCORNISH: But for the Republicans who ended up voting yes, they say several factors weighed into their decision.\n\nREP. BRIAN FITZPATRICK (R-pa): We have to follow the law. There's a law on the books. The War Powers Act of '73 says 48-hour notification and 60-day concurrence of Congress. We're past the 60 days. So, you have two choices. You either follow the law or you change the law.\n\nBARRETT: People are frustrated, certainly, but that's not the only consideration in this.\n\nI fill up my gas tank, too. I have four kids.\n\nI share the -- the interest in making sure that Iran does not develop a nuclear weapon. But we have to do this in a way that is done through the use of force authorization that Congress has the exclusive authority over. Congress alone declares war.\n\n(END VIDEO CLIP) CORNISH: Joining me now in the group chat, Eleanor Mueller, White House economics reporter from seminar -- from \"Semafor\"; of former Trump White House communications director Mike Dubke; and Meghan Hays, former Biden White House director of message planning.\n\nOK, so when it comes to a story like this, it's not the usual suspects, your Thomas Massie of Kentucky, that we are looking at. It's the other folks. Brian Fitzpatrick, Pennsylvania; Tom Barrett, Michigan; Warren Davidson, Ohio. All pretty important states, in general, in elections.\n\nCan you talk about what's going on, why these particular people might be the ones to make this shift?\n\nELEANOR MUELLER, WHITE HOUSE ECONOMICS REPORTER, \"SEMAFOR\": I think it tells us a lot about how much pressure these Republican congressmen are under to show voters that they're doing something on affordability. You know --\n\nCORNISH: We should be clear, they were just at home.\n\nCORNISH: So, they were just there last week.\n\nMUELLER: They were just hearing from constituents.\n\nFitzpatrick has been someone that leaders have had their eye on for a long time as somebody who might vote against this war. And I would argue that him and Barrett, specifically, right, are under a ton of pressure to, again, show their districts that they are doing something to bring energy costs down.\n\nAnd so, in addition to these concerns over constitutionality that I think Davidson and Massie share, Barrett and Fitzpatrick are really feeling the heat. And this vote was a sign of that.\n\nCORNISH: So, then you've got this \"New York Times\" reporting that even if oil prices peak soon, the global economy is going to slow down. Meaning the damage has been done.\n\nAnd Secretary Bessent was on the Hill yesterday, and he, of course, was asked about the economy for the same reasons that this war vote saw the erosion of some support, because people are worried. And here is what Bessent had to say on the Hill.\n\nSEN. TINA SMITH (D-MN): Could you just explain to me and to farmers in Minnesota how those increased prices, driven by the war and Iran, are worth the pain that they are feeling right now?\n\nBESSENT: Senator, do you believe that Iran can have a nuclear weapon? As a former farmer, I will tell you that -- and maybe you know that 75 percent of the fertilizer had already been purchased this year. There --\n\nSMITH: That is not -- not what my farmers in Minnesota are telling me, sir.\n\nBESSENT: They're -- they're --\n\nSMITH: They are telling me that they cannot afford their fertilizer, and they know the reason why. They know the reason.\n\nBESSENT: There is -- there is no doubt --\n\nBESSENT: -- that -- that farmers have been struggling. But much of that, that there was a record crop last year, Senator. And what do record crops lead to?\n\nSMITH: What my farmers are telling me --\n\nBESSENT: Lower prices.\n\nCORNISH: OK. So, our messaging folks, what do you think of that back and forth, both sides of it, frankly?\n\nMEGHAN HAYS, FORMER BIDEN WHITE HOUSE DIRECTOR OF MESSAGE PLANNING: I mean, I think that there's a complete disconnect from how people are feeling. And I think if you're not going to show empathy from people, that's really what gets you here.\n\nIt's not necessarily the policy. It's when people don't understand -- don't say to you, I understand where you're coming from. We are doing this for this reason.\n\nCORNISH: But his reply was pretty straightforward.\n\nHAYS: But I -- but I just don't think farmers have already bought fertilizer. They have no -- there's no empathy or humanity for people who are actually suffering, who are actually paying the bills.\n\nThese people are multibillionaires. They are taking people for a ride. They are getting money from taxpayers. And that's all the American people see.\n\nWe can't afford our gas. We can't afford electricity. We can't afford groceries. But you're down here building a ballroom and having a UFC fight. That is it.\n\nAnd so, when you sit up there in front of Congress and have no empathy for people, that is what they see. And that's the problem here.\n\nWhen Trump went to this war, he never went to the American people and said, this is why I'm going, and this is what I'm doing. So, this is what we're left with.\n\nCORNISH: Any lessons learned from the Biden era folks about empathy and the economy?\n\nMIKE DUBKE, FORMER TRUMP WHITE HOUSE COMMUNICATIONS DIRECTOR: Really? Yes. Of course. Don't do what Biden did.\n\nDUBKE: And that's exactly where we are.\n\nCORNISH: Oh, no, no. I'm being serious. So, when --\n\nDUBKE: I'm being serious, too.\n\nCORNISH: -- you look at his answer, you see it as in the same way?\n\nDUBKE: I see it in the same way.\n\nLook, when I -- when I do, you know, media training or anything on a professional level in communications, one of the things that you need to talk about, especially with public officials, is to show some empathy. And I totally agree with Meghan on that.\n\nNow, I will take -- I will say that these four defectors, defectors on the House side, you know, there are other reasons that are going into it, I think --\n\nDUBKE: -- besides affordability. And we can get into that if you want to.\n\nBut yes, from -- from the message perspective, this administration does need to understand that there is pain being felt right now.\n\nCORNISH: And I understand what you're saying about someone like Thomas Massie, who's a perennial thorn in the side of the administration.\n\nI want to put up some information about Representative Tom Barrett, who is a first-term Republican. OK? So, you've got a newbie.\n\nBut he also is a former Army helicopter pilot. I'm really paying attention to how veterans are behaving politically right now across the political spectrum. And he's facing reelection.\n\nAnd one other person I want to show you, Representative Brian Fitzpatrick of Pennsylvania, represents the Philadelphia suburbs, which I'm sure we'll hear about ad nauseam come election time.\n\nBut more importantly, former FBI agent; has broken away from the administration before.\n\nThere is a world of veteran law enforcement -- like, people who kind of speak the lingo and understand the conversation around conflict. And they are not afraid to have a different point of view.\n\nMUELLER: One hundred percent. I mean, they are bringing a perspective to this that not everyone on the Hill is. I think, you know, Republicans, congressional Republicans are\n\nconstantly talking to constituents who are veterans. But it's one thing to be having those conversations and another thing to be coming at it, having done this work yourself.\n\nCORNISH: OK, you guys, we're going to talk more about this and some other topics later.\n\nLater on CNN, though, I want to get to this, because it doesn't sound like the president is actually letting go of his plans for some sort of anti-weaponization payout fund. And what could, basically, that mean going forward?\n\nAnd then there's actually pandemonium on the streets of New York. The Knicks give fans a reason to be rowdy.\n\nAnd a plane passenger tries to open an exit door mid-flight. Luckily, there was a trained black belt on board.\n\nLONGOOD: The guy tried to, like, attack him and choked him, and I was already ready for something to happen.\n\nCORNISH: It is 13 minutes past the hour. Here is your morning roundup.\n\nNow, you're looking at the moment an unruly passenger is subdued on a Frontier flight. So, the man allegedly tried to open an exit door, then breached the cockpit, and choked an off-duty flight attendant.\n\nPassengers quickly helped take him down. And it just so happens one of those good Samaritans is a trained fighter.\n\nLONGOOD: You can't control what people are going to do and where they're going to do it. So, I think it's just best to be trained, be trained in Jiu Jitsu. At least try out a class so you know how to take care of a real-life situation when something happens.\n\nCORNISH: So, the flight was diverted. The suspect was arrested, and he faces multiple charges.\n\nSecretary of State Marco Rubio calls Cuba a growing security concern for the U.S. Testifying before lawmakers, he says the administration is trying to figure out who they can talk to on the inside.\n\n(BEGIN VIDEO CLIP) MARCO RUBIO, U.S. SECRETARY OF STATE: I think the United States is open to a negotiated situation that puts Cuba on a path towards democracy, prosperity, freedom, normalcy.\n\nWe would be open to that, and we would work with whoever is open to doing it. Obviously, it will be challenging.\n\nThere are clearly individuals within the apparatus of power in that country that understand that what they have now is not sustainable and needs to be fixed.\n\nCORNISH: Cuba is currently facing an unprecedented energy crisis. For the last five months, the island nation has been cut off from almost any fuel supply.\n\nAnd here in the U.S., the New York Knicks taking game one of the NBA finals on the road against the Spurs. Jalen Brunson scored 30 points in New York's 105-to-95 win over San Antonio.\n\nCNN's Omar Jimenez was outside of Madison Square Garden to see New York's characteristic calm response to the event.\n\nOMAR JIMENEZ, CNN ANCHOR/CORRESPONDENT: This is the reaction after a game one win in the NBA finals for the New York Knicks.\n\nWe have been outside Madison Square Garden throughout all of this. And look, if you doubt any of the enthusiasm, even for an away game for the Knicks, look no further than the crowd that gathered over the course of this game.\n\nBut I want to show you what we've been seeing over the course of this as a celebration really begins here in New York City. It's the beginning of a long series. You know that if you're a basketball fan.\n\nBut you can't tell the people here who have been chanting \"Knicks in four\" for hours. I was talking to them beforehand. They were saying \"Knicks in four\" beforehand, too.\n\nSo, this is just the beginning. They got a game one. It came down to a back-and-forth game throughout all of it.\n\nBut the excitement in New York City is the chance to do something they have not done in over five decades. Now that they are back in a place they have not been in more than two decades.\n\nSo, moving forward, like we said, is a long series, but the enthusiasm here --\n\nUNIDENTIFIED MALE: Yes!!!\n\nJIMENEZ: -- it is not going anywhere. It's not going anywhere. See, you can't go far. This is New York.\n\nCORNISH: And Omar was never seen again. Omar is fine. He's going to be following game two. Tips off tomorrow night in San Antonio.\n\nI love a happy fandom.\n\nDUBKE: I'm glad you've heard from him, though.\n\nCORNISH: Yes. He's good. He's good.\n\nCORNISH: He's also tall. You know, he's very, very lucky.\n\nOK, you guys, after the break on CNN THIS MORNING, the White House Correspondents' Dinner is getting a second act.\n\nPlus, the anti-weaponization fund may be dead, but the president isn't done talking about it.\n\nIn the meantime, good morning to our viewers in New York, just waking up or still awake after a Knicks win.\n\nTODD BLANCHE, U.S. ACTING ATTORNEY GENERAL: Look, we're not moving forward with the fund. We are not moving forward with the fund, period.\n\nWe are not moving forward with the fund.\n\nREP. GRACE MENG (D-NY): Not moving forward ever?\n\nBLANCHE: Correct. We're not moving forward with the fund.\n\nWe're not moving forward with the fund.\n\nWe're not moving forward with the fund.\n\nWe're not moving forward with the fund.\n\nCORNISH: Here's the thing. Somehow, people are still asking, are they moving forward with the fund?\n\nThat $1.776 billion so-called anti-weaponization fund. That was quickly condemned in a bipartisan way when it was rolled out a few weeks ago.\n\nBut even as the acting attorney general -- you're seeing him right there -- saying it's over, there are other mixed signals.\n\nSo, Lindsey Graham, for instance, suggested another way to pay out the fund. A top DOJ official, Stanley Woodward, replied, saying, \"We're on it.\"\n\nAnd ABC News reports Woodward posted Tuesday evening in response to Graham's post. And Woodward's post was deleted by Wednesday morning.\n\nPresident Trump also seems unwilling to let the idea go entirely.\n\nDONALD TRUMP, U.S. PRESIDENT: The weaponization fund, as far as I'm concerned, was a beautiful thing. It was something I was -- I didn't make it, but I was -- I heard that, I thought that was the greatest thing.\n\nCORNISH: The group chat is back. I'm under the impression that, under federal law, they can't bring it back. So, help me understand.\n\nMUELLER: They can't. But they also -- it's very hard to find a plaintiff here, right? Because this is a settlement between two government agencies that are both controlled by Trump.\n\nAnd so, who's the person that can come forward and say they were wronged and challenge this?\n\nCORNISH: What about all those people who raised their hands, like, you know, call me?\n\nMUELLER: We've seen -- exactly.\n\nCORNISH: Michael Cohen.\n\nMUELLER: That's what we've seen folks come out and do, for example. You know, folks who were injured in the January 6th riots have said, if you give money to my former attackers, then that is an attack against me.\n\nAnd that's part of why we're seeing this held up in the courts, at least temporarily.\n\nMUELLER: I think the Trump administration saying that this is, at least for now, dead, is a sign that they know the political opposition is too strong.\n\nCORNISH: But there's -- he's -- you've got Blanche saying, look, I'm not going to do this. And then you've got everyone else being like, well, maybe, maybe. And is that really just, like, to soften the blow of it not happening?\n\nDUBKE: I think we're all missing the -- the -- the active word here that the president used, which was \"was.\" It was a beautiful thing.\n\nCORNISH: That was -- and then --\n\nDUBKE: And he -- he didn't. And he didn't bring that up. That was in a press conference yesterday in the Oval Office.\n\nCORNISH: Nor did he claim it. He said someone else came up with it.\n\nDUBKE: Well, and he was asked a question about it. So, I mean, we're talking about something that I do think is dead for political reasons, especially.\n\nBut this also we've got a court order that this thing can't go forward. We have members of Congress, especially senators, who are about to enter a vote-a-rama today.\n\nDUBKE: I think Thom Tillis is going to bring his amendment forward. And when he does, I wouldn't be surprised if there's 10 to 15 Republican senators who vote for the Tillis measure to basically kill this thing.\n\nSo, we can keep talking about it. But even the president said \"was.\"\n\nCORNISH: Well, then, let me add part two: the IRS settlement that says, thou shalt "},{"seg":2,"url":"https://transcripts.cnn.com/show/ctmo/date/2026-06-04/segment/02","title":"CNN.com - Transcripts","text":"Return to Transcripts main page\n\nTrump To Nominate Blanche For Attorney General; House Rebukes Trump, Approves War Powers Resolution; Rubio To Lawmakers: War With Iran Is \"Over\". Aired 6:30-7a ET\n\nAired June 04, 2026 - 06:30   ET\n\nTHIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED.\n\nAUDIE CORNISH, CNN ANCHOR: Good morning, everybody. I'm Audie Cornish. Thank you for joining me on CNN THIS MORNING.\n\nIt is half past the hour, and here's what's happening right now.\n\nPresident Trump expected to nominate Todd Blanche, the acting attorney general, to be the next attorney general.\n\nDONALD TRUMP, PRESIDENT OF THE UNITED STATES: He's acting attorney general. Tomorrow, I'm instructing Dan and everybody else that's involved in that very complicated process, which is going to go, I think, very quickly, that we are going to make him permanent attorney general.\n\nCORNISH: Now, Blanche previously served as one of the president's personal defense attorneys. He's been currently serving as acting AG since the firing of Pam Bondi back in April.\n\nThe White House Correspondents Dinner rescheduled. The event back in April was disrupted by a gunman. President Trump said he wanted it back on. The new dinner will take place July 24th. In a \"Truth Social\" post, the president says he'll be there.\n\nAnd then, a stunning rebuke of Trump. The House approving a War Powers resolution on Wednesday that would halt the US military action against Iran. A handful of Republicans actually joined with Democrats this time, and the resolution is supposed to limit the president's ability to initiate or escalate military hostilities without congressional approval.\n\nSo the question is, are we at the end or are as some lawmakers are worried about? Are we at the start of something that will be long and protracted with Iran?\n\nOn Wednesday, Secretary of State Marco Rubio told lawmakers that the war is over.\n\nREP. SARA JACOBS (D-CA): We're taking you at your word. The war is over. Who won?\n\nMARCO RUBIO, SECRETARY OF STATE: But first of all, you're not taking me at my word. It's a fact. We're no longer conducting sustained strikes inside of Iran to degrade their military because Epic Fury is over.\n\nCORNISH: Here's how the president described it.\n\nTRUMP: We hit them pretty hard the night before and actually last night.\n\nCORNISH: So there are fresh hostilities between the U.S. and Iran overnight spilling into neighboring Gulf countries. One person was killed, more than 60 injured, in an Iranian drone strike on Kuwait's airport.\n\nSo we're bringing in Harrison Mann to the Group Chat. He's a former U.S. Army major and former executive officer of the Defense Intelligence Agency.\n\nThank you so much for being here. So as we talk, we talked about the potential, the hostilities here. I want to talk about the possibility for the deal. Iran over and over keeps bringing up restitution. It wants to be basically its assets unfrozen.\n\nCan you talk about what they're looking for and how much of a sticking point this is for the U.S.?\n\nHARRISON MANN, FORMER EXECUTIVE OFFICER, DEFENSE INTELLIGENCE AGENCY: First, I want to point out that, you know, this so-called sticking point was that was a demand from before the war, right? When Trump did the surprise attack with Israel in February, what the US and Iran were discussing was some kind of sanctions relief, which would be a de facto release of funds in exchange for freeze on Iran's nuclear enrichment.\n\nAnd so I think it's, in my mind, a little misleading to say this thing that we've known is always going to be in Iranian demand is a sticking point. I think really the principal sticking point remains Trump's lack of interest in actually pushing for a deal.\n\nCORNISH: Okay, let me just play a little of it first --\n\nCORNISH: -- so people have some context for what you're talking about.\n\nHere's what he said about whether or not a deal could be reached in the coming days.\n\nTRUMP: The negotiation itself has gone very well, actually, very well.\n\nREPORTER: Mr. President --\n\nTRUMP: It could have -- even if it happens, and it might not happen, who knows? But if it happens, it could happen like over the weekend.\n\nThe blockade is the most powerful thing. I think the blockade maybe has more impact than the bombing has, but the blockade that we have the naval blockade is incredible. Not one ship has gotten through unless we wanted it to. And people respect it a lot.\n\nMANN: Yeah, so I think -- you know, Trump may actually believe that the blockade is working and he might believe that it's sustainable. The Iranians don't believe either. I think they're pretty confident their ability to withstand some loss of oil sales.\n\nAnd they really don't like the status quo. It seems like Trump kind of thinks he basically ended the war, and occasional tit-for-tat strikes can go on really forever.\n\nThe Iranians don't want that. They think they've got an advantage and they want to press it. And so, like we saw with the attack on the Kuwaiti airport, I think they're going to actually start escalating a little more to try and break this impasse.\n\nCORNISH: Against allies, U.S. allies of the region, this idea of just spreading it into the region more.\n\nMANN: I think against U.S. forces and against U.S. partners, which they still hold responsible because U.S. attacks are sometimes launched from their territory. And so I think they are going to basically -- they have found also their strategy is not working because Trump is not actually convinced that he has to change the status quo.\n\nSo they're pretty willing to go back to war more than Trump is. And I think we're going to see them push closer and closer if Trump doesn't actually get serious about making a peace deal.\n\nCORNISH: Can I also get your opinion on this war vote? We were all talking about why these various Republicans, there's only a few, right, four, who have decided to vote against the president going to war and being able to do more hostilities. And we were looking at issues like reelection, what districts, what state. Can you talk about what you know about their backgrounds and whether\n\nyou think there is also a broader conversation happening within the vet community about this?\n\nMANN: Yeah, I think these defections, which I don't want to call them that because these Congress members of Congress did the right thing, right? They're trying to end this war, represent two things.\n\nOne, the costs of the war and the kind of stupidity of the war have become impossible to ignore, right? We're three months in. You can't pretend Trump's got a plan. You can't ignore the very visible and tangible economic effects, right?\n\nI saw you playing before fertilizer, increasing the cost of food, and of course, the pain at the gas pump.\n\nOn top of that, I think the most recent generation of veterans who served in the war on terror in some capacity, contrasted maybe with Lindsey Graham, who's also a veteran.\n\nCORNISH: Well, Pete Hegseth.\n\nMANN: Or Pete Hegseth.\n\nCORNISH: I mean, remember, there are people in power here who have that same experience. That's why I'm wondering about the divide.\n\nMANN: Yeah, I do. You know, as a veteran, I don't want to say that putting a veteran in a leadership position automatically means they're going to make a good decision, right? You got Pete Hegseth. You got J.D. Vance. You had Tulsi Gabbard, you know, for her short-lived DNI career.\n\nBut some of them clearly took the correct lesson away from the war on terror, which was we shouldn't be doing these stupid, destructive wars for no reason. And it's really clear, it's been clear from the start, that's what this is going to be. I think tons of Republicans, both veterans and not, have understood this, were biting their tongue basically to see if Trump could resolve this quickly and they could avoid having to take a stand.\n\nSo yeah, I think these four are probably just the tip of the iceberg. You know, we've seen some Republican senators also threaten in the past to support War Powers resolutions. And I think we're only going to see more of this --\n\nMANN: -- especially as, you know folks understand that their lives are getting qualitatively worse and more expensive because of the war.\n\nCORNISH: Well, right now, it's still just a trickle politically. I'll let you know and bring you back when it becomes a wave, all right, if we see more people jump on.\n\nThank you so much for being here. We just mentioned national intelligence and the president's choice to\n\nbecome acting director of national intelligence is actually getting a lot of blowback on Capitol Hill. The person he's chosen is named Bill Pulte to oversee the nation's intelligence agencies. He does not have a background in intelligence. His current job is at the administration's Federal Housing Finance Agency and Fannie Mae and Freddie Mac.\n\nBut from that job, he's also managed to launch criminal investigations into several of the president's political foes. One White House source said the change from Trump was easy, saying, quote, Trump likes Tulsi, but she's very methodical. She's a thinker. Bill is a move fast and break things kind of guy, the source said.\n\nMany senators, including Republicans, but Pulte is not the right guy for the job.\n\nSEN. JOHN CORNYN (R-TX): I see no evidence of any qualifications for that job.\n\nSEN. THOM TILLIS (R-NC): I think he's the worst form of sycophant and advisor to the president that is going to hurt the president's legacy.\n\nCORNISH: So the group chat is back. I got to go to our friend here at \"Semafor\" because you got the scoop. You got scoops about how this guy got pushed to the forefront, how you went from, \"hey, handle the houses\" to \"hey, handle 18 intelligence agencies\".\n\nELEANOR MUELLER, WHITE HOUSE ECONOMY POLICY REPORTER, SEMAFOR: Yeah, I've been covering Bill Pulte for a long time since actually he was nominated as FHFA director and he came in hot. He laid off a ton of executives. He made himself chairman of Fannie and Freddie, which was an unprecedented move.\n\nAnd he completely overhauled a ton of different policies. And since then, he's kept up that momentum, right? We've seen him lead the charge.\n\nCORNISH: Which is hard, houses. Houses is your job.\n\nCORNISH: So how did he end --\n\nMUELLER: -- your job, right? We've seen him submit the criminal inquiry to the Justice Department that was the basis for Trump's attempt to fire Fed Governor Lisa Cook.\n\n[06:40:00] He's clashed with cabinet members, including Scott Bessent, over basically encouraging Trump to fire Fed Chair Jerome Powell. And that is what his supporters wanted him to bring to this job, right? Roger Stone, Tulsi Gabbard, these are folks who said, this is what we need. We need someone who's not going to necessarily respect the typical M.O. and instead come in and just get stuff done. And clearly Trump agreed.\n\nCORNISH: It's interesting because he's got, as you said, he comes in hot. And somebody who comes in equally hot in response is the Treasury Secretary Bessent. And it's been Washington lore that they had a fistfight for a long time, confirmed.\n\nAnd in this moment in a hearing on Wednesday, Tom Tillis asked about it, kind of as a character witness, so to speak. And here's what Bessent had to say.\n\nTILLIS: Did you actually tell Pulte you were going to punch him in the face?\n\nSCOTT BESSENT, TREASURY SECRETARY: No, sir. I actually said I was going to kick his ass.\n\nTILLIS: Good. Okay, good. I share the emotion. Thank you.\n\nBESSENT: And as I said, that was last summer, summer of '25. And many teams have fights in the locker room and then go out and win for the team on the table.\n\nCORNISH: Fights in the locker room. I'm being judgmental. I'm like, you've seen a locker room. What do you see when he's talking about this? I don't think that's totally wrong.\n\nMANN: Yeah, I mean, I think first of all, like Trump, Trump loves it when people are competing for his affection. Like that's -- that's kind of his ideal. You know, I'm not. I'm not. It's tough for me to imagine him getting a fight with anybody, but I think like I'm much more kind of scared here about the idea of putting somebody who's even more of a kind of submissive loyalist than Tulsi Gabbard into this role.\n\nYeah, Pulte has shown kind of extraordinary talent for weaponizing the pretty obscure position that he was originally in. But I think really anybody who's a loyalist to Trump, even if it's not Pulte, even if they find somebody who has like better resume than Pulte, could use the DNI position to cause a lot of harm.\n\nCORNISH: Yeah, and this is one of those things where it starts out about being one thing, like the weaponization fund, and it causes problems for other priorities. In that case, it was immigration. With this one, with Pulte, all of a sudden, you've got some senators\n\nlike Warner who had been working on a bipartisan deal on FISA being like, oh, you want this guy? Well, let's have a conversation about the FISA rules. And can it disrupt other priorities? Is it worth it to get this guy in?\n\nMIKE DUBKE, FORMER TRUMP WHITE HOUSE COMMUNICATIONS DIRECTOR: Well, first of all, Pulte's never going to be the nominee, and I'll just say that. I don't think he --\n\nCORNISH: Oh, really?\n\nDUBKE: I believe that. I think that this is --\n\nMUELLER: That is true. Trump said he was making him acting DNI. I think they knew from the jump that he could never get confirmed by the Senate.\n\nDUBKE: The bigger political question here is why poke the bear of the Senate for any reason on this by putting Pulte in this position? And that, I think, especially when you've got FISA reauthorization, you know, that the deadline for that coming up --\n\nCORNISH: Yeah, it's going to sunset.\n\nDUBKE: It is a -- it is a fight that maybe wasn't worth picking for this guy. But let's be just clear about this. Pulte is a flash in the pan in terms of DNI.\n\nMEGHAN HAYS, FORMER BIDEN WHITE HOUSE DIRECTOR OF MESSAGE PLANNING: Yeah, I just think he can do a lot of harm while he's there, right? We have elections coming up. Their whole thing is to prove that the '20 elections didn't happen.\n\nTulsi Gabbard was in Georgia. Why? Who knows? This guy's already shown that he's going to weaponize more. Now you're going to weaponize 18 intelligence agencies.\n\nI mean, it's just disgusting. I just didn't know -- to his point, I just didn't know that you could have someone less qualified to be in this role. And I think it should scare the American people. And it's clearly making noise in the Senate.\n\nDUBKE: Just because she was a Democrat. I didn't think she was less qualified.\n\nCORNISH: I just want to say that -- I want to end with you, Eleanor, because you talked to like industry people from banking and even they were like, we don't understand why you would put this guy who in his regular real-time job went into the tickle files unprompted. He gained files for people to investigate and presented them and now put him in front of top secret documentation.\n\nMUELLER: I think it shocked many people within the banking industry who have seen firsthand what he's done at FHFA since he was picked last year. I was with Senator Warner when the last DNI stepped down and he said explicitly, you know, we want to see someone who's going to stay in their lane like past DNIs have.\n\nAnd with Pulte, he has a very cut and dry track record of very much not doing that, not only on these issues of mortgage fraud, but also on housing policies like the 50-year mortgage, where he's taken advantage of this personal relationship with Trump to bring him ideas that the rest of the party has then immediately said, absolutely not.\n\nCORNISH: Blown up. Yeah, yeah.\n\nBefore I let you go, can I ask how much damage can they do? Is this a job -- some people thought Tulsi was sidelined in a lot of ways. People have always complained about this gig, whether it really does do anything.\n\nWhat kind of access will he have to top secret materials and what's the concern?\n\nMANN: So he won't just have incredible access. There's 18 intelligence agencies.\n\nOther than the CIA and the FBI, the rest of them don't really have representation in the White House. They don't have the same representation or the same level on the Hill.\n\nSo they are much more sensitive to the demands of the DNI, right? We saw there's a feud between Ratcliffe, the CIA, and Gabbard. That's not going to happen with the Office of Naval Intelligence or, you know, even the intel agency that's under DHS. He sets budgetary priorities, like in bureaucratic world, he can exercise a lot of control over these other agencies, and he can use that to basically investigate Americans or target Americans.\n\nI think it's a good thing that Trump's authoritarianism basically got in the way of itself, and he's disrupting the renewal of FISA Section 702, because I don't want somebody like Pulte or Kash Patel to have access to that kind of basically warrantless surveillance of us. But that's the kind of stuff he could do and could exploit.\n\nA lot of the authorities of the I.C. have already been abused or misused, you know, not just under Gabbard, but under previous administrations. If this is a guy who could weaponize, you know, housing finance, there is a lot he can do with the intel world.\n\nCORNISH: Okay, Harrison, thank you so much for being here.\n\nComing up on CNN, there's another setback for the president. We mentioned the anti-weaponization fund, all but dead. Are we at this kind of turning point in this presidency?\n\n(BEGIN VIDEO CLIP) REP. THOMAS MASSIE (R-KY): I think it sends a good message from the People's House that people are tired of war.\n\nCORNISH: Which leads us to that rebuke. The House passes a War Powers resolution to limit his authority in Iran. We're going to talk with Congressman Kevin Kiley, the only independent in the House, about it. He's here next.\n\nCORNISH: So what's going on with Republicans and President Trump? Well, before the break, we were talking about this outcry ove"}],"vocabulary":[{"word":"rebuke","phonetic":"/rɪˈbjuːk/","pos":"n.","level":"考研","cn":"指责，批评","en":"an expression of sharp disapproval or criticism","excerpt":"the Republican rebuke","example_cn":"共和党的指责"},{"word":"resolution","phonetic":"/ˌrezəˈluːʃn/","pos":"n.","level":"考研","cn":"决议","en":"a formal expression of opinion or intention made by a legislative body","excerpt":"Four Republicans Vote Yes on Iran War Powers Resolution","example_cn":"四位共和党人投票支持伊朗战争权力决议"},{"word":"defector","phonetic":"/dɪˈfektər/","pos":"n.","level":"六级","cn":"叛离者，倒戈者","en":"a person who abandons a party, cause, or country","excerpt":"GOP defectors crossing party lines","example_cn":"共和党倒戈者跨越党派界限"},{"word":"hostility","phonetic":"/hɒˈstɪləti/","pos":"n.","level":"考研","cn":"敌对，战争行动","en":"acts of warfare; opposition or enmity","excerpt":"remove U.S. armed forces from hostilities with Iran","example_cn":"将美国武装部队从与伊朗的敌对行动中撤出"},{"word":"constitutionality","phonetic":"/ˌkɒnstɪtjuːʃəˈnæləti/","pos":"n.","level":"专八","cn":"合宪性","en":"the quality of being in accordance with a constitution","excerpt":"concerns over constitutionality","example_cn":"对合宪性的担忧"},{"word":"affordability","phonetic":"/əˌfɔːrdəˈbɪləti/","pos":"n.","level":"六级","cn":"可负担性","en":"the quality of being affordable","excerpt":"show voters that they're doing something on affordability","example_cn":"向选民展示他们在可负担性方面有所作为"},{"word":"constituent","phonetic":"/kənˈstɪtʃuənt/","pos":"n.","level":"考研","cn":"选民","en":"a person who lives in the constituency of a political representative","excerpt":"hearing from constituents","example_cn":"听取选民意见"},{"word":"erosion","phonetic":"/ɪˈroʊʒn/","pos":"n.","level":"考研","cn":"侵蚀，削弱","en":"the gradual destruction or diminution of something","excerpt":"the erosion of some support","example_cn":"一些支持的削弱"},{"word":"empathy","phonetic":"/ˈempəθi/","pos":"n.","level":"六级","cn":"共情，同理心","en":"the ability to understand and share the feelings of another","excerpt":"show some empathy","example_cn":"表现出一些同理心"},{"word":"multibillionaire","phonetic":"/ˌmʌltiˌbɪljəˈner/","pos":"n.","level":"六级","cn":"亿万富翁","en":"a person with assets worth many billions of dollars","excerpt":"These people are multibillionaires.","example_cn":"这些人是亿万富翁。"},{"word":"pandemonium","phonetic":"/ˌpændəˈmoʊniəm/","pos":"n.","level":"专八","cn":"混乱，喧嚣","en":"wild and noisy disorder or confusion","excerpt":"pandemonium on the streets of New York","example_cn":"纽约街头的混乱"},{"word":"subdue","phonetic":"/səbˈduː/","pos":"v.","level":"考研","cn":"制服，镇压","en":"to overcome, quieten, or bring under control","excerpt":"an unruly passenger is subdued","example_cn":"一名不守规矩的乘客被制服"},{"word":"divert","phonetic":"/daɪˈvɜːrt/","pos":"v.","level":"考研","cn":"使转向，改道","en":"to cause to change course or direction","excerpt":"The flight was diverted.","example_cn":"航班被改道。"},{"word":"unprecedented","phonetic":"/ʌnˈpresɪdentɪd/","pos":"adj.","level":"考研","cn":"前所未有的","en":"never done or known before","excerpt":"unprecedented energy crisis","example_cn":"前所未有的能源危机"},{"word":"characteristic","phonetic":"/ˌkærəktəˈrɪstɪk/","pos":"adj.","level":"考研","cn":"典型的，特有的","en":"typical of a particular person, place, or thing","excerpt":"New York's characteristic calm response","example_cn":"纽约特有的冷静反应"},{"word":"enthusiasm","phonetic":"/ɪnˈθuːziæzəm/","pos":"n.","level":"考研","cn":"热情","en":"intense and eager enjoyment, interest, or approval","excerpt":"doubt any of the enthusiasm","example_cn":"怀疑任何热情"},{"word":"back-and-forth","phonetic":"/ˌbæk ən ˈfɔːrθ/","pos":"adj.","level":"六级","cn":"来回的，反复的","en":"moving from one place to another and back again","excerpt":"a back-and-forth game","example_cn":"一场拉锯战"},{"word":"decade","phonetic":"/ˈdekeɪd/","pos":"n.","level":"考研","cn":"十年","en":"a period of ten years","excerpt":"over five decades","example_cn":"超过五十年"},{"word":"condemn","phonetic":"/kənˈdem/","pos":"v.","level":"考研","cn":"谴责","en":"to express complete disapproval of","excerpt":"quickly condemned in a bipartisan way","example_cn":"迅速以两党方式谴责"},{"word":"bipartisan","phonetic":"/ˌbaɪpɑːrtɪˈzæn/","pos":"adj.","level":"六级","cn":"两党的","en":"involving the agreement or cooperation of two political parties","excerpt":"condemned in a bipartisan way","example_cn":"以两党方式谴责"},{"word":"settlement","phonetic":"/ˈsetlmənt/","pos":"n.","level":"考研","cn":"和解，协议","en":"an official agreement intended to resolve a dispute","excerpt":"a settlement between two government agencies","example_cn":"两个政府机构之间的和解"},{"word":"plaintiff","phonetic":"/ˈpleɪntɪf/","pos":"n.","level":"六级","cn":"原告","en":"a person who brings a case against another in a court of law","excerpt":"find a plaintiff here","example_cn":"在这里找到原告"},{"word":"injured","phonetic":"/ˈɪndʒərd/","pos":"adj.","level":"考研","cn":"受伤的","en":"harmed or wounded","excerpt":"folks who were injured in the January 6th riots","example_cn":"在1月6日骚乱中受伤的人"},{"word":"opposition","phonetic":"/ˌɑːpəˈzɪʃn/","pos":"n.","level":"考研","cn":"反对","en":"resistance or dissent","excerpt":"political opposition is too strong","example_cn":"政治反对过于强烈"},{"word":"soften","phonetic":"/ˈsɔːfn/","pos":"v.","level":"考研","cn":"缓和，软化","en":"to make or become less severe or harsh","excerpt":"soften the blow of it not happening","example_cn":"缓和它没有发生的打击"},{"word":"amendment","phonetic":"/əˈmendmənt/","pos":"n.","level":"考研","cn":"修正案","en":"a minor change or addition designed to improve a text, piece of legislation, etc.","excerpt":"bring his amendment forward","example_cn":"提出他的修正案"},{"word":"measure","phonetic":"/ˈmeʒər/","pos":"n.","level":"考研","cn":"措施，法案","en":"a legislative bill or act","excerpt":"vote for the Tillis measure","example_cn":"投票支持Tillis法案"},{"word":"perennial","phonetic":"/pəˈreniəl/","pos":"adj.","level":"六级","cn":"长期的，反复出现的","en":"lasting or existing for a long or apparently infinite time","excerpt":"a perennial thorn in the side","example_cn":"长期的眼中钉"},{"word":"veteran","phonetic":"/ˈvetərən/","pos":"n.","level":"考研","cn":"老兵，经验丰富的人","en":"a person who has had long experience in a particular field","excerpt":"veteran law enforcement","example_cn":"经验丰富的执法人员"},{"word":"concurrence","phonetic":"/kənˈkɜːrəns/","pos":"n.","level":"专八","cn":"同意，一致","en":"agreement or consistency","excerpt":"60-day concurrence of Congress","example_cn":"国会的60天同意"},{"word":"notification","phonetic":"/ˌnoʊtɪfɪˈkeɪʃn/","pos":"n.","level":"考研","cn":"通知","en":"the action of notifying someone or something","excerpt":"48-hour notification","example_cn":"48小时通知"},{"word":"nominate","phonetic":"/ˈnɒmɪneɪt/","pos":"v.","level":"考研","cn":"提名","en":"to officially suggest someone for a position","excerpt":"President Trump expected to nominate Todd Blanche, the acting attorney general, to be the next attorney general.","example_cn":"总统预计将提名代理司法部长托德·布兰奇为下一任司法部长。"},{"word":"acting","phonetic":"/ˈæktɪŋ/","pos":"adj.","level":"六级","cn":"代理的","en":"temporarily performing the duties of a position","excerpt":"He's been currently serving as acting AG since the firing of Pam Bondi back in April.","example_cn":"自四月帕姆·邦迪被解雇以来，他一直担任代理司法部长。"},{"word":"rebuke","phonetic":"/rɪˈbjuːk/","pos":"n.","level":"六级","cn":"斥责，谴责","excerpt":"a stunning rebuke of Trump. The House approving a War Powers resolution on Wednesday that would halt the US military action against Iran.","example_cn":"对特朗普的一次惊人谴责。众议院周三通过了一项战争权力决议，将停止美国对伊朗的军事行动。"},{"word":"resolution","phonetic":"/ˌrezəˈluːʃn/","pos":"n.","level":"考研","cn":"决议","en":"a formal statement of decision or opinion","excerpt":"The House approving a War Powers resolution on Wednesday that would halt the US military action against Iran.","example_cn":"众议院周三通过了一项战争权力决议，将停止美国对伊朗的军事行动。"},{"word":"halt","phonetic":"/hɔːlt/","pos":"v.","level":"考研","cn":"停止","en":"to stop or cause to stop","excerpt":"The House approving a War Powers resolution on Wednesday that would halt the US military action against Iran.","example_cn":"众议院周三通过了一项战争权力决议，将停止美国对伊朗的军事行动。"},{"word":"initiate","phonetic":"/ɪˈnɪʃieɪt/","pos":"v.","level":"考研","cn":"开始，发起","en":"to cause something to begin","excerpt":"the resolution is supposed to limit the president's ability to initiate or escalate military hostilities without congressional approval.","example_cn":"该决议旨在限制总统未经国会批准发起或升级军事敌对行动的能力。"},{"word":"escalate","phonetic":"/ˈeskəleɪt/","pos":"v.","level":"六级","cn":"升级","en":"to increase in intensity or extent","excerpt":"the resolution is supposed to limit the president's ability to initiate or escalate military hostilities without congressional approval.","example_cn":"该决议旨在限制总统未经国会批准发起或升级军事敌对行动的能力。"},{"word":"protracted","phonetic":"/prəˈtræktɪd/","pos":"adj.","level":"六级","cn":"持久的，延长的","en":"lasting for a long time or longer than expected","excerpt":"Are we at the start of something that will be long and protracted with Iran?","example_cn":"我们是否正处于与伊朗长期持久冲突的开端？"},{"word":"sustained","phonetic":"/səˈsteɪnd/","pos":"adj.","level":"考研","cn":"持续的","en":"continuing for an extended period","excerpt":"We're no longer conducting sustained strikes inside of Iran to degrade their military because Epic Fury is over.","example_cn":"我们不再对伊朗境内进行持续打击以削弱其军事力量，因为“史诗之怒”行动已经结束。"},{"word":"degrade","phonetic":"/dɪˈɡreɪd/","pos":"v.","level":"六级","cn":"削弱，降低","en":"to reduce the effectiveness or quality of","excerpt":"We're no longer conducting sustained strikes inside of Iran to degrade their military because Epic Fury is over.","example_cn":"我们不再对伊朗境内进行持续打击以削弱其军事力量，因为“史诗之怒”行动已经结束。"},{"word":"hostilities","phonetic":"/hɒˈstɪlətiz/","pos":"n.","level":"六级","cn":"敌对行动","en":"acts of warfare or conflict","excerpt":"So there are fresh hostilities between the U.S. and Iran overnight spilling into neighboring Gulf countries.","example_cn":"因此，美国和伊朗之间新的敌对行动一夜之间蔓延到邻近的海湾国家。"},{"word":"spill into","phonetic":"/spɪl ˈɪntuː/","pos":"phr.","level":"六级","cn":"蔓延到","en":"to spread or extend into another area","excerpt":"So there are fresh hostilities between the U.S. and Iran overnight spilling into neighboring Gulf countries.","example_cn":"因此，美国和伊朗之间新的敌对行动一夜之间蔓延到邻近的海湾国家。"},{"word":"restitution","phonetic":"/ˌrestɪˈtjuːʃn/","pos":"n.","level":"六级","cn":"赔偿，归还","en":"the restoration of something lost or stolen to its proper owner","excerpt":"Iran over and over keeps bringing up restitution. It wants to be basically its assets unfrozen.","example_cn":"伊朗一再提出赔偿要求。它基本上希望其资产被解冻。"},{"word":"unfrozen","phonetic":"/ʌnˈfrəʊzn/","pos":"adj.","level":"六级","cn":"解冻的","en":"released from a frozen state, especially financial assets","excerpt":"Iran over and over keeps bringing up restitution. It wants to be basically its assets unfrozen.","example_cn":"伊朗一再提出赔偿要求。它基本上希望其资产被解冻。"},{"word":"sticking point","phonetic":"/ˈstɪkɪŋ pɔɪnt/","pos":"n.","level":"六级","cn":"症结，关键点","en":"a point on which agreement cannot be reached","excerpt":"Can you talk about what they're looking for and how much of a sticking point this is for the U.S.?","example_cn":"你能谈谈他们在寻求什么，这对美国来说有多大的症结吗？"},{"word":"sanctions relief","phonetic":"/ˈsæŋkʃnz rɪˈliːf/","pos":"n.","level":"六级","cn":"制裁减免","en":"the reduction or removal of economic sanctions","excerpt":"what the US and Iran were discussing was some kind of sanctions relief, which would be a de facto release of funds in exchange for freeze on Iran's nuclear enrichment.","example_cn":"美国和伊朗当时讨论的是某种制裁减免，这实际上是释放资金以换取伊朗冻结核浓缩活动。"},{"word":"de facto","phonetic":"/ˌdeɪ ˈfæktəʊ/","pos":"adj.","level":"六级","cn":"事实上的","en":"in fact, whether by right or not","excerpt":"what the US and Iran were discussing was some kind of sanctions relief, which would be a de facto release of funds in exchange for freeze on Iran's nuclear enrichment.","example_cn":"美国和伊朗当时讨论的是某种制裁减免，这实际上是释放资金以换取伊朗冻结核浓缩活动。"},{"word":"nuclear enrichment","phonetic":"/ˈnjuːkliər ɪnˈrɪtʃmənt/","pos":"n.","level":"六级","cn":"核浓缩","en":"the process of increasing the proportion of fissile isotopes in nuclear fuel","excerpt":"what the US and Iran were discussing was some kind of sanctions relief, which would be a de facto release of funds in exchange for freeze on Iran's nuclear enrichment.","example_cn":"美国和伊朗当时讨论的是某种制裁减免，这实际上是释放资金以换取伊朗冻结核浓缩活动。"},{"word":"blockade","phonetic":"/blɒˈkeɪd/","pos":"n.","level":"六级","cn":"封锁","en":"the isolation of a place by hostile ships or troops","excerpt":"The blockade is the most powerful thing. I think the blockade maybe has more impact than the bombing has, but the blockade that we have the naval blockade is incredible.","example_cn":"封锁是最强大的武器。我认为封锁可能比轰炸更有影响力，但我们拥有的海军封锁是不可思议的。"},{"word":"naval","phonetic":"/ˈneɪvl/","pos":"adj.","level":"考研","cn":"海军的","en":"relating to a navy or warships","excerpt":"the blockade that we have the naval blockade is incredible.","example_cn":"我们拥有的海军封锁是不可思议的。"},{"word":"sustainable","phonetic":"/səˈsteɪnəbl/","pos":"adj.","level":"考研","cn":"可持续的","en":"able to be maintained over time","excerpt":"Trump may actually believe that the blockade is working and he might believe that it's sustainable.","example_cn":"特朗普可能真的相信封锁正在起作用，他可能相信这是可持续的。"},{"word":"tit-for-tat","phonetic":"/ˌtɪt fɔː ˈtæt/","pos":"adj.","level":"六级","cn":"以牙还牙的","en":"characterized by retaliation in kind","excerpt":"occasional tit-for-tat strikes can go on really forever.","example_cn":"偶尔的以牙还牙的打击可能会永远持续下去。"},{"word":"impasse","phonetic":"/ˈɪmpæs/","pos":"n.","level":"六级","cn":"僵局","en":"a situation in which no progress is possible","excerpt":"I think they're going to actually start escalating a little more to try and break this impasse.","example_cn":"我认为他们实际上会开始进一步升级，试图打破这一僵局。"},{"word":"defection","phonetic":"/dɪˈfekʃn/","pos":"n.","level":"六级","cn":"叛逃，倒戈","en":"the act of abandoning a person, cause, or country","excerpt":"I think these defections, which I don't want to call them that because these Congress members of Congress did the right thing, right?","example_cn":"我认为这些倒戈——我不想这么称呼，因为这些国会议员做了正确的事，对吧？"},{"word":"tip of the iceberg","phonetic":"/tɪp əv ðə ˈaɪsbɜːɡ/","pos":"phr.","level":"六级","cn":"冰山一角","en":"a small visible part of a much larger problem","excerpt":"I think these four are probably just the tip of the iceberg.","example_cn":"我认为这四个人可能只是冰山一角。"},{"word":"blowback","phonetic":"/ˈbləʊbæk/","pos":"n.","level":"六级","cn":"反弹，反效果","en":"unintended adverse consequences","excerpt":"the president's choice to become acting director of national intelligence is actually getting a lot of blowback on Capitol Hill.","example_cn":"总统选择担任代理国家情报总监的人选实际上在国会山遭到了强烈反弹。"},{"word":"sycophant","phonetic":"/ˈsɪkəfænt/","pos":"n.","level":"专八","cn":"谄媚者，马屁精","en":"a person who acts obsequiously towards someone important to gain advantage","excerpt":"I think he's the worst form of sycophant and advisor to the president that is going to hurt the president's legacy.","example_cn":"我认为他是最糟糕的谄媚者和总统顾问，会损害总统的遗产。"},{"word":"scoop","phonetic":"/skuːp/","pos":"n.","level":"六级","cn":"独家新闻","en":"a news story reported by one news organization before others","excerpt":"I got to go to our friend here at \"Semafor\" because you got the scoop.","example_cn":"我得去找我们在“Semafor”的朋友，因为你拿到了独家新闻。"},{"word":"overhaul","phonetic":"/ˌəʊvəˈhɔːl/","pos":"v.","level":"六级","cn":"彻底改革","en":"to completely change or repair","excerpt":"He completely overhauled a ton of different policies.","example_cn":"他彻底改革了大量不同的政策。"},{"word":"weaponize","phonetic":"/ˈwepənaɪz/","pos":"v.","level":"六级","cn":"武器化","en":"to use something as a weapon or for aggressive purposes","excerpt":"Pulte has shown kind of extraordinary talent for weaponizing the pretty obscure position that he was originally in.","example_cn":"普尔特展示了将原本相当不起眼的职位武器化的非凡才能。"},{"word":"authoritarianism","phonetic":"/ɔːˌθɒrɪˈteərɪənɪzəm/","pos":"n.","level":"六级","cn":"威权主义","en":"a system of government characterized by strong central power and limited political freedoms","excerpt":"I think it's a good thing that Trump's authoritarianism basically got in the way of itself.","example_cn":"我认为特朗普的威权主义基本上自食其果，这是一件好事。"}],"sentences":[{"en":"You've got four people in the president's party who have broken with him on the war with Iran.","cn":"总统所在政党中有四人就伊朗战争问题与他决裂。","structure":"主句（You've got four people）+ 定语从句（who have broken with him on the war with Iran）","analysis":"这是一个简单句，包含一个定语从句修饰'four people'。'break with'意为'与...决裂'。"},{"en":"Before the vote, House Speaker Mike Johnson had this warning to members of his party looking to flip.","cn":"投票前，众议院议长迈克·约翰逊向党内有意倒戈的成员发出了这一警告。","structure":"时间状语（Before the vote）+ 主句（House Speaker Mike Johnson had this warning to members of his party）+ 后置定语（looking to flip）","analysis":"'looking to flip'是现在分词短语作后置定语，修饰'members'。'flip'在此意为'倒戈'。"},{"en":"I think it is a very dangerous prospect to take away from the administration and the commander in chief right now, the ability to negotiate.","cn":"我认为，现在剥夺政府和总司令的谈判能力是一个非常危险的前景。","structure":"主句（I think）+ 宾语从句（it is a very dangerous prospect to take away... the ability to negotiate）","analysis":"宾语从句中，'it'是形式主语，真正的主语是'to take away... the ability to negotiate'。'take away from'意为'从...剥夺'。"},{"en":"But we have to do this in a way that is done through the use of force authorization that Congress has the exclusive authority over.","cn":"但我们必须以国会拥有专属权力的武力授权方式来进行。","structure":"主句（we have to do this in a way）+ 定语从句1（that is done through the use of force authorization）+ 定语从句2（that Congress has the exclusive authority over）","analysis":"两个定语从句层层修饰，第一个修饰'way'，第二个修饰'force authorization'。'exclusive authority'意为'专属权力'。"},{"en":"I think it tells us a lot about how much pressure these Republican congressmen are under to show voters that they're doing something on affordability.","cn":"我认为这在很大程度上告诉我们，这些共和党议员在向选民展示他们在可负担性方面有所作为方面承受着多大的压力。","structure":"主句（I think）+ 宾语从句（it tells us a lot about how much pressure...）+ 定语从句（these Republican congressmen are under）+ 目的状语（to show voters that...）","analysis":"'how much pressure'是宾语从句中的宾语，后面跟定语从句'congressmen are under'。'to show voters that...'是目的状语。"},{"en":"And Secretary Bessent was on the Hill yesterday, and he, of course, was asked about the economy for the same reasons that this war vote saw the erosion of some support, because people are worried.","cn":"贝森特部长昨天在国会山，当然，他被问及经济问题，原因与这次战争投票导致部分支持率下降相同，因为人们感到担忧。","structure":"并列句（And Secretary Bessent was... and he was asked...）+ 定语从句（that this war vote saw the erosion of some support）+ 原因状语从句（because people are worried）","analysis":"'for the same reasons that...'中，'that'引导定语从句修饰'reasons'。'saw'在此意为'经历'。"},{"en":"I think that there's a complete disconnect from how people are feeling.","cn":"我认为这与人们的感受完全脱节。","structure":"主句（I think）+ 宾语从句（that there's a complete disconnect from how people are feeling）","analysis":"'disconnect from'意为'与...脱节'。'how people are feeling'是介词from的宾语从句。"},{"en":"And so, when you sit up there in front of Congress and have no empathy for people, that is what they see.","cn":"所以，当你坐在国会面前，对人们没有同理心时，他们看到的就是这个。","structure":"时间状语从句（when you sit up there... and have no empathy）+ 主句（that is what they see）","analysis":"'what they see'是表语从句。'sit up there'意为'坐在那里'，有居高临下的意味。"},{"en":"There is a world of veteran law enforcement -- like, people who kind of speak the lingo and understand the conversation around conflict.","cn":"有一个由经验丰富的执法人员组成的世界——比如那些会说行话、理解围绕冲突的对话的人。","structure":"主句（There is a world of veteran law enforcement）+ 同位语/举例（like, people who...）","analysis":"'who kind of speak the lingo and understand the conversation around conflict'是定语从句修饰'people'。'lingo'意为'行话'。"},{"en":"I think the Trump administration saying that this is, at least for now, dead is a sign that they know the political opposition is too strong.","cn":"我认为特朗普政府说这至少目前已经死亡，是一个迹象，表明他们知道政治反对过于强烈。","structure":"主句（I think）+ 宾语从句（the Trump administration saying... is a sign）+ 同位语从句（that they know the political opposition is too strong）","analysis":"'saying that this is... dead'是现在分词短语作后置定语修饰'administration'。'a sign that...'中，'that'引导同位语从句。"},{"en":"The House approving a War Powers resolution on Wednesday that would halt the US military action against Iran.","cn":"众议院周三通过了一项战争权力决议，该决议将停止美国对伊朗的军事行动。","structure":"主谓宾结构，现在分词短语作主语补足语，that引导定语从句修饰resolution。","analysis":"现在分词短语'approving...'作主语'The House'的补足语，表示主动动作；'that would halt...'是定语从句，修饰'resolution'，说明决议的内容。"},{"en":"the resolution is supposed to limit the president's ability to initiate or escalate military hostilities without congressional approval.","cn":"该决议旨在限制总统未经国会批准发起或升级军事敌对行动的能力。","structure":"主系表结构，不定式短语作表语，'without congressional approval'作状语。","analysis":"'is supposed to'表示'应该，旨在'；'to limit...'是不定式短语作表语，说明决议的目的；'without congressional approval'是介词短语作条件状语。"},{"en":"We're no longer conducting sustained strikes inside of Iran to degrade their military because Epic Fury is over.","cn":"我们不再对伊朗境内进行持续打击以削弱其军事力量，因为“史诗之怒”行动已经结束。","structure":"主谓宾结构，不定式短语作目的状语，because引导原因状语从句。","analysis":"'no longer'表示'不再'；'to degrade their military'是不定式短语作目的状语；'because Epic Fury is over'是原因状语从句。"},{"en":"what the US and Iran were discussing was some kind of sanctions relief, which would be a de facto release of funds in exchange for freeze on Iran's nuclear enrichment.","cn":"美国和伊朗当时讨论的是某种制裁减免，这实际上是释放资金以换取伊朗冻结核浓缩活动。","structure":"主语从句+系表结构，which引导非限制性定语从句。","analysis":"'what the US and Iran were discussing'是主语从句；'was some kind of sanctions relief'是系表结构；'which would be...'是非限制性定语从句，修饰'sanctions relief'，进一步解释其性质。"},{"en":"I think it's, in my mind, a little misleading to say this thing that we've known is always going to be in Iranian demand is a sticking point.","cn":"我认为，在我看来，说这个我们一直知道是伊朗要求的东西是一个症结，有点误导人。","structure":"主谓宾结构，宾语从句中包含插入语和定语从句。","analysis":"'I think'是主句；'it's...a little misleading to say...'是宾语从句，其中'it'是形式主语，真正主语是'to say...'；'that we've known'是定语从句修饰'this thing'；'is always going to be in Iranian demand'是定语从句中的谓语部分。"},{"en":"I think really the principal sticking point remains Trump's lack of interest in actually pushing for a deal.","cn":"我认为真正的主要症结仍然是特朗普对实际推动协议缺乏兴趣。","structure":"主谓宾结构，宾语从句为主系表结构。","analysis":"'I think'是主句；'the principal sticking point remains...'是宾语从句，其中'remains'是系动词，'Trump's lack of interest...'是表语。"},{"en":"I think these defections, which I don't want to call them that because these Congress members of Congress did the right thing, right?","cn":"我认为这些倒戈——我不想这么称呼，因为这些国会议员做了正确的事，对吧？","structure":"主谓宾结构，宾语从句中包含非限制性定语从句和原因状语从句。","analysis":"'I think'是主句；'these defections...did the right thing'是宾语从句；'which I don't want to call them that'是非限制性定语从句修饰'defections'；'because...'是原因状语从句。"},{"en":"I think it's a good thing that Trump's authoritarianism basically got in the way of itself, and he's disrupting the renewal of FISA Section 702, because I don't want somebody like Pulte or Kash Patel to have access to that kind of basically warrantless surveillance of us.","cn":"我认为特朗普的威权主义基本上自食其果是一件好事，他正在破坏FISA第702条的续期，因为我不希望像普尔特或卡什·帕特尔这样的人能够对我们进行那种基本上无需授权的监视。","structure":"主谓宾结构，并列宾语从句，包含原因状语从句。","analysis":"'I think'是主句；'it's a good thing that...'是第一个宾语从句，其中'it'是形式主语，'that'引导主语从句；'and he's disrupting...'是第二个宾语从句；'because...'是原因状语从句。"}],"topics":[{"title":"Iran War Powers Resolution","content":"美国国会就伊朗战争权力决议进行投票，四位共和党人跨党派支持民主党决议，要求总统特朗普撤出与伊朗的军事敌对行动。该决议基于1973年《战争权力法》，规定总统需在48小时内通知国会，并在60天内获得国会同意。","keywords":"Iran, War Powers Resolution, Republican defectors, Congress, Trump"},{"title":"Anti-Weaponization Fund","content":"特朗普政府提出的17.76亿美元反武器化基金，旨在赔偿被所谓“武器化”政府机构针对的个人。该基金遭到两党批评，代理司法部长Todd Blanche表示不再推进，但总统特朗普仍称其为“美丽的事物”，且其他官员发出矛盾信号。","keywords":"anti-weaponization fund, DOJ, Todd Blanche, Trump, bipartisan condemnation"},{"title":"NBA Finals: New York Knicks","content":"纽约尼克斯队在NBA总决赛第一场客场击败圣安东尼奥马刺队，取得系列赛1-0领先。这是尼克斯队自1973年以来首次进入总决赛，球迷热情高涨。","keywords":"NBA Finals, New York Knicks, San Antonio Spurs, Jalen Brunson, Madison Square Garden"},{"title":"Unruly Passenger Incident","content":"一架边疆航空航班上，一名乘客试图打开紧急出口门并闯入驾驶舱，被一名训练有素的柔术乘客制服。航班改道，嫌疑人被捕并面临多项指控。","keywords":"Frontier Airlines, unruly passenger, Jiu Jitsu, flight diversion, arrest"},{"title":"Cuba Energy Crisis","content":"美国国务卿马可·鲁比奥称古巴对美国构成日益增长的安全关切，并表示美国愿意通过谈判使古巴走向民主。古巴正面临前所未有的能源危机，近五个月几乎无燃料供应。","keywords":"Cuba, energy crisis, Marco Rubio,     } else {
        const firstDate = Object.keys(ALL_DATA)[0];
        if (firstDate) loadDate(firstDate);
    }
})();

function loadDate(date) {
    if (!ALL_DATA[date]) return;
    currentDate = date;
    currentData = ALL_DATA[date];
    document.getElementById('topbarDate').textContent = date;
    renderContent(currentData);
    switchTab('transcript');
    document.querySelectorAll('.directory-item').forEach(item => {
        if (item.getAttribute('data-date') === date) item.classList.add('active');
        else item.classList.remove('active');
    });
}

function renderContent(data) {
    const segments = data.segments || [];
    const vocab = data.vocabulary || [];
    if (!segments.length) {
        document.getElementById('contentContainer').innerHTML = '<div class="empty">暂无内容</div>';
        return;
    }
    const vocabMap = {};
    vocab.forEach(v => { vocabMap[v.word.toLowerCase()] = v; });
    const sortedWords = Object.keys(vocabMap).sort((a,b) => b.length - a.length);
    
    let html = `
        <div class="section active" id="transcriptSection">
            <div class="transcript-body" id="transcriptBody"></div>
        </div>
        <div class="section" id="vocabSection"><div class="vocab-grid" id="vocabGrid"></div></div>
        <div class="section" id="sentencesSection"><div id="sentenceList"></div></div>
        <div class="section" id="topicsSection"><div id="topicList"></div></div>
    `;
    document.getElementById('contentContainer').innerHTML = html;
    
    // 渲染原文
    let transcriptHtml = '';
    for (let seg of segments) {
        const title = seg.title || `Segment ${seg.seg}`;
        const rawText = seg.text || '';
        const highlighted = highlightWords(rawText, sortedWords, vocabMap);
        transcriptHtml += `<div class="segment-block"><div class="segment-title">📺 ${escapeHtml(title)}</div><div class="para">${highlighted}</div></div>`;
    }
    document.getElementById('transcriptBody').innerHTML = transcriptHtml;
    
    renderVocabCards(vocab);
    renderSentencesList(data.sentences || []);
    renderTopicsList(data.topics || []);
}

function highlightWords(text, sortedWords, vocabMap) {
    if (!text) return '';
    const positions = [];
    const lc = text.toLowerCase();
    sortedWords.forEach(word => {
        let idx = 0;
        while ((idx = lc.indexOf(word, idx)) !== -1) {
            const before = idx === 0 || !/[a-z]/i.test(text[idx-1]);
            const after = idx+word.length >= text.length || !/[a-z]/i.test(text[idx+word.length]);
            if (before && after) {
                const overlaps = positions.some(p => idx < p.end && idx+word.length > p.start);
                if (!overlaps) positions.push({start:idx, end:idx+word.length, word, vocab:vocabMap[word]});
            }
            idx += word.length;
        }
    });
    if (!positions.length) return escapeHtml(text);
    positions.sort((a,b) => a.start - b.start);
    let result = '', last = 0;
    for (let p of positions) {
        result += escapeHtml(text.slice(last, p.start));
        const lv = p.vocab.level || '';
        let levelClass = '';
        if (lv.includes('考研')) levelClass = '考研';
        else if (lv.includes('六级')) levelClass = '六级';
        else if (lv.includes('专四')) levelClass = '专四';
        else if (lv.includes('专八')) levelClass = '专八';
        else levelClass = lv;
        result += `<span class="hl level-${levelClass}" data-word="${escapeHtml(p.word)}" onclick="showVocabPopup(event, '${escapeHtml(p.word)}')">${escapeHtml(p.word)}</span>`;
        last = p.end;
    }
    result += escapeHtml(text.slice(last));
    return result;
}

function showVocabPopup(e, word) {
    e.stopPropagation();
    const data = currentData?.vocabulary?.find(v => v.word === word);
    if (!data) return;
    document.querySelectorAll('.hl').forEach(el => el.classList.toggle('active', el.dataset.word === word));
    document.getElementById('popupWord').textContent = data.word;
    document.getElementById('popupPhonetic').textContent = data.phonetic || '';
    document.getElementById('popupPos').textContent = data.pos || '';
    document.getElementById('popupLevel').textContent = data.level || '';
    document.getElementById('popupCn').textContent = data.cn || '';
    document.getElementById('popupEn').textContent = data.en || '';
    let excerptText = data.excerpt || data.example || '';
    if (excerptText) {
        document.getElementById('popupExcerpt').innerHTML = `<strong>原文：</strong> ${escapeHtml(excerptText)}<br><strong>译文：</strong> ${escapeHtml(data.example_cn || '')}`;
    } else {
        document.getElementById('popupExcerpt').innerHTML = '';
    }
    const popup = document.getElementById('vocabPopup');
    popup.classList.add('show');
    let x = e.clientX + 12, y = e.clientY + 12;
    if (x + 320 > window.innerWidth) x = e.clientX - 332;
    if (y + 200 > window.innerHeight) y = e.clientY - 210;
    popup.style.left = x + 'px';
    popup.style.top = y + 'px';
}

document.addEventListener('click', e => {
    if (!e.target.classList.contains('hl') && !e.target.closest('.vocab-popup')) {
        document.getElementById('vocabPopup').classList.remove('show');
        document.querySelectorAll('.hl.active').forEach(el => el.classList.remove('active'));
    }
});

function renderVocabCards(vocab) {
    const container = document.getElementById('vocabGrid');
    if (!container) return;
    container.innerHTML = vocab.map(v => `
        <div class="vcard">
            <div><span class="vword">${escapeHtml(v.word)}</span> <span>${escapeHtml(v.phonetic || '')}</span> <span>${escapeHtml(v.pos || '')}</span> <span>${escapeHtml(v.level || '')}</span></div>
            <div>${escapeHtml(v.cn)}</div>
            <div>${escapeHtml(v.en || '')}</div>
            <div><em>${escapeHtml(v.excerpt || v.example || '')}</em><div>${escapeHtml(v.example_cn || '')}</div></div>
        </div>
    `).join('');
}

function renderSentencesList(sentences) {
    const container = document.getElementById('sentenceList');
    if (!container) return;
    container.innerHTML = sentences.map((s,i) => `
        <div class="scard"><strong>${i+1}.</strong> <div>${escapeHtml(s.en)}</div><div>${escapeHtml(s.cn)}</div><div><em>结构：</em>${escapeHtml(s.structure || '')}</div><div><em>分析：</em>${escapeHtml(s.analysis || '')}</div></div>
    `).join('');
}

function renderTopicsList(topics) {
    const container = document.getElementById('topicList');
    if (!container) return;
    const colors = ['#0a58ca','#d6336c','#146c43','#e68a2e'];
    container.innerHTML = topics.map((t,i) => `
        <div class="tcard"><strong style="color:${colors[i%colors.length]}">${escapeHtml(t.title)}</strong><div>${escapeHtml(t.content)}</div><div>🔑 ${escapeHtml(t.keywords || '')}</div></div>
    `).join('');
}

// 已删除翻译标签对应逻辑
function switchTab(tabId) {
    const sections = ['transcriptSection', 'vocabSection', 'sentencesSection', 'topicsSection'];
    const tabMap = { transcript: 0, vocab: 1, sentences: 2, topics: 3 };
    const idx = tabMap[tabId];
    if (idx === undefined) return;
    document.querySelectorAll('.tab').forEach((tab,i) => {
        if (i === idx) tab.classList.add('active');
        else tab.classList.remove('active');
    });
    sections.forEach((id, i) => {
        const el = document.getElementById(id);
        if (el) el.classList.toggle('active', i === idx);
    });
}

function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
}

function openSource() {
    if (currentData?.source_url) window.open(currentData.source_url, '_blank');
}
</script>
