 say Lindsey Vonn, then. I mean --\n\nCHAMPION: Well, not in that way. But she came out of retirement.\n\nCORNISH: Yes, yes. CHAMPION: All of these women are coming out of retirement, because they're meeting the expectations of guess what? So what if I'm 40? So, what if I'm 40 plus?\n\nCHAMPION: I'm still going to play. I still have the desire.\n\nCORNISH: I thought she did it because she saw big sis on the court and was like, you know what? I miss it.\n\nCHAMPION: I know. I mean --\n\nCORNISH: I have a sister so I feel like that's what would happen.\n\nCHAMPION: That might be a little bit of it, but I have a feeling she'll play the Olympics.\n\nCORNISH: Well, listen, I want her kid to see her play, too.\n\nCORNISH: Shout-out to Olympia. OK.\n\nAfter the break on CNN THIS MORNING, prediction markets and pro sports. Is it time for new rules to protect players and the integrity of the games?\n\nPlus, there is dangerous flooding. There's also efforts to rescue people from rising waters.\n\nWe're going to be going live to Mexico City, as well, which will host their first World Cup match two days from now. Mexico versus South Africa.\n\nPAT MCAFEE, ESPN SPORTS ANALYST: We are getting a ruling just one day after the NCAA basically comes out and says, This guy's not allowed. OK? This is not -- we're not doing this. This judge comes out and says, Actually, can play.\n\nCORNISH: All right. As the sports world grapples with the world of sports gambling and prediction markets, a new ruling is sending shock waves through college football.\n\nThe NCAA ruled Texas Tech quarterback Brendan Sorsby was ineligible after placing more than $90,000 in bets on college sports, and that includes 40 bets on his own team when he played at Indiana. Now, a federal judge has overruled all of that. The judge,\n\nconveniently based in Texas Tech's hometown of Lubbock, argued that Sorsby will suffer, quote, \"probable, imminent and irreparable injury\" if he's not able to play for the Red Raiders this year.\n\nAnd the chairman of the NCAA calls the decision a glaring integrity threat. He wants Congress to pass a new bill which would allow them to enforce their gambling restrictions, adding, quote, \"It's needed now more than ever.\"\n\nI want to note here that CNN has a partnership with Kalshi, a prediction market.\n\nAnd I'm bringing in Randall Williams, sports business reporter at Bloomberg.\n\nI wanted to talk to you, because as we are having this conversation about betting in general --\n\nRANDALL WILLIAMS, SPORTS BUSINESS REPORTER, BLOOMBERG NEWS: Sure.\n\nCORNISH: -- there is this push to regulate harder prediction markets. What's the difference between betting in a prediction market and betting with DraftKings or regular sports betting book at Vegas?\n\nWILLIAMS: Sure. So, let's say sports gambling is more \"I'm putting money into a sports book\" than \"I'm going to get that money right back.\"\n\nIn Kalshi and Polymarket, it's derivative based. And so, what the offerings of Kalshi and Polymarket have seen, you've been able to bet on Gatorade. You've been able to bet on the Gatorade color after a team wins a Super Bowl. You've been able to --\n\nCORNISH: Strikes in Iran.\n\nCORNISH: Capturing Maduro.\n\nWILLIAMS: All of these things are very, very manipulative because of the fact that people will seek out information in order to make a ton of money. That's called insider trading.\n\nAnd so, from a sports perspective, the last thing that you want, especially after all of these years of sports gambling with the MLB, with the NBA, with the NFL. We've seen suspensions across all of them in different cases and even at the federal level, as well. They're trying to get a handle on these things.\n\nWILLIAMS: Now, different leagues have different approaches. Some are partnering with them and trying to say, Hey, if we don't partner with them, then they're going to run rampant. Others are saying, not so fast. CORNISH: Yes.\n\nWILLIAMS: We want to see what happens first.\n\nCORNISH: So, to your point, the MLB has a data sharing agreement again, because they're trying to catch bad actors.\n\nCORNISH: I've been paying attention to this story, because we've actually talked here at CNN to, like, college-age adults. There was one story where the student said, the ads got me, and he was talking about prediction markets specifically.\n\nHe says, \"Predictions absolutely mean gambling. And frankly, I'm surprised you loopholed this so well to allow someone like me to gamble on this stuff.\"\n\nThis is what he was writing in his comments.\n\nCORNISH: \"A hundred percent should be banned before my -- before more kids like me use it, because God knows they shouldn't.\"\n\nNow, there's a couple of things that the sports leagues have written to federal regulators asking for: raising the betting age from 18 to 21.\n\nCORNISH: A ban on waging on your own team. We just talked about that in the introduction. Ban over/under bets on fouls and injuries, getting injured.\n\nCORNISH: And then mandatory fan conduct rules. What's going on there?\n\nWILLIAMS: Well, first of all, multifaceted. As far as the betting age, when you think about if you're on TikTok, if you're on ESPN, if you're on NBC, there are so many betting ads; and there's even betting sections of the shows.\n\nAs far as the kids themselves, when you're watching these things, whether it be Pat McAfee, whether it be \"First Take,\" whether it be \"SportsCenter,\" whether it be from FS1 and FOX, you're going to see so much of it that you're going to be like, well, why not?\n\nCORNISH: How bad could it be?\n\nWILLIAMS: How bad could it be? And then, it's like, you win once. Now you're chasing that thrill. And that can be a very addictive process. So, from the league perspective, they're like, OK, let's try to push\n\nthis until their brain is a little bit more fully developed, and then they can make their own decisions.\n\nBut the reality is the floodgates of gambling are already open. When you accept money, this is a possibility, and people are going to try to win a lot of it.\n\nCORNISH: So, Donald Trump actually was just posting about this on Truth Social, where he said, \"It's critically important that the CFTC's exclusive authority over prediction markets is maintained and that they will thrive.\"\n\nCan you talk about where he's coming down on this issue and where that compares to what the leagues are asking?\n\nWILLIAMS: Well, I think what President Trump is asking, I think is more impartial to or more partial to the fact that Kalshi and Polymarket have things that are outside of sports offering.\n\nYou mentioned some of the Iran war strikes. You mentioned when President Maduro was -- was captured. If you can bet on some of those things, like who's to say that doesn't leak and compromise an operation?\n\nAnd so, he is trying to get a hold on and say, hey, we have some things going on at the federal level that are a serious issue. I think those things run in line with some of the sports offerings, as well.\n\nBut it remains to be seen how well the sports world and President Trump will work together on these, because President Trump was at the Knicks game yesterday. He's also targeted the NFL for the Sports Broadcasting Act and trying to see if -- if you know, the district -- excuse me, the distribution among streamers and traditional broadcasters is too wide.\n\nSo, I think they are walking in the same path, but just at different paces.\n\nCORNISH: Do you have a question? You were looking.\n\nCHAMPION: No, I was just really curious, like, why is that his business?\n\nWILLIAMS: President Trump's?\n\nWILLIAMS: I think it's his business because of the fact that he just doesn't want leaks out there. He doesn't want to be known as the president who had insider trading at all of these different things that were going on that were a result of him. So, if someone's going to be making money from his operations, he wants it to be himself or the people around him.\n\nCORNISH: Well, I -- I should say -- we should note there is currently, I think, a U.S. service member who is facing --\n\nCORNISH: -- charges for allegedly placing wagers, contracts in prediction markets over the when and where of Maduro. So, it feels like these things are just now sort of entering the judicial system --\n\nCORNISH: -- where a lot of it will be hashed out.\n\nRandall, I want to let you go. But before I do, Knicks. Are you -- where are you on Trump as cooler or Knicks just had a bad night?\n\nWILLIAMS: Oh, I believe President Trump absolutely cursed the Knicks.\n\nCORNISH: Strong language. All day.\n\nWILLIAMS: Listen, I've been to several events that President Trump has attended: UFC events. I was at the Super Bowl that he attended, and all of them had different results.\n\nBut this one, I was like, I don't think he should go to this one just because of the fact that they were riding high. And now he shows up, and we see what happens.\n\nCHAMPION: Cooler. Yes.\n\nCORNISH: OK, the word from Bloomberg business. Local man says. No.\n\nStraight ahead on CNN THIS MORNING, it's primary day in Maine. We want to talk about that. Can voters there get over the scandals weighing down Democrat Graham Platner's campaign?\n\nPlus, a U.S. Army helicopter goes down in the Middle East. President Trump will be giving an update on the crew on board."}]},"2026-06-08":{"date":"2026-06-08","source_url":"https://transcripts.cnn.com/show/ctmo/date/2026-06-08/segment/01","full_translation":[{"en":"CNN This Morning 逐字稿（2026-06-08）：","cn":"CNN This Morning 逐字稿（2026-06-08）："},{"en":"Return to Transcripts main page","cn":"返回转录主页"},{"en":"Israel, Iran Trade Missile Attacks After Iran Targets Israeli Ramat David Airbase; Iran Threatens to Block Critical Bab al-Mandab Strait; Deadly 7.8 Magnitude Earthquake Hits Southern Philippines. Aired 5-5:30a ET","cn":"以色列与伊朗互射导弹，此前伊朗袭击以色列拉马特戴维空军基地；伊朗威胁封锁关键曼德海峡；菲律宾南部发生致命7.8级地震。美国东部时间凌晨5点至5点30分播出"},{"en":"Aired June 08, 2026 - 05:00   ET","cn":"播出日期：2026年6月8日 - 美国东部时间05:00"},{"en":"THIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED.","cn":"此为速记转录稿。此文本可能并非最终版本，且可能更新。"},{"en":"ANNOUNCER: This is CNN Breaking News!","cn":"播音员：这里是CNN突发新闻！"},{"en":"AUDIE CORNISH, ANCHOR, CNN THIS MORNING: We are following this breaking news out of the Middle East. Israel and Iran trading missile attacks, and the fragile ceasefire survive this test. Good morning, everybody, I'm Audie Cornish.","cn":"AUDIE CORNISH，CNN THIS MORNING主播：我们正在关注中东的突发新闻。以色列和伊朗互相发动导弹袭击，脆弱的停火协议能否经受住这次考验。大家早上好，我是Audie Cornish。"},{"en":"We're going to start with the strikes that have happened in the last few hours. Israel says it has identified a wave of missiles launched from Iran. New video into CNN overnight showing damage inside a home in the West Bank.","cn":"我们先从过去几小时发生的袭击说起。以色列称已识别出一波从伊朗发射的导弹。CNN夜间收到的新视频显示约旦河西岸一处房屋内部受损。"},{"en":"Now, this follows Israeli strikes on an Iranian petrochemical plant. The IDF saying that it hit several targets at that complex. Now, those retaliatory strikes appear to be in defiance of President Trump, who called Israeli Prime Minister Benjamin Netanyahu and had told him to hold off on striking back.","cn":"此前，以色列袭击了伊朗一家石化厂。以色列国防军称击中了该综合体的多个目标。这些报复性袭击似乎是在违抗特朗普总统的意愿，他曾致电以色列总理本雅明·内塔尼亚胡，要求他暂缓反击。"},{"en":"As tensions rise in the Middle East, so do oil prices. Both Brent Crude and WTI Crude up this morning. We've got live team coverage throughout the region. And we're going to start in Jerusalem with CNN's Oren Liebermann. Oren, first, can you just give us the latest on the strikes, what you've witnessed today?","cn":"随着中东紧张局势升级，油价也随之上涨。布伦特原油和西德克萨斯中质原油今早均上涨。我们在该地区有现场团队报道。我们将从耶路撒冷开始，连线CNN的Oren Liebermann。Oren，首先，你能给我们介绍一下袭击的最新情况吗？你今天目睹了什么？"},{"en":"OREN LIEBERMANN, CNN JERUSALEM BUREAU CHIEF: We have seen and heard several waves of incoming Iranian ballistic missiles since about 10:00 or 11 O'clock at night here local time. So, this has been going on for several hours. There were approximately three barrages in that first wave.","cn":"OREN LIEBERMANN，CNN耶路撒冷分社社长：自当地时间晚上10点或11点左右以来，我们目睹并听到了多波伊朗弹道导弹来袭。因此，这已经持续了几个小时。第一波大约有三轮齐射。"},{"en":"And then we have seen a few subsequent waves of incoming Iranian ballistic missiles. According to Israel's military, most of those have been intercepted. At first, they said all of those -- but when we followed up after what appeared to be some Iranian video of missiles getting through, they said it only applied to an earlier wave.","cn":"随后我们又看到了几波伊朗弹道导弹来袭。据以色列军方称，其中大部分已被拦截。起初，他们称全部被拦截——但当我们跟进时，似乎有一些伊朗视频显示导弹突破了拦截，他们表示这仅适用于较早的一波。"},{"en":"So, we're waiting to see if there is an update there. Meanwhile, Iran's military said they targeted the Ramat David Air Force Base in northern Israel. Israel has responded with its own attacks, and we have seen those progressively escalate from what Israel's ambassador to the U.S. described as attacks on surface-to-surface missiles and non-energy infrastructure to the strike.","cn":"因此，我们正在等待是否有更新。与此同时，伊朗军方表示他们瞄准了以色列北部的拉马特戴维空军基地。以色列已用自己的攻击进行回应，我们看到这些攻击逐步升级，从以色列驻美大使所说的对地对地导弹和非能源基础设施的攻击，升级到对石化设施的打击。"},{"en":"You mentioned on the petrochemical facility in western Iran. And then just an hour-and-a-half ago or so, the Israeli military said they carried out strikes against what they called strategic defense systems that would open up the skies to the Israeli Air Force if it moves in that direction.","cn":"你提到了伊朗西部的石化设施。大约一个半小时前，以色列军方表示他们对所谓的战略防御系统进行了打击，这些系统如果被摧毁，将为以色列空军在该方向行动打开天空。"},{"en":"We saw at the beginning of this war a few months ago that one of the first targets was Iran's surface-to-air missiles, and the idea there is that, if you take those out, then Israel's Air Force has to a large extent, freedom of the skies over Iran.","cn":"我们在几个月前这场战争开始时看到，首批目标之一是伊朗的地对空导弹，其思路是，如果摧毁这些导弹，那么以色列空军在很大程度上将拥有伊朗上空的制空权。"},{"en":"And that would also include the U.S. Air Force should this turn into a joint operation. Obviously, that's something we're watching very closely. Crucially, this very much looks like it's heating up, and on the escalation ladder, it's also worth noting, Audie, that the Houthis in Yemen; an Iranian proxy there, fired at least, one missile towards Israel several hours ago that was intercepted here.","cn":"如果这演变成联合行动，那也将包括美国空军。显然，这是我们密切关注的事情。关键是，这看起来正在升温，而且在升级阶梯上，值得注意的是，Audie，也门的胡塞武装——伊朗在那里的代理人——几个小时前向以色列发射了至少一枚导弹，但被拦截。"},{"en":"We have heard interceptions behind us over Jerusalem. We have seen warnings of incoming missiles in several other areas across the country. Here, as both Israel and Iran have indicated and publicly stated that they are prepared for at least days of this to continue.","cn":"我们听到身后耶路撒冷上空有拦截声。我们看到全国其他几个地区有导弹来袭警告。在这里，以色列和伊朗都已表示并公开声明，他们准备让这种情况至少持续数天。"},{"en":"CORNISH: You talked about that escalation ladder, and we have been hearing for weeks about Israel's sort of move into southern Lebanon as it goes after Hezbollah. We have the President of Lebanon here -- I want to play this clip so you can help us understand how these things intersect. Here he is.","cn":"CORNISH：你谈到了升级阶梯，几周来我们一直听到以色列在追击真主党时进入黎巴嫩南部的行动。我们这里有黎巴嫩总统——我想播放这段片段，以便你帮助我们理解这些事情如何相互关联。这是他的讲话。"},{"en":"JOSEPH AOUN, PRESIDENT, LEBANON: Our people being killed, our people being -- our houses being destroyed. They are using Lebanon as a chip -- bargaining chip in their negotiation with the United States. It's unacceptable.","cn":"JOSEPH AOUN，黎巴嫩总统：我们的人民正在被杀害，我们的人民——我们的房屋正在被摧毁。他们正在利用黎巴嫩作为筹码——与美国谈判的筹码。这是不可接受的。"},{"en":"CORNISH: So, he was speaking there about Tehran. Can you talk about their most recent strike in southern Lebanon, why it triggered this escalation?","cn":"CORNISH：他当时是在谈论德黑兰。你能谈谈他们最近在黎巴嫩南部的袭击吗？为什么它引发了这次升级？"},{"en":"LIEBERMANN: Well, Iran said last week that if Israel were to carry out an attack, the capital of Beirut, then Iran would directly attack Israel. And that's what we saw happen over what was a very volatile weekend between Israel and Hezbollah.","cn":"LIEBERMANN：嗯，伊朗上周表示，如果以色列对黎巴嫩首都贝鲁特发动袭击，那么伊朗将直接攻击以色列。这正是我们在以色列和真主党之间一个非常动荡的周末所看到的情况。"},{"en":"We saw -- we saw the number of people killed in Israeli strikes in Lebanon, according to the Lebanese Ministry of Public Health, rise above 3,600 since this war began some three months ago. And then, even since the latest U.S.-brokered ceasefire which was just several days ago, we saw Hezbollah carry out an attack on northern Israel.","cn":"我们看到——我们看到，根据黎巴嫩公共卫生部的数据，自大约三个月前这场战争开始以来，以色列在黎巴嫩袭击中死亡的人数已超过3600人。然后，即使在几天前美国斡旋的最新停火协议之后，我们看到真主党对以色列北部发动了袭击。"},{"en":"[05:05:00] That crossed Israel's red line, and Israel then carried out a strike on the Dahiya neighborhood in Beirut, which is considered a Hezbollah stronghold. Iran then carried out its threat or carried out on its threat launching those ballistic missiles on Sunday night directly at Israel.","cn":"[05:05:00] 这越过了以色列的红线，以色列随后对贝鲁特的达希耶社区发动了袭击，该社区被认为是真主党的据点。伊朗随后兑现了其威胁，于周日晚上直接向以色列发射了那些弹道导弹。"},{"en":"And that has led us to where we are right now. President Joseph Aoun, who was interviewed by our Christiane Amanpour, he made clear that he is trying to exercise Lebanese sovereignty, and that includes getting some sort of control over Iran's proxy, Hezbollah, and trying to find some sort of agreement that will lead to a withdrawal of Israeli forces from southern Lebanon and make Lebanon more whole.","cn":"这导致了我们现在的局面。接受我们Christiane Amanpour采访的约瑟夫·奥恩总统明确表示，他正在努力行使黎巴嫩主权，这包括对伊朗代理人真主党进行某种控制，并试图找到某种协议，导致以色列军队从黎巴嫩南部撤军，使黎巴嫩更加完整。"},{"en":"The problem is, you have an Israeli government that isn't in a position and doesn't want to withdraw from southern Lebanon now. You have an Iranian government that sees Hezbollah as its foothold in Lebanon, Hezbollah rejected the latest iteration of the -- of the ceasefire there.","cn":"问题是，以色列政府现在既没有能力也不愿意从黎巴嫩南部撤军。伊朗政府将真主党视为其在黎巴嫩的立足点，真主党拒绝了最新版本的停火协议。"},{"en":"And that puts the President Joseph Aoun in a very difficult situation. His Lebanese Armed Forces don't have the power and perhaps don't have the will to carry out any serious action against Hezbollah, even as he has tried to outlaw and ban Hezbollah's military activity.","cn":"这使约瑟夫·奥恩总统处于非常困难的境地。他的黎巴嫩武装部队没有能力，也许也没有意愿对真主党采取任何严肃行动，尽管他试图宣布真主党的军事活动为非法并予以禁止。"},{"en":"What's crucial here, Audie, is that what happens in Lebanon affects the U.S.-Iran ceasefire. Iran knows that. They know that President Donald Trump wants to get to a deal, and they're able to try to use Hezbollah and to some extent, use Lebanon as a bargaining chip to pressure Trump to try to rein in Prime Minister Benjamin Netanyahu when it comes to Lebanon.","cn":"关键的是，Audie，黎巴嫩发生的事情会影响美伊停火。伊朗知道这一点。他们知道唐纳德·特朗普总统想要达成协议，他们能够试图利用真主党，并在一定程度上利用黎巴嫩作为筹码，向特朗普施压，让他在黎巴嫩问题上约束本雅明·内塔尼亚胡总理。"},{"en":"CORNISH: Is there any chance of doing that? I think a lot of people are looking at these actions and thinking about how the President has spoken to Netanyahu, talked about taking down the temperature. What's the view in Israel about how Trump has been talking?","cn":"CORNISH：有没有可能做到这一点？我想很多人都在关注这些行动，并思考总统是如何与内塔尼亚胡交谈的，谈到要降温。以色列方面如何看待特朗普的言论？"},{"en":"LIEBERMANN: Trump made a number of public statements, or rather, gave a number of interviews to reporters in which he said it is Trump who calls the shots, not Netanyahu, ","cn":"LIEBERMANN：特朗普发表了一些公开声明，或者更确切地说，接受了一些记者采访，他在采访中表示是特朗普说了算，而不是内塔尼亚胡，"}],"vocabulary":[{"word":"fragile","phonetic":"/ˈfrædʒaɪl/","pos":"adj.","level":"考研","cn":"脆弱的，易碎的","en":"easily broken or damaged; weak and uncertain","excerpt":"the fragile ceasefire survive this test","example_cn":"脆弱的停火协议能否经受住这次考验"},{"word":"retaliatory","phonetic":"/rɪˈtæliətɔːri/","pos":"adj.","level":"六级","cn":"报复性的","en":"done against someone because they have done something unpleasant to you","excerpt":"those retaliatory strikes appear to be in defiance of President Trump","example_cn":"这些报复性袭击似乎是在违抗特朗普总统的意愿"},{"word":"in defiance of","phonetic":"/ɪn dɪˈfaɪəns ʌv/","pos":"phrase","level":"考研","cn":"无视，违抗","en":"refusing to obey someone or something","excerpt":"those retaliatory strikes appear to be in defiance of President Trump","example_cn":"这些报复性袭击似乎是在违抗特朗普总统的意愿"},{"word":"hold off","phonetic":"/hoʊld ɒf/","pos":"phrasal verb","level":"考研","cn":"推迟，暂缓","en":"to delay doing something","excerpt":"had told him to hold off on striking back","example_cn":"要求他暂缓反击"},{"word":"barrage","phonetic":"/ˈbærɑːʒ/","pos":"n.","level":"六级","cn":"齐射，弹幕；一连串","en":"a large number of bullets, shells, or questions directed at someone or something","excerpt":"There were approximately three barrages in that first wave","example_cn":"第一波大约有三轮齐射"},{"word":"intercept","phonetic":"/ˌɪntərˈsept/","pos":"v.","level":"考研","cn":"拦截，截击","en":"to stop someone or something that is going from one place to another","excerpt":"most of those have been intercepted","example_cn":"其中大部分已被拦截"},{"word":"progressively","phonetic":"/prəˈɡresɪvli/","pos":"adv.","level":"考研","cn":"逐渐地，逐步地","en":"gradually and steadily","excerpt":"we have seen those progressively escalate","example_cn":"我们看到这些攻击逐步升级"},{"word":"surface-to-air missile","phonetic":"/ˈsɜːrfɪs tuː eər ˈmɪsaɪl/","pos":"n.","level":"六级","cn":"地对空导弹","en":"a missile that is fired from the ground at aircraft","excerpt":"one of the first targets was Iran's surface-to-air missiles","example_cn":"首批目标之一是伊朗的地对空导弹"},{"word":"to a large extent","phonetic":"/tuː ə lɑːrdʒ ɪkˈstent/","pos":"phrase","level":"考研","cn":"在很大程度上","en":"mostly; to a great degree","excerpt":"Israel's Air Force has to a large extent, freedom of the skies over Iran","example_cn":"以色列空军在很大程度上将拥有伊朗上空的制空权"},{"word":"escalation ladder","phonetic":"/ˌeskəˈleɪʃn ˈlædər/","pos":"n.","level":"六级","cn":"升级阶梯（冲突逐步升级的阶段）","en":"a series of steps or stages in which a conflict becomes more serious","excerpt":"on the escalation ladder, it's also worth noting","example_cn":"在升级阶梯上，值得注意的是"},{"word":"proxy","phonetic":"/ˈprɒksi/","pos":"n.","level":"考研","cn":"代理人，代表","en":"a person or thing that acts for another","excerpt":"the Houthis in Yemen; an Iranian proxy there","example_cn":"也门的胡塞武装——伊朗在那里的代理人"},{"word":"bargaining chip","phonetic":"/ˈbɑːrɡɪnɪŋ tʃɪp/","pos":"n.","level":"六级","cn":"谈判筹码","en":"something that one side in a negotiation can use to gain an advantage","excerpt":"using Lebanon as a chip -- bargaining chip in their negotiation with the United States","example_cn":"利用黎巴嫩作为筹码——与美国谈判的筹码"},{"word":"sovereignty","phonetic":"/ˈsɒvrənti/","pos":"n.","level":"考研","cn":"主权","en":"the authority of a country to govern itself","excerpt":"he is trying to exercise Lebanese sovereignty","example_cn":"他正在努力行使黎巴嫩主权"},{"word":"foothold","phonetic":"/ˈfʊthoʊld/","pos":"n.","level":"六级","cn":"立足点，据点","en":"a place where a person or group can establish a position","excerpt":"Iranian government that sees Hezbollah as its foothold in Lebanon","example_cn":"伊朗政府将真主党视为其在黎巴嫩的立足点"},{"word":"rein in","phonetic":"/reɪn ɪn/","pos":"phrasal verb","level":"考研","cn":"控制，约束","en":"to control or limit someone or something","excerpt":"pressure Trump to try to rein in Prime Minister Benjamin Netanyahu","example_cn":"向特朗普施压，让他约束本雅明·内塔尼亚胡总理"},{"word":"call the shots","phonetic":"/kɔːl ðə ʃɒts/","pos":"phrase","level":"六级","cn":"发号施令，说了算","en":"to be in charge; to make the important decisions","excerpt":"it is Trump who calls the shots, not Netanyahu","example_cn":"是特朗普说了算，而不是内塔尼亚胡"}],"sentences":[{"en":"Now, those retaliatory strikes appear to be in defiance of President Trump, who called Israeli Prime Minister Benjamin Netanyahu and had told him to hold off on striking back.","cn":"现在，这些报复性袭击似乎是在违抗特朗普总统的意愿，他曾致电以色列总理本雅明·内塔尼亚胡，要求他暂缓反击。","structure":"主句 + 非限制性定语从句（who...）","analysis":"主句为'those retaliatory strikes appear to be in defiance of President Trump'，后接who引导的非限制性定语从句修饰President Trump，从句中'had told him to hold off on striking back'使用过去完成时，表示'打电话'发生在'袭击'之前。"},{"en":"We saw at the beginning of this war a few months ago that one of the first targets was Iran's surface-to-air missiles, and the idea there is that, if you take those out, then Israel's Air Force has to a large extent, freedom of the skies over Iran.","cn":"我们在几个月前这场战争开始时看到，首批目标之一是伊朗的地对空导弹，其思路是，如果摧毁这些导弹，那么以色列空军在很大程度上将拥有伊朗上空的制空权。","structure":"主句 + that宾语从句 + and连接并列句，其中第二个分句包含that表语从句，表语从句内含if条件状语从句","analysis":"主句'We saw...that...'后接宾语从句；and连接并列句，第二个分句'the idea there is that...'中that引导表语从句，表语从句内if引导条件状语从句。'take out'意为'摧毁'，'freedom of the skies'意为'制空权'。"},{"en":"And that would also include the U.S. Air Force should this turn into a joint operation.","cn":"如果这演变成联合行动，那也将包括美国空军。","structure":"主句 + 虚拟条件状语从句（should...）","analysis":"主句为'that would also include the U.S. Air Force'，后接should引导的虚拟条件状语从句，相当于'if this should turn into a joint operation'，表示对将来情况的假设。"},{"en":"Crucially, this very much looks like it's heating up, and on the escalation ladder, it's also worth noting, Audie, that the Houthis in Yemen; an Iranian proxy there, fired at least, one missile towards Israel several hours ago that was intercepted here.","cn":"关键是，这看起来正在升温，而且在升级阶梯上，值得注意的是，Audie，也门的胡塞武装——伊朗在那里的代理人——几个小时前向以色列发射了至少一枚导弹，但被拦截。","structure":"并列句，第一个分句含looks like宾语从句；第二个分句含it's worth noting that...主语从句，that从句内含定语从句","analysis":"第一个分句'this very much looks like it's heating up'中looks like后接宾语从句；第二个分句'it's worth noting...that...'中it为形式主语，that引导主语从句，主语从句中'that was intercepted here'为定语从句修饰'missile'。分号用于插入同位语'an Iranian proxy there'。"},{"en":"President Joseph Aoun, who was interviewed by our Christiane Amanpour, he made clear that he is trying to exercise Lebanese sovereignty, and that includes getting some sort of control over Iran's proxy, Hezbollah, and trying to find some sort of agreement that will lead to a withdrawal of Israeli forces from southern Lebanon and make Lebanon more whole.","cn":"接受我们Christiane Amanpour采访的约瑟夫·奥恩总统明确表示，他正在努力行使黎巴嫩主权，这包括对伊朗代理人真主党进行某种控制，并试图找到某种协议，导致以色列军队从黎巴嫩南部撤军，使黎巴嫩更加完整。","structure":"主句（含非限制性定语从句）+ that宾语从句 + and连接并列谓语，第二个谓语包含that定语从句","analysis":"主句'President Joseph Aoun...he made clear that...'中who引导非限制性定语从句修饰President Joseph Aoun；that引导宾语从句，宾语从句中'and that includes...'中that指代前文；'getting...and trying...'为并列动名词短语作includes的宾语；'that will lead to...'为定语从句修饰'agreement'。"},{"en":"His Lebanese Armed Forces don't have the power and perhaps don't have the will to carry out any serious action against Hezbollah, even as he has tried to outlaw and ban Hezbollah's military activity.","cn":"他的黎巴嫩武装部队没有能力，也许也没有意愿对真主党采取任何严肃行动，尽管他试图宣布真主党的军事活动为非法并予以禁止。","structure":"主句 + even as引导的让步状语从句","analysis":"主句'His Lebanese Armed Forces don't have the power and perhaps don't have the will to carry out any serious action against Hezbollah'中'to carry out...'为不定式短语作定语修饰'the will'；'even as'引导让步状语从句，意为'尽管'。"},{"en":"They know that President Donald Trump wants to get to a deal, and they're able to try to use Hezbollah and to some extent, use Lebanon as a bargaining chip to pressure Trump to try to rein in Prime Minister Benjamin Netanyahu when it comes to Lebanon.","cn":"他们知道唐纳德·特朗普总统想要达成协议，他们能够试图利用真主党，并在一定程度上利用黎巴嫩作为筹码，向特朗普施压，让他在黎巴嫩问题上约束本雅明·内塔尼亚胡总理。","structure":"并列句，第一个分句含that宾语从句；第二个分句含不定式短语作目的状语，以及when引导的时间状语从句","analysis":"第一个分句'They know that...'中that引导宾语从句；第二个分句'they're able to try to use...and...use...as a bargaining chip to pressure...'中'to pressure...'为目的状语；'when it comes to Lebanon'为时间状语从句，意为'当涉及黎巴嫩时'。"}],"topics":[{"title":"以色列与伊朗的导弹袭击与冲突升级","content":"2026年6月8日，以色列和伊朗互相发动导弹袭击。伊朗袭击了以色列的拉马特戴维空军基地，以色列则打击了伊朗的石化设施和战略防御系统。此次冲突源于以色列对黎巴嫩真主党的打击，伊朗此前威胁若以色列袭击贝鲁特将直接攻击以色列。美国试图斡旋停火，但局势持续升温。关键术语：Ramat David Airbase（拉马特戴维空军基地）、ballistic missiles（弹道导弹）、escalation ladder（升级阶梯）。","keywords":"Ramat David Airbase · ballistic missiles · escalation ladder"},{"title":"黎巴嫩真主党与地区代理人战争","content":"真主党是伊朗在黎巴嫩的代理人，拥有强大军事力量。以色列与真主党冲突已导致黎巴嫩超过3600人死亡。美国斡旋的停火协议脆弱，真主党仍发动袭击，以色列则打击贝鲁特达希耶社区。黎巴嫩总统约瑟夫·奥恩试图行使主权，但黎巴嫩军队无力控制真主党。伊朗利用真主党作为谈判筹码，影响美伊停火谈判。关键术语：Hezbollah（真主党）、proxy（代理人）、bargaining chip（谈判筹码）。","keywords":"Hezbollah · proxy · bargaining chip"},{"title":"美国在中东的外交与军事角色","content":"美国总统特朗普试图通过电话外交缓和以色列与伊朗的紧张关系，要求内塔尼亚胡暂缓反击，但以色列似乎违抗其意愿。特朗普公开表示自己说了算，但实际影响力有限。美国可能参与联合军事行动，若冲突升级。同时，美国斡旋的黎巴嫩停火协议未能持久。关键术语：President Trump（特朗普总统）、ceasefire（停火）、joint operation（联合行动）。","keywords":"President Trump · ceasefire · joint operation"},{"title":"曼德海峡的战略重要性","content":"伊朗威胁封锁曼德海峡（Bab al-Mandab Strait），该海峡是连接红海与亚丁湾的关键航道，全球约10%的石油贸易经过此处。胡塞武装作为伊朗代理人，控制也门部分区域，曾袭击沙特石油设施。封锁海峡将导致油价飙升，影响全球经济。关键术语：Bab al-Mandab Strait（曼德海峡）、oil prices（油价）、Houthis（胡塞武装）。","keywords":"Bab al-Mandab Strait · oil prices · Houthis"},{"title":"菲律宾南部7.8级地震","content":"2026年6月8日，菲律宾南部发生7.8级地震，造成人员伤亡和财产损失。菲律宾位于环太平洋火山地震带，地震频发。此次地震可能引发海啸，当局已发布预警。关键术语：7.8 magnitude earthquake（7.8级地震）、Southern Philippines（菲律宾南部）、tsunami（海啸）。","keywords":"7.8 magnitude earthquake · Southern Philippines · tsunami"}],"raw_transcript":"Return to Transcripts main page\n\nIsrael, Iran Trade Missile Attacks After Iran Targets Israeli Ramat David Airbase; Iran Threatens to Block Critical Bab al-Mandab Strait; Deadly 7.8 Magnitude Earthquake Hits Southern Philippines. Aired 5-5:30a ET\n\nAired June 08, 2026 - 05:00   ET\n\nTHIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED.\n\nANNOUNCER: This is CNN Breaking News!\n\nAUDIE CORNISH, ANCHOR, CNN THIS MORNING: We are following this breaking news out of the Middle East. Israel and Iran trading missile attacks, and the fragile ceasefire survive this test. Good morning, everybody, I'm Audie Cornish.\n\nWe're going to start with the strikes that have happened in the last few hours. Israel says it has identified a wave of missiles launched from Iran. New video into CNN overnight showing damage inside a home in the West Bank.\n\nNow, this follows Israeli strikes on an Iranian petrochemical plant. The IDF saying that it hit several targets at that complex. Now, those retaliatory strikes appear to be in defiance of President Trump, who called Israeli Prime Minister Benjamin Netanyahu and had told him to hold off on striking back.\n\nAs tensions rise in the Middle East, so do oil prices. Both Brent Crude and WTI Crude up this morning. We've got live team coverage throughout the region. And we're going to start in Jerusalem with CNN's Oren Liebermann. Oren, first, can you just give us the latest on the strikes, what you've witnessed today?\n\nOREN LIEBERMANN, CNN JERUSALEM BUREAU CHIEF: We have seen and heard several waves of incoming Iranian ballistic missiles since about 10:00 or 11 O'clock at night here local time. So, this has been going on for several hours. There were approximately three barrages in that first wave.\n\nAnd then we have seen a few subsequent waves of incoming Iranian ballistic missiles. According to Israel's military, most of those have been intercepted. At first, they said all of those -- but when we followed up after what appeared to be some Iranian video of missiles getting through, they said it only applied to an earlier wave.\n\nSo, we're waiting to see if there is an update there. Meanwhile, Iran's military said they targeted the Ramat David Air Force Base in northern Israel. Israel has responded with its own attacks, and we have seen those progressively escalate from what Israel's ambassador to the U.S. described as attacks on surface-to-surface missiles and non-energy infrastructure to the strike.\n\nYou mentioned on the petrochemical facility in western Iran. And then just an hour-and-a-half ago or so, the Israeli military said they carried out strikes against what they called strategic defense systems that would open up the skies to the Israeli Air Force if it moves in that direction.\n\nWe saw at the beginning of this war a few months ago that one of the first targets was Iran's surface-to-air missiles, and the idea there is that, if you take those out, then Israel's Air Force has to a large extent, freedom of the skies over Iran.\n\nAnd that would also include the U.S. Air Force should this turn into a joint operation. Obviously, that's something we're watching very closely. Crucially, this very much looks like it's heating up, and on the escalation ladder, it's also worth noting, Audie, that the Houthis in Yemen; an Iranian proxy there, fired at least, one missile towards Israel several hours ago that was intercepted here.\n\nWe have heard interceptions behind us over Jerusalem. We have seen warnings of incoming missiles in several other areas across the country. Here, as both Israel and Iran have indicated and publicly stated that they are prepared for at least days of this to continue.\n\nCORNISH: You talked about that escalation ladder, and we have been hearing for weeks about Israel's sort of move into southern Lebanon as it goes after Hezbollah. We have the President of Lebanon here -- I want to play this clip so you can help us understand how these things intersect. Here he is.\n\nJOSEPH AOUN, PRESIDENT, LEBANON: Our people being killed, our people being -- our houses being destroyed. They are using Lebanon as a chip -- bargaining chip in their negotiation with the United States. It's unacceptable.\n\nCORNISH: So, he was speaking there about Tehran. Can you talk about their most recent strike in southern Lebanon, why it triggered this escalation?\n\nLIEBERMANN: Well, Iran said last week that if Israel were to carry out an attack, the capital of Beirut, then Iran would directly attack Israel. And that's what we saw happen over what was a very volatile weekend between Israel and Hezbollah.\n\nWe saw -- we saw the number of people killed in Israeli strikes in Lebanon, according to the Lebanese Ministry of Public Health, rise above 3,600 since this war began some three months ago. And then, even since the latest U.S.-brokered ceasefire which was just several days ago, we saw Hezbollah carry out an attack on northern Israel.\n\n[05:05:00] That crossed Israel's red line, and Israel then carried out a strike\n\non the Dahiya neighborhood in Beirut, which is considered a Hezbollah stronghold. Iran then carried out its threat or carried out on its threat launching those ballistic missiles on Sunday night directly at Israel.\n\nAnd that has led us to where we are right now. President Joseph Aoun, who was intervi   currentData = data;
  document.getElementById('topbarDate').textContent = data.date||'';
  document.getElementById('topbarTitle').textContent = 'CNN This Morning · ' + (data.date||'');

  // 使用 segments 数组渲染原文
  renderSegmentedTranscript(data.segments || [], data.vocabulary || []);
  renderWordList(data.vocabulary || []);
  renderVocab(data.vocabulary || []);
  renderSentences(data.sentences || []);
  renderTopics(data.topics || []);

  const transDiv = document.getElementById('fullTranslation');
  if(transDiv) transDiv.innerHTML = esc(data.full_translation || '暂无全文翻译，请重新运行生成。');
}

function renderSegmentedTranscript(segments, vocab){
  const container = document.getElementById('transcriptBody');
  if(!segments || segments.length === 0){
    container.innerHTML = '<div class="cnnBodyText">无分段数据</div>';
    return;
  }
  const vocabMap = {};
  vocab.forEach(v=>{ vocabMap[v.word.toLowerCase()] = v; });
  const sortedWords = Object.keys(vocabMap).sort((a,b)=>b.length-a.length);

  let html = '';
  for(let seg of segments){
    const title = seg.title || `Segment ${seg.seg}`;
    const rawText = seg.text || '';
    const highlighted = highlightWordsWithHover(rawText, sortedWords, vocabMap);
    html += `
      <div class="segment-block">
        <div class="segment-title">📺 ${esc(title)}</div>
        <div class="cnnBodyText">${highlighted}</div>
      </div>
    `;
  }
  container.innerHTML = html;
}

function highlightWordsWithHover(text, sortedWords, vocabMap){
  if(!text) return '';
  const positions = [];
  const lc = text.toLowerCase();
  sortedWords.forEach(word=>{
    let idx = 0;
    while((idx = lc.indexOf(word, idx)) !== -1){
      const before = idx === 0 || !/[a-z]/i.test(text[idx-1]);
      const after  = idx+word.length >= text.length || !/[a-z]/i.test(text[idx+word.length]);
      if(before && after){
        const overlaps = positions.some(p=> idx < p.end && idx+word.length > p.start);
        if(!overlaps){
          positions.push({start:idx, end:idx+word.length, word, vocab:vocabMap[word]});
        }
      }
      idx += word.length;
    }
  });
  if(!positions.length) return esc(text);
  positions.sort((a,b)=>a.start-b.start);

  let result = '';
  let last = 0;
  // 段落分割（保留原始格式）
  const paragraphs = text.split(/\n\s*\n/);
  let globalPos = 0;
  for (let para of paragraphs) {
    let paraStart = globalPos;
    let paraEnd = globalPos + para.length;
    const paraPositions = positions.filter(p => p.start >= paraStart && p.start < paraEnd);
    let lastParaPos = paraStart;
    for (let p of paraPositions) {
      result += esc(text.slice(lastParaPos, p.start));
      const word = p.word;
      const vocabData = p.vocab;
      const lv = vocabData.level || '';
      const lvClass = `level-${lv}`;
      const cnMeaning = vocabData.cn || '';
      const safeTitle = cnMeaning.replace(/["']/g, '&quot;');
      result += `<span class="cnnTransHighlight" data-word="${esc(word)}" title="${safeTitle}" onclick="showVocabPopup(event,'${esc(word)}')">${esc(word)}</span>`;
      lastParaPos = p.end;
    }
    result += esc(text.slice(lastParaPos, paraEnd));
    globalPos = paraEnd + 2;
  }
  return result;
}

function showVocabPopup(e, word){
  e.stopPropagation();
  const data = currentData?.vocabulary?.find(v=>v.word===word);
  if(!data) return;

  document.querySelectorAll('.cnnTransHighlight').forEach(el=>{
    el.classList.toggle('active', el.dataset.word===word);
  });
  document.querySelectorAll('.word-chip').forEach(el=>{
    el.classList.toggle('active', el.dataset.word===word);
  });

  document.getElementById('vpWord').textContent = data.word;
  document.getElementById('vpPh').textContent   = data.phonetic||'';
  document.getElementById('vpPos').textContent  = data.pos||'';
  document.getElementById('vpLv').textContent   = data.level||'';
  document.getElementById('vpCn').textContent   = data.cn||'';
  document.getElementById('vpEn').textContent   = data.en||'';

  const popup = document.getElementById('vocabPopup');
  popup.classList.add('show');
  popup.style.pointerEvents = 'auto';
  popup.style.display = 'block';

  let x = e.clientX + 12, y = e.clientY + 12;
  if(x + 300 > window.innerWidth) x = e.clientX - 312;
  if(y + 160 > window.innerHeight) y = e.clientY - 160;
  popup.style.left = x + 'px';
  popup.style.top  = y + 'px';
}

document.addEventListener('click', e=>{
  if(!e.target.classList.contains('cnnTransHighlight') && !e.target.closest('.vocab-popup') && !e.target.closest('.word-chip')){
    document.getElementById('vocabPopup').classList.remove('show');
    document.getElementById('vocabPopup').style.display = 'none';
    document.querySelectorAll('.cnnTransHighlight.active').forEach(el=>el.classList.remove('active'));
    document.querySelectorAll('.word-chip.active').forEach(el=>el.classList.remove('active'));
  }
});

function renderWordList(vocab){
  document.getElementById('wordList').innerHTML = vocab.map(v=>`
    <div class="word-chip" data-word="${esc(v.word)}" onclick="jumpToWord('${esc(v.word)}')">
      <span class="wc-lv" style="background:${LV_COLORS[v.level]||'#0a58ca'}"></span>
      <span class="wc-word">${esc(v.word)}</span>
      <span class="wc-cn">${esc(v.cn||'')}</span>
    </div>`).join('');
}

function jumpToWord(word){
  switchTab('transcript');
  setTimeout(()=>{
    const el = document.querySelector(`.cnnTransHighlight[data-word="${word}"]`);
    if(el){
      el.scrollIntoView({behavior:'smooth', block:'center'});
      el.click();
    }
  }, 50);
}

function renderVocab(list){
  document.getElementById('vocabGrid').innerHTML = list.map(v=>`
    <div class="vcard">
      <div class="vhead">
        <span class="vword">${esc(v.word)}</span>
        <span class="vph">${esc(v.phonetic||'')}</span>
        <span class="bpos">${esc(v.pos||'')}</span>
        <span class="blv">${esc(v.level||'')}</span>
      </div>
      <div class="vcn">${esc(v.cn)}</div>
      <div class="ven">${esc(v.en||'')}</div>
      <div class="veg">
        ${hlWord(v.excerpt||v.example||'', v.word)}
        <div class="vegcn">${esc(v.example_cn||'')}</div>
      </div>
    </div>`).join('');
}

function hlWord(text, word){
  if(!word||!text) return esc(text);
  const re = new RegExp(`(${word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return esc(text).replace(re,'<em>$1</em>');
}

function renderSentences(list){
  document.getElementById('sentenceList').innerHTML = list.map((s,i)=>`
    <div class="scard">
      <div class="snum">${i+1}</div>
      <div class="sen-en">${esc(s.en)}</div>
      <div class="sen-cn">${esc(s.cn)}</div>
      <div class="divider"></div>
      <div class="alabel">句子结构</div>
      <div class="abody">${esc(s.structure||'')}</div>
      <div class="alabel">语法分析</div>
      <div class="abody">${esc(s.analysis||'')}</div>
    </div>`).join('');
}

function renderTopics(list){
  const colors = ['#0a58ca','#d6336c','#146c43','#e68a2e'];
  document.getElementById('topicList').innerHTML = list.map((t,i)=>`
    <div class="tcard">
      <div class="ttitle">
        <span class="tdot" style="background:${colors[i%colors.length]}"></span>
        ${esc(t.title)}
      </div>
      <div class="tcontent">${esc(t.content)}</div>
      <div class="tkw">🔑 ${esc(t.keywords||'')}</div>
    </div>`).join('');
}

function switchTab(id){
  const tabs = ['transcript','translation','vocab','sentences','topics'];
  tabs.forEach(t=>{
    const idx = tabs.indexOf(t);
    const tabBtn = document.querySelectorAll('.tab')[idx];
    if(tabBtn) tabBtn.classList.toggle('active', t===id);
    const section = document.getElementById(t);
    if(section) section.classList.toggle('active', t===id);
  });
}

function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
</script>
