    <style>
        :root {
            --bg: #ffffff;
            --bg2: #ffffff;
            --bg3: #f8f9fa;
            --bg4: #f1f3f5;
            --border: #e9ecef;
            --border2: #dee2e6;
            --text: #212529;
            --text2: #495057;
            --text3: #6c757d;
            --blue: #0a58ca;
            --blue-dim: #e7f1ff;
            --red: #cc0000;
            --green: #146c43;
            --amber: #e68a2e;
            --coral: #d6336c;
            --teal: #0f8b8b;
            --purple: #6f42c1;
            --hl-yellow: rgba(255, 243, 205, 0.8);
            --hl-yellow-border: rgba(255, 193, 7, 0.8);
            --hl-active: rgba(255, 230, 150, 0.9);
            --r: 6px;
            --font: 'Verdana', 'Arial', 'Helvetica', sans-serif;
            --mono: 'Consolas', 'Monaco', monospace;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html, body {
            min-width: 1200px;
            overflow-x: auto;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
        }
        .layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            min-height: 100vh;
        }
        .sidebar {
            background: var(--bg3);
            border-right: 1px solid var(--border);
            padding: 1.5rem;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }
        .sidebar-logo {
            font-size: 18px;
            font-weight: bold;
            color: var(--red);
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
            margin-bottom: 1rem;
        }
        .directory-section {
            margin-bottom: 1.5rem;
        }
        .directory-section .section-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }
        .directory-item {
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 4px;
            transition: background 0.15s;
            margin-bottom: 8px;
        }
        .directory-item:hover {
            background: var(--bg4);
        }
        .directory-item.active {
            background: var(--blue-dim);
            border-left: 3px solid var(--blue);
        }
        .item-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
        }
        .item-date {
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
        }
        .item-title {
            font-size: 12px;
            color: var(--text2);
        }
        .main {
            padding: 1.5rem;
        }
        .topbar {
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .topbar-title {
            font-size: 18px;
            font-weight: bold;
            color: var(--red);
        }
        .topbar-date {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text2);
        }
        .btn-src {
            background: var(--bg3);
            border: 1px solid var(--border);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            margin-left: auto;
        }
        .btn-src:hover {
            background: var(--bg4);
        }
        /* 标签栏：仅保留 原文/词汇/难句/背景，移除翻译 */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 1.5rem;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 4px;
        }
        .tab {
            flex: 1;
            padding: 7px 0;
            font-size: 13px;
            text-align: center;
            border-radius: 7px;
            cursor: pointer;
            color: var(--text2);
            transition: all .15s;
        }
        .tab.active {
            background: var(--blue);
            color: #fff;
        }
        .section {
            display: none;
        }
        .section.active {
            display: block;
        }
        .transcript-body {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 1.5rem;
            font-family: var(--font);
            line-height: 1.75;
        }
        .segment-block {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }
        .segment-block:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }
        .segment-title {
            font-size: 14px;
            font-weight: bold;
            color: var(--red);
            margin-bottom: 0.75rem;
            padding-bottom: 4px;
            border-bottom: 1px solid var(--border);
        }
        .para {
            margin-bottom: 1rem;
            white-space: pre-wrap;
        }
        .hl {
            background: var(--hl-yellow);
            border-bottom: 2px solid var(--hl-yellow-border);

            cursor: pointer;
            padding: 0 2px;
            transition: background 0.15s;
        }
        .hl:hover, .hl.active {
            background: var(--hl-active);
        }
        .hl.level-考研 {
            border-bottom-color: #e68a2e;
        }
        .hl.level-六级 {
            border-bottom-color: #0a58ca;
        }
        .hl.level-专四 {
            border-bottom-color: #6f42c1;
        }
        .hl.level-专八 {
            border-bottom-color: #d6336c;
        }
        /* 单词弹窗样式（桌面稳定，手机不再自适应） */
        .vocab-popup {
            position: fixed;
            z-index: 200;
            max-width: 320px;
            background: var(--bg2);
            border: 1px solid var(--border2);
            border-radius: var(--r);
            padding: 0.8rem 1rem;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            display: none;
            font-size: 13px;
            line-height: 1.5;
        }
        .vocab-popup.show {
            display: block;
        }
        .popup-word {
            font-size: 16px;
            font-weight: bold;
            color: var(--red);
            margin-right: 8px;
        }
        .popup-phonetic {
            font-family: var(--mono);
            color: var(--text2);
            font-size: 12px;
        }
        .popup-badges {
            margin: 5px 0;
        }
        .popup-pos {
            display: inline-block;
            background: var(--bg3);
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 11px;
            margin-right: 6px;
        }
        .popup-level {
            display: inline-block;
            background: #fef2e0;
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 11px;
            color: #b45b0a;
        }
        .popup-cn {
            font-weight: 500;
            color: var(--blue);
            margin: 6px 0 4px;
        }
        .popup-en {
            color: var(--text2);
            margin-bottom: 8px;
        }
        .popup-excerpt {
            background: var(--bg3);
            padding: 6px 8px;
            border-left: 2px solid var(--blue);
            font-size: 12px;
            margin-top: 6px;
        }
        .vocab-grid, .scard, .tcard {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 1rem;
            margin-bottom: 12px;
        }
        .vword {
            font-size: 18px;
            font-weight: 700;
            color: var(--red);
        }
        .empty {
            text-align: center;
            padding: 3rem;
            color: var(--text2);
        }
        .card-label {
            font-weight: bold;
            margin-bottom: 12px;
        }
    </style>

<script>
const ALL_DATA = {"2026-06-11":{"date":"2026-06-11","source_url":"https://transcripts.cnn.com/show/ctmo/date/2026-06-11/segment/01","full_translation":[{"paragraph":"Return to Transcripts main page\n\nU.S. and Iran Trade Strikes: Is a Peace Deal Dead?; Knicks Take Game 4 with Historic 29-Point Comeback. Aired 6-6:30a ET\n\nAired June 11, 2026 - 06:00   ET\n\nTHIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED.","translation":"返回文稿主页\n\n美国与伊朗互相打击：和平协议已死？尼克斯队以历史性的29分逆转赢得第四场比赛。播出时间：美国东部时间早上6点至6点30分\n\n播出日期：2026年6月11日 - 美国东部时间06:00\n\n此为速记文稿。此副本可能并非最终版本，且可能更新。"},{"paragraph":"BRAD SMITH, CNN ANCHOR: Well, that does it for CNN HEADLINE EXPRESS. I'm Brad Smith. CNN THIS MORNING with Audie Cornish starts right now.","translation":"CNN主播布拉德·史密斯：好了，CNN头条快讯到此结束。我是布拉德·史密斯。由奥黛·科尼什主持的《CNN今晨》现在开始。"},{"paragraph":"ERICA HILL, CNN ANCHOR: New overnight, the United States and Iran trading attacks for a second straight day as President Trump promises more to come if Tehran does not immediately agree to a peace deal.","translation":"CNN主播埃里卡·希尔：最新消息，美国与伊朗连续第二天互相攻击，特朗普总统承诺，如果德黑兰不立即同意和平协议，将会有更多打击。"},{"paragraph":"DONALD TRUMP, U.S. PRESIDENT: We're going to be attacking them and attacking them very hard, and we'll see what happens with the deal.","translation":"美国总统唐纳德·特朗普：我们将攻击他们，非常猛烈地攻击他们，然后看看协议会如何发展。"},{"paragraph":"HILL: Plus, new revelations about how the White House handled the Epstein scandal, meeting in the Situation Room to game out a plan without President Trump.","translation":"希尔：此外，还有关于白宫如何处理爱泼斯坦丑闻的新爆料，他们在战情室开会，在没有特朗普总统的情况下制定计划。"},{"paragraph":"TRUMP: You know what I really love? I love the inflation.","translation":"特朗普：你知道我真正喜欢什么吗？我喜欢通货膨胀。"},{"paragraph":"HILL: The president suggests, as you just heard, he doesn't mind the high prices right now. But what about Americans paying more for groceries and gas?","translation":"希尔：正如你刚才听到的，总统暗示他现在不介意高物价。但那些为食品杂货和汽油支付更多费用的美国人呢？"},{"paragraph":"A stabbing in Northern Ireland sparking days of unrest. Police under attack. The streets in chaos.","translation":"北爱尔兰发生一起持刀伤人事件，引发多日骚乱。警察遭到袭击。街头一片混乱。"},{"paragraph":"GIANNI INFANTINO, PRESIDENT, FIFA: The soul and the heart is the fans in the stadiums. It's the fans in the fan zones.","translation":"国际足联主席詹尼·因凡蒂诺：灵魂和核心是体育场里的球迷，是球迷区的球迷。"},{"paragraph":"HILL: The World Cup officially kicking off today, finally. Could we also see a much-needed vibe shift away from the outrage over ticket prices and immigration issues?","translation":"希尔：世界杯今天终于正式开幕。我们是否也能看到一种急需的氛围转变，摆脱对票价和移民问题的愤怒？"},{"paragraph":"UNIDENTIFIED MALE: Shot no good. The tip-up's good. It's good, it's good. With one point. (END VIDEO CLIP)","translation":"身份不明的男性：投篮不中。补篮进了。进了，进了。领先一分。（视频片段结束）"},{"paragraph":"HILL: A historic comeback. Down 29 points. That last-second tip gives the Knicks a 3-1 advantage. Now just one win away from the NBA championship.","translation":"希尔：历史性的逆转。落后29分。最后时刻的补篮让尼克斯队以3-1领先。现在距离NBA总冠军仅差一场胜利。"},{"paragraph":"TRUMP: We were really close to a deal, but they keep tapping us along. They keep playing us for suckers.","translation":"特朗普：我们本来非常接近达成协议，但他们一直在拖延我们。他们一直把我们当傻子耍。"},{"paragraph":"HILL: President Trump choosing military might over diplomacy. But can he bomb Tehran into a deal?","translation":"希尔：特朗普总统选择军事力量而非外交手段。但他能通过轰炸迫使德黑兰达成协议吗？"},{"paragraph":"Good morning, everyone. I'm Erica Hill, in on this Thursday for Audie Cornish. Nice to have you with us.","translation":"大家早上好。我是埃里卡·希尔，这个周四代替奥黛·科尼什主持。很高兴大家收看。"},{"paragraph":"We do begin this hour with the tit-for-tat strikes between the U.S. and Iran and the promise for more from the White House.","translation":"我们这一小时首先关注美国与伊朗之间的针锋相对的打击，以及白宫承诺的更多行动。"},{"paragraph":"HILL: The U.S. says it targeted Iran's surveillance capabilities, communication systems and air defense sites. Iran hitting back with attacks on U.S. bases in the region.","translation":"希尔：美国表示其目标是伊朗的监控能力、通信系统和防空设施。伊朗则以攻击美国在该地区的基地作为回击。"},{"paragraph":"On a call from the Situation Room, President Trump told FOX News if Iran did not agree to a deal, he would bomb the expletive out of them, calling this the most violated ceasefire in history.","translation":"在战情室的通话中，特朗普总统告诉福克斯新闻，如果伊朗不同意协议，他将把他们炸个屁滚尿流，并称这是历史上最被违反的停火协议。"},{"paragraph":"PETE HEGSETH, SECRETARY OF DEFENSE: You can see when someone's trying to tap, tap, tap on a deal. Instead, they're going to have tap, tap, tap bombs dropping on key facilities in Iran from the United States of America.","translation":"国防部长皮特·赫格塞斯：你可以看到当有人试图拖延协议时。相反，他们将迎来美国炸弹不断落在伊朗的关键设施上。"},{"paragraph":"If we need to negotiate with bombs, we'll negotiate with bombs. And we're very good at it.","translation":"如果我们需要用炸弹谈判，我们就用炸弹谈判。而且我们非常擅长。"},{"paragraph":"HILL: So, will those threats actually get Tehran to the table?","translation":"希尔：那么，这些威胁真的能让德黑兰回到谈判桌吗？"},{"paragraph":"AMIR-SAEID IRAVANI, IRAN'S AMBASSADOR TO THE UNITED NATIONS: No sustainable deal can be reached through threats, intimidation, or the use of force. The president of the United States should refrain from his recurring threats against Iran, including his renewed threat of force made today.","translation":"伊朗驻联合国大使阿米尔-赛义德·伊拉瓦尼：通过威胁、恐吓或使用武力无法达成任何可持续的协议。美国总统应停止其对伊朗的一再威胁，包括今天再次发出的武力威胁。"},{"paragraph":"Iran has never negotiated under threats and pressure and will never submit to pressure or coercion.","translation":"伊朗从未在威胁和压力下进行谈判，也永远不会屈服于压力或胁迫。"},{"paragraph":"HILL: Joining me now, former defense intelligence official, Major Harrison Mann. It's good to have you with us this morning.","translation":"希尔：现在加入我们的是前国防情报官员哈里森·曼少校。今早很高兴您能来。"},{"paragraph":"So, we heard from Secretary Hegseth there saying, you know, we will continue to negotiate with bombs. Is that actually the way to get Iran to the table? It does not seem to be working in this moment.","translation":"那么，我们听到赫格塞斯部长说，我们将继续用炸弹谈判。这真的是让伊朗回到谈判桌的方法吗？目前看来似乎并不奏效。"},{"paragraph":"MAJ. HARRISON MANN, FORMER DEFENSE INTELLIGENCE OFFICIAL: Hi, Erica.","translation":"前国防情报官员哈里森·曼少校：你好，埃里卡。"},{"paragraph":"We know for certain from recent history that it is not the way to get Iran to negotiate. They tried bombing Iran for 40 days. It didn't work.","translation":"我们从最近的历史中确切知道，这不是让伊朗谈判的方式。他们曾尝试轰炸伊朗40天，但没有成功。"},{"paragraph":"Then they tried the blockade for another two months. That hasn't worked. And they're out of ideas. So, I guess they're trying to bomb a second time.","translation":"然后他们又尝试封锁了两个月。这也没有奏效。他们没辙了。所以，我猜他们正在尝试第二次轰炸。"},{"paragraph":"It's -- it's unfortunate, because I think there is still a possibility for peace when the Trump administration gets serious about actually negotiating, which is going to require them making some concessions.","translation":"这很不幸，因为我认为当特朗普政府认真对待实际谈判时，和平仍有可能，但这需要他们做出一些让步。"},{"paragraph":"But for now, they're clearly not willing to do that. And so, they're going to start bombing again.","translation":"但就目前而言，他们显然不愿意这样做。所以，他们将再次开始轰炸。"},{"paragraph":"The -- the other really worrying escalation we saw yesterday was an apparent war crime: a U.S. targeted precision strike on a water reservoir for drinking water in Iran near Hormuz. And that's something Trump has threatened several times over the past eight weeks, you know, when he got frustrated with the ceasefire.","translation":"昨天我们看到的另一个真正令人担忧的升级是明显的战争罪行：美国对伊朗霍尔木兹附近的一个饮用水水库进行了精准打击。这是特朗普在过去八周内多次威胁过的，你知道，当他因停火感到沮丧时。"},{"paragraph":"And I'm hoping we don't see more war crimes, targeting of civilian infrastructure, as a deliberate strategy to try and bring Iran to the table.","translation":"我希望我们不会看到更多战争罪行，将民用基础设施作为目标，作为试图让伊朗回到谈判桌的蓄意策略。"},{"paragraph":"HILL: Certainly, there are a lot of --","translation":"希尔：当然，有很多——"},{"paragraph":"MANN: It's illegal, and it won't work.","translation":"曼：这是非法的，而且不会奏效。"},{"paragraph":"HILL: There are a lot of questions about that. And questions into CENTCOM for more clarity -- right? -- on what the exact targets were in terms of that, and whether that water plant was one of them.","translation":"希尔：关于这一点有很多疑问。并向中央司令部寻求更明确的说明——对吧？——关于具体目标是什么，以及那个水厂是否是其中之一。"},{"paragraph":"[06:05:08] As we look at where things stand this morning, to your point about getting serious about the negotiations, we have heard so much from President Trump publicly. You know, and CNN did an excellent analysis by our colleague Aaron Blake earlier this week about the number of times that President Trump has said, We're close, close to a deal. We've heard it in the last several days.","translation":"[06:05:08] 当我们审视今早的局势时，关于你提到的认真对待谈判，我们听到了特朗普总统在公开场合的许多言论。你知道，CNN的同事亚伦·布莱克本周早些时候做了一项出色的分析，关于特朗普总统说了多少次“我们很接近，很接近达成协议”。我们在过去几天里听到了很多次。"},{"paragraph":"There is so much public posturing from this president. Are you concerned at all that that could weaken the U.S. position?","translation":"这位总统有太多的公开作秀。你是否担心这可能会削弱美国的立场？"},{"paragraph":"MANN: I think it already has weakened the U.S. position. What the Iranian side understood at the start of the war -- which, let's remember, began when Trump and Netanyahu bombed in the middle of negotiations -- is that it's very hard to trust Donald Trump.","translation":"曼：我认为这已经削弱了美国的立场。伊朗方面在战争开始时——让我们记住，战争始于特朗普和内塔尼亚胡在谈判中途进行轰炸——就明白，很难信任唐纳德·特朗普。"},{"paragraph":"And Trump's constant lying. you know, both in public and maybe to the Iranian side, has only further undermined that trust.","translation":"而特朗普不断撒谎，你知道，无论是在公开场合还是可能对伊朗方面，都进一步破坏了这种信任。"},{"paragraph":"So, when it looks like maybe they're making progress towards a deal, and then Trump comes out and leaks some of the details, or he just starts making really outrageous threats, that's going to make it even harder for him to earn the trust of his negotiating counterpart and get them to actually agree to something.","translation":"所以，当看起来他们可能正在朝着协议取得进展时，特朗普却出来泄露一些细节，或者他开始发出非常离谱的威胁，这将使他更难赢得谈判对手的信任，并让他们真正同意某些事情。"},{"paragraph":"And I think that's why we're seeing an increased willingness from the Iranian government to go back to full-scale war, because they don't really think at this point that there's any other way to convince Trump to negotiate in good faith.","translation":"我认为这就是为什么我们看到伊朗政府越来越愿意回到全面战争，因为他们目前真的认为没有其他办法可以说服特朗普真诚谈判。"},{"paragraph":"HILL: When this war began -- of course, it was the U.S. and Israel when this war began. When it comes to Israel, Prime Minister Benjamin Netanyahu put out this statement yesterday, this message, I should say, for the people of Lebanon. I want to play that for you.","translation":"希尔：当这场战争开始时——当然，战争开始时是美国和以色列。关于以色列，总理本雅明·内塔尼亚胡昨天发表了一份声明，我应该说，是给黎巴嫩人民的信息。我想播放给你听。"},{"paragraph":"BENJAMIN NETANYAHU, ISRAELI PRIME MINISTER: I have a message for you, the people of Lebanon. Israel is not at war with you. We're at war with Hezbollah that has taken your country hostage, that does Iran's bidding, that uses your territory to launch terrorist attacks against Israel.","translation":"以色列总理本雅明·内塔尼亚胡：我有一条信息给你们，黎巴嫩人民。以色列没有与你们交战。我们是在与真主党交战，它劫持了你们的国家，听命于伊朗，利用你们的领土对以色列发动恐怖袭击。"},{"paragraph":"Do you remember what Lebanon was like before Iran and Hezbollah turned it into a nightmare? Once Hezbollah is dismantled, the possibilities are endless, and they are sky-high.","translation":"你们还记得在伊朗和真主党把黎巴嫩变成噩梦之前是什么样子吗？一旦真主党被瓦解，可能性是无限的，而且前景广阔。"},{"paragraph":"HILL: That's notable, of course, coming on the heels of Iran and Israel trading -- trading strikes earlier in the week, specifically on Sunday.","translation":"希尔：这当然值得注意，紧随伊朗和以色列在本周早些时候，特别是周日，互相打击之后。"},{"paragraph":"On Sunday, too, in the wake of Iran's missiles, President Trump told \"The Financial Times\" in an interview that Israel is going to have to accept whatever deal the U.S. makes with Iran and that Israel doesn't call the shots. Based on what we're seeing, how much sway, how much influence do you think this president actually has when it comes to Prime Minister Netanyahu and the decisions that Israel is making?","translation":"同样在周日，在伊朗发射导弹之后，特朗普总统在接受《金融时报》采访时表示，以色列将不得不接受美国与伊朗达成的任何协议，并且以色列说了不算。根据我们目前看到的情况，你认为这位总统对总理内塔尼亚胡和以色列正在做出的决定实际上有多大影响力？"},{"paragraph":"MANN: So, a reminder that President Trump and any U.S. president has nearly infinite leverage over the Israeli government. Essentially, their air force can't fly without our support.","translation":"曼：所以，提醒一下，特朗普总统和任何美国总统对以色列政府都有近乎无限的影响力。基本上，没有我们的支持，他们的空军就无法飞行。"},{"paragraph":"You know, it's not just bombs and aircraft and reply [SIC] parts -- supply parts. You know, we have U.S. troops on Israeli soil, defending the skies of Israel, so those planes can safely land. We supply the fuel that goes into those aircraft.","translation":"你知道，这不仅仅是炸弹、飞机和备件。我们有美国军队驻扎在以色列领土上，保卫以色列的天空，以便那些飞机能够安全降落。我们提供那些飞机所需的燃料。"},{"paragraph":"So, if Trump wanted to use it, I'm pretty confident that he could end any Israeli military aggression that he wanted to. And we can see that he wants to do that a little bit, but clearly, not enough that it's deterred Netanyahu from launching what potentially started this escalation, which was an Israeli strike on Beirut on Sunday.","translation":"所以，如果特朗普想利用这一点，我相当有信心他可以结束任何他想要结束的以色列军事侵略。我们可以看到他想这样做一点，但显然，这还不足以阻止内塔尼亚胡发动可能引发这次升级的行动，即周日以色列对贝鲁特的打击。"},{"paragraph":"So, Trump is still kind of trying to end the war with half measures. And it's clear that that's not going to work. He's going to have to do some difficult things, including actually putting his foot down with Netanyahu, as well as possibly making some concessions to the Iranian government.","translation":"所以，特朗普仍然在试图用半吊子的措施结束战争。很明显，这行不通。他将不得不做一些困难的事情，包括真正对内塔尼亚胡采取强硬立场，以及可能向伊朗政府做出一些让步。"},{"paragraph":"And unfortunately, I don't think he feels the urgency to do either of those things, because they can both be politically costly. And he's not going to feel that urgency until maybe we've seen another round of full-scale war that's totally unnecessary.","translation":"不幸的是，我认为他没有感到做这些事情的紧迫性，因为这两件事都可能付出政治代价。他可能要到我们目睹另一轮完全不必要的全面战争时才会感到紧迫。"},{"paragraph":"HILL: Major Harrison Mann, really appreciate your insight this morning. Thank you.","translation":"希尔：哈里森·曼少校，非常感谢您今早的见解。谢谢。"},{"paragraph":"HILL: Coming up here on CNN THIS MORNING, President Trump doubling down on his temporary pick for national intelligence director, a man with questionable qualifications, including a lack of actual intel experience.","translation":"希尔：接下来在《CNN今晨》节目中，特朗普总统加倍支持他临时选定的国家情报总监，此人资质存疑，包括缺乏实际情报经验。"},{"paragraph":"And Social Security at risk. New estimates on when the funding will run out. And the bleak warning signs for younger workers.","translation":"还有社会保障面临风险。关于资金何时耗尽的新估计。以及对年轻工人的黯淡警示信号。"},{"paragraph":"Plus, a shot for the ages. Knicks fans celebrating that last-second win in game four.","translation":"此外，还有一记载入史册的投篮。尼克斯球迷庆祝第四场比赛的最后一秒胜利。"},{"paragraph":"UNIDENTIFIED MALE: And it's 107-106.","translation":"身份不明的男性：比分是107-106。"},{"paragraph":"O.G. ANUNOBY, KNICKS PLAYER: It feels cool. I mean, everyone's pretty excited. I'm excited, too.","translation":"尼克斯球员O.G.阿奴诺比：感觉太酷了。我的意思是，每个人都非常兴奋。我也很兴奋。"},{"paragraph":"(END VIDEO CLIP) (COMMERCIAL BREAK)","translation":"（视频片段结束）（广告插播）"},{"paragraph":"HILL: Thirteen minutes past the hour. Now, here's your morning roundup.","translation":"希尔：现在是整点过后13分钟。以下是今早的新闻摘要。"},{"paragraph":"Microsoft co-founder Bill Gates telling lawmakers on Wednesday he made a, quote, \"huge mistake\" in meeting with Jeffrey Epstein. He has denied any wrongdoing.","translation":"微软联合创始人比尔·盖茨周三告诉立法者，他与杰弗里·爱泼斯坦会面是一个“巨大的错误”。他否认有任何不当行为。"},{"paragraph":"Gates testified before the House Oversight Committee in a closed-door meeting, saying he was aware Epstein had been convicted of a horrific crime but continued to interact with him to seek money for his foundation.","translation":"盖茨在众议院监督委员会的闭门会议上作证，称他知道爱泼斯坦因一项可怕的罪行被定罪，但为了为其基金会寻求资金，仍继续与他交往。"},{"paragraph":"When Gates arrived on Capitol Hill, he told reporters he would cooperate with any investigation.","translation":"当盖茨抵达国会山时，他告诉记者他将配合任何调查。"},{"paragraph":"BILL GATES, CO-FOUNDER, MICROSOFT: I'm glad to be here voluntarily to testify. I hope my testimony is helpful to the work, important work of the committee to find justice for the victims. Thank you.","translation":"微软联合创始人比尔·盖茨：我很高兴自愿来这里作证。我希望我的证词对委员会为受害者寻求正义的工作有所帮助。谢谢。"},{"paragraph":"HILL: Gates has not been accused in connection with Epstein's crimes.","translation":"希尔：盖茨并未被指控与爱泼斯坦的罪行有关。"},{"paragraph":"If you are counting on Social Security as part of your retirement plan, well, listen up. The latest government projections suggest the fund could run out of money in late 2032.","translation":"如果你指望社会保障作为退休计划的一部分，那么请注意。最新的政府预测显示，该基金可能在2032年底耗尽资金。"},{"paragraph":"So, that means the agency would no longer be able to pay 100 percent of benefits in the fourth quarter of that year. And in the years after, the monthly benefits will drastically decline.","translation":"这意味着该机构将无法在该年第四季度支付100%的福利。在之后的几年里，每月福利将大幅下降。"},{"paragraph":"Some new details for you on that upcoming UFC fight at the White House. Specifically, the cost: some $60 million. Now, that's according to court documents submitted by the Trump administration, which says the money will cover logistics; things like food and porta-potties.","translation":"关于即将在白宫举行的UFC比赛，有一些新细节。具体来说，费用：约6000万美元。这是根据特朗普政府提交的法庭文件，其中称这笔钱将用于后勤；比如食物和移动厕所。"},{"paragraph":"The fight is set for Sunday night, which, of course, is also the president's birthday.","translation":"比赛定于周日晚上举行，当然，那天也是总统的生日。"},{"paragraph":"Still to come here on CNN THIS MORNING, a record-setting win for the Knicks. Will Leitch is here with more on New York's 29-point comeback and the push on to game five.","translation":"《CNN今晨》接下来还有尼克斯队创纪录的胜利。威尔·莱奇将带来更多关于纽约队29分逆转以及第五场比赛的报道。"},{"paragraph":"Plus, the World Cup kicking off across America, North America today. Not without controversy. How about a live look for you here in Mexico City, the site of the opening match between Mexico and South Africa.","translation":"此外，世界杯今天在北美各地拉开帷幕。并非没有争议。让我们在墨西哥城现场看一下，这里是墨西哥对南非的开幕赛场地。"},{"paragraph":"So, can the action on the pitch finally offer a much-needed vibe shift?","translation":"那么，球场上的比赛最终能否带来急需的氛围转变？"},{"paragraph":"UNIDENTIFIED MALE: I say, \"New York,\" you say, \"Yes!\"","translation":"身份不明的男性：我说“纽约”，你们说“耶！”"},{"paragraph":"UNIDENTIFIED MALE: Yes!","translation":"身份不明的男性：耶！"},{"paragraph":"UNIDENTIFIED MALE: Yes!","translation":"身份不明的男性：耶！"},{"paragraph":"UNIDENTIFIED MALE: Yes!","translation":"身份不明的男性：耶！"},{"paragraph":"UNIDENTIFIED MALE: New York!","translation":"身份不明的男性：纽约！"},{"paragraph":"UNIDENTIFIED MALE: Yes!","translation":"身份不明的男性：耶！"},{"paragraph":"UNIDENTIFIED MALE: Yes!","translation":"身份不明的男性：耶！"},{"paragraph":"UNIDENTIFIED MALE: Yes!","translation":"身份不明的男性：耶！"},{"paragraph":"HILL: A little excitement there on the subway. Frankly, everywhere in New York after the Knicks pulled off the greatest comeback in NBA finals history, securing a two-game lead over the Spurs.","translation":"希尔：地铁里有点兴奋。坦率地说，在尼克斯队实现NBA总决赛历史上最伟大的逆转后，纽约到处都是如此，他们确保了对马刺队的两场领先优势。"},{"paragraph":"UNIDENTIFIED MALE: At the top, one on one.","translation":"身份不明的男性：在顶部，一对一。"},{"paragraph":"UNIDENTIFIED MALE: Brunson gets it, fires up a three. No good. The triplet's good! It's good! It's good with 1.20 left.","translation":"身份不明的男性：布伦森拿到球，投出三分。没进。补篮进了！进了！还剩1.20秒时进了。"},{"paragraph":"HILL: It was very good. The stunning end to a 29-point comeback. O.G. Anunoby's tip-in with 1.2 seconds remaining. The Knicks beating the Spurs by just one point, 107 to 106.","translation":"希尔：太棒了。29分逆转的惊人结局。O.G.阿奴诺比在还剩1.2秒时补篮得手。尼克斯队以107比106仅一分之差击败马刺队。"},{"paragraph":"UNIDENTIFIED MALE: I can't believe it.","translation":"身份不明的男性：我简直不敢相信。"},{"paragraph":"ANUNOBY: Feels cool. I mean, everyone's pretty excited. I'm excited, too. I'm excited, too. We're all excited. We're enjoying it right now, but we're just focused on the next game now.","translation":"阿奴诺比：感觉太酷了。我的意思是，每个人都非常兴奋。我也很兴奋。我也很兴奋。我们都很兴奋。我们现在正在享受这一刻，但我们只专注于下一场比赛。"},{"paragraph":"HILL: Knicks fans celebrating, perhaps not surprisingly, into the wee hours of the morning. New York now has the opportunity to clinch its first NBA title since 1973. The next game, game five, Saturday night in San Antonio.","translation":"希尔：尼克斯球迷庆祝到凌晨，也许并不令人意外。纽约现在有机会自1973年以来首次夺得NBA总冠军。下一场比赛，第五场，周六晚上在圣安东尼奥举行。"},{"paragraph":"Joining us now, Will Leitch. He's a contributing editor at \"New York\" magazine and a columnist with \"The Washington Post.\" He's got his Knicks blue jacket on, his Jalen Brunson bobblehead somewhere.","translation":"现在加入我们的是威尔·莱奇。他是《纽约》杂志的特约编辑和《华盛顿邮报》的专栏作家。他穿着尼克斯队的蓝色夹克，他的杰伦·布伦森摇头娃娃不知在哪里。"},{"paragraph":"I mean, Knicks in five. There is -- I know we've talked a lot about this. I have to say being in New York City. And it's true. You're on the subway. Everywhere you go, the excitement and the camaraderie, and the way this city has come together. It is something. And that was a hell of a game.","translation":"我的意思是，尼克斯五场拿下。我知道我们已经谈了很多。我不得不说在纽约市。这是真的。你在地铁上。无论你走到哪里，那种兴奋和友情，以及这座城市团结在一起的方式。真是了不起。那真是一场精彩的比赛。"},{"paragraph":"WILL LEITCH, CONTRIBUTING EDITOR, \"NEW YORK\" MAGAZINE: It's incredible to watch the streets everywhere. You know, I lived in New York for 13 years. My old street packed with people.","translation":"《纽约》杂志特约编辑威尔·莱奇：看到到处都是街道，真是难以置信。你知道，我在纽约住了13年。我以前的街道挤满了人。"},{"paragraph":"And what was amazing about that comeback last night, the vibes had been so off since Monday. This -- the scenes of -- of all those people in the street had been replaced by scowling billionaires courtside. Right? Like -- like scowling celebrities and upset people.","translation":"昨晚那次逆转的惊人之处在于，自周一以来气氛一直很糟糕。街上那些人的场景被场边皱眉的亿万富翁所取代。对吧？就像皱眉的名人和沮丧的人。"},{"paragraph":"HILL: No one wants to see a scowling billionaire.","translation":"希尔：没人想看到皱眉的亿万富翁。"},{"paragraph":"LEITCH: And that all changed in the course of last night. There's a lot of them. There's a -- there's a lot -- a lot of leaders and a lot of celebrities out there. And they -- everyone looked very sad. I looked very sad.","translation":"莱奇：而这一切在昨晚都改变了。有很多这样的人。有很多领导人和很多名人。他们——每个人看起来都很伤心。我看起来也很伤心。"},{"paragraph":"And so, to see -- to see that that comeback was really something incredible. And that O.G. Anunoby tip-in, it's something, frankly, that I place that piece that really not just Knicks fans will remember forever, but really NBA fans. That's an NBA historic play.","translation":"所以，看到那次逆转真是不可思议。而O.G.阿奴诺比的那记补篮，坦率地说，我认为那不仅会让尼克斯球迷永远记住，而且会让所有NBA球迷记住。那是NBA历史上的一个经典时刻。"},{"paragraph":"HILL: Yes. Absolutely. And it was quite a game. I mean, I -- full disclosure, I had to watch the highlights this morning and read about it, because some of us had to go to bed early.","translation":"希尔：是的。绝对。那真是一场精彩的比赛。我的意思是，我——完全坦白，我今天早上不得不看集锦并阅读相关报道，因为我们有些人必须早睡。"},{"paragraph":"But you know, the fact that this was this 29-point comeback. Just -- just set the scene for us. What are you seeing going into game five from both teams?","translation":"但你知道，这是29分逆转。请为我们描述一下场景。你看到两队进入第五场比赛的情况如何？"},{"paragraph":"LEITCH: Certainly, you know, they'll go back to San Antonio for game five. And so, the next game won't have the Garden environment.","translation":"莱奇：当然，你知道，他们将回到圣安东尼奥进行第五场比赛。所以，下一场比赛将没有麦迪逊广场花园的氛围。"},{"paragraph":"But the Knicks just won two games in San Antonio. And you know, the Spurs are obviously incredibly talented. I think everyone assumes Victor Wembanyama is going to win several championships throughout his career. But they are very, very young.","translation":"但尼克斯刚刚在圣安东尼奥赢了两场比赛。你知道，马刺队显然非常有天赋。我想每个人都认为维克托·文班亚马将在他的职业生涯中赢得多个冠军。但他们非常非常年轻。"},{"paragraph":"And I think that was kind of revealed last night. Wembanyama even talked about that, about how they felt like they'd lost their hunger in the fourth quarter.","translation":"我认为昨晚这一点有所体现。文班亚马甚至谈到了这一点，谈到他们感觉自己在第四节失去了饥饿感。"},{"paragraph":"So, I think that we'll see. That's a lot to overcome. Generally, historically speaking, when you have that kind of loss or just a heart -- rips the heart out of your chest loss --","translation":"所以，我想我们会看到的。那需要克服很多。一般来说，从历史上看，当你遭遇那种失利，或者那种让你心碎的失利——"},{"paragraph":"LEITCH: -- like the Spurs just had, it's very difficult to recover from, even -- even if you -- you're at home. But even if they lose that game, the Knicks will be back for game six. I can't imagine what the Garden would be like for a game six.","translation":"莱奇：——就像马刺刚刚经历的那样，很难从中恢复，即使你在主场。但即使他们输了那场比赛，尼克斯也会回来打第六场。我无法想象第六场比赛时麦迪逊广场花园会是什么样子。"},{"paragraph":"HILL: Oh, wow. Yes. Me either. We'll deal with that when, if and when we come to it.","translation":"希尔：哦，哇。是的。我也是。我们到时候再处理吧。"},{"paragraph":"Let's talk a little soccer, shall we? Football, depending on where you are, you know, in the rest of the world.","translation":"我们来谈谈足球吧，好吗？足球，取决于你在哪里，你知道，在世界其他地方。"},{"paragraph":"This has been tough, heading into this moment: between ticket prices, immigration issues this week. First match today in Mexico City. Are we now getting into the heart of what this tournament is about?","translation":"进入这个时刻一直很艰难：票价问题、本周的移民问题。今天在墨西哥城的第一场比赛。我们现在是否进入了这项赛事的核心？"},{"paragraph":"LEITCH: I mean, I think certainly FIFA hopes so, because this has really been a real mess for them. You know. this was -- after Russia eight years ago and Qatar four years ago, this was supposed to be the World Cup that went smoothly.","translation":"莱奇：我的意思是，我认为国际足联当然希望如此，因为这对他们来说确实是一团糟。你知道。在八年前的俄罗斯和四年前的卡塔尔之后，这本来应该是一届顺利的世界杯。"},{"paragraph":"They've been waiting for -- to get back to North America, you know, for -- since 1994.","translation":"他们一直在等待——回到北美，你知道，自从1994年以来。"},{"paragraph":"Everything was supposed to be, like, this -- U.S. was a burgeoning soccer market. Everyone was supposed to be working out in that direction. And it just -- it's been the opposite of that in every possible way.","translation":"一切本应如此——美国是一个新兴的足球市场。每个人都应该朝着那个方向努力。但事实恰恰相反，在各个方面都相反。"},{"paragraph":"The hope is -- and frankly, historically, there is some signs that this happens -- once the ball is kicked --","translation":"希望是——坦率地说，从历史上看，有一些迹象表明这种情况会发生——一旦球被踢出——"},{"paragraph":"LEITCH: -- and once things get going, and once this incredible experience -- you know, one of the great things about the World Cup is that we'll see. And remember, there's 16 more nations involved in this one.","translation":"莱奇：——一旦事情开始，一旦这种不可思议的经历——你知道，世界杯的伟大之处之一就是我们将会看到。记住，本届赛事有16个更多的国家参与。"},{"paragraph":"Every game takes on its own unique personality. The personality of the fan bases. And, you know, these games are still going to be -- the stands are still going to be full. As high as the ticket prices have been, these stands are generally.","translation":"每场比赛都有其独特的个性。球迷群体的个性。而且，你知道，这些比赛仍然会——看台仍然会爆满。尽管票价很高，但这些看台通常都是满的。"},{"paragraph":"And Azteca today with the Mexico game, that's going to be an incredible environment. The opening of the World Cup at the Azteca with the Mexican team.","translation":"今天阿兹特克体育场的墨西哥比赛，那将是一个不可思议的环境。世界杯在阿兹特克体育场开幕，墨西哥队参赛。"},{"paragraph":"These fans are -- like, every game takes on the personality of these varying fan base. The entire world is looking at this. Maybe the U.S. is not maybe looking at its best right now, hosting this tournament, in a lot of ways.","translation":"这些球迷——就像，每场比赛都呈现出这些不同球迷群体的个性。全世界都在关注这一点。也许美国现在在很多方面并没有展现出最好的一面来主办这项赛事。"},{"paragraph":"But once the game gets going, certainly, the hope is among not just FIFA, but I think a lot of soccer fans, that a lot of this will fade away a little bit. But you know, we'll see.","translation":"但一旦比赛开始，当然，不仅是国际足联，而且我认为很多足球迷都希望，很多这些问题会逐渐消退。但你知道，我们拭目以待。"},{"paragraph":"HILL: Yes, yes. As long as you don't have to, you know, pay for a train ticket into New Jersey.","translation":"希尔：是的，是的。只要你不必，你知道，支付去新泽西的火车票。"},{"paragraph":"HILL: When we -- you talked about the stands -- stands being full, rather. What are the chances that some of those -- there are still tickets available, right? That they start to drop to make sure that the stands are full?","translation":"希尔：当我们——你谈到看台——看台爆满。那些——仍然有票可买，对吧？他们开始降价以确保看台爆满的可能性有多大？"},{"paragraph":"LEITCH: I think they will. You know, I'm -- I'm based outside of Atlanta. There's a game between Uzbekistan and Qatar that takes place at 7:30 on a Wednesday. The get-in price is $400.","translation":"莱奇：我认为他们会降价。你知道，我住在亚特兰大郊区。有一场乌兹别克斯坦对卡塔尔的比赛，在周三晚上7:30举行。入场价格是400美元。"},{"paragraph":"Now I -- I suppose it's possible there's more Uzbekistan fans outside of Mercedes-Benz stadium in Atlanta than I think, but I suspect that's really because FIFA's kind of controlling the market a little bit on this.","translation":"现在我想——我认为亚特兰大梅赛德斯-奔驰体育场外的乌兹别克斯坦球迷可能比我想象的要多，但我怀疑这实际上是因为国际足联在这方面有点控制市场。"},{"paragraph":"LEITCH: So, controlling the resale market, as well.","translation":"莱奇：所以，也控制了转售市场。"},{"paragraph":"They're not going to want empty stands. I think that once these game gets going, once I think some of the realism that they do not want to see empty stands, I think you're going to see some of these prices go down.","translation":"他们不想看到空看台。我认为一旦这些比赛开始，一旦我认为他们不想看到空看台的现实，你会看到一些价格下降。"},{"paragraph":"Now, I don't want to imply that, all of a sudden, you're going to be getting $5 tickets to these games.","translation":"现在，我不想暗示突然间你会得到5美元的比赛门票。"},{"paragraph":"LEITCH: But some of these obscene prices, given prices that you're seeing, I do think you'll fall.","translation":"莱奇：但其中一些离谱的价格，鉴于你看到的价格，我确实认为会下降。"},{"paragraph":"Now, not for the larger games, right? Like obviously, the finals still going to be. Spain.","translation":"当然，不是针对大型比赛，对吧？比如显然，决赛仍然会很贵。西班牙。"},{"paragraph":"LEITCH: You know, a lot -- a lot of the larger teams, Brazil, those are all going to be sold out and very expensive.","translation":"莱奇：你知道，很多大型球队，巴西，这些比赛都会售罄并且非常昂贵。"},{"paragraph":"But I think there's 48 teams in this thing. There's a lot of games. If you want to be able to just say, I went to a World Cup game, a lot of these prices are going to fall. I think for -- for a reasonable amount to at least get in and see what's going on.","translation":"但我认为本届赛事有48支球队。有很多场比赛。如果你只想说，我去看了一场世界杯比赛，很多价格都会下降。我认为以合理的价格至少能进场看看情况。"},{"paragraph":"HILL: That's great. And you know, a watch party is always fun, too, having been to a couple.","translation":"希尔：太好了。而且你知道，观看派对也总是很有趣，我去过几个。"},{"paragraph":"LEITCH: I've seen more -- HILL: You know, almost 30 years ago when the World Cup was in France.","translation":"莱奇：我见过更多——希尔：你知道，差不多30年前世界杯在法国举行的时候。"},{"paragraph":"LEITCH: Really incredible.","translation":"莱奇：真是不可思议。"},{"paragraph":"HILL: Really good time. Will, appreciate it. Thank you.","translation":"希尔：非常愉快的时光。威尔，非常感谢。谢谢。"},{"paragraph":"LEITCH: Thanks for having me.","translation":"莱奇：谢谢邀请。"},{"paragraph":"HILL: Straight ahead here on CNN THIS MORNING, President Trump's unique take on rising costs for Americans. Why he loves the latest inflation news.","translation":"希尔：接下来在《CNN今晨》节目中，特朗普总统对美国物价上涨的独特看法。他为什么喜欢最新的通胀消息。"},{"paragraph":"And a stabbing, sparking days of unrest now in Northern Ireland. Why officials are worried this violence could spread.","translation":"还有北爱尔兰发生持刀伤人事件，引发多日骚乱。为什么官员担心暴力可能蔓延。"}],"vocabulary":[{"word":"trade strikes","phonetic":"/treɪd straɪks/","pos":"phrase","level":"六级","cn":"互相打击","en":"to exchange attacks","excerpt":"the United States and Iran trading attacks for a second straight day","example_cn":"美国与伊朗连续第二天互相打击"},{"word":"ceasefire","phonetic":"/ˈsiːsfaɪər/","pos":"n.","level":"六级","cn":"停火","en":"a temporary suspension of fighting","excerpt":"calling this the most violated ceasefire in history","example_cn":"称这是历史上最被违反的停火协议"},{"word":"surveillance","phonetic":"/sɜːrˈveɪləns/","pos":"n.","level":"六级","cn":"监控","en":"close observation, especially of a suspected person","excerpt":"targeted Iran's surveillance capabilities","example_cn":"目标是伊朗的监控能力"},{"word":"air defense","phonetic":"/er dɪˈfens/","pos":"n.","level":"六级","cn":"防空","en":"defensive measures designed to destroy attacking enemy aircraft","excerpt":"communication systems and air defense sites","example_cn":"通信系统和防空设施"},{"word":"tit-for-tat","phonetic":"/ˈtɪt fər ˈtæt/","pos":"adj.","level":"六级","cn":"针锋相对的","en":"equivalent retaliation","excerpt":"the tit-for-tat strikes between the U.S. and Iran","example_cn":"美国与伊朗之间的针锋相对的打击"},{"word":"expletive","phonetic":"/ˈeksplətɪv/","pos":"n.","level":"六级","cn":"咒骂语","en":"an oath or swear word","excerpt":"he would bomb the expletive out of them","example_cn":"他将把他们炸个屁滚尿流"},{"word":"intimidation","phonetic":"/ɪnˌtɪmɪˈdeɪʃn/","pos":"n.","level":"六级","cn":"恐吓","en":"the act of frightening someone","excerpt":"No sustainable deal can be reached through threats, intimidation","example_cn":"通过威胁、恐吓无法达成任何可持续的协议"},{"word":"coercion","phonetic":"/koʊˈɜːrʒn/","pos":"n.","level":"六级","cn":"胁迫","en":"the practice of persuading someone to do something by using force or threats","excerpt":"will never submit to pressure or coercion","example_cn":"永远不会屈服于压力或胁迫"},{"word":"blockade","phonetic":"/blɑːˈkeɪd/","pos":"n.","level":"六级","cn":"封锁","en":"an act of sealing off a place to prevent goods or people from entering or leaving","excerpt":"Then they tried the blockade for another two months.","example_cn":"然后他们又尝试了封锁两个月。"},{"word":"war crime","phonetic":"/wɔːr kraɪm/","pos":"n.","level":"六级","cn":"战争罪行","en":"an action carried out during a war that violates accepted international rules of war","excerpt":"an apparent war crime: a U.S. targeted precision strike on a water reservoir","example_cn":"明显的战争罪行：美国对水库的精准打击"},{"word":"civilian infrastructure","phonetic":"/sɪˈvɪliən ˈɪnfrəstrʌktʃər/","pos":"n.","level":"六级","cn":"民用基础设施","en":"the basic physical and organizational structures needed for civilian society","excerpt":"targeting of civilian infrastructure","example_cn":"以民用基础设施为目标"},{"word":"posturing","phonetic":"/ˈpɑːstʃərɪŋ/","pos":"n.","level":"六级","cn":"作秀","en":"behavior that is intended to impress or mislead others","excerpt":"There is so much public posturing from this president.","example_cn":"这位总统有太多的公开作秀。"},{"word":"leverage","phonetic":"/ˈlevərɪdʒ/","pos":"n.","level":"六级","cn":"影响力","en":"the power to influence a person or situation","excerpt":"has nearly infinite leverage over the Israeli government","example_cn":"对以色列政府有近乎无限的影响力"},{"word":"deter","phonetic":"/dɪˈtɜːr/","pos":"v.","level":"六级","cn":"阻止","en":"to discourage someone from doing something","excerpt":"it's deterred Netanyahu from launching what potentially started this escalation","example_cn":"阻止了内塔尼亚胡发动可能引发这次升级的行动"},{"word":"half measures","phonetic":"/hæf ˈmeʒərz/","pos":"phrase","level":"六级","cn":"半吊子措施","en":"incomplete or inadequate actions","excerpt":"Trump is still kind of trying to end the war with half measures.","example_cn":"特朗普仍然在试图用半吊子的措施结束战争。"},{"word":"concession","phonetic":"/kənˈseʃn/","pos":"n.","level":"六级","cn":"让步","en":"something that is granted, especially in response to demands","excerpt":"making some concessions to the Iranian government","example_cn":"向伊朗政府做出一些让步"},{"word":"comeback","phonetic":"/ˈkʌmbæk/","pos":"n.","level":"六级","cn":"逆转","en":"a return to a former position or state","excerpt":"a historic 29-point comeback","example_cn":"历史性的29分逆转"},{"word":"tip-in","phonetic":"/ˈtɪp ɪn/","pos":"n.","level":"六级","cn":"补篮","en":"a basketball shot made by tipping the ball into the basket","excerpt":"O.G. Anunoby's tip-in with 1.2 seconds remaining","example_cn":"O.G.阿奴诺比在还剩1.2秒时补篮得手"},{"word":"clinch","phonetic":"/klɪntʃ/","pos":"v.","level":"六级","cn":"锁定（胜利）","en":"to settle conclusively","excerpt":"New York now has the opportunity to clinch its first NBA title since 1973.","example_cn":"纽约现在有机会自1973年以来首次夺得NBA总冠军。"},{"word":"vibe shift","phonetic":"/vaɪb ʃɪft/","pos":"phrase","level":"六级","cn":"氛围转变","en":"a change in the general atmosphere or mood","excerpt":"a much-needed vibe shift away from the outrage over ticket prices","example_cn":"急需的氛围转变，摆脱对票价的愤怒"},{"word":"burgeoning","phonetic":"/ˈbɜːrdʒənɪŋ/","pos":"adj.","level":"六级","cn":"新兴的","en":"beginning to grow or increase rapidly","excerpt":"U.S. was a burgeoning soccer market.","example_cn":"美国是一个新兴的足球市场。"},{"word":"obscene","phonetic":"/əbˈsiːn/","pos":"adj.","level":"六级","cn":"离谱的","en":"offensive or disgusting by accepted standards of morality and decency","excerpt":"some of these obscene prices","example_cn":"其中一些离谱的价格"},{"word":"revelation","phonetic":"/ˌrevəˈleɪʃn/","pos":"n.","level":"六级","cn":"爆料","en":"a surprising and previously unknown fact","excerpt":"new revelations about how the White House han + 系表结构 + that引导的表语从句","analysis":"主语从句'What the Iranian side understood at the start of the war'作主语；破折号内为插入语，包含非限制性定语从句'which began...'修饰'the war'；主句系表结构'is that...'，'that'引导表语从句。"},{"en":"So, when it looks like maybe they're making progress towards a deal, and then Trump comes out and leaks some of the details, or he just starts making really outrageous threats, that's going to make it even harder for him to earn the trust of his negotiating counterpart and get them to actually agree to something.","cn":"所以，当看起来他们可能正在朝着协议取得进展时，特朗普却出来泄露一些细节，或者他开始发出非常离谱的威胁，这将使他更难赢得谈判对手的信任，并让他们真正同意某些事情。","structure":"时间状语从句 + 主句","analysis":"'when'引导时间状语从句，从句中包含'it looks like...'和'Trump comes out...'并列结构；主句为'that's going to make it even harder...'，其中'it'为形式宾语，真正宾语为不定式短语'for him to earn...'。"},{"en":"On a call from the Situation Room, President Trump told FOX News if Iran did not agree to a deal, he would bomb the expletive out of them, calling this the most violated ceasefire in history.","cn":"在战情室的通话中，特朗普总统告诉福克斯新闻，如果伊朗不同意协议，他将把他们炸个屁滚尿流，并称这是历史上最被违反的停火协议。","structure":"介词短语 + 主句 + if引导的条件状语从句 + 现在分词短语","analysis":"介词短语'On a call...'作状语；主句为'President Trump told FOX News'；'if'引导条件状语从句，为间接引语；'calling...'现在分词短语作伴随状语。"},{"en":"So, if Trump wanted to use it, I'm pretty confident that he could end any Israeli military aggression that he wanted to.","cn":"所以，如果特朗普想利用这一点，我相当有信心他可以结束任何他想要结束的以色列军事侵略。","structure":"if引导的条件状语从句 + 主句 + that引导的宾语从句 + 定语从句","analysis":"'if'引导条件状语从句；主句为'I'm pretty confident'；'that'引导宾语从句，从句中'he could end any Israeli military aggression'；'that he wanted to'为定语从句，修饰'aggression'。"},{"en":"And I think that's why we're seeing an increased willingness from the Iranian government to go back to full-scale war, because they don't really think at this point that there's any other way to convince Trump to negotiate in good faith.","cn":"我认为这就是为什么我们看到伊朗政府越来越愿意回到全面战争，因为他们目前真的认为没有其他办法可以说服特朗普真诚谈判。","structure":"主句 + why引导的表语从句 + because引导的原因状语从句","analysis":"主句为'I think'；'that's why Security, retirement, funding, benefits, projections"},{"title":"Northern Ireland Unrest","content":"北爱尔兰发生持刀伤人事件，引发多日骚乱，警察遭袭，街头混乱。官员担心暴力可能进一步蔓延。","keywords":"Northern Ireland, stabbing, unrest, police, violence"},{"title":"UFC at White House","content":"特朗普政府计划在白宫举办UFC比赛，耗资约6000万美元，用于后勤保障。比赛定于总统生日当晚举行。","keywords":"UFC, White House, cost, logistics, Trump birthday"},{"title":"Israel-Hezbollah Conflict","content":"以色列与黎巴嫩真主党之间的冲突，内塔尼亚胡向黎巴嫩人民喊话，称以色列并非与黎巴嫩为敌，而是针对真主党。美国对以色列有巨大影响力。","keywords":"Israel, Hezbollah, Lebanon, Netanyahu, military"},{"title":"Inflation and Economy","content":"特朗普总统对通胀的独特看法，称'喜欢通胀'，但美国民众面临食品和汽油价格上涨的压力。","keywords":"inflation, prices, groceries, gas, economy"},{"title":"Bill Gates Testimony","content":"微软联合创始人比尔·盖茨就与爱泼斯坦会面一事在众议院监督委员会作证，称这是一个'巨大错误'，但否认不当行为。","keywords":"Bill Gates, Epstein, testimony, House Oversight, mistake"}],"raw_transcript":"Return to Transcripts main page\n\nU.S. and Iran Trade Strikes: Is a Peace Deal Dead?; Knicks Take Game 4 with Historic 29-Point Comeback. Aired 6-6:30a ET\n\nAired June 11, 2026 - 06:00   ET\n\nTHIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED.\n\nBRAD SMITH, CNN ANCHOR: Well, that does it for CNN HEADLINE EXPRESS. I'm Brad Smith. CNN THIS MORNING with Audie Cornish starts right now.\n\nERICA HILL, CNN ANCHOR: New overnight, the United States and Iran trading attacks for a second straight day as President Trump promises more to come if Tehran does not immediately agree to a peace deal.\n\nDONALD TRUMP, U.S. PRESIDENT: We're going to be attacking them and attacking them very hard, and we'll see what happens with the deal.\n\nHILL: Plus, new revelations about how the White House handled the Epstein scandal, meeting in the Situation Room to game out a plan without President Trump.\n\nTRUMP: You know what I really love? I love the inflation.\n\nHILL: The president suggests, as you just heard, he doesn't mind the high prices right now. But what about Americans paying more for groceries and gas?\n\nA stabbing in Northern Ireland sparking days of unrest. Police under attack. The streets in chaos.\n\nGIANNI INFANTINO, PRESIDENT, FIFA: The soul and the heart is the fans in the stadiums. It's the fans in the fan zones.\n\nHILL: The World Cup officially kicking off today, finally. Could we also see a much-needed vibe shift away from the outrage over ticket prices and immigration issues?\n\nUNIDENTIFIED MALE: Shot no good. The tip-up's good. It's good, it's good. With one point. (END VIDEO CLIP)\n\nHILL: A historic comeback. Down 29 points. That last-second tip gives the Knicks a 3-1 advantage. Now just one win away from the NBA championship.\n\nTRUMP: We were really close to a deal, but they keep tapping us along. They keep playing us for suckers.\n\nHILL: President Trump choosing military might over diplomacy. But can he bomb Tehran into a deal?\n\nGood morning, everyone. I'm Erica Hill, in on this Thursday for Audie Cornish. Nice to have you with us.\n\nWe do begin this hour with the tit-for-tat strikes between the U.S. and Iran and the promise for more from the White House.\n\nHILL: The U.S. says it targeted Iran's surveillance capabilities, communication systems and air defense sites. Iran hitting back with attacks on U.S. bases in the region.\n\nOn a call from the Situation Room, President Trump told FOX News if Iran did not agree to a deal, he would bomb the expletive out of them, calling this the most violated ceasefire in history.\n\nPETE HEGSETH, SECRETARY OF DEFENSE: You can see when someone's trying to tap, tap, tap on a deal. Instead, they're going to have tap, tap, tap bombs dropping on key facilities in Iran from the United States of America.\n\nIf we need to negotiate with bombs, we'll negotiate with bombs. And we're very good at it.\n\nHILL: So, will those threats actually get Tehran to the table?\n\nAMIR-SAEID IRAVANI, IRAN'S AMBASSADOR TO THE UNITED NATIONS: No sustainable deal can be reached through threats, intimidation, or the use of force. The president of the United States should refrain from his recurring threats against Iran, including his renewed threat of force made today.\n\nIran has never negotiated under threats and pressure and will never submit to pressure or coercion.\n\nHILL: Joining me now, former defense intelligence official, Major Harrison Mann. It's good to have you with us this morning.\n\nSo, we heard from Secretary Hegseth there saying, you know, we will continue to negotiate with bombs. Is that actually the way to get Iran to the table? It does not seem to be working in this moment.\n\nMAJ. HARRISON MANN, FORMER DEFENSE INTELLIGENCE OFFICIAL: Hi, Erica.\n\nWe know for certain from recent history that it is not the way to get Iran to negotiate. They tried bombing Iran for 40 days. It didn't work.\n\nThen they tried the blockade for another two months. That hasn't worked. And they're out of ideas. So, I guess they're trying to bomb a second time.\n\nIt's -- it's unfortunate, because I think there is still a possibility for peace when the Trump administration gets serious about actually negotiating, which is going to require them making some concessions.\n\nBut for now, they're clearly not willing to do that. And so, they're going to start bombing again.\n\nThe -- the other really worrying escalation we saw yesterday was an apparent war crime: a U.S. targeted precision strike on a water reservoir for drinking water in Iran near Hormuz. And that's something Trump has threatened several times over the past eight weeks, you know, when he got frustrated with the ceasefire.\n\nAnd I'm hoping we don't see more war crimes, targeting of civilian infrastructure, as a deliberate strategy to try and bring Iran to the table.\n\nHILL: Certainly, there are a lot of --\n\nMANN: It's illegal, and it won't work.\n\nHILL: There are a lot of questions about that. And questions into CENTCOM for more clarity -- right? -- on what the exact targets were in terms of that, and whether that water plant was one of them.\n\n[06:05:08] As we look at where things stand this morning, to your point about getting serious about the negotiations, we have heard so much from President Trump publicly. You know, and CNN did an excellent analysis by our colleague Aaron Blake earlier this week about the number of times that President Trump has said, We're close, close to a deal. We've heard it in the last several days.\n\nThere is so much public posturing from this president. Are you concerned at all that that could weaken the U.S. position?\n\nMANN: I think it already has weakened the U.S. position. What the Iranian side understood at the start of the war -- which, let's remember, began when Trump and Netanyahu bombed in the middle of negotiations -- is that it's very hard to trust Donald Trump.\n\nAnd Trump's constant lying. you know, both in public and maybe to the Iranian side, has only further undermined that trust.\n\nSo, when it looks like maybe they're making progress towards a deal, and then Trump comes out and leaks some of the details, or he just starts making really outrageous threats, that's going to make it even harder for him to earn the trust of his negotiating counterpart and get them to actually agree to something.\n\nAnd I think that's why we're seeing an increased willingness from the Iranian government to go back to full-scale war, because they don't really think at this point that there's any other way to convince Trump to negotiate in good faith.\n\nHILL: When this war began -- of course, it was the U.S. and Israel when this war began. When it comes to Israel, Prime Minister Benjamin Netanyahu put out this statement yesterday, this message, I should say, for the people of Lebanon. I want to play that for you.\n\nBENJAMIN NETANYAHU, ISRAELI PRIME MINISTER: I have a message for you, the people of Lebanon. Israel is not at war with you. We're at war with Hezbollah that has taken your country hostage, that does Iran's bidding, that uses your territory to launch terrorist attacks against Israel.\n\nDo you remember what Lebanon was like before Iran and Hezbollah turned it into a nightmare? Once Hezbollah is dismantled, the possibilities are endless, and they are sky-high.\n\nHILL: That's notable, of course, coming on the heels of Iran and Israel trading -- trading strikes earlier in the week, specifically on Sunday.\n\nOn Sunday, too, in the wake of Iran's missiles, President Trump told \"The Financial Times\" in an interview that Israel is going to have to accept whatever deal the U.S. makes with Iran and that Israel doesn't call the shots. Based on what we're seeing, how much sway, how much influence do you think this president actually has when it comes to Prime Minister Netanyahu and the decisions that Israel is making?\n\nMANN: So, a reminder that President Trump and any U.S. president has nearly infinite leverage over the Israeli government. Essentially, their air force can't fly without our support.\n\nYou know, it's not just bombs and aircraft and reply [SIC] parts -- supply parts. You know, we have U.S. troops on Israeli soil, defending the skies of Israel, so those planes can safely land. We supply the fuel that goes into those aircraft.\n\nSo, if Trump wanted to use it, I'm pretty confident that he could end any Israeli military aggression that he wanted to. And we can see that he wants to do that a little bit, but clearly, not enough that it's deterred Netanyahu from launching what potentially started this escalation, which was an Israeli strike on Beirut on Sunday.\n\nSo, Trump is still kind of trying to end the war with half measures. And it's clear that that's not going to work. He's going to have to do some difficult things, including actually putting his foot down with Netanyahu, as well as possibly making some concessions to the Iranian government.\n\nAnd unfortunately, I don't think he feels the urgency to do either of those things, because they can both be politically costly. And he's n
