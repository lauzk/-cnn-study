g to get it.","example_cn":"这需要真正的限制措施，你知道，谈论它，谈论在被打败后、在即将离任且成为跛脚鸭后脱离群体，这真的行不通。"},{"word":"lame duck","phonetic":"/leɪm dʌk/","pos":"n.","level":"六级","cn":"跛脚鸭（任期将满的官员）","en":"a politician who is in the last period of their term of office and has less power","excerpt":"It's going to take real guardrails, you know, sort of talking about it, talking about breaking from the pack after you've been defeated, after you're on your way out and you're a lame duck, that's really not going to get it.","example_cn":"这需要真正的限制措施，你知道，谈论它，谈论在被打败后、在即将离任且成为跛脚鸭后脱离群体，这真的行不通。"},{"word":"decarbonization","phonetic":"/diːˌkɑːrbənaɪˈzeɪʃn/","pos":"n.","level":"六级","cn":"脱碳","en":"the process of reducing the amount of carbon dioxide produced by a country, company, etc.","excerpt":"We know that carbon emissions are high and adding more electricity demand to our needs, to our portfolio means that we have to -- we will compromise the decarbonization process and create a lot of problems.","example_cn":"我们知道碳排放很高，增加更多的电力需求到我们的需求、到我们的组合意味着我们必须——我们将损害脱碳过程并造成许多问题。"},{"word":"indigenous","phonetic":"/ɪnˈdɪdʒənəs/","pos":"adj.","level":"六级","cn":"本土的；原生的","en":"originating naturally in a particular place","excerpt":"That's why you see in many parts of the world, including the United States, now, people are having conflicts over the establishment of these data centers because farmers are worried or cities are worried, urban population, indigenous communities around the world are worried about these data centers coming to their place, and they are only bearing the cost, not taking advantage of the benefits.","example_cn":"这就是为什么你在世界许多地方，包括美国，现在人们就这些数据中心的建立发生冲突，因为农民担心，城市担心，城市人口、世界各地的原住民社区担心这些数据中心来到他们的地方，他们只承担成本，而没有利用好处。"},{"word":"intercept","phonetic":"/ˌɪntərˈsept/","pos":"v.","level":"六级","cn":"拦截","en":"to stop, catch, or seize something or someone before they reach their destination","excerpt":"The U.S. says it has intercepted new Iranian attacks in the Strait of Hormuz.","example_cn":"美国称已在霍尔木兹海峡拦截了伊朗的新攻击。"},{"word":"stalemate","phonetic":"/ˈsteɪlmeɪt/","pos":"n.","level":"六级","cn":"僵局","en":"a situation in which neither side in a conflict can make progress","excerpt":"Peace talks are at a stalemate between the two countries.","example_cn":"两国之间的和平谈判陷入僵局。"},{"word":"blockade","phonetic":"/blɑːˈkeɪd/","pos":"n.","level":"六级","cn":"封锁","en":"an act of sealing off a place to prevent goods or people from entering or leaving","excerpt":"The Trump administration must agree to end its naval blockade.","example_cn":"特朗普政府必须同意结束其海军封锁。"},{"word":"frozen assets","phonetic":"/ˈfroʊzən ˈæsets/","pos":"n. pl.","level":"考研","cn":"冻结资产","en":"assets that are legally prevented from being moved or sold","excerpt":"Release $24 billion in frozen Iranian assets to end this war.","example_cn":"释放240亿美元的冻结伊朗资产以结束这场战争。"},{"word":"ramp up","phonetic":"/ræmp ʌp/","pos":"phr.","level":"六级","cn":"增加，加强","en":"to increase in amount or intensity","excerpt":"Israeli forces also ramped up attacks against Hezbollah targets in Lebanon.","example_cn":"以色列军队也加强了对黎巴嫩真主党目标的攻击。"},{"word":"fragile ceasefire","phonetic":"/ˈfrædʒəl ˈsiːsfaɪər/","pos":"n.","level":"考研","cn":"脆弱的停火","en":"a ceasefire that is unstable and could easily break down","excerpt":"Threatening to unravel a very fragile ceasefire.","example_cn":"威胁要破坏一个非常脆弱的停火。"},{"word":"surveillance","phonetic":"/sɜːrˈveɪləns/","pos":"n.","level":"六级","cn":"监视","en":"close observation, especially of a suspected person or group","excerpt":"Carried out strikes on two surveillance radar sites on Iran's coast.","example_cn":"对伊朗海岸的两个监视雷达站进行了打击。"},{"word":"ballistic missile","phonetic":"/bəˈlɪstɪk ˈmɪsəl/","pos":"n.","level":"考研","cn":"弹道导弹","en":"a missile that follows a ballistic trajectory","excerpt":"Iran then launched seven ballistic missiles.","example_cn":"伊朗随后发射了七枚弹道导弹。"},{"word":"deadlocked","phonetic":"/ˈdedlɑːkt/","pos":"adj.","level":"六级","cn":"陷入僵局的","en":"unable to reach an agreement because of opposing views","excerpt":"An adviser to Iran's supreme leader says the talks are deadlocked.","example_cn":"伊朗最高领袖的一名顾问表示谈判陷入僵局。"},{"word":"midterm elections","phonetic":"/ˈmɪdtɜːrm ɪˈlekʃənz/","pos":"n. pl.","level":"考研","cn":"中期选举","en":"elections held in the middle of a president's term","excerpt":"President Trump was back on the campaign trail yesterday for the upcoming midterm elections.","example_cn":"特朗普总统昨天回到竞选活动中，为即将到来的中期选举造势。"},{"word":"rally","phonetic":"/ˈræli/","pos":"n.","level":"六级","cn":"集会","en":"a large public meeting, especially one held to support a particular cause or person","excerpt":"The president visited Chippewa Falls, Wisconsin, for a rally branded as Fighting for American Farmers.","example_cn":"总统访问了威斯康星州奇珀瓦福尔斯，参加一场名为“为美国农民而战”的集会。"},{"word":"ballot","phonetic":"/ˈbælət/","pos":"n.","level":"六级","cn":"选票","en":"a piece of paper used to cast a vote in an election","excerpt":"Ballots in California are still being counted.","example_cn":"加利福尼亚州的选票仍在统计中。"},{"word":"mail-in ballot","phonetic":"/meɪl ɪn ˈbælət/","pos":"n.","level":"考研","cn":"邮寄选票","en":"a ballot that is sent by mail to be counted","excerpt":"It's largely due to the time it takes to count the mail-in ballots.","example_cn":"这主要是由于统计邮寄选票所需的时间。"},{"word":"dispatch","phonetic":"/dɪˈspætʃ/","pos":"v.","level":"六级","cn":"派遣","en":"to send someone or something to a particular place for a particular purpose","excerpt":"The Justice Department has now sent one of its attorneys to observe ballot processing in Los Angeles.","example_cn":"司法部现已派遣一名律师前往洛杉矶观察选票处理过程。"},{"word":"fraud","phonetic":"/frɔːd/","pos":"n.","level":"六级","cn":"欺诈","en":"wrongful or criminal deception intended to result in financial or personal gain","excerpt":"President Trump has made false claims of election fraud there.","example_cn":"特朗普总统在那里提出了关于选举欺诈的虚假指控。"},{"word":"prosecutor","phonetic":"/ˈprɑːsɪkjuːtər/","pos":"n.","level":"六级","cn":"检察官","en":"a person who conducts a case against a defendant in a court of law","excerpt":"The top federal prosecutor there was investigating the vote counting.","example_cn":"那里的最高联邦检察官正在调查计票情况。"},{"word":"drone strike","phonetic":"/droʊn straɪk/","pos":"n.","level":"考研","cn":"无人机袭击","en":"an attack carried out by an unmanned aerial vehicle","excerpt":"Ukraine has launched a major drone strike on Saint Petersburg.","example_cn":"乌克兰对圣彼得堡发动了一次大规模无人机袭击。"},{"word":"outbreak","phonetic":"/ˈaʊtbreɪk/","pos":"n.","level":"六级","cn":"爆发","en":"the sudden occurrence of something unwelcome, such as a disease","excerpt":"The CDC says the current Ebola outbreak in the Democratic Republic of Congo could become the largest on record.","example_cn":"美国疾病控制与预防中心表示，刚果民主共和国当前的埃博拉疫情可能成为有记录以来最大的一次。"},{"word":"take shelter","phonetic":"/teɪk ˈʃeltər/","pos":"phr.","level":"考研","cn":"躲避，寻求庇护","en":"to find a place of safety from danger or bad weather","excerpt":"Five astronauts on the International Space Station were told to take shelter on Friday.","example_cn":"周五，国际空间站上的五名宇航员被告知要躲避。"},{"word":"polarization","phonetic":"/ˌpoʊləraɪˈzeɪʃən/","pos":"n.","level":"六级","cn":"两极分化","en":"division into two sharply contrasting groups or sets of opinions","excerpt":"Pope Leo is kicking off a visit to Spain with political polarization and migration front and center.","example_cn":"教皇利奥开始对西班牙进行访问，政治两极分化和移民问题成为焦点。"},{"word":"migration","phonetic":"/maɪˈɡreɪʃən/","pos":"n.","level":"六级","cn":"移民，迁徙","en":"the movement of people from one place to another, especially to find work or better living conditions","excerpt":"We're expected to see a strong focus on migration.","example_cn":"预计我们将看到对移民问题的高度关注。"},{"word":"secularized","phonetic":"/ˈsekjələraɪzd/","pos":"adj.","level":"考研","cn":"世俗化的","en":"made secular; separated from religious or spiritual influence","excerpt":"It's a secularized country here, but there are strong catholic roots.","example_cn":"这是一个世俗化的国家，但有深厚的天主教根基。"},{"word":"impasse","phonetic":"/ˈɪmpæs/","pos":"n.","level":"六级","cn":"僵局","en":"a situation in which no progress is possible","excerpt":"Peace talks are at an impasse.","example_cn":"和平谈判陷入僵局。"},{"word":"escalate","phonetic":"/ˈeskəleɪt/","pos":"v.","level":"六级","cn":"升级","en":"to increase in intensity or extent","excerpt":"The violence is escalating in the war with Iran.","example_cn":"与伊朗的战争暴力正在升级。"},{"word":"hubristic","phonetic":"/hjuːˈbrɪstɪk/","pos":"adj.","level":"考研","cn":"傲慢的","en":"having excessive pride or self-confidence","excerpt":"Yes, the regime is hubristic and proud.","example_cn":"是的，该政权傲慢而自负。"},{"word":"ideological","phonetic":"/ˌaɪdiəˈlɑːdʒɪkəl/","pos":"adj.","level":"六级","cn":"意识形态的","en":"based on or relating to a system of ideas and ideals","excerpt":"But more importantly, it's ideological.","example_cn":"但更重要的是，它是意识形态的。"},{"word":"gray zone","phonetic":"/ɡreɪ zoʊn/","pos":"n.","level":"考研","cn":"灰色地带","en":"an area of activity that is not clearly defined or regulated","excerpt":"The Iranian strategy here by exploiting the gray zone.","example_cn":"伊朗在此的策略是利用灰色地带。"},{"word":"chokepoint","phonetic":"/ˈtʃoʊkpɔɪnt/","pos":"n.","level":"考研","cn":"咽喉要道","en":"a point of congestion or blockage, especially in a transportation or communication system","excerpt":"The ability to go after a strategic chokepoint in the Red Sea.","example_cn":"攻击红海战略咽喉要道的能力。"},{"word":"bankruptcy","phonetic":"/ˈbæŋkrʌptsi/","pos":"n.","level":"六级","cn":"破产","en":"the state of being legally declared unable to pay debts","excerpt":"They are facing bankruptcy.","example_cn":"他们正面临破产。"},{"word":"bargaining chip","phonetic":"/ˈbɑːrɡənɪŋ tʃɪp/","pos":"n.","level":"考研","cn":"谈判筹码","en":"something that can be used to gain an advantage in negotiations","excerpt":"They are using Lebanon as a bargaining chip in their negotiation with the United States.","example_cn":"他们正在利用黎巴嫩作为与美国谈判的筹码。"},{"word":"proxy","phonetic":"/ˈprɑːksi/","pos":"n.","level":"六级","cn":"代理人，代理","en":"a person or thing acting on behalf of another","excerpt":"Hezbollah, which is their most powerful proxy.","example_cn":"真主党是他们最强大的代理人。"},{"word":"clobbered","phonetic":"/ˈklɑːbərd/","pos":"v.","level":"考研","cn":"痛击，重创","en":"to hit or defeat severely","excerpt":"Its most powerful proxy in Lebanon got clobbered by Israel.","example_cn":"其在黎巴嫩最强大的代理人被以色列重创。"},{"word":"vanished","phonetic":"/ˈvænɪʃt/","pos":"v.","level":"六级","cn":"消失","en":"disappeared suddenly and completely","excerpt":"A 20-year-old college student from Alabama, who vanished during a family vacation.","example_cn":"一名来自阿拉巴马州的20岁大学生，在一次家庭度假中消失。"},{"word":"avid hiker","phonetic":"/ˈævɪd ˈhaɪkər/","pos":"n.","level":"考研","cn":"热衷徒步者","en":"a person who enjoys hiking very much","excerpt":"He is known as an avid hiker.","example_cn":"他以热衷徒步而闻名。"},{"word":"K-9 unit","phonetic":"/keɪ naɪn ˈjuːnɪt/","pos":"n.","level":"考研","cn":"警犬队","en":"a police unit that uses dogs for search and rescue or detection","excerpt":"Police are relying on K-9 units to sniff out any trace of Weston.","example_cn":"警方依靠警犬队来嗅探韦斯顿的任何踪迹。"},{"word":"panic set in","phonetic":"/ˈpænɪk set ɪn/","pos":"phr.","level":"六级","cn":"恐慌开始","en":"a feeling of panic began to affect someone","excerpt":"When he seemingly turned off his phone location, panic set in.","example_cn":"当他似乎关闭了手机定位时，恐慌开始了。"},{"word":"appeal","phonetic":"/əˈpiːl/","pos":"n.","level":"六级","cn":"呼吁","en":"a serious or urgent request","excerpt":"Nancy has posted daily appeals on social media.","example_cn":"南希每天都在社交媒体上发布呼吁。"},{"word":"flyer","phonetic":"/ˈflaɪər/","pos":"n.","level":"考研","cn":"传单","en":"a small handbill or leaflet advertising something","excerpt":"Sharing Weston's photo and distributing flyers to help find him.","example_cn":"分享韦斯顿的照片并分发传单以帮助找到他。"},{"word":"severe weather","phonetic":"/sɪˈvɪr ˈweðər/","pos":"n.","level":"六级","cn":"恶劣天气","en":"dangerous weather conditions such as storms, hurricanes, etc.","excerpt":"Millions of people could see some strong storms today.","example_cn":"今天数百万人可能会遭遇强风暴。"},{"word":"cold front","phonetic":"/koʊld frʌnt/","pos":"n.","level":"考研","cn":"冷锋","en":"the boundary between a mass of cold air and a mass of warmer air","excerpt":"That will be the trigger point, along with heat to fire up more storms later on today.","example_cn":"那将是触发点，加上热量，今天晚些时候会引发更多风暴。"},{"word":"backlash","phonetic":"/ˈbæklæʃ/","pos":"n.","level":"六级","cn":"强烈反对","en":"a strong negative reaction to a recent event or decision","excerpt":"President Trump is facing backlash over his pick to lead the intelligence community.","example_cn":"特朗普总统因选择领导情报界的人选而面临强烈反对。"},{"word":"acting director","phonetic":"/ˈæktɪŋ dɪˈrektər/","pos":"n.","level":"考研","cn":"代理主任","en":"a person who temporarily performs the duties of a director","excerpt":"Pulte will only serve as acting director of National Intelligence.","example_cn":"普尔特将仅担任国家情报代理主任。"},{"word":"hatchet man","phonetic":"/ˈhætʃɪt mæn/","pos":"n.","level":"考研","cn":"打手，执行不受欢迎任务的人","en":"a person employed to carry out unpleasant or aggressive tasks","excerpt":"Essentially, going to be the hatchet man.","example_cn":"本质上，将成为执行不受欢迎任务的人。"},{"word":"terminate","phonetic":"/ˈtɜːrmɪneɪt/","pos":"v.","level":"六级","cn":"终止","en":"to bring to an end","excerpt":"This should maybe even be terminated.","example_cn":"这甚至可能应该被终止。"}],"sentences":[{"en":"President Trump returned to the campaign trail yesterday as he tries to rally his MAGA base for the upcoming midterm elections.","cn":"总统特朗普昨日重返竞选之路，试图为其MAGA基础选民在即将到来的中期选举中鼓劲。","structure":"主句 + as引导的时间状语从句","analysis":"主句为President Trump returned to the campaign trail yesterday，as引导时间状语从句，表示主句动作发生的同时，从句动作也在进行。从句中tries to rally his MAGA base为不定式短语作宾语，for the upcoming midterm elections为介词短语作目的状语。"},{"en":"But a barrage of scandals, from a covered up Nazi link tattoo to toxic relationship allegations has voters ready to cast their ballots while holding their noses.","cn":"但一连串丑闻——从掩盖的纳粹关联纹身到有毒关系指控——让选民准备捏着鼻子投票。","structure":"主语 + 谓语 + 宾语 + 宾语补足语 + while引导的伴随状语","analysis":"主语为a barrage of scandals，谓语has，宾语voters，宾语补足语ready to cast their ballots，while holding their noses为现在分词短语作伴随状语。from...to...结构修饰scandals。"},{"en":"A top official in Iran tells CNN a potential deal hinges on the Trump administration agreeing to end its naval blockade and releasing $24 billion in frozen Iranian assets.","cn":"伊朗一名高级官员告诉CNN，潜在协议取决于特朗普政府同意结束其海军封锁并释放240亿美元冻结的伊朗资产。","structure":"主句 + 宾语从句","analysis":"主句为A top official in Iran tells CNN，其后为省略that的宾语从句。从句主语为a potential deal，谓语hinges on，宾语为the Trump administration agreeing to end its naval blockade and releasing $24 billion in frozen Iranian assets，其中agreeing和releasing为现在分词短语作宾语补足语。"},{"en":"It also intercepted a wave of missiles and drones launched by Iran toward the Strait of Hormuz as well as toward Kuwait and Bahrain that's threatening an already fragile ceasefire.","cn":"它还拦截了伊朗向霍尔木兹海峡以及科威特和巴林发射的一波导弹和无人机，这威胁到本已脆弱的停火。","structure":"主句 + 定语从句","analysis":"主句为It also intercepted a wave of missiles and drones，launched by Iran toward the Strait of Hormuz as well as toward Kuwait and Bahrain为过去分词短语作后置定语，修饰missiles and drones。that's threatening an already fragile ceasefire为定语从句，修饰先行词a wave of missiles and drones。"},{"en":"We heard the president of Lebanon tell CNN's Christiane Amanpour that he felt Lebanon was being used as a bargaining chip.","cn":"我们听到黎巴嫩总统告诉CNN的克里斯蒂安·阿曼普尔，他感到黎巴嫩被用作谈判筹码。","structure":"主句 + 宾语从句 + 宾语从句","analysis":"主句为We heard the president of Lebanon tell CNN's Christiane Amanpour，其中tell为不带to的不定式作宾语补足语。其后为that引导的宾语从句，从句中又包含一个省略that的宾语从句Lebanon was being used as a bargaining chip。"},{"en":"The judge in the case said she had no qualms about handing down the sentence.","cn":"该案法官表示，她对宣判毫无疑虑。","structure":"主句 + 宾语从句","analysis":"主句为The judge in the case said，其后为省略that的宾语从句。从句主语为she，谓语had no qualms about handing down the sentence，其中handing down为动名词短语作介词about的宾语。"},{"en":"Prosecutors said Banfield hatched a plan to kill his wife, Christine Banfield, and another man, Joseph Ryan.","cn":"检察官称，班菲尔德策划了一个杀害其妻子克里斯汀·班菲尔德和另一名男子约瑟夫·瑞安的计划。","structure":"主句 + 宾语从句","analysis":"主句为Prosecutors said，其后为省略that的宾语从句。从句主语为Banfield，谓语hatched，宾语a plan，不定式短语to kill his wife, Christine Banfield, and another man, Joseph Ryan作后置定语修饰plan。"},{"en":"They say he used a fetish website to lure Ryan to his house under the guise of having consensual sex with his wife.","cn":"他们称他利用一个恋物网站，以与妻子发生自愿性行为为幌子，将瑞安引诱到他的房子。","structure":"主句 + 宾语从句","analysis":"主句为They say，其后为省略that的宾语从句。从句主语为he，谓语used，宾语a fetish website，不定式短语to lure Ryan to his house作目的状语，under the guise of having consensual sex with his wife为介词短语作方式状语。"},{"en":"The plot was to frame Ryan, whom Banfield would allege attacked his wife, telling the jury he killed Ryan in an attempt to save his wife's life.","cn":"该计划是为了陷害瑞安，班菲尔德会声称瑞安袭击了他的妻子，并告诉陪审团他杀死瑞安是为了救他妻子的命。","structure":"主句 + 定语从句 + 伴随状语","analysis":"主句为The plot was to frame Ryan，whom引导定语从句修饰Ryan，从句中Banfield would allege为插入语，attacked his wife为省略that的宾语从句。telling the jury...为现在分词短语作伴随状语，其中he killed Ryan in an attempt to save his wife's life为省略that的宾语从句。"},{"en":"The au pair said Banfield wanted to be with her but did not want to pay for a divorce or share custody of the couple's daughter.","cn":"互惠生说班菲尔德想和她在一起，但不想支付离婚费用或分享这对夫妇女儿的监护权。","structure":"主句 + 宾语从句","analysis":"主句为The au pair said，其后为省略that的宾语从句。从句主语为Banfield，谓语由wanted和did not want并列，wanted to be with her为不定式短语作宾语，did not want to pay for a divorce or share custody of the couple's daughter中pay和share并列作不定式宾语。"},{"en":"The Justice Department has officially killed plans for President Trump's so called anti-weaponization fund.","cn":"司法部已正式取消了特朗普总统所谓的反武器化基金的计划。","structure":"主谓宾结构","analysis":"主语为The Justice Department，谓语has killed，宾语plans，介词短语for President Trump's so called anti-weaponization fund作后置定语修饰plans。"},{"en":"President Trump says he's interviewing five candidates for the job of Director of National Intelligence.","cn":"总统特朗普表示他正在面试五位国家情报总监职位的候选人。","structure":"主句 + 宾语从句","analysis":"主句为President Trump says，其后为省略that的宾语从句。从句主语为he，谓语is interviewing，宾语five candidates，介词短语for the job of Director of National Intelligence作后置定语。"},{"en":"And I think some of the alarm that you saw on Capitol Hill at the notion of this person getting intel -- control of the intelligence apparatus is that he's already shown that he's part of the retribution campaign that the President is waging.","cn":"我认为你在国会山看到的对这个人获得情报——控制情报机构的担忧，是因为他已经表明他是总统发起的报复运动的一部分。","structure":"主句 + 宾语从句 + 定语从句 + 表语从句","analysis":"主句为I think，其后为省略that的宾语从句。从句主语为some of the alarm，that you saw on Capitol Hill at the notion of this person getting intel -- control of the intelligence apparatus为定语从句修饰alarm，其中at the notion of...为介词短语作状语。is为系动词，that he's already shown that he's part of the retribution campaign that the President is waging为表语从句，其中that he's already shown为宾语从句，that he's part of the retribution campaign that the President is waging为shown的宾语从句，其中that the President is waging为定语从句修饰campaign。"},{"en":"The Department of Justice has now told two federal courts that cases challenging that fund are moot because the administration has abandoned the program.","cn":"司法部现已告知两个联邦法院，质疑该基金的案件已无实际意义，因为政府已放弃该计划。","structure":"主句 + 宾语从句 + 原因状语从句","analysis":"主句为The Department of Justice has now told two federal courts，其后为that引导的宾语从句。从句主语为cases，challenging that fund为现在分词短语作后置定语，谓语are moot，because引导原因状语从句。"},{"en":"One of the cases is 35 former federal judges alleging that the President and the Department of Justice defrauded the court, that there was no real conflict and they colluded to create this fund.","cn":"其中一起案件是35名前联邦法官指控总统和司法部欺诈法庭，称没有真正的冲突，他们合谋创建了这个基金。","structure":"主系表结构 + 定语 + 宾语从句","analysis":"主语为One of the cases，系动词is，表语35 former federal judges，alleging that...为现在分词短语作后置定语修饰judges，其后为两个that引导的并列宾语从句，第一个that从句中主语为the President and the Department of Justice，谓语defrauded，宾语the court；第二个that从句中主语为there，系动词was，表语no real conflict，and连接并列句they colluded to create this fund。"},{"en":"It found that A.I. data centers consume more electricity than most countries on average, and they also require massive amounts of water.","cn":"它发现人工智能数据中心平均消耗的电力比大多数国家还多，并且它们还需要大量的水。","structure":"主句 + 宾语从句","analysis":"主句为It found，其后为that引导的宾语从句。从句由两个并列分句组成：第一个分句主语为A.I. data centers，谓语consume，宾语more electricity，than most countries on average为比较状语；第二个分句主语为they，谓语require，宾语massive amounts of water。"},{"en":"The report explores the tens of billions of watt hours that it takes to train some of these A.I. models, massive amounts of energy.","cn":"该报告探讨了训练其中一些人工智能模型所需的数百亿瓦时，即大量的能源。","structure":"主句 + 定语从句","analysis":"主句为The report explores the tens of billions of watt hours，that it takes to train some of these A.I. models为定语从句修饰watt hours，其中it为形式主语，真正主语为不定式短语to train some of these A.I. models。massive amounts of energy为同位语，补充说明tens of billions of watt hours。"},{"en":"One of the things that is always unfair in this comparison is people talk about how much energy it takes to train an A.I. model, relative to how much it costs a human to do one inference query.","cn":"在这种比较中，总是不公平的一点是，人们谈论训练一个人工智能模型需要多少能量，相对于人类进行一次推理查询需要多少成本。","structure":"主句 + 定语从句 + 表语从句 + 宾语从句","analysis":"主语为One of the things，that is always unfair in this comparison为定语从句修饰things，系动词is，表语为省略that的表语从句people talk about how much energy it takes to train an A.I. model, relative to how much it costs a human to do one inference query，其中how much energy it takes to train an A.I. model为宾语从句，relative to...为介词短语作状语，how much it costs a human to do one inference query为宾语从句。"},{"en":"But it also takes a lot of energy to train a human.","cn":"但训练一个人也需要大量能量。","structure":"主谓宾结构，it作形式主语","analysis":"it为形式主语，真正主语为不定式短语to train a human，谓语takes，宾语a lot of energy。"},{"en":"It takes like 20 years of life, and all of the food you eat during that time before you get smart.","cn":"这需要大约20年的生命，以及你在那段时间里吃的所有食物，然后你才能变得聪明。","structure":"并列句","analysis":"第一个分句It takes like 20 years of life，第二个分句and all of the food you eat during that time before you get smart，其中you eat during that time为定语从句修饰food，before you get smart为时间状语从句。"},{"en":"A top Iranian official tells CNN the Trump administration must agree to end its naval blockade and also release $24 billion in frozen Iranian assets to end this war.","cn":"一名伊朗高级官员告诉CNN，特朗普政府必须同意结束其海军封锁，并释放240亿美元的冻结伊朗资产，以结束这场战争。","structure":"主句（A top Iranian official tells CNN）+ 宾语从句（the Trump administration must agree to end its naval blockade and also release $24 billion in frozen Iranian assets to end this war）","analysis":"主句为简单主谓宾结构，宾语从句中并列两个动词短语（agree to end... and release...），不定式to end this war表示目的。"},{"en":"Overnight, the U.S. military struck several coastal sites in Iran, and the Iranians launched waves of missiles and drones toward the Strait of Hormuz, toward Kuwait, Bahrain, threatening to unravel a very fragile ceasefire.","cn":"一夜之间，美军打击了伊朗的多个沿海地点，伊朗人向霍尔木兹海峡、科威特、巴林发射了多波导弹和无人机，威胁要破坏一个非常脆弱的停火。","structure":"并列句（the U.S. military struck... and the Iranians launched...）+ 现在分词短语（threatening to unravel...）作结果状语","analysis":"两个并列句由and连接，现在分词短语threatening...表示伴随结果，unravel意为“破坏”。"},{"en":"U.S. Central Command, which governs military operations in the Middle East and in the Gulf, says they intercepted four one-way attack drones and then carried out strikes on two surveillance radar sites on Iran's coast that they say will ensure the safety and maritime security in the region there.","cn":"美国中央司令部负责中东和海湾地区的军事行动，称他们拦截了四架单向攻击无人机，然后对伊朗海岸的两个监视雷达站进行了打击，他们称这将确保该地区的安全和海上安全。","structure":"主句（U.S. Central Command says）+ 宾语从句（they intercepted... and then carried out...）+ 定语从句（that they say will ensure...）修饰sites","analysis":"主句主语后跟非限制性定语从句which governs...，宾语从句中并列两个谓语动词，定语从句中they say为插入语。"},{"en":"Now, President Donald Trump has said that the ceasefire negotiations and the talks were moving very fast, but it doesn't appear that anything is moving fast here.","cn":"现在，唐纳德·特朗普总统表示停火谈判进展非常迅速，但似乎这里没有任何事情进展迅速。","structure":"并列句（President Donald Trump has said that... but it doesn't appear that...）","analysis":"第一个分句包含that引导的宾语从句，第二个分句包含that引导的主语从句（it为形式主语）。"},{"en":"An adviser to Iran's supreme leader says the talks are deadlocked, and Iran continues to operate and negotiate from what they see as a position of strength.","cn":"伊朗最高领袖的一名顾问表示谈判陷入僵局，伊朗继续从他们认为的强势地位运作和谈判。","structure":"并列句（An adviser says... and Iran continues to...）+ 介词from后接宾语从句（what they see as a position of strength）","analysis":"第一个分句为简单主谓宾，第二个分句中from后接what引导的宾语从句，as a position of strength为宾语补足语。"},{"en":"The president visited Chippewa Falls, Wisconsin, for a rally branded as Fighting for American Farmers, but in his remarks, the president seemed more focused on fountains and reflecting pools back in D.C.","cn":"总统访问了威斯康星州奇珀瓦福尔斯，参加一场名为“为美国农民而战”的集会，但在他的讲话中，总统似乎更关注华盛顿特区的喷泉和倒影池。","structure":"并列句（The president visited... but the president seemed...）","analysis":"第一个分句中branded as...为过去分词短语作定语修饰rally，第二个分句中more focused on...为形容词短语作表语。"},{"en":"The Justice Department has now sent one of its attorneys to observe ballot processing in Los Angeles, and President Trump has made false claims of election fraud there.","cn":"司法部现已派遣一名律师前往洛杉矶观察选票处理过程，特朗普总统在那里提出了关于选举欺诈的虚假指控。","structure":"并列句（The Justice Department has sent... and President Trump has made...）","analysis":"两个并列句由and连接，第一个分句中不定式to observe...表示目的。"},{"en":"County officials have defended their processes, writing on social media on Thursday that the dedicated staff is working to ensure that every vote is accurately processed and verified for counting.","cn":"县官员为其流程辩护，周四在社交媒体上写道，敬业的工作人员正在努力确保每张选票都得到准确处理和验证以进行计数。","structure":"主句（County officials have defended their processes）+ 现在分词短语（writing...）作伴随状语，内含that引导的宾语从句，宾语从句中又包含ensure后that引导的宾语从句","analysis":"现在分词短语writing...中，that引导的宾语从句作writing的宾语，该从句中ensure后接that引导的宾语从句。"},{"en":"Ukraine has launched a major drone strike on Saint Petersburg as Russia hosts President Vladimir Putin's signature economic forum, which has drawn thousands of attendees from around the world.","cn":"乌克兰对圣彼得堡发动了一次大规模无人机袭击，而俄罗斯正在举办总统弗拉基米尔·普京的标志性经济论坛，该论坛吸引了来自世界各地的数千名与会者。","structure":"主句（Ukraine has launched...）+ as引导的时间状语从句（as Russia hosts...）+ 非限制性定语从句（which has drawn...）修饰forum","analysis":"主句为现在完成时，as从句表示同时发生，which从句补充说明论坛的影响。"},{"en":"The CDC says the current Ebola outbreak in the Democratic Republic of Congo could become the largest on record, and researchers say without rapid public health action, the outbreak could surpass past epidemics.","cn":"美国疾病控制与预防中心表示，刚果民主共和国当前的埃博拉疫情可能成为有记录以来最大的一次，研究人员表示，如果不采取迅速的公共卫生行动，疫情可能超过以往的流行病。","structure":"并列句（The CDC says... and researchers say...）","analysis":"两个分句均为say后接宾语从句，第二个分句中without rapid public health action为条件状语。"},{"en":"Five astronauts on the International Space Station were told to take shelter on Friday after a leak was found in the Russian-controlled side of the orbiting lab.","cn":"周五，国际空间站上的五名宇航员被告知要躲避，因为在轨道实验室的俄罗斯控制侧发现了一个泄漏。","structure":"主句（Five astronauts were told to take shelter）+ after引导的时间状语从句（after a leak was found...）","analysis":"主句为被动语态，不定式to take shelter作主语补足语，after从句为被动语态。"},{"en":"Pope Leo is in Madrid this morning, the first stop on his six-day tour of Spain, and we'll talk about how he's using the trip to address one of the church's biggest controversies.","cn":"教皇利奥今早在马德里，这是他为期六天的西班牙之行的第一站，我们将讨论他如何利用这次旅行来解决教会最大的争议之一。","structure":"并列句（Pope Leo is in Madrid... and we'll talk about...）+ 宾语从句（how he's using the trip to address...）","analysis":"第一个分句中the first stop...为同位语，第二个分句中how引导宾语从句，不定式to address表示目的。"},{"en":"He's also here to try and encourage the catholic church in Spain, which, you know, it's a secularized country here, but there are strong catholic roots.","cn":"他来这里也是为了尝试鼓励西班牙的天主教会，你知道，这是一个世俗化的国家，但有深厚的天主教根基。","structure":"主句（He's also here to try and encourage...）+ 非限制性定语从句（which... it's a secularized country...）","analysis":"主句中不定式to try and encourage表示目的，定语从句中which指代Spain，you know为插入语，从句由but连接的两个并列分句组成。"},{"en":"He also pointed out, though, that his trip to Madrid coincides with a concert by the musician Bad Bunny, and he said that many young people will probably go to see Bad Bunny rather than see the pope.","cn":"不过，他也指出，他的马德里之行恰逢音乐家坏兔子的音乐会，他说许多年轻人可能会去看坏兔子而不是看教皇。","structure":"主句（He also pointed out that... and he said that...）","analysis":"两个that引导的宾语从句并列，第一个从句中coincides with意为“与...同时发生”，第二个从句中rather than表示对比。"},{"en":"Iran's military launched a wave of missile and drone strikes overnight, targeted the Strait of Hormuz, Kuwait, Bahrain, and the U.S. countered with strikes on several targets along Iran's coastline.","cn":"伊朗军方一夜之间发动了一波导弹和无人机袭击，目标是霍尔木兹海峡、科威特、巴林，美国则对伊朗海岸线上的多个目标进行了打击作为回应。","structure":"并列句（Iran's military launched... and the U.S. countered...）","analysis":"第一个分句中targeted为过去分词作伴随状语，第二个分句中with strikes...表示方式。"},{"en":"The Iranian strategy here by exploiting the gray zone, by continuing low intensity fighting during the ceasefire, and also saying yes, no, and maybe to talks all at the same time, is designed to put America to the choice and see what we'll want versus what we will settle for.","cn":"伊朗在此的策略是利用灰色地带，在停火期间继续低强度战斗，同时对话谈说“是”、“不”和“也许”，旨在让美国做出选择，看看我们想要什么与我们愿意接受什么。","structure":"主句（The Iranian strategy... is designed to put America to the choice and see...）+ 方式状语（by exploiting..., by continuing..., and also saying...）","analysis":"主语strategy后跟三个并列的by短语作方式状语，谓语is designed to后接两个并列不定式，see后接两个what引导的宾语从句。"},{"en":"The Islamic Republic of Iran's entire military strategy is basically reliant on working by, with, and through downtrodden and dispossessed persons in the heartland of the Arab and Muslim world to continue its fighting for it.","cn":"伊朗伊斯兰共和国的整个军事战略基本上依赖于通过、与、以及利用阿拉伯和穆斯林世界腹地受压迫和被剥夺的人来继续为其战斗。","structure":"主句（The entire military strategy is reliant on working...）+ 不定式短语（to continue its fighting for it）作目的状语","analysis":"working后接三个并列介词by, with, and through，downtrodden and dispossessed persons为宾语，不定式表示目的。"},{"en":"The question is, what kind of capacity does the Lebanese state have to push back, and what can and can't America and Israel do to help them?","cn":"问题是，黎巴嫩国家有什么能力进行反击，美国和以色列能做什么和不能做什么来帮助他们？","structure":"主句（The question is）+ 两个并列的疑问句（what kind of capacity... and what can and can't...）","analysis":"主句为系表结构，表语为两个并列的疑问句，第二个疑问句中can and can't为并列情态动词。"},{"en":"Because look at what the Islamic Republic of Iran is doing: its most powerful proxy in Lebanon got clobbered by Israel, and yet still, as much as this regime needs cash, it is risking losing all of that just to stand by its partner and proxy, Hezbollah.","cn":"因为看看伊朗伊斯兰共和国在做什么：其在黎巴嫩最强大的代理人被以色列重创，然而，尽管该政权急需现金，它仍冒着失去所有这些的风险，只是为了支持其伙伴和代理人真主党。","structure":"祈使句（look at...）+ 冒号后解释说明（its most powerful proxy got clobbered... and yet still... it is risking...）","analysis":"look at后接what引导的宾语从句，冒号后为两个并列分句，第二个分句中as much as引导让步状语从句，不定式to stand by表示目的。"},{"en":"The Higginbothams were vacationing in Kyoto, Japan, a major tourist destination in one of the world's safest countries, but after a small disagreement with his mom, they agreed to give each other some space.","cn":"希金博特姆一家正在日本京都度假，京都是世界上最安全的国家之一的主要旅游目的地，但在与母亲发生小争执后，他们同意给彼此一些空间。","structure":"并列句（The Higginbothams were vacationing... but they agreed to...）","analysis":"第一个分句中a major tourist destination...为同位语，第二个分句中after...为时间状语。"}],"topics":[{"title":"美国中期选举","content":"美国中期选举每两年举行一次，在总统任期中间进行，改选众议院全部席位和参议院部分席位。2026年中期选举将决定国会控制权，对总统特朗普的施政至关重要。本文提到特朗普在威斯康星州为农民举行集会，试图巩固其MAGA基础选民的支持，同时共和党努力维持参议院多数。","keywords":"midterm elections, MAGA base, Senate majority, campaign trail"},{"title":"美伊关系与核谈判","content":"美国与伊朗的核谈判陷入僵局。伊朗要求美国解除海军封锁并释放240亿美元冻结资产，否则将把战争扩大到印度洋、红海等地。美国军方拦截了伊朗发射的导弹和无人机，以色列也加强了对黎巴嫩真主党的打击。特朗普表示将很快以强硬方式解决伊朗问题。","keywords":"Iran, naval blockade, frozen assets, ceasefire, Hezbollah"},{"title":"人工智能的环境影响","content":"联合国大学报告指出，人工智能数据中心消耗大量电力和水资源，其碳排放相当于一些大国的排放量。随着AI模型训练和运行的需求增长，预计到2030年能源和水资源消耗将翻倍。这引发了关于AI可持续性的讨论，以及数据中心选址与当地社区的冲突。","keywords":"AI data centers, electricity consumption, water usage, carbon emissions, sustainability"},{"title":"缅因州参议员选举","content":"民主党候选人格雷厄姆·普拉特纳是缅因州参议员选举的领先者，但面临一系列丑闻，包括纳粹纹身和有毒关系指控。选民对其态度矛盾，部分人仍计划投票给他，但缺乏热情。现任共和党参议员苏珊·柯林斯寻求连任，选举结果可能影响参议院控制权。","keywords":"Graham Platner, Susan Collins, Maine primary, scandals, voter enthusiasm"},{"title":"特朗普情报总监任命争议","content":"特朗普任命联邦住房金融局局长比尔·普尔特临时担任国家情报总监，但普尔特缺乏情报经验且未获安全许可。此举引发国会担忧，认为普尔特可能参与总统的报复行动。特朗普表示将寻找永久人选，但普尔特任期可能持续到11月大选后。","keywords":"Bill Pulte, Director of National Intelligence, security clearance, retribution campaign"},{"title":"反武器化基金争议","content":"司法部告知法院，特朗普的“反武器化基金”计划已被放弃，相关案件已无实际意义。但35名前联邦法官指控总统和司法部欺诈法庭，合谋创建该基金。尽管政府声称放弃，但基金可能被重新启用，且已有资金用于和解。","keywords":"anti-weaponization fund, Justice Department, fraud on the court, moot"},{"title":"弗吉尼亚州双重谋杀案","content":"前国税局特工布伦丹·班菲尔德因谋杀妻子和另一名男子被判处终身监禁。案件涉及与家庭互惠生的婚外情，班菲尔德利用恋物网站引诱受害者，并试图嫁祸于人。互惠生认罪并作证，被判10年监禁。","keywords":"Brendan Banfield, au pair, double murder, life sentence, fetish website"},{"title":"教皇利奥访问西班牙","content":"教皇利奥开始对西班牙进行为期六天的访问，重点关注政治两极分化和移民问题。他将访问移民中心并在议会发表演讲，还会在巴塞罗那参观圣家堂，并预计会见性虐待幸存者。","keywords":"Pope Leo, Spain, migration, political polarization, sexual abuse survivors"},{"title":"Iran-U.S. Conflict and Ceasefire Negotiations","content":"The transcript covers the ongoing military conflict between Iran and the U.S., including missile and drone strikes, naval blockades, and ceasefire negotiations. Iran demands the release of frozen assets and an end to the blockade, while the U.S. conducts strikes on Iranian coastal sites. The situation is described as a fragile ceasefire with escalating violence.","keywords":"Iran, U.S., ceasefire, naval blockade, frozen assets, Strait of Hormuz, ballistic missiles, drone strikes"},{"title":"U.S. Midterm Elections and Trump's Campaign","content":"President Trump is campaigning for the upcoming midterm elections, holding a rally in Wisconsin branded as 'Fighting for American Farmers.' The transcript highlights his remarks, including his reluctance to campaign and focus on D.C. fountains. The Justice Department sends an attorney to observe ballot counting in Los Angeles amid Trump's false claims of election fraud.","keywords":"midterm elections, Trump, rally, ballot counting, election fraud, Justice Department"},{"title":"Pope Leo's Visit to Spain","content":"Pope Leo begins a six-day visit to Spain, focusing on migration and political polarization. He plans to visit migrant centers, address Spain's parliament, and meet with Prime Minister Pedro Sanchez. The visit is his first major European trip since election, and he also comments on young people's interest in Catholicism.","keywords":"Pope Leo, Spain, migration, political polarization, parliament, Bad Bunny"},{"title":"Missing American Student in Japan","content":"20-year-old Auburn University student James Weston Higginbotham goes missing during a family vacation in Kyoto, Japan. The family refuses to leave without him, and search efforts involve K-9 units and volunteer hikers. His mother posts daily appeals on social media, and police continue the search.","keywords":"missing student, Japan, Kyoto, search, K-9 unit, volunteer, family"},{"title":"International Space Station Leak","content":"Five astronauts on the International Space Station are told to take shelter after a leak is found in the Russian-controlled side. They move into a SpaceX Crew Dragon capsule for potential escape. Repairs are delayed for further assessment.","keywords":"International Space Station, leak, shelter, SpaceX Crew Dragon, NASA"},{"title":"Ebola Outbreak in DRC","content":"The CDC warns that the current Ebola outbreak in the Democratic Republic of Congo could become the largest on record, with at least 60 confirmed deaths. Researchers emphasize the need for rapid public health action to prevent it from surpassing past epidemics.","keywords":"Ebola, DRC, outbreak, CDC, public health"},{"title":"Ukraine Drone Strike on Saint Petersburg","content":"Ukraine launches a major drone strike on Saint Petersburg during Russia's economic forum. Russian officials report over 100 drones shot down, with damage and fires. The strike occurs amid ongoing tensions.","keywords":"Ukraine, drone strike, Saint Petersburg, Russia, economic forum"},{"title":"Trump's Pick for Acting Director of National Intelligence","content":"President Trump faces backlash over his choice of Bill Pulte as acting Director of National Intelligence, citing Pulte's lack of national security qualifications. Trump defends the pick, suggesting Pulte may reduce the size of the office or even terminate it.","keywords":"Bill Pulte, Director of National Intelligence, backlash, qualifications, ODNI"},{"title":"Severe Weather in the U.S.","content":"A cold front brings severe storms to the Midwest and Northeast, including New York City and Philadelphia, with damaging winds and hail. The heat builds up before the storms, and a brief cool-down is expected before more heat later in the week.","keywords":"severe weather, storms, cold front, Midwest, Northeast, heat"}]},"2026-06-05":{"date":"2026-06-05","source_url":"https://transcripts.cnn.com/show/ctmo/date/2026-06-05/segment/01","raw_transcript":"Return to Transcripts main page\n\nSenate Passes $70 Billion ICE and Border Patrol Bill; NYT Details New Allegations against Graham Platner; Kevin O'Leary Cuts Back Data Center Project after Public Protests; CBS News Races to Steady '60 Minutes' after Pelley's Firing. Aired 6-6:30a ET\n\nAired June 05, 2026 - 06:00   ET\n\nTHIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED.\n\nUNIDENTIFIED MALE: It's just a quick, easy money grab for these guys.\n\nBRAD SMITH, CNN ANCHOR: Police say that there has been a rise in the value of collectible cards, so they are seeing more thefts in the area.\n\nAnd game two of the NBA finals set to tip off in San Antonio tonight. Knicks going to put their 12-game playoff winning streak on the line against the Spurs.\n\nThat does it for CNN HEADLINE EXPRESS. I'm Brad Smith. CNN THIS MORNING with Audie Cornish starts right now.\n\nAUDIE CORNISH, CNN ANCHOR: Today in the group chat, that story about Maine Senate candidate Graham Platner explaining himself again after new revelations from his past. Will Democrats stand behind him this time, too?\n\nUNIDENTIFIED MALE: Have you considered dropping out of the race?\n\nGRAHAM PLATNER (D), MAINE SENATE CANDIDATE: No, not once.\n\nCORNISH: Senators staying up past their bedtime. There was a big Republican victory just moments ago, quickly followed by a stinging setback.\n\nUNIDENTIFIED MALE: All I have is a gas pedal. I don't have a brake pedal.\n\n(END VIDEO CLIP) CORNISH: Anthropic warning that A.I. could soon build its own successors. Is that as scary as it sounds?\n\nA new video showing what one sailor called a fight-or-die situation. The charred interior of a U.S. aircraft carrier after a fast-moving fire on board.\n\nGOV. SPENCER COX (R-UT): People are concerned about -- about data centers. They're concerned about the lake. They're concerned about resources.\n\nCORNISH: So, now Kevin O'Leary, pulling back on some of his A.I. data center project. Is that going to be enough to ease concerns in Utah?\n\nAnd the World Cup opener less than a week away. But could the beautiful game be clouded by a climate of fear?\n\nUNIDENTIFIED MALE: The Hispanic community loves football, you know, and they want to go and enjoy and spend time with family.\n\nCORNISH: We're starting with this breaking news. While you were asleep, your senator was still working.\n\nHappy Friday. I'm Audie Cornish. And the U.S. Senate took almost 20 hours voting down amendment after amendment. But just a short time ago, they voted to approve the $70 billion Republican immigration bill.\n\nUNIDENTIFIED MALE: This bill, as amended, is passed.\n\nCORNISH: So, here's what this bill will do: fund ICE and Border Patrol through the rest of Trump's term.\n\nBut Senate Republicans rejected proposals to formally kill the president's anti-weaponization fund in the process.\n\nThe Bill now goes to the House.\n\nNow, just minutes later, seven Senate Republicans voted to block consideration of a contentious bill that would reauthorize the nation's spy powers. This is known as FISA, and it's a blow to Republican leaders.\n\nSo, we're going to be keeping an eye on that throughout the hours and days ahead.\n\nThe current FISA law expires one week from today.\n\nWe're also following this developing story. More unsettling allegations in the Graham Platner saga. This is just days after the Maine Senate candidate met with Senate Democrats to assure them no other shoes were going to drop.\n\nNow there's this: a report published in \"The New York Times,\" describing volatile and toxic relationships. At least one case of physically threatening behavior, which Platner outright denies.\n\nPLATNER: There are some allegations in this piece that I just want to be kind of unequivocal about are simply not true. Anything alleging physicality; anything alleging that I knew what my tattoo was. These are the statements of someone who's politically motivated.\n\nCORNISH: In the report, six women spoke out. One of them accuses him of twisting her arm. Some accounts go back more than a decade to a time when Platner, a combat veteran, says he was struggling with PTSD.\n\nPLATNER: In this piece, there's a lot about my struggling; not being a good boyfriend. Certainly, self-medicating with alcohol.\n\nAnd I've been very up front since the beginning of this campaign that that was a pretty dark period of my life after I came back from my combat service. And that's what that combat -- that's what that kind of life looks like.\n\nAnd -- and so, there are things in this that I absolutely will take responsibility for and have been speaking about openly for months now. But those serious allegations are just not true.\n\nCORNISH: So, the question this morning for Democrats: is it too late to cut bait?\n\nUNIDENTIFIED FEMALE: I'm very optimistic we're going to win Maine.\n\nMANU RAJU, CNN CHIEF CONGRESSIONAL CORRESPONDENT: Do you talk about any other shoes to drop that could come out in this race, or did he try to get ahead of any of that?\n\nSEN. TINA SMITH (D-MN): No, we didn't talk about that.\n\nThe main thing we talked about was really what his -- why it is that he's been connecting so much with -- with Maine voters.\n\nSEN. PETER WELCH (D-VT): He's accepting the burden that he's got to give his explanation of that to Maine voters. And they decide.\n\nKAITLAN COLLINS, CNN ANCHOR: Are you worried about anything else coming out about him?\n\nSEN. BERNIE SANDERS (I-VT): I don't know. All I can say is, look, I'm sure he's not a saint. And by the way, let's not forget he has acknowledged -- this guy served four tours of duty in Iraq and Afghanistan. He went through some very bloody and horrible situations. He has acknowledged that he came back with PTSD.\n\nCORNISH: Joining me now in the group chat, Elliot Williams, CNN legal analyst and former federal prosecutor; Carine Hajjar, \"Washington Post\" editorial board member; and Noel King, co-host and editorial director of the \"Today, Explained\" podcast. Thank you guys for being here.\n\nSo, one of the things I'm looking at is response. Response on the left, response from Democrats.\n\nThe other thing I'm looking at is what next? Because this election is going to happen in a few days. And earlier this week, Governor Janet Mills told \"The Portland Press\" earlier that, quote, \"People have the impression that I withdrew or dropped out, but I simply suspended active campaigning. I'm still on the ballot.\"\n\nSo, there is another option.\n\nCARINE HAJJAR, EDITORIAL BOARD MEMBER, \"THE WASHINGTON POST\": There is. There is another option. And, you know, I think any sense of surprise -- oh, another Platner story. Well, we had a warning that he was a flawed candidate, a problematic candidate.\n\nCORNISH: And we should say you have been covering this race since the beginning.\n\nHAJJAR: Since the beginning in October, there was news of his tattoo. There are -- there's a lot of reporting that suggests he was aware of what that looked like. He denies that he was aware of it; covers it up under political scrutiny.\n\nI think those are flashing red lights that you have a problematic candidate and that we're -- that Democrats are scrambling right before the Tuesday primary.\n\nCORNISH: Yes. But does it matter if the problematic part is the story? Meaning his whole entire spiel has been, I was a bad guy. I saw the light. And you want more guys like me seeing the light. Democrats.\n\nAnd you know what I mean? The sort of, like, I could have been in the manosphere. But look, I'm here running as a Democrat. And what do Democrats do with that story that they've been telling? NOEL KING, CO-HOST/EDITORIAL DIRECTOR, \"TODAY, EXPLAINED\": Keep it\n\ngoing, I think, is the only option at this point.\n\nCORNISH: It's not the only option. The other option is Janet Mills.\n\nCORNISH: No, it could be.\n\nKING: I guess, I guess. Look, the thing that I think everybody wildly wants to know is do voters abandon this guy because of the problematic behavior?\n\nI mean, look at the last decade of American politics and American life. We now excuse a lot.\n\nKING: We now excuse a lot. And a guy who says, Well, in my 20s, I was often drunk and had PTSD, and that is my excuse.\n\nKING: Does America buy it?\n\nCORNISH: And there are sitting members of Congress right now --\n\nCORNISH: -- dealing with allegations of a similar manner.\n\nCan you talk to me in terms of the response from progressive voices who are, like, \"The New York Times\" is printing stuff that's uncorroborated, that's biased, and doing what I think I see almost every time in a legal story that involves this kind of --\n\nELLIOT WILLIAMS, CNN LEGAL ANALYST: Yes.\n\nCORNISH: -- claim, which is the credibility of the people making the allegations.\n\nWILLIAMS: Of the people making the allegations. Yes.\n\nWell, there are some -- you know, picking up on Noel's point. There are some awful things here with an individual who is clearly struggling with PTSD, depression, alcoholism, and a host of other things. Right?\n\nBut there are some pretty awful allegations in there.\n\nCORNISH: But he denies the most serious one, and it's the court of public opinion versus the court of law.\n\nWILLIAMS: Yes. Right. And I would also add in some of the allegations are that one of them is that -- I think he ghosted somebody. And then they -- they put it on a -- like a Facebook page for men that had ghosted them or whatever else.\n\nThat's not the kind of allegation, I think, that ought to be brought in when we're assessing whether someone is fit for office. Now --\n\nCORNISH: Well, isn't that the question? Like the -- the Democratic litmus test has been --\n\nWILLIAMS: But one thing -- No, no, no, but I'm saying it's all getting blurred together. These allegations of violence and allegations of not calling somebody back after a date. I think people should be clear as to what exactly they're regarding as the original sin here.\n\nBut I think, you know, the two folk -- the two categories of people who really need to weigh in are, No. 1, Maine voters. And No. 2, Democratic women. Like what they are comfortable with defending. What is the -- what is the \"uncle\" point?\n\nCORNISH: OK, we're going to -- we're going to let women talk, then.\n\nSo, to your point, how do you see this? I saw, buried in our clips, Ms. Gillibrand, right, who at one point was at the forefront of weighing in on this kind of drawing a line.\n\nCORNISH: Is it touching? Is it bad dates? Is it -- what is assault? What does the #MeToo movement represent? And are Democrats still maintaining or being the guardians of those boundaries?\n\nKING: No, no, I don't think so.\n\nHAJJAR: And I will say, though, it is interesting. Like, this -- this campaign has been so scandal-plagued that I think almost the effect has been watered down.\n\nBut from a poll, I think -- I believe it was a week ago. It was a UNH poll. He still led among women head-to-head with Susan Collins.\n\nNow again, Senator Collins has come back from behind in general elections before. She has won elections where she's pulled from behind the entire time.\n\nHAJJAR: But I do think, when you start with a Nazi tattoo, and then scandal after scandal after scandal comes out, you should really -- we should really be focusing on that first big red flag.\n\nWILLIAMS: I would go even further than that. If -- politics isn't about intellectual consistency. But if there were a Republican candidate with a Nazi tattoo, with allegations of -- forget the ghosting -- literally grabbing women or being abusive or hostile in relationships, Democrats would lose their minds over that.\n\nWILLIAMS: And immediately call not just for their --\n\nCORNISH: We're going to talk more about this later, because you've got people like Senator Coons who are saying, Well, you know, look at Ken Paxton in Texas. He's scandal plagued.\n\nSo, there's going to be a lot of whataboutism. There's going to be a lot of challenging these narratives leading up to this final vote.\n\nI want to turn to something else. Coming up on CNN THIS MORNING, former Attorney General Pam Bondi takes aim at Trump's pick to replace her. What she's saying about the Epstein files.\n\nPlus, the fallout over Scott Pelley's exit from \"60 Minutes.\" What staffers were told about his firing.\n\nAnd \"Shark Tank's\" Mr. Wonderful. Now Mr. Compromise. His decision to perhaps scale back his data center project.\n\nKEVIN O'LEARY, ENTREPRENEUR: I want the people that actually benefit from it to get the answers they want. I want to be totally transparent, and I plan on doing that.\n\nCORNISH: It's now 15 minutes past the hour. This is your morning roundup.\n\nThe search continues for a missing U.S. student in Japan. The Auburn University student James \"Weston\" Higginbotham was last seen a week ago at a train station.\n\nAt this point, police say there's no indication to suggest anything like a crime was committed, resulting in his disappearance.\n\nAnd this video shows the severe damage aboard an aircraft carrier me to lawyer up with CNN legal analysts, Elliot Williams.\n\nWILLIAMS: A.I. touches every aspect of our lives. We can, you know, we talked about it earlier in the program with respect to data centers and so on, but it affects the legal profession. And every industry, including lawyers, is figuring out how to make it work.\n\nNow, a few lawyers in the Ninth Circuit in California got themselves in quite a bit of trouble getting sanctioned and barred from the court for six months for fabricating entire briefs with A.I. And when we use the term hallucinations, it's A.I. in effect making up facts making up information and A.I. made-up or at least fabricated the names of cases that these lawyers were citing which come on, that's the bare minimum that someone.\n\nCORNISH: OK, I'm going to -- well, first of all I actually know a little bit about this story because I remember it was back in a few years ago --\n\nCORNISH: -- Michael Cohen, who's turned on Trump, in some of his cases, he used Google Bard, right? And that was sort of a ha-ha funny thing at the time in that headline. But now when I look at lawyer surveys by \"Reuters\", this one was just last fall, 63 percent of lawyers are using it for work.\n\nAnd I'm not surprised because the whole point of legal stuff is like there's a wall of books behind you and one of them has a clue to winning your case. It's all about information retrieval.\n\nWILLIAMS: We need to ask everyone systemically in America needs to ask the question when we say use it for work, what does that mean?\n\nCORNISH: Yeah, but it like makes sense for lawyers.\n\nWILLIAMS: It makes sense for most things. So first is document review, the idea that many young associates make a lot of money having to go through documents and pull every time you see the word investment or bank. Well, A.I. can do that like that in a matter of moments.\n\nNow, when you start getting into the world of what are the cases I ought to be citing and either fabricating or just pul  a letter to FIFA about this. Have you heard back? What is it that you hope they would do?\n\nKAMLAGER-DOVE: Well, I think these ticket prices are, in technical terms, a hot mess for fans and for cities. We sent a letter, we haven't heard back from FIFA, but the issue is dynamic pricing.\n\nThe other issue is you buy a ticket, you don't know where that seat is going to be, you're spending over $1,000, and finally you get the seat and you're behind a post and you can't see anything.\n\nWe want to know why ticket prices are changing so dramatically from city to city. I want to know why cities aren't getting any financial support from the World Cup to actually put on the games because World Cup is getting everything -- concessions, merchandise, parking tickets. I mean, Infantino is taking the entire bag and we have gotten no information and in fact when we asked, then they raised tickets more. So what is going on with that?\n\nCORNISH: Okay, I have that same exact question, but for a different topic. The vote in California.\n\nKAMLAGER-DOVE: Yeah.\n\nCORNISH: Several panelists this week have been like, why does this take so long? I know that there are sort of state rules about being able to cast that vote right up until election day by mail, which means some are going to arrive later. But at a certain point, it feels as though it's absurd. Other blue states are able to get their counts in. KAMLAGER-DOVE: Well, we're a big state. We're a big state. We count every vote. It does take time. We have, I think, 58 counties.\n\nWe are close to being done. I think they're about 600,000 votes left to be counted.\n\nCORNISH: Oh, is that all? Do you have somewhere to go now?\n\nKAMLAGER-DOVE: We have like 35 million people in this state. And we want to be accurate. Yes, it does take a little long, but I would rather my vote be counted than have it be snatched up by a sheriff like Chad Bianco who's trying to suppress the vote. So --\n\nCORNISH: It will be this argument about suppressing the vote versus Trump sort of allegations and. Republican claims that, look, maybe this means there's cheating going on. The longer it goes, doesn't it open you up to speculation?\n\nKAMLAGER-DOVE: No, I don't think so. I mean, obviously, the California, we're continuing to work through challenges, but I have complete trust in our secretary of state. I've actually been to the L.A. County Registrar. I have toured the facility. I see how they count, how meticulous they are. I have complete confidence in our system.\n\nCORNISH: Okay. Our panel may jump in a bit, but I just wanted to ask you one other thing. I saw this moment. You're always good for an image in hearings, I think. Okay?\n\nAnd in this one, you had this back and forth with the Secretary of State Marco Rubio. And you were also talking about issues of transparency in the administration. I'm going to try and play a good section of it so people can see what happened.\n\nKAMLAGER-DOVE: Oh, dear.\n\nKAMLAGER-DOVE: We're talking pardons for sale. We're talking about no-bid contracts to those on Trump's family and friends plan. We're talking about a $1.8 billion slush fund.\n\nAnd I think that's corruption. The American people think that's corruption. They want to know if you think that's corruption.\n\nMARCO RUBIO, SECRETARY OF STATE: Okay. Number two, this goes right to the point of transparency. You're absolutely wrong about the way the money flows. It's pretty straightforward, and I'll share it.\n\nKAMLAGER-DOVE: So I'm going to have to reclaim my time again, because the question about corruption --\n\nRUBIO: They get to ask questions you don't get to answer? Why is she leaving? I'm going to answer her questions.\n\nUNIDENTIFIED FEMALE: I will -- RUBIO: Oh, she's -- OK, I got it. Well, thank you for coming.\n\nCORNISH: Why'd you leave?\n\nKAMLAGER-DOVE: I left because I had another hearing and Secretary Rubio, who used to be a senator, knows that. So my time was up. I couldn't get any more time. I had to go to my next committee.\n\nWhat you really saw was a secretary who was filibustering and upset because I was asking him for receipts. Five months ago, Donald, what you really saw was a secretary who was filibustering and upset because I was asking him for receipts. Five months ago, Donald Trump's administration commandeered Venezuelan oil, and we have had zero transparency into that money. The companies --\n\nCORNISH: They're supposed to go through the Treasury and things like that, right?\n\nKAMLAGER-DOVE: Right. There's supposed to be an audit we haven't seen it. There are companies that have gotten these confidential licenses. Who are they? One of them was investigated for bribery by the DOJ. There was an employee at one of them that gave Trump $6 million for his campaign. And we want to know. We want to see those receipts. And I was asking him about that, and he was filibustering, and he was obviously triggered.\n\nKING: Do you think voters really do care about corruption? Because I feel like this is really an outstanding question. What is going on in this administration, if you're following it carefully, is unbelievable.\n\nAnd yet, you don't really hear very much about it from people who are not constantly watching the news, constantly thinking about what the administration is doing. And I wonder, is it a winning issue to say corruption, corruption, corruption, or does it become exhausting?\n\nKAMLAGER-DOVE: It is exhausting, and my constituents believe that this is the most corrupt administration in American history. They were outraged by this $1.8 billion slush fund that could be going to January 6ers.\n\nYou have pardons for sale. You have no bid contracts going to people that are on Trump's family and friends plan. You have attorney generals and FBI secretaries that seem to be working for Donald Trump rather than the American people.\n\nAnd the American people say, hey, this guy just took away my health care. The gas prices are going up and he's getting an arch and he's getting a ballroom.\n\nCORNISH: You can hear the narrative sort of how it comes together. Yeah.\n\nKAMLAGER-DOVE: And now you have -- we don't even know how much money is being siphoned from the sale of this Venezuelan oil and we can't see into it.\n\nCORNISH: All right, welcome back to the Group Chat as well.\n\nWhat is going on in your group chats?\n\nKAMLAGER-DOVE: Pete Hegseth. So there is this video that came out and he was supposed to be exercising with the Marines and it looked like he was about to get cut from a chorus line.\n\nCORNISH: Well, what's been interesting about seeing the Pete Hegseth exercise videos is that people have reset them to other kinds of music. And you mentioned chorus line, it's happened in other things. To the point, very briefly, military recruitment is up. They have met their goals.\n\nKAMLAGER-DOVE: Okay, good for them. But I will also tell you that the Women's Caucus was trying to honor women veterans.\n\nKAMLAGER-DOVE: And it got shut down because of Pete Hegseth, because of DEI. So we can no longer celebrate women of color. We cannot celebrate women who are in the military. And that should shock and outrage everyone who wants to make sure that the most qualified, the most competent --\n\nCORNISH: Never mind the firings that people have been --\n\nKAMLAGER-DOVE: Exactly, or celebrated.\n\nCORNISH: Carine, can you tell me, \"Washington Post\" editorial board -- can you tell me what is in your group chat?\n\nHAJJAR: Well, what's in my group chat is something I think everyone can agree on, which is my dogs are adorable at home.\n\nCORNISH: I thought you were going to say \"Summer House\", which has been the most consistent group chat. Okay, animals. Let's do it.\n\nHAJJAR: On the left is our new family dog Luna, who is Rocky on the right's niece and My dad found out today, and this is what was in the group chat, or he found out this week, that she's been biting off the sprinkler heads in our yard. She's obsessed with water.\n\nSo they bought her another little sprinkler to keep her busy, but she's caused some damage.\n\nCORNISH: I don't know about this headline, loves water. was on metal appliances.\n\nHAJJAR: Kind of destructive but -- CORNISH: Elliot, for you?\n\nWILLIAMS: Keeping it as serious as that. So, you know, the NBA Finals game two tonight, but Elmo from Sesame Street weighed in, hoping that both teams had fun. And as a New York fan myself, this sticks me a little bit. Elmo hopes some of these teams as well. Knicks, that last message, Elmo didn't mean to spur you.\n\nBut it gets worse. New York fans are shredding Elmo, one of them saying, this is not the time for sportsmanship, Elmo. These streets aren't Sesame.\n\nWILLIAMS: I hope Elmo -- I hope Elmo gets priced out and has to move to New Jersey. And don't you dare forget your roots, you red little F.\n\nWILLIAMS: This is worse than going after the Pope. This is worse than going after the Pope.\n\nSo again, Knicks fan, not Knicks fan. It's still New York, but New York's going to New York, you know?\n\nCORNISH: So they're taking stuff for surfacing that important reporting.\n\nOK, Noel, last word to you.\n\nKING: My group chat is should I go see the movie \"Backrooms\", which is supposed to be terrible.\n\nCORNISH: No, I'm going to see it today. Yeah.\n\nKING: Okay, you tell me.\n\nCORNISH: Well, because from the YouTube meme to YouTube to Hollywood pipeline, you know about this, about studios, they'd be worried because if kids are making the films on their own, what can they say yes or no to? Are you going to see any of these horror films?\n\nKAMLAGER-DOVE: No. I live horror every day in the Congress.\n\nCORNISH: That's the back room of the House of Representatives is what you're saying.\n\nOkay, thanks to our group chat. Thank you, Congresswoman, for being here. We truly appreciate it.\n\nI'm Audie Cornish and stay with us because the headlines are next.\n\n","segments":[{"seg":1,"url":"https://transcripts.cnn.com/show/ctmo/date/2026-06-05/segment/01","title":"CNN.com - Transcripts","text":"Return to Transcripts main page\n\nSenate Passes $70 Billion ICE and Border Patrol Bill; NYT Details New Allegations against Graham Platner; Kevin O'Leary Cuts Back Data Center Project after Public Protests; CBS News Races to Steady '60 Minutes' after Pelley's Firing. Aired 6-6:30a ET\n\nAired June 05, 2026 - 06:00   ET\n\nTHIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED.\n\nUNIDENTIFIED MALE: It's just a quick, easy money grab for these guys.\n\nBRAD SMITH, CNN ANCHOR: Police say that there has been a rise in the value of collectible cards, so they are seeing more thefts in the area.\n\nAnd game two of the NBA finals set to tip off in San Antonio tonight. Knicks going to put their 12-game playoff winning streak on the line against the Spurs.\n\nThat does it for CNN HEADLINE EXPRESS. I'm Brad Smith. CNN THIS MORNING with Audie Cornish starts right now.\n\nAUDIE CORNISH, CNN ANCHOR: Today in the group chat, that story about Maine Senate candidate Graham Platner explaining himself again after new revelations from his past. Will Democrats stand behind him this time, too?\n\nUNIDENTIFIED MALE: Have you considered dropping out of the race?\n\nGRAHAM PLATNER (D), MAINE SENATE CANDIDATE: No, not once.\n\nCORNISH: Senators staying up past their bedtime. There was a big Republican victory just moments ago, quickly followed by a stinging setback.\n\nUNIDENTIFIED MALE: All I have is a gas pedal. I don't have a brake pedal.\n\n(END VIDEO CLIP) CORNISH: Anthropic warning that A.I. could soon build its own successors. Is that as scary as it sounds?\n\nA new video showing what one sailor called a fight-or-die situation. The charred interior of a U.S. aircraft carrier after a fast-moving fire on board.\n\nGOV. SPENCER COX (R-UT): People are concerned about -- about data centers. They're concerned about the lake. They're concerned about resources.\n\nCORNISH: So, now Kevin O'Leary, pulling back on some of his A.I. data center project. Is that going to be enough to ease concerns in Utah?\n\nAnd the World Cup opener less than a week away. But could the beautiful game be clouded by a climate of fear?\n\nUNIDENTIFIED MALE: The Hispanic community loves football, you know, and they want to go and enjoy and spend time with family.\n\nCORNISH: We're starting with this breaking news. While you were asleep, your senator was still working.\n\nHappy Friday. I'm Audie Cornish. And the U.S. Senate took almost 20 hours voting down amendment after amendment. But just a short time ago, they voted to approve the $70 billion Republican immigration bill.\n\nUNIDENTIFIED MALE: This bill, as amended, is passed.\n\nCORNISH: So, here's what this bill will do: fund ICE and Border Patrol through the rest of Trump's term.\n\nBut Senate Republicans rejected proposals to formally kill the president's anti-weaponization fund in the process.\n\nThe Bill now goes to the House.\n\nNow, just minutes later, seven Senate Republicans voted to block consideration of a contentious bill that would reauthorize the nation's spy powers. This is known as FISA, and it's a blow to Republican leaders.\n\nSo, we're going to be keeping an eye on that throughout the hours and days ahead.\n\nThe current FISA law expires one week from today.\n\nWe're also following this developing story. More unsettling allegations in the Graham Platner saga. This is just days after the Maine Senate candidate met with Senate Democrats to assure them no other shoes were going to drop.\n\nNow there's this: a report published in \"The New York Times,\" describing volatile and toxic relationships. At least one case of physically threatening behavior, which Platner outright denies.\n\nPLATNER: There are some allegations in this piece that I just want to be kind of unequivocal about are simply not true. Anything alleging physicality; anything alleging that I knew what my tattoo was. These are the statements of someone who's politically motivated.\n\nCORNISH: In the report, six women spoke out. One of them accuses him of twisting her arm. Some accounts go back more than a decade to a time when Platner, a combat veteran, says he was struggling with PTSD.\n\nPLATNER: In this piece, there's a lot about my struggling; not being a good boyfriend. Certainly, self-medicating with alcohol.\n\nAnd I've been very up front since the beginning of this campaign that that was a pretty dark period of my life after I came back from my combat service. And that's what that combat -- that's what that kind of life looks like.\n\nAnd -- and so, there are things in this that I absolutely will take responsibility for and have been speaking about openly for months now. But those serious allegations are just not true.\n\nCORNISH: So, the question this morning for Democrats: is it too late to cut bait?\n\nUNIDENTIFIED FEMALE: I'm very optimistic we're going to win Maine.\n\nMANU RAJU, CNN CHIEF CONGRESSIONAL CORRESPONDENT: Do you talk about any other shoes to drop that could come out in this race, or did he try to get ahead of any of that?\n\nSEN. TINA SMITH (D-MN): No, we didn't talk about that.\n\nThe main thing we talked about was really what his -- why it is that he's been connecting so much with -- with Maine voters.\n\nSEN. PETER WELCH (D-VT): He's accepting the burden that he's got to give his explanation of that to Maine voters. And they decide.\n\nKAITLAN COLLINS, CNN ANCHOR: Are you worried about anything else coming out about him?\n\nSEN. BERNIE SANDERS (I-VT): I don't know. All I can say is, look, I'm sure he's not a saint. And by the way, let's not forget he has acknowledged -- this guy served four tours of duty in Iraq and Afghanistan. He went through some very bloody and horrible situations. He has acknowledged that he came back with PTSD.\n\nCORNISH: Joining me now in the group chat, Elliot Williams, CNN legal analyst and former federal prosecutor; Carine Hajjar, \"Washington Post\" editorial board member; and Noel King, co-host and editorial director of the \"Today, Explained\" podcast. Thank you guys for being here.\n\nSo, one of the things I'm looking at is response. Response on the left, response from Democrats.\n\nThe other thing I'm looking at is what next? Because this election is going to happen in a few days. And earlier this week, Governor Janet Mills told \"The Portland Press\" earlier that, quote, \"People have the impression that I withdrew or dropped out, but I simply suspended active campaigning. I'm still on the ballot.\"\n\nSo, there is another option.\n\nCARINE HAJJAR, EDITORIAL BOARD MEMBER, \"THE WASHINGTON POST\": There is. There is another option. And, you know, I think any sense of surprise -- oh, another Platner story. Well, we had a warning that he was a flawed candidate, a problematic candidate.\n\nCORNISH: And we should say you have been covering this race since the beginning.\n\nHAJJAR: Since the beginning in October, there was news of his tattoo. There are -- there's a lot of reporting that suggests he was aware of what that looked like. He denies that he was aware of it; covers it up under political scrutiny.\n\nI think those are flashing red lights that you have a problematic candidate and that we're -- that Democrats are scrambling right before the Tuesday primary.\n\nCORNISH: Yes. But does it matter if the problematic part is the story? Meaning his whole entire spiel has been, I was a bad guy. I saw the light. And you want more guys like me seeing the light. Democrats.\n\nAnd you know what I mean? The sort of, like, I could have been in the manosphere. But look, I'm here running as a Democrat. And what do Democrats do with that story that they've been telling? NOEL KING, CO-HOST/EDITORIAL DIRECTOR, \"TODAY, EXPLAINED\": Keep it\n\ngoing, I think, is the only option at this point.\n\nCORNISH: It's not the only option. The other option is Janet Mills.\n\nCORNISH: No, it could be.\n\nKING: I guess, I guess. Look, the thing that I think everybody wildly wants to know is do voters abandon this guy because of the problematic behavior?\n\nI mean, look at the last decade of American politics and American life. We now excuse a lot.\n\nKING: We now excuse a lot. And a guy who says, Well, in my 20s, I was often drunk and had PTSD, and that is my excuse.\n\nKING: Does America buy it?\n\nCORNISH: And there are sitting members of Congress right now --\n\nCORNISH: -- dealing with allegations of a similar manner.\n\nCan you talk to me in terms of the response from progressive voices who are, like, \"The New York Times\" is printing stuff that's uncorroborated, that's biased, and doing what I think I see almost every time in a legal story that involves this kind of --\n\nELLIOT WILLIAMS, CNN LEGAL ANALYST: Yes.\n\nCORNISH: -- claim, which is the credibility of the people making the allegations.\n\nWILLIAMS: Of the people making the allegations. Yes.\n\nWell, there are some -- you know, picking up on Noel's point. There are some awful things here with an individual who is clearly struggling with PTSD, depression, alcoholism, and a host of other things. Right?\n\nBut there are some pretty awful allegations in there.\n\nCORNISH: But he denies the most serious one, and it's the court of public opinion versus the court of law.\n\nWILLIAMS: Yes. Right. And I would also add in some of the allegations are that one of them is that -- I think he ghosted somebody. And then they -- they put it on a -- like a Facebook page for men that had ghosted them or whatever else.\n\nThat's not the kind of allegation, I think, that ought to be brought in when we're assessing whether someone is fit for office. Now --\n\nCORNISH: Well, isn't that the question? Like the -- the Democratic litmus test has been --\n\nWILLIAMS: But one thing -- No, no, no, but I'm saying it's all getting blurred together. These allegations of violence and allegations of not calling somebody back after a date. I think people should be clear as to what exactly they're regarding as the original sin here.\n\nBut I think, you know, the two folk -- the two categories of people who really need to weigh in are, No. 1, Maine voters. And No. 2, Democratic women. Like what they are comfortable with defending. What is the -- what is the \"uncle\" point?\n\nCORNISH: OK, we're going to -- we're going to let women talk, then.\n\nSo, to your point, how do you see this? I saw, buried in our clips, Ms. Gillibrand, right, who at one point was at the forefront of weighing in on this kind of drawing a line.\n\nCORNISH: Is it touching? Is it bad dates? Is it -- what is assault? What does the #MeToo movement represent? And are Democrats still maintaining or being the guardians of those boundaries?\n\nKING: No, no, I don't think so.\n\nHAJJAR: And I will say, though, it is interesting. Like, this -- this campaign has been so scandal-plagued that I think almost the effect has been watered down.\n\nBut from a poll, I think -- I believe it was a week ago. It was a UNH poll. He still led among women head-to-head with Susan Collins.\n\nNow again, Senator Collins has come back from behind in general elections before. She has won elections where she's pulled from behind the entire time.\n\nHAJJAR: But I do think, when you start with a Nazi tattoo, and then scandal after scandal after scandal comes out, you should really -- we should really be focusing on that first big red flag.\n\nWILLIAMS: I would go even further than that. If -- politics isn't about intellectual consistency. But if there were a Republican candidate with a Nazi tattoo, with allegations of -- forget the ghosting -- literally grabbing women or being abusive or hostile in relationships, Democrats would lose their minds over that.\n\nWILLIAMS: And immediately call not just for their --\n\nCORNISH: We're going to talk more about this later, because you've got people like Senator Coons who are saying, Well, you know, look at Ken Paxton in Texas. He's scandal plagued.\n\nSo, there's going to be a lot of whataboutism. There's going to be a lot of challenging these narratives leading up to this final vote.\n\nI want to turn to something else. Coming up on CNN THIS MORNING, former Attorney General Pam Bondi takes aim at Trump's pick to replace her. What she's saying about the Epstein files.\n\nPlus, the fallout over Scott Pelley's exit from \"60 Minutes.\" What staffers were told about his firing.\n\nAnd \"Shark Tank's\" Mr. Wonderful. Now Mr. Compromise. His decision to perhaps scale back his data center project.\n\nKEVIN O'LEARY, ENTREPRENEUR: I want the people that actually benefit from it to get the answers they want. I want to be totally transparent, and I plan on doing that.\n\nCORNISH: It's now 15 minutes past the hour. This is your morning roundup.\n\nThe search continues for a missing U.S. student in Japan. The Auburn University student James \"Weston\" Higginbotham was last seen a week ago at a train station.\n\nAt this point, police say there's no indication to suggest anything like a crime was committed, resulting in his disappearance.\n\nAnd this video shows the severe damage aboard an aircraft carrier after a fire spread through parts of the ship back in March.\n\nNow, you can see here sailors' bunks charred by the flames, and two sailors did receive minor injuries.\n\nUSS Gerald Ford's fire control systems failed to work, leaving the sailors scrambling to put out the flames. The U.S. Navy released a statement, saying that the fire was contained, but senior officials say the statement downplays damages to the carrier. And an investigation is ongoing. Water flowing again into the iconic reflecting pool on the National Mall in Washington. President Trump proclaiming the final coat of protection is being applied. He's touting the beautiful flat blue color and promising it quote, \"won't leak.\"\n\nAccording to federal records, the cost of the renovation has reached at least $14.8 million.\n\nAnd business mogul Kevin O'Leary backtracking from plans to build a massive A.I. data center in Utah. He wrote a letter to the Utah Senate president, vowing to cut the project in half, from 40,000 acres to 20,000 acres.\n\nThe letter comes after weeks of protests at public meetings and just days after Utah's government pressured O'Leary to shrink the size of the development.\n\nCOX: Look, we've had feedback. I think everybody's aware of that. The feedback has been incredibly helpful. People are concerned about -- about data centers. They're concerned about the lake. They're concerned about resources. And they should be concerned. I share those concerns. They're right.\n\nCORNISH: And it's a little more than feedback.\n\nKING: Yes. This one feels inevitable. I mean, business moguls love a data center, because it has the potential to be very, very, very good for local economies. That simply is the truth.\n\nHowever, Americans hate data centers.\n\nCORNISH: Yes. Also, interesting coming on the news of Anthropic basically making that announcement of like, hey, maybe we should slow A.I. down.\n\nKING: We need some guardrails.\n\nCORNISH: Because it can self-replicate. We'll talk more.\n\nI want to talk to you guys next, after this break, about \"60 Minutes.\" How CBS leadership can move on from Scott Pelley's firing.\n\nAnd a live look this morning at the sunrise in Baltimore.\n\nSCOTT PELLEY, FORMER CORRESPONDENT, CBS'S \"60 MINUTES\": Journalism is under attack. Universities are under attack. Freedom of speech is under attack.\n\nCORNISH: So, that was former \"60 Minutes\" correspondent Scott Pelley, delivering the commencement address at Wake Forest University just last year.\n\nA year later, Pelley is out at CBS, claiming he was a victim of political bias.\n\nNow, Pelley was fired on Tuesday after a heated staff meeting, where he accused editor-in-chief Bari Weiss of, quote, \"murdering '60 Minutes'\" after she axed several show staffers and correspondents.\n\n\"The New York Times\" reports Weiss told staffers, quote, \"Despite our attempts to engage with Scott Pelley and to find a way back, unfortunately, we weren't able to do so. And so, we had to part ways. We did not want that to happen,\" she goes on. \"But that's the path that he chose.\"\n\nNow, in response to that reporting, Pelley immediately released a statement saying, quote, \"Bari Weiss knows what she said is not true. There was no effort of any kind to, quote, 'find a way back'.\"\n\nNow, the owner of CBS, Paramount Skydance, is now seeking government approval to acquire Warner Bros. Discovery, which of course, includes CNN.\n\nWe've got CNN chief media analyst Brian Stelter is here with the latest.\n\nBrian, there have been a lot of twists and turns in this, and I wanted to get from you a sense of how \"60 Minutes,\" how CBS is trying to spin or talk about this, now that Pelley has responded and responded so specifically. Right? Saying that it was a lie, how they've described it.\n\nBRIAN STELTER, CNN CHIEF MEDIA ANALYST: Right. These have been the most -- gosh, how many days now? Eight days. The most tumultuous eight days in \"60 Minutes\" history, starting off with the layoffs last week of those top producers and correspondents.\n\nThen with Scott Pelley speaking out, then with his firing.\n\nNow, the remaining staffers are trying to rebuild. The management team is trying to restore trust. But it's anyone's guess if that will succeed.\n\nWhen it comes to Pelley's claims, CBS News management has pushed back and said there was no political interference. And we are waiting to see if Pelley will get specific and get into detail about his claims.\n\nBut repeatedly, for the past few months, there have been these claims about political interference at the show. What's happening, very clearly, is that Bari Weiss is trying to make\n\nher mark on \"60 Minutes.\" She wants to get her hands dirty, so to speak. She wants to be involved at \"60 Minutes.\"\n\nShe says she's doing that not to i
