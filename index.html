/kənˈvɪktɪd/","pos":"adj.","level":"考研","cn":"已被定罪的","en":"having been declared guilty of a criminal offense by the verdict of a jury or the decision of a judge","excerpt":"his links to the late convicted sex offender.","example_cn":"他与已故被定罪性犯罪者的联系。"},{"word":"gubernatorial","phonetic":"/ˌɡuːbərnəˈtɔːriəl/","pos":"adj.","level":"专八","cn":"州长的","en":"relating to a governor, especially of a state","excerpt":"Victor Marx (R), Colorado Gubernatorial Candidate","example_cn":"维克多·马克斯（共和党），科罗拉多州州长候选人"},{"word":"frontrunner","phonetic":"/ˈfrʌntrʌnər/","pos":"n.","level":"六级","cn":"领跑者","en":"the contestant that is leading in a race or competition","excerpt":"Meet the frontrunner in the Republican race for governor of Colorado.","example_cn":"来认识一下科罗拉多州共和党州长竞选的领跑者。"},{"word":"bubble","phonetic":"/ˈbʌbl/","pos":"n.","level":"考研","cn":"泡沫","en":"a situation in which the price of an asset is inflated beyond its intrinsic value, often leading to a sudden collapse","excerpt":"the A.I. bubble is about to pop.","example_cn":"人工智能泡沫即将破裂。"},{"word":"disillusioned","phonetic":"/ˌdɪsɪˈluːʒnd/","pos":"adj.","level":"六级","cn":"幻灭的","en":"disappointed in someone or something that one discovers to be less good than one had believed","excerpt":"To any of those who feel let down or disappointed or disillusioned","example_cn":"对于任何感到失望、沮丧或幻灭的人"},{"word":"clinch","phonetic":"/klɪntʃ/","pos":"v.","level":"六级","cn":"锁定，赢得","en":"to settle or finalize something, especially a victory or agreement","excerpt":"Moments after clinching the nomination","example_cn":"在锁定提名后不久"},{"word":"spineless","phonetic":"/ˈspaɪnləs/","pos":"adj.","level":"专四","cn":"没有骨气的，软弱的","en":"lacking courage or determination; weak-willed","excerpt":"she has become just as spineless and corrupt as the establishment she now serves.","example_cn":"她已经变得和她现在所服务的建制派一样软弱和腐败。"},{"word":"corrupt","phonetic":"/kəˈrʌpt/","pos":"adj.","level":"考研","cn":"腐败的","en":"having or showing a willingness to act dishonestly in return for money or e_cn":"我几乎希望她更党派化一些。"},{"word":"surrogate","phonetic":"/ˈsɜːrəɡət/","pos":"n.","level":"专八","cn":"代理人","en":"a person or thing acting as a substitute","excerpt":"Or is he going to send surrogates?","example_cn":"还是他会派代理人？"},{"word":"escalation","phonetic":"/ˌeskəˈleɪʃn/","pos":"n.","level":"六级","cn":"升级","en":"an increase in the intensity or seriousness of something","excerpt":"the latest round of escalation between the U.S. and Iran","example_cn":"美国和伊朗之间最新一轮的升级"},{"word":"retaliate","phonetic":"/rɪˈtælieɪt/","pos":"v.","level":"六级","cn":"报复","en":"to make an attack or assault in return for a similar attack","excerpt":"saying they retaliated to the U.S. by attack","example_cn":"称他们通过攻击来报复美国"},{"word":"proportional","phonetic":"/prəˈpɔːrʃənl/","pos":"adj.","level":"考研","cn":"相称的，成比例的","en":"corresponding in size or amount to something else","excerpt":"a proportional response","example_cn":"相称的回应"},{"word":"testify","phonetic":"/ˈtestɪfaɪ/","pos":"v.","level":"考研","cn":"作证","en":"to give evidence as a witness in a law court","excerpt":"Epstein's former assistant testifies before Congress.","example_cn":"爱泼斯坦的前助理在国会作证。"},{"word":"convicted","phonetic":"/kənˈvɪktɪd/","pos":"v.","level":"考研","cn":"定罪","en":"to declare someone guilty of a criminal offense","excerpt":"a Texas teenager convicted of killing a rival track star","example_cn":"一名德克萨斯州青少年因杀害一名对手田径明星而被定罪"},{"word":"self-defense","phonetic":"/ˌself dɪˈfens/","pos":"n.","level":"六级","cn":"自卫","en":"the defense of oneself or one's property, especially through the use of force","excerpt":"Why the jury rejected his claim of self-defense.","example_cn":"为什么陪审团驳回了他的自卫主张。"},{"word":"initial public offering (IPO)","phonetic":"/ɪˈnɪʃl ˈpʌblɪk ˈɔːfərɪŋ/","pos":"n.","level":"六级","cn":"首次公开募股","en":"the first sale of stock by a private company to the public","excerpt":"OpenAI announced on Monday it filed for an initial public offering","example_cn":"OpenAI周一宣布提交首次公开募股申请"},{"word":"valuation","phonetic":"/ˌvæljuˈeɪʃn/","pos":"n.","level":"六级","cn":"估值","en":"an estimation of the worth of something, especially one carried out by a professional valuer","excerpt":"valuations are completely divorced from reality","example_cn":"估值完全脱离现实"},{"word":"circular","phonetic":"/ˈsɜːrkjələr/","pos":"adj.","level":"考研","cn":"循环的","en":"having the form of a circle; moving in a circle","excerpt":"it's all very circular right now.","example_cn":"现在这一切都非常循环。"},{"word":"finfluencing","phonetic":"/fɪnˈfluːənsɪŋ/","pos":"n.","level":"专八","cn":"金融影响（网络用语）","en":"the act of influencing people's financial decisions through social media","excerpt":"I would push back on a lot of the financial finfluencing that we hear about on finance.","example_cn":"我会反驳我们在金融领域听到的许多金融影响。"}],"sentences":[{"en":"If the choice on the ballot is between that and a senator who's voted to take health care away from millions of Americans, that's the situation that we have to weigh.","cn":"如果选票上的选择是在那和一位投票剥夺数百万美国人医保的参议员之间，那就是我们必须权衡的情况。","structure":"条件状语从句 + 主句 + 定语从句","analysis":"If引导条件状语从句，主句为that's the situation，定语从句that we have to weigh修饰situation。"},{"en":"There is no doubt, though, that this election has got to be a referendum on Susan Collins: on the ways in which she has voted to empower Donald Trump; on her refusal to hold Donald Trump accountable; on the ways in which she has said, I might be fair, but I want to take healthcare away from millions of people.","cn":"不过，毫无疑问，这次选举必须是对苏珊·柯林斯的一次公投：关于她投票支持唐纳德·特朗普的方式；关于她拒绝追究唐纳德·特朗普责任的方式；关于她所说的，我可能公平，但我想剥夺数百万人的医保。","structure":"主句 + 同位语从句 + 并列介词短语","analysis":"主句There is no doubt，that引导同位语从句说明doubt的内容，冒号后三个on引导的介词短语并列，具体说明referendum的方面。"},{"en":"What I would say about the Susan Collins race is that we've seen in the past, is you're not going to win this seat by electing a Susan Collins light or putting forward a Susan Collins light in a race.","cn":"关于苏珊·柯林斯的竞选，我想说的是，我们过去看到的是，你不会通过选出一个“苏珊·柯林斯轻量版”或在竞选中推出一个“苏珊·柯林斯轻量版”来赢得这个席位。","structure":"主语从句 + 系动词 + 表语从句","analysis":"What I would say about the Susan Collins race是主语从句，is是系动词，that we've seen in the past是表语从句，is you're not going to...是另一个表语从句，省略了that。"},{"en":"The next few hours are going to be crucial as to whether or not this is an isolated escalation between the U.S. and Iran, or whether it is a step on the escalatory ladder.","cn":"接下来的几个小时将至关重要，以确定这是美国和伊朗之间的孤立升级，还是升级阶梯上的一步。","structure":"主句 + 介词短语 + 并列宾语从句","analysis":"主句The next few hours are going to be crucial，as to引导介词短语，后接whether or not引导的宾语从句和whether引导的宾语从句，由or连接。"},{"en":"But the concept of the bubble is this idea that valuations are completely divorced from reality: the underlying business fundamentals, the things that we would learn about in journalism and business school -- that make a company profitable, right?","cn":"但泡沫的概念是估值完全脱离现实：潜在的业务基本面，我们在新闻和商学院学到的东西——使公司盈利的东西，对吧？","structure":"主句 + 同位语从句 + 并列名词短语 + 定语从句","analysis":"主句the concept of the bubble is this idea，that引导同位语从句说明idea的内容，冒号后the underlying business fundamentals和the things并列，that we would learn about...是定语从句修饰things，破折号后that make a company profitable是定语从句修饰things。"},{"en":"But that revenue could also just be money that they are getting from Google, that then they're giving back to Google in the form of compute capacity.","cn":"但那些收入也可能只是他们从谷歌获得的钱，然后他们以计算能力的形式返还给谷歌。","structure":"主句 + 定语从句 + 定语从句","analysis":"主句that revenue could also just be money，第一个that引导定语从句修饰money，第二个that引导定语从句修饰money，描述钱的去向。"}],"topics":[{"title":"Maine Democratic Senate Primary","content":"缅因州民主党参议员初选，Graham Platner击败现任州长Janet Mills赢得提名，将挑战共和党参议员Susan Collins。Platner虽丑闻缠身，但仍获约75%初选选民支持。","keywords":"Maine, Democratic primary, Graham Platner, Janet Mills, Susan Collins"},{"title":"U.S.-Iran Conflict","content":"美国与伊朗冲突升级，美国中央司令部对伊朗目标进行打击，回应美军直升机被击落。伊朗则向巴林、科威特和约旦目标发射导弹报复。双方均表示希望维持谈判，但局势紧张。","keywords":"U.S., Iran, strikes, Strait of Hormuz, ceasefire, retaliation"},{"title":"Epstein Files and Bill Gates Testimony","content":"众议院监督委员会闭门听取比尔·盖茨关于他与杰弗里·爱泼斯坦职业关系的证词。盖茨未被指控不当行为。爱泼斯坦前助理Lesley Groff作证称从未目睹不当行为，并安排爱泼斯坦与特朗普通话。","keywords":"Epstein, Bill Gates, House Oversight Committee, Lesley Groff, Donald Trump"},{"title":"Texas Teen Murder Conviction","content":"德克萨斯州青少年Karmelo Anthony因刺死对手田径运动员Austin Metcalf被判谋杀罪，获刑35年。陪审团驳回其自卫主张。","keywords":"Texas, murder, self-defense, track athlete, Karmelo Anthony, Austin Metcalf"},{"title":"California Governor Race","content":"CNN预测共和党人Steve Hilton将进入加州州长决选，对阵民主党人Xavier Becerra。Becerra以28%得票率领先，Hilton获特朗普支持。讨论加州选举过程及腐败指控。","keywords":"California, governor, Steve Hilton, Xavier Becerra, election, corruption"},{"title":"Tom Steyer's Campaign Spending","content":"亿万富翁Tom Steyer在加州州长初选中花费2.15亿美元，但未获提名。讨论其投资回报率及政治影响力。","keywords":"Tom Steyer, spending, billionaire, campaign, ROI"},{"title":"Colorado Governor Race Controversy","content":"科罗拉多州共和党州长领跑者Victor Marx声称7岁时杀人，引发争议。节目预告将深入报道。","keywords":"Colorado, governor, Victor Marx, controversy, killing"},{"title":"AI IPOs and Market Bubble","content":"OpenAI、Anthropic和SpaceX等AI公司计划IPO，市场估值达3.5万亿美元。讨论AI泡沫风险、循环融资及估值脱离基本面问题。","keywords":"AI, IPO, OpenAI, Anthropic, SpaceX, bubble, valuation, circular financing"},{"title":"Susan Collins' Voting Record","content":"参议员Susan Collins在特朗普政策上的立场，包括60天触发点、1月6日暴力者法律费用、医疗补助削减及移民执法暂停。她常与共和党投票一致，但保持独立形象。","keywords":"Susan Collins, voting record, Trump, independent, Maine"},{"title":"Maine Independent Voters","content":"缅因州独立选民是第二大政党，对参议员选举至关重要。选民对Platner的品格问题犹豫，部分民主党人曾投票给Collins。","keywords":"Maine, independent voters, Graham Platner, Susan Collins, swing voters"}],"raw_transcript":"Return to Transcripts main page\n\nPlatner Easily Wins Democratic Senate Primary in Maine; U.S. Hits Iran after Helicopter Downed; OpenAI Files for IPO, Joins Anthropic and SpaceX. Aired 6-6:30a ET\n\nAired June 10, 2026 - 06:00   ET\n\nTHIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED.\n\nAUDIE CORNISH, CNN ANCHOR: Today in the group chat, Democrats in Maine vote to stick with Graham Platner. Could that cost the party a shot at flipping the Senate this fall?\n\nREP. ALEXANDRIA OCASIO-CORTEZ (D-NY): If the choice on the ballot is between that and a senator who's voted to take health care away from millions of Americans, that's the situation that we have to weigh.\n\nCORNISH: Missiles light up the sky in the Middle East again. Will the strained ceasefire last long enough for the U.S. to deliver that long- promised deal with Iran?\n\nAnd a big day for the Epstein files. What will Bill Gates tell lawmakers about his links to the late convicted sex offender.\n\nUNIDENTIFIED MALE: Do you think that you've killed people as an adult?\n\nVICTOR MARX (R), COLORADO GUBERNATORIAL CANDIDATE: Does it matter?\n\nCORNISH: This is a candidate who also claims he killed someone as a child. Meet the frontrunner in the Republican race for governor of Colorado.\n\nAnd it's the $3.5 trillion question on Wall Street. Has the A.I. boom gotten ahead of itself?\n\nUNIDENTIFIED MALE: OpenAI and Anthropic plan to have IPOs at release before the end of this year, signaling to me that the A.I. bubble is about to pop.\n\n(END VIDEO CLIP) (BEGIN VIDEO CLIP)\n\nGRAHAM PLATNER (D), MAINE SENATE CANDIDATE: To any of those who feel let down or disappointed or disillusioned, it is my job to earn your trust, faith, and support. And I will spend every day of this campaign. And if I have the privilege every day in the United States Senate doing exactly that.\n\nCORNISH: Graham Platner punches his ticket. But now he's got to convince voters to choose him over a five-term senator.\n\nGood morning everybody. I'm Audie Cornish. Here is where we begin. That big statement out of Maine.\n\nDemocrat Graham Platner, despite all the scandals, earned about three- fourths of primary voters' support over Governor Janet Mills.\n\nMoments after clinching the nomination, he turned his attention to his new opponent, Republican Senator Susan Collins.\n\nPLATNER: Susan Collins may have started -- may have started her career decades ago in Washington with good intentions, but she has become just as spineless and corrupt as the establishment she now serves. If you are an independent voice, why do you vote with Donald Trump 95 percent of the time?\n\nCORNISH: Platner has a lot of work to do to get Mills voters on his side.\n\nUNIDENTIFIED FEMALE: I couldn't honestly support Platner, even though some of the things that he says are really good.\n\nUNIDENTIFIED MALE: I don't think he's ready to be a senator. I'm leaning towards Collins unless the guy shows something else, but I just -- he's not there yet. And --\n\nUNIDENTIFIED FEMALE: And so, what will you do in November if its Platner versus Collins?\n\nUNIDENTIFIED FEMALE: That's a really good question. I'm a Democrat, but I voted for Susan Collins several times, because I think that she does care about the state of Maine. But it's going to be a real problem for me in November.\n\nCORNISH: So, today in the group chat, Mike Leon, host of the \"Can We Please Talk\" podcast; Jared Stepman, columnist with \"The Daily Signal\"; and Max Rose, former Democratic congressman from New York.\n\nAnd Max, I'm actually going to start with you, because you're with VoteVets, which means you guys had a dog in the fight in this race. You guys have been giving a lot of money across the country.\n\nAnd what is it? Let me just show what -- what's at stake here.\n\nDemocrats' chances of flipping the Maine Senate seat. It was pretty good. Maybe this has jeopardized it. We're going to show people a chart while you're talking so you can see what's at stake.\n\nIs this race as close as you all hoped it would be, now that Graham has struggled with these scandals?\n\nMAX ROSE (D), FORMER NEW YORK CONGRESSMAN: The race is always going to be close. Because --\n\nCORNISH: Not with a five-term senator, it's not. A lot of times it can be a blowout, right? Like what -- how do you look at what he needs to accomplish?\n\nROSE: Well, I think that we're saying the same thing --\n\nROSE: -- in essence, right? Susan Collins is tough to beat.\n\nWhat I would say about the Susan Collins race is that we've seen in the past, is you're not going to win this seat by electing a Susan Collins light or putting forward a Susan Collins light in a race.\n\nYou are going to beat her by energizing your base, particularly in a midterm election.\n\nThere is no doubt, though, that this election has got to be a referendum on Susan Collins: on the ways in which she has voted to empower Donald Trump; on her refusal to hold Donald Trump accountable; on the ways in which she has said, I might be fair, but I want to take healthcare away from millions of people. Says the right thing often; does the wrong thing very frequently.\n\nCORNISH: Yes. So, this is very much the message we hear over and over again. And I love that Platner in front of him, it said, \"They don't know Maine.\" You know what I mean? Usually not his own name, not a bunch of other things. It was like, hello, media, this one is for you.\n\nI want to play two clips back-to-back, because it sort of, I think, represents something of this race.\n\nFirst, I'm going to play for you J.D. Vance and how he talks about Susan Collins. And then I'm going to play AOC and how she's talking about Platner. You tell me how you hear the tone of these.\n\nJ.D. VANCE (R), U.S. VICE PRESIDENT: Here's the thing I'll say about Susan Collins, is sometimes I get frustrated with Susan Collins. I almost wish that she was more partisan.\n\nBut the thing I love about Susan is she is independent, because Maine is an independent state. And frankly, if she was as partisan as I sometimes wish that she was, she would not be a good fit for the people of Maine.\n\nSo, let's give a shout-out to Susan Collins, who's doing a great job.\n\nOCASIO-CORTEZ: When it comes to the substance of this reporting, obviously, there's a lot in that behavior that's really challenging. It's hard to stomach, you know, in some of it.\n\nBut -- but at the end of the day, I think that this is a choice. If that choice on the ballot is between that and a senator who's voted to take healthcare away from millions of Americans, that's the situation that we have to weigh.\n\nCORNISH: I played these, because one is like, it's hard to stomach. And the other is like, I get frustrated. Shout-out though, anyway, because I guess Maine. And I was, like, these are not ringing endorsements.\n\nMIKE LEON, HOST, \"CAN WE PLEASE TALK?\" PODCAST: But Audie, not only are they not ringing endorsements, the voter that we played in the package before listen to her tone. Maine independents are the second largest party in Maine.\n\nCORNISH: Yes. And a woman, in particular.\n\nLEON: And a woman and a Democrat who said she voted for Susan Collins, against her will, it sounded like, from that thing.\n\nSo -- but those are -- those are some of the things that we're going to have to consider now. It's really about the character quality is what something that Graham Platner has been trying to say: Forget about that. I'm from here. It's how she's voted, to Max's point.\n\nLEON: But then also you hear the voters, and they're, like, a little, still unsure because of those character issues with Platner. So, it's going to be really interesting.\n\nCORNISH: And he's been telling a story for a while of, like, you know, I was -- went through difficult times. Now I'm a person who has changed.\n\nI want to ask one more thing. Collins and Trump, that's not a tight bond. OK? Can I just put it that way? Here's a list I'm going to play for you. Just some moments over the past couple of months where you hear her talking around Trump policies and where she stands on them.\n\n(BEGIN VIDEO CLIP) SEN. SUSAN COLLINS (R-ME): The 60 days is a trigger. After 60 days, in\n\nmy view, the president has to obtain congressional approval or Congress can block it.\n\nI do not believe that individuals who were convicted of violence against police officers on January 6th should be entitled to reimbursement for their legal fees.\n\nConcerned about the cuts in Medicaid and the impact on my state, but other states, as well.\n\nI've talked with the secretary of homeland security. I have strongly recommended to her that there be a pause on the enforcement surge in both Maine and in Minnesota.\n\nCORNISH: Now, I've chased her in the hallways before, too. She often ends up voting with Republicans, whatever that party line is.\n\nBut is Trump going to get involved in this simply because of what's at stake with the Senate? Or is he going to send surrogates? He'll be like, OK, J.D., you go there? Like, can she expect any support there?\n\nJARRETT STEPMAN, COLUMNIST, \"THE DAILY SIGNAL\": Yes, I feel that's why he sent J.D. and I feel he will, if he's smart, actually keep some distance from this. I mean part of the -- the thing at stake here is that they're independent. Maine is a little bit different.\n\nI mean, both these candidates come from sort of -- almost independent of the party.\n\nSTEPMAN: Because they -- they really focus on the issues related to Maine.\n\nCORNISH: We should say, Platner is recruiting from outside the party. Yes.\n\nSTEPMAN: Exactly. So, they're both sort of weirdly outsiders, even though Collins has been Republican part of the party for a long time, she's always struck an independent game this entire time.\n\nSo, I think that's going to continue during this race. That is her path. Because if she does get too close to Trump, that's going to be the argument saying, whoa, she's too MAGA. She's not -- too much for me, which is more or less a blue state.\n\nCORNISH: So, you're saying there's nothing to be gained there of him coming.\n\nCORNISH: OK, you guys stay with me, because we're going to talk about a couple other states this hour, as well.\n\nWe're also still waiting for news about some sort of proposed deal with Iran. But in the meantime, the U.S. has launched new strikes against Iran overnight.\n\nPlus, Epstein's former assistant testifies before Congress. What she says she did not see.\n\nAnd a Texas teenager convicted of killing a rival track star. Why the jury rejected his claim of self-defense.\n\nUNIDENTIFIED MALE: It's just sad that it had to come to this. It was just a bad, bad decision he made.\n\nCORNISH: Right now, we are following the latest round of escalation between the U.S. and Iran. U.S. CENTRAL COMMAND saying they are now finished hitting targets in Iran in response to an Army helicopter getting shot down over the Strait of Hormuz.\n\nIran's state media, however, released new video overnight, saying they retaliated to the U.S. by attack -- by launching missiles against targets in Bahrain and Kuwait and an air base in Jordan.\n\nJoining me now with the latest, CNN international correspondent Paula Hancocks in Abu Dhabi.\n\nPaula, can you talk about this? We know Iran, throughout the last couple of weeks, has -- they've tried to spread the war throughout the region. What have you heard from officials in Kuwait or Bahrain about confirmed damage?\n\nPAULA HANCOCKS, CNN INTERNATIONAL CORRESPONDENT: The next few hours are going to be crucial as to whether or not this is an isolated escalation between the U.S. and Iran, or whether it is a step on the escalatory ladder.\n\nNow, at this point, we have not heard any damage assessment or casualty figures from those countries which were targeted by Iran. That is, Jordan, Kuwait, and Bahrain.\n\nIran said that it had targeted the fifth fleet headquarters in Bahrain. They also say that they targeted a military base in Jordan, Kuwait, as well, saying that it was intercepting incoming aerial missiles and drones.\n\nSo, what we've heard from Iran's side is that they have said that there will -- no attack will go unanswered from the United States. What we had seen from U.S. CENTRAL COMMAND is they said they had\n\ncarried out what they called a, quote, \"proportional response\" to the shooting down of that Apache helicopter, saying that there were three locations along the Strait of Hormuz that were targeted.\n\nThey say that they hit air defense, ground control stations, radar sites, as well.\n\nNow, one U.S. official telling CNN that this was really intended to be a warning to Iran, and they do hope that they will still be able to keep the talks on track, that it won't hinder those talks, although we've heard from Iran's foreign ministry spokesperson that Iran is reviewing negotiations at this point, accusing the U.S. of negotiating in bad faith, Audie.\n\nCORNISH: OK. That's Paula Hancocks with that update. Thank you so much.\n\nIt is now 17 minutes past the hour. I want to give you your morning roundup.\n\nHappening today, the House Oversight Committee will hear from Microsoft billionaire Bill Gates behind closed doors. He's scheduled to testify about his professional relationship with Jeffrey Epstein.\n\nGates has not been accused of wrongdoing.\n\nMeanwhile, Epstein's former assistant, Lesley Groff, testified on Tuesday, saying that she, quote, \"never witnessed anything improper or illegal.\"\n\nShe also told lawmakers she arranged multiple calls between Epstein and Donald Trump before he was president. President Trump is not accused of any wrongdoing in connection to Epstein.\n\nAnd in Texas, a teen who fatally stabbed a 17-year-old track athlete from a rival team has been convicted of murder and sentenced to 35 years in prison.\n\nA jury rejected Karmelo Anthony's claims of self-defense during a confrontation with Austin Metcalf in the stadium bleachers last year.\n\nUNIDENTIFIED MALE: It's just sad that it had to come to this. It was just a bad, bad decision he made. But he took a life. And it's unfortunate that two young lives are affected so negatively about this.\n\nCORNISH: Anthony did not testify. His mother took the stand during the sentencing phase, telling jurors her son was sorry.\n\nAnd CNN now projecting Republican Steve Hilton will advance to the November election in the California governor's race against Democrat Xavier Becerra.\n\nBecerra, the former health secretary, finished on top with nearly 28 percent of the vote, three points ahead of Hilton, a former FOX News host who has President Trump's endorsement.\n\nSTEVE HILTON (R), CALIFORNIA GUBERNATORIAL CANDIDATE; Californians will have a real choice for change in November. Whether they want to keep going with the policies that have brought us to the highest poverty rate, the highest unemployment rate, the highest cost of living in the country, where they want more of that with Xavier Becerra, or whether they want to go in a new direction.\n\nCORNISH: I have to ask quickly: if Hilton does well, is California still going to be the corrupt election state that Republicans are saying it is?\n\nSTEPMAN: Yes. I mean, the question is how well, of course. How much can he actually make some --\n\nCORNISH: Is there a certain threshold after which --\n\nCORNISH: -- it's no longer considered corrupt if a Republican wins?\n\nSTEPMAN: Well, you know, you know what? Especially given the state, it'll depend on how the votes are counted. I feel that especially after the next --\n\nLEON: I knew that answer.\n\nCORNISH: Yes. But you can see why I'm asking, right? Like, if he wins, it's fine. But if he doesn't win, it's corrupt.\n\nCORNISH: But if he wins, it's still corrupt, but somehow --\n\nROSE: Maybe, maybe. I think it's still fairly unlikely that he's going to win this race. I will also say that it's been the process in California taking so long to discover who --\n\nCORNISH: Yes, everyone's talking about that.\n\nROSE: -- is going to win it. Everybody's talking about this.\n\nCORNISH: But everyone's disagreeing on what that means.\n\nCORNISH: That's by definition nefarious.\n\nROSE: But it makes people uncomfortable with the results.\n\nCORNISH: I have to mention one other thing, just because the number's astounding. Tom Steyer's spending: 215 million.\n\nI'm not good at long division, so I didn't want to know how much per voter that spend was, and I can't do it. I can't do it. And someone on -- online was saying, oh, have you ever heard of effective altruism, and that this was ineffective altruism, basically.\n\nLEON: Basically, an ROI in the business term, right? You need a return on that investment.\n\nThis is twice for Steyer now. He has not gotten that ROI. When is enough, enough?\n\nIf I had that kind of money, I would invest it in something else. He has tried this political acumen.\n\nLEON: It has not worked out.\n\nCORNISH: Yes. I was about to say --\n\nLEON: Voters have said that.\n\nCORNISH: The voters have rejected it.\n\nLEON: Especially with the billionaire. When the billionaire class. We've got AOC and others that have talked about the billionaire class, and we have somebody here spending his own money like this, it seems like a waste where it could be invested in other.\n\nCORNISH: Well, it's been a wild race coming from last year to all of a sudden have Becerra at the front.\n\nCORNISH: We couldn't have seen that then.\n\nCORNISH: Now, after the break on CNN THIS MORNING, two controversial to win? So, the Colorado frontrunner for governor claims he killed a man when he was 7 years old. I have more stories like that from him.\n\nPlus, A.I. companies are rushing to the stock market. Is it the next tech boom or is the A.I. bubble about to burst?\n\nAnd for viewers watching us from right here in New York City, Knicks versus Spurs again tonight at the Garden. Good morning.\n\nCORNISH: So, a bunch of IPOs in the A.I. sector are about to hit Wall Street after OpenAI announced on Monday it filed for an initial public offering, an IPO.\n\nThe three biggest A.I. companies are now in line to go public, as well. That includes Anthropic and SpaceX. A fourth, Perplexity, is expected to file in 2028.\n\nDONALD TRUMP, U.S. PRESIDENT: We're talking about it. Where the American people can benefit from the success of A.I. And by doing that, they're going to like it better. Because we're leading China. We're leading everybody in the world with A.I., and we want to keep it that way. It's like you make them a partnership in this revolution. It would be a beautiful thing.\n\nCORNISH: Now, investors who get in early could make a fortune. But has the A.I. boom gotten ahead of itself?\n\nMadison Mills joins the group chat. She's the senior A.I. reporter at Axios. You guys have done some fantastic reporting on this industry.\n\nJust to show people the amount of money at stake. When you look at OpenAI and SpaceX and Anthropic, there were 3.5 trillion. We dug around, and we found out that's, like, as much money as, you know, France. Like, OK? So, we're dealing with a lot of money.\n\nBut is it a bubble? And I ask because we've got some people on TikTok who think that it is. I'm going to play for you, the finance experts online.\n\nUNIDENTIFIED MALE: A.I. companies are now trying to save themselves by applying for IPOs.\n\nUNIDENTIFIED MALE: OpenAI and Anthropic plan to have IPOs at release before the end of this year, signaling to me that the A.I. bubble is about to pop and that these insiders and institutional investors know that they better cash out now, or they may not ever get the chance.\n\nCORNISH: Why is this the word on the street?\n\nMADISON MILLS, SENIOR A.I. REPORTER, AXIOS: Yes, I would push back on a lot of the financial finfluencing that we hear about on finance.\n\nCORNISH: Finfluencing. You said it. Go on. MILLS: Yes. But -- but just because companies are IPOing doesn't\n\nnecessarily mean that the bubble is going to happen this Friday when SpaceX lists on the NASDAQ.\n\nMILLS: Right? But the concept of the bubble is this idea that valuations are completely divorced from reality: the underlying business fundamentals, the things that we would learn about in journalism and business school --\n\nMILLS: -- that make a company profitable, right?\n\nCORNISH: So, the street phrase would be they're high on their own supply?\n\nMILLS: Absolutely. And that's very clear with a company like SpaceX. Their expected valuation is $1.8 trillion. They're trading at about 90 times their sales -- not their profits, just their sales -- as of this Friday, when they're expected to list.\n\nSo, that is an example of a company you might look at and say, not sure if the valuation is high.\n\nCORNISH: I know. There's also this thing I've been learning about circular financing.\n\nCORNISH: So, I'm understanding this as, you use money from one A.I. company to do work in your A.I. company. and then another A.I. company gets work from you. It's like the same money going around and around. Do I have that right?\n\nMILLS: Absolutely. That's perfect. And part of --\n\nCORNISH: I'm ready to finfluence.\n\nMILLS: You're ready to finfluence. And more than that, you can be the CFO of an A.I. company. You know?\n\nBut part of the problem with that is that Anthropic can -- or OpenAI, any of the A.I. labs, can book that as revenue. And that feeds into that valuation number that we're getting.\n\nBut that revenue could also just be money that they are getting from Google, that then they're giving back to Google in the form of compute capacity. And then Google has that compute capacity and is giving it over to another A.I. lab. And so, it's all very circular right now. And that's the concern.\n\nCORNISH: And it's giving shell game. I'm going to listen to you, because I believe that this market is the future. I understand that, but I think people rightly have questions. [06:30:00]","segments":[{"seg":1,"url":"https://transcripts.cnn.com/show/ctmo/date/2026-06-10/segment/01","title":"CNN.com - Transcripts","text":"Return to Transcripts main page\n\nPlatner Easily Wins Democratic Senate Primary in Maine; U.S. Hits Iran after Helicopter Downed; OpenAI Files for IPO, Joins Anthropic and SpaceX. Aired 6-6:30a ET\n\nAired June 10, 2026 - 06:00   ET\n\nTHIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED.\n\nAUDIE CORNISH, CNN ANCHOR: Today in the group chat, Democrats in Maine vote to stick with Graham Platner. Could that cost the party a shot at flipping the Senate this fall?\n\nREP. ALEXANDRIA OCASIO-CORTEZ (D-NY): If the choice on the ballot is between that and a senator who's voted to take health care away from millions of Americans, that's the situation that we have to weigh.\n\nCORNISH: Missiles light up the sky in the Middle East again. Will the strained ceasefire last long enough for the U.S. to deliver that long- promised deal with Iran?\n\nAnd a big day for the Epstein files. What will Bill Gates tell lawmakers about his links to the late convicted sex offender.\n\nUNIDENTIFIED MALE: Do you think that you've killed people as an adult?\n\nVICTOR MARX (R), COLORADO GUBERNATORIAL CANDIDATE: Does it matter?\n\nCORNISH: This is a candidate who also claims he killed someone as a child. Meet the frontrunner in the Republican race for governor of Colorado.\n\nAnd it's the $3.5 trillion question on Wall Street. Has the A.I. boom gotten ahead of itself?\n\nUNIDENTIFIED MALE: OpenAI and Anthropic plan to have IPOs at release before the end of this year, signaling to me that the A.I. bubble is about to pop.\n\n(END VIDEO CLIP) (BEGIN VIDEO CLIP)\n\nGRAHAM PLATNER (D), MAINE SENATE CANDIDATE: To any of those who feel let down or disappointed or disillusioned, it is my job to earn your trust, faith, and support. And I will spend every day of this campaign. And if I have the privilege every day in the United States Senate doing exactly that.\n\nCORNISH: Graham Platner punches his ticket. But now he's got to convince voters to choose him over a five-term senator.\n\nGood morning everybody. I'm Audie Cornish. Here is where we begin. That big statement out of Maine.\n\nDemocrat Graham Platner, despite all the scandals, earned about three- fourths of primary voters' support over Governor Janet Mills.\n\nMoments after clinching the nomination, he turned his attention to his new opponent, Republican Senator Susan Collins.\n\nPLATNER: Susan Collins may have started -- may have started her career decades ago in Washington with good intentions, but she has become just as spineless and corrupt as the establishment she now serves. If you are an independent voice, why do you vote with Donald Trump 95 percent of the time?\n\nCORNISH: Platner has a lot of work to do to get Mills voters on his side.\n\nUNIDENTIFIED FEMALE: I couldn't honestly support Platner, even though some of the things that he says are really good.\n\nUNIDENTIFIED MALE: I don't think he's ready to be a senator. I'm leaning towards Collins unless the guy shows something else, but I just -- he's not there yet. And --\n\nUNIDENTIFIED FEMALE: And so, what will you do in November if its Platner versus Collins?\n\nUNIDENTIFIED FEMALE: That's a really good question. I'm a Democrat, but I voted for Susan Collins several times, because I think that she does care about the state of Maine. But it's going to be a real problem for me in November.\n\nCORNISH: So, today in the group chat, Mike Leon, host of the \"Can We Please Talk\" podcast; Jared Stepman, columnist with \"The Daily Signal\"; and Max Rose, former Democratic congressman from New York.\n\nAnd Max, I'm actually going to start with you, because you're with VoteVets, which means you guys had a dog in the fight in this race. You guys have been giving a lot of money across the country.\n\nAnd what is it? Let me just show what -- what's at stake here.\n\nDemocrats' chances of flipping the Maine Senate seat. It was pretty good. Maybe this has jeopardized it. We're going to show people a chart while you're talking so you can see what's at stake.\n\nIs this race as close as you all hoped it would be, now that Graham has struggled with these scandals?\n\nMAX ROSE (D), FORMER NEW YORK CONGRESSMAN: The race is always going to be close. Because --\n\nCORNISH: Not with a five-term senator, it's not. A lot of times it can be a blowout, right? Like what -- how do you look at what he needs to accomplish?\n\nROSE: Well, I think that we're saying the same thing --\n\nROSE: -- in essence, right? Susan Collins is tough to beat.\n\nWhat I would say about the Susan Collins race is that we've seen in the past, is you're not going to win this seat by electing a Susan Collins light or putting forward a Susan Collins light in a race.\n\nYou are going to beat her by energizing your base, particularly in a midterm election.\n\nThere is no doubt, though, that this election has got to be a referendum on Susan Collins: on the ways in which she has voted to empower Donald Trump; on her refusal to hold Donald Trump accountable; on the ways in which she has said, I might be fair, but I want to take healthcare away from millions of people. Says the right thing often; does the wrong thing very frequently.\n\nCORNISH: Yes. So, this is very much the message we hear over and over again. And I love that Platner in front of him, it said, \"They don't know Maine.\" You know what I mean? Usually not his own name, not a bunch of other things. It was like, hello, media, this one is for you.\n\nI want to play two clips back-to-back, because it sort of, I think, represents something of this race.\n\nFirst, I'm going to play for you J.D. Vance and how he talks about Susan Collins. And then I'm going to play AOC and how she's talking about Platner. You tell me how you hear the tone of these.\n\nJ.D. VANCE (R), U.S. VICE PRESIDENT: Here's the thing I'll say about Susan Collins, is sometimes I get frustrated with Susan Collins. I almost wish that she was more partisan.\n\nBut the thing I love about Susan is she is independent, because Maine is an independent state. And frankly, if she was as partisan as I sometimes wish that she was, she would not be a good fit for the people of Maine.\n\nSo, let's give a shout-out to Susan Collins, who's doing a great job.\n\nOCASIO-CORTEZ: When it comes to the substance of this reporting, obviously, there's a lot in that behavior that's really challenging. It's hard to stomach, you know, in some of it.\n\nBut -- but at the end of the day, I think that this is a choice. If that choice on the ballot is between that and a senator who's voted to take healthcare away from millions of Americans, that's the situation that we have to weigh.\n\nCORNISH: I played these, because one is like, it's hard to stomach. And the other is like, I get frustrated. Shout-out though, anyway, because I guess Maine. And I was, like, these are not ringing endorsements.\n\nMIKE LEON, HOST, \"CAN WE PLEASE TALK?\" PODCAST: But Audie, not only are they not ringing endorsements, the voter that we played in the package before listen to her tone. Maine independents are the second largest party in Maine.\n\nCORNISH: Yes. And a woman, in particular.\n\nLEON: And a woman and a Democrat who said she voted for Susan Collins, against her will, it sounded like, from that thing.\n\nSo -- but those are -- those are some of the things that we're going to have to consider now. It's really about the character quality is what something that Graham Platner has been trying to say: Forget about that. I'm from here. It's how she's voted, to Max's point.\n\nLEON: But then also you hear the voters, and they're, like, a little, still unsure because of those character issues with Platner. So, it's going to be really interesting.\n\nCORNISH: And he's been telling a story for a while of, like, you know, I was -- went through difficult times. Now I'm a person who has changed.\n\nI want to ask one more thing. Collins and Trump, that's not a tight bond. OK? Can I just put it that way? Here's a list I'm going to play for you. Just some moments over the past couple of months where you hear her talking around Trump policies and where she stands on them.\n\n(BEGIN VIDEO CLIP) SEN. SUSAN COLLINS (R-ME): The 60 days is a trigger. After 60 days, in\n\nmy view, the president has to obtain congressional approval or Congress can block it.\n\nI do not believe that individuals who were convicted of violence against police officers on January 6th should be entitled to reimbursement for their legal fees.\n\nConcerned about the cuts in Medicaid and the impact on my state, but other states, as well.\n\nI've talked with the secretary of homeland security. I have strongly recommended to her that there be a pause on the enforcement surge in both Maine and in Minnesota.\n\nCORNISH: Now, I've chased her in the hallways before, too. She often ends up voting with Republicans, whatever that party line is.\n\nBut is Trump going to get involved in this simply because of what's at stake with the Senate? Or is he going to send surrogates? He'll be like, OK, J.D., you go there? Like, can she expect any support there?\n\nJARRETT STEPMAN, COLUMNIST, \"THE DAILY SIGNAL\": Yes, I feel that's why he sent J.D. and I feel he will, if he's smart, actually keep some distance from this. I mean part of the -- the thing at stake here is that they're independent. Maine is a little bit different.\n\nI mean, both these candidates come from sort of -- almost independent of the party.\n\nSTEPMAN: Because they -- they really focus on the issues related to Maine.\n\nCORNISH: We should say, Platner is recruiting from outside the party. Yes.\n\nSTEPMAN: Exactly. So, they're both sort of weirdly outsiders, even though Collins has been Republican part of the party for a long time, she's always struck an independent game this entire time.\n\nSo, I think that's going to continue during this race. That is her path. Because if she does get too close to Trump, that's going to be the argument saying, whoa, she's too MAGA. She's not -- too much for me, which is more or less a blue state.\n\nCORNISH: So, you're saying there's nothing to be gained there of him coming.\n\nCORNISH: OK, you guys stay with me, because we're going to talk about a couple other states this hour, as well.\n\nWe're also still waiting for news about some sort of proposed deal with Iran. But in the meantime, the U.S. has launched new strikes against Iran overnight.\n\nPlus, Epstein's former assistant testifies before Congress. What she says she did not see.\n\nAnd a Texas teenager convicted of killing a rival track star. Why the jury rejected his claim of self-defense.\n\nUNIDENTIFIED MALE: It's just sad that it had to come to this. It was just a bad, bad decision he made.\n\nCORNISH: Right now, we are following the latest round of escalation between the U.S. and Iran. U.S. CENTRAL COMMAND saying they are now finished hitting targets in Iran in response to an Army helicopter getting shot down over the Strait of Hormuz.\n\nIran's state media, however, released new video overnight, saying they retaliated to the U.S. by attack -- by launching missiles against targets in Bahrain and Kuwait and an air base in Jordan.\n\nJoining me now with the latest, CNN international correspondent Paula Hancocks in Abu Dhabi.\n\nPaula, can you talk about this? We know Iran, throughout the last couple of weeks, has -- they've tried to spread the war throughout the region. What have you heard from officials in Kuwait or Bahrain about confirmed damage?\n\nPAULA HANCOCKS, CNN INTERNATIONAL CORRESPONDENT: The next few hours are going to be crucial as to whether or not this is an isolated escalation between the U.S. and Iran, or whether it is a step on the escalatory ladder.\n\nNow, at this point, we have not heard any damage assessment or casualty figures from those countries which were targeted by Iran. That is, Jordan, Kuwait, and Bahrain.\n\nIran said that it had targeted the fifth fleet headquarters in Bahrain. They also say that they targeted a military base in Jordan, Kuwait, as well, saying that it was intercepting incoming aerial missiles and drones.\n\nSo, what we've heard from Iran's side is that they have said that there will -- no attack will go unanswered from the United States. What we had seen from U.S. CENTRAL COMMAND is they said they had\n\ncarried out what they called a, quote, \"proportional response\" to the shooting down of that Apache helicopter, saying that there were three locations along the Strait of Hormuz that were targeted.\n\nThey say that they hit air defense, ground control stations, radar sites, as well.\n\nNow, one U.S. official telling CNN that this was really intended to be a warning to Iran, and they do hope that they will still be able to keep the talks on track, that it won't hinder those talks, although we've heard from Iran's foreign ministry spokesperson that Iran is reviewing negotiations at this point, accusing the U.S. of negotiating in bad faith, Audie.\n\nCORNISH: OK. That's Paula Hancocks with that update. Thank you so much.\n\nIt is now 17 minutes past the hour. I want to give you your morning roundup.\n\nHappening today, the House Oversight Committee will hear from Microsoft billionaire Bill Gates behind closed doors. He's scheduled to testify about his professional relationship with Jeffrey Epstein.\n\nGates has not been accused of wrongdoing.\n\nMeanwhile, Epstein's former assistant, Lesley Groff, testified on Tuesday, saying that she, quote, \"never witnessed anything improper or illegal.\"\n\nShe also told lawmakers she arranged multiple calls between Epstein and Donald Trump before he was president. President Trump is not accused of any wrongdoing in connection to Epstein.\n\nAnd in Texas, a teen who fatally stabbed a 17-year-old track athlete from a rival team has been convicted of murder and sentenced to 35 years in prison.\n\nA jury rejected Karmelo Anthony's claims of self-defense during a confrontation with Austin Metcalf in the stadium bleachers last year.\n\nUNIDENTIFIED MALE: It's just sad that it had to come to this. It was just a bad, bad decision he made. But he took a life. And it's unfortunate that two young lives are affected so negatively about this.\n\nCORNISH: Anthony did not testify. His mother took the stand during the sentencing phase, telling jurors her son was sorry.\n\nAnd CNN now projecting Republican Steve Hilton will advance to the November election in the California governor's race against Democrat Xavier Becerra.\n\nBecerra, the former health secretary, finished on top with nearly 28 percent of the vote, three points ahead of Hilton, a former FOX News host who has President Trump's endorsement.\n\nSTEVE HILTON (R), CALIFORNIA GUBERNATORIAL CANDIDATE; Californians will have a real choice for change in November. Whether they want to keep going with the policies that have brought us to the highest poverty rate, the highest unemployment rate, the highest cost of living in the country, where they want more of that with Xavier Becerra, or whether they want to go in a new direction.\n\nCORNISH: I have to ask quickly: if Hilton does well, is California still going to be the corrupt election state that Republicans are saying it is?\n\nSTEPMAN: Yes. I mean, the question is how well, of course. How much can he actually make some --\n\nCORNISH: Is there a certain threshold after which --\n\nCORNISH: -- it's no longer considered corrupt if a Republican wins?\n\nSTEPMAN: Well, you know, you know what? Especially given the state, it'll depend on how the votes are counted. I feel that especially after the next --\n\nLEON: I knew that answer.\n\nCORNISH: Yes. But you can see why I'm asking, right? Like, if he wins, it's fine. But if he doesn't win, it's corrupt.\n\nCORNISH: But if he wins, it's still corrupt, but somehow --\n\nROSE: Maybe, maybe. I think it's still fairly unlikely that he's going to win this race. I will also say that it's been the process in California taking so long to discover who --\n\nCORNISH: Yes, everyone's talking about that.\n\nROSE: -- is going to win it. Everybody's talking about this.\n\nCORNISH: But everyone's disagreeing on what that means.\n\nCORNISH: That's by definition nefarious.\n\nROSE: But it makes people uncomfortable with the results.\n\nCORNISH: I have to mention one other thing, just because the number's astounding. Tom Steyer's spending: 215 million.\n\nI'm not good at long division, so I didn't want to know how much per voter that spend was, and I can't do it. I can't do it. And someone on -- online was saying, oh, have you ever heard of effective altruism, and that this was ineffective altruism, basically.\n\nLEON: Basically, an ROI in the business term, right? You need a return on that investment.\n\nThis is twice for Steyer now. He has not gotten that ROI. When is enough, enough?\n\nIf I had that kind of money, I would invest it in something else. He has tried this political acumen.\n\nLEON: It has not worked out.\n\nCORNISH: Yes. I was about to say --\n\nLEON: Voters have said that.\n\nCORNISH: The voters have rejected it.\n\nLEON: Especially with the billionaire. When the billionaire class. We've got AOC and others that have talked about the billionaire class, and we have somebody here spending his own money like this, it seems like a waste where it could be invested in other.\n\nCORNISH: Well, it's been a wild race coming from last year to all of a sudden have Becerra at the front.\n\nCORNISH: We couldn't have seen that then.\n\nCORNISH: Now, after the break on CNN THIS MORNING, two controversial to win? So, the Colorado frontrunner for governor claims he killed a man when he was 7 years old. I have more stories like that from him.\n\nPlus, A.I. companies are rushing to the stock market. Is it the next tech boom or is the A.I. bubble about to burst?\n\nAnd for viewers watching us from right here in New York City, Knicks versus Spurs again tonight at the Garden. Good morning.\n\nCORNISH: So, a bunch of IPOs in the A.I. sector are about to hit Wall Street after OpenAI announced on Monday it filed for an initial public offering, an IPO.\n\nThe three biggest A.I. companies are now in line to go public, as well. That includes Anthropic and SpaceX. A fourth, Perplexity, is expected to file in 2028.\n\nDONALD TRUMP, U.S. PRESIDENT: We're talking about it. Where the American people can benefit from the success of A.I. And by doing that, they're going to like it better. Because we're leading China. We're leading everybody in the world with A.I., and we want to keep it that way. It's like you make them a partnership in this revolution. It would be a beautiful thing.\n\nCORNISH: Now, investors who get in early could make a fortune. But has the A.I. boom gotten ahead of itself?\n\nMadison Mills joins the group chat. She's the senior A.I. reporter at Axios. You guys have done some fantastic reporting on this industry.\n\nJust to show people the amount of money at stake. When you look at OpenAI and SpaceX and Anthropic, there were 3.5 trillion. We dug around, and we found out that's, like, as much money as, you know, France. Like, OK? So, we're dealing with a lot of money.\n\nBut is it a bubble? And I ask because we've got some people on TikTok who think that it is. I'm going to play for you, the finance experts online.\n\nUNIDENTIFIED MALE: A.I. companies are now trying to save themselves by applying for IPOs.\n\nUNIDENTIFIED MALE: OpenAI and Anthropic plan to have IPOs at release before the end of this year, signaling to me that the A.I. bubble is about to pop and that these insiders and institutional investors know that they better cash out now, or they may not ever get the chance.\n\nCORNISH: Why is this the word on the street?\n\nMADISON MILLS, SENIOR A.I. REPORTER, AXIOS: Yes, I would push back on a lot of the financial finfluencing that we hear about on finance.\n\nCORNISH: Finfluencing. You said it. Go on. MILLS: Yes. But -- but just because companies are IPOing doesn't\n\nnecessarily mean that the bubble is going to happen this Friday when SpaceX lists on the NASDAQ.\n\nMILLS: Right? But the concept of the bubble is this idea that valuations are completely divorced from reality: the underlying business fundamentals, the things that we would learn about in journalism and business school --\n\nMILLS: -- that make a company profitable, right?\n\nCORNISH: So, the street phrase would be they're high on their own supply?\n\nMILLS: Absolutely. And that's very clear with a company like SpaceX. Their expected valuation is $1.8 trillion. They're trading at about 90 times their sales -- not their profits, just their sales -- as of this Friday, when they're expected to list.\n\nSo, that is an example of a company you might look at and say, not sure if the valuation is high.\n\nCORNISH: I know. There's also this thing I've been learning about circular financing.\n\nCORNISH: So, I'm understanding this as, you use money from one A.I. company to do work in your A.I. company. and then another A.I. company gets work from you. It's like the same money going around and around. Do I have that right?\n\nMILLS: Absolutely. That's perfect. And part of --\n\nCORNISH: I'm ready to finfluence.\n\nMILLS: You're ready to finfluence. And more than that, you can be the CFO of an A.I. company. You know?\n\nBut part of the problem with that is that Anthropic can -- or OpenAI, any of the A.I. labs, can book that as revenue. And that feeds into that valuation number that we're getting.\n\nBut that revenue could also just be money that they are getting from Google, that then they're giving back to Google in the form of compute capacity. And then Google has that compute capacity and is giving it over to another A.I. lab. And so, it's all very circular right now. And that's the concern.\n\nCORNISH: And it's giving shell game. I'm going to listen to you, because I believe that this market is the future. I understand that, but I think people rightly have questions. [06:30:00]"}]},"2026-06-09":{"date":"2026-06-09","source_url":"https://transcripts.cnn.com/show/ctmo/date/2026-06-09/segment/01","raw_transcript":"Return to Transcripts main page\n\nTrump Attends NBA Finals Game and Knicks Lose; Texas Tech QB Ruled Eligible after Sports Betting Ban. Aired 6-6:30a ET\n\nAired June 09, 2026 - 06:00   ET\n inappropriate behavior with past girlfriends, all of which he has denied. Democrats are wondering if his past will derail their chances to unseat Republican Susan Collins in November.\n\nUNIDENTIFIED FEMALE: I don't like it.\n\nBut if he votes the way I want him to, and he can defeat Susan Collins, yes, go for it.\n\nUNIDENTIFIED FEMALE: The truth is, is the Nazi tattoo should have been enough.\n\nUNIDENTIFIED FEMALE: If his wife can deal with it, who am I to argue?\n\nUNIDENTIFIED FEMALE: The problems that are facing Maine and this country are too serious for us to focus on this purity politics kind of stuff.\n\nUNIDENTIFIED FEMALE: I'm definitely voting for him. I, honestly, I would vote for a doorknob over Susan Collins.\n\nCORNISH: Joining me now, Jamie Harrison, former chair of the former Democratic National Committee.\n\nJamie, thank you so much for being here.\n\nI wanted you to be here because this race has gotten so much attention. Platner was recruited by people who weren't the Democratic Party, right?\n\nJAMIE HARRISON, FORMER DEMOCRATIC NATIONAL COMMITTEE CHAIR: Yes.\n\nCORNISH: And now we've seen a lot of questions as a result.\n\n\"The Wall Street Journal\" actually interviewed the people who recruited him, and they said, did you vet this guy? What questions did you ask? How do you feel about it with the controversies now? Here's how they replied.\n\nDANIEL MORAFF, SENIOR STRATEGIST, Platner CAMPAIGN: I think, if what the voters wanted were people who were grown in vats and had never done or said anything that they might regret their entire lives, we'd have a very different country. Part of our thesis here is that people do not want their candidates grown in vats. They want people who are real human beings, and they want people who do not look and sound like the vat-grown people who have been leading this country off a cliff for the last century. And that was Graham.\n\nCORNISH: What side of the argument are you on here?\n\nHARRISON: Well, my apologies for being in this little, small phone booth in an American Airlines lounge, Audie.\n\nBut listen, the bottom line is this. I supported Governor Janet Mills because I thought she was the strongest candidate in the race. And I can tell you, if I were voting in Maine today, she would still get my vote.\n\nBut the Democratic voters will --\n\nCORNISH: But can you address the argument that they're saying? Like, they -- we're seeing this more and more. Mamdani is a great example.\n\nCORNISH: People who are entering and they don't enter with the permission, so to speak, of the DNC or anyone from any formal organization.\n\nHARRISON: Well, but this is the thing. When you -- when you don't go through the regular process, then you get problems and issues like we have now, folks who aren't properly vetted, folks whose backgrounds have a lot of issues and problems in it that that jeopardize whether or not you win in the general election.\n\nI get and understand the frustration of going through the party filter sometimes. I totally get that as someone who's been a state party chair and the national chair. But at -- but there's a level of quality checks that, when you go through that process, you understand what you are getting in the end, instead of this wild card now. And then, you know, there are folks who are hand-wringing and trying to figure out how they support the candidate or not.\n\nIn the end of the day, you know, Graham Platner becomes the nominee because Mainers in the Democratic primary vote for him. This will be a contest between Graham Platner and Susan Collins. And we know what we get with Susan Collins. Her legacy is tied to Supreme Court confirmations that have fundamentally changed the country.\n\nCORNISH: Well, Jamie, let me stop you there, because we also just heard a voter say that they'd rather vote for a doorknob than Collins. So, you don't have to sell it on election day.\n\nBut it is seen as one of a pickup opportunity.\n\nCORNISH: You said you're a supporter of Mills. She suspended her campaign.\n\nBut she's not all the way gone, right?\n\nCORNISH: Like, not formally withdrawn.\n\nHere's what she told \"The Portland Press.\" And I think she was saying that, \"people have the impression that I 'withdrew' or 'dropped out,' but I simply suspended active campaigning. And I'm still on the ballot.\"\n\nSo, then Senator John Fetterman weighs in on why he thinks she may not be connecting with voters.\n\nSEN. JOHN FETTERMAN (D-PA): In was a setting --\n\nMANU RAJU, CNN CHIEF CONGRESSIONAL CORRESPONDENT: She's the sitting governor and upstanding as a -- as a committed Democrat, you know. And it seems like the only thing wrong with her is she happens to be 78. So --\n\nCORNISH: He's talking about age as a factor. Can you talk about whether or not people, do you think, will be writing her in today or will be checking her name off, since she's still on the ballot, or is that wishful thinking?\n\nHARRISON: No, I think people would. I mean, if I were voting in Maine today, that's who I would be voting for as well. And that's the problem that I have with some parts of the Democratic Party at this point. It is -- you know, they can look past every other flaw but age, right? If you're an older Democrat, then that -- that is the fundamental flaw that everything else breaks down.\n\nBut in the end of the day, what people want is, somebody's going to fight for them regardless of their age. Someone who has experience, who can be effective in terms of legislating. And Janet Mills has that proven record. And it's a shame that, you know, the chattering class was all in for someone who has all these flaws. And we knew it from the start.\n\nBut in the end, again, you know, regardless of what happens in this primary, it's about the general election.\n\nCORNISH: Well one -- yes, it is.\n\nHARRISON: And it's between Susan Collins and likely Graham Platner. Yes.\n\nCORNISH: Thank you for being on. This is a fascinating race, especially since it was voters, right, in polling who put Platner so far ahead. And I'm going to be interested to see what kind of lessons Democrats take from this.\n\nJamie, thank you for your time. Good luck catching your flight.\n\nCORNISH: And tonight at 8 Eastern, CNN has live coverage of some of these key primaries across the country. And you can watch them on CNN or on the CNN app.\n\nIn California, former reality star Spencer Pratt is out in the Los Angeles mayoral election. The CNN decision desk projects that Nithya Raman will advance to the general election to take on incumbent Karen Bass. In the governor's race, the CNN decision desk projects that Democrat Xavier Becerra will advance to November. Republican Steve Hilton is holding a lead for second.\n\nCalifornia's elections often take days to get resolved because postmarked mail-in ballots, received up to a week after election day, can still be counted, again, as long as they are postmarked on election day.\n\nThis has fueled President Trump's claims that the California elections are rigged. There is no evidence provided for that. Steve Hilton told CNN's Erin Burnett last night that's not what he's seeing.\n\nSTEVE HILTON (R), CALIFORNIA GUBERNATORIAL CANDIDATE: We've got teams standing by, lawyers standing by, and actually, it's the same answer that actually I've been giving for a few days now. We've seen nothing that would give us cause to intervene in that way.\n\nCORNISH: I want to bring it back to the group chat.\n\nWe've got this sort of thing where, again, you've got the leading Republican in the statewide race saying, I actually think it's going pretty well, probably because he's second. But we also saw Trump blow up at Kristen Welker at NBC for getting -- specifically on this issue, which is crazy considering they were talking about Iran and a variety of other things.\n\nWhy do you think this issue has captured the imagination, especially on the right? Like, why are people looking at these two races and saying, aha, indicative of nationwide problems?\n\nBRIANNA LYMAN, REPORTER, \"THE FEDERALIST\": Well, I think it's fair skepticism for voters to look at a place like Los Angeles, for example. And you see that on election night, Spencer Pratt was up by about eight to 10 points. And when you went to bed, he was up by eight to 10 points. The next morning --\n\nCORNISH: And that's what the percentage of vote counted being 28 percent, 35 percent.\n\nCORNISH: Just as a reporter, you're not looking at the full count.\n\nLYMAN: Sure. Sure. So, traditionally, Americans, for decades, have expected to receive results on election night. That has not been the same for probably the past six years, really, with Covid starting, people began to expect a delay in results. But for a lot of Americans, they expect results on election night. And I think that there are Americans who say, look, a week after this election, a week after Nithya Raman, she gave a speech that even CSPAN characterized as a concession speech. She almost publicly dismissed any possibility for a path forward.\n\nLYMAN: So, you put that into play. And then you see all these ballot drops, which tend to favor Nithya Raman even over Karen Bass, especially when Nithya Raman actually underperformed in her own city council district.\n\nI do think it's fair for people just to say, a week later suddenly the guy who was in second place on the night of the election, there are some questions --\n\nCORNISH: So, let me bring in someone who's run a mayoral race and may have some thoughts about why you give a concession speech when there's only x amount of percentage of the ballots counted.\n\nWas that a mistake? Can you talk about the dynamics at play here?\n\nCHRISTINE QUINN, EXEC. COMMITTEE CHAIR, NY STATE DEMOCRATIC COMMITTEE: I mean the way it works in California is very different than a lot of other states. The way you can mail in ballots. And one thing we see in California is the ballots that come in later tend to be Democratic ballots, which is not a surprise.\n\nCORNISH: Yes. But then so why wouldn't Raman be like, hey, everyone chill.\n\nQUINN: I thought it was strange.\n\nQUINN: I thought it was strange that she gave that kind of a speech, as opposed to, let's all wait and see.\n\nQUINN: I think she missed the mark and probably got, you know, I think it -- look, election night is crazy. And if you're not winning, clearly you just want it to end and be over.\n\nCARI CHAMPION, HOST, \"FLAGRANT AND FUNNY\": That is what I thought. I thought the narrative got to her.\n\nQUINN: Yes, I think that's right.\n\nCHAMPION: I think that's what happened. I think the narrative of perhaps this Spencer Pratt being someone that people were really excited about, and it's usually those who can't vote for mayor in L.A.\n\nCHAMPION: Because I am a California resident. I vote --\n\nCORNISH: Yes, he was the internet's mayor for a week.\n\nCORNISH: Mamdani was the internet's mayor last fall.\n\nCHAMPION: Exactly. Exactly.\n\nCORNISH: Won our hearts with vigorous use of A.I.\n\nWhen I look at the L.A. voter breakdown, he was winning areas, you're talking about Westside, Pacific Palisades, which makes sense. He was fighting for their issue around rebuilding after the fires.\n\nCORNISH: You've got Karen Bass getting south of L.A., south of Santa Monica Freeway. Nithya Raman, Echo Park, Hollywood, to Highland Park.\n\nCHAMPION: Makes sense.\n\nCORNISH: The reason why it -- yes, it makes sense, right, for California here.\n\nCHAMPION: It makes perfect sense.\n\nCORNISH: I think the reason why I wanted to ask is because we're in this weird situation now where we're like, oh, this heavily Democratic city went to Democrats. Scandal. Skepticism. You know what I mean? And I feel like when I look at the Texas race, I'm not like, there should be bigger numbers here for the DSA. It's like, well, it kind of is breaking down the way the overall voter rolls break down.\n\nQUINN: And it's interesting for the president to be kind of so, you know, animated, to put it mildly, about the mayor's race when in the governor's race you're probably most likely going to have a Republican and a Democrat. So --\n\nCHAMPION: Yes, which is why Hilton's like, it's fine to me. No big deal.\n\nQUINN: Exactly. Exactly.\n\nCHAMPION: Everything looks good here.\n\nCORNISH: How will people -- I just want to give the last word to you, Brianna, because you are bringing this up. We're in a moment where you've got several states fighting Trump and fighting his DOJ on having to turn over their voter rolls. The administration has a new initiative where they say, look, states, we want everybody's unredacted voter rolls, names, birth dates, all the things. We're going to check it against a database we have. And there are some states who are saying, yes, and some states that are like, wait, that's not legal. Under the Constitution, states deal with voter rolls. Is his talking about California really about this fight?\n\nLYMAN: Well, I think so. And actually, when it comes to voter rolls, so under HAV (ph) and HAVA, which are 2001 and 2004 election, federal election laws, states do have to comply with federal election voter roll audits.\n\nLYMAN: California is one of those states that said, I am not going to comply. And I do think there is reason for people to question California's audit rules (ph).\n\nFor example, in California, you're supposed to provide your driver's license identification number and your Social Security Number when registering to vote, which neither one of them necessarily guarantees a check citizenship, but it's a pretty decent check. But in California, if you are unable to provide either of those documents, you can actually provide proof of identity to register to vote with something as simple as a gym membership.\n\nLYMAN: What kind of you, you know, rigger roll (ph) do you go through?\n\nCORNISH: And so far they have not reported widespread fraud when they've done their audits.\n\nLYMAN: Well, they're also not -- they 're also -- right, but they're also not letting the federal government check their audits. So, I think that's a concern that people have.\n\nCORNISH: Absolutely. And I think -- the reason why I'm not addressing it now is because it's before the courts, right?\n\nCORNISH: Actively asking whether or not the government has the right to ask for it.\n\nCORNISH: And the extent of information they do, and to use that to check against a database with known flaws, right? Because then you're kicking people off the rolls based on a database that isn't working so well.\n\nSo, this story is not going to go away.\n\nCORNISH: Even though it sounds like it's just about California's races.\n\nNext on CNN THIS MORNING, Hunter Biden has been out talking a lot, and now he's really clapping back. We're going to ask why? Why now?\n\nUNIDENTIFIED MALE: We can't afford it. We can't -- we'd rather stay home and just watch the game.\n\nCORNISH: Staggering prices. The ugly cost of the beautiful game.\n\nUNIDENTIFIED MALE: Hunter Biden, my guy, a natural born poster, a beacon of light in a dark world.\n\nUNIDENTIFIED MALE: Hunter Biden is proof that you can't hurt somebody's feelings if they are 100 percent honest about who they are.\n\nUNIDENTIFIED FEMALE: When they go low, we go Hunter Biden. And I will not be explaining any further.\n\nCORNISH: I can't do better than that. Hunter Biden has entered the chat. The son of the former president, Joe Biden, has become the clapback king online after reactivating his X account. His posts are a mix of political attacks, hitting back at critics, personal reflection and addressing his past addictions and controversies.\n\nHUNTER BIDEN: I know there's going to be a lot of haters, a lot of trolls, a lot of people saying really, really awful things. But I've heard it all before. It doesn't even faze me. I promise you. I know who I am. I know what I've done. I know the amends that I need to make.\n\nCORNISH: Hunter's reshaping of his image comes at the same time his stepmother, former First Lady Jill Biden, is getting mixed reviews from her post-White House memoir, where she shares her view of the 2024 election. Some Democrats say it's reopening old political wounds.\n\nI don't know who to start with here.\n\nCari, who actually went, oh, when you were watching that, or Christine, who maybe has more doubts. More doubts. Why do people have political comebacks? Like, where are they effective? Where are they not?\n\nQUINN: Well, when you're Hunter Biden and your father had to, you know, pardon you for everything you may ever think, do or possibly have done, comeback, it should not be in your vocabulary. Keep your head down. Hope that people forget. That should be in your vocabulary.\n\nCORNISH: See, that is the least American thing you could say.\n\nCHAMPION: That's the least of what -- yes.\n\nCORNISH: We love a second act (ph).\n\nQUINN: But as a Democrat, I -- as a Democrat, I do not need Hunter Biden out there reminding people.\n\nCHAMPION: Oh, no. Oh, no. I totally -- I totally disagree with that. And I think it goes very much to what we were talking about earlier. We were talking about what was going on in Maine.\n\nI think people really enjoy the fact that he is so authentic, almost to the point where it's embarrassing. And yes, he is reopening probably perhaps some new -- old wounds, but he's saying, so what? This is what it is.\n\nWhat do you do when someone -- you say, you know what, you really are a horrible human. You're right. I am. There's no response to that. Like, and I'm not saying that he's a horrible human, but I'm like, there's just --\n\nCORNISH: Yes, yes, yes. Although that lady was. That was --\n\nQUINN: Yes, she was. Right. CORNISH: (INAUDIBLE) compliment I've ever heard.\n\nCORNISH: So, you said no Democrats want him back. But I can think of some people do.\n\nCORNISH: This is Hunter Biden on the Candace Owens podcast.\n\nHUNTER BIDEN: But they had a problem with me as being this emblematic emblem of corruption. These guys, OK, Don Junior got the single largest loan guarantee from the Department of Defense ever handed out of over $600 million for an energy company, a fusion energy company, of which he has zero, zero experience in it.\n\nCORNISH: Brianna, I think it's interesting that he is relitigating some of these issues direct into the lifeblood of the media ecosystem on the right. He's not going to any random place, right? He's going to Candace Owens, who's in the middle of a massive brawl, so to speak, with TPUSA. He's talking about Epstein. He's talking about things that this particular world of people agree with him on.\n\nLYMAN: Well, I think, first of all, I think Hunter Biden coming back into the limelight, this is a way to kind of sanitize the public image of himself that I think he himself had tarnished for a few years.\n\nCORNISH: But why would Candace Owens sanitize it?\n\nLYMAN: Candace Owens -- well, Candace Owens has been platforming people that have spewed stuff that is egregiously false and controversial and insulting to a lot of people, and I don't think she's someone that should be platformed. So, I'm not going to take any -- I'm going to take this interview with a grain of salt.\n\nI think when it comes to Hunter Biden, I will say, something that appeals to younger people is that level of honesty. You know, he said, look, if those were my drugs at the White House, you think I'd leave them there?\n\nLYMAN: And it's very reminiscent of when Charlie Sheen had said, if there are drugs --\n\nLYMAN: He was like, if there are drugs in the house I'm going to find them. That was Charlie Sheen years ago. And that's kind of become an internet meme. So, I think Hunter Biden is trying to reestablish himself and maybe in part because he does see himself as needing some kind of online support base in order to have a future career. I think he said he's opening a Substack soon. So, he wants to garner --\n\nCHAMPION OK. Who doesn't have a Substack?\n\nCORNISH: OK. Next you're going to say he has a podcast.\n\nLYMAN: But he wants to -- he wants to garner that -- that big audience.\n\nCORNISH: You think it's laying the ground for something else?\n\nLYMAN: I think he's laying the ground for a future career.\n\nCORNISH: This is like the Serena Williams Olympics thesis over here.\n\nCHAMPION: Right. He's not -- and, by the way, he's not even managing our expectations. He's letting us know that people he's going to be that problematic fave, as they say.\n\nCHAMPION: And people will enjoy it and they'll go to him and they're like, I don't know why I enjoy it, but I simply do.\n\nCORNISH: OK. I want to turn to our group chats because in mine are all the family in the Cornish Hen WhatsApp group. They're not loving these World Cup prices. It's a problem. They are very unhappy.\n\nCORNISH: Before we get to yours, what's the deal? Like, are people just going to have to suck it up?\n\nCORNISH: Or is FIFA creating long term engendering frustration?\n\nCHAMPION: No, I think -- and I hate to even bring up, you know, game three last night, those prices were astronomically ridiculous. And let me tell you, just side note, Spurs, this is what the Spurs have done. They have season ticket holders who have these courtside seats and they've been reselling them on the second market -- secondary market to other players, other people, like the Knicks. The Spurs have revoked those memberships and revoked those season ticket holders because they want to give them -- they're making a point here.\n\nLook, this is ridiculous. The prices are out of control.\n\nCORNISH: So, there are things they can do?\n\nCHAMPION: There are things you can do. But for the most part we're just going to -- if you really want to see it, this is every so often it's here. People are going to pay.\n\nCHAMPION: People have saved up all -- you have no choice. You just have no choice.\n\nCORNISH: I know. It's what the market will (ph) bear.\n\nCHAMPION: It's what it is.\n\nCORNISH: OK, Christine, what's in your group chat?\n\nQUINN: Well, this past weekend, Thursday and Friday actually of last week, I went to the two kickoff concerts for the Bruce Springsteen Center for American Music.\n\nCORNISH: We're -- whoa, wait, Bruce Springsteen has a museum?\n\nQUINN: Monmouth University. Yes. It just opened at Monmouth University, down the shore in Jersey. And it's obviously about him, but more broadly it's about the history of American music. And this concert was fascinating because they went from the Revolutionary War to the present, kind of decade by decade.\n\nCORNISH: What? For Bruce Springsteen?\n\nCORNISH: Is this his presidential library?\n\nQUINN: It was kind of like that.\n\nCORNISH: What's happening here?\n\nQUINN: It was kind of like that, but it was uplifting and exciting.\n\nCORNISH: OK, I take it. .I'll take time land cleanse from you, Christine.\n\nBrianna, what are you thinking about? What's going on in the group chat?\n\nLYMAN: Well, she brought up the Revolution. My family knows I bog them every single day with history stuff. And this week is very important in America 250.\n\nCORNISH: Your America 250.\n\nLYMAN: Robert E. Lee had introduced -- or Richard Henry Lee had introduced a motion just on June 8th which said that the colony should call for independence. And this next week you will see the committee of five appointed on June 11th Thursday, which is when Thomas Jefferson was assigned to write the Declaration of Independence. And then we'll see, in about two and a half weeks from now, they actually vote on that declaration on July 2nd. So, I've been reminding --\n\nCORNISH: You're doing a timeline. You're doing these --\n\nLYMAN: A whole -- every -- my parents know about it every day.\n\nCORNISH: I like it. I like it.\n\nCORNISH: Also, I've been trying to find ways to celebrate the 250 that are not from the government.\n\nCORNISH: Like, there's just ways to look into your own history and share that with family and friends. What are you thinking about?\n\nCHAMPION: Well, I wasn't -- this wasn't in my group chat, but since she said it, for 250 anniversary, a group of friends, we have decided to write our own Declaration of Independence.\n\nLYMAN: Oh, I love it.\n\nCHAMPION: And it's a group of us, a large group rather. And we all have decided, let me tell you what I am independent of. And so mine has been, just as a black woman here in the United States of America, I removed the mask of trying to fit in to something that I can't fit into. And I write down all the different things that I'm declaring for myself. And it's more of an affirmation so that I know that I can push forward. And all of us have done something like that. Something where we --\n\nCORNISH: That's amazing.\n\nThat is a great idea.\n\nCHAMPION: Yes, where we -- it really is.\n\nCORNISH: And also, if you write it on a scroll, in a --\n\nLYMAN: In a Chrome Pad (ph).\n\nCORNISH: In the Bruce Springsteen Museum of American History.\n\nQUINN: Exactly. Exactly. And it all goes together.\n\nCORNISH: You guys are a fantastic group. I'm so glad to be with you.\n\nThank you for waking up with us. We have plenty more headlines. So, please, stick around.\n\nI'm Audie Cornish. And you're going to be listening to CNC, \"NEWS CENTRAL,\" next.\n\n","segments":[{"seg":1,"url":"https://transcripts.cnn.com/show/ctmo/date/2026-06-09/segment/01","title":"CNN.com - Transcripts","text":"Return to Transcripts main page\n\nTrump Attends NBA Finals Game and Knicks Lose; Texas Tech QB Ruled Eligible after Sports Betting Ban. Aired 6-6:30a ET\n\nAired June 09, 2026 - 06:00   ET\n\nTHIS IS A RUSH TRANSCRIPT. THIS COPY MAY NOT BE IN ITS FINAL FORM AND MAY BE UPDATED.\n\nBRAD SMITH, CNN ANCHOR: Fortunately, no one was hurt.\n\nAnd in Texas, a nearly 8-foot alligator was caught horsing around in a stable. An employee was able to wrangle the reptile with a lasso and pull it into an empty horse stall.\n\nGame wardens say tha
